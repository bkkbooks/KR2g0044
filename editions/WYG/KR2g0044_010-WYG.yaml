body:
  text: 八旗滿洲氏族通譜卷四各地方瓜爾佳氏呉理戡國正白旗人世居費徳里地方處屢著勞績葉赫初來歸授喀倫章京廵哨各命往探等九國來侵呉理戡奉擊大獲全勝察其形勢我兵奮勇進太祖髙皇帝嘉其績賜佐領使統之後於呼蘭地方哨廵遇明總兵李如栢兵率二十人擊敗其衆加授副將銜其子瞻泰原任武備院卿伊希達原任二等侍衛孫常明原任雲麾使兼佐領伊騰原任二等侍衛曽孫明泰原任佐領元孫永福亦原任佐領呉拜太祖髙正白旗人呉理戡之長子也皇帝召入内庭撫飬賜姓覺羅尋襲伊父佐領預十六大臣之列征遼東追擊敵哨斬殺甚衆授騎都尉征董䕫時擊敗察哈爾多所俘獲征寧逺大破明兵授為三等輕車都尉征囊努克奮勇敗敵征朝鮮追殺叛逃之男婦九十七人授為三等男縁事削去世職後初次往北京入邊之日擊三屯營兵越衆先進又敗袁都堂兵有功授一等輕車都尉縁事降為騎都尉平定朝鮮時率領前鋒斬闗直入射死總兵一員副將二員斬逰擊六員叙功授為三等輕車都尉征寧逺敵兵出城拒戰奮擊大敗之圉錦州擊敗松山兵二次過北京征山東於豐潤縣靜海縣屢敗范軍門兵授為二等輕車都尉定鼎燕京時入山海闗擊敗流賊馬歩兵復追至慶都縣敗之優授為一等男追滕吉思擊敗土謝圖汗兵身被七創優授為一等子遇恩詔晉封二等伯縁事削革尋復授為内大臣兼佐領後以原官致仕奉㫖復其軍功所得一等子卒郎坦襲職歴任議政大臣賜祭𦵏如典禮諡果壯其子領侍衛内大臣都統昭武將軍兼佐領卒其子拉馨襲職任㪚秩大臣都統兼佐領卒其子英兆襲職現任三等侍衛又呉拜之子綏赫圖原任翰林院侍講兼佐領孫喀喇原任郎中闗寧現任郎中忠順現任佐領曽孫英福原任五品官棟書現任佐領蘇拜正白旗人呉理戡之次子也由佐領從征察哈爾射却哨卒三百餘人征北京擊敗太監馮永盛兵初圍錦州屢敗松山杏山馬歩兵叙功授騎都尉三圍錦州擊敗洪承疇三營兵加一雲騎尉二次過北京征山東入邊之日擊敗范軍門等兵又攻克樂安昌邑二縣授為三等輕車都尉定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆授為二等輕車都尉後追流賊至榆林地方有賊兵六百乗夜來襲大同率百人奮勇追擊盡殱其衆又於承天府連破李自成營獲其金印授為一等輕車都尉兼一雲騎尉征四川屢敗張獻忠兵優授為三等子遇恩詔授為二等子縁事革職後蒙衛内大臣卒特恩復授一等男世職歴任領侍賜祭𦵏如典禮諡勤僖其子昻安霸襲職任三等侍衛因老病告退其子浩善襲職任三等侍衛因病告退其兄叙昌襲職任副都統卒其子伊爾泰襲職任頭等侍衛縁事革退其兄馬爾泰現襲職又蘇拜之子和托由頭等侍衛從征陕西於平涼府擊敗叛逆王輔臣兵征湖廣於攸縣河岸擊賊偽將王國佐等兵大破之又敗賊偽將胡國柱兵於永興縣續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方叙功優授騎都尉兼一雲騎尉任䕶軍恭領兼佐領卒其子巴爾泰襲職任佐領卒其子耀喜現襲職又蘇拜之子英阿拉原任二等侍衛禮沙原任通政使司通政使兼佐領禮常原任藍翎侍衛費扎原任雲麾使兼佐領孫托克托和現任佐領蘇爾岱現任驍騎校同太現任署正曽孫諾穆渾現任主事赫伸現任筆帖式温都理國正白旗人呉理戡同族世居費徳里地方品官初來歸其子萬塔哈原任協領外山由六從征陕西於平涼府擊敗逆賊王輔臣兵征湖廣在巖山嶺擊賊偽將馬寳兵陣亡贈雲騎尉其子三達色襲職卒其子諾穆布現襲職又温都理之孫禮布存原任員外郎曽孫闗保住椿布俱現任䕶軍校桂勒赫國鑲藍旗人世居虎爾哈地方初過北京征山東初來歸其子達爾珠由閒㪚恩詔加攻靈壽縣第二登城克之授雲騎尉三遇察襲至三等輕車都尉卒無嗣其親兄之子戴職從征廣東於新㑹縣擊敗賊李定國兵四萬餘衆進兵雲南貴州時賊李定國率偽將二十四員賊兵萬餘於陸噶地方拒戰屢敗之叙功授為二等輕車都尉卒無嗣其親叔之子珠沙理襲職從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方叙功授為一等輕車都尉卒其子赫達色襲職卒其子四雅圖襲職時削去恩詔所加並珠沙理承襲騎都尉卒無嗣其叔祖之子詔後軍功所得之職詔後軍僧額圖襲職時又削去戴察任佐領又桂勒赫功所得之職承襲雲騎尉現之子沙爾虎達由佐領從征瓦爾喀有功授騎都尉取大凌河時擊錦州兵先進又以歩戰破監軍道張春兵叙功授為三等輕車都尉征黑龍江著有功績授為二等輕車都尉破流賊滅福王平定河南江南等處屢敗賊衆授為一等輕車都尉遇恩詔加一雲騎尉後征江西擊敗賊首金聲桓等兵七萬餘衆敗賊偽高總兵於江口焚其船七百餘恩詔優隻授為三等男兩遇騎尉歴任前鋒統領卒授為一等男兼一雲贈太子太保諡襄壯其子巴海襲職尋授寧古塔將軍縁事削去世職後於將軍任内征剿羅刹破賊聖祖仁奪船有功授雲騎尉康熙十七年奉處將軍蒞皇帝諭㫖巴海將爾授為寧古塔等任以來彈壓巖疆展布猷畧實心任事籌畫周詳允為稱職又設法遷移查努喀等各姓新滿洲户口於寜古塔烏喇編為佐領安插咸令得所懐柔逺人冇禆軍國深為可嘉欽此將巴海優授為一等輕車都尉兼一雲騎尉又縁事降為三等輕車都尉卒其子四格襲職任叅領因病告退其子安泰襲職任杭州將軍卒其子阿哈那襲職現任佐領又桂勒赫之孫蘇丹原任頭等䕶衛呉沙理原任佐領佛爾津原任歩軍副尉兼佐領珠巴理原任筆帖式曾孫富森蘇巴理俱原任頭等䕶衛呉巴理董安俱原任佐領元孫蘇完住原任頭等䕶衛明徳原任佐領呉爾勤現任四品典儀札薩克圖現任三等䕶衛兼佐領四世孫阿常阿現任三等䕶衛綽爾門現任佐領索渾現任頭等䕶衛拜音達理巴圖魯國正藍旗人世居殷地方征山東梯攻棲霞縣首初來歸由閒㪚過北京賜巴圖先登城克之尉三遇魯號授騎都恩詔加至二等輕車都尉卒其子滿達理襲職縁事革退其親弟安達理襲職從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方叙功授為一等輕車都尉卒無嗣其親弟賽音達理襲職恩詔所卒其子薩爾圖襲職時削去騎尉現任副叅領加之職承襲騎都尉兼一雲兼佐領又拜音達理巴圖魯之孫丹達理原任歩軍校顔達理原任防禦按拜音達理巴圖魯與本旗同里納朗阿同族搆色正藍旗人拜音達理巴圖魯同族世居殷地方來歸年分無考由防禦從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授雲騎尉任佐領卒其子七十現襲職雅木達正藍旗包衣人拜音達理巴圖魯同族世居烏巴塔城地方来歸年分無考由佐領從征湖廣贈雲騎在長沙府擊賊陣亡職現任佐領尉其孫畢禮克圖襲噶哈國正紅旗人世居雅爾湖地方俱原任佐領鈕尼初来歸其曽孫占拜塔爾克雅哈由佐領三圍錦州克其外闗定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆叙功授騎都尉尋授户部理事官五載考績稱職加一雲騎尉歴任署副都統卒其子阿晉泰襲職卒其子達揚阿襲職卒其子金達理現襲職又噶哈之元孫吉爾泰原任員外郎森得理原任歩軍校阿岱由防禦從征錦州擊敗松山兵定鼎燕京時入山海闗擊敗流賊馬歩兵後破流賊滅福王平定河南江南等處屢敗賊衆叙功授雲騎尉三遇恩詔加至三等輕車都尉年老告退其子雅親襲職歴任寜古塔副都統縁事革退其親弟克什布襲職縁事革退其親兄之子呉頼襲職又噶哈之元孫夸瞻由佐領從征雲南入緬國至阿窪城獲偽桂王有功優授騎都尉兼一雲騎尉卒其子西特庫襲職又噶哈之元孫噶爾珠由七品官從征江西於建昌府擊敗賊首邵連登等兵又敗賊偽將夏國相兵於萍鄉縣叙功授雲騎尉卒其子巴爾都襲職卒其子達都理襲職現任委署歩軍校又噶哈之四世孫赫碩色原任給事中愛篤原任防禦禪布原任歩軍校瑪爾泰瑪爾吉俱原任佐領倭錫訥保住俱原任驍騎校皂保現任筆帖式阿爾禪現任委署䕶軍叅領五世孫英遜原任郎中達桑阿原任佐領三察哈現任五品官訥楞泰徳楞泰俱現任筆帖式偉色現任䕶軍校福森布現任大使花沙布現任司務雅蘭泰現任驍騎校六世孫善泰現任䕶軍校伊常阿現任博士蘇常阿伊思哈俱現任筆帖式按噶哈與夲旗同里哈理同族豐果國正紅旗人世居吉陽地方原任佐領呉爾琨由初來歸其五世孫蘇秉額騎都尉征遼東克其城授三等輕車都尉駐防海州有功授為二等輕車都尉征北京擊薊州歩兵陣亡無嗣其親兄之孫科魁襲職縁事降為騎都尉三遇恩詔加至二等輕車都尉復縁事降為騎都尉兼一雲騎尉從征湖廣於永安闗等處屢敗賊衆後征浙江舟山擊敗偽英毅伯阮思等兵於海上叙功優授為二等輕車都尉歴任杭州將軍縁事削去夲身所得之騎都尉兼一雲騎尉所餘之騎都尉其叔祖之元孫萬寜保現承襲又豐果之六世孫塔濟那原任佐領七世孫杭州亦原任佐領八世孫徳林原任員外郎河南原任䕶軍恭領九世孫𤓰扎原任恭議敦達理原任待詔成明現任䕶軍校阿球巴圖魯國正藍旗人世居沙晉穆爾吉地方先登克其城初率族衆及八十人來歸攻安州賜巴圖魯號編佐領使統之其子錫特庫原任佐領孫岱禪由等帖式從征江西湖廣等處屢著軍功優授騎都尉卒其子阿爾賽襲職任協領又阿球巴圖魯之曽孫喀賽原任郎中兼佐領馬爾賽原任二等䕶衛元孫福察保原任佐領喀爾圖原任䕶軍校四世孫蘇克東阿現任佐領又阿球巴圖魯之族叔僧柱由委署驍騎校從征貴州回兵時遇海冦鄭成功兵擊敗之叙功授雲騎尉卒其子塞濟圖現襲職又阿球巴圖魯之族弟敦拜原任吏部尚書嘉塞納原任員外郎穆克敦原任防禦庫爾拜原任䕶軍校扎凌阿原任驍騎校又阿球巴圖魯之族姪舜岱原任給事中永岱原任員外郎達色原任御史三圖富成俱原任郎中昻山原任防禦瑚成原任頭等䕶衛六格現任驍騎校塞克錫由委署䕶軍恭領從征四川於槐樹驛等處擊敗賊偽將王屏藩等兵後征陕西敗逆賊王輔臣兵於平涼府叙功授騎都尉任城門尉年老告退其子敏住襲職現任恭恭領又阿球巴圖魯之族孫佛爾和賽華俱原任郎中星色車爾布俱原任員外郎騷達色原任二等䕶衛兆徳原任典儀勒色理現任協領徳倫泰塞爾特俱現任䕶軍校通保現任防禦明綬現任典儀明清現任筆帖式族曽孫阿敦盛保俱現任二等䕶衛尼穆拜現任長史僧錫巴圖魯國正藍旗包衣人世居沾地方義縣首先登城克初來歸由領催往北京攻順賜巴圖之號授騎都尉後征朝鮮在桃山村擊賊陣亡魯贈一雲加尉其子僧住襲職遇騎恩詔授為三等輕車都尉卒其子色克襲職卒其子舒書襲職後舒書親叔之孫雅圖襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其親弟二達色現襲職由鑲白旗改𨽻喀喀理國正黄旗人世居噶哈里地方攻定興縣克其城初來歸其孫透特克由閒㪚授雲騎尉卒無嗣其親弟之子察楚襲職定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆恩詔加叙功授為騎都尉三遇嗣其親伯之子哲赫徳至二等輕車都尉卒無襲職又喀喀理之曽孫色赫理原任驍騎校四世孫岳常保現任八品官甘塔堪國正白旗人世居虎爾哈地方東攻曹縣陣亡初來歸由䕶軍叅領從征山贈雲騎尉其子葢思海襲職從征浙江舟山屢敗賊兵獲船十八隻以功授為騎都尉後攻永興縣陣贈一