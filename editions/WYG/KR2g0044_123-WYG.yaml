body:
  text: 八旗滿洲氏族通譜卷六十一鑲白旗有名位希姓尼格勒氏尼格勒為滿洲一姓此一姓世居黑龍江富爾瑚村地方阿爾瓜鑲白旗人元國初来歸其曾孫喀努原任步軍校孫覺和托原任䕶軍叅領四世孫薩爾圖原任䕶軍校由正黃旗改隸準齊氏凖齊為滿洲一姓此一姓世居黑龍江地方瑚丕理鑲白旗人什國初来歸其孫雙鼎原任驍騎校呉原任防禦由正白旗改隸翁尼理氏翁尼理為滿洲一姓此一姓世居烏喇地方阿山鑲白旗人原國初来歸其子圖林帕任驍騎校朱爾克氏朱爾克為滿洲一姓此一姓世居索倫地方内圖肯鑲白旗人孫國初来歸其子巴爾海原任䕶軍校塔普錫圖原任七品官曾孫和尚現任筆帖式通阿拉氏通阿拉為滿洲一姓此一姓世居倭濟地方白克圖白旗人原國初来歸孫苗達任筆帖式穆爾徳氏穆爾徳為滿洲一姓此一姓世居大凌河地方訥爾赫鑲白旗人原國初来歸其孫南泰任七品官吳札爾瑚氏吳札爾瑚為滿洲一姓此一姓世居渾春地方西圖納鑲白旗人原國初来歸其曾孫福柱係副驍騎校特濟氏特濟為滿洲一姓此一姓世居札庫塔地方雅親鑲白旗人原國初来歸其孫雅爾泰係副驍騎校塔坦氏塔坦為滿洲一姓此一姓世居長白山地方陶托理鑲白旗包衣人䕶國初来歸原任頭等衛猷格理氏猷格理為滿洲一姓此一姓世居葉赫地方吳巴泰鑲白旗包衣人任國初来歸原任包衣大其子票岱原八品官孫色克原任牧長赫雅圖原任䕶軍校曾孫巴士儀原任八品官哈爾吉氏哈爾吉為滿洲一姓此一姓世居哈達地方哈克散鑲白旗包衣人六國初来歸其元孫金泰現任品包衣大穆齊氏穆齊為滿洲一姓此一姓世居鄂漠和索羅地方象徳鑲白旗包衣人任國初来歸其子額爾格原八品官恰喇氏恰喇為滿洲一姓此一姓世居寧古塔地方濟哈鑲白旗包衣人現國初来歸其曾孫闗達色任筆帖式姜佳氏姜佳為滿洲一姓此一姓世居寧古塔地方姜圖鑲白旗包衣人現國初来歸其四世孫姜阿係生員博和羅氏博和羅為滿洲一姓此一姓世居薩哈禄地方保泰鑲白旗人天聰時来歸其曾孫邁圖原任城門尉由鑲黄旗改隸唐尼氏唐尼為滿洲一姓此一姓世居十方寺地方善福鑲白旗人天聰時来歸其子唐旒原任驍騎校孫赫搆原任䕶軍校武魁現任䕶軍校吳拉氏吳拉為滿洲一姓此一姓世居鄭家堡地方穆禮瑪鑲白旗人天聰時来歸其曾孫羅興原係副䕶軍校洪達理氏洪達理為滿洲一姓此一姓世居嘉拉庫地方薩穆鼐鑲白旗人来歸年分無考其子唐圖原任佐領馬爾屯氏馬爾屯為滿洲一姓此一姓世居長白山地方馬積瑚鑲白旗人来歸年分無考其元孫浩善原任驍騎校馬爾漢原任䕶軍校四世孫兆保住原任䕶軍校噶爾漢原任典儀阿爾漢原任驍騎校五世孫巴什原任䕶軍校齊世久原任六品典儀六世孫常明現任䕶軍校由正白旗改隸兆壘氏兆壘為滿洲一姓此一姓世居馬察地方雅喇鑲白旗人来歸年分無考原任包衣大其子堪珠瑚亦原任包衣大孫噶爾珠原任䕶軍校曾孫噶爾漢塞勒俱原任包衣大元孫官保現任䕶軍校玊爾庫氏玉爾庫為滿洲一姓此一姓世居尼馬察地方恰塔鑲白旗人来歸年分無考原任驍騎校陳佳氏陳佳為滿洲一姓此一姓世居張當地方陳國柱鑲白旗包衣人来歸年分無考其子齊克騰原任員外郎薩穆哈原任包衣叅領孫兆格原任驍騎校由正白旗改𨽻莽吉綽氏莽吉綽為滿洲一姓此一姓世居葉赫地方尼瑪善鑲白旗包衣人来歸年分無考其孫珠清額原任主事曾孫丹拔原任典儀由正黃旗改隸墨爾吉氏墨爾吉為滿洲一姓此一姓世居葉赫地方瑪爾賽鑲白旗包衣人来歸年分無考其孫愛塔原任包衣大由鑲藍旗改𨽻鑲紅旗有名位希姓穆色陳氏穆色陳為滿洲一姓此一姓世居佛阿拉地方阿爾薩朗鑲紅旗人原國初来歸其子克什圖任頭等䕶衛塞楞吉氏塞楞吉本係地名因以為姓此一姓世居塞楞吉石赫寨地方愛錫鑲紅旗人世國初来歸其元孫闗保原任防禦四孫觀音保現任驍騎校尼瑪哈氏尼瑪哈為滿洲一姓此一姓世居遼陽地方英奇鑲紅旗人原國初来歸其子彩柱任防禦茂儀氏茂儀為滿洲一姓此一姓世居英額地方翁頭鑲紅旗人孫國初来歸原任驍騎校其常禄原任典儀安佳氏安佳為滿洲一姓此一姓世居普塞屯村地方安普鑲紅旗人圖國初来歸其子安保原任驍騎校孫雅現任驍騎校曾孫齊蘭泰現任䕶軍校羅岳氏羅岳為滿洲一姓此一姓世居葉赫地方岳隆鄂鑲紅旗人孫國初来歸其子塞圖原任䕶軍校福什保原任筆帖式鄂濟理氏鄂濟理為滿洲一姓此一姓世居卦爾察地方吳魯蓀鑲紅旗人天聰時来歸其曾孫翁鄂羅原任步軍校元孫察爾布原任郎中察布海原任筆帖式翁果特氏翁果特為滿洲一姓此一姓世居翁科地方博布哈鑲紅旗人天聰時来歸其孫桑格原任頭等䕶衛康錫理氏康錫理為滿洲一姓此一姓世居伊巴丹地方二碩色鑲紅旗人天聰時来歸其孫康格原任員外郎蘇克察氏蘇克察為滿洲一姓此一姓世居葉赫地方布爾哈鑲紅旗人天聰時来歸其孫来格原任驍騎校燦寶原任䕶軍校札穆秦氏札穆秦為滿洲一姓此一姓世居黑龍江地方鈕倫泰鑲紅旗人天聰時来歸其孫博森泰原任䕶軍校由本旗包衣改隸都瓦爾佳氏都瓦爾佳為滿洲一姓此一姓世居奉集堡地方德色鑲紅旗人来歸年分無考原任典儀其子六格原任二等䕶衛由本旗包衣改隸諾絡氏諾絡為滿洲一姓此一姓世居舍楞阿河地方阿爾吉圖鑲紅旗人来歸年分無考其子昂阿海原任䕶軍校孫圖呼齊亦原任䕶軍校曾孫八十八原任典儀八十九原任筆帖式元孫富德現任主事富成富鼐俱現任筆帖式由本旗包衣改隸田佳氏田佳為滿洲一姓此一姓世居瀋陽地方岱進朝鑲紅旗人来歸年分無考其孫邁堪原任三等䕶衛林佳氏林佳為滿洲一姓此一姓世居蜚悠城地方佛保鑲紅旗人来歸年分無考原任䕶軍校其子玊柱原任三等䕶衛秋佳氏秋佳為滿洲一姓此一姓世居杏山地方浩羅鑲紅旗包衣人来歸年分無考其孫鄂爾和達原任典儀曾孫音達理原任三等䕶衛多錦氏多錦為滿洲一姓此一姓世居黑龍江索多理村地方殷札喀鑲紅旗人来歸年分無考其孫齊奇泰現任步軍校曾孫赫瑚保現任前鋒校努爾漢氏努爾漢本係地名因以為姓此一姓世居努爾漢地方馬隆武鑲紅旗人来歸年分無考其元孫薩哈理原任步軍校錫勒爾吉氏錫勒爾吉為滿洲一姓此一姓世居吉林烏喇地方塔爾屯鑲紅旗人来歸年分無考其孫永住現任防禦嘉哈瑪氏嘉哈瑪為滿洲一姓此一姓世居黑深堡地方喀喇鑲紅旗人来歸年分無考其子西楞泰現任驍騎校胡錫氏胡錫為滿洲一姓此一姓世居輝發地方正克鑲紅旗人来歸年分無考其孫五達色原任驍騎校瓦爾吉氏瓦爾吉為滿洲一姓此一姓世居色欽地方薩哈禪鑲紅旗人来歸年分無考其子翰班原任驍騎校達瑚理氏達瑚理為滿洲一姓此一姓世居烏呼理地方綏朋額鑲紅旗人来歸年分無考其子齋松阿孫德博楞俱原任䕶軍校屈佳氏屈佳為滿洲一姓此一姓世居輝發地方屈子明鑲紅旗包衣人来歸年分無考其孫安泰原任典儀普佳氏普佳為滿洲一姓此一姓世居杏山地方本柱鑲紅旗包衣人来歸年分無考原任䕶軍校其子雅柱原任典儀孫舍楞泰原任䕶軍校曾孫雙禄原任典儀徹禄原任䕶軍校徳柱現任天文生蔣佳氏蔣佳為滿洲一姓此一姓世居蓋州地方蔣山鑲紅旗包衣人来歸年分無考其孫珠爾素現任典儀龎佳氏龎佳為滿洲一姓此一姓世居清城子地方吳巴禮雅庫鑲紅旗包衣人来歸年分無考原任䕶軍校八旗滿洲氏族通譜卷六十一欽定四庫全書八旗滿洲氏族通譜卷六十一鑲白旗有名位希姓尼格勒氏尼格勒為滿洲一姓此一姓世居黑龍江富爾瑚村地方阿爾瓜鑲白旗人元國初来歸其曾孫喀努原任步軍校孫覺和托原任䕶軍叅領四世孫薩爾圖原任䕶軍校由正黃旗改隸準齊氏凖齊為滿洲一姓此一姓世居黑龍江地方瑚丕理鑲白旗人什國初来歸其孫雙鼎原任驍騎校呉原任防禦由正白旗改隸翁尼理氏翁尼理為滿洲一姓此一姓世居烏喇地方阿山鑲白旗人原國初来歸其子圖林帕任驍騎校朱爾克氏朱爾克為滿洲一姓此一姓世居索倫地方内圖肯鑲白旗人孫國初来歸其子巴爾海原任䕶軍校塔普錫圖原任七品官曾孫和尚現任筆帖式通阿拉氏通阿拉為滿洲一姓此一姓世居倭濟地方白克圖白旗人原國初来歸孫苗達任筆帖式穆爾徳氏穆爾徳為滿洲一姓此一姓世居大凌河地方訥爾赫鑲白旗人原國初来歸其孫南泰任七品官吳札爾瑚氏吳札爾瑚為滿洲一姓此一姓世居渾春地方西圖納鑲白旗人原國初来歸其曾孫福柱係副驍騎校特濟氏特濟為滿洲一姓此一姓世居札庫塔地方雅親鑲白旗人原國初来歸其孫雅爾泰係副驍騎校塔坦氏塔坦為滿洲一姓此一姓世居長白山地方陶托理鑲白旗包衣人䕶國初来歸原任頭等衛猷格理氏猷格理為滿洲一姓此一姓世居葉赫地方吳巴泰鑲白旗包衣人任國初来歸原任包衣大其子票岱原八品官孫色克原任牧長赫雅圖原任䕶軍校曾孫巴士儀原任八品官哈爾吉氏哈爾吉為滿洲一姓此一姓世居哈達地方哈克散鑲白旗包衣人六國初来歸其元孫金泰現任品包衣大穆齊氏穆齊為滿洲一姓此一姓世居鄂漠和索羅地方象徳鑲白旗包衣人任國初来歸其子額爾格原八品官恰喇氏恰喇為滿洲一姓此一姓世居寧古塔地方濟哈鑲白旗包衣人現國初来歸其曾孫闗達色任筆帖式姜佳氏姜佳為滿洲一姓此一姓世居寧古塔地方姜圖鑲白旗包衣人現國初来歸其四世孫姜阿係生員博和羅氏博和羅為滿洲一姓此一姓世居薩哈禄地方保泰鑲白旗人天聰時来歸其曾孫邁圖原任城門尉由鑲黄旗改隸唐尼氏唐尼為滿洲一姓此一姓世居十方寺地方善福鑲白旗人天聰時来歸其子唐旒原任驍騎校孫赫搆原任䕶軍校武魁現任䕶軍校吳拉氏吳拉為滿洲一姓此一姓世居鄭家堡地方穆禮瑪鑲白旗人天聰時来歸其曾孫羅興原係副䕶軍校洪達理氏洪達理為滿洲一姓此一姓世居嘉拉庫地方薩穆鼐鑲白旗人来歸年分無考其子唐圖原任佐領馬爾屯氏馬爾屯為滿洲一姓此一姓世居長白山地方馬積瑚鑲白旗人来歸年分無考其元孫浩善原任驍騎校馬爾漢原任䕶軍校四世孫兆保住原任䕶軍校噶爾漢原任典儀阿爾漢原任驍騎校五世孫巴什原任䕶軍校齊世久原任六品典儀六世孫常明現任䕶軍校由正白旗改隸兆壘氏兆壘為滿洲一姓此一姓世居馬察地方雅喇鑲白旗人来歸年分無考原任包衣大其子堪珠瑚亦原任包衣大孫噶爾珠原任䕶軍校曾孫噶爾漢塞勒俱原任包衣大元孫官保現任䕶軍校玊爾庫氏玉爾庫為滿洲一姓此一姓世居尼馬察地方恰塔鑲白旗人来歸年分無考原任驍騎校陳佳氏陳佳為滿洲一姓此一姓世居張當地方陳國柱鑲白旗包衣人来歸年分無考其子齊克騰原任員外郎薩穆哈原任包衣叅領孫兆格原任驍騎校由正白旗改𨽻莽吉綽氏莽吉綽為滿洲一姓此一姓世居葉赫地方尼瑪善鑲白旗包衣人来歸年分無考其孫珠清額原任主事曾孫丹拔原任典儀由正黃旗改隸墨爾吉氏墨爾吉為滿洲一姓此一姓世居葉赫地方瑪爾賽鑲白旗包衣人来歸年分無考其孫愛塔原任包衣大由鑲