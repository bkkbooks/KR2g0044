body:
  text: 八旗滿洲氏族通譜卷三十九輝和氏輝和為滿洲一姓其氏族㪚處於長白山及各地方長白山地方輝和氏葉克書國正紅旗人世居長白山地方歸編佐領使統之初率尼馬察村三百餘人來仕至都統兵部尚書屢立軍功授三等男後縁事免官併革世職其長子道拉由前鋒叅領擊敗松山杏山錦州兵又定鼎燕京時入山海闗擊敗流賊復追至安肅縣大敗之授騎都尉三恩詔加遇二等輕車都尉後征湖廣江西等處屢著戰至功授一等輕車都尉加太子少傅歴任都統後年老致仕孫伊齊納承襲卒子三都承襲一等輕車都尉現任佐領又葉克書之次子轄穆善由前鋒侍衞擊敗錦州松山杏山兵定鼎燕京時入山海闗擊流賊滅福王平定河南江南福建等處俱有功授雲騎尉三遇恩詔加至三等輕車都尉後因多羅順承郡王薨逝轄穆善捐軀以從授二等輕車都尉子碩葛塞襲恩詔授職又葉克書第三子瑚葉由䕶軍叅領兩遇處騎都尉後征大同及鄂爾多斯雲南貴州等俱有功優授三等輕車都尉卒其子呉葉襲職卒將吳葉三等輕車都尉合併碩葛塞之二等輕車都尉為二等男令碩葛塞之子舒泰承襲卒其親伯之子徳備襲職時削去恩詔所加之職承襲三等輕車都尉任長史卒其子徳禄承襲現任侍衞班領陵寢總管又葉克書之孫瑚巴原任都統徳業理希禪俱原任副都統圖理原任員外郎兼佐領曾孫徳森吳巴理俱原任佐領英徳原任三等䕶衞書魯原任步軍副尉元孫博靈額原任䕶軍叅領和秀現任佐領伊常阿原任筆帖式舒瑚訥原任佐領伊靈阿原任五品典儀四世孫觀保現任佐領拉方阿國正紅旗人葉克書同族世居長白山地方舒亦初來歸其孫嘉穆圖原任驍騎校曾孫兆原任驍騎校莽優由閒㪚從征濟南府攻淄川縣首先登城克之授雲騎尉三遇恩詔加至三等輕車都尉卒無嗣其兄之子鼐山襲職卒其子吳理襲職卒其子綽和泰襲職時削去恩詔所加之職承襲雲騎尉卒其子徳明現襲職又拉方阿之四世孫阿爾賽原任步軍校喀尼布吳楚庫俱原任郎中阿賴原任筆帖式阿蘭太現任筆帖式卓洛現任䕶軍校五世孫阿錫坦原任歩軍副尉和順原任鹽運使和林原任郎中阿明阿原任副䕶軍叅領明阿那馬隆悟溫泰俱原任筆帖式巴喀原任頭等䕶衞蒙古爾岱現任䕶軍校額爾登原任三等䕶衞扎隆吳原任鳴贊常海現任䕶軍叅領巴克山現任頭等䕶衞富吉泰由䕶軍校從征準噶爾擊賊陣亡贈雲騎尉其子和徳現承襲又六世孫恒徳現任署丞何其忠現任員外郎何其恵原任署丞興常現任筆帖式明徳現任湖南按察使米薩那現任步軍校喀爾圖現任親軍校七世孫額爾特原任二等䕶衞都爾瑚國正紅旗人葉克書同族世居長白山地方南江初來歸其子尼雅哈齊由䕶軍校從征河南等處俱有功授雲騎尉卒子穆成格承襲又都爾瑚之次子鄂爾精阿原任頭等䕶衞孫滿岱亦原任頭等䕶衞屯布禄原任防禦哈爾薩原任七品官延泰由驍騎校從征浙江舟山有贈一雲功授雲騎尉從征湖廣於岳州府陣亡徳承襲騎尉其子查蘭承襲騎都尉卒其子尚又都爾瑚之曾孫羅多理現任頭等䕶衞馬喇原任員外郎白碩色原任筆帖式孔鄂圖原任防禦石漢現任筆帖式祝蘭泰原任主事元孫常明原任副都統喀郎阿現任員外郎長柱現任鳴贊尚海現任頭等䕶衞羅普岱原任驍騎校綽普岱原任筆帖式四世孫額爾登布現任千總卓蘇國正紅旗人葉克書同族世居長白山地方舟山初來歸其曾孫專塔由䕶軍校從征浙江有功授雲騎尉卒其孫薩爾泰現襲職專塔之子星山原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗徳布通格葉克書同族其孫圖爾瑚訥鄂立布富哈喜俱原任䕶軍校查禄原任國子監祭酒曾孫查星阿溫達俱原任郎中章古理原任内閣侍讀查薩里現任員外郎那穆布原任步軍校積蘭泰原任佐領吳達理原任防禦二格現任前鋒校圖薩圖原任筆帖式阿林碩羅諾俱原任驍騎校阿蘇原任䕶軍校元孫官保現任䕶軍校吳爾卿格現任驍騎校都爾蘇訥原任驍騎校四世孫雅爾泰原任䕶軍校琥寧阿葉克書同族其元孫愛楚原任二等䕶衛五世孫扎爾岱原任步軍校六世孫吳靈阿現任協領諾木齊原任信礟章京費森布現任驍騎校七世孫桑格現任驍騎校博爾鍾鄂葉克書同族其元孫官保原任步軍校尼穆球葉克書同族其孫鄂落諾曽孫鄂和諾伊密雅哈元孫伊圖俱原任驍騎校以上俱世居長白山地方係國初來歸之人各地方輝和氏琥球國鑲紅旗人世居尼馬察地方編佐領使統之卒初率三百户來歸授騎都尉其兄之子古濟訥襲職後征葉赫陣亡其弟伊勒穆襲職征錦州以不違指授授三等輕車都恩詔加尉卒子根特襲職卒其弟浩善襲職遇兩遇至二等輕車都尉卒其弟禪齊布襲職恩詔加至一等輕車都尉兼一雲騎尉縁事削去雲騎尉子赫圖襲一等輕車都尉因病告休子扎親恩詔所襲職時削去三等輕車都尉現任佐領又琥球加之職承襲之孫向武原任佐領曾孫希察亦原任佐領法林原任頭等䕶衛法明原任二等䕶衞元孫三格現任䕶軍校吳琦徳國鑲紅旗人琥球同族世居尼馬察地方布原任初來歸曾孫索博理原任前鋒校魏圖步軍校麻塞現任六品官密哈那由五品官從征陜西四川等處屢著軍功又在羅門鎮擊賊贈雲騎將王屏藩兵陣亡塞倫泰相繼承襲元孫長徳尉孫法福塔曾孫現任二等䕶衞和成格原任步軍校艾雅爾圖原任驍騎校四世孫和亷現任筆帖式色爾機勒國正紅旗人世居尼馬察地方和托原任䕶軍叅初來歸原任親軍校其子覺領額爾奇徳原任親軍校孫海玉原任典儀吳達理原任盛京工部侍郎曾孫明福現任中書永福現任主事以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗鄂多烏喇地方人其五世孫忠吉納原任䕶軍校納爾泰原任驍騎校六世孫克畢素原任三等侍衞博爾和原任五品官七世孫黑色原任驍騎校阿里庫現任前鋒校拉錫原任筆帖式羅米原係副驍騎校八世孫永陞現任䕶軍校何彬現係舉人何紳現係生員正紅旗方喀拉尼馬察地方人其子噶什泰原任步軍校方喀拉之姪䝉固原任佐領那秦原任防禦孫那爾賽亦原任防禦曾孫赫敦原任四品典儀多令阿羅密俱原任䕶軍校元孫成禄現任䕶軍校通昌現任三等䕶衞雅當阿原任驍騎校圖喇虎爾哈烏喇地方人其子博立善原任中書拉方阿尼馬察地方人其元孫墨爾訥原任驍騎校四世孫納爾泰現係看守倉庫官鑲白旗僧蘇克烏喇布倫村地方人其元孫英格原任䕶軍校來住原任步軍校順格原任防禦四世孫富哈連原任驍騎校五世孫烏達哈原任筆帖式圖達哈原任䕶軍校六世孫楚庫里亦原任䕶軍校七世孫安布禄現任筆帖式鑲紅旗希爾哈納琥球同族尼馬察地方人其元孫阿蘭泰原任筆帖式二柱原任驍騎校又希爾哈納之姪孫朱蘭圖原任長史曾孫富魯喀原任二等䕶衛巴搆原任筆帖式阿努喀尼馬察地方人其四世孫松吉原任步軍校五世孫綽鼐原任城門尉安圖現任䕶軍叅領吳達禪西拉海俱原任驍騎校赫爾訥原任步軍校六世孫靠山現任驍騎校倚山原任頭等䕶衛以上俱係國初來歸之人正紅旗色蘭泰輝發地方人其子黑達色原任六品官正藍旗包衣尼馬察輝發地方人其子塞黒里原任六品官曾孫赫達色現任六品包衣大以上俱係來歸年分無考之人魯布理氏魯布理為滿洲一姓其氏族散處於葉赫等地方蓀達理鑲白旗人世居葉赫地方來歸年分無考由閒散初次過北京征山東梯攻濟南府首先登城賜巴圖克之授為一等輕車都尉三遇魯號恩詔加為二等男任䕶軍統領卒其子杭綬承襲卒其子胡保襲職時削去恩詔所加之職承襲一等輕車都尉卒其親伯之子阿林現承襲又蓀達理之子蘇爾泰蘇拜俱原任佐領孫保柱現任佐領由正黄旗改隸安庫勒􅀦鑲紅旗人世居烏喇地方任佐領曾孫九多由初來歸其孫糾穆布禄原䕶軍叅領於定鼎燕京時入山海闗擊流賊馬步兵二十萬衆復追至慶都縣大敗之從征四恩詔加川時於雞頭闗擊敗賊兵以功授為雲騎尉遇為騎都尉卒其子鄂多和承襲後從征貴州由水路囘兵時至鎮江瓜州地方屢敗海寇鄭成功兵加為三等輕車都尉卒無嗣其親兄之孫吳玉爾圖承襲縁事革退其親弟碩爾岱承襲卒其姪華善襲職時削去恩詔所加之職承襲騎都尉現任佐領又安庫勒曾孫噶拜原任䕶軍叅領阿爾泰原任遊擊穆成額原任頭等䕶衞元孫愛塔什原任䕶軍叅領兼佐領穆爾察原任員外郎廖多和額舍岱格俱原任頭等䕶衞四世孫來住原任䕶軍叅領色塞原任頭等䕶衞内格原任二等䕶衞威赫禄綬俱原任三等䕶衞胡達色雅住俱原任䕶軍校碩多和原任筆帖式五世孫黒達色原任三等䕶衞倭仲原任典儀禄福原任䕶軍校六世孫雅賴原任典儀邁圖布延圖俱原任驍騎校托雲泰現任䕶軍校今阿爾泰噶拜後裔現隸鑲藍旗包衣湯古理國正白旗人世居烏喇地方征雲南於石門坎黄初來歸其元孫博濟理從草壩等處擊賊有功授雲騎尉卒其子布達禪襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗阿畢圖綏分地方人其孫杭愛原任䕶軍校鑲藍旗包衣瑪濟理長白山瓦色路給地方人原任䕶軍校以上俱係天聰時來歸之人尼馬察氏尼馬察本係地名因以為姓其氏族散處於尼馬察等地方艾搏巴圖魯國鑲紅旗人世居尼馬察地方初來歸由閒散從太祖髙皇帝田獵遇野彘突出艾搏隻身奮往執斧格殺之太祖嘉悦賜巴圖魯號後率二十人奪取石山站城授騎都尉從征朝鮮攻義州同四十人殺入授為恩詔加三等輕車都尉卒其子艾逹翰襲職三遇賴襲至一等輕車都尉兼一雲騎尉卒其子阿職從征江西於吉安府屢敗賊兵續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊將胡國秉等兵於雲南城下叙功授為三等男卒其子岱錫布珠蘭泰先後承襲珠蘭泰卒無嗣其親叔薩克察襲職卒其子赫綬襲職時削去恩詔所加之職承襲二等輕車都尉卒其子齊克慎襲職時削去詔後軍功所得之職現襲三等輕車都尉又艾搏巴圖魯之孫賽都原任驍騎校濟穆庫國鑲紅旗人世居滹野地方喀有功授騎都尉後初來歸由閒散從征瓦爾恩詔加攻錦州城被創身亡其子瑪爾圖襲職三遇達至二等輕車都尉任佐領卒其子莽吉蘇富理莽褚先後承襲莽褚因年老告退其子馬蘭泰襲職時削去恩詔所加之職承襲騎都尉任佐領卒其子滿都理襲職縁事革退其叔祖之子明徳現襲職又濟穆庫之孫雅柱原任主事元孫瑪光現任佐領以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗哲禄墨爾根拉發地方人其曾孫賽本哈現任二等侍衛薩爾圖原係副䕶軍校元孫馬蘭泰原任二等侍衞正黄旗額爾濟訥黑龍江地方人其曾孫渾齊原任叅領常海原任六品官楊果現任䕶軍校元孫章保現任迎送官又額爾濟訥親弟誇爾堅之子塔爾福原任城門尉孫索濟原任驍騎校色勒原任步軍校曽孫長僧保亦原任歩軍校鐸錫藍吉林烏喇地方人其子哈理原任防禦孫布薩納原任佐領瑚里巴原任驍騎校牛鈕原任步軍校七十保原任筆帖式曾孫倭哲原任防禦元孫倭什爾圖現任三等侍衞鑲白旗達穆扎納訥殷地方人其四世孫希禄原任御史五世孫希爾崇阿現任天文生都達理現任筆帖式希桑阿現任守備由鑲黄旗改隸按逹穆扎納與本旗包衣同里羅鐸同族瓦濟納訥殷地方人其孫瑪海原任員外郎旒格訥殷地方人其曾孫碩色原任佐領色塞理原任步軍校雅圖原係副䕶軍校由鑲黄旗改隸尼克圖訥殷地方人其子伊哈納原任驍騎校曾孫伊凌阿現係貢生巴爾竒蘭管地方人其曽孫穆爾固原任䕶軍校扎凌阿吉林烏喇地方人其曾孫五十現係副驍騎校由正黄旗改隸鑲紅旗揚穆尼馬察地方人其曾孫王保住原任步軍校安錫鳳凰城地方人其四世孫外達理原任筆帖式五世孫萬珠瑚原任中書通寶原任筆帖式博濟四格俱原任驍騎校六世孫吳爾登格現任筆帖式以上俱係國初來歸之人鑲黄旗巴爾都善長白山地方人其曽孫武達禪現任御前頭等侍衞布爾哈現任三等侍衞正紅旗圖必善烏蘇里地方人其子啟都里原任驍騎校以上俱係天聰時來歸之人正黄旗包衣武達哈綏分庫雅拉地方人其子滿珠納原任佐領孫阿思哈現任七品官曽孫托密納原任佐領元孫福爾渾現任佐領鑲白旗包衣羅鐸訥殷地方人其曾孫瑚鈕原任六品官哈哈納現任三等䕶衞元孫鄂爾濟原任六品官常明現任二等䕶衞按羅鐸與本旗同里達穆扎納同族正藍旗達穆松阿尼馬察地方人其曽孫徳升額現任驍騎校元孫隆保原任前鋒叅領以上俱係來歸年分無考之人伊爾庫勒氏伊爾庫勒為滿洲一姓其氏族散處於諾羅等地方郎福國鑲白旗人世居諾羅地方事有能不違指使授初來歸其子鄂密納因任騎都尉從征阿庫里尼滿地方屢立戰功又過北京征山東攻順義縣克之授為三等輕車都尉卒其子濟穆達襲職任佐領卒其親叔碧赫徳襲職三遇恩詔加至一等輕車都尉兼一雲騎尉卒其子阿蘭泰襲職卒其親伯之子武靈額襲職卒其子花色襲職從征厄魯特噶爾丹於昭莫多地方敗賊有功授為三等男年老告休其子佟喬襲職時恩詔所削去職承襲二等輕車都尉卒其弟滿昌現襲加之職科奇納􅀦鑲白旗人世居諾羅地方山東梯攻文安縣第初來歸由閒散過北京征恩詔加二登城克之授雲騎尉三遇其次子構色襲職至三等輕車都尉因病告退從征察哈爾布爾尼於大鹵地方屢敗賊兵叙功授為二等輕車都尉任叅領卒其子柴色襲職現任協領又科竒納之長子拜山由七品官從征陜西於平凉府擊賊陣亡贈雲騎尉無嗣其雲騎尉亦令柴色承襲併為一等輕車都尉賀托國鑲白旗人世居諾羅地方山東梯攻汶上縣首初來歸由閒散過北京征賜巴圖先登城克之尉三遇魯號授騎都恩詔加至二等輕車都尉卒其長子西特庫襲職年老告退其子岳色襲職卒其子逹色襲職時削去恩詔所加之職承襲騎都尉縁事革退其親叔赫雅圖現襲職又賀托之次子羅多理原任郎中第三子噶布拉原任筆帖式孫桑格亦原任筆帖式禄什原任八品官曾孫成文現係舉人穆禄暢春俱係監生崇什喀國鑲白旗人世居諾羅地方擊賊損目又從征荆初來歸由佐領從征寧逺州力戰傷足叙功授為三等輕車都尉縁事降為騎都尉三遇恩詔加至二等輕車都尉卒其子羅密襲職縁事革退其親弟恩格爾徳襲職卒其子石柱襲職時削恩詔所去之職承襲騎都尉卒其子白碩色現襲職又加崇什喀之孫珠保原任驍騎校赫穆訥國鑲白旗人世居虎爾哈地方征雲南梯攻沅江初來歸其子克善由閒散從賜巴圖府首先登城克之都尉卒其子巴爾納孫定善魯號授三等輕車相繼承襲定善縁事革退其親叔祖海色襲職卒其親兄之孫拴柱襲職卒其弟巴柱現襲職又赫穆訥之孫孟柱原任叅領元孫巴泰原任五品官登順􅀦鑲白旗人世居諾羅地方防禦平定陜西時擊初來歸其曽孫阿蘭珠由敗偽遊擊黄文英兵又於平凉府破偽憩兵王輔臣之子王繼正兵二萬餘衆後從征厄魯特贈騎都噶爾丹於昭莫多地方屢立戰功卒後優職尉以其子阿里渾承襲卒其子佛保現襲蓀察國鑲白旗人世居諾羅地方任歩軍校元孫穆成初來歸其曾孫瑚什納原額原任驍騎校赫格由䕶軍叅領從征厄魯特噶爾丹於昭莫多地方敗賊有功校雲騎尉卒其子根都襲職原任三等䕶衛溫多順國正白旗人世居迺明村地方南至緬國入阿窪初來歸由前鋒侍衞從征雲城獲偽桂王又平定陜西時於平凉府擊敗偽總兵王輔臣之子王繼正兵二萬餘衆叙功授雲騎尉卒其子索住襲職孫瑚什巴原係副驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗羅克端虎爾哈地方人其孫費雅住原係三等輕車都尉縁事革職未襲曾孫訥密徳原任驍騎校碩格原任内閣侍讀元孫四雅圖現係倉庫官碩色原任佐領拉哈達原任筆帖式又羅克端長兄扎爾巴理之曾孫色孟格原任驍騎校元孫僧格原係雲騎尉四世孫僧格特原係雲騎尉次兄芬塔之曾孫納爾泰現任䕶軍校元孫雙鼎現任驍騎校又羅克端親叔卓卓理之四世孫哲赫理現任八品官鑲白旗薩穆典諾羅地方人原係三等輕車都尉縁事革職未襲其元孫推爾泰原任六品官勒柳諾羅地方人其孫四格原任驍騎校正藍旗布爾塔哈寧古塔地方人其孫瓦色原任筆帖式墨爾徳原任防禦曾孫旒智現任郎中以上俱係國初來歸之人正黄旗阿爾謙吉林烏喇地方人其子喀法塔現任驍騎校孫扎爾賽現任藍翎侍衞右係來歸年分無考之人八旗滿洲氏族通譜卷三十九
