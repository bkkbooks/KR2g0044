body:
  text: 八旗滿洲氏族通譜目録卷十葉赫地方赫舍里氏蓋喀穆瑚禄喀塔哈舒賽赫勒武爾佳齊巴達爾堪音達渾泰布以上俱有𫝊阿普代奮泰布占那爾圖那秦那親齊分阿克占米哈納佟肯武錫勒得根特葉赫穆滿丕三陽希佛訥阿舜布禄滿達爾漢都達哈達蘭納親吳爾山以上俱附載輝發地方赫舍里氏伯格桑務理以上俱有𫝊外蘭阿普達理達隆阿布占達福圖巴海臯官阿克敦胡什穆碩濟蓀達理科普多吳爾坤虎實穆伊拉親固賽以上俱附載各地方赫舍里氏成固爾德文柱薩弼圖烏雅納胡魯穆圖爾哈遂班額森以上俱有𫝊多博海烏敏特楚庫何紹特爾瑟諾察布喀西喀瑪福納何正石漢翁鄂綽和善色徳理那穆占三達理雅爾那傅松阿舒倫阿寧阿碩佛絡殷春達爾就拖和倫成尼理夏漢布禄賽漢薩克薩哈張古理納顔泰珠瑪那何書勒富色克魁徳拉栁金都禪吳科達巴多碩納巴爾布哈揚錫岱音布額爾何圖唐吉佛爾赫佛科哈爾泰鄂倫赫隆訥爾紏雷瑚吳合齊德爾瑚理瑚穆圖和博勒庫方開額爾塞博爾卓海瑪濟根多林西大達英額勒鄂齊吳棣法穆和碩圖雅普圖費色岱喜章格金岱福勒渾吳爾圖鄂克托額赫訥古理以上俱附載
  hash: sha256:fd2be56538c7246b38b776663e9ebd4a68dcd2ab2ff9a548dc9f76a1e68edc83
