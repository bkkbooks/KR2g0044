body:
  text: 八旗滿洲氏族通譜目錄卷五十一鈕顔氏福喀圖右係有傳凖泰賽璧漢岱音布祿滿都布以上俱附載烏爾古宸氏和托諾格鈕以上俱有傳吳爾布理右係附載扎拉理氏阿努武登額索穆諾和泰璧善富克察僧珠滿都琥以上俱有傳赫勒瑚什圖旒珠瑚巴岱達爾蘇喀貝楞額吳珠阿穆巴庫通額彰鳯儀以上俱附載訥殷江地方温都氏郎格鄂靈阿薩爾泰濟普都理以上俱有傳訥音圖博洛渾彌山羗什庫芬達理庫爾禪以上俱附載各地方温都氏兆朗右係有傳薩穆哈班積理巴圖理福靈阿武靈阿多托羅伊克綬訥勒布阿穆鈕堆秦托活瑪温布祿葛布庫布書庫僧格岱順阿羅托瑚錫達沙岱碧山以上俱附載蒙古爾濟氏碩色右係有傳伊錫布右係附載阿禮哈氏雅穆錫和錫以上俱有傳薩宻達鶴席轄拉鄂穆多羅章吉納布爾薩以上俱附載蘇都理氏福章吉右係有傳魯蘇圖國賚畢爾勒圖卓爾齊凱圖瓦拉以上俱附載奇塔喇氏阿爾遜嘉克塔納以上俱有傳威赫臣古滿佛爾古善藹圖漢薩爾齊柏爾克以上俱附載鄂托氏賽音達理薩弼以上俱有傳薩哈連薩爾巴哈魏博禄以上俱附載洪吉理氏布爾開右係有傳班布理佛多卓羅穆堅楚阿里堪畢圖肯費色蘇合臣以上俱附載
  hash: sha256:e70bebb98af809e37ed7fff20bfbe8a67920b98322e27f09143829a1fb529b0b
