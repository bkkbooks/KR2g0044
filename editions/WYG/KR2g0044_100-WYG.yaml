body:
  text: 八旗滿洲氏族通譜目錄卷五十阿穆魯氏阿蘓盧塔克以上俱有傳索爾多氏博托波右係有傳瓦古右係附載俞爾庫勒氏綽琴和謨諾以上俱有傳阿克齊魯右係附載滿扎氏素班右係有傳薩哈泰松靄圖理艾察庫察以上俱附載烏色氏克拉吴瑪喀以上俱有傳吴色巴林三泰購色吴泰以上俱附載佑祜魯氏覺和託達敏以上俱有傳羅丹尼唐阿錫巴喀吳法哈唐阿鈕克都倫喀喀托密納莽吉納哲貝以上俱附載圖色理氏滿諾克特勒以上俱有傳圖薩理阿爾善綽爾昆納謨博道穆組扎穆太懋錫圖克翁喀逹察爾久勒騰額扎普諾以上俱附載温特赫氏噶胡達達爾漢恩圖以上俱有傳倭和騰禪扎堪以上俱附載梅勒氏錫本額碩泰以上俱有傳吳錫布宏科僧徳以上俱附載博和理氏額徵庫右係有傳瓦爾喀薩滿岱雅哈以上俱附載
  hash: sha256:53cef54d9b13282b887895ff7599ec1efa3729410e857a40e3c41d4f29c04942
