body:
  text: 八旗滿洲氏族通譜卷七十一附載滿洲旗分内之蒙古姓氏蘇尼特氏蘇尼特係隸滿洲旗分之蒙古一姓此一姓世居巴顔鄂隆地方薩喇正藍旗人吉國初来歸其孫都爾原任郎中札頼氏札頼係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方陽高正藍旗人原國初来歸其孫常綬原任歩軍校二格任驍騎校曾孫鄂蘭圖現任前鋒叅領鄂特渾現任六品包衣大綽克圖原係副䕶軍校翁舍占氏翁舍占係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方濟瑚博頼正藍旗人額國初来歸其元孫德格原任協領琳親原任前鋒侍衛華善原任䕶軍校阿敦原任中書四世孫官保原任五品典儀阿麟原任筆帖式烏朗哈特氏烏朗哈特係隸滿洲旗分之蒙古一姓此一姓世居巴顔鄂隆地方濟格尼正藍旗人孫國初来歸其子索寧原任䕶軍叅領托果原任王府總領曾孫阿玉錫原任二等䕶衛錫德原任三等䕶衛阿齊圖原任驍騎校霍托克齊原任佐領詹岱原任䕶軍校元孫三碩色原任頭等䕶衛顔泰原任䕶軍校庫蘇𩔖原任協領浩善現任驍騎校碩色原任六品典儀華色原任防禦四世孫衛志奉原任驍騎校剛噶爾原任歩軍副尉實圖原任副叅領専圖現任前鋒校茂勤現任䕶軍校赫進泰原任前鋒校五世孫太平現任驍騎校卓多穆氏卓多穆係隸滿洲旗分之蒙古一姓此一姓世居兀魯特地方瑚雅克泰正藍旗人校國初来歸其元孫格紳原任䕶軍札爾瑚現任防禦四格原任頭等䕶衛四世孫逹蘭泰原任䕶軍校六逹色現任防禦海岱現任驍騎校陽吉氏陽吉係隸滿洲旗分之蒙古一姓此一姓世居喀拉沁地方塞勒穆札普正藍旗人品國初来歸其子陽武理原任六包衣大孫曹爾原任頭等䕶衛曾孫和尚原任三等䕶衛珠爾吉特鄂謨克氏珠爾吉特鄂謨克係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方綽爾捫正藍旗人圖國初来歸其子恩克原任歩軍校商原任員外郎孫章保原任前鋒校功格喇普氏功格喇普係隸滿洲旗分之蒙古一姓此一姓世居西克騰地方鄂屯正藍旗人品國初来歸其曾孫白岱現食半俸佐領級章京黒色現任歩軍校布詹現係副驍騎校元孫阿穆古朗現任驍騎校濟爾噶朗蘇朗阿俱原任二等䕶衛濟喇敏鄂瑪特氏濟喇敏鄂瑪特係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方鄂岱正藍旗人原國初来歸其孫巴拜任防禦鄂拉本氏鄂拉本係隸滿洲旗分之蒙古一姓此一姓世居巴顔鄂隆地方莽瑚理正藍旗人驍國初来歸其曾孫雅住寳生俱原任騎校茂格原任防禦四世孫濟蘭泰現任䕶軍校八十一現任驍騎校庫布克氏庫布克係隸滿洲旗分之蒙古一姓此一姓世居兀魯特地方巴逹瑪正藍旗人色國初来歸其孫巴圖原任驍騎校貴現任五品官曾孫常綬原任䕶軍校色徹氏色徹係隸滿洲旗分之蒙古一姓此一姓世居科爾沁地方卓秦正藍旗人原國初来歸其子和尚任驍騎校克穆楚特氏克穆楚特係隸滿洲旗分之蒙古一姓此一姓世居兀魯特地方噶爾圖正藍旗人温國初来歸其曾孫佛保現任親軍校都爾瑚現係副䕶軍校瑪札克氏瑪札克係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方阿理衮正藍旗人係國初來歸其曾孫敦住原前鋒藍翎頭目鄂喇坤氏鄂喇坤係隸滿洲旗分之蒙古一姓此一姓世居巴顔鄂隆地方額博爾特正藍旗人現國初来歸其元孫常保係副驍騎校瑚爾渾氏瑚爾渾係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方瑚兆正藍旗人現國初来歸其曾孫和尚係副䕶軍校鄂謨克氏鄂謨克係隸滿洲旗分之蒙古一姓此一姓世居巴顔和羅地方們都正藍旗人天聰時来歸其子薩津原任親軍校孫色壘原任包衣佐領潮穆特氏潮穆特係隸滿洲旗分之蒙古一姓此一姓世居布爾噶蘇臺地方巴雅爾岱正藍旗人天聰時来歸其子吳什哈原任驍騎校孫噶海吳巴理俱原任典儀揚阿布原任驍騎校曾孫揚色現係副䕶軍校金泰原任䕶軍校元孫塞赫布現係副驍騎校納伊氏納伊係隸滿洲旗分之蒙古一姓此一姓世居瑚倫博宜爾地方哲金正藍旗人天聰時来歸原任䕶軍校其子搆色原任驍騎校墨爾啟氏墨爾啟係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方珠懇正藍旗包衣人天聰時来歸原任䕶軍校其子逹喜原任三等䕶衛曾孫蘇赫原任頭等䕶衛兼包衣叅領博爾齊特氏博爾齊特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方啟他特正藍旗人来歸年分無考原任驍騎校其子班第原任頭等䕶衛濟魯特氏濟魯特係隸滿洲旗分之蒙古一姓此一姓世居科爾沁地方伊貝正藍旗人来歸年分無考原任䕶軍校其子精尼喀原任佐領白珠瑚原任城門尉孫色爾登原任歩軍校吳佳氏吳佳係隸滿洲旗分之䝉古一姓此一姓世居察哈爾地方恩格圖正藍旗人来歸年分無考其子蘇珠克圖原任䕶軍校兀札喇氏兀札喇係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方巴爾圖正藍旗人来歸年分無考其孫巴爾瑚岱原任䕶軍校江吉氏江吉係隸滿洲旗分之䝉古一姓此一姓世居布爾哈圖城地方薩喇正藍旗人来歸年分無考其曾孫瑪瑚現任六品官鴻果絡氏鴻果絡係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方古魯正藍旗包衣人来歸年分無考原任䕶軍校其子丹巴白斯瑚朗俱原任頭等䕶衛瑪賚原任包衣大孫永住原任典儀根柱原任二等䕶衛德琳原任筆帖式曾孫法保原任䕶軍校瑚魯克氏瑚魯克係隸滿洲旗分之蒙古一姓此一姓世居巴林地方碩色正藍旗包衣人来歸年分無考原任包衣佐領其子逹啟斗亦原任包衣佐領元孫謨絡原任典儀汪札爾氏汪札爾係隸滿洲旗分之䝉古一姓此一姓世居察哈爾地方訥爾泰正藍旗包衣人来歸年分無考其子善都原任二等䕶衛白逹爾氏白逹爾係隸滿洲旗分之䝉古一姓此一姓世居蘇尼斗地方白博什正藍旗包衣人来歸年分無考原任三等䕶衛其子白浩善原任包衣大瑚爾庫爾氏瑚爾庫爾係隸滿洲旗分之蒙古一姓此一姓世居科爾沁地方巴珠鑲藍旗人子國初来歸原任員外郎其官保原係舉人齊普楚特氏齊普楚特係隸滿洲旗分之䝉古一姓此一姓世居克西克騰地方鐸鼐鑲藍旗人實國初来歸其子察津原任驍騎校孫格現任佐領伊蘭泰現任翼長曾孫外庫現任䕶軍校元孫濟明阿現任驍騎校博和羅克氏博和羅克係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方阿那庫鑲藍旗人原國初来歸其子蘇鼐任䕶軍校沙查海氏沙查海係隸滿洲旗分之䝉古一姓此一姓世居克爾倫地方果爾岱鑲藍旗人原國初来歸其子哈巴任䕶軍校赫勒氏赫勒係隸滿洲旗分之䝉古一姓此一姓世居巴林地方哈施鑲藍旗包衣人爾國初来歸其孫科普齊理原任典儀科親原任䕶軍校六格原任佐領曾孫諾爾親現任䕶軍校謨錫勒氏謨錫勒係隸滿洲旗分之䝉古一姓此一姓世居克西克騰地方謨檀鑲藍旗包衣人倫國初来歸原任八品官其子鄂泰原任䕶軍校額爾輝額哲特氏額爾輝額哲特係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方顧魯古英鑲藍旗人天聰時来歸其孫沙濟原任防禦曾孫巴朗原任歩軍校四世孫圖桑阿現任䕶軍校精吉集氏精吉集係隸滿洲旗分之䝉古一姓此一姓世居克西克騰地方岱寧鑲藍旗人天聰時來歸其曾孫巴札爾現任防禦托羅特氏托羅特係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方積蘭泰鑲藍旗人天聰時来歸其子衮布原任三等侍衛式勒氏式勒係隸滿洲旗分之蒙古一姓此一姓世居烏野爾拜柴地方札式鑲藍旗人天聰時来歸其孫察哈岱原任防禦曾孫福格原任筆帖式得格現任三等侍衛龔吉特氏龔吉特係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方索嫩鑲藍旗人天聰時来歸其子色克凖原任驍騎校舒穆爾氏舒穆爾係隸滿洲旗分之䝉古一姓此一姓世居克西克騰地方諾宻鑲藍旗人天聰時来歸其孫白雅斯瑚朗現任䕶軍校兆絡特氏兆絡特係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方内赫圖鑲藍旗人天聰時来歸其子阿玉錫原任䕶軍校尹齋氏尹齋係𨽻滿洲旗分之蒙古一姓此一姓世居克西克騰地方恩克鑲藍旗人天聰時来歸其孫烏什哈現係副䕶軍校岳羅親氏岳羅親係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方堯珠岱鑲藍旗包衣人天聰時来歸原任佐領博羅特氏博羅特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方克什圖鑲藍旗包衣人天聰時来歸原任三等䕶衞其孫頗廉原任八品官孫尼耀特氏孫尼耀特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方佛塞鑲藍旗包衣人天聰時来歸其子竒曇原任三等䕶衛曹丹氏曹丹係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方耀塞鑲藍旗包衣人天聰時来歸其孫柏齡珠現任驍騎校徹穆衮氏徹穆衮係隸滿洲旗分之蒙古一姓此一姓世居喀拉沁地方陳德永鑲藍旗包衣人天聰時来歸其孫瑚克新現任䕶軍校崔珠克氏崔珠克係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方阿拜鑲藍旗包衣人天聰時来歸其曾孫逹頼原任中書索住原任千總德楞額現任千總元孫七十二現任䕶軍校李塔理氏李塔理係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方鄂善鑲藍旗包衣人天聰時来歸其子孟克原任䕶軍校侯佳氏侯佳係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方克什貝鑲藍旗包衣人天聰時来歸原任䕶軍校由鑲黄旗改隸索羅噶爾氏索羅噶爾係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方索鼎鑲藍旗包衣人天聰時来歸原任䕶軍校葉古禄特氏葉古禄特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方葉三鑲藍旗包衣人天聰時来歸其孫宣福原任䕶軍校鄭訥魯特氏鄭訥魯特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方鄭常貴鑲藍旗包衣人天聰時来歸其孫舒敏泰原任䕶軍校土黙特氏土黙特係隸滿洲旗分之蒙古一姓此一姓世居中衛地方博絡鑲藍旗包衣人天聰時来歸原任䕶軍校白禪氏白禪係隸滿洲旗分之䝉古一姓此一姓世居察哈爾地方唐古錫鑲藍旗包衣人天聰時来歸原任䕶軍校旺舒特氏旺舒特係隸滿洲旗分之蒙古一姓此一姓世居中衛地方吉克圖鑲藍旗包衣人天聰時来歸原任䕶軍校王古爾親氏王古爾親係隸滿洲旗分之蒙古一姓此一姓世居中衛地方蘇蒙額鑲藍旗包衣人天聰時来歸其曾孫九逹色原任䕶軍校元孫王彬現係生員兆逹爾幹氏兆逹爾幹係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方謨爾渾鑲藍旗包衣人天聰時来歸其孫德成額原任䕶軍校揚藹氏揚藹係隸滿洲旗分之蒙古一姓此一姓世居喀拉沁地方哈爾秦鑲藍旗包衣人天聰時来歸其子楊保住原任六品包衣大歩古魯特氏步古魯特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方哈爾瑚鑲藍旗包衣人天聰時来歸其子布爾泰原任七品官孫津氏孫津係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方圖禄蓀鑲藍旗包衣人天聰時来歸原任八品官克穆楚氏克穆楚係隸滿洲旗分之蒙古一姓此一姓世居庫坤果爾地方武什鑲藍旗人来歸年分無考原係札爾固齊其子博倫原任佐領孫巴魯原任驍騎校布爾圖氏布爾圖係隸滿洲旗分之蒙古一姓此一姓世居克西克騰地方寨僧鑲藍旗人来歸年分無考其子卓理克原任防禦錫喇圖氏錫喇圖