body:
  text: 八旗滿洲氏族通譜卷九赫舍里氏赫舍里原係河名因以為姓其氏族散處於都英額和多穆哈連齋谷哈達葉赫輝發及各地方都英額地方赫舍里氏先是穆瑚禄都督世居都英額地方後遷居白河又遷哈達國穆瑚禄都督生子八人長曰瑚新布禄次曰丹楚三曰達柱四曰岱音布禄五曰阿音布禄六曰拖靈阿七曰特赫訥八曰噶爾柱費揚古特赫訥之第三子瑚什穆巴顔生二子曰碩色巴克什希福巴克什兄弟二人各率所屬來歸為滿洲著姓碩色巴克什正黄旗人穆瑚禄都督第七子特赫訥之孫也世居都英額地方太祖國初偕其弟希福巴克什來歸古文字髙皇帝以碩色兼通滿漢及蒙賜名巴克什走其子索尼亦兼通滿漢䝉古文字命在文館行命在文館辦事亦等侍衛授吏部啟心郎三年考績所賜名巴克什由頭任稱職授騎都尉隨大兵征討所向有功哈達國兵來犯界凡城先衆克敵從征董䕫俘獲甚衆征錦州以二十餘人破明兵千餘征北京擊敗明兵於城下隨大兵征明至榛子鎮暨沙河太宗文驛俱招降之攻永平府克其城後犯步戰敗之皇帝親征大凌河錦州城中兵來從征察哈爾於大同地方率家丁敗賊獨取阜臺寨敘功優授三等男定鼎燕京考核羣臣功世祖章績授為二等子縁事削職後皇帝知其寃抑特㫖復授二等子兩遇内大臣兼内務府總管後受恩詔加至一等伯歴任世祖章皇帝顧命為輔政大臣伯令其第五子心裕承特加恩寵授一等公將伊一等賜祭葬襲歴任領侍衛内大臣索尼卒六子法保承襲如典禮諡文忠勒石紀焉其第一等公縁事罷退未襲心裕卒將一等伯復令法保承襲卒法保之長子法爾薩承襲又索尼聖祖仁之長子噶布喇初任領侍衛内大臣兼佐領皇帝以噶布喇係孝誠仁皇后之父等公加太子少保卒特賜殊恩封為一賜祭塟如典禮諡恪僖立碑墓道其長子常泰承襲一等公歴任領侍衛内大臣縁事罷退未襲後世宗憲皇帝特㫖復其一等公令常泰之姪綸布承襲縁事革退其叔達爾馬承襲卒其兄法爾薩承襲現任散秩大臣將法爾薩原襲一等伯令其弟靈德承襲現任散秩大臣兼佐領又碩色巴克什之孫噶爾柱原任二等侍衛索額圖原任領侍衛内大臣保和殿大學士兼戸部尚書加太子太傅縁事革退科爾坤原任頭等侍衛侍衛班領曽孫葛爾芬原任詹事府詹事長安原任郎中噶哈原任二等侍衛長海勝徳哈爾薩珠顯阿爾吉善明徳俱原任佐領色爾金原任三等侍衛馬哈達原任筆帖式托賢原係進士傚賢原係舉人元孫哲爾肯原任頭等侍衛察代原任叅領兼佐領法克進現任三等侍衛靈秀現任員外郎法隆武法進泰俱現係五品廕生克升額現任七品官靈柱原任筆帖式明倫候補筆帖式四世孫石靈現任治儀正希福巴克什太祖髙正黄旗人碩色巴克什之弟也奉使諸蒙古國皇帝以其兼通滿漢䝉古文字徳音審宣諭獄調集兵馬俱承理訟命弗辱自是專任文館未嘗一日安處授佐領世職大賜名巴克什綏撫招徠兵征董䕫時往來科爾沁國衝圍犯難著有勞績從征北京及取大凌河擊錦州等處俱奮勇先戰屢敗敵衆以功授三等輕車都尉嗣改文館為内三院設立大學士詔以希福巴克什為内𢎞文院大學士疏請纂修遼金元三史充大總裁旋奉命往察哈爾喀爾喀科爾沁諸國查戸口編佐領㑹外藩審罪犯頒法律禁盗賊辦理悉協崇德三年疏請更定官制分為五等順治元年縁事免官以世職行走遇恩詔加授一等輕車都尉復縁事革世職兼奪佐領八年世祖章皇帝悉其寃抑仍還佐領授一等輕車都尉補内𢎞文院大學士遇恩詔加為三等男又以希福巴克什久為太祖太宗任使銜命馳驅捐軀奔走盡心竭力嘉其功優授一等男又遇恩詔加一雲騎尉復念定鼎燕京時加陞衆官職銜獨希福巴克什未與至是特授為三等子議政大臣卒其長子竒他特孫費揚古賜諡文簡贈太保勒石紀焉曽孫來仙相繼承襲三等子來仙卒其弟雯蔚現襲職希福巴克什次子帥顔保聖祖仁皇帝特以希福巴克什歴任内院贊理機務効力最久勤勞素著將帥顔保為内院學士仕至漕運總督吳耿二逆之叛往江西提兵督餉有功在淮安開雲臺山田民賴其利立祠祀之後陞禮部尚書卒於官希福巴克什第三子威赫原任二等侍衛帥顔保子赫弈原任工部尚書内務府總管威赫子佛保原任郎中赫弈子圖南原任郎中慧中現任給事中嵩夀現任大理寺卿肇敏現任翰林院侍講希福巴克什之曽孫四格現係監生中海原任筆帖式玉海現任筆帖式元孫襲明候補主事端苓現係生員那秦原任䕶軍校四達色原任驍騎校福保現任驍騎校額爾徳尼巴克什國正黄旗人世居都英額地方初來歸原姓納喇氏後奉太宗文皇帝諭㫖入碩色巴克什族中聰敏兼通滿漢賜姓赫舍里氏額爾德尼巴克什生而太祖髙䝉古文字當文學侍從隨大兵所至漢人蒙古皇帝時即以詔㫖招地方俱能以其本地語言文字𫝊宣降納欵著有勞績授副將世職太祖欲易䝉古字製為國語令額爾徳尼巴克什與噶葢扎爾固齊酌定遂悉心編輯創立滿文徧行制詔章國中一切件不復用䝉古文字縁事革職後疏文移等世祖章皇帝追念舊勞又以其編立國書功大與大海巴克什一體賜諡文成其子薩哈連原任冠軍使孫薩哈達原任頭等侍衛侍衛班領曽孫伊靈阿原任通政使司知事滿丕原任筆帖式元孫興山現任䕶軍校以上俱係應立𫝊之人和多穆哈連地方赫舍里氏拜音達理扎爾固齊正紅旗人穆瑚禄都督第五子阿音布禄之元孫也世居和多穆哈連地方國初率百户來歸設佐領使統之其長子布顔歴任議政大臣䕶軍統領兼長史因所任稱職不恩詔加違指授授騎都尉遇布亨襲職兩遇一雲騎尉卒其子額恩詔加授二等輕車都尉卒其子額爾本承襲卒其子八十七承襲卒其子明福襲職時削去恩詔所加之職承襲騎都尉現任佐領又拜音達理扎爾固齊之孫索布岱原任佐領希佛訥原任頭等䕶衛曽孫希爾哈原任前鋒叅領元孫希常阿現任佐領四世孫永明現任筆帖式布爾薩海正紅旗人拜音達理扎爾固齊之次子也由䕶軍校定鼎燕京入山海闗擊敗流賊敘功授雲恩詔加騎尉三遇車都尉歴任兵部侍郎副都統卒其授三等輕恩詔所子留禮布襲職卒其孫林助御襲職時削去海加之職承襲雲騎尉歴任副都統又布爾薩之子額森泰原任員外郎兼佐領曽孫希徳慎原任盛京工部侍郎六十六原任防禦元孫吉安布現任御史白泰現任頭等䕶衛赫泰現任内閣侍讀永泰現任中書滿泰現任六品官寧泰現任中書竒臣現任驍騎校東金正紅旗人穆瑚禄都督之長子瑚新布禄之曽孫也世居和多穆哈連地方國初來歸仕至城守尉兼佐領其子塔拉克圖原任叅領兼佐領孫常明原任察哈爾地方總管曽孫法山現任佐領又東金之弟達都虎原任頭等䕶衛其子和鳴徳原任御史勞來原任博士孫兆賴原任䕶軍統領吉良現任員外郎吉祥原任筆帖式曽孫和圖原任三等䕶衛又東金之族弟海塞由三等侍衛從征福建海冦攻厦門殁於陣贈雲騎尉其次子圖爾法孫平泰相繼承襲長子和錫屯由䕶軍叅領從征厄魯特噶爾丹奮勇敗賊以功授雲騎尉年老乞休其子福明承襲又東金之族弟穆成格由驍騎校從征貴州屢敗賊衆師回值海冦鄭成功兵又擊敗之敘功授雲騎尉任佐領卒其子福勒赫襲職又東金之族弟羅多渾由閒散過北京征山東攻郯城縣先登克城授雲騎尉後入山海闗大敗賊衆又攻恩詔加太原府克其城授為騎都尉三遇揚達理孫蘇授二等輕車都尉任叅領卒其子保住曽孫增福相繼承襲增福卒其弟増綬承襲縁事革退其叔三保襲職時削去恩詔所加之職現襲騎都尉又東金之族叔吳達納原任員外郎其子巴蘭太原任䕶軍校伊蘭太原任五品官孫阿哈碩色原任刑部侍郎喀爾齊喀原任䕶軍叅領艾色原任司庫齊雅圖原任筆帖式曽孫常綬原任刑部侍郎福禄三格社里俱原任筆帖式元孫永奇原任郎中成名原任筆帖式四世孫赫倫現任二等䕶衛赫林現任筆帖式五世孫富泰現任筆帖式又東金之盛族弟碩禮原任防禦其子錫蘭太原任坦現任京禮部侍郎孫齊克慎原任主事齊克郎中和伸原任筆帖式索柱現任筆帖式曽孫額紳原任筆帖式肫奈現任筆帖式又東金之姪搭揚阿原任員外郎英額原任筆帖式姪孫察爾金原任員外郎特克慎原任筆帖式曽孫伊爾得原任司庫元孫額爾登布現任筆帖式吳巴海正紅旗人穆瑚禄都督第六子拖靈阿之孫也世居和多穆哈連地方國初同兄弟來歸原任佐領其子納木岱原任驍騎校賽畢圖原任防禦瑚理布由前鋒叅領征流賊生擒二十人斬首二百八級以功授雲騎尉三遇恩詔加授三等輕車都尉歴任前鋒統領兼佐領後為副將軍征四川殁於陣加太子少師其子剛元襲職現任前鋒叅領兼佐領又吳巴海之孫扎拉克圖原任歸化城都統常明原任郎中華連原任典儀薩爾圖胡原任筆帖式曽孫衆神保原任内閣侍讀學士永良現係廕生馬鼐新柱俱原任員外郎明保原任主事和成現任筆帖式元孫兆明原任員外郎定柱原任筆帖式又吳巴海之族孫屯搭錫原任䕶軍校元孫拉朱虎原任驍騎校金達禮原任䕶軍校四世孫馬爾胡太原任筆帖式錫來正紅旗人吳巴海之親姪也由驍騎校破流賊滅福王平定河南江南等處屢著戰功攻嘉興贈雲騎府城奮勇先登後取崑山縣城殁於陣尉其子色勒襲職三遇恩詔加授三等輕車都尉卒其子石圖承襲卒其子錫林泰襲職時削去恩詔所加之職現襲雲騎尉又錫來之姪吳禮由驍騎校從征湖廣雲南有功授雲騎尉後從征陣亡贈一雲騎尉合為騎都尉其子珠齊巴孫伊靈阿相繼承襲又錫來族姪謨克勤原任防禦蒙格理原係監生雅海原任驍騎校孫阿爾圖現任協領阿顔泰現任副䕶軍叅領噶爾圖現任佐領伊色原任步軍校曽孫保明原任前鋒侍衛素爾登現任䕶軍校布達理正紅旗人吳巴海之親姪也由䕶軍叅領過北京征山東破流賊滅福王平定河南江南等處恩詔授俱有戰功授雲騎尉遇率前鋒敗之後從征江為騎都尉又追滕吉思贈一雲西殁於陣又岱襲職兩遇騎尉其子屯恩詔加授二等輕車都尉卒其子巴錫孫四格相繼承襲四格卒其弟桑格襲職時削去恩詔所加之職現襲騎都尉又布達理之姪布舒庫原任佐領布賽原任筆帖式孫班都原任通政使司叅議巴克山現任佐領布尼原任筆帖式曽孫阿蘭太現任驍騎校又布達理之族姪巴塔克圖原任䕶軍校孫顔達賴原任六品官額盛額正紅旗人穆瑚禄都督第五子阿音布禄之子也世居和多穆哈連地方國初來歸其曽孫海都由驍騎校從征江西湖廣有功至建昌府擊賊殁於陣贈雲騎尉其子兆明承襲卒無嗣其親伯之孫桑格現襲職又額盛額之曽孫索爾和由䕶軍校從征贈雲騎雲南江西陣亡法克津孫法保相繼承襲又額尉無嗣令其姪盛額之曽孫尼雅哈原任主事拜都原任筆帖式元孫隨雅圖原任郎中賽都原任員外郎佛保原任筆帖式法爾薩原任給事中四世孫色爾滕原任佐領伊爾太原任步軍校額爾吉圖原任筆帖式五世孫福賚現任郎中福髙現任驍騎校巴賚鑲紅旗人穆瑚禄都督第八子噶爾住費揚古之子也世居和多穆哈連地方國初來歸其孫岱塔原任防禦曽孫尼喀禮原任親軍校費喀原任驍騎校倭赫由防禦從征雲南貴州等省有功授雲騎尉卒其子耀色保承襲又巴賚之元孫托海雅克什庫拉都俱原任員外郎滿連理原任步軍校鄂