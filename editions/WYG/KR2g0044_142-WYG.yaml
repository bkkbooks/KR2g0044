body:
  text: 八旗滿洲氏族通譜目録卷七十一附載滿洲旗分内之蒙古姓氏蘇尼特氏薩喇扎頼氏陽高翁舍占氏濟瑚博頼烏朗哈特氏濟格尼卓多穆氏瑚雅克泰陽吉氏塞勒穆扎普珠爾吉特鄂謨克氏綽爾捫功格喇普氏鄂屯濟喇敏鄂瑪特氏鄂岱鄂拉本氏莽瑚理庫布克氏巴逹瑪色徹氏卓秦克穆楚特氏噶爾圖瑪札克氏阿理衮鄂喇坤氏額博爾特瑚爾渾氏瑚兆鄂謨克氏們都潮穆特氏巴雅爾岱納伊氏哲金墨爾啟氏珠懇博爾齊特氏啟他特濟魯特氏伊貝吳佳氏恩格圖兀札喇氏巴爾圖江吉氏薩喇鴻果絡氏古魯瑚魯克氏碩色汪札爾氏訥爾泰白逹爾氏白博什瑚爾庫爾氏巴珠齊普楚特氏鐸鼐博和羅克氏阿那庫沙查海氏果爾岱赫勒氏哈施謨錫勒氏謨檀額爾輝額哲特氏顧魯古英精吉集氏岱寧托羅特氏積蘭泰式勒氏札式龔吉特氏索嫩舒穆爾氏諾宻兆絡特氏内赫圖尹齋氏恩克岳羅親氏堯珠岱博羅特氏克什圖孫尼耀特氏佛塞曹丹氏耀塞徹穆衮氏陳德永崔珠克氏阿拜李塔理氏鄂善侯佳氏克什貝索羅噶爾氏索鼎葉古禄特氏葉三鄭訥魯特氏鄭常貴土黙特氏博絡白禪氏唐古錫旺舒特氏吉克圖王古爾親氏蘇䝉額兆逹爾幹氏謨爾渾揚靄氏哈爾秦歩古魯特氏哈爾瑚孫津氏圖禄蓀克穆楚氏武什布爾圖氏寨僧錫喇圖氏達禮伊札爾氏伊札布札穆懇氏布拉克塔赫舍理氏瑪濟根高逹瑪氏博爾濟佟尼耀特氏班第欽定四庫全書八旗滿洲氏族通譜目録卷七十一附載滿洲旗分内之蒙古姓氏蘇尼特氏薩喇扎頼氏陽高翁舍占氏濟瑚博頼烏朗哈特氏濟格尼卓多穆氏瑚雅克泰陽吉氏塞勒穆扎普珠爾吉特鄂謨克氏綽爾捫功格喇普氏鄂屯濟喇敏鄂瑪特氏鄂岱鄂拉本氏莽瑚理庫布克氏巴逹瑪色徹氏卓秦克穆楚特氏噶爾圖瑪札克氏阿理衮鄂喇坤氏額博爾特瑚爾渾氏瑚兆鄂謨克氏們都潮穆特氏巴雅爾岱納伊氏哲金墨爾啟氏珠懇博爾齊特氏啟他特濟魯特氏伊貝吳佳氏恩格圖兀札喇氏巴爾圖江吉氏薩喇鴻果絡氏古魯瑚魯克氏碩色汪札爾氏訥爾泰白逹爾氏白博什瑚爾庫爾氏巴珠齊普楚特氏鐸鼐博和羅克氏阿那庫沙查海氏果爾岱赫勒氏哈施謨錫勒氏謨檀額爾輝額哲特氏顧魯古英精吉集氏岱寧托羅特氏積蘭泰式勒氏札式龔吉特氏索嫩舒穆爾氏諾宻兆絡特氏内赫圖尹齋氏恩克岳羅親氏堯珠岱博羅特氏克什圖孫尼耀特氏佛塞曹丹氏耀塞徹穆衮氏陳德永崔珠克氏阿拜李塔理氏鄂善侯佳氏克什貝索羅噶爾氏索鼎葉古禄特氏葉三鄭訥魯特氏鄭常貴土黙特氏博絡白禪氏唐古錫旺舒特氏吉克圖王古爾親氏蘇䝉額兆逹爾幹氏謨爾渾揚靄氏哈爾秦歩古魯特氏哈爾瑚孫津氏圖禄蓀克穆楚氏武什布爾圖氏寨僧錫喇圖氏達禮伊札爾氏伊札布札穆懇氏布拉克塔赫舍理氏瑪濟根高逹瑪氏博爾濟佟尼耀特氏班第
