body:
  text: 八旗滿洲氏族通譜卷三哈達地方瓜爾佳氏巴岱國鑲黄旗人世居哈達地方布禄統之孫布達理初来歸設佐領令其子顔原任佐領噶布拉原任䕶軍校巴山初襲佐領以所任稱職授騎都尉取大凌河首先進擊初過北京征山東擊敗太監馮永盛兵又以梯攻鉅鹿縣克其城加一雲騎尉定鼎燕京時入山海闗擊敗流賊馬歩兵叙功授為三等輕車都尉三遇恩詔加至三等男後駐防江寧賊兵来犯陣斬偽王一偽總兵五殺賊兵千餘授為二等男卒其子舒恕襲職從征陕西擊敗逆賊王輔臣兵續征雲南賊偽將胡國秉等率兵萬餘出城拒戰奮擊大敗之授為一等男因年老告休其子常清襲職時削去恩詔所加之職承襲一等輕車都尉任佐領卒其子滿丕襲職現任藍翎侍衛又巴岱之曽孫翁果托盛原任頭等侍衛元孫穆成額原任濟保原任副京刑部侍郎常明原任副叅領佛都統兼佐領國柱原任恭領兼佐領四世孫常在原任歩軍校常雲現任三等侍衛兼佐領圖克坦現任二等侍衛布克沙鑲黄旗人巴岱之曽孫也由䕶軍恭領從征皮島首先登進初圍錦州城内兵出戰擊敗之又敗杏山松山来援兵奪其纛叙功授雲騎尉三圍錦州破洪承疇三營馬歩兵過北京征山東取蒙陰沂水二縣授為騎都尉後追滕吉思擊敗土謝圖汗及碩羅汗等兵加一雲騎尉三遇恩詔加至一等輕車都尉歴任户部侍郎副都統兼佐領卒其子韓楚漢襲職任頭等侍衛卒其子哈恩詔所禄襲職時削去都尉兼一雲騎尉現任三等侍加之職承襲騎衛又布克沙之子賽錫布原任郎中貴福由二等侍衛兼佐領從征雲南攻沅江府克其城後征江西在建昌府鐘鼓山擊賊偽將李茂著兵力戰被傷身亡贈雲騎尉其子當色襲職卒其子積福襲職現任佐領又布克沙之孫愛錫原任郎中色赫原任三等侍衛兼佐領色爾圖原任䕶軍㕘領曽孫濟通原任三等侍衛兼佐領胡什哈國正紅旗人巴岱同族世居哈達地方哈滿都布初来歸其子金達錫原任典儀孫標謨什俱原任䕶軍校曽孫西爾門現任副䕶軍恭領元孫雅思哈現任驍騎校索爾科由驍騎校從征厄魯特噶爾丹奮勇破賊有功授雲騎尉任歩軍副尉卒其子索敏現襲職瑪雅實希國正白旗人世居哈達地方布原任佐領常綬原初来歸任驍騎校其子占任䕶軍恭領族姪呉岱謨逹色俱原任䕶軍校呉爾祜由委署驍騎校從征福建在盖峙山擊贈雲騎海寇鄭成功兵陣亡色襲職從征陜西擊敗逆尉因無嗣其親弟華賊王輔臣兵續征雲南賊偽將胡國秉等率兵萬餘出城拒戰奮擊大敗之叙功授為騎都尉卒無嗣其親兄之子長在襲職任䕶軍恭領卒其子赫英襲職現任䕶軍恭領又瑪雅實希族孫胡什布原任三等侍衛羅竒現任防禦石柱現任歩軍校哈達現任前鋒校族曽孫林現任署丞碩瑪鑲紅旗人世居哈達地方来歸年分無考任䕶軍校其子布舒庫原任歩軍校薩哈達由委署䕶軍恭領從征湖廣及察哈爾布爾尼俱有功授騎都尉任城守尉卒其子薩蘭泰五十八相繼承襲又碩瑪之孫邁齊原任筆帖式碩色國正藍旗人世居哈達地方䕶軍校從征福建擊初来歸其孫鄂莫克圖由贈騎都海寇鄭成功兵陣亡布襲職尉因無嗣其親弟新福爾納鑲黄旗人世居哈達地方天聰時来歸其子瓦爾達由前鋒校從征福建在建陽縣擊賊陣亡贈雲騎尉其子巴什襲職卒其子福神保現襲職又福爾納之孫賽珠瑚原任佐領曽孫綏哈納原任協領烏逹納原任防禦五十八原任佐領烏達哈現任佐領元孫赫楞現任䕶軍校赫成由䕶軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子烏爾瑚現襲職尼雅濟布國正紅旗人世居哈達地方驍騎校孫阿鈕由驍初来歸其子阿拉密原任騎校從征陕西於平凉府招撫叛逆王輔臣有功授雲騎尉任佐領卒其子薩蘭泰襲職又尼雅濟布之元孫阿秉阿現任員外郎呉達善現任主事林昌現任中書四世孫滿泰現任驍騎校邁佟阿國鑲白旗人世居哈達地方前鋒恭領曽孫巴什初来歸其孫都楞額原任泰原任司庫瑪隆阿原任六品典儀瑪爾吉原任筆帖式元孫来泰原任三等侍衛烏納海由前鋒校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子烏靈阿現襲職由鑲黄旗改𨽻和隆格鑲黄旗人世居哈達地方天聰時来歸任䕶軍校其子尚舒原任歩軍校徳普特原任筆帖式孫伊蘭泰原任三等侍衛楊淑由䕶軍校從征厄魯特噶爾丹在昭莫多地方擊賊陣亡贈雲騎尉其子興常襲職現任二等侍衛胡錫屯正藍旗人世居哈逹地方来歸年分無考其子阿三泰由委署驍騎校從征廣東於韶州府擊敗賊偽將馬寳等兵萬餘衆續征雲南擊敗賊偽將何繼祖等兵於黄草壩叙功授雲騎尉卒其子哈福納現襲職額庫訥鑲藍旗人世居哈達地方来歸年分無考其孫勒徳原任内閣學士兼禮部侍郎曽孫禪晉保原任筆帖式元孫福禄原任䕶軍校明玳現任䕶軍校福徳現任千總以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗薩喇布其子薩哈那原任驍騎校孫牛鈕現係看守倉庫官正紅旗布哈其子布頼原任歩軍校孫五格穆臣俱原任䕶軍校曽孫蘇伯圗現任䕶軍校元孫三格原任佐領鄂什泰其孫西特庫原任驍騎校曽孫鄂托原任䕶軍校元孫巴顔圗現任䕶軍校按鄂什泰與夲旗葉赫地方班濟那同族金達頼其子姜都原任驍騎校安布禄原任七品官鑲白旗安丕樓其元孫瑪岱現任䕶軍校都喀禪現任前鋒叅領由鑲黄旗改𨽻正藍旗凱音布其孫色赫理原任員外郎曽孫明安原任典儀白起圗原任御史侃布禄其孫佛倫原任典儀和倫原任協領噶瑚原任四品官曽孫赫色原任䕶軍校佛綬原任驍騎校雅圗原任中書賽哈原任歩軍校色赫徹現任副䕶軍