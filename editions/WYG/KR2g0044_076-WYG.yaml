body:
  text: 八旗滿洲氏族通譜卷三十七烏蘇氏烏蘇本係地名因以為姓其氏族散處於瓦爾喀訥啟海蘭長白山及各地方瓦爾喀地方烏蘇氏吉思哈國鑲白旗人世居瓦爾喀地方功授為三等輕車初來歸令管佐領後征明有都尉因克遼東功加為二等輕車都尉征黑龍江著有勞績加為一等輕車都尉任吏部侍郎恩詔加卒其子吉占承襲三遇革退其親弟之子華善為二等男任佐領縁事恩詔所襲職時削去一等輕車都尉從征厄魯特噶爾加之職承襲丹擊賊有功加一雲騎尉任佐領縁事革退其親弟務廣襲職任副都統卒其子明徳襲職現任佐領又吉思哈之子希佛原任郎中兼佐領孫色爾特原任佐領曾孫色都原任䕶軍校徳敏現任副都統兼佐領裕徳現任佐領尚徳現任二等侍衞三格現任二等䕶衞元孫伊齡安現係廕生多齡安現係生員由正白旗改𨽻吉普喀達國鑲白旗人吉思哈之親弟也世居瓦爾喀地方初來歸征明有功授為一等輕車都尉從征鳳集堡身亡其子𤓰爾察承襲二等輕車都尉卒其弟尼滿承襲圍錦州擊敗松山馬兵定鼎燕京時入山海闗擊流賊馬步兵二十萬衆復追至慶都縣大敗之授為一等輕車都尉兼一雲恩詔加騎尉卒其親兄之子穆舒渾承襲三遇有功授為一等男縁事降為三等男後征廣東為二等男縁事革退削去本身所得騎都尉將一等輕車都尉兼一雲騎尉與其親弟之子特恩詔所屯承襲卒其子布延泰襲職時削去喀達之孫加之職現襲三等輕車都尉又吉普特世渾原任頭等䕶衞托晉原任佐領曾孫穆森原任都統穆禄原任員外郎薩爾布原任二等䕶衞特進泰原任佐領元孫福成格現任佐領穆濟倫現任郎中穆敦原任叅領穆爾泰原任䕶軍校穆蘭原任筆帖式四世孫鶴善現任員外郎國保現任筆帖式七十一現任博士三格現係進士穆合林現係監生由正白旗改𨽻穆瑚國鑲白旗人吉思哈同族世居瓦爾喀地方亡初來歸由佐領從征黑龍江奮勇擊賊陣贈騎都尉其子摩羅承襲三遇子法噶承襲卒無嗣其恩詔加至二等輕車都尉卒其親叔祖之子佛綸襲職卒其子佛拜襲職卒其子多爾濟襲職時削去恩詔所加之職現襲騎都尉又穆瑚之弟珠瑚原任叅領其子岳絡原任郎中費揚古原任佐領由正白旗改𨽻達爾布國鑲白旗人吉思哈同族世居瓦爾喀地方邑縣初來歸由䕶軍校過北京征山東梯攻昌賜巴圖首先登城克之定鼎燕京時入山海闗擊流賊魯號授騎都尉恩詔加馬步兵二十萬衆加一雲騎尉三遇卒無嗣其至一等輕車都尉卒其子雅住承襲親叔之孫六十八襲職卒其子納秦襲職卒其兄納爾泰襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其子金柱現襲職又達爾布親弟阿思哈之子何特赫原任協領又達爾布親兄達哈蘇之子舒克圖原係監生由正白旗改𨽻伊哈蘇國鑲白旗人吉思哈同族世居瓦爾喀地方委署初來歸其子拜扎原任五品官孫根貝由䕶軍校從征浙江福建時於郭塘山破賊偽將劉國軒兵進攻雲南在石門坎地方復敗賊何繼祖等兵萬餘衆叙功授雲騎尉卒其親弟之子赫楞格現襲職又伊哈蘇之孫謨欣原任員外郎謨岱謨海額西赫訥俱原任䕶軍校曾孫三齊哈現任驍騎校由正白旗改𨽻祁充格國鑲白旗人吉思哈同族世居瓦爾喀地方原任初來歸原任𢎞文院大學士其子白清格陜西巡撫烏靈阿原任内閣學士兼禮部侍郎額爾赫圖原任郎中孫倭和慎原任䕶軍叅領瑪爾遜原任頭等䕶衞百善原任員外郎蘇海原任長史伽藍保原任筆帖式曾孫額爾登原任驍騎校雙柱現任驍騎校三格現係副驍騎校由正白旗改𨽻清嘉努國鑲白旗人吉思哈同族世居瓦爾喀地方事孫初來歸其子曠濶原任佐領喀蘭原任主赫碩色原任都統曾孫禮都原任䕶軍校何深原任三等䕶衛元孫禮布現任步軍校由正白旗改𨽻邵占國正紅旗人世居瓦爾喀地方曾孫珠啟泰原任初來歸其孫檀品原任典儀鳴贊珠都訥原任兵部侍郎元孫珠天保原任檢討珠善現任筆帖式四世孫富明安現係生員以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗剛阿達其曾孫布拉現任步軍校鑲白旗賽圖吉思哈同族其孫達爾都原任驍騎校曾孫索柱原任員外郎保住現任頭等䕶衞喀爾沁原任筆帖式瑪爾蘇原任步軍校賚格原任䕶軍校元孫福寧現在頭等䕶衞索泰現任歸綏道柏倫現任三等䕶衞海全現任筆帖式法克進現任䕶軍校由正白旗改𨽻兌勒慎吉思哈同族原任佐領其子博鼐原任郎中郎圖原係監生孫烏啟原任頭等䕶衞烏喜現任頭等䕶衞曾孫富成額原任䕶軍校由正白旗改𨽻薩蒲察哈吉思哈同族其子觀音保原任郎中由正白旗改𨽻武勒吉思哈同族其孫薩布瑚原任䕶軍叅領曽孫薩特訥原任䕶軍校元孫赫都訥現任䕶軍校由正白旗改𨽻拖爾濶吉思哈同族其曾孫瑚什原任六品官元孫星喀理原任步軍校四世孫格森原任頭等䕶衞額森現任䕶軍校永艾原任步軍校倭和原係雲騎尉五世孫烏登亦原係雲騎尉保成現任䕶軍校由正白旗改𨽻拖蒲善吉思哈同族其孫拉克達原任頭等䕶衞由正白旗改𨽻西圖庫吉思哈同族其曾孫保住原任頭等䕶衞伊爾特原任筆帖式元孫福寧現係庫使由正白旗改𨽻三泰吉思哈同族其子希佛訥原任步軍副尉孫雅爾泰原任司務由正白旗改𨽻海保住吉思哈同族原任防禦其曾孫甘楚哈原任佐領塞克原係副驍騎校由正白旗改𨽻阿黨仲褚吉思哈同族其元孫福徳現任步軍校覺和托原任城門尉四世孫索柱原任防禦由正白旗改𨽻瑚爾巴吉思哈同族其子鈕堪原任步軍校孫陶色原任䕶軍校額圖渾原任委署參領曽孫玉勒原任驍騎校由正白旗改𨽻庫爾訥吉思哈同族其子瑚什八原任驍騎校孫瑚爾啟原任前鋒侍衞當阿原任主事曾孫雙鼎原任䕶軍校由正白旗改𨽻班布里吉思哈同族其曾孫阿什坦原任防禦球海原任六品官西顔原係雲騎尉元孫朱滿亦原係雲騎尉望徳原任䕶軍校由正白旗改𨽻柏啟吉思哈同族原任散騎郎其孫薩爾泰原任三等䕶衞由正白旗改𨽻阿克敦吉思哈同族其曾孫徳爾賽原任三等䕶衞由正白旗改𨽻達齊里吉思哈同族其子殷都克原任五品官由正白旗改𨽻邁色吉思哈同族其子薩海原任驍騎校孫觀音保現任䕶軍校黑格原係副䕶軍校又邁色親兄奇登額之子輝色原係雲騎尉由正白旗改𨽻噶瑚理吉思哈同族其元孫什保原任典儀由正白旗改𨽻莽啟吉思哈同族其孫吉郎阿原任前鋒校曾孫阿海法海俱原任䕶軍校由正白旗改𨽻尼隆格吉思哈同族原任䕶軍校由正白旗改𨽻扎庫尼吉思哈同族其四世孫烏瑪里原任䕶軍校由正白旗改𨽻烏啟吉思哈同族其曾孫阿哈逹原任七品官由正白旗改𨽻瑚圖吉思哈同族其子烏弼什瑚原任七品官曾孫松吉納原係副驍騎校由正白旗改𨽻漢都吉思哈同族其孫烏禮徳原任筆帖式由正白旗改𨽻鑲藍旗博拖濶其孫瑚什塔原任防禦恒特原任筆帖式曾孫官保原任郎中常貴普成俱原任筆帖式薩穆哈原任防禦成保原係副驍騎校以上俱世居瓦爾喀地方係國初來歸之人鑲紅旗巴通阿其孫兊省阿原任䕶軍校曾孫薩爾泰原任防禦元孫齊綬原係副驍騎校雅爾哈其曾孫鄂爾和岱原任八品官以上俱世居瓦爾喀地方係來歸年分無考之人訥殷地方烏蘇氏塔蒙阿國鑲白旗人世居訥殷地方佐領孫薩禄由佐領初來歸其子岱蒙阿原任圍錦州敗洪承疇兵過北京征山東屢立軍功定鼎燕京時入山海闗破流賊馬步兵二十萬恩詔加衆叙功授騎都尉兩遇陜西梯攻西平縣首先為三等輕車都尉後征恩詔加登城克之授為二等輕車都尉遇希佛訥襲職為一等輕車都尉卒無嗣其親弟詔後軍卒其子西成格襲職時削去都尉現任佐領又功所得之職承襲二等輕車塔蒙阿之孫特穆魯懇特俱原任佐領曾孫希爾格訥原任御前侍衞雅賚扎親俱原任員外郎阿那海原任驍騎校阿蘭太原任給事中鄂洛順原任七品官葉克韶原任前鋒校元孫雅哈原任䕶軍叅領兼佐領定保原任佐領魏格原任頭等䕶衞色爾特現任二等䕶衞巴徳保原任大理寺少卿烏徳保現任筆帖式森特和原任筆帖式額楚原係雲騎尉赫什亨原任驍騎校甘陞噶什太俱原任䕶軍校四世孫拖興原任佐領拖璧原任主事四格原任䕶軍叅領兼佐領五格原任頭等䕶衞六十一現任二等䕶衞薩哈現任親軍校十格現任天文生國仲現係廕生徳精格現任六品典儀魁林現係庫使五世孫巴里現任䕶軍校巴喀現係副䕶軍校六世孫存柱現任佐領由鑲黄旗改𨽻舍泰國鑲白旗人塔蒙阿同族世居訥殷地方攻寳慶初來歸其曾孫諾泰由閒散從征湖廣恩詔加府首先登城克之授雲騎尉三遇賊馬秉忠兵為三等輕車都尉後征雲南擊敗三千餘衆平定江西湖廣等處擊敗賊黄浩有功授為二等輕車都尉卒其子留格承襲卒其親叔隆在現承襲由鑲黄旗改𨽻寶柱國正藍旗人世居納殷地方郎中邁蘭由閒散從初來歸其子博碩訥原任征江西湖廣等處屢立軍功授雲騎尉卒其親兄之孫保彊承襲縁事革退其親弟保材現襲職乂寶柱之孫博爾岱原任員外郎保海原任郎中曾孫保雲現係庫使鄂爾布國鑲白旗人世居訥殷地方軍叅領孫倭赫原任初來歸其子額森原任䕶二等䕶衞曽孫蘇赫原任䕶軍統領元孫西林原任頭等䕶衞伊林現任驍騎校由正白旗改𨽻以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗多尼喀塔蒙阿同族其元孫新徳原任佐領赫古原任西安按察使四世孫碩博和現任防禦由鑲黄旗改𨽻葉成塔蒙阿同族其子武泰原任主事孫三格現任䕶軍校由鑲黄旗改𨽻拜明塔蒙阿同族其子拜新原任七品官孫二格現任防禦由鑲黄旗改𨽻通古里塔蒙阿同族其孫伊格原任䕶軍校由鑲黄旗改𨽻沙通阿塔蒙阿同族其元孫華色原任䕶軍校由鑲黄旗改𨽻墨格塔蒙阿同族其子舒穆魯原任驍騎校孫赫達色現任驍騎校由鑲黄旗改隸阿郎阿塔蒙阿同族其子百徳原任驍騎校由鑲黄旗改隸鑲藍旗格巴庫原任鐵匠協領其子噶普臣原任驍騎校孫繙岱原任䕶軍校滿岱原任驍騎校齊什現任驍騎校以上俱世居訥啟地方係國初來歸之人海蘭地方烏蘇氏阿蘭國正紅旗人世居海蘭地方軍校從征察哈爾布初來歸其元孫齊林由䕶爾尼在大鹵地方破賊有功後征陜西平凉等處屢立軍功授雲騎尉卒其孫西勒米承襲原任委署歩軍校又阿蘭之曽孫福塔原任司務元孫羅敏原任筆帖式外圖國正藍旗人世居海蘭地方校平定雲南著有軍初來歸其孫苗妙由䕶軍績後征厄魯特噶爾丹擊賊有功授雲騎尉卒其子郭親承襲又外圖之孫拜達拉原任䕶軍校席爾布國正藍旗人世居海蘭地方薩爾圖原任初來歸原任䕶軍校其子陵寢總管喀爾圖原任步軍校孫薩克新原任員外郎庫爾禪原任主事尼雅達原任内閣學士兼禮部侍郎曾孫烏爾禪原任筆帖式按席爾布與鑲藍旗烏喇地方蘓蘓庫同族以上俱係應立傳之人其餘無事蹟可立傳者附載於後正藍旗阿哈占其孫烏賽原任御史曾孫莊泰原任驍騎校元孫太平原任䕶軍校彰武原任筆帖式毓徳現係生員四世孫武隆阿亦現係生員楞柱其孫扎努原係騎都尉任佐領魯孫昭善原任佐領穆成額原任城守尉富泰現係候補筆帖式元孫舒蘇雅爾布俱原任郎中岱納古外布理俱原任佐領邁圖原任步軍校屯太原任筆帖式武都里現任步軍校鄂海原係雲