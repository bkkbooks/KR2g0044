body:
  text: 八旗滿洲氏族通譜目錄卷五十四薩克察氏球羅理右係有傳古拉庫薩竒納布勒圖夸哈納以上俱附載烏爾答氏嘉渾布晉泰以上俱有傳布森泰鐸爾吉以上俱附載圖克坦氏烏魯素右係有傳阿爾泰拜音察理以上俱附載郭爾佳氏羅滿右係有傳貝謨理鄂鼐以上俱附載洪鄂春氏阿哈達華色以上俱有傳赫勒札魯揚阿納琦塔理穆禮堪玉陳伊喇布巴晉泰賽音三布祿外朗以上俱附載額爾圖氏察竒滿泰納喇以上俱有傳江泰魯庫揚節鼐遂勒丹烏瑚尼綽爾門以上俱附載彰錦氏松額理杭蘇理以上俱有傳伊齊哈札靈阿吳泰喇哈殷達瑚齊薩納濟拉蓀元保二格塞克西柏倫泰薩克錫夸喀喀拉錫理額􅅬格以上俱附載聶格理氏瑚爾漢右係有傳達楚喀郞啟佛庫訥滿都理以上俱附載揚佳氏阿珠瑚右係有傳珠拉塔敖納吉爾恰納海音禪武略庫齊圖善諾和齊清山大達色鄂倫穆沙泰格爾布都賚海色以上俱附載欽定四庫全書八旗滿洲氏族通譜目錄卷五十四薩克察氏球羅理右係有傳古拉庫薩竒納布勒圖夸哈納以上俱附載烏爾答氏嘉渾布晉泰以上俱有傳布森泰鐸爾吉以上俱附載圖克坦氏烏魯素右係有傳阿爾泰拜音察理以上俱附載郭爾佳氏羅滿右係有傳貝謨理鄂鼐以上俱附載洪鄂春氏阿哈達華色以上俱有傳赫勒札魯揚阿納琦塔理穆禮堪玉陳伊喇布巴晉泰賽音三布祿外朗以上俱附載額爾圖氏察竒滿泰納喇以上俱有傳江泰魯庫揚節鼐遂勒丹烏瑚尼綽爾門以上俱附載彰錦氏松額理杭蘇理以上俱有傳伊齊哈札靈阿吳泰喇哈殷達瑚齊薩納濟拉蓀元保二格塞克西柏倫泰薩克錫夸喀喀拉錫理額􅅬格以上俱附載聶格理氏瑚爾漢右係有傳達楚喀郞啟佛庫訥滿都理以上俱附載揚佳氏阿珠瑚右係有傳珠拉塔敖納吉爾恰納海音禪武略庫齊圖善諾和齊清山大達色鄂倫穆沙泰格爾布都賚海色以上俱附載
