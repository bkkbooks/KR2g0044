body:
  text: 八旗滿洲氏族通譜目錄卷十二穆溪地方伊爾根覺羅氏阿爾塔什齊瑪塔薩穆察噶哈以上俱有𫝊龎古善西特庫碩色三覃傅達理愛葉隨以上俱附載葉赫地方伊爾根覺羅氏巴雅爾圖富拉塔薩穆禪薩清額盧巴海金泰布什漢顧齊屯布禄以上俱有傳都坦哈什泰瑪爾虎王錫和克敦殷特安圖愛錫瑚什布額什圖禪丕武蘇布翁納圖丹達喇鄂星阿鍾安阿哈尼堪揚桑阿岱音布祿王山安達理和絡穆巴林郭禮文達世豐盛額渾冕呉班瑪岱滿柱訥勒舒瑪嘉塔海滿都瑚呉喀理陳岱蓀達理席圖庫以上俱附載嘉木湖地方伊爾根覺羅氏噶哈善哈思瑚拉哈貝渾巴顔福哈都督固祿遜穆竒納噶哈以上俱有傳盧庫西圖渾帕海安巴鼐格謝鼐佟保以上俱附載興堪地方伊爾根覺羅氏朱瑚達阿克善葉穆柱以上俱有傳竒努黨淑哲庫慎以上俱附載
  hash: sha256:5550eae33a78a4c5f7ad37cbe42cabafda6b698645f2c712ca264d44acc3ab30
