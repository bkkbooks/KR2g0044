body:
  text: 八旗滿洲氏族通譜目録卷六十三鑲黃旗無名位希姓博爾濟氏碩色定紀理氏定保拉顔氏奇爾布哈渾達奇氏法穆達托和爾秦氏鼐喀尼色爾傑氏克什訥伊穆圖氏都喇錫葛佳喇氏穆成額富蘇瑚氏永愛博爾卓克氏達達布正黃旗無名位希姓佛多錫墨理氏喜爾登額喀喇氏阿海周延氏周徳武唐顔氏拉巴陶佳氏多爾吉鄭佳氏鄭爾瑚鼎氏塔濟格爾齊氏瓦爾達珠魯氏達爾瑚喀爾拉哈氏恩格圖玉魯氏圖爾特正白旗無名位希姓占尼氏薩穆札崔穆魯氏九格梅佳氏商吉穆巴顔氏格文瞻楚渾氏薩賚札雅札喇氏松吉納石富察氏庫庫訥達普圖氏噶爾哈尼多拉爾氏嘉札喇庫多爾塔喇氏噶納武爾孟克宜勒氏金達理克勒氏尼喀理嘉瞻氏楚穆特穆圖薩喇氏貝通東阿氏外蘭額宜蘇氏薩爾布多秦氏錫務尼阿喇氏鄂成額圖勒理氏興色爾蓀綽爾氏鄂羅山烏顏齊氏薩郎阿楊額理氏多理瑚佳氏都克錫欽定四庫全書八旗滿洲氏族通譜目録卷六十三鑲黃旗無名位希姓博爾濟氏碩色定紀理氏定保拉顔氏奇爾布哈渾達奇氏法穆達托和爾秦氏鼐喀尼色爾傑氏克什訥伊穆圖氏都喇錫葛佳喇氏穆成額富蘇瑚氏永愛博爾卓克氏達達布正黃旗無名位希姓佛多錫墨理氏喜爾登額喀喇氏阿海周延氏周徳武唐顔氏拉巴陶佳氏多爾吉鄭佳氏鄭爾瑚鼎氏塔濟格爾齊氏瓦爾達珠魯氏達爾瑚喀爾拉哈氏恩格圖玉魯氏圖爾特正白旗無名位希姓占尼氏薩穆札崔穆魯氏九格梅佳氏商吉穆巴顔氏格文瞻楚渾氏薩賚札雅札喇氏松吉納石富察氏庫庫訥達普圖氏噶爾哈尼多拉爾氏嘉札喇庫多爾塔喇氏噶納武爾孟克宜勒氏金達理克勒氏尼喀理嘉瞻氏楚穆特穆圖薩喇氏貝通東阿氏外蘭額宜蘇氏薩爾布多秦氏錫務尼阿喇氏鄂成額圖勒理氏興色爾蓀綽爾氏鄂羅山烏顏齊氏薩郎阿楊額理氏多理瑚佳氏都克錫
