body:
  text: 八旗滿洲氏族通譜卷十五各地方伊爾根覺羅氏葛伯庫國正白旗人世居札庫木地方京時入山海關擊初來歸由䕶軍叅領定鼎燕敗流賊馬步兵二十萬衆又追至慶都縣大敗之叙功優授騎都尉後征四川擊賊張獻忠兵贈一雲陣亡其子關布襲職遇騎尉恩詔授為三等輕車都尉卒其兄魏赫襲職從征浙江舟山擊敗賊偽英毅伯阮思等兵三萬餘衆後贈為二征湖廣於􅉓陵州擊賊偽將劉之輔等兵陣亡等輕車都尉無嗣其親兄之子赫碩色襲職卒恩詔所其子烏占襲職卒其子色克圖襲職時削去其加之職承襲三等輕車都尉任熱河總管卒詔後軍子金泰襲職時削去都尉兼一雲騎尉又葛伯功所得之職現襲騎庫之孫杜都原任䕶軍校元孫羅察原任驍騎校尹達瑚齊正白旗人世居穵閧蕚漠地方天聰時來歸由廢員往北京進邊之日首先奮入後攻遵化城贈騎都陣亡優其親兄安塔穆襲職三遇尉無嗣恩詔加至二等輕車都尉卒其子都丹孫敦拜曾孫董福相繼承襲董福卒其子都英額襲職時削去恩詔所加之職現襲騎都尉安塔穆之曾孫存喜原任七品官又尹達瑚齊親弟赫色原任藍翎侍衞其子齊蘭布原任步軍校孫巴爾都現任驍騎校又尹達瑚齊親叔阿敦巴克什之孫滿都祜原任雲麾使重紳原任員外郎曾孫蘇海原任前鋒侍衞卓穆太原任主事又尹達瑚齊族弟蘇赫之子蘇魯瑪原任防禦按尹達瑚齊與鑲白旗嘉木湖地方噶哈善哈思瑚正黄旗薩爾湖地方拉哈墨爾根等同族巴哈塔正白旗人尹達瑚齊同族世居穵閧蕚漠地方天聰時來歸由䕶軍叅領從征貴州兩敗賊兵於十萬崎山下師回遇海賊鄭成功率賊兵十萬來犯鎭江指揮攻擊屢敗其衆叙功優授騎都尉兼一雲騎尉年老告退其孫西楞額襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為三等輕車都尉卒無嗣其親兄之子海保親叔之子石圖桑格相繼承襲又巴哈塔之長子阿那布原任主事第三子科拜原任頭等侍衞孫海清原任員外郎巴岱國正紅旗人世居索爾和碧漢地方校次子圖爾初來歸其長子巴爾岱原任親軍坤以屢從征剿著有勞績授備禦後克遼東授為副將初編佐領使統之第三子通岱原任叅領第四子通實原任䕶軍叅領第五子翟山原任親軍校第六子台柱原任員外郎孫布舒庫原任佐領翁郭托原任前鋒叅領栢禮懇原任郎中兼佐領錫特庫原任驍騎校科多原任五品官曾孫萬濟布原任佐領牛鈕原任副都統班塔哈原任六品官珠賚原任步軍校萬塔哈原任驍騎校蘭住原任筆帖式元孫花山原任佐領沙色原任防禦周什原任筆帖式富成現任副䕶軍叅領錫楞額現任筆帖式四世孫賽音達理原任千總海成原任筆帖式天保原任佐領瑪色現任驍騎校五世孫兆海原任佐領兆山現任佐領三保己未科繙譯進士現任中書兼佐領阿蘭正紅旗人巴岱之孫台柱之子也初任佐領兩遇恩詔授騎都尉後於延安府擊敗流賊叙功優授為三等輕車都尉卒其子安珠琥襲職從征大同擊敗賊偽將張晉威馬步兵又征貴州屢著軍功征四川於朝天關擊敗賊偽總兵石存禮等兵贈為二一萬七千餘衆後於槐樹驛地方擊賊陣亡著等輕車都尉無嗣其親弟存柱及其長子彩相繼承襲存柱之次子善著原任佐領孫四格現任佐領又阿蘭之子伊騰原任佐領孫齊克騰原任䕶軍校多什喀正紅旗人世居伊爾哈地方天聰時來歸其四世孫古尼達原任䕶軍校牛鈕原任驍騎校嘉努由䕶軍校從征雲南擊賊有功授雲騎尉卒其孫鄂欽曾孫永泰相繼承襲又多什喀之四世孫托岱由䕶軍校從征察哈爾布爾尼於大鹵地方屢敗賊衆平定雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功優授騎都尉兼一雲騎尉後征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為三等輕車都尉任佐領卒其子托善保襲職任䕶軍叅領緣事革退其子永亮現襲職又多什喀之五世孫多拜原任䕶軍校托進保現任䕶軍校六世孫尼瑪善原任䕶軍校伊林太現任䕶軍校七世孫富爾賽現任驍騎校阿格納國鑲白旗人世居賴布村地方校過北京征山東初來歸其子渾達理由䕶軍攻博野縣不設雲梯首先登城克之授雲騎尉圍錦州擊敗松山杏山馬步兵又破洪承疇三營步兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣大敗之又破流賊滅福王平定河南江南等處屢著軍功授為騎都尉三遇恩詔加至二等輕車都尉緣事降為騎都尉兼一雲騎尉後征浙江舟山擊賊偽英毅伯阮思等兵於海上叙功授為三等輕車都尉卒其子烏達納襲職卒其子黒達色襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉又渾達理之子巴格原任䕶軍叅領孫札蘭泰原任協領葉成額現任步軍校由正黄旗改𨽻瓜喇國正黄旗人世居界凡地方時以委署副都統率初來歸由佐領定鼎燕京恩詔加兵殿後有功授騎都尉三遇子烏爾禪襲職任至二等輕車都尉卒其第四恩詔所佐領卒其子倭赫襲職時削去長子存柱原任加之職現襲騎都尉又瓜喇之佐領次子董阿布原任二等侍衞兼佐領第三子武達禪原任前鋒叅領兼佐領孫赫碩色原任協領花色原任叅領兼佐領巴什原任頭等侍衞兼佐領永泰原任佐領騷達色原任四品官瓦爾達由委署䕶軍校從征廣東廣西等處擊賊有功又征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩叙功授雲騎尉卒無嗣其親兄之子吳格襲職任佐領卒其子吳爾卿阿襲職現任副叅領兼佐領又瓜喇之曾孫吳爾泰現任佐領噶哈國正黃旗人瓜喇同族世居界凡地方西於秦州初來歸其子薩賚由七品官從征陜平凉等處屢敗賊兵叙功授雲騎尉任城門尉卒其子森特赫襲職又噶哈之孫安珠琥堪珠琥俱原任驍騎校曾孫沙爾坦現任防禦托吉國鑲白旗人世居赫門地方爾吉俱原任筆帖式初來歸其四世孫夸占哈海塔原任司庫雅哈禪原任步軍校瓜納由䕶軍校從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉等兵於雲南城下叙功優授騎都尉卒其子巴納襲職卒其親兄之子三格孫雙珠相繼承襲又托吉之五世孫德斯特延太本泰俱原任筆帖式哈達原任司庫訥理原任佐領額勒穆原任主事黑達色原任步軍校留保住原任䕶軍校佛保原任步軍副尉輝塔原任防禦哈蘇蘭原係監生老格現任鳴贊六世孫五格現任六品官額色特原任城守尉四什布原任步軍校根特原任驍騎校本布現任郎中薩鼐現任䕶軍校七世孫明岱原係副䕶軍校丹岱由䕶軍校從征凖噶爾在和通呼爾哈腦爾地方奮勇擊賊陣亡贈雲騎尉其子碩翁科理現襲職鄭古德正黃旗人托吉之曾孫也其子外音布由閒散從征朝鮮攻義州第二登城克之後圍錦州擊贈雲騎洪承疇兵陣亡布襲職三遇尉其親弟艾音恩詔加至三等輕車都尉後破流賊滅福王平定河南江南等處屢著軍功又征江西擊賊首王德仁等兵敗之授為二等輕車都尉任佐領卒其子丹篤襲職卒其子阿錫圖襲職卒無嗣其親兄恩詔所之子雅爾賽襲職時削去古德之孫碩幹原任加之職現襲騎都尉又鄭七品官舒書原任郎中隨哈原任防禦元孫扎克丹原任員外郎拜靈阿原任筆帖式薩琥正黃旗人世居賴布村地方天聰時來歸其長子沙納哈由閒散圍大同攻左衞首先登城克賜巴圖之號優授騎都尉遇魯恩詔加一雲騎尉後征浙江舟山擊賊偽英毅伯阮思等兵於海上叙功授為三等輕車都尉緣事革去巴圖魯號降為騎都尉厯任都統卒其子尚德襲職卒其子善福襲職卒無嗣其叔祖之子廣德襲職緣事革退其親兄之子明智襲職現任副叅領又薩琥之次子雅納哈原任協領孫揚吉達原任城守尉常永原任鳴贊拉色現任佐領曾孫明通原任筆帖式常保現任驍騎校按薩琥與正紅旗佛阿拉地方喀爾齊同族葉臣國鑲藍旗人薩琥同族世居賴布村地方䕶軍校初來歸原任三等侍衞其子卓羅原任孫葉楞由䕶軍校部委章京從征厄魯特噶爾丹於昭莫多地方奮勇破賊斬獲甚衆又取昭定藏著有勞績叙功授雲騎尉任城門尉卒其子阿崇阿現襲職達爾寛國正藍旗人世居多巴庫地方布岱俱原任佐領初來歸其曾孫吳達納阿爾元孫吳巴岱原任七品官明阿圖原任䕶軍校琥達理由閒散過北京征山東梯攻霸州第三恩詔加登城克之授雲騎尉三遇文特襲職卒其子富至三等輕車都尉卒其子恩詔所昌襲職時削去騎尉又達爾寛之四世孫蒼爾加之職現襲雲原任二等䕶衞鄂通果原任步軍校羅泰吳勒俱原任驍騎校瓦爾達原任盛京刑部侍郎輝塔桑格俱原任䕶軍校倭赫原任員外郎都爾海原任主事唐阿泰原任頭等䕶衞塔爾岱原任通政使司通政使唐武泰現任筆帖式五世孫吳什泰原任二等䕶衞立柱原任頭等䕶衞塔蘭泰原任驍騎校平泰原任七品官赫楞現任副䕶軍叅領德楞現任三等䕶衞烏賴黒色俱現任䕶軍校平德現任筆帖式郭斌現任驍騎校平安現係監生六世孫兆昌現任筆帖式鄂凌阿章固理國正紅旗人世居錫爾門地方流賊滅福王平定初來歸其孫蘇雅由閒散破河南江南等處屢著軍功後攻嘉興府首先登城克之授雲騎尉三遇恩詔加至三等輕車都尉卒其子蘇赫襲職卒其子福勒赫襲職卒其親弟阿林襲職時削去恩詔所加之職承襲雲騎尉卒其親兄之子關靈現襲職又鄂凌阿章固理之曾孫費色瑚錫屯俱原任筆帖式元孫隆綬亦原任筆帖式汪渥原任驍騎校常寧現任防禦四世孫席晉泰原任步軍校德休鑲白旗人世居道開地方來歸年分無考由閒散過北京征山東攻任邱縣第二登城克之授恩詔加雲騎尉三遇都尉任城守尉卒其長子額黒襲至三等輕車職因病告退其子額爾德襲職卒其子兆昌襲職時削去恩詔所加之職現襲雲騎尉又德休之次子舒祿原任都察院左都御史孫舒林原任郎中舒敏原係舉人曾孫舒兆魁原任主事武星額國鑲白旗人世居長白山地方東攻寧海州第二初來歸由閒散過北京征山恩詔加登城克之授雲騎尉三遇尉卒其子立住襲職至三等輕車都尉任城守恩詔所任協領卒其子巴克塔襲職時削去襲職卒其加之職承襲雲騎尉卒其親弟色泰親兄之子佛勤現襲職由正白旗改𨽻巴克什國正紅旗人世居呼努渾河地方任驍騎校綏哈初來歸其五世孫阿爾瑚達原原任防禦六世孫栢塞理原任驍騎校拉巴原任防禦四格原任頭等䕶衞二格博和托俱原任筆帖式胡圖由驍騎校從征四川於盤龍山擊賊偽將石存禮等兵屢敗之後於秦州擊賊贈雲騎偽將高定等兵陣亡任協領卒其子兆寧襲職尉其子哲庫納襲職又巴克什之七世孫額森特原任防禦葛森特原任協領阿達海葉成額俱原任筆帖式巴什原任副叅領瑚什布原任頭等䕶衞拜載原任主事保住原任司庫海保現任步軍校愛新現任䕶軍校吳什現任驍騎校八世孫綽克托現任防禦石綬現任佐領成名現任筆帖式富常阿兆興俱現任䕶軍校福舒由部委章京從征凖噶爾在和通呼爾哈腦爾地方奮勇擊賊陣贈雲騎亡其子存柱襲職尉布三台國正紅旗人巴克什同族世居薩克達地方賊兵初來歸其子輝山由䕶軍校圍松山屢敗又破流賊滅福王平定河南江南等處後於潼關擊賊陣亡贈雲騎尉其子常舒襲職遇親弟蘇魯瑪襲職卒其子恩詔授為騎都尉卒無嗣其蘇泰襲職卒無嗣其叔祖鄂色襲職任給事中卒其子温泰現襲職又布三台親弟布雅祿原任驍騎校其孫鄂鼐原任主事福祿鑲黃旗