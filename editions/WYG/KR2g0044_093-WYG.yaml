body:
  text: 八旗滿洲氏族通譜卷四十六鄂卓氏鄂卓為滿洲一姓其氏族散處於葉赫及各地方葉赫地方鄂卓氏阿爾吉穆國鑲藍旗人世居葉赫地方努喀原任主事恩特初来歸原任協領其子額錫由閒散二次過北京征山東梯攻新泰縣第一登城克之賜巴圖魯號授騎都尉定鼎燕京時八山海關擊敗流賊馬步兵二十萬衆又取太原府屢敗賊衆敘恩詔加功加一雲騎尉三遇其子額爾碧襲職卒無嗣至一等輕車都尉卒其親伯之子柏爾赫圖襲職卒其子賴塔襲職年老告退其子都楞額襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉現任䕶軍參領又阿爾吉穆之孫柏赫圖原任員外郎曾孫納爾錫原任副都統齊格原任䕶軍校賴塔庫原任筆帖式索勒原任三等䕶衛元孫碩塔現任䕶軍參領伊拉齊原任三等䕶衛索海石格俱原任筆帖式四世孫綏靈現任待詔按阿爾吉穆與本旗同里色克山同族滿都國鑲藍旗人阿爾吉穆同族世居葉赫地方滿顔初来歸原任城門尉其子郭祿原任郎中原任䕶軍校孫碩祿原任防禦雅圖原任筆帖式六格原任員外郎舎圖渾原任三等䕶衛曾孫雅岱佛保俱原任典儀元孫德爾敏現任都察院副都御史德安現任員外郎德亮原任八品官德昌現任筆帖式富岱國正紅旗人世居葉赫地方佐領使統之其子布初率滿洲六十户来歸編爾蓀由佐領初圍錦州屢敗松山杏山兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆恩詔加敘功授騎都尉三遇其子慶安襲職任郎中縁至二等輕騎都尉卒事革退其兄兆善襲職歴任刑部侍郎卒其兄穆成額襲職歴任西安副都統卒其子綽竒襲恩詔所職歴任都統卒其兄之子穆林襲職時削去伊加之職承襲騎都尉現任佐領又富岱之孫圖原任倉塲侍郎穆舒由副都統從征湖廣擊敗賊偽將杜慧等兵二萬餘衆取湘隂縣歿于贈騎都陣以其子穆善承襲任佐領緣事革退其子穆尉思海現襲職又富岱之曾孫竒山原任協領兼佐領伊爾敦常昇俱原任筆帖式吳格現任員外郎兼佐領沙納海現任主事元孫墨爾格深原任協領兼佐領吴爾格深原任員外郎永保現任典籍又富岱之兄科備之子布鼐原任驍騎校孫懇特原任户部侍郎栢爾謄原任驍騎校雅清阿原任防禦曾孫三都原任主事齊林泰原任佐領吴濟拉石麟俱原任筆帖式石本泰現任䕶軍校元孫薩哈納由六品官從征四川於朝天關屢敗賊偽將王屏藩等兵十萬餘衆授雲騎尉續征雲南擊敗賊偽將王洪勲等兵數萬餘衆敘功優授為騎都尉兼一雲騎尉卒無嗣其親叔伍什巴襲職卒其姪鄂海現襲職又富岱之兄鄂爾衮之孫尼堪原任防禦曾孫黄茂原任驍騎校寧古塔現任驍騎校元孫五十六原任親軍校納星阿現任防禦四世孫務實現任中書齊賚吳爾清阿俱現任筆帖式又富岱之兄瑪爾岱之孫格爾特原任三等䕶衛曾孫錫爾門原任給事中錫林原任陜西巡撫錫住原任内閣侍讀學士伊爾錫原任筆帖式元孫希昌原任同知希深現任員外郎希順原任筆帖式希祿希成希春希敏希福俱現任筆帖式又富岱之兄鄂推之孫雅什泰原任防禦滿丕由閒散過北京征山東梯攻河間府第賜巴圖二登城克之尉三遇魯號授騎都恩詔加至二等輕車都尉緣事削去保住襲職卒其子恩詔所加之職仍授騎都尉卒其孫阿臨泰現襲職又鄂推之曾孫札爾都原任杭州副都統又富岱族姪正庫原任驍騎校瑚鍾額原任三等䕶衛族孫華色原任䕶軍校巴岱原任筆帖式瓦渾國正藍旗人世居葉赫地方廣敗賊偽將王國佐初来歸由䕶軍校從征湖等兵一萬餘衆續征雲南屢敗賊偽將何繼祖等兵於石門坎黄草壩卒後敘功贈騎都尉以其長子托色承襲卒其親弟之子舒爾德庫孫莽吉圖相繼承襲又瓦渾次子托絡原任倉官三子托和齊原任驍騎校瑚巴鑲紅旗人世居葉赫地方天聰時来歸原任頭等䕶衛其子吳蘇穆亦原任頭等䕶衛達深保原任八品官孫悟通保原任驍騎校卓爾輝原任頭等䕶衛曾孫瑚住富喀俱原任筆帖式印紫由八品官從征雲南屢立軍功授雲騎尉又征厄魯特噶爾丹在烏藍布通地方擊賊被創後創發卒加一雲騎尉授為騎都尉其子常綬孫雙保相繼承襲又瑚巴之元孫福住原任親軍校蘇彌納國正紅旗人世居葉赫地方刑部侍郎常綬原任初来歸其孫牛和訥原任䕶軍校綽爾門原任驍騎校曾孫鄂海原任三等䕶衛鄂善原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗英泰其子存柱原任䕶軍校孫托拉亦原任䕶軍校曾孫塔蘭太原任䕶軍參領兼佐領官保住現任防禦元孫八十七現任䕶軍校四世孫德竒現係監生岱祿其四世孫多鼐原任主事鄂鼐原任驍騎校五世孫鄂拜原任親軍校永愛原任筆帖式六世孫安保現任驍騎校瓦穆布原任䕶軍校其子和色原任親軍校孫能格原任筆帖式曾孫阿晉太現任䕶軍校彰海其子蘇魯原任驍騎校鑲紅旗岳隆果其子色圖原任䕶軍校孫福什寶原任筆帖式正藍旗費揚古其孫哲爾和圖原任驍騎校鑲藍旗色克山其曾孫蘇瑪拉原任驍騎校瑪什泰現任䕶軍校元孫滿徳現任藍翎侍衛按色克山與本旗同里阿爾吉穆同族以上俱世居葉赫地方係國初来歸之人鑲紅旗壘勒其子訥理原任典籍右世居葉赫地方係天聰時来歸之人各地方鄂卓氏哈爾松阿國正藍旗人世居輝發地方及遣往土黙特國俱初来歸由廢員從征大同有功授騎都尉初圍錦州擊敗松山杏山馬步兵又敗洪承疇三營步兵加一雲騎尉後任禮部理事官五載考察以任事有能授為三等輕車都尉遇恩詔授為二等輕車都尉卒其長子桑圖襲職遇擊賊恩詔授為一等輕車都尉後從征湖廣於茅麓山贈一雲陣亡以其子薩克信承襲卒其子黒色襲職卒騎尉恩詔所其子葉普肯襲職時削去尉卒其叔成朙襲職加之職承襲二等輕車都詔後軍時又削去職現襲三等輕車都尉又哈爾松阿功所得之之孫阿蘇由八品官從征雲南於石門坎黄草壩地方敗賊有功授雲騎尉卒無嗣其親弟之子鄂勇果現襲職又哈爾松阿之次子昻古岱原任二等䕶衛孫布爾賽原任盛京刑部侍郎喀岱原任三等䕶衛瑪賚原任筆帖式曾孫兆紫亦原任筆帖式廷鈕國正紅旗人世居黒龍江地方從征大同攻渾源初来歸其子善都蘭由閒散賜巴圖州首先登城克之遇魯號授騎都尉兩恩詔加至三等輕車都尉卒其孫普中現襲職又廷鈕之孫佛爾格原任郎中善都原任御史曾孫覺和托原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗安圖輝發地方人原任協領其孫桃岱原任御史瑚圖原任鳴賛曾孫覺柰原任七品官彌拉原任䕶軍校尼瑪岱原任筆帖式碩岱賴圖俱原任驍騎校元孫索諾穆現任䕶軍校岳貝輝發地方人其孫碩色原任主事三拜原任前鋒校曾孫禪拜蘇拜俱原任䕶軍校常達理原任驍騎校元孫赫達色現任步軍校達爾泰現係副䕶軍校官保哈達地方人其孫黒色原任步軍校曾孫雅爾太現任䕶軍校雅齊布哈達地方人原任筆帖式其孫賽璧漢原任驍騎校以上俱係國初来歸之人正黄旗札色理牙克薩城地方人其元孫老格現任六品官四世孫安泰原任筆帖式鑲紅旗瑚深布祿哈達地方人其子珠成額原任䕶軍參領阿帕漢原任頭等䕶衛孫佛僧原任博士伊瑪齊原任二等䕶衛覺和托原任筆帖式曾孫齊什現任驍騎校阿爾法輝發地方人其子色勒原任驍騎校鑲藍旗包衣納爾布烏喇地方人原任佐領噶達渾烏喇地方人原任六品包衣大以上俱係天聰時来歸之人正黄旗佳克丹牙克薩城地方人原任頭等侍衛其長子彌哈納原任前鋒校次子伊哈納原任員外郎第三子佳海原任牧長第四子西哈納原任前鋒侍衛孫雅爾泰佳吉布和善俱原任驍騎校西訥布原任藍翎侍衛曾孫色勒黒碩色俱原任驍騎校哈爾太阿齊納俱原任䕶軍校徳爾泰原任防禦勒徳理原任五品官長保現任驍騎校悟通保原任筆帖式元孫雅圖原任驍騎校黒達色現任防禦頗廉現任驍騎校達透原任員外郎覺和托輝發地方人原任頭等侍衛其長子瑚什布原任驍騎校第三子玖色原任佐領第四子費揚古原任郎中孫六勒原任驍騎校保柱原任䕶軍校赫雅圖原任筆帖式鑲紅旗外賛英額地方人其子薩爾圖原任䕶軍校孫𤓰顯亦原任䕶軍校巴達蘭原任典儀曾孫三格現任䕶軍校拉爾巴渾英額地方人其元孫存住原係副驍騎校四世孫四十勒現任驍騎校正藍旗包衣屯泰烏喇地方人其子法柰原任參領阿納岱原任佐領孫巴拉原任頭等䕶衛莊兒原任䕶軍校松果托原任四品典儀色和原任驍騎校曾孫鄂理齊現任藍翎侍衛鑲藍旗科對原籍無考其孫羅西原任佐領吉拉三姓地方人其子武晉泰原任驍騎校以上俱係来歸年分無考之人鈕赫勒氏鈕赫勒為滿洲一姓其氏族散處于沙濟等地方杜塔理國鑲黄旗人世居沙濟地方賊滅福王平定河南初来歸由閒散從征破流江南等處梯攻揚州府首先登城克之授雲騎尉三遇恩詔加至三等輕車都尉卒其子敦拜承襲後從征浙江於舟山擊敗偽總兵毛光祖兵三千餘衆偽英毅伯阮思領賊兵於海中乗船百餘隻迎戰又擊敗之斬偽總兵張興並奪其船得偽印一顆以功授二等輕車都尉卒其子杜什承襲卒其子福海襲職時削去恩詔所加之職承襲騎都尉卒其子明儒承襲卒無嗣親叔花善現承襲又杜塔理之曾孫武雲保原任䕶軍校青善國正紅旗人世居安褚拉庫地方軍校從征雲南初来歸其孫布爾哈由委署䕶貴州擊敗逆賊偽侯李成蛟偽將李定國等兵後從征四川於朝天關擊偽總兵石存禮兵陣贈為雲亡叙功子戴音達承襲卒其子長綬現襲職又騎尉其青善之曾孫西特庫原任䕶軍校元孫朱蘭泰原任副都統元保原任驍騎校四世孫三泰現任䕶軍校杜理布哈多弼鑲紅旗人世居英額地方来歸年分無考其四世孫巴布喀原任遊擊五世孫禪布原任陕西布政使德理原任三等䕶衛六世孫常鼐原任都統穆魯納現任杭州副都統查克丹原任郎中吳什納原任三等䕶衛瑚什納蕙蘭俱原任步軍校渾達瓦塔薩海俱原任驍騎校魯太原任典儀七世孫瑚班原任郎中噶齊喀原任副䕶軍參領英保原任三等䕶衛烏理現任三等䕶衛瑚思哈四格俱原任防禦雙頂原任典儀吳爾岱原任中書明德現任驍騎校穆克登布現係六品廕生常徳原任筆帖式常六現任䕶軍校蒙古爾岱國正藍旗包衣人世居輝發地方宗慎寶原任三初来歸其孫覺和托原任佐領等䕶衛瑚珠由六品典儀從征察哈爾布爾尼在大鹵地方屢敗賊衆以功授雲騎尉卒其子佛寶承襲又䝉古爾岱之曾孫達薩布海寶俱原任佐領轄䕶原任三等䕶衛以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗戴都沙濟地方人其孫瑚圖原任䕶軍參領曾孫六格原任典簿努占英額地方人其曾孫留勒原任驍騎校正黄旗孫扎齊郎佳地方人其子魯漢原任䕶軍校瑚同額原任任南苑總管孫托和齊原任頭等侍衛安柱原翼長蘇赫原任筆帖式曾孫阿思納亦原任筆帖式巴海原任侍衛什長正紅旗達布當阿安褚拉庫地方人其子董阿原任驍騎校孫遂並阿原任䕶軍校頗起安褚拉庫地方人其孫武尼泰原任䕶軍校曾孫常德現任䕶軍校阿哈善安褚拉庫地方人其孫老住原任䕶軍校鑲藍旗寧占鈕赫阿林地方人其元孫薩哈納現任親軍校以上俱係國初来歸之人鑲紅旗瑚什英額地方人其元孫烏蘭太原任典儀正藍旗塔朗鈕赫阿林地