body:
  text: 八旗滿洲氏族通譜卷三十五薩克達氏薩克達本係地名因以為姓其氏族散處於薩克達寧古塔及各地方薩克達地方薩克達氏國鑲藍旗人世居薩克達地方使綂之由佐領從初率兄弟同里來歸編佐領征商顔哈達及瓦爾喀什屢著軍績授二等輕車都尉又奮勇攻克瓦爾喀什附近等處有功賜祭葬優授為三等男尋擢置十六大臣之列卒闗擊如典禮諡壯敏其孫西特庫襲職入山海敗流賊馬步兵二十萬衆又於太原府延安府等處擊賊有功授為二等男任佐領卒其子常恩詔授綬襲職卒無嗣其親弟桑格襲職遇職任為一等男任佐領卒其子瑪哈理襲陵寢翼長卒其子舒保襲職時削去軍叅領兼佐領又恩詔所加之職承襲二等男原任䕶舒賽之長子西蘭因任事有能不違指使授騎都尉後破流賊滅福王平定河南江南等處屢恩詔授著戰功加一雲騎尉遇子阿蘭孫六十相繼承為三等輕車都尉卒其襲六十卒其子滿都襲職卒其親叔之子七十三襲職任佐領卒無嗣其親伯祖之曽孫舒鼐恩詔所襲職時削去騎都尉兼一雲騎尉現任都司又加之職承襲舒賽之次子西巴理原任三等䕶衞第三子西爾泰原任佐領孫沙軍原任三等䕶衞倭赫陳原任郎中叅領兼佐領鄂爾禪原任知府納爾泰原任員外郎額密德原任郎中達布海原任陵寢翼佐領拉布海原任現任三等䕶衞納邁現任䕶長兼佐領瑪布海軍叅領曽孫達漢泰岱優俱原任佐領色赫臣原任員外郎兼佐領四十八原任副叅領兼佐領博海原任佐領石亮現任包衣叅領兼佐領福柱祥保俱現係庫使恩保現任佐領元孫三達色現任佐領四世孫舒圖原任贊善舒德現任三等䕶衞舒啟現係七品廕生五世孫西靈阿現任佐領按舒賽與本旗同里巴爾泰瑚穆齊隨瑚禄卓博輝舒漢等同族陶拉國鑲黄旗人世居薩克達地方來舒俱原任筆帖初來歸其元孫圖克善圖頼式四世孫瑪爾賽原任給事中實色原任防禦本婁現任驍騎校索柱由閒散從征浙江福建賜巴圖等處梯攻泉州府首先登城克之綂領因病告魯號授三等輕車都尉歴任前鋒退其子圖拉襲職卒其子德明現襲職又陶拉之五世孫多倫原任驍騎校多思渾原任筆帖式五格賽通阿俱現係監生多來現任三等侍衞布舒庫國正紅旗人世居薩克達地方擊敗松山賊兵破初來歸其孫慧山由䕶軍校流賊滅福王平定河南江南等處屢著軍績後於潼闗擊賊被創陣亡贈雲騎尉以其子長舒承襲遇墨襲職卒其子素秦襲思詔授為騎都尉卒其弟蘇魯職卒無嗣其叔曽祖之子鄂色襲職任給事中卒其子恩泰現襲職鈕赫國正紅旗人世居薩克達地方騎校曽孫英額額初來歸其子鄂敏多原任驍赫俱原任䕶軍校色黒色赫布俱原任前鋒校韓竒原任郎中常猷原任城門尉赫碩色鈕格俱原任四品典儀胡琥由䕶軍叅領從征厄魯特噶爾丹在烏藍布通地方擊賊被創後創發贈雲騎卒以其子費蘇禄承襲卒其子察林襲職現任尉䕶軍叅領又鈕赫之元孫堪泰原任䕶軍叅領陳泰原任七品官倭赫原任䕶軍校瓦爾達原任步軍校外山原任三等䕶衛塔爾碧喜卓林泰俱原任驍騎校巴什現任防禦四世孫湛濟蘭原任員外郎偏圖原任驍騎校彰柱原任䕶軍校珠林齡住俱原任筆帖式羅泰原任防禦五世孫丑格現任鳴贊金泰由前鋒校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子倭昇額現襲職雅鼐國鑲黄旗人世居薩克達地方官其子郎希屯泰初率兄弟族人來歸授備禦賽音布俱原任佐領孫希佛原任郎中吉泰原任主事吳囊阿原任郎中兼佐領察拉濟拉山俱原任筆帖式額特原任防禦色特原任䕶軍校保喜原任三等侍衞曽孫常書原任吏部侍郎兼佐領彰柱舜岱吉慶和俱原任筆帖式鶴舒原任二等侍衞希良原任員外郎延思原任驍騎校吳爾春原任三等侍衞瑪哈達原任郎中禪岱原任同知德成原任給事中常存由䕶軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子德福現襲職又雅鼐之元孫常春原任員外郎思特原任藍翎侍衞樂克山原係進士殷特富克善拉什泰俱原任筆帖式常安圖現任司庫温泰現任主事燕泰現任副䕶軍叅領堪福現任步軍校圖爾泰現任䕶軍校阿爾泰現任佐領楊柱現任筆帖式瑪什泰現係監生四世孫額色理原任筆帖式常齡現任御史兼佐領常能現任郎中納親福德俱現任筆帖式武靈阿現任内閣學士兼禮部侍郎五世孫海安現任筆帖式海寧現係監生又雅鼐親兄阿蘇渾占之曽孫四格原任驍騎校伯精原任二等侍衞元孫闗柱原係副䕶軍校又雅鼐親弟伊蘭珠之子琦理原任䕶軍校孫席山原任郎中烏達海原任䕶軍校曽孫新保原任倉場侍郎納海原任䕶軍叅領納爾泰翁愛俱原任筆帖式鄂穆布原係舉人元孫阿金泰原任翰林院庶吉士雅爾泰德啟訥阿穆布俱原任筆帖式德昇額原係庫使席蘭泰現任筆帖式席密圖現係監生富昌現任大使多徳現任郎中四世孫明道明貴俱原任筆帖式多禄清德俱現係監生又雅鼐親伯陳都爾恒之曽孫禮邁禮成俱原任筆帖式禮貴原任郎中元孫常海富拉塔殷太俱原任筆帖式伊思哈賽音達理俱原任員外郎七格原係監生四世孫七星保現係監生納蘭大現任驍騎校塔善太現任防禦又雅鼐伯祖徳特訥巴克什之四世孫華色雅哈禮達岱俱原任驍騎校圖清額原任筆帖式佛保原任藍翎侍衞呉達納由䕶軍叅領從征雲南有功授雲騎尉卒其子五聖保現襲職五世孫六格原任給事中六世孫金忠現任筆帖式松西國鑲黄旗人世居薩克達地方鑾儀衞鑾儀使觀初來歸其元孫穆成額原任音布原任御史瑚什巴原任叅領四世孫朱蘭太博和理俱原任員外郎栢爾赫原任頭等侍衞侍衞班領什格瑚爾啟俱原係監生福存原任筆帖式朱蘭泰原任步軍校遜保原任䕶軍叅領五世孫倫岱原任郎中本岱佛爾謄安昇俱原任筆帖式博爾勤謙紫俱原係監生博爾騰原係生員六世孫伊昌阿登額圖俱原任筆帖式納郎阿現任中書特克慎現任三等侍衞阿克敦現係監生以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗岱同其孫阿普達理原任䕶軍校曽孫萬泰古爾瑪鴻俱原任䕶軍校布爾山原任驍騎校元孫遜達原任䕶軍校四世孫巴蘭泰原任步軍副尉鑲藍旗巴爾泰舒賽同族其曽孫雅瑚原任佐領謨爾渾原任郎中元孫常明原任歩軍校瑚穆齊舒賽同族原任䕶軍校其子胡穆拜原任郎中玉穆拜原任驍騎校孫蒼鼎原任八品典儀隨瑚禄舒賽同族其曽孫岳爾岱原任郎中卓博輝舒賽同族其子舜岱原任䕶軍校舒漢舒賽同族其曽孫鐘吉原任驍騎校瑪拉原任御史其子碩賔原任筆帖式常綬其孫圖爾丕原任驍騎校曽孫珠瑪理原任博士邁圖原任員外郎元孫珠三泰原任筆帖式墨竒原任三等䕶衞四世孫蒼密逹原任䕶軍校郎徳現任驍騎校邁思哈現任筆帖式薩齊庫原任驍騎校其孫和和諾原任驍騎校伊賽現任步軍校曽孫伊拉齊現任驍騎校邉塔哈現任内閣侍讀渾他哈原任三等䕶衞哈爾吉達其元孫和濟理原任驍騎校包衣依喇齊其曽孫臧喜盛臧喜敏臧喜柱俱現係生員臧喜賢現係貢生拜誠現係廩生元孫臧誠現係生員以上俱世居薩克達地方係國初來歸之人正黄旗訥庫其曽孫薩爾圖原任驍騎校元孫五格原任郎中來格原任城門尉増官原任佐領蘇瓦顔其孫伊圖原任城門尉曽孫六十原任五品官鑲藍旗包衣拉庫其孫福成現係生員以上俱世居薩克達地方係天聰時來歸之人鑲藍旗吳登額其曽孫瑪爾泰原任䕶軍校右世居薩克達地方係來歸年分無考之人寧古塔地方薩克達氏費岳爾渾國鑲紅旗人世居寜古塔地方爾達綂之其弟烏初來歸編佐領今其曽孫喀爾虎原任協領元孫穆爾泰原任副都統兼佐領察哈泰原任大子少保䕶軍綂領兼佐領得什圖原任步軍校得松額原任六品官蓀卓絡原任郎中四世孫巴爾遜原任二等䕶衞常岱原任䕶軍叅領兼佐領德密德原任主事額松額原任步軍校碩色原任親軍校五世孫阿爾遜原任佐領常鼐由䕶軍叅領兼佐領從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉以其子常魁承襲現任佐領又費岳爾渾之六世孫常有原任䕶軍校按費岳爾渾與本旗那木都魯地方業古徳同族伊拉齊國鑲黄旗人世居寧古塔地方綂領往征凖噶爾初來歸其曽孫阿岱由前鋒有功授雲騎尉現任都統查拉芬現係六品廕生元孫安崇阿現任二等侍衞永徳現任藍翎侍衞公泰國鑲紅旗人世居寜古塔地方孫納親由䕶軍校初來歸其子三格原任佐領從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子額爾登額現襲職蘇赫臣國正黄旗人世居寧古塔地方軍校達蘭泰原任初來歸其孫音達理原任䕶驍騎校曽孫哲魯原任步軍校竒泰原任步軍副尉巴郎阿原任藍翎侍衞雅齊納原任副都綂莽吉圖原任䕶軍校元孫竒賚原任歩軍副尉雅賚原任五品官雅齊蘭原任員外郎鐘延原任筆帖式田存現任驍騎校佛爾格現任三等侍衞齊克騰現任䕶軍校四世孫鐘德元原任䕶軍校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲紅旗郭和濟其孫圖瑚訥原任防禦曽孫穆成額原任親軍校瑪琥原任筆帖式布占原任步軍校元孫富赫善原係委署䕶軍校惠成原任中書石柱原任主事四世孫鄂禮原任親軍校托保騷達色俱原任䕶軍校謨爾渾原任驍騎校赫雅圖原任協領巴什現任驍騎校五世孫石揚原係副驍騎校黑達色原任三等䕶衞羅山現係副䕶軍校羅賢現係生員六世孫赫圖現任䕶軍校右世居寧古塔地方係國初來歸之人鑲紅旗殷達渾其曽孫雅爾泰原任䕶軍校元孫旒保住原任防禦四世孫徳保原任典儀索竒其曽孫全保現任防禦以上俱世居寧古塔地方係來歸年分無考之人各地方薩克達氏葉古德鑲紅旗人世居那木都魯地方來歸年分無考原任都綂其子希佛由兵部理事官因考察稱恩詔加職授雲騎尉三遇從征四川於漢中府等處屢至三等輕車都尉敗賊衆又征太原府於左衞地方擊賊被創後創發卒贈一雲騎尉授為二等輕車都尉歴任都綂卒其子科爾昆襲職由副都綂往征雲南貴州等處敗賊李定國等兵數萬餘衆續征陜西於金水河地方擊偽總兵彭世桓等兵陣亡贈騎都尉兼一雲騎尉授為三等男以其子蓀札齊承襲後修陵寢議叙又加一雲騎尉授為二等男歴任户部尚書縁事革退其子瑪什泰襲職時削去恩詔並議叙所加之職承襲二等輕車都尉卒其弟安泰襲職時又削去希佛陣亡所加之雲騎尉現襲三等輕車都尉又葉古徳之元孫瑪占原任任員外郎又葉古徳親伯都爾渾之孫托羅輝原二等䕶衞曽孫賴多原任三等䕶衞熊武原任佐領黒色原任親軍校元孫羅泰舒泰俱現任佐領按葉古德與本旗寧古塔地方費岳爾渾同族渾達理國鑲黄旗人世居阿庫里河地方什巴原任驍騎初來歸其孫花色原任防禦琥校曽孫佛保現任步軍校元孫伊竒理現任驍騎校又渾達理之親弟哲琨之子英額由閒散初次過北京征山東梯攻即墨縣首先登城克之賜巴圖魯號授騎都尉定鼎燕京時入山海闗擊敗流賊馬步兵二十萬衆又追至慶都縣敗之叙功恩詔加加一雲騎尉卒其弟瓦納哈襲職三遇襲職卒至一等輕車都尉卒其兄之子業穆特其子滿丕襲職縁事革職未襲滿丕之姪雅圖納原任六品官又渾達理之弟葉庫訥之孫常薩原任驍騎校曽孫哈達漢現任防禦老格現任䕶軍校