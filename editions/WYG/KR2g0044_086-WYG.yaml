body:
  text: 八旗滿洲氏族通譜目録卷四十三喜塔臘氏昻果都理巴顔薩璧圖禪察都都孔郭羅阿塔布爾海艾蘇愛圖喀圖雅齊岳羅瑚桑阿以上俱有傳郎吉納巴星阿畢業素穆哈納業成格雅爾拜額圖理阿寧達理温普溫達錫瑪爾漢喀柱楊崇阿騰果班布理蘇瓦顔扎蘇伊克賽哈克薩哈錫特庫羅克索托布理那爾泰遜塔瑪拉布舒庫穆謄瑚錫圖德䝉額岱蘇塞德理以上俱附載秦楚魯氏卓和諾右係有傳哈柳克馬克圖貝努以上俱附載性佳氏福瑚巴都理剛格以上俱有傳性操宗和德漢都三丹倫圖鼐琥索羅喜賴塔以上俱附載穆爾察氏尼揚達扎努喀以上俱有傳拜穆哈佛訥亨外色納塔濟福拉塔塔克圖以上俱附載
  hash: sha256:b5cec1571a57482de49c048aa2c0b42c8253150984d74659f1c841a0dc126188
