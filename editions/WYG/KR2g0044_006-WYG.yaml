body:
  text: 八旗滿洲氏族通譜卷二安褚拉庫地方瓜爾佳氏碩翁科洛巴圖魯勞薩國鑲紅旗人世居安褚拉庫地方授三等輕車都初來歸由閒散攻克遼東叙功尉又征多羅特凱旋授為二等輕車都尉初次往北京為大軍前哨畧敵有功授為一等輕車都尉取大凌河屢擒敵哨征錦州越衆擊眀監軍道張春前隊兵引纛直入大獲全勝授為三賜碩翁等男巴圖魯號設佐領使統之圍錦州擊敗松科洛山兵征朝鮮及察哈爾等處屢著戰功過北京征山東入邊之日擊敗墻子嶺騎兵又敗眀兩處伏兵斬千總一員又破吳總兵馬步兵八千餘衆叙功授為二等男尋陞前鋒統領三圍錦贈為三州擊洪承疇三營兵陣亡優等子順治十二年世祖章皇帝以碩翁科洛巴圖魯勞薩驍勇過人當太祖太宗時每行兵必為前鋒擒哨破敵累著殊勲焉其子賜諡忠毅照一品大臣例立碑於墓用傳不朽恩詔晉程尼承襲三等子三遇臣後征湖南在衡州府封為一等伯擢議政大贈一雲擊賊陣亡加又碩翁科洛巴圖魯勞薩之弟羅騎尉諡誠介璧初由佐領圍錦州屢敗杏山松山馬步兵又破洪承疇三營兵身被八創叙功授騎都尉定鼎燕京時入山海闗擊敗流賊馬步兵二十萬衆又招撫鳯翔等五府加一雲騎尉三遇恩詔加至一等輕車都尉後因伊親兄之子程尼陣亡無嗣将程尼所襲之一等伯兼一雲騎尉亦令羅璧承襲晉封為二等公擢議政大臣少保兼太子太保卒其子順保分襲一等伯兼一雲騎尉孫雅布拉分襲一等輕車都尉順保卒其子奇通額襲職因病告退其子欽拜襲職現任青州將軍雅布拉卒其弟碩岱襲職卒其子永泰襲職卒其弟額洛圖襲職現任奉天将軍羅璧之孫倭赫原任㕘領兼佐領岳岱原任副都統兼佐領曽孫羅雲碧原任筆帖式遜拜現任三等侍衛侍衛什長兼佐領元孫顧寜阿現任四品官岳成額現任佐領伊章阿現係廕生又碩翁科洛巴圖魯勞薩親伯唐務之孫葛柱原任三等䕶衛曽孫顧普察由䕶軍叅領從征陜西贈雲騎在平凉府擊王輔臣兵陣亡徳襲職卒其子闗尉因無嗣其親弟之子錫門徳現襲職唐務之元孫三達理現任副䕶軍叅領又碩翁科洛巴圖魯勞薩族姪齊蘭布都隆額塞赫徳俱原任郎中阿南泰原任城門尉董錫庫原任三等䕶衛納塔哈原任䕶軍校薩穆哈瑚什巴俱原任驍騎校和善由䕶軍校從征貴州回兵時遇海寇鄭成功兵擊敗之授雲騎尉任佐領卒其子僧保襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為騎都尉卒其子徳興額現襲職又碩翁科洛巴圖魯勞薩族孫尚吉納原任員外郎阿哈納普善俱原任防禦巴哈納星額理俱原任典儀錫平原任郎中齊格原任委署副都統花色原任步軍校蘇瑪拉原任步軍副尉覺禪原任驍騎校吴三泰原任䕶軍校曽孫常徳綬原任户部侍郎占布原任佐領金泰現任筆帖式占柱現任御史元孫赫色布現任主事福海常格赫深眀善俱現任筆帖式按碩翁科洛巴圖魯勞薩與鑲黄旗蘇完地方費英東扎爾固齊正白旗包衣同里阿濟納本旗瓦爾喀地方察爾圖等同族王柱鑲紅旗人世居安禇拉庫地方天聰時偕弟王吉努及族人同里來歸設佐領令王吉努之子圖赫統之孫賽拉原任典儀馬克札由䕶軍叅領定鼎燕京時入山海闗擊敗流賊馬步兵二十萬衆復追至慶都縣敗之後取太原府擊敗賊田總兵等兵叙功授雲騎尉三遇恩詔加至三等輕車都尉卒其子馬克沙襲職縁事削革其親叔之孫來格襲職任佐領卒其子穆爾恩詔所占襲職時削去騎尉現任二等䕶衛又王吉努加之職承襲雲之孫夸瞻由佐領定鼎燕京時入山海闗屢敗流冦叙功授騎都尉後任吏部理事官五載考恩詔加績加一雲騎尉三遇其子拉占襲職任佐領從至一等輕車都尉卒贈一雲征浙江在武功山擊賊偽将劉國軒兵陣亡加騎尉其子拉奇襲職卒其親兄之子魯爾占襲恩詔所職時削去襲三等輕車都尉現任佐領王吉努加之職承之曽孫七十原任步軍校元孫馬海原任副都統兼佐領又王柱之子達揚阿原任佐領孫鄂瑪尼原任二等䕶衛阿楊阿原任郎中兼佐領曽孫顧爾哈原任郎中雅圖原任佐領常保原任典儀元孫庫爾騰吴爾騰俱原任三等䕶衛拉蘇現任佐領兼散騎郎四世孫札普山勒敏俱現任筆帖式又王柱族孫顔太原任驍騎校齊勒現任佐領釋迦保現任三等䕶衛滿珠鑲紅旗人王柱同族世居安褚拉庫地方天聰時來歸任前鋒校其孫兆泰原任員外郎眀倫現任典儀曽孫眀徳原任筆帖式巴什由䕶軍校從征雲南於石門坎黄草壩地方擊敗賊偽将何繼祖等兵叙功授雲騎尉後征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為騎都尉任協領卒其子巴爾塞襲職任佐領卒其親兄之子阿爾蘇現襲職又滿珠族姪常在原任前鋒㕘領族孫吉爾泰原任防禦圖理原任三等䕶衛尚泰原任驍騎校族曽孫揚保亦原任驍騎校族元孫博理現任驍騎校馬克都鑲紅旗人世居安褚拉庫地方天聰時來歸其曽孫瑚密色原任大理寺卿多薩納原任郎中元孫瑚山由筆帖式從征厄魯特噶爾丹在烏爾輝河地方擊賊陣亡贈雲騎尉其子瑚爾啟襲職卒無嗣其叔祖之子闗保現襲職又馬克都親兄科普屯之四世孫伊蘭泰現任筆帖式親弟馬唐阿之孫穆瑚達原任佐領哈什希原任三等䕶衛曽孫殷泰由防禦從征厄魯特噶爾丹奮勇破賊有功授雲騎尉厯任四川陜西總督卒奉㫖殷泰自西安兵丁効力行走征戰亦多朕巡幸西安時殷泰漢仗好人去得朕知其人由㣲員漸用至文武極品大臣自任用以來居官亷潔且漢官俱稱主子如何知道此人無不驚異殷泰做官果然清亷果然好将伊承襲之一次雲騎尉著世襲罔替欽此其子瑚錫霸襲職卒其親弟之子瑚松阿現襲職馬唐阿之元孫哈清阿現任佐領哈山現任筆帖式又馬克都親叔布爾圖喀之元孫五十八原任三等䕶衛和托國鑲藍旗人世居安褚拉庫地方其子葉克承襲初來歸設半個佐領使統之卒縁事革退曽孫莽愛原任助教元孫英愛現任驍騎校四世孫巴杭阿原任中書又和托親兄吴勒穆之元孫觀音保原任副都統又和托伯祖穆齊喀之元孫瑚爾桑阿由佐領從征四川陜西於盤龍山及秦州地方屢著軍功授騎都尉卒其子羅和善孫羅正相繼承襲又和托叔祖阿鈕之曽孫碩穆科原任給事中元孫順安碩山俱原任郎中碩占原任筆帖式碩林現任驍騎校四世孫碩啟現任助教徳克進圖現任筆帖式五世孫朱隆阿現任鳴賛魏班正白旗包衣人世居安褚拉庫地方來歸年分無考其子揚武原任䕶軍統領曽孫顔拜由委署䕶軍校從征浙江福建於諸暨縣擊敗賊首王宗仁等兵二千餘衆後在泉州府祖頭山擊贈騎都賊陣亡優綬賴岱孫徳格相繼承襲又魏班之尉其子常元孫雅圖現任叅領僧保現任驍騎校按魏班與鑲黄旗包衣哈達地方塔本烏喇地方瓦爾喀等同族安楚達正藍旗人世居安褚拉庫地方來歸年分無考其元孫布爾海原任驍騎校索鼐由䕶軍校從征四川扵朝天闗擊敗賊偽總兵石存禮等兵後在張飛廟擊賊陣亡贈雲騎尉其子保柱襲職卒其子星眀現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗鄂碧其孫班泰原任步軍校曽孫巴鼐原任城門尉瑚圖原任䕶軍校存住原任驍騎校元孫闗保柱原任郎中邦圖原任七品官鑲藍旗尼堪其元孫岳色原任防禦鄂尚納林俱原任驍騎校三台原任䕶軍校四世孫鄂靈阿現任三等䕶衛常禄現任䕶軍校拉都理其子農山孫松庫理俱原任驍騎校元孫都喀原任三等䕶衛色古徳其孫安崇阿原任驍騎校曽孫阿納布彌陀保俱原任典儀阿爾賽現任前鋒校元孫久常永常俱現任筆帖式葢都其元孫闗泰原任䕶軍校以上俱世居安褚拉庫地方係國初來歸之人正白旗包衣阿濟納其子花善原任佐領孫蘇麻拉原任協領曽孫倭升額原任防禦按阿濟納與鑲紅旗同里碩翁科洛巴圖魯勞薩同族正紅旗夸色其子那爾泰原任頭等䕶衛錫爾泰原任防禦孫外都原任䕶軍校班都現任佐領浩善現任驍騎校索理夸色同族其孫赫達資現任七品官鑲紅旗唐章阿其元孫愛塔哈原任中書柴莽阿原任驍騎校四世孫雅柱原任筆帖式葢柱原任典儀九塞原任驍騎校五世孫多羅原任防禦薩郎阿現任驍騎校六世孫姜海原任貟外郎富倫現任筆帖式輝雅其曽孫八十七原任三等䕶衛錫爾門其曽孫雅爾楚現任驍騎校以上俱世居安褚拉庫地方係來歸年分無考之人尼馬察地方瓜爾佳氏尼唐阿國鑲藍旗人世居尼馬察地方使統之其弟尼努初率兄弟同里來歸設佐領以任事有能不違􅃌使授騎都尉從征黑龍江有功加一雲騎尉卒其子根特襲職定鼎燕京時入山海闗擊敗流賊馬步兵二十萬衆復追至慶都縣敗之授為三等輕車都尉三遇恩詔加至一等輕車都尉兼一雲騎尉征湖廣於荆州府擊敗賊兵征山西攻芮城縣指麾克其城斬賊二萬餘獲偽印九顆又敗偽閣老李建泰偽都督郭宗傑等兵二萬餘衆又於蒲州地方擊敗賊衆生擒賊渠魏登芳又敗賊偽帥栢靖兵陣斬栢靖駐防西安府擊敗賊首方國成兵續征湖南擊敗賊孫可望馬步兵扵岔路口叙功授為三等男征浙江舟山擊敗賊偽英毅伯阮思等兵於海上恢復舟山優授為一等男厯任都統議政大臣卒賜祭𦵏如典禮諡㐮壯其子格圖肯襲職縁事革退其親兄之子瑪沙襲職時削去恩詔所加之職現襲一等輕車都尉兼一雲騎尉又尼努之孫海蘭由六品官從征湖廣在永興縣擊贈雲騎賊陣亡其親伯之子格本額襲職任佐領卒其尉無嗣子佛寜現襲職又尼努之孫都庫原任䕶軍叅領都爾哈原任三等䕶衛都爾蓀原任郎中古蘇古爾哈俱原任佐領格思特現任佐領曽孫瑪拉古爾班古爾渾俱原任佐領董阿賴原任郎中額森布現任佐領元孫蘇札漢亦現任佐領穆赫林現任主事按尼唐阿與本旗瓦爾喀地方俄孟額同族奇唐阿國正黄旗人世居尼馬察地方户部侍郎徳和得初來歸其元孫賽璧漢原任由䕶軍校從征江西湖廣屢著軍功後征厄魯特噶爾丹在烏藍布通地方擊賊陣亡贈雲騎尉其子白雅圖孫朱三保相繼承襲又奇唐阿之四世孫艾碧納原任䕶軍校五世孫佛保住原任三等侍衛達爾巴齊國鑲藍旗人世居尼馬察地方筆帖式六世孫韓初來歸其五世孫善住現任奇現任驍騎校闗景現任筆帖式羅密由委署防禦從征凖噶爾在和通呼爾哈腦爾地方擊贈雲騎賊陣亡都爾松阿現襲職尉其子翁果春國鑲藍旗人世居尼馬察地方鄂鼐原任親軍校初來歸原任䕶軍叅領其子孫常綬原任禮部尚書曽孫鍾奇現任郎中常禄現任助教以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗薩穆哈原任防禦其孫悟通保亦原任防禦曽孫保濟現任䕶軍校鑲白旗伊桑阿其元孫常住現係副䕶軍校包衣殷達渾其子赫達色原任四品典儀孫佟錦原任司庫正藍旗岱音布其子烏禮原任防禦推布訥其元孫旒思原任主事花色原任䕶軍校四世孫穆顯原任筆帖式鑲藍旗綬楞額其五世孫索羅禧原任防禦哈鍾阿原任佐領阿拜原任䕶軍校六世孫羅密原任御史鄂奇原任佐領胡什巴原任迎送官洪愛原任步軍校遜積徳原任䕶軍校官欽現任員外郎七世孫幹資存柱吳晉泰俱原任步軍校鄂敏現任給事中富爾敦現任防禦闗東現任䕶軍校杭吉達現任五品官玉麟現任筆帖式八世孫富森布原任鳴賛伊那海現任驍騎校鄂爾博鄂爾多鄂岳奇俱現任筆帖式興泰常泰俱現任鳴賛殷達渾章色其孫伊巴