body:
  text: 八旗滿洲氏族通譜目錄卷五十七蒙鄂索氏福哈察馬海西特庫額爾吉訥察庫邁瑪理綏哈倭赫塔克圖瑚什塔薩察氏伊爾善喀爾濟善巴米達納爾拜瑪星阿輝特濟伯騰柱邁堪達斯環錫墨勒氏方喀拉蘇普庫敦多竒雅塞遲資薩爾都東阿布尼雅瑚理阿哈那劉佳氏劉尚彩濟拉密穆當額庫蘇理巴彦圖劉志桓布希博爾圗克阿魯果爾吉氏艾新保蘇爾泰阿都阿爾布哈爾圖舍愛圖武佳氏杭愛達清阿茂岱霞穆岱舒倫鄂謨克圖佟鄂絡氏札克丹倭濟花林泰開喀阿爾賽郭佳氏嘉郎阿納親瑚理常格偉禮梅赫理氏吳蘇勒阿寧阿齊瑪哈巴爾嘉達禮庫瑚錫理氏索爾賓浩金柱温岱巴爾圖䝉古楚氏鄂松果巴錫瑚塔善瑚什屯崇吉喇氏鍾泰札普玖僧庫貝赫訥額爾赫氏綽拜鄂爾多瑪穆喀理額爾錦布雅穆齊氏齊松阿尼喀那貴勒赫訥努都理氏阿穆清阿圖斯灣春布爾岱布爾圖理倭勒氏喀察察哈岱錫爾祜布顔圖尼陽尼雅氏滿圖瑚格爾布鄂理葛普克專塔氏哲中額艾塔額爾松格布達喇氏克圖納穆竒善旒庫葉赫勒氏穆濟通色阿爾賽朱佳氏吳爾嘉齊塞特拉綽瑚雅拉氏塞爾圖阿爾楚阿進泰鄂蘇爾瑚氏兆哈訥勒納瑚爾岱羅佳氏瓦善當色薩爾泰敖拉氏巴克塔喀覺和托農門瓦色氏色本拜圖齊爾庫朱爾根氏内圖根梅當阿吳爾達哈爾察氏瑪韶布拉馬布布尼氏布明圖僧古理綏哈高佳氏格林泰巴斗莽色葉赫氏清搆雅起布索理巴理氏達蘇雅圖布顔圖孫佳氏薩晉布拉山晉忠喀爾沁氏渾齊岱哈阿錫坦翰顔氏岱塔多渾喀顔巴圖烏蘇理氏卓克錫旺嘉努安泰尼佳氏錫珠蘭碩果禮玉資書瑪理氏鶴善赫勒孔凱欽定四庫全書八旗滿洲氏族通譜目錄卷五十七蒙鄂索氏福哈察馬海西特庫額爾吉訥察庫邁瑪理綏哈倭赫塔克圖瑚什塔薩察氏伊爾善喀爾濟善巴米達納爾拜瑪星阿輝特濟伯騰柱邁堪達斯環錫墨勒氏方喀拉蘇普庫敦多竒雅塞遲資薩爾都東阿布尼雅瑚理阿哈那劉佳氏劉尚彩濟拉密穆當額庫蘇理巴彦圖劉志桓布希博爾圗克阿魯果爾吉氏艾新保蘇爾泰阿都阿爾布哈爾圖舍愛圖武佳氏杭愛達清阿茂岱霞穆岱舒倫鄂謨克圖佟鄂絡氏札克丹倭濟花林泰開喀阿爾賽郭佳氏嘉郎阿納親瑚理常格偉禮梅赫理氏吳蘇勒阿寧阿齊瑪哈巴爾嘉達禮庫瑚錫理氏索爾賓浩金柱温岱巴爾圖䝉古楚氏鄂松果巴錫瑚塔善瑚什屯崇吉喇氏鍾泰札普玖僧庫貝赫訥額爾赫氏綽拜鄂爾多瑪穆喀理額爾錦布雅穆齊氏齊松阿尼喀那貴勒赫訥努都理氏阿穆清阿圖斯灣春布爾岱布爾圖理倭勒氏喀察察哈岱錫爾祜布顔圖尼陽尼雅氏滿圖瑚格爾布鄂理葛普克專塔氏哲中額艾塔額爾松格布達喇氏克圖納穆竒善旒庫葉赫勒氏穆濟通色阿爾賽朱佳氏吳爾嘉齊塞特拉綽瑚雅拉氏塞爾圖阿爾楚阿進泰鄂蘇爾瑚氏兆哈訥勒納瑚爾岱羅佳氏瓦善當色薩爾泰敖拉氏巴克塔喀覺和托農門瓦色氏色本拜圖齊爾庫朱爾根氏内圖根梅當阿吳爾達哈爾察氏瑪韶布拉馬布布尼氏布明圖僧古理綏哈高佳氏格林泰巴斗莽色葉赫氏清搆雅起布索理巴理氏達蘇雅圖布顔圖孫佳氏薩晉布拉山晉忠喀爾沁氏渾齊岱哈阿錫坦翰顔氏岱塔多渾喀顔巴圖烏蘇理氏卓克錫旺嘉努安泰尼佳氏錫珠蘭碩果禮玉資書瑪理氏鶴善赫勒孔凱
