body:
  text: 八旗滿洲氏族通譜卷十六葉赫地方舒舒覺羅氏碩翁科洛巴圖魯圖魯什國鑲黄旗人世居葉赫地方順口石山站等處斬初來歸授騎都尉哨探旅獲甚衆後征大安口城力戰克之由遵化進發擊敗薊州兵又破總兵滿桂等兵四萬餘衆復率四十人哨探通州擊敗敵將二員獲馬八十七匹時明兵駐營京城北門外圖魯什乗夜破其營擒叛賊愛塔斬之叙功授為二等輕車都尉緣事降為騎都尉征大凌河擊敗錦州兵明監軍道張春率兵來援復擊敗之是夜又擊張春營八旗兵盡為所阻圖魯什獨率兩纛衝入大破之叙功擾授為三等男擢前鋒統領後征大同殁於陣贈為三等子復追魯號謚忠宣其長子巴世泰襲職三賜碩翁科洛巴圖恩詔優遇為一等伯後任侍衞班領時蒙古侍衞索尼加世祖章謀逆忌其忠勇刺殺之皇帝深加軫念特恩追封為三等侯令其子桑格承襲任内大臣管鑾儀衞事卒其子偏圖襲職任散秩大臣卒其親恩詔所弟郎圖襲職時削去卒其親弟之子納爾泰現加之職承襲一等子襲職又碩翁科洛巴圖魯圖魯什次子拉什泰原任頭等侍衞孫博爾屯原任叅領兼佐領曾孫寶雲原任三等侍衞兼佐領武世寶現任佐領元孫兆榮亦現任佐領兆善現係廕生費揚古鑲黄旗人碩翁科洛巴圖魯圖魯什之弟也由佐領督牧恩詔上駟院馬匹効力多年授騎都尉三遇勞績優授加至二等輕車都尉後又叙從前牧馬為二等男厯任内大臣刑部尚書加太子太保後緣事獲罪革去世職尋白其寃抑復授二等男令其第三子色赫承襲任前鋒叅領兼佐領卒其子塞克圖襲職任佐領卒其子巴格襲職恩詔所時削去承襲一等輕車都尉現任鑾儀衞鑾儀加之職使又費揚古之長子巴晉泰原任工部侍郎次子薩哈廉第四子尼堪俱原任䕶軍叅領第五子倭赫原任頭等侍衞兼佐領孫阿玉璽六十俱原任員外郎羅明原任筆帖式曾孫赫格伊拉齊俱原任筆帖式元孫齡德齡昌俱現任筆帖式赫星現任佐領四世孫羅多和現任六品官禪禪正黄旗人世居葉赫地方天聰時來歸其孫碩爾琨由閒散二次往北京出邉之日殿後有功征山東攻無極縣首先登城克之授雲騎尉後圍錦州時殁於陣無嗣其親弟雅爾布襲職定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆授為騎都尉三遇恩詔加至二等輕車都尉卒其子雅爾哈襲職卒其子邁圖襲職緣事革退其親伯之孫花尚阿襲職恩詔所時削去現襲騎都尉又禪禪之曾孫雅住原任加之職二等侍衞瑪鼐原任佐領索柱原任驍騎校元孫進海原任員外郎四世孫董格現任驍騎校安布祿國鑲藍旗人世居葉赫地方俱原任步軍校扎林初來歸其曾孫達穆科岱原任䕶軍校科爾凱由郎中從征江西湖廣於來龍山地方擊賊陣亡贈雲騎尉其子仙保孫禮保住相繼承襲又安布祿之曾孫天保原任防禦元孫德鍾現任防禦薩爾圖原任筆帖式常鼐原任驍騎校佛保現任牧長四世孫額爾登布現任防禦烏爾登額現任親軍校沙爾漢現任前鋒校五世孫八十四現任驍騎校新布國鑲黄旗人世居葉赫地方任驍騎校元孫錫圖初來歸其曾孫胡什巴原庫原任協領伊禮瑪原任司庫阿班住原任弓匠協領阿岱原任步軍校四世孫永愛原任員外郎索禮原任七品官烏理原任三等侍衞晉保住由委署叅領從征逆藩吳三桂於石門坎黄草壩等處屢著軍功授雲騎尉任佐領卒其子專圖襲職又新布之五世孫烏進泰原任防禦齊什原任助教巴岱石圖色爾瑚俱原任筆帖式六世孫三雅圖原任驍騎校吳努春正黄旗人世居葉赫地方來歸年分無考其子齋齊原任驍騎校孫倫布原任防禦三保現任佐領四格由䕶軍叅領取昭定藏著有勞績授雲騎尉厯任䕶軍統領卒其子常保柱襲職現任二等侍衞又吳努春之曾孫伊靈阿原任䕶軍校雅圖現任驍騎校陞官保現任佐領岱音布祿國正紅旗人世居葉赫地方大理寺少卿達蘭原初來歸其曾孫索濟原任贈雲騎任郎中索鼐由八品官從征陜西擊賊陣亡祿尉其子西扎布巴都理先後承襲又岱音布之元孫噶爾瑪原任八品典儀常在原任驍騎校黒格現係貢生四世孫明圖現任前鋒侍衞法敏滿丕俱現係生員舒敏國鑲黄旗人世居葉赫地方冠軍使温多理原任初來歸其曽孫滿丕原任佐領元孫輝色原任郎中偉色原任整儀尉額什圖原任員外郎華色原任防禦四世孫章柱原任副都統阿進泰原任員外郎嘉色原任鳴贊納秦現任大使兆福現任驍騎校色都吳赫俱原任筆帖式五世係英祿原任鳴贊拜善英善俱現任鳴贊武保住明德特通額俱現任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗碩塞其孫巴圖魯原任佐領雅爾吉原任步軍校尼莽伊原任驍騎校曽孫雅哈禪原任䕶軍校胡世布其曾孫富德現任守備武靈阿現任頭等侍衞侍衞班領以上俱世居葉赫地方係國初來歸之人鑲白旗本達理其孫顔德原任䕶軍校右世居葉赫地方係來歸年分無考之人哈達地方舒舒覺羅氏坦扎哈正黄旗包衣人世居哈達地方天聰時來歸其子庫拉海年甫八歳即隨侍太宗文皇帝後年及十八因目疾自陳奉特擢上駟院大臣順治時㫖着以原官看守從前隨侍昭陵復念庫拉海太宗文皇帝効力多年第五子雅住八品廕生庫拉海賜騎都尉世職並給伊卒其第三子奇圖承襲騎都尉卒其子奇蘭泰承襲卒其弟新泰現襲職庫拉海之長子錫圖庫原任内管領次子伊圖原任二等侍衞兼内管領第四子伊蘇原任䕶軍叅領又坦扎哈之曾孫永阿禪原任内管領兼委署㕘領瑪拉喜原任員外郎釋迦保原任二等侍衞兼叅領薩哈禪原任司庫元孫伊蘭泰原任内管領瓦爾達原任員外郎六格現任内管領海存現任三等侍衞兼叅領偉柱現任䕶軍校元福現任六品典儀四世孫福柱永柱俱現任筆帖式薩爾圖現任員外郎又坦扎哈親叔穆溪墨爾根之孫尼喀理原任員外郎曾孫洪德原任郎中䕶軍叅領兼佐領勒禮原任員外郎叅領兼佐領元孫武赫現任委署䕶軍叅領四世孫章保住現任三等侍衞德格現任内管領達克達禮國鑲藍旗人世居哈達地方原任步軍校赫色原初來歸其四世孫二碩色任藍翎侍衞五世孫正柱原任䕶軍校巴克善傅德俱原任筆帖式蔡保住原任主事僧保現任委署䕶軍叅領福増現任主事鄂和諾由䕶軍校從征福建破海冦鄭成功兵於海上後征雲南擊敗賊偽將胡國秉等兵於雲南城下叙功授雲騎尉卒其孫齊格色襲職卒其子普德現襲職又逹克達禮親弟喀塔哈之元孫希佛訥原係扎爾固齊西巴理原任藍翎侍衞伯爾赫原任防禦四世孫達岱原任驍騎校達賚原任防禦碩色原任䕶軍校五世孫石泰現任䕶軍校六世孫九德現任二等䕶衞花色原任驍騎校尼雅爾哈國鑲藍旗人世居哈達地方防禦噶爾圖原任䕶初來歸其孫薩爾圖原任軍校巴爾圖原任叅領曽孫德舒由前鋒校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子明福現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗福爾佳齊其元孫常智原任二等䕶衞拉什喜現任步軍校麻色原任䕶軍校四世孫蓀保原任筆帖式福順現任筆帖式費揚阿現任驍騎校鑲藍旗伊奇納光衮其元孫希綬原任佐領希佛訥原任前鋒校四世孫額成額現任員外郎以上俱世居哈達地方係國初來歸之人鑲藍旗索拜其孫瑪爾瑚達現任佐領莽吉圖原任廐長其子蓀綽和原任驍騎校孫唐武現任驍騎校滿都禮其孫常保現任城門尉伯進泰現任䕶軍校滿都瑚其子阿哈尼堪原任驍騎校孫索爾泰現任協領曾孫塞爾泰現任筆帖式以上俱世居哈達地方係來歸年分無考之人各地方舒舒覺羅氏阿禮密國鑲藍旗人世居伊爾哈地方部侍郎索住原任初來歸其曾孫綏色原任刑三等䕶衞博啟由領催初過北京征山東梯攻濟南府第二登城克之賜巴圖魯號優授騎都尉圍錦州兩敗松山兵加一雲騎尉又破流賊滅福王平定河南江南等處屢著軍功追滕吉思擊敗土謝圖汗兵叙功授為三等輕車都尉遇恩詔加為二等輕車都尉卒其親叔之孫托奇承襲緣事革退博啟親弟之子平住襲職時削去恩詔所加之職承襲三等輕車都尉緣事革退托奇之孫瑚什圖現襲職又阿禮密之元孫盈柱原任頭等䕶衞四世孫卓爾鼐亦原任頭等䕶衞五世孫布坤原任三等䕶衞達倫現任驍騎校又阿禮密親兄賚達禮之元孫匡綬原任筆帖式伊爾哈國鑲藍旗人世居來碧村地方長安嶺克之授雲初來歸由閒散從征大同攻恩詔加騎尉三遇車都尉卒其長子拜色襲職從征浙至三等輕江舟山擊敗偽英毅伯阮思等兵於海上授為二等輕車都尉任協領卒其子赫碩色襲職厯任工部尚書緣事革退其親弟之子達魁襲職時削去恩詔所加之職承襲騎都尉現任委署副都統兼佐領又伊爾哈之次子瑪拉喜原任典儀孫鐵圖原任禮部侍郎甘泰原任佐領曾孫阿素原任筆帖式札克丹原任䕶軍校德琮現任員外郎常祿現任驍騎校雅圖現任筆帖式元孫兆寧亦現任筆帖式穆克訥國鑲紅旗人世居西占和羅地方校鍾固由户部初來歸其子武蘇訥原任驍騎理事官圍松山兩敗敵兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆叙功援雲騎尉恩詔加尋以理事官任内考績稱職授為騎都尉遇親一雲騎尉卒其子秦齊蘭承襲緣事革退其弟珠祿承襲因病告退其子珠爾琨承襲卒其親伯之子鍾泰襲職時削去恩詔所加之職承襲騎都尉卒無嗣其親兄額滕承襲卒其親兄之子齊達色現襲職又穆克訥之孫對瑪善原任防禦托色原任筆帖式墨爾泰原任驍騎校曾孫吳達納原任員外郎伊禮布原任防禦托明現任䕶軍校托清現任防禦元孫保格原任防禦明伊德原任筆帖式四世孫含福亦原任筆帖式都什巴正白旗人世居長白山地方來歸年分無考由閒散從征江南攻松江府第二登城克之授雲恩詔加騎尉三遇車都尉任叅領因病告退其子博啟至三等輕承襲緣事革退其親兄之子二格承襲卒其子卓爾和襲職時削去恩詔所加之職現襲雲騎尉又都仆巴之子敦達理原任步軍校遜札齊原任七品官納親原任員外郎諾庫國鑲紅旗人世居佛阿喇地方校曾孫格德渾原初來歸其孫快齊原任䕶軍任三等䕶衞塔賚原任䕶軍叅領色勒由䕶軍校從征浙江福建屢著軍功續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方又敗賊偽將胡國秉等兵於雲南城下叙功優授騎都尉卒其子保住襲職任協領卒其子博禮登襲職緣事革退其親叔福綬現襲職又諾庫之曾孫輝色由佐領從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授雲騎尉因病告退其子福保現襲職又諾庫之元孫多色原任郎中兼副叅領阿隆武原任驍騎校塔保住現任前鋒校四世孫華泰原任䕶軍校恒德現任署正琉住現仕䕶軍校哈什圖國鑲白旗人世居長白山地方定貴州回兵時遇初來歸其孫海度由佐領平海賊鄭成功等率衆來犯鎮江府奮勇擊敗之又征浙江福建等處屢著軍功後於海澄縣擊贈騎都賊將劉國軒等兵陣亡生保襲職卒其親兄海尉兼一雲騎尉其子長綬襲職卒其缺索柱現襲職又哈什圖之曾孫張仙保現任頭等侍衞元孫杭奇現任佐領由正白旗改𨽻都忒赫國正藍旗人世居扎庫木地方領曾孫額爾訥原初來歸其孫額奇訥原任佐任䕶軍叅領富綬原任筆帖式錦圖原任郎中綬艮原任三等䕶衞阿拉密原任防禦布爾塔錫由委署驍騎校平定貴州回兵時擊敗海賊鄭成功等衆授雲騎尉後