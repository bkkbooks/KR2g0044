body:
  text: 八旗滿洲氏族通譜目録卷七十二附載滿洲旗分内之高麗姓氏金氏新逹理都賚德倍以上俱有傳金天保玉爾弼天鳳尼嘉理哈金登明色尼金德裴海古尼濟古尼山龍伊永特基定海吉碩色石孔儀那穆遂顔蓀尼倭赫金楠金山聶禮弼天布基仲什尼巴顔岱金聲春社金那宻金布吉金春顧東遂額色理林清德純戴哈尼愛錫滿住金繼先赫基金誠齊都隨書義胡錫義楚鼐特克秦金德隆蕩色精額理以上俱附載韓氏韓雲韓尼聶尼以上俱有傳岳拉米舒穆海席圖庫鄧儀弼博龍義帖禮弼額爾社韓齊理傅朗阿以上俱附載李氏騰那弼右係有傳李仁傑僧輝李黨鼎喀爾薩三拜龎塞凱老格東安石泰李四格都拉米以上俱附載朴氏東安右係有傳伊克濟理舒吉理巴普濟滿社吉阿良義傑臨弼以上俱附載張氏檀濟尼右係有傳碩禮郭弼僧訥米尼瑪番德柱張鵬翼以上俱附載傅氏三蘇右係有傳聶樓謨齊尼以上俱附載柏氏柏雲右係有傳欽定四庫全書八旗滿洲氏族通譜目録卷七十二附載滿洲旗分内之高麗姓氏金氏新逹理都賚德倍以上俱有傳金天保玉爾弼天鳳尼嘉理哈金登明色尼金德裴海古尼濟古尼山龍伊永特基定海吉碩色石孔儀那穆遂顔蓀尼倭赫金楠金山聶禮弼天布基仲什尼巴顔岱金聲春社金那宻金布吉金春顧東遂額色理林清德純戴哈尼愛錫滿住金繼先赫基金誠齊都隨書義胡錫義楚鼐特克秦金德隆蕩色精額理以上俱附載韓氏韓雲韓尼聶尼以上俱有傳岳拉米舒穆海席圖庫鄧儀弼博龍義帖禮弼額爾社韓齊理傅朗阿以上俱附載李氏騰那弼右係有傳李仁傑僧輝李黨鼎喀爾薩三拜龎塞凱老格東安石泰李四格都拉米以上俱附載朴氏東安右係有傳伊克濟理舒吉理巴普濟滿社吉阿良義傑臨弼以上俱附載張氏檀濟尼右係有傳碩禮郭弼僧訥米尼瑪番德柱張鵬翼以上俱附載傅氏三蘇右係有傳聶樓謨齊尼以上俱附載柏氏柏雲右係有傳
