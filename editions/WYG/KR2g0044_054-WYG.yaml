body:
  text: 八旗滿洲氏族通譜卷二十六訥殷地方富察氏孟古愼郭和鑲白旗人世居訥殷地方孔錫庫之孫伊星阿之長子孟古慎郭和同弟羅團莽吉圖將訥秦倭濟地方始開為路征瓦爾喀從訥殷地方率領子弟及同里壯丁五百名於福陵國初來歸授以佐領其長子喀爾喀嘛原任總管兼佐領乾隆元年恭遇覃恩以曽孫福敏所得榮封追贈光祿大夫都察院左都御史第三子安泰由前鋒侍衞定鼎燕京時在山海闗外擊偽唐總兵馬兵敗之追流賊至安肅縣斬殺甚衆後破流賊滅福王平定河恩詔授南江南等處累著勞績授雲騎尉遇德柱襲職為騎都尉歴任副都統後安泰之孫恩詔所時削去承襲雲騎尉卒無嗣其親伯之孫文普加之職現襲職又孟古愼郭和之孫郭布原任都統希佛原任䕶軍叅領拉瞻原任御史納秦原任副都統海珠瑚艾達理俱原任驍騎校文布原任員外郎和托原任防禦禪布原任協領佟濟由前鋒叅領從征福建擊敗海賊鄭成功得偽印一顆續征盖峙山擊賊陣亡特恩賜祭𦵏追封資政大夫贈騎都尉雍正三年世宗憲皇帝勅建昭忠寺祀有功諸臣佟濟與焉恭遇覃恩以孫福敏所得榮封追贈光祿大夫都察院左都御史其子穆斯馨龔職任前鋒叅領卒追贈副都統後以其子福敏屢膺封典追贈光祿大夫都察院左都御史其孫德爾芬襲職歴任䕶軍叅領副都統管都統事卒賜祭𦵏如典禮其伯祖之子善寳襲職現任佐領又孟古慎郭和之曽孫圖什錫原任都統前鋒統領兼佐領綽普敦原任員外郎綽爾敏原任二等侍衞希爾根原任都統巴哈塔原任給事中玉丹福成額俱原任䕶軍校華善原任二等侍衞文岱原任詹事府詹事元孫昻臧原任三等侍衞諾穆拖圖喇俱原任筆帖式居襄原任員外郎兼佐領齊格現任二等侍䘙福敏康熈丁丑武科進士現任太保加太子太保議政大臣事前英殿大學士兼工部尚書仍兼管翰林院都察院左都御史吏部尚書署理湖廣縂督伏魔保現係繕譯生員四世孫圖敏福祿俱現任佐領福昌現係廕生五世孫福澄福清俱現係監生又孔錫庫之孫伊星阿之次子羅團原係閒散其子鄂團由廢員從征額倫鑰色額赫庫倫地方効力行閒授騎都尉三圍錦州松山兵束犯擊敗之定鼎燕京時入山海闕擊敗流賊馬歩兵二十萬衆叙功加一雲騎尉三遇恩詔加至一等輕車都尉後駐劄江寕府聞賊襲巢縣率官兵前徃指揮克復其城又征福建擊海賊鄭成功屢敗之招撫二縣一百五十三寨偽總兵二員副將一員賊兵七千餘衆叙功又加一雲騎尉因年老致仕其子鄂色襲職任䕶軍叅領因病告退其子鄂羅襲職卒其子常雲襲職恩詔所時削去承襲三等輕車都尉卒無嗣其親弟勒加之職詔後軍爾肯襲職卒其親伯之子福寕襲職時削去羅功所得之雲騎尉現龔騎都尉兼一雲騎尉團之曽孫金岱原任郎中保柱原任協領占柱明寳俱原任筆帖式元孫博爾多原任通政使司通政使四世孫遂和德原任織造郎中五世孫車爾圖原任筆帖式蘓爾泰原任三等侍衞福章現任中書又孔錫庫之孫馬星阿之子莽吉圖原任閒散其孫額思特原任䕶軍統領額色黒初任秘書院學士定鼎燕京時授騎都尉後因考績稱職加一雲騎尉三遇恩詔加至一等輕車都尉歴任明襲職任城守尉卒其保和殿大學士卒其孫常恩詔所子色什德襲職時削去一雲騎尉莽吉圖之曽加之職現襲騎都尉兼孫塞色赫原任兵部尚書兼佐領噶爾璧原任前鋒叅領兼佐領噶爾漢原任協領對齊原任佐領元孫馬爾漢科山俱原任二等侍衞卓福塔原任䕶軍校福鼐原任兵部尚書都統兼佐領滿竒原任員外郎明圖現任驍騎校四世孫馬保柱原任筆帖式色爾德原任右衞副都統兼佐領色爾圖現任䕶軍校馬爾圖現任協領昌齡原任編修科占額爾古訥俱現任中書五世孫哈福現係廕生鄂爾琨現係文生員舒穆魯國正紅旗人世居訥殷地方任稱職不違指使授初來歸其次子碩占以所騎都尉平定朝鮮攻克岡華島叙功加一雲騎尉過北京征山東攻禹城縣不設鈎梯克其城又梯攻隆平縣克之叙功授為三等輕車都尉定鼎燕京時授為二等輕車都尉後破流賊滅福王平定河南江南等處屢著勞績授為一等輕車都尉尋陞户部侍郎考績稱職加一雲騎恩詔優尉兩遇等男縁事䧏為一等輕車都尉又遇加至一恩詔加一雲騎尉後復授為一等男歴任副都統卒其孫達色發色各分襲二等輕車都尉達色從征福建擊敗賊偽將吳肅等兵於浦塘地方後於海澄縣擊賊偽將劉國軒兵陣亡加贈一雲騎尉無嗣亦令其弟發色承襲併為一等男兼一雲騎尉卒其子明保襲職定藏有功授為三等子現任長史兼佐領又舒穆魯第三子碩色原任郎中第四子布舒庫原任䕶軍叅領兼佐領孫阿爾瑚達原任鳴賛阿錫坦原任䕶軍叅領兼佐領希佛赫爾根俱原任頭等䕶衞伊爾根原任佐領穆臣原任二等䕶衞七十四格俱原任筆帖式曽孫富赫特原任委署䕶軍叅領兼佐領公安原任員外郎兼佐領塞爾特原任知府元孫芳堪原任佐領明德原任主事宗福現任佐領明玉現任五品典儀高亮原任筆帖式四世孫六格德昌俱現係廕生伊郎阿國正紅旗人舒穆魯同族世居訥殷地方叅領鄂初來歸原任備禦其子羅山原任䕶軍贈騎都山由長史從征福建於厦門地方擊海賊陣亡尉其子鄂齊禮襲職卒其子鄂哈襲職卒其子豐通阿現襲職又伊郎阿之孫瑚錫布原任歩軍校舒書布原任御史額齊訥原任八品官徹爾德原任筆帖式曽孫萬塔布原任員外郎英額原任歩軍校明順原任陵寢翼長福綬現任筆帖式舒明原任中書舒經原任千總富黨阿原任八品官元孫福德伸現任筆帖式布哈國正紅旗人舒穆魯同族世居訥殷地方雲南擊初來歸其曽孫雅錫圖由驍騎校從征敗賊偽將何繼祖等兵於黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功授雲騎尉卒無嗣其叔祖之孫呉拉岱現襲職吳拉岱之弟珠拉岱現任驍騎校金達錫國正白旗人世居訥殷地方叅領定鼎燕京時擊初來歸其子雅喇由䕶軍敗流賊馬歩兵二十萬衆叙功授騎都尉後破流賊滅福王平定河南江南等處屢著戰功加恩詔加一雲騎尉三遇尉又追滕吉思擊敗土謝圖汗至一等輕車都兵授為三等男卒無嗣其親弟之子楊舒襲職卒其子夸喀襲職任頭等侍衞卒其子黄岱襲恩詔所職時削去襲二等輕車都尉現任前鋒叅領又加之職承金達錫之四世孫台碧圖現任筆帖式納濟國鑲白旗人世居訥殷地方郎中曽孫拜音錫原初來歸其孫鄂多布原任任典簿愛音錫原任城門尉滿都原任員外郎滿都瑚原任歩軍校西圖由佐領從征庫爾喀獲壯丁八十餘人定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆叙功授雲騎尉尋擢工恩詔加部員外郎五載考績稱職授為騎都尉三遇至二等輕車都尉後因監造乾清宫等宫殿授為一等輕車都尉卒其子西巴理襲職從征湖廣擊賊偽將馬寳等兵在岳州贈一雲地方陣亡富世魁承襲卒其子西爾岱襲職卒騎尉其子恩詔所無嗣其叔祖之子巴爾達襲職時削去之子福加之職承襲三等輕車都尉卒其親弟凱襲職現任散騎郎又納濟之元孫福紳原任吏部侍郎福舒椿對俱原任郎中雲對原任員外郎綽貝富琨俱原任主事色楞額原任七品官漢都原任䕶軍校福隆原任筆帖式四世孫五格原任䕶軍叅領噶布拉原任同知噶爾岱原任助教富蘭泰原任鳴贊七十原任七品官朱蘭太福亮福世達福登額福松額俱原任筆帖式察爾達原係生員福彬福德福爾金俱原係監生五世孫富顯原任親軍校福祿原任鳴贊額勒圖原任筆帖式尼唐阿富明安俱現任中書富松富拉禪俱現任筆帖式滿岱保舒俱現任䕶軍校舒寕安現係舉人尼隆阿伊常阿福保蔡保保山俱現係監生六世孫寳鼎現係生員由鑲黄旗改隸拉弼國鑲黄旗人世居訥殷地方佐領達金原任驍騎初來歸其曽孫倭赫原任校綽竒原係騎都尉巴喜由騎都尉攻錦州陣亡優贈為二等輕車都尉其子鄂内襲職遇子恩格襲職卒恩詔授為一等輕車都尉任佐領卒其恩詔所其子鈕倫襲職時削去都尉縁事革退其子阿加之職承襲二等輕車濟圖襲職現任佐領又拉弼之曽孫巴爾泰以任事有能不違指使授騎都尉遇恩詔加一雲騎尉卒其子吳顔朱襲職卒無嗣其親伯之子舒隆額襲職卒其子勒爾錦襲職時削去恩詔所加之職現襲騎都尉又拉弼之元孫竒崇額額思赫俱原任郎中賚遜原任佐領布斯黒原任筆帖式勒黒原任驍騎校新太由閒散從征大同攻朔石第三登城克之叙功授雲騎尉卒其子托鈕襲職二次過北京征山東擊敗賊偽總兵滿桂兵定鼎燕京時入山海闗擊流賊陣亡贈為騎優尉兼一雲騎尉無嗣其次弟蘓拜襲職遇都恩詔授為三等輕車都尉卒無嗣其第三弟鄂博色襲職卒其子喀爾齊喀襲職因病告退其子福隆恩詔所襲職時削去騎都尉兼一雲騎尉又拉弼之元加之職現襲孫扎哈喇由半個佐領從征貴州擊敗賊偽總兵田國欽等兵師回又擊敗海賊鄭成功等兵二萬餘衆叙功授雲騎尉卒其子桑格襲職從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩叙功授為騎都尉卒其子阿克東阿現襲職又拉弼之四世孫石拉圖原係騎都尉達海原任佐領馬紹色黒俱原任七品官阿思哈原任主事常綬原任内閣侍讀學士額爾成吳達禪蘓赫俱原任員外郎花色噶山達俱原任筆帖式愛達漢原任三等䕶衞外燧原任驍騎校邁圖由七品官從征江西湖廣在鄱陽湖擊敗賊首朱二等兵又於來龍山地方擊賊偽將夏贈雲騎國相等兵陣亡之子馬爾齊哈承襲卒其子托尉無嗣以親弟絡諾現襲職又拉弼之五世孫阿宻圖塔宻圖俱原任員外郎赫色理原任内閣侍讀學士傅德原任七品官達林瓦爾達羅秘賴泰俱原任筆帖式常在吳達山俱原任䕶軍校佛濟保現任八品官唐蘓現任筆帖式色克都現任驍騎校六世孫西庫原任檢討敷文現任通政使司通政使福海現任司庫積良福彬福啓俱現任筆帖式瑚珠現任䕶軍校興柱現任内閣侍讀𫝊爾納原任䕶軍校傅敦現係生員七世孫西泰現任興泉道西成現任御史福鍾泰福蘭泰俱現任筆帖式拖普佳國鑲黄旗人世居訥殷地方原任郎中五世孫傳初來歸其四世孫旺竒弩太原任䕶軍校阿爾布哈原任郎中翁阿岱原任佐領六世孫富達理原任郎中叅領兼佐領恩克原任藍翎侍衞伊哈那納諾俱原任三等侍衞瑚希塔原任佐領費揚古原任筆帖式喀齊喀由閒散過北京征山東梯攻武定州第二登城克之賜巴圖魯號授騎都尉三遇其子扣樓襲職卒其子富恩詔加至二等輕車都尉卒恩詔所保襲職卒其弟富綬襲職時削去圖襲職卒其加之職承襲騎都尉卒其子喀爾親弟喀爾納現襲職又拖普佳之七世孫帖什太原任䕶軍校𫝊照原任藍翎侍衞滿丕原任員外郎瓦色原任三等侍衞鈕占托色俱原任筆帖式阿哈納原任驍騎校八世孫翁愛原任藍翎侍衞二格原任䕶軍校永綬原任筆帖式岱禪現任䕶軍校鄂通果國鑲黄旗人世居訥殷地方以奮勇進擊有功優初來歸由閒散從征羅察授騎都尉卒其子鄂克遜襲職時值逆藩吳三桂宻遣賊偽將黄吉等潜寓都城鼓樓西街以舉火為號將謀不軌鄂克遜遇火熾徃救因見有賊兵俱持刃聚集屋内遂馳告兵部尚書明珠都統拉哈達等率兵徃圍其屋鄂克遜復以短甲䕶身奮勇衝入手刃三十九人生擒賊將黄吉餘黨悉平後隨征呉逆於貴州雲南等處屢著戰功尋擢江寕副都統聖祖仁皇帝以鄂克遜漢仗好勲績