body:
  text: 八旗滿洲氏族通譜卷二十一那木都魯氏那木都魯本係地名因以為姓其氏族散處扵那木都魯綏分渾春及各地方那木都魯地方那木都魯氏康武理國正白旗人世居那木都魯地方原係本䖏部長初率兄弟族人及滿洲来歸太祖髙皇帝嘉之尚公主封為額駙授三等子編二佐領令康武理與伊第三弟喀克都理各統其一康武理與十六大臣之列歴任户部尚書䕶軍統領其長子洪科原任前鋒叅領次子色琥徳原任佐領第三子莽色原任䕶軍叅領第四子頼塔由廢員初圍錦州屢敗松山杏山馬歩兵過北京征山東梯攻新城覇州髙陽俱第一登城梯攻夀光第二登城梯攻博興第三登城身被五創授為前鋒侍衛定鼎燕京時擊敗偽唐總兵等兵扵山海闗外破流賊滅福王平定河南江南等䖏屢著戰功授雲騎尉從征福建攻汀州府克其城授為騎都尉兩遇恩詔加至二等輕車都尉從征湖廣扵衡州府大敗賊偽總兵陶養用偽伯胡一清等兵續征廣東扵新會縣破賊李定國兵四萬餘衆恢復三府二州十八縣授為三等男尋授為平南將軍徃征浙江福建進兵衢州及大溪灘仙霞闗等䖏均克之攻興化府連破賊二十六營復分兵七路平定辰州等十九䖏海寇俱獲全勝後授為征南大將軍進征雲南大破賊兵扵石門坎黄草壩地方率兵直抵雲南城下并力環攻賊衆遂降縁事未叙其功卒賜祭葬如典禮謚襄毅並祀賢良祠後特恩追贈一等男令其子費葉倫承襲任步軍總尉卒其子博爾屯襲職後世宗憲皇帝閲朽之功赦其已徃之罪實録念頼塔不特㫖追封一等公加其封號為褒績公仍令其孫博爾屯承襲縁事革退其兄之子舒靈阿承襲一等公現任散秩大臣副都統又康武理第五子昂阿安巴原任前鋒叅領第六子頼圗庫原任頭等侍衛兼佐領孫杭奇由副都統徃征湖廣等處屢著軍功授雲騎尉任䕶軍統領卒其長子西圗庫現襲職又康武理之孫羅占誇䇿俱原任䕶軍叅領拉色拉都俱原任佐領誇喀原任三等侍衛曽孫巴爾堪原任䕶軍叅領瑚理現任䕶軍叅領兼佐領杭禄海倫富保俱原任佐領富達理原任員外郎羅克多原任六品官賽音圗現任三等侍衛元孫錫沖額現任三等侍衛兼佐領哈唐阿原任佐領西蘭泰原任三等侍衛薩爾泰現任六品官博禄現係廕生又康武理次弟昂武原任叅領其子瑪克圗亦原任叅領兼佐領孫瑪哈達原任三等侍衛曽孫邁色原任䕶軍叅領兼佐領海靈原任刑部尚書元孫哈魯現任三等侍衛寳泰哈岱俱原任筆帖式廣泰現任筆帖式哈鼐現係生員又康武理第三弟喀克都理初授佐領歴任都統其子松興額原任佐領希佛訥原任三等侍衛孫官保原任前鋒叅領蘇滿原任都統兼佐領曽孫瑪鼐原任頭等䕶衛那爾布原任員外郎薩克新原任長史兼佐領蘇鼐原任驍騎校薩鼐原任筆帖式元孫滿都原任佐領滿禄現任整儀尉兼佐領按康武理與本旗渾春地方本博科長白山地方吉希勒鑲紅旗綏分地方明安圗巴顔等同族哲爾古國正白旗人康武理同族世居那木都魯地方理初来歸其子徳庫勒原任前鋒侍衛孫額庫原任户部侍郎曽孫額靈格現係候補小京官額色理由二等侍衛從征厄魯特噶爾丹有功授雲騎尉任䕶軍叅領卒其子明綬襲職縁事革職又哲爾古之四世孫明泰現任親軍校汪什國正白旗人世居那木都魯地方從征浙江舟山初来歸其孫巴克薩喀由防禦擊敗偽英毅伯阮思兵扵海上授雲騎尉又扵鎮江地方敗海賊鄭成功兵二萬餘衆叙功授為騎都尉年老告退其親伯之子瑪啟襲職年老告退其子常圗現襲職又汪什之孫逹都原任都察院左都御史哈什原任䕶軍校曽孫花善原任三等侍衛常保原任員外郎元孫達勒原任筆帖式達成格現任筆帖式福察拉國正白旗人世居那木都魯地方軍校成根柱由初来歸其曽孫存柱原係副䕶委署䕶軍叅領從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子伊常阿現襲職薩爾佳達國鑲紅旗人世居那木都魯地方士兼禮部侍郎初来歸其孫洪科原任内閣學伊蘭珠原任前鋒校曽孫文泰原任郎中僧保原任筆帖式元孫蓀泰原任防禦郭禮原任䕶軍校屯泰原任驍騎校外圗庫現任驍騎校四世孫存住原係副驍騎校以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載扵後正白旗董訥科原任前鋒侍衛其孫博和理現任䕶軍校多什瑪其孫蘇禄原任筆帖式曽孫七十原任助教元孫蘇吉現任筆帖式富齊拉其元孫穆爾納原任䕶軍校四世孫蓀泰原任驍騎校六世孫色黒現任驍騎校鑲紅旗鄂奇塔其曽孫雅爾納原係副驍騎校以上俱世居那木都魯地方係國初来歸之人正白旗恰塔其長子石周原任三等侍衛次子阿周原任驍騎校鑲紅旗博爾鍾鄂其孫徳成格原任太常寺少卿兼佐領滿丕原任驍騎校曽孫福徳原任御史兼佐領平安原任員外郎福深現係文舉人伊穆薩喀原任六品官其子長果亦原任六品官噶齊訥原任筆帖式孫恩特赫原任歩軍校福禄原任筆帖式四世孫伊常阿現任驍騎校布勒亨其孫音達渾原任步軍校巴山原任䕶軍校曽孫恩特原任前鋒校章山原任䕶軍校佟保原任筆帖式元孫官保額爾碧赫俱原任驍騎校成究原任䕶軍校以上俱世居那木都魯地方係来歸年分無考之人綏分地方那木都魯氏明安圗巴顔國鑲紅旗人世居綏分地方原係本處部長及親初率其子哈哈納翁格尼綽和諾噶爾達族滿洲一千餘衆来歸編二佐領令哈哈納與綽和諾各統其一哈哈納由副將從征烏剠及遼東屢著軍功初次徃北京扵昌平等䖏大敗敵衆加一遊擊銜尋以任事有能不違指使擢置十六大臣之列翁格尼原任佐領綽和諾授遊擊職與十六大臣之列從征遼東有功授為三等輕車都尉後取大凌河擊明監道張春兵陣亡贈為一等輕車都尉其親兄翁格尼承襲縁事革退其子福喀禪襲職定鼎燕京時加一雲騎尉三遇恩詔加至一等男授為西安將軍徃征甘州指麾攻克其城又招撫河州凉州二郡後征四川湖廣等處大敗賊衆生擒賊首郝揺旗袁宗第叙功優授為三等子卒其子穆成額襲職任佐領縁事革退其親弟新柱襲職原任䕶軍叅領兼佐領因病告退其子富岱襲職時削去恩詔所加之職承襲二等男任佐領卒其子富善現襲職又明安圗巴顔之孫費揚古原任副都統岱禄昂楚俱原任佐領鄂木泰原任三等䕶衛羅爾本岱原任郎中薩爾都原任内閣侍讀曽孫達大海都爾新舒克禪江都納俱原任佐領噶都渾原任協領拉都渾原任諭徳羅爾賽阿蘭泰俱原任三等䕶衛長格原任筆帖式都達理原任陵寝翼長都五福原任郎中兼佐領都六綬原任親軍校博起塔原係六品廕生邁圗原任六品官都四徳運泰俱現任員外郎鶴臣現任八品典儀元孫達色原任員外郎瑪什泰原任三等䕶衛千佳寳原任頭等䕶衛吳拉納原任六品典儀雅爾布兆保惠色俱原任佐領羅查原係副䕶軍校佛約現係六品廕生瑪爾岱現任筆帖式四世孫佛保原任筆帖式富海現任叅將巴泰現任佐領巴岱現任大使五世孫富勒赫現任佐領按明安圗巴顔與正白旗那木都魯地方康武理同族岳蘇納國正黄旗人明安圗巴顔同族世居綏分地方山初来歸其四世孫達理善由閑散過北京征賜巴圗東梯攻濟南府第三登城克之魯號優授三等輕車都尉三遇恩詔加至一等輕車都尉兼一雲騎尉三圍錦州擊敗洪承疇三營步兵征江西大破賊首金聲桓兵七萬餘衆續征雲南扵沅江府敗賊有功授為三等男年老告退其孫留占襲職後征陕西時達理善巴圗魯復自請効力在顯義闗大破偽總兵髙定國等兵尋卒扵軍贈一雲騎尉亦令留占承襲併為二等男任叅領兼佐領縁事革退其親弟戴齊理襲職原任陵寝翼長卒其養子達桑阿現襲職又岳蘇納之五世孫達爾賽原任䕶軍叅領達爾泰原任二等侍衛兼佐領六世孫阿哈占原任主事七世孫黒格現任佐領瑪林和碩國正黄旗人明安圗巴顔同族世居綏分地方功初来歸其元孫蘇爾修由閑散從征烏喇有授騎都尉卒無嗣其弟阿爾修襲職過北京征山東攻濟南府有功加一雲騎尉後從征黒龍贈為三江陣亡都尉其子阿庫理承襲卒其子常綬襲等輕車恩詔授職遇等輕車都尉卒無嗣其叔祖特什倫襲職為二恩詔加兩遇等輕車都尉兼一雲騎尉縁事革退削去至一恩詔所本身兩次其子佛岱承襲二等輕車都尉卒其加之職令恩詔所子惠顔襲職卒其子惠藍襲職時又削去初次加之職承襲三等輕車都尉現任二等侍衛兼佐領又瑪林和碩之四世孫塔克圗由領催過北京征山東攻濟南府第二登城克之賜巴圗魯號優授二等輕車都尉遇爾納襲職兩遇恩詔授為一等輕車都尉卒其子塔恩詔加至三等男卒無嗣其叔胡倫襲職卒其子雅圗襲職兼佐領年老告退其子雅爾泰襲職時削恩詔所去之職承襲二等輕車都尉任委署䕶軍叅領加兼佐領卒其親弟九格現襲職又瑪林和碩之五世孫伊都善希佛訥俱原任七品官白吉原任佐領哲庫訥原任所副六世孫禮保住原任驍騎校七世孫巴哈布現任佐領阿爾松阿國鑲白旗人世居綏分地方署驍騎校從征江西初来歸其孫愛音住由委扵饒州府等䖏屢敗賊兵又從征廣東擊敗賊將馬寳等兵續征雲南破賊偽將何繼祖等兵扵黄草壩地方叙功授雲騎尉年老告退其子恩義禄襲職現任步軍校愛黨阿國正白旗人世居綏分地方統曽孫拉薩理現任初来歸其孫法喇原任都歸化城副都統邦圗現任筆帖式伊圗理國鑲紅旗人世居綏分地方任協領薩畢納原任初来歸其子伊爾吉納原筆帖式孫伊勒徳原任都察院副都御史曽孫額盛額原任三等䕶衛法施蘭伊圖俱原任筆帖式元孫占保原任前鋒校法明現任筆帖式鶴尚現任驍騎校以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載扵後正黄旗和爾尚阿其五世孫艾當阿原任步軍校貴圗原任䕶軍校六世孫黒色原任驍騎校二雅圗原任䕶軍校七世孫蘇爾泰現任驍騎校邁蘭其孫邁圗原任驍騎校栢爾都其四世孫旺保住原任驍騎校綽哈納現係副䕶軍校正白旗噶爾納其子都爾琨原任佐領托克楚其子温岱原任䕶軍校鑲紅旗阿爾喀其子鄂思琨原任郎中安圗理安楚理俱原任八品官孫武什泰原任二等侍衛花色原任驍騎校珠爾哈納原任遊擊其子武爾喀納原任䕶軍叅領孫鍾西布原任協領元孫永賴原任三等䕶衛穆爾察原任驍騎校其子納爾泰原任中書曽孫觀音保原任員外郎徳啟其曽孫阿喀原任䕶軍校元孫漢班現任二等䕶衛額爾楚其孫庫深原任驍騎校曽孫哈爾住原任䕶軍校希佛訥原任驍騎校元孫色勒原任䕶軍校錫爾哈原任步軍校臣思原任驍騎校黨楚其子什圗原任驍騎校孫雅奇現任䕶軍校正藍旗瑪哈圗其孫綽海原任歩軍校曽孫富昌阿現任副䕶軍校庫濟訥其五世孫阿林保現任六品官以上俱世居綏分地方係國初来歸之人鑲紅旗塔爾瑚其子扎哈理原任步軍校恩特原任步軍校徳奇原任典儀其孫韋䭾保原任七品官阿秋原任䕶軍校以上俱世居綏分地方係来歸年分無考之人渾春地方那木都魯氏本博科國正白旗人世居渾春地方任協領庫拜原任䕶初来歸其元孫隆托科原軍校四世孫珠瑪喇以任事有能不違指使授騎都尉從征額倫鑰色生庫勒額赫庫倫地方有功加一雲騎尉過北京征山東梯攻諸城縣克之征黒龍江斬獲甚衆授為三等輕車都尉三圍錦州屢敗松山馬兵叙功授為二等輕車都尉後授吏部理事官考績稱職授為一等