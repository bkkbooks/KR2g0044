body:
  text: 八旗滿洲氏族通譜目錄卷十三撒爾湖地方伊爾根覺羅氏瓜喇恩特拉哈墨爾根伊爾喀巴圖魯羅洛渾格善華善色伯察哈博亮以上俱有傳墨爾根穆成額以上俱附載呼訥赫地方伊爾根覺羅氏噶葢扎爾固齊孟格圖阿爾哈巴顔納齊布額齊布温察綏哈謨絡瑚密色圖元布以上俱有傳薩克什哈右係附載雅爾湖地方伊爾根覺羅氏桑古尼哈爾巴巴圖魯納凱顔布禄以上俱有傳達爾邦阿布爾謄達古䝉古瞻鑒拜滿柱蘇雅蘇瓦顔戴栁費揚古耀色烏什以上俱附載烏喇地方伊爾根覺羅氏納爾遜唐古善顔布祿以上俱有傳呉達禪達春噶爾圖察哈理呉達理薩哈亷福喀羅多理衛生額薩爾巴哈噶達渾碩色以上俱附載
  hash: sha256:8d725a77994238492fb00f5dbab495acca2946b8360020f13dd6cc092a8a5705
