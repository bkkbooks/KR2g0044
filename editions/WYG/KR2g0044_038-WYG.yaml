body:
  text: 八旗滿洲氏族通譜卷十八雅爾湖地方通顔覺羅氏茂海國鑲藍旗人世居雅爾湖地方來犯耀州力戰敗初來歸授騎都尉時有賊兵贈為二之後圍錦州時陣亡古爾岱襲職緣事革退其等輕車都尉其子蒙親弟圖頼襲職從征黒龍江攻拙秦城克之獲丁壯九十餘人破流賊滅福王平定河南江南等處屢著軍功進攻崑山縣克其城敘功授為一等輕車都尉緣事革退削去本身所得之雲騎尉將二等輕車都尉令其親兄科爾坤承襲三遇恩詔加至三等男緣事削去都尉令其親兄蒙古爾岱恩詔所加之職餘二等輕車之孫羅占承襲後蒙古爾岱由廢員二次過北京征山東擊敗曹州兵圍錦州屢敗松山杏山恩詔加馬步兵敘功優授騎都尉三遇襲職時合併本至二等輕車都尉卒其孫羅占身所襲二等輕車都尉授為一等男緣事革退其叔祖之子圖斯海襲職從征厄魯特噶爾丹奮勇破賊有功加一雲騎尉後圖斯海奏請將伊親伯䝉爾古岱軍功所得之騎都尉與蒙古爾岱之曾孫賽炳安分襲圖斯海只襲一等輕車都尉厯任都統緣事革退其親伯之曾孫三海現襲職又茂海之孫謨爾渾原任䕶軍叅領曾孫圖敏亦原任䕶軍叅領圖義原任員外郎圖爾渾國鑲藍旗人世居雅爾湖地方領琥什巴華色俱初來歸其曾孫舒書原任佐原任員外郎滿丕原任副都統法色原任筆帖式元孫舒祿渾原任佐領二格現任䕶軍校福昌現任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗蘇扎理圖爾渾同族其孫訥爾賽原任驍騎校曾孫納蘭泰現任䕶軍校布顔柱其曾孫齊布現任驍騎校福海現任親軍校元孫福塞克現任筆帖式以上俱世居雅爾湖地方係國初來歸之人各地方阿顔覺羅氏星額理國鑲藍旗人世居葉赫烏蘇村地方散從征大凌初率子弟來歸其元孫輝蘭由閒河擊明監軍道張春兵敗之過北京征大同攻五臺山奮勇先登圍錦州擊敗松山杏山馬步贈騎都兵後擊洪承疇三營步兵陣亡優尉其子色赫襲職三遇恩詔加至二等輕車都尉任吏部侍郎副都統卒其子雅圖襲職時削去恩詔所加之職承襲騎都尉卒其子萬靈保現襲職又星額理之元孫西特庫由親軍校從征廣西擊敗賊偽將范齊韓等兵續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方又敗賊偽將胡國秉等兵於雲南城下敘功優授騎都尉卒其子二赫承襲卒其子保德襲職現任副叅領又星額理之元孫艾音柱原任弓匠協領桑格原任䕶軍校渾福原任防禦四世孫額爾德原任驍騎校常保住原任筆帖式佛爾瑚原任六品官薩哈達原任三等侍衞海保原任中書五世孫海綬來保俱原任員外郎蒙克原任驍騎校六世孫阿林泰原任員外郎長安保現任郎中墨赫理現任七品官常祿保原任筆帖式七世孫常德現任筆帖式又星額理親弟克穆之曾孫薩魯原任防禦元孫恩格德原任步軍副尉費雅漢原任三等侍衞噶哈原任叅領四世孫鄂竒原任郎中多竒原任禮部侍郎六格現任典儀勒德理現任䕶軍校七十穆盾俱原任筆帖式五世孫富勒渾原任副䕶軍叅領福達理原任頭等䕶衞兼長史僧保現任驍騎校阿錫泰現任筆帖式六世孫福昇原任典儀按星額理與正黄旗同里拉塔同族諾恩珠瑚正黄旗人星額理同族世居葉赫烏蘇村地方天聰時來歸其子都達哈原任三品鳴賛孫席特庫原任員外郎哲備原任筆帖式巴勒由前鋒校從征雲南擊偽將何繼祖等兵於石門坎黄草壩地方敘功授雲騎尉卒其子明安福襲職又諾恩珠瑚之曽孫阿彌達原任郎中常綬原任英額邉口章京保住原任三等侍衞圖理琛初任内閣侍讀緣事革退後給内閣侍讀職命遣徃銜奉琥特國宣諭土爾勅㫖頒賜回京恩賞事竣聖祖仁皇帝深加奬恱特授兵部員外郎厯任陜西廵撫兵部侍郎緣事罷職雍正十三年十月特㫖補授内閣學士兼禮部侍郎後年老乞休奉任㫖以原官致仕塔克興阿原任筆帖式費揚古原員外郎元孫佟吉庫亦原任員外郎五達色原任典簿伯竒圖蘇爾敦七達色德成額武爾慶額俱現任筆帖式哈祿堪葛布英額俱現係監生阿普察正白旗包衣人世居額爾敏地方來歸年分無考原任牧長其子福拉渾原任内管領積拉渾偉赫訥俱原任員外郎孫馬爾漢章保良沙色俱原任内管領關保由頭等侍衞從征福建浙江等處屢著軍功又擊敗逆賊耿精忠海寇鄭錦等兵恢復泉州府城敘功優授騎都尉卒其子福鑑親弟之曾孫齊格相繼承襲又阿普察之曾孫彌勒保現任内管領德柱現任主事雙頂現任檢討碩色正藍旗人世居瓦湖木地方天聰時來歸將異姓薩哈爾察等編佐領使統之其子穆齊理原任䕶軍校科爾崑原任䕶軍統領兼佐領齊什巴原任佐領孫倭赫克什圖俱原任三等䕶衞綽克托原任刑部尚書墨爾渾原任郎中兼叅領常久原任佐領哲庫訥由委署䕶軍叅領取昭定藏著有勞績授雲騎尉卒其子髙良現襲職又碩色之曾孫常保原任副都統吳保原任中書綽爾門現任助敎郭丕常祿俱原任筆帖式綽爾賔現任筆帖式元孫喜珠現任長史兼佐領錫爾門現任主事成祚現任員外郎兆明原任筆帖式寧古理現係生員四世孫福衍原任主事松舒現任三等䕶衞松山福寧俱係監生鑾國正白旗人世居赫圖阿喇地方元孫噶爾瑪鄂初同次弟酸三弟滿等來歸其佛絡俱原任驍騎校瑚色原任佐領四世孫碩色原任郎中鄂色佛爾格紳俱原任筆帖式酸之孫阿爾拜原任城門尉曾孫本岱原任通政使司通政使溫岱原任黑龍江副都統元孫保成原任三等侍衞雅圖原任佐領文明原任司庫四世孫公新原任頭等侍衞清新原任筆帖式成禧原係貢生德格原任三等侍衞五世孫伊密納現任筆帖式伊靈阿現係舉人滿之曾孫巴什由䕶軍校從征厄魯特噶爾丹在烏藍布通地方奮勇擊賊陣亡贈雲騎尉其子薩克新承襲卒其親弟清海現襲職又鑾之元孫吳琦訥原任信礟章京四世孫溫普原任署丞科倫現任防禦五世孫溫都原任郎中六世孫良慶現任筆帖式吳琦訥等之子孫今隸正藍旗分貝和齊國正藍旗人鑾同族世居福齊希美佛赫地方建初來歸其孫恭色理由䕶軍校從征浙江福等處屢著軍功又擊敗逆賊耿精忠海寇鄭錦等兵恢復泉州府城敘功優授騎都尉卒其孫穆克敦常林先後承襲又貝和齊之曾孫常明原任䕶軍校常德現任三等䕶衞松愛國正白旗人鑾同族世居福齊希美佛赫地方庫初來歸其子濟哈原任員外郎伊漢原任司孫舒書原任頭等侍衞法保原任工部侍郎六格現任二等侍衞曾孫海敏現任筆帖式柏泰鑲白旗人世居費雅郎阿地方來歸年分無考其子博濟由委署叅領從征江西湖廣等處屢著軍功續征雲南擊敗賊偽將胡國秉馬寶等兵敘功授雲騎尉卒其子胡星額襲職扎海國鑲藍旗人世居費雅郎阿地方原係本處部長初率子弟來歸編佐領令其子圖赫統之孫托爾海原任典儀葉楚赫原任副都統曽孫費雅達原任步軍校公圖原任典儀阿拉密原任郎中石圖原係廕生達竒原任䕶軍叅領德竒原任三等䕶衞元孫恭額理花色俱原任前鋒校斯赫博鼐俱原任筆帖式拉啟達禮庫俱現任三等䕶衞四世孫福海現任驍騎校孟林現任典儀又扎海親兄安泰之孫布喀原任副都統兼佐領曾孫瑪齊原任右衞副都統對蘭原任郎中兼佐領元孫章愛原任佐領都清額五格俱原任筆帖式四世孫舒清額喀寧阿俱原任佐領喀克都理桑格俱現任佐領又扎海族姪碩色原任佐領孫納星阿原任䕶軍校董啟原任郎中元孫達爾布原任佐領按扎海與本旗同里屯珠瑚同族以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲紅旗阿爾當阿西占和羅地方人其孫拴柱原任䕶軍校右係國初來歸之人正黄旗拉塔葉赫烏蘇村地方人其曾孫岳鼐原任防禦元孫哈雅爾圖原任驍騎校田常原任䕶軍校魏存原任步軍校法存岳色俱現任驍騎校四世孫伊靈阿現任䕶軍校黄茂原任筆帖式按拉塔與鑲藍旗同里星額理同族正白旗包衣諾爾巴哈葉赫地方人其曽孫佛爾格原任三等侍衞元孫博和理原任司胙官費雅思哈原任驍騎校苗禪原任員外郎吳碩色原任郎中四世孫達善現任庫掌阿精阿大郎村地方人原任佐領其孫薩爾圖原任整儀尉扎林原任内副管領曾孫阿林原任藍翎侍衞和托原任䕶軍校元孫保住現任内管領鑲白旗佛訥赫費雅郎阿地方人原任䕶軍校納穆泰費雅郎阿地方人原任六品官其孫吳爾山原任八品官鑲藍旗屯珠瑚東地方人其子滿都瑚原任三等䕶衞孫朗圖原任郎中拉都渾原任䕶軍校塔載原任筆帖式曽孫阿爾賽現任防禦瑪喜納現任驍騎校諾邁原任筆帖式按屯珠瑚與本旗同里扎海同族赫什恒東地方人屯珠瑚同族原任三等䕶衞以上俱係來歸年分無考之人各地方呼倫覺羅氏烏祿遜國鑲紅旗人世居黒龍江地方軍校赫麻色原任初來歸其曾孫邁堪原任親驍騎校元孫達爾漢原任通政使司通政使晉布原任防禦班布克以軍功授雲騎尉其親兄之子珠瑚善現襲職又烏祿遜之四世孫達爾賽原任親軍校安保現任䕶軍校五十九永泰俱現任筆帖式玉三保由前鋒校從征凖噶爾奮勇擊賊陣亡贈雲騎尉其子達崇阿現襲職班布克子孫今隸鑲藍旗分右係應立傳之人其餘無事蹟可立傳者附載於後正黄旗包衣噶塔布福爾哈地方人其子岱敏政泰俱原任主事鄭特穆原任佐領鄭庫原任䕶軍校孫安泰原任郎中愛圖薩弼圖俱原任員外郎穆成額原任佐領曾孫托和齊原任主事岳格原任筆帖式常在原任郎中元孫博恩岱現任潼商道四世孫馬爾泰現任員外郎兼佐領豐盛額俄漠和地方人其子瓦爾達原任牧長以上俱係國初來歸之人正黄旗包衣阿哈尼堪葉赫地方人原任六品官其子搆色原任藍翎侍衞常保原任牧長又阿哈尼堪叔祖泰錫之孫遜布祿原任司胙官武三台原任二等侍衞曾孫希佛訥亦原任二等侍衞正白旗雅爾布葉赫地方人原係扎爾古齊其孫綽内原任司庫曾孫碩色原任郎中海扎爾圖原任司庫和善原任叅領三格原任驍騎校元孫特克慎現任委署䕶軍叅領德文原任筆帖式索洛喜原任牧長四世孫五十九現任守備包衣阿林輝發地方人其曾孫二格原任筆帖式正藍旗哈爾哈齊輝發地方人原任䕶軍校其子德明原任員外郎孫德竒訥原任郎中德赫訥現任郎中德倫原任筆帖式曾孫色顯現任司務以上俱係來歸年分無考之人各地方阿哈覺羅氏阿爾達世鑲黄旗包衣人世居薩克蘇和羅地方來歸年分無考原任兵部侍郎其子昂金原任牧長石漢原任内管領孫珠瑪喇原任員外郎伊漢原任内副管領伊漢子孫今隸鑲藍旗包衣右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗蘇成額松花江地方人其曾孫武納原任䕶軍校右係國初來歸之人鑲黄旗包衣科濶長白山地方人其曾孫愛新原任庫掌元孫佛保原任牧長五世孫榮保現任䕶軍校穆進泰哈達地方人其子阿進泰原任司庫孫巴蘭泰原任郎中曾孫索柱原任䕶軍校三魁原任庫掌舒文原任員外郎赫爾特現任内管領滿丕長白山地方人原任廐長克丑長白山地方人其子碩色原任員外郎桑格原任内副管領孫永保現任司庫曾孫法保現係生員正黄旗包衣阿庫納輝發地方人其子章山原任佐領喀庫那原任䕶軍校孫圖克德亦原任䕶軍校常綬原任員外郎瑚楞額原任牧長曾孫色爾赫原任防禦禮保原任委署䕶軍叅領斯格原任筆帖式四世孫伊通額原任防禦錢保現任總管鄂通果