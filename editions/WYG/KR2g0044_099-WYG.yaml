body:
  text: 八旗滿洲氏族通譜卷四十九額蘇理氏額蘇理為滿洲一姓其氏族散處於黒龍江等地方松果泰鑲黄旗人世居黑龍江地方天聰時来歸其子他那爾岱由䕶軍校從征江南攻江隂縣首先恩詔加登城克之授雲騎尉三遇阿哈爾錫孫覺和托至三等輕車都尉卒其子相繼承襲覺和托卒其親弟之子三寶襲職時削去恩詔所加之職承襲雲騎尉現任藍翎侍衛又松果泰之孫索和爾原任筆帖式曾孫倉米原任經歴四世孫寶林現任筆帖式又松果泰之族孫塞穆庫勒原任委署䕶軍參領章保色原任驍騎校阿積爾圖國正白旗人世居馬察地方散從征浙江攻金華初来歸其子謨竒塔由閒恩詔加府第一登城克之授雲騎尉三遇東等處屢著至三等輕車都尉又征山西及廣戰功授為二等輕車都尉卒其子拉普齊承襲卒其子邁格襲職時削去恩詔所加之職承襲騎都尉又阿積爾圖之孫格保住原任七品官克伊圖由七品官從征雲南在黄草􅄵地方敗賊有功授雲騎尉卒其子蘇楞泰承襲卒其兄之子特克進現襲職喀爾齊岱鑲黄旗人世居德爾吉地方天聰時来歸其孫圖爾巴尼原任陵寢翼長曾孫齊普克原任䕶軍校科竒圖原任驍騎校巴拜原任郎中碩岱原任二等侍衛和爾布庫由前鋒參領從征湖廣在太平街地方擊偽將吳國貴兵陣亡贈雲騎尉其子衮拜孫善德相繼承襲又喀爾齊岱之曾孫運岱由八品官從征陜西湖廣及四川等處屢敗賊兵授雲騎尉卒其子璧爾哈圖襲職又喀爾齊岱之元孫阿什圖原任筆帖式德明原任主事顧古圖原任三等侍衛奢英額現任䕶軍校四世孫徹克登原任驍騎校顧福陳現任驍騎校又喀爾齊岱親弟羅必岱之子塞特理原任佐領孫布爾泰亦原任佐領三圖現任前鋒校曾孫沙隆阿現任協領元孫渾保原任筆帖式四世孫班達爾什原任佐領又喀爾齊岱親弟春布爾岱之曾孫勒齊原任驍騎校元孫桑格亦原任驍騎校羅托渾國鑲黄旗人世居黑龍江地方騎校從征湖廣在初来歸其孫莫爾庫勒由驍贈雲騎岳州府擊賊陣亡卒其子阿濟圖現襲職又羅尉其子福綬襲職托渾元孫齊扎布黑色俱原任驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗雅哈那王佳村地方人其孫塞克現任䕶軍校圖拉那木都魯地方人其孫和爾和岱原係副驍騎校鑲白旗蘇岱蜚悠城地方人其子雅爾納原任協領孫克森泰現任佐領曾孫扎蘭泰亦現任佐領吉羅凱黑龍江地方人其孫滿都喀原任驍騎校曽孫固魯原任䕶軍校蘇克山原任五品官元孫吳爾太亦原任五品官以上俱係國初来歸之人正白旗伊爾得撤齊齊哈爾地方人原任防禦和爾瑚岱齊齊哈爾地方人其孫胡秦圖原任筆帖式鑲白旗阿拉喇圖松花江地方人其孫哈拉庫原任防禦曾孫福爾塔原任驍騎校哈錫圖原任䕶軍校元孫福通阿現任驍騎校以上俱係来歸年分無考之人吳魯氏吳魯為滿洲一姓其氏族散處於烏喇等地方圖納哈國正黄旗人世居烏喇地方任副都統鍾果岱原初来歸其曾孫布舒庫原任䕶軍參領白竒原任驍騎校敦達理由閒散二次過北京征山東攻定興縣第三登城克之恩詔加授雲騎尉兩遇雲騎尉從征湖廣於寶慶府擊至騎都尉兼一敗賊兵後征廣東於新㑹縣擊敗賊首李定國兵又敗山谷伏兵四萬餘衆敘功授為三等輕車都尉卒其長子桑格分襲騎都尉兼一雲騎尉第四子福拉渾分襲雲騎尉桑格從征察哈爾布爾尼有功授為三等輕車都尉卒其子德玉襲職卒無嗣未襲又圖納哈之元孫連成原任雲麾使石圖原任城守尉滿珠原任散騎郎圖瑚魯原任筆帖式赫達色原任驍騎校武格原任䕶軍校白達色現任䕶軍校四世孫道昌原任筆帖式魯昌現任筆帖式舒昌現任員外郎徳克精額福森布俱現任藍翎侍衛三徳現任䕶軍校右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗扎爾胡濟葉赫地方人其子碩坦謨坦俱原任䕶軍校多和倫原任六品包衣大伊薩納阿庫里地方人其孫庫布圖什原任驍騎校曾孫阿竒原任䕶軍校元孫安圖亦原任䕶軍校薩齊庫現任驍騎校包衣法爾薩阿庫里地方人其曾孫噶森特現任親軍校以上俱係國初来歸之人正藍旗和爾起扎庫木地方人其孫三達色現任驍騎校右係来歸年分無考之人覺禪氏覺禪本係地名因以為姓其氏族散處於烏蘇里等地方國德國正紅旗人世居烏蘇里地方散從征甘州首先初来歸其次子科諾潤由閒賜巴圖登城克之都尉兩遇魯號授騎恩詔加至三等輕車都尉卒其子雅圖襲職卒其親伯之孫和托襲職卒其親弟偏圖襲職卒其子常恩詔所泰襲職時削去都尉又國徳之孫濃納原任八加之職現襲騎品官瑚柱正黄旗包衣人世居佛阿拉地方天聰時来歸原任膳房總領其子都楞額原任内管領孫都爾柏阿布鼐俱原任内管領他布鼐原任膳房總領曾孫勒栢理原任主事塔漢阿林俱原任御内管領噶哈禪原任任郎中噶達渾原任内務前二等侍衛陶格原府總管旒武原任司庫元孫索柱原任藍翎侍衛長明陶柱俱原任内管領阿薩理原任廐長西哈納原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正藍旗費揚格扎庫木地方人其孫漢楚喀原任驍騎校曾孫哈什亦原任驍騎校右係國初来歸之人正黄旗包衣通柱貝渾山秦地方人其孫通吉原任郎中兼内管領穆成額原係庫使曾孫伊理布亦原係庫使元孫明徳原任三等侍衛普官原係庫使恭清原任筆帖式唐蘇原任員外郎費揚古原任員外郎兼内管領徳恩現任六品庫掌四世孫黑柱現任内管領碩通鄂長白山地方人原任牧長其長子關保次子碩禮俱原任内管領孫衆神保亦原任内管領搆色原任委署䕶軍參領曾孫五雲珠現任内管領溫徹恒長白山地方人其子侃泰原任牧長孫羅碧原任内管領甘珠倫原任牧長四世孫胡爾泰原任廐長費揚古長白山地方人原任司胙官其子倭赫原任内管領卓克錫庫扎庫塔地方人原任庫掌其長子愛通阿次子莊阿俱原任内副管領孫保柱原任筆帖式塔進佛阿拉地方人其孫黑格原任内副管領瑪希納山秦阿林地方人其子花色原任委署䕶軍參領楊古理長白山地方人其子伊勒圖原任䕶軍校哈保原任牧長孫卓山亦原任牧長喀郎吉原任司庫曾孫花色原任庫掌桑格原任筆帖式元孫薩格亦原任筆帖式潘喜長白山地方人原任牧長吉納海長白山地方人原任䕶軍校貝楞額貝渾山秦地方人其子花色原任䕶軍校以上俱係天聰時来歸之人科竒理氏科竒理為滿洲一姓其氏族散處於瓦爾喀等地方索爾和諾鑲紅旗人世居瓦爾喀地方天聰時来歸由閒散過北京征山東梯攻河間府首先登城殁于賜巴圖陣號贈騎都尉以其子佛尼勒承襲厯任西安魯將軍後征逆藩吳三桂恢復朝天關生擒偽總兵一員斬偽總兵四員身經八十餘戰俱獲全賜祭葬勝尋卒於軍靖附祀賢良祠其第三子托柳襲如典禮諡恭職歴任黒龍江將軍卒其子賚山襲職卒其子德綬現襲職又佛尼勒之次子額楞特由佐領從征厄魯特噶爾丹有功授雲騎尉歴任湖廣總督後署理西安將軍出征喀噶烏蘇猝遇賊兵四面圍繞率衆奮擊身被重傷力戰不退遂殁于陣贈騎都尉兼一雲騎尉合併前所得之雲騎尉授為三等輕車都尉賜祭𦵏如典禮諡忠勇崇祀昭忠祠其子艾三襲職卒其子吳吉現襲職又索爾和諾之曾孫愛坦原任同知鄂三現任郎中豐三吳林保俱現任筆帖式紀三現任都統兵部侍郎皂格現任親軍校元孫徳昌現任中書吴岱現係廕生特穆慎國鑲紅旗人世居德爾吉阿里庫村地方攻冠縣初来歸由閒散二次過北京征山東梯贈騎都首先登城殁于陣遇尉其子瑚鈕襲職恩詔加一雲騎尉任協領卒其子德普色襲職卒其子圖克禪襲職時削去恩詔所加之職承襲騎都尉現任協領以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗岱帯阿庫里地方人其孫伊爾久現任驍騎校伊誠額原任䕶軍校曾孫禮國竒現任筆帖式鑲紅旗伊錫哈瓦爾喀地方人其子古魯原任二等䕶衛正藍旗瑚珠阿庫里地方人其曾孫瑚什巴原任䕶軍校元孫塞克現任驍騎校以上俱係國初来歸之人把爾達氏把爾達本係地名因以為姓其氏族世居把爾達及蜚悠城地方沙精阿國鑲紅旗人世居把爾達地方閒散二次過北京初来歸其四世孫丹達理由征山東梯攻朝城縣第二登城克之授雲騎尉三遇恩詔加至三等輕車都尉卒其子隨哈襲職卒其子達漢襲職時削去恩詔所加之職承襲雲騎尉卒其子五十九襲職卒其親伯之子蘇鼎現襲職又沙精阿之五世孫蓀達理原任郎中六世孫蘇爾赫原任典簿托錫原任筆帖式托縉神保俱現任佐領永德現任靈臺郎靈保現係副䕶軍校右係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗通色把爾達地方人其曾孫穆成額原任參領元孫穆爾泰原任郎中四世孫能格原任國子監司業羅察現任二等侍衛五世孫漢班現係副䕶軍校又通色之四世孫堪錫原任牧長其子喀岱原任二等侍衛阿濟根禪布俱原任包衣大孫喀爾賽亦原任包衣大常祿現任牧長巴海現任䕶軍校曾孫阿岱現任包衣大堪錫之子孫今隸鑲白旗包衣正白旗巴倫達把爾達地方人其子倫岱原任前鋒侍衛曾孫阿晉泰原任郎中薩爾圖現任驍騎校元孫巴爾納現係庫使鑲紅旗尼雅哈把爾達地方人其子顧滿岱原任頭等䕶衛孫富喀原任給事中蓀塔原任佐領鶴商原任員外郎曾孫巴什原任筆帖式班都原任防禦九十原係監生兆唐原任協領惠山原任筆帖式元孫噶琳原任城門尉滿都理原任前鋒校伊臨泰原任主事四達現任筆帖式兆音圖候補筆帖式兆岡建現係監生五世孫雙越原任司庫邁圖把爾達地方人其孫渾濟鄂爾弼俱原任驍騎校碩禮渾原任䕶軍校曾孫福保亦原任䕶軍校鑲藍旗寧圖把爾達地方人其孫蘇赫徳原任䕶軍校烏赫徳原任筆帖式曾孫富保現任三等䕶衛材柱原任䕶軍校巴爾圖富爾善瑚密色俱原任驍騎校元孫薩爾帕原任頭等䕶衛瑚爾竒現任䕶軍校四世孫瑚什保現任二等䕶衛瑚圖把爾達地方人其子薩弼圖原任典儀孫薩爾圖亦原任典儀以上俱係國初来歸之人正黄旗夸哈達把爾達地方人其孫法楚渾原任驍騎校曾孫索爾璧原任前鋒侍衛尼雅達原任郎中雅通阿原任協領赫雅圖原任防禦孟嘉原任筆帖式元孫塔克禪原任助教長綬四格俱原任郎中六格原任内管領佛保柱現任郎中吉瞻阿爾納齊蘭保衆神保俱原任筆帖式四世孫塔色原任員外郎肖格瑪爾泰俱現任驍騎校常海阿爾泰俱現任鳴贊星德現任筆帖式五世孫五十七現任三等侍衛右係天聰時来歸之人鑲紅旗孟滚把爾達地方人其曾孫約興阿原任參領元孫約爾吉原任步軍校岳僧阿蜚悠城地方人原任包衣參領其子七十原任䕶軍校正藍旗台碧訥把爾達地方人其子吉保原任驍騎校孫倭昇額現任䕶軍校以上俱係来歸年分無考之人尼沙氏尼沙本係地名因以為姓其氏族世居尼沙及那木都魯地方楊固理國鑲紅旗人世居尼沙地方散過北京征山東梯初来歸其子齊哈拉由閒恩詔加攻魚臺縣首先登城克之叙功授雲騎尉三遇至三等輕車都尉緣事革退後念其克城有功賞還雲復尉卒其子長綬襲職縁事革退其孫巴理布騎現襲職又楊固理之孫伊克善原任七品官曾孫瓦立雅善原任䕶軍校元孫德克亦原任䕶軍校右係應立傳之人其餘無事蹟可立傳者附載於後正白旗傅爾