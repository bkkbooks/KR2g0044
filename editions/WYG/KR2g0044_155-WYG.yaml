body:
  text: 八旗滿洲氏族通譜卷七十七附載滿洲旗分内之尼堪姓氏董氏董芝翰鑲黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其子董國政原任遊擊董登文鑲黄旗包衣管領下人世居義州地方來歸年分無考原任牧長董制彩鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子二格原任筆帖式孫六格亦原任筆帖式董艾濟鑲黄旗包衣管領下人世居遼陽地方來歸年分無考其孫長保原係生員董受倉正黄旗包衣人世居撫順地方來歸年分無考其元孫董明芳原任䕶軍校董賢芳現任六品官董廷芳現任員外郎馬色現任司庫保成現係庫使四世孫董䝉現係舉人留徳錦保黒兹俱現係庫使董翰傑正黄旗包衣管領下人世居瀋陽地方來歸年分無考其子董國柱原任牧長曽孫觀音保現任内副管領董國新正黄旗包衣人世居瀋陽地方來歸年分無考其五世孫董世禄現任筆帖式董國柱正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫長徳原任庫掌董應陸正白旗包衣旗鼔人世居瀋陽地方來歸年分無考其曽孫董成美現任庫掌恩特合現係庫使董留紀鑲藍旗包衣人世居瀋陽地方天聰時來歸原任六品包衣大其子董天祚原任守備孫七十八原任典儀呉氏浩善鑲黄旗包衣管領下人世居中後所地方來歸年分無考其子七十原任内管領孫西特庫亦原任内管領曽孫常福現任内副管領常亮常泰傅海俱現任筆帖式元孫武通額亦現任筆帖式呉珍亨鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其子呉昭籓原任知縣呉衍俊鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子呉宏祚原係廐副呉尚禮正黄旗包衣人世居瀋陽地方來歸年分無考原任同知其子呉紀百原任郎中孫呉雲興原任四品官曽孫四格原係生員呉良璧正黄旗包衣人世居瀋陽地方來歸年分無考其孫呉國隆原任筆帖式呉受益正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫呉偉呉深俱係生員班第正白旗包衣管領下人世居瀋陽地方圖國初來歸其孫來永現任廐長曽孫額渾現任三等侍衞呉瞻儀正白旗包衣管領下人世居瀋陽地方來歸年分無考其元孫福森布福色克俱現任筆帖式堯泰正藍旗包衣人世居瀋陽地方來歸年分無考其子常受原任牧長曽孫二格丑色俱現任䕶軍校元孫保爾現任司庫呉受倉正藍旗包衣人世居瀋陽地方來歸年分無考其曽孫黒逹色現任八品官金氏金浩善正黄旗包衣人世居瀋陽地方來歸年分無考其曽孫金朝昇原任遊擊元孫金良材原任筆帖式四世孫金大成亦原任筆帖式金大鵬原任千總金大昇現係生員金文具正黄旗包衣人世居瀋陽地方來歸年分無考其子金有庫原任員外郎金繼祖正白旗包衣人世居瀋陽地方來歸年分無考其孫金成良原任鳯陽府䀋法道金雯聚正白旗包衣人世居瀋陽地方來歸年分無考其子塞爾布原任員外郎金汝相正白旗包衣旗鼓人世居遼陽地方來歸年分無考其元孫穆􅅬格現係武進士金文成正白旗包衣管領下人世居金徳城地方來歸年分無考其曽孫恒儀現係候選州同元孫恒裕國現任筆帖式金剛正白旗包衣人世居瀋陽地方來歸年分無考其元孫金士英原任筆帖式塞克理正藍旗包衣人世居瀋陽地方來歸年分無考其元孫六十三現任䕶軍校金棠正藍旗包衣人世居瀋陽地方來歸年分無考其元孫塞克圖原任筆帖式四世孫六十三現任䕶軍校金國泰鑲藍旗包衣人世居瀋陽地方天聰時來歸其子金世禄原任叅領孫塔思泰原任驍騎校金黒色現任䕶軍校許氏許傑鑲黄旗包衣人世居撫順地方來歸年分無考其孫許兆麟原任員外郎元孫許敏原任䕶軍校許升鑲黄旗包衣人世居瀋陽地方來歸年分無考其曽孫許偉英原任司庫許徳成正黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其孫許飬修原任知縣許飬浩現係生員曽孫許平許資許仁俱現任筆帖式許登魁正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫許格考原係廐副許茂官正白旗包衣管領下人世居遼陽地方來歸年分無考其孫許天爵原任員外郎曽孫景文現任司庫許夢忠現任郎中甘受原任筆帖式許國聘正白旗包衣旗鼔人世居瀋陽地方來歸年分無考其子許元亨原任千總孫許可久原任八品官元孫孫泰原任䕶軍校四世孫鼎柱現任藍翎侍衞許制孝正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫赫達色原任筆帖式曽孫海保常保俱現任筆帖式許官鑲白旗包衣管領下人世居瀋陽地方來歸年分無考其元孫許志良現任都司許志忠現係候選州同許陞正藍旗包衣人世居瀋陽地方來歸年分無考其曽孫許九格現任三等䕶衞元孫七十三現任䕶軍校黄氏黄泰鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考原任内管領其曽孫來華原係牧副黄受理鑲黄旗包衣人世居郎家堡地方來歸年分無考其曽孫黄文升現任驍騎校元孫常清原任筆帖式黄國泰鑲黄旗包衣管領下人世居塔山地方來歸年分無考其曽孫元保百嵗俱原任筆帖式黄彦法正白旗包衣人世居瀋陽地方來歸年分無考其曽孫黄國棟現任䕶軍校阿哈立正白旗包衣管領下人世居遼河地方來歸年分無考原任司胙官其子留柱原任庫掌黄易春正紅旗包衣人世居遼陽地方司國初來歸其孫黄廷獻原任通政使右通政曽孫黄正原任知州黄順黄鑑黄榮俱原任知縣元孫黄得志現任筆帖式黄徳溥現任牧長黄得時現係貢生黄得英現係生員四世孫黄大寜亦現係生員黄世彦正紅旗包衣管領下人世居撫順地方來歸年分無考其曽孫黄國泰現任䕶軍校黄宗聖正紅旗包衣人世居鐵嶺地方庫國初來歸其曽孫黄雲現