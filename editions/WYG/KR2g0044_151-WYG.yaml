  text: 八旗滿洲氏族通譜卷七十五附載滿洲旗分内之尼堪姓氏王氏王宏徳鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子西特庫原任四品官孫烏喇現任䕶軍校常保佛保俱現任員外郎曽孫吉慶現任郎中廵視河東鹽政常住傅慶俱現任筆帖式伊福如伊福柱常徳常㤗俱現係監生王東海鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫費揚古原任筆帖式曽孫官住現任郎中常在現任䕶軍校佛保鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子和碩理原任筆帖式孫查爾岱現任員外郎阿爾㤗現任内副管領雅爾㤗現任委署主事納爾泰現任筆帖式曽孫法保現任員外郎三保現任筆帖式王承徳鑲黄旗包衣人世居王綱臺地方來歸年分無考其子王思賢原任三等侍衞曽孫萬住原任佐領元孫傅勒赫現任司庫四世孫豐勝額現任筆帖式王三鑲黄旗包衣管領下人世居撫順地方來歸年分無考其子薛爾原任三等侍衞孫五十九現任䕶軍校桑格現任三等侍衞侍衞副班領王成勲鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子王制翰原任内副管領孫王泰現任三等侍衞曾孫六十五現任筆帖式王忠孝鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫常受原任䕶軍校桑格五十八俱原任内管領曽孫徳寕現任三等侍衞王福鑲黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其曾孫王承恩原任主事四世孫黒格五徳俱現任筆帖式王文鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子王平原任守備王徳鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫王文裕現任守備王明鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子千神保原任内副管領孫官保原任筆帖式王景禄鑲黄旗包衣人世居遼陽地方來歸年分無考其曽孫王尚學原任驍騎校王受徳鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫王竒儒原任牧長王世龍鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其子呉賽原任牧長王石柱鑲黄旗包衣人世居遼陽地方來歸年分無考其四世孫王亭現係候補千總王良現係生員瓦克善鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其曽孫八十原任庫掌王定邦鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其子王家亮原任筆帖式孫王子成原任䕶軍校王義品鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考原任筆帖式王裕功鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫王昌言原任驍騎校元孫王正現係生員四世孫王熙明現係舉人王守坤鑲黄旗包衣人世居瀋陽地方來歸年分無考其孫王應魁原係牧副松塔正黄旗包衣管領下人世居長白山地方來歸年分無考原任佐領其子西特庫原任牧長曽孫華色原任員外郎兼叅領佛保原任郎中伊拉齊現任郎中元孫泰山保現任員外郎五十六現任筆帖式王立鑄正黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其子五十八原任員外郎孫干寜現任三等侍衞侍衞副班領曽孫永成現任筆帖式王徳容正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其子王義照原任驍騎校曽孫石圖現任佐領元孫舒麟現係生員王拜同正黄旗包衣人世居瀋陽地方來歸年分無考其子王魯智原任知州王有在正黄旗包衣管領下人世居瀋陽地方來歸年分無考其子王朝聘原任筆帖式孫王一容亦原任筆帖式曽孫額林現任内管領王留正黄旗包衣管領下人世居瀋陽地方來歸年分無考其子索住原任内管領老格原任司庫二格原任牧長孫王保住亦原任牧長曽孫五十七原任筆帖式王盤正黄旗包衣管領下人世居瀋陽地方天聰時來歸其子王受貴原任藍翎侍衞曽孫兆昌原任庫掌元孫常住現任筆帖式王茂蘭正黄旗包衣管領下人世居瀋陽地方來歸年分無考其子巴格原任䕶軍校孫老格原任筆帖式曽孫佛保住衆神保俱現任八品官王棟科正黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫色格原任䕶軍校曾孫僧保原任筆帖式王徳錦正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其子成禄原任䕶軍校王國椿正黄旗包衣人世居瀋陽地方來歸年分無考其曽孫王齊彪現任千總王來勇正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫福受現任千總王登清正黄旗包衣管領下人世居遼陽地方來歸年分無考原任司庫其子法保原任筆帖式孫連陞現任筆帖式王崇彩正黄旗包衣管領下人世居瀋陽地方來歸年分無考其曽孫傅昌原任筆帖式王士選正黄旗包衣人世居瀋陽地方來歸年分無考其曾孫王錫原任膳房總領福格現任八品官王老誠正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫王國興現係舉人貳格正黄旗包衣管領下人世居瀋陽地方來歸年分無考其曾孫長興現係庫使王來聘正白旗包衣人世居瀋陽地方來歸年分無考原任山東兵備道王繼清正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其子王秉士原任副將王强正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫王應魁原任䕶軍校王應科原任八品官元孫色勒現任郎中兼佐領王道金正白旗包衣人世居瀋陽地方來歸年分無考其孫王世印原任䕶軍校曾孫討格現任頭等侍衞王永盛正白旗包衣旗鼓人世居遼陽地方來歸年分無考其孫王濟民原任知州王恵民原任主事曽孫王慎徳現任員外郎王熹徳王恒徳俱現係舉人王令徳原任通判元孫王廷璽臣柱俱係候補通判玉柱王廷對俱現係舉人王廷佐現任筆帖式四世孫王朝賔現任八品官五格現任知縣福保現任筆帖式五世孫二格現任八品官王瑞王琮俱現任都