body:
  text: 八旗滿洲氏族通譜目録卷三十烏喇地方兀札喇氏福蘭達賴栢起訥德楚庫以上俱有傳塔第福噶保鐘古和濟格吳什哈達爾球掖普綬武訥塞貝德勒巴爾都雅魯武巴塔特斗塔爾謙恩額圖穆成額以上俱附載薩哈爾察地方兀札喇氏穆穆理德特赫札蘭滚布陶納薩進泰第優格以上俱有傳索爾吉納鄂齊蘭以上俱附載黑龍江地方兀札喇氏正特克尼堪舒松阿哲楚克察漢和齊喀瑪納備達福帖嘉勒尼以上俱有𫝊錫普克尼濟普古德善薩楞塔索渾素愷完達錫秦道海塔恰喇穆丹三崇阿博爾輝布濟達那穆達桑格薩爾機達阿拉哈塔庫秦阿爾楚喀濟納達爾華沙諾特爾德尼剛齊喀塔宻那圖黙圖勒克楚鄂爾諾圖爾都瑚薩爾格達揚桑阿以上俱附載各地方兀札喇氏色紐瓦納蓀尼喀達素克臣賽達布雅理墨爾根布克韜舒爾漢蘓完顔竒扣吉瑪納伊留以上俱有傳吳三泰岱祿貳格鄂錫塔那爾彪孔果絡札拉察武克都理薩克薩哈武尼庫僧額外都理札哈理拉普都哈塔克唐阿活隆鄂阿都喀色穆斗福爾哈塔赫努懇西爾口達普唐阿勒克車慕拉喀布武本格鈕爾謨諾諾爾布諾穆圖艾雅爾圖塔奇理鄂爾綽武倫圖訥爾泰以上俱附載
  hash: sha256:840d72e442066461c413bf12108ddc2194d3a01b116f4932f0cdb58a4010b7ad
