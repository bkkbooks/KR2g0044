body:
  text: 八旗滿洲氏族通譜目錄卷十七汪秦地方西林覺羅氏屯台鄂拜西楞額拉爾霸旒留以上俱有傳拉瑚塔吳當阿衮拜性欽西特庫侃泰瑪爾塔阿爾布哈噶克珠理以上俱附載各地方西林覺羅氏雅爾納巴布哈方喀拉賁布努顔玳貝楞額布顔楚陽阿翁吉訥卓端鄂順阿翁愛尹德齊以上俱有傳扎普薩台補鼐格費雅達雅爾布阿揚阿寧古齊噶喀善外圖庫都都倭赫以上俱附載
  hash: sha256:20782846a36246658b43f28109636c66990154422579c1849a0ff750ca0de05e
