body:
  text: 八旗滿洲氏族通譜目錄卷三哈逹地方瓜爾佳氏巴岱布克沙胡什哈瑪雅實希碩瑪碩色福爾納尼雅濟布邁佟阿和隆格胡錫屯額庫訥以上俱有傳薩喇布布哈鄂什泰金達頼安布禄安丕樓凱音布侃布禄札庫塔嘉呼禪布爾哈善桓占察哈布塞赫吳巴海公布禄雅泰塔本達都喀爾圗瑚穆和亷温達爾堪都理穆爾那顔圗喀阿克敦延泰僧額訥巴圗木克阿布庫庫爾徹鄂密達阿巴爾岱尼瑪達以上俱附載葉赫地方瓜爾佳氏喀屯明愛謨錫堪布祿古爾佳班濟那噶琨烏晉泰本泰椿布禄阿吉布金達爾漢阿哈以上俱有傳和托伊勒圖阿禮布薩穆哈阿晉瓦爾山布拉喀坤呉勒楚策爾布赫穆登巴塔騰徳蘇穆實諾永鄂温塔錫福東瑪爾積哈墨爾根塔拉布鼐庫達阿海那達齊那親科濶拖凖布克錫肯愛錫石徳鄂鼐特秦布噶拜納秦呉塔喀莽佳當珠瑚碩色玉三台薩哈連丹布禄達爾布瑪沙喀爾凱薩爾圗烏章阿那爾賽費揚古阿爾薩蘭慶安薩哈亷穆克登額岱珠瑚胡什布尹達理舒呼理巴雅頼以上俱附載烏喇地方瓜爾佳氏耀普托諾多内多和倫邦珠瑚烏音特喀爾喀濟瑪鼐圖土倫葉克舒阿布岱鑒布費約絡和伯喜那伊塞濟阿密察羅拖理席佛庫以上俱有傳呉努福伊哈那推謨和國泰格栢庫達爾齊額赫布禄吉理布珠蘭泰葉親松額理固他那尼堪郎錫阿哈錫朱蘭泰明安薩哈連尼岳克素岱色巴思漢福爾僧額鄂倫顔泰順巴圗喇瓦爾喀雅哈卓凌阿安圗碩色雅爾那古勒訥烏爾徳呉寧阿阿爾芬阿濟布薩爾瑪博岱董徳諾穆逹理伯謨喀巴伊思魁札那喀巴揚古阿爾善徳穆得赫鄂豸呉濟納以上俱附載訥殷地方瓜爾佳氏明安努葛隆額尼雅漢巴爾哈善索爾和多以上俱有傳尚吉索克西蘇赫泰法西蘭富爾瑚巴爾賽卓尚阿哈寧阿達䝉阿透登額沙晉囊錦佛濟訥以上俱附載
