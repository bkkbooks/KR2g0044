body:
  text: 八旗滿洲氏族通譜卷七十四附載滿洲旗分内之尼堪姓氏張氏張良弼國正白旗包衣旗鼓人世居瀋陽地方後因出征初來歸由閒㪚隨征克遼東授佐領攻城屢著軍功優授三等輕車都尉三次圍錦州奮勇擊敗洪承疇三營歩兵叙功授為二等恩詔加輕車都尉卒其子張時薦襲職三遇至三等男卒其孫承綬襲職時削去恩詔所加之職現襲二等輕車都尉又張良弼之子張時舉原任知縣張泰正黄旗包衣旗鼓人世居遼陽地方來歸年分無考由佐領授三等輕車都尉三遇恩詔加至一等輕車都尉兼一雲騎尉卒其子張蠎孫張繩祖相繼承襲張繩祖因病乞休其子常英恩詔所襲職時削去三等輕車都尉卒其子吉祥保現加之職承襲襲職又張泰之子張龍原任典儀張進原任䕶軍校孫張方玉原任牧長曾孫張景現任都司僧保現任員外郎張文燦原任䕶軍校兆住現任驍騎校元孫克星額七十一俱現任筆帖式張文興鑲黄旗人世居開平衞地方來歸年分無考原任甘肅廵撫其子張祖勲原任知州孫張臣徳原任知縣張臣荗原任縣丞張滋徳正白旗包衣管領下人世居遼陽地方來歸年分無考原任山西廵撫其子張純修原任知府張純儒原任知縣張純申原任知州孫赫色現任䕶軍校張書現係生員曾孫張傑現任筆帖式張厚徳正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫張文彬原任奏事郎中加内務府總管銜曾孫保全現任八品官李氏望明忠正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其子偏圖由都司從征山西屢著軍功授騎都尉歴任都統卒其子李楝襲職現任副將又望明忠之孫李彬原任員外郎兼佐領李節現任八品官曾孫蘇爾通阿現係監生李世昌正白旗包衣旗鼓人世居遼陽地方來歸年分無考原任佐領其子李成幹原任郎中兼佐領李成茂原任員外郎孫蘇爾泰原任主事九齡現任筆帖式李鍈貴原任户部侍郎曽孫三格原任知縣武爾登額現任八品官明安現任筆帖式李潮現係武進士李成賢正白旗包衣人世居瀋陽地方來歸年分無考其曾孫李延禧原任内務府總管元孫六格原任筆帖式四世孫官保黒逹色李保全保俱現任筆帖式李栢正白旗包衣人世居瀋陽地方來歸年分無考其子李有功原任佐領李懋功原任雲南永順鎮總兵官孫李國屏原任員外郎兼佐領曾孫李芳原任副將元孫阿什泰現任䕶軍校四世孫李治現任典儀李浦現係舉人李拔國鑲藍旗包衣人世居瀋陽地方原任雲南鶴麗初來歸原任佐領其子四十六鎮總兵官孫七十孟來俱原任䕶軍校黒色原任遊擊杜來原任三等䕶衞高氏高雲龍鑲藍旗包衣人世居瀋陽地方天聰時來歸其子地藏保由遊擊從征浙江福建等處於永寜贈雲騎衞擊賊陣亡四孫三逹色相繼承襲尉其子七十髙名選國鑲黄旗人世居遼陽地方十三年九月奉初來歸原𨽻包衣於雍正㫖貴妃之外戚著出包衣入於原𨽻滿洲旗分欽此其子髙登永原任直𨽻兵備道孫髙衍中原任郎中曾孫述明原任陜西凉州總兵官髙斌現任直𨽻總督髙鈺現任江南夀春鎮總兵官元孫高誠西寜俱現任員外郎高晉現任知州高恒現任主事高泰現任筆帖式高謙現係貢生高徳猷正白旗包衣管領下人世居瀋陽地方來歸年分無考其子布逹理原任内閣學士兼禮部侍郎曾孫桑格現任主事法保原任三等侍衞侍衞副班領雷氏雷宏華鑲白旗包衣人世居遼陽地方來歸年分無考原任鑾儀衞鑾儀使其子雷先聲亦原任鑾儀衞鑾儀使孫浩善由副將平定陜西時屢敗賊兵恢復豐縣等五城有功授雲騎尉後於四川贈騎都瀘州擊賊陣亡襲職任副將卒其子雷順現襲尉其子雷世傑職又雷宏華之孫雷繼宗原任都統兼佐領雷繼尊原任都統雷繼志原任佐領曽孫雷世啓原任三等䕶衞雷世俊原任佐領雷明貴原任防禦元孫雷璜原任䕶軍校雷巖雷煥俱現係生員雷政正白旗包衣人世居瀋陽地方來歸年分無考其子雷効臣原任司庫曽孫雷遇春原任武備院卿兼佐領老格現任三等侍衞兼佐領元孫通海現係廕生陳氏陳籓正黄旗包衣人世居瀋陽地方來歸年分無考其孫陳孔雲原任副將陳逹任陜西永固副將贈雲騎時遇賊阿喇柰等犯邊毁隘奮勇迎擊陣亡俊尉其子陳國奎現承襲又陳籓之曽孫陳國原任䕶軍叅領元孫陳炳現任天文生徳住現任驍騎校四世孫明安現任筆帖式陳耀原任筆帖式陳福現係庫使五世孫陳大本現係監生陳善道國鑲黄旗人世居海州地方雍正十二年九月奉初率族人來歸原𨽻包衣㫖勤妃母之外戚著出包衣入於本旗其族人七十餘既足為一個佐領即編為一個佐領令其族人管轄欽此其子陳撫逺原任蘇常道孫陳秉正原任鑾儀衞鑾儀使兼佐領陳秉􅉓原任給事中陳秉華原任知府陳秉恒原任郎中兼佐領陳秉直原任浙江廵撫曽孫陳希曽原任員外郎陳希敏原任雲麾使阿琳原任雲麾使兼佐領金琯原任員外郎陳希方現任知府元孫衆神保現任郎中陳琦原任知州陳謨原任員外郎陳現任叅領兼佐領陳䤤現任司務神保現任䕶軍校福柱現任驍騎校四世孫徳格原任員外郎明誠現任員外郎陳泗現係舉人周氏周勲業鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫索柱原任内副管領因奉侍聖躬敬謹小心授其子周六十為騎都尉現任藍翎侍衛周國彬鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫周天成原任𢎞文院學士周天柱原任庫掌曽孫周世俊原任藍翎侍衞元孫桑格原任員外郎兼佐領周遵現任䕶軍校四世孫和昇額現任郎中來福海保俱現任筆帖式胡氏胡海鑲黄旗包衣旗鼓人世居遼陽地方原係前明山東兗州府總兵國初來歸授為三等男卒其子胡萬明承