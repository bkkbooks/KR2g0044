body:
  text: 八旗滿洲氏族通譜卷六舒穆祿氏舒穆祿為滿洲一姓其氏族散處於庫爾喀渾春朱舍里及各地方庫爾喀地方舒穆祿氏舒穆祿為滿洲著姓而居庫爾喀者尤著自部長郎柱翊戴太祖高皇帝時通往來太祖厚遇之命其子楊古利入侍以公主降焉其族最盛楊古利額駙正黃旗人庫爾喀部長郎柱之長子也郎柱為所部害圍其家楊古利額駙之母繫幼子納木泰於背屬鞬佩刀射衆突出偕其族衆來歸庫爾喀部人尋亦內附楊古利額駙聞而逆之手太祖深刃殺父者割耳鼻啖之以復父讐時年甫十四異之日見信任始令守汛上江警修嚴密無敢犯者征輝發取訥殷及朱舍里安褚拉庫赫席黑穆倫諸路皆著偉績隨太祖往討哈達孟格布魯貝勒楊古利額駙奮戰先登生擒孟格布魯貝勒擊明兵於界凡與阿巴泰貝勒等爭先抵敵破其軍是夕進擊啇顔崖之兵令被傷者勿往楊古利額駙不肯留裹創繫腕率十佐領兵擊敗明大營兵取鐵嶺瀋陽遼陽等處俱有功太祖嘉其勞績命位次貝勒八人下統左翼兵授一等子後屯戍耀州躡踪至雅爾湖路殺毛文龍採太宗統參者九十餘人擒三千總以歸桂兵於明都城師征明楊古利額駙敗總兵滿之北大軍還略通州取薊州張家灣復與明兵戰於錦州楊古利額駙皆率侍衛護軍直前敗太宗嘉之授三等公尋晉超品公與多羅英郡王阿濟焉格等征明克昌平等十二城敗敵者五十八次生擒總兵巢丕昌等俘獲十八萬人從太宗征朝鮮同和碩豫親王多鐸擊敗其援兵方收兵登山賊敗兵竄伏崖側竊發火楊古利額駙兩朝自中傷卒楊古利額駙歷事始至終未嘗獲譴太宗寵遇之禮殊絶命本佐領護軍為之守門賞賚户賜豹尾槍二令親軍佩之甲卒二十人為之衛太宗解口及牲畜金幣無算其卒於軍也始旋師比櫬御衣衣之撫尸痛哭親視含殮畢盛至京太宗郊迎之命諸王百官往祭葬之日追封武勳王建太宗復親臨奠命本佐領八户守其塜世祖章碑墓道念舊勳命配享皇帝追太廟康熙三十七年聖祖仁皇帝恭謁陵寢至京盛親奠墓次三十九年復正九年御製碑文勒石紀焉雍世宗憲皇帝追考懋績殊勳公其次子塔瞻襲超品公特㫖加其世爵封號為英誠後緣事削超品公為一等公歷任領侍衛內大臣卒其子艾星阿襲職任領侍衛內大臣加太子太保太子少師順治十五年為定西將軍率兵征雲南追僞桂王至阿窪城獲之以一等公詔命以無增秩給顯其績卒賜祭葬如典禮諡敬康其子富善承襲一等公加太子太保太子少師議政大臣歷任領侍衛內太臣㫖崇祀卒於雍正十年奉承襲一等公歷任領侍衛內賢良祠其子海金大臣卒其子豐盛額承襲一等公任都統卒其子豐安承襲一等公現任散秩大臣又楊古利額駙之長子阿哈丹初為參領兼佐領從征湖廣至常德府擊僞安南王劉文秀僞將盧名臣舟兵二萬於江上敗之後從征雲南執僞桂王於緬國阿窪城降僞鞏昌王白文選及僞官五百卒三千八百餘人以功授雲騎尉卒其第六子額爾蓀襲職又楊古利額駙之孫雅圖原任副都統吉山原任步軍總尉扎海原任八品官曾孫鄭甘原任佐領佛保原任郎中票色原任護軍校元孫海綬訥清額額爾慶峩俱原任佐領俄楞額現任參領訥蒙額現任雲麾使善寧現任佐領四世孫多隆武原任佐領俄爾登俄現任佐領五世孫徐紹原任佐領海崇阿現任佐領又楊古利額駙之族曾孫都爾海現任護軍參領旺愛原任協領碩色現任驍騎校族元孫新特現任佐領色黑現任護軍校雅爾海現任驍騎校族四世孫舒章阿現任鳴贊楞格理正黃旗人楊古利額駙之次弟也初由佐領授騎都尉委右翼哨探殺明遊偵俘獲散卒授三等輕車都尉率八十人往達代蘇巴爾漢境遇蒙古百餘追逐殱之入其壘俘七百人殺三塔布囊晉一等男往蒙古界遇三營蒙古兵殺其丁壯餘悉俘獲又盡取巴渾台吉人馬牛羊共俘四營七千人身留殿後七日乃歸以勞績晉三等子征朝鮮直取斥堠十所攻義州首先登城克之授一等子歷官刑部尚書都統兼佐領卒其長子穆成額襲職歷官副都統兵部侍郎恩詔加兼佐領卒其子穆赫琳承襲一等子三遇子四一等伯掌鑾儀衛事內大臣兼佐領卒其格承襲一等伯歷任掌鑾儀衛事內大臣兼護軍統領佐領卒其子塞克圖襲職時削去恩詔所加之職承襲一等子現任佐領又楞格理之孫穆哈連原任三等侍衛兼佐領元孫吉黨阿現任歸化城都統四世孫蘇崇阿楊桑阿俱現係廕生納木泰太祖髙正黃旗人楊古利額駙第三弟也三載考績授皇帝時賜姓覺羅後由兵部尚書三等輕車都尉尋授都統取大凌河時伏兵錦州松山間俘獲百人後征大同攻克王家莊往招額哲額駙時入明境敗平魯衛兵敘功擢三等男卒其次子阿拉密承襲卒其子竒蘭布承襲卒其子吉綬現承襲又納木泰之長子巴雅爾圗由佐領取皮島陳亡優贈三等輕車都尉其子巴哈連承襲卒其子查三泰孫查克都相繼承襲查克都卒其子英得現承襲又納木泰第三子阿哈連由護軍參領圍錦州擊敗賊兵入山海關擊敗流冦敘功授騎都尉卒其子倫布勒克徹布賴布爾泰孫黑雅圗相繼承襲黑雅圖卒其子蓀扎齊現承襲又納木泰之孫巴布連由護軍參領從征湖廣江西等處屢著戰功授雲騎尉卒其孫塔爾布現承襲又納木泰之曽孫巴爾漢由護軍參領征厄魯特噶爾丹有功授雲騎尉卒其孫舒常現承襲又納木泰第四子額爾塞原任護軍參領孫吳爾胡代佛延授俱原任郎中兼佐領布丹原任三等侍衛曾孫定鼐現任二等侍衛兼佐領布占現任佐領郎鼐現任六品官禪岱㑹玉俱原任三等侍衛巴克三泰原任護軍參領四世孫七十八現任七品官談泰正黃旗人楊古利額駙之弟也從征董䕫奮勇敗賊俘獲甚衆隨大兵往北京擊敗明總兵滿桂兵授佐領取大凌河時先入敗錦州兵及還明兵攝其後復兩敗之遇明監軍道張春兵率兩纛入其前隊破其軍以功授三等輕車都尉過北京征山東率百人取南榆寨屢敗吳軍門王總兵兵於楊河通州等處又取濟南等七城擢一等男三圍錦州擊敗松山馬步兵又擊敗洪承疇三營兵擢二等子入山海關擊流寇時步戰破營定鼎燕京論功晉三等公緣事罷職後征江西授為征南大將軍攻饒州信豐九江南昌四城不設鈎梯取之斬賊渠金聲桓王德仁江西悉平授一等子嗣授為一等公歷任都統吏部尚書後緣事獲罪其長子唐烏哈由佐領取前屯衛賊兵出城迎戰率兵射却之入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之敘功授騎都尉卒其子塔爾畢喜塔爾拜孫阿延相繼承襲阿延卒其子卓爾多現承襲又談泰之孫阿爾拜原任吏部侍郎兼佐領拉爾拜原任三等侍衛鄂佛和原任七品官曾孫雅顔原任長史安特現任貟外郎保住富延俱原任筆帖式元孫碩岱現任佐領談布正黃旗人楊古利額駙之弟也由佐領征黑龍江有功授騎都尉三圍錦州奮勇敗賊屢著戰功加一雲騎尉入山海關繫敗流賊兵二十萬衆授二等輕車都尉平定淮安屢敗田軍門兵欽功授一等輕車都尉兼一雲騎尉征四川敗賊張獻忠兵圍大同賊兵迎戰擊敗之又於平陽太原等處屢敗賊兵招降二州十一縣授三等男遇恩詔晉二等男後緣事降為一等輕車都尉兼一雲騎尉遇恩詔復授三等男歷官工部尚書副都統散秩大臣兼佐領卒其子喀岱襲職歷任議政大臣都統兼佐領卒其子喀岱襲職任副都統卒其子吳雅祿襲職現任長史又談布之子凱音布原任二等侍衛塔岱原任三等侍衛孫海靑常住俱原任護軍參領法郁原任三等侍衛常明原任陵寢翼長老格現任護軍參領僧額原任筆帖式曽孫舒瞻現任貟外郎福海現任三等侍衛白慎泰陵寢翼原任蘭太現任驍騎校章格原任筆帖式長納伊爾德正黃旗人楊古利額駙之族侄也隨楊古利額駙來歸初征北京敗薊州步兵取大凌河擊明御前伊監軍道張春兵一人執弓當北京入關時破賊爾德馳斬之授騎都尉再往陳奪關門以雲梯下定興縣攻昌平州擊敗巢丕昌髙太監等兵優授一等輕車都尉圍錦州奮勇克賊加至一等男定鼎燕京又加一雲騎尉平定河南江南降一州四縣過揚子江先八旗而渡晉二等子征福建江西等處降一府十三縣晉一等子遇恩詔擢授三等侯緣事降為一等伯遇大將軍征舟山恩詔加一雲騎尉緑事革職後為鎮海於夏關梁斗門等處屢敗僞總兵毛光祖等兵斬僞總制陳陸御僞英毅伯阮思等十七人擒僞總兵藍德等百餘人降僞官九十餘人卒三千餘衆以恢復舟山復原職又敘功優授一等賜祭葬侯兼一雲騎尉歷任議政大臣都統兼佐領卒如典禮諡襄敏其子托和齊原任二等侍衛早卒孫巴渾德襲一等侯兼一雲騎尉歷任領侍衛內大臣卒賜祭葬如典禮諡恪恭其第四子馬哈逹襲職時削去恩詔所加之職承襲二等伯任散秩大臣卒其子郭爾多現襲二等伯又巴渾德之長子巴隆分襲一雲騎尉原任頭等侍衛卒其子巴通阿襲職現任二等侍衛又伊爾德之曾孫二格原任雲麾使兼佐領綽爾多現任西安將軍元孫綽敏現任三等侍衛馬桑阿現任副參領兼佐領郭爾敏現任三等侍衛郭爾勤現任藍翎侍衛石格現係廕生四世孫舒禮納現係廕生又伊爾德之族弟德內原任護軍校族侄章靄原任護軍參領族曽孫唐喀現任副參領兼佐領族元孫富桑阿現任三等侍衛額爾濟赫正黃旗人楊古利額駙之族侄也由騎都尉取錦州有功授三等輕車都尉初往北京攻薊州贈一等殁於陳尉其子額爾弼赫襲職從征寧逺圍錦輕車都州入山海關擊流寇屢著戰功加一雲騎尉卒無嗣其親弟色爾弼襲職三遇恩詔加至一等男卒無嗣其弟謨新弟之子巴金泰相繼承襲巴金泰卒其子齊禮納襲職時削去恩詔所加之職現襲一等輕車都尉兼一雲騎尉又額爾齊赫之兄穆成額原任頭等侍衛姪噶漢玳吳郎阿俱原任二等侍衛姪孫噶爾濟原任三等侍衛舒當阿現任都司永寧現任七品官舒楞額仕至吏部侍郎兼副都統北路出征在和通呼爾哈腦爾地方擊賊陳亡贈騎都尉其子德爾松額現襲職富達禮國正黃旗人楊古利額駙同族世居庫爾喀地方初來歸由驍騎校從征四川屢著戰功授騎都尉卒無嗣其姪皂保孫頗亷巴蘭泰相繼承襲又富逹禮之姪法克善原任護軍校姪孫吳禮原任鳴贊額爾本岱原任筆帖式朱䇿國正黃旗人楊古利額駙同族世居庫爾喀地方初來歸由驍騎校從征湖廣攻木城中炮殁於贈雲騎陳無嗣其兄之子他庫襲職卒其子雅圖襲職尉現任護軍參領又朱䇿之孫唐琦原任郎中曽孫馬隆原任博士穆克登現任八品官元孫色爾特原任八品官又朱䇿之族弟哈理納他哈俱原任步軍校族孫新特現任佐領雅爾海現任驍騎校吳勒國正黃旗人楊古利額駙同族世居庫爾喀地方初來歸由委署護軍校從征雲南於黃草壩石門坎等處屢立戰功授雲騎尉後征厄魯特噶爾丹有功加一雲騎尉併為騎都尉歷官護軍統領因病休致其子舒琦現襲職第四子福寧原任郎中又吳勒之親兄禪布由委署護軍校從征長沙陳亡今入昭忠寺岱都喀鑲白旗包衣人楊古利額駙同族世居庫爾喀地方來歸年分無考其孫噶哈巴圖魯原任防禦曽孫洪善原任郎中元孫希佛原任司庫費楊古由護軍校從征浙江福建等處屢立戰功授騎都尉卒其子福盛承襲卒其子福勒赫現襲職又岱都喀之元孫關保原任典儀扎庫逹從征厄魯特噶爾丹敗賊有功授雲騎尉卒其子巴海襲職又岱都喀之四世孫沙納海原任參領靠山原任頭等