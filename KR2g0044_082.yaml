body:
  text: 八旗滿洲氏族通譜目録卷四十一寧古塔地方寧古塔氏伊住尼喀禮囊機僧額拜色葉柱豐匹訥圖赫訥翁嘉達瑚克特克以上俱有傳阿圖納貝琨索爾活那蘇南泰朱爾坤黨色德普特林竒塔理瑪色以上俱附載各地方寧古塔氏雅穆什達伊洛托鄂爾多阿鈕以上俱有傳圖切陳庫穆圖科達納扎齊希爾圖鄂黑都柳阿魯以上俱附載伊蘭費爾塔哈村地方薩哈爾察氏唐阿禮丹布魯以上俱有傳綽諾布拜思渾阿穆塔哈羅穆岱以上俱附載各地方薩哈爾察氏蘇庫努莽伊祿孟額圖以上俱有傳常清法噶琥雅以上俱附載
  hash: sha256:da218d90defdc4a13e02091c8e9ff70f82c1330938d5d6792017d2022adac887
