  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0044_WYG_013-1a, image: WYG0455/WYG0455-0139a.png}
body:
  text: 八旗滿洲氏族通譜目錄卷六庫爾喀地方舒穆禄氏楊古利額駙楞格理納木泰譚泰譚布伊爾德額爾濟赫富達禮朱䇿吳勒岱都喀尼雅寜阿布庫倭赫以上俱有傳阿錫坦郎柱阿庫禪寜古泰郎善莽伊達阿星阿以上俱附載渾春地方舒穆祿氏嘉素蘭阿爾﨣那爾渾貝衮以上俱有傳瑚虎那巴柱德庫雅瑚雅隆塔克圖麻色安都喀以上俱附載朱舍里地方舒穆祿氏胡勒額駙葉臣耀藍瑚達馮安以上俱有𫝊吳岱哲中額艾塔以上俱有載各地方舒穆祿氏布噶扎齊巴額古德阿哈那圖巴海穆翰席爾泰達括布瞻順布祿顔布祿卓滿哈明阿頼碧漢岱音布祿以上俱有𫝊章固理雅珠喀泰西特庫善圖吳爾古泰瓦理雲瑚敏西拉納清堪卦爾察岱音達理張圖胡什泰鄂羅渾郎珠瑚和托喀齊啟尼桑阿穆哈連木赫林艾荅扎希達靠謙王伊納阿克善阿巴蘇拜塔晉蒙古爾岱屯布魯伊哈齊常堪圖墨圖星泰珠赫訥西理尼和羅竒都朱琥愛漢鄂思訥泰薩朗阿東阿吳勒爾素當達理塔克圖富拉禪安布庫覺齊那瑚倫賽碧漢三達理錫墨訥松愛魁凱鶴善薩旒哈坦綽布海華色昻楚蘭昻嚢阿和托索楚顔布祿拉占庫爾圗訥湯善恩格勒昻靄方吉綽克塔諾穆齊葛琳泰岳托僧格哈爾吉三達理以上俱附載
