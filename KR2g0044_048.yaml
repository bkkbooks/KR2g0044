body:
  text: 八旗滿洲氏族通譜卷二十三烏喇地方納喇氏烏喇本國名初名扈倫其始祖名納齊布禄獨䖏輝發烏喇兩界之啟爾撤河源有聞其墨爾根名自虎宻雅拉庫河来訪者納齊布祿留之為弟名之曰徳業庫居無幾徳業庫别去其𫝊説聲譽䝉古可汗聞之令兵百人徃訪欲迎歸以女妻之錫之户口産畜納齊布禄誑云擕父母偕徃遂登髙峯不下蒙古兵衣甲趨上納齊布禄射之矢無虗發兵不能上問其姓隨口應之曰納喇氏遂相傳為納喇氏云蒙古兵退避居烏喇河濵烏喇居人訝上流有羽毛逐流而下使二十人徃覘焉納齊布禄贈以所獵獲禽獸皮肉羽毛二十人歸白其衆衆迎歸奉為部主納齊布禄納一女子生商堅多爾和齊後復還故䖏不知所終子商堅多爾和齊繼為烏喇部主商堅多爾和齊卒子嘉穆喀碩朱古繼嘉穆喀碩朱古卒子都爾希繼都爾希卒子古對珠顔繼古對珠顔卒子太蘭繼太蘭卒子布顔繼盡服烏喇諸部築城扵烏喇河岸洪尼地方自稱為貝勒布顔卒子布干繼布干卒子滿泰繼太祖髙皇帝納其女為大妃滿泰卒弟布瞻泰繼以公主降焉嘉穆喀碩朱古第四子綏屯生克習納都督克習納都督生轍轍木轍轍木生萬萬别為哈達部主又一支因移居伊罕山遂别為伊拉理氏達爾漢國正白旗人布瞻泰之長子也世居烏喇地方鼎初来歸由佐領圍松山敵兵出戰撃敗之定燕京時入山海闗撃敗流賊馬歩兵二十萬衆叙功授騎都尉三遇恩詔加至二等輕車都尉卒其子果禮襲職任頭等侍衛兼佐領後歴襲至果禮之曽孫納親削去恩詔所加之職承襲騎都尉卒其叔曽祖之子哈爾薩襲職任佐領卒其親伯之孫栢理襲職現任佐領布瞻泰次子達拉穆之子圗爾賽由前鋒叅領徃遮嶺口撃敗敵兵二百餘人定鼎燕京時敗流賊扵山海闗外又追至安肅縣慶都縣斬殺甚衆叙功授雲騎尉卒其子佛保襲職遇恩詔授為騎都尉任協領兼佐領卒其子永柱襲職任佐領卒其子緒昌襲職時削去恩詔所加之職現襲雲騎尉布瞻泰第三子阿拉穆原任佐領第四子巴顔第五子布顔圗俱和碩公主所生第六子茂墨爾根第八子噶都渾俱公主所生太祖念係烏喇國後裔授巴顔副將職編佐領令其専管以郡主妻茂墨爾根編佐領令其専管授布顔圗騎都尉兼一雲騎尉噶都渾原任䕶軍叅領兼佐領又達爾漢之子栢爾騰原任二等侍衛兼佐領孫昂安巴原任二等侍衛拜音布原任筆帖式達拉穆之孫伍什原任三等侍衛瓦爾達原任主事赫徳原任七品官曽孫福泰原任佐領神保原任驍騎校常懐徳常懐義俱原任筆帖式紹先現任三等侍衛元孫烏進泰現任䕶軍校阿拉穆之子沙渾穆楚俱原任三等侍衛桑阿布原任二等侍衛博爾屯原任前鋒校丕色原任䕶軍校孫普成原任協領栢成額原任三等侍衛伊宻遜原任筆帖式曽孫常春原任佐領五十三原任䕶軍校常禄現任驍騎校茂墨爾根之子禪普原任佐領孫巴爾薩亦原任佐領藹忠原任頭等侍衛侍衛班領兼佐領曽孫特亨原任馬蘭口總兵官縁事革退現任乾清門二等侍衛赫爾輝現任副叅領元孫喜禄現任三等侍衛兼佐領噶都渾之子拉都渾原任協領兼佐領𤓰什霞原任頭等侍衛勒爾博輝原任三等侍衛常武原任司務色克圗原任佐領孫拉瑚塔原任協領兼佐領曽孫倉柱現任佐領阿布泰國正白旗人滿泰第三子也世居烏喇地方子色初来歸尚和碩公主歴任都統兼佐領其楞原任二等侍衛孫巴哈塔原任佐領曽孫納明住原任佐領元孫永福原任佐領永徳現任三等侍衛兼佐領又阿布泰親兄納穆達理之子拜音泰柱由頭等侍衛從征朝鮮攻皮島陣贈雲騎亡其長子阿古蘭襲職三遇尉恩詔加至三等輕車都尉卒其子噶爾漢襲職卒其子拉爾泰襲職任協領卒其子瑪雲襲職時削去恩詔所加之職承襲雲騎尉卒其子達保現襲職拜音泰柱之次子穆舒瑚原任二等侍衛第三子牛鈕原任三等侍衛孫羅宻原任主事郎圗明福圗拉俱原任筆帖式曽孫申周滿都俱原任筆帖式魯爾錦現任鳴贊阿達現任驍騎校圗達理鑲白旗人滿泰兄布丹第三子也世居烏喇地方國初来歸任副都統其子阿穆齊原任二等侍衛孫阿林保原任䕶軍統領圗那海原任郎中曽孫瑪岱原任頭等䕶衛元孫圗爾賔亦原任頭等䕶衛五十九原任三等䕶衛瑪昇現任御史海保現任筆帖式又圗達理親兄阿齊之子尼堪在理藩院侍郎任内以任事有能不違指使授三等輕車都尉定鼎燕京時授為二等輕車都尉後破流賊滅福王平定河南江南等處屢著戰功授為一等輕車都尉追滕吉思扵圗喇河地方兩敗賊兵獲其家産牲畜又撃敗土謝恩詔加圗汗兵有功優授三等男三遇二等子卒無嗣至三等子尋以効力有年授為其親叔之子阿穆爾圗阿什圗孫瑪拉昭子等四人分襲其職阿穆爾圗分襲三等輕車都尉從征廣東扵新會縣地方撃敗賊李定國馬步兵數萬餘衆後征雲南貴州扵凉水井等䖏屢敗賊兵叙功授為二等輕車都尉歴任奉天將軍卒其子阿林泰襲職任佐領卒其子吳勒理襲職亦任佐領卒其親弟阿爾經阿襲職時削去恩詔所加並阿穆爾圗軍功所得之職現襲騎都尉兼一雲騎尉阿什圗分襲雲騎尉歴任鴻臚寺卿兼佐領卒其子存保住襲職卒無嗣其親伯之孫長庚西爾格雅爾布相繼承襲雅爾布卒其子奇徹布現襲職瑪拉分襲三等輕車都尉歴任工部尚書西安將軍卒其子瑪哈達襲職歴恩詔所任副都統卒其子同順襲職時削去領兼佐領加之職承襲騎都尉現任副䕶軍叅昭子分襲三等輕車都尉後縁事未襲由正黄旗改隸羅薩鑲紅旗人布顔次子布爾喜之孫也世居烏喇地方國初来歸授騎都尉編佐領使統之從征錦州陣亡優贈為三等輕車都尉其子瑚錫布襲職任佐領卒其親弟瑪爾泰襲職定鼎燕京時入山海闗撃敗流賊馬步兵二十萬衆叙功授為二等輕車都尉三遇恩詔加至三等男縁事削去本身所得之職其親弟瑪爾岱承襲三等輕車都尉因病告退其子瑪郎藹襲職任佐領卒其孫福蘭泰襲職任佐領卒其子福明額襲職現任佐領又羅薩親兄碩色贈騎都之長子秉圗由䕶軍叅領從征皮島陣亡尉其子碧爾柱襲職遇恩詔加一雲騎尉縁事削去本身所得之職其子松額承襲騎都尉卒其子成吉徳襲職任佐領卒其子成福現襲職碩色之次子碧進泰原任䕶軍叅領兼佐領第三子碧靈圗原任員外郎孫克普素原任䕶軍校錫特庫原係廕生曽孫納楞泰現任佐領又羅薩第三弟台柱之子葉栢綬原任佐領第四弟額爾庫圗之子沙渾原任員外郎孫偏圗原係廕生福爾哈原任䕶軍校又羅薩第五弟錫喀原任七品官滿都布禄正藍旗人布顔次子布爾喜之孫也世居烏喇地方國初来歸任城守尉其子馬爾漢從征察哈爾布爾尼奮勇撃賊有功授雲騎尉卒其子噶爾泰襲職又滿都布禄之曽孫浩善現任防禦元孫海拉遜現任理事同知福爾敦現任筆帖式又滿都布禄伯祖富黨阿之元孫胡什布由委署章京從征江西扵南康縣撃敗賊偽提督顔子明等兵三萬餘衆續征雲南撃敗賊偽將何繼祖等兵扵黄草壩叙功授雲騎尉卒其子薩穆泰襲職任步軍校富黨阿之四世孫希佛原任驍騎校穆奇納現任防禦五世孫黑達色現任中書雅爾納現任前鋒校常住鑲白旗人布顔第三子布三泰之長子也世居烏喇地方國初率衆来歸編佐領使統之其長子禪布係多羅額駙任佐領第三子章泰由閒散過北京征山東梯攻獻縣首先登城克之授雲騎尉創發身故後命入昭忠寺以其曽孫大學士查郎阿所得榮封誥贈光禄大夫其子查爾海襲職三遇恩詔加至三等輕車都尉從征湖南扵岔路口地方撃敗賊孫可望馬歩兵征浙江舟山敗偽英毅伯阮思等兵扵海上叙功授為二等輕車都尉嗣追叙伊父章泰之功授為一等輕車都尉任佐領其子色思特由䕶軍從征厄魯特噶爾丹在烏藍布通地方撃賊陣亡後命入昭忠寺以其子大學士查郎阿所得榮封佐領尋誥贈光禄大夫查郎阿承襲一等輕車都尉兼命兼吏陞叅領擢授吏部侍郎陞都察院左都御史署部郎中命安藏理鑲黄旗滿洲都統事務雍正六年奉特授吏部尚書七年建功凱旋印務加太子少保八年命署川陕總督兼理西安將軍上諭查總理西路軍需十年奉務事事合宜克勝大將郎阿忠誠體國辦理軍勅軍之任欽此尋率兵征討凖噶爾十三年奉署寜逺大將軍上諭查郎阿自領兵以来所辦軍務俱屬妥協著補授文華殿大學士兼兵部尚書欽此乾隆四年加太子太保兼議政大臣其長子邁拉遜現任員外郎次子查克殫現係文舉人布三泰之曽孫沙納海原任頭等䕶衛兼佐領拉圗渾隨郎中黨務理薩穆哈等徃令吳三桂移駐值吳三桂已叛遂同黨務理等馳報逆信由筆帖式超擢郎中兼管佐領當圗原任防禦查福塔原任䕶軍校沙瑪海以任事有能不違指使授雲騎尉定鼎燕京時授騎都尉遇恩詔加一雲騎尉任佐領卒其親弟納瑪海襲職兩遇恩詔加至二等輕車都尉任佐領卒其親兄之子渾晉贈為一襲職從征湖廣在醴陵縣地方撃賊陣亡有功等輕車都尉其子魯爾錦襲職從征西藏加一雲騎尉任防守尉卒其親弟之子額爾登額襲職時削去恩詔所加之職現襲三等輕車都尉布三泰之元孫雅穆素原任協領阿哈布原任䕶軍叅領兼佐領赫碩色原任佐領赫本額原任三等䕶衛覺色原任筆帖式四世孫石柱原任佐領文殊保原任親軍校署佐領福錫原任䕶軍校凌泰原任親軍校查哈理現任二等侍衛兼佐領查蘭泰現任驍騎校由鑲黄旗改𨽻莽鑑台齊鑲白旗人布顔第四子布凖第三子也世居烏喇地方國初来歸其孫蘇達原任䕶軍校穆丹原任户部尚書薩爾珀原任驍騎校由鑲黄旗改𨽻謨爾渾正白旗人布顔第五子吳三泰之孫也世居烏喇地方國初来歸任三等侍衛其子五格原任筆帖式孫清保原任都統錫爾格原任郎中錫哈納原任䕶軍校曽孫阿漢泰現任主事武玉齊阿隆阿俱現任筆帖式布哈納鑲紅旗人古對珠顔長子台費喀之子也世居烏喇地方國初来歸其曽孫思亷拜色俱原任三等䕶衛果亷原任驍騎校孟庫魯由副都統初過北京征山東攻慶都縣指麾克其城出邉之日撃敗髙太監等兵後圍錦州陣亡贈騎都尉其子拜殷達襲職定鼎燕京時敗流賊扵山海闗外復追至安肅縣斬殺甚衆加一雲騎尉又破流賊滅福王平定河南江南等處屢著戰功征福建攻克汀州府授為三等輕車都尉遇恩詔授為二等輕車都尉歴任禮部侍郎副都統兼佐領卒其子托拜襲職卒其親弟托米岱襲職任䕶軍叅領兼佐領卒其子拜米達襲職卒無嗣未襲雍正十一年查絶嗣世職以孟庫魯叔祖之元孫拜靈阿為嗣承襲雲騎尉卒其子拜齡現襲職又布哈納之元孫塞爾特原任佐領常岱原任典儀索錦現係廕生拜殷布由七品官從征察哈爾布爾尼在大鹵地方數敗賊兵授雲騎尉後征厄魯特噶爾丹奮勇撃賊有功授為騎都尉歴任荆州將軍卒其子拜明阿現襲職又布哈納之四世孫塞爾登額原任佐領倭什圗現任䕶軍校又布哈納親弟孟起之孫凖都理原任佐領曽孫莽鑑原任二等䕶衛元孫瑪瑙原任驍騎校喀克錫鑲黄旗人古對珠顔長子台費喀之曽孫也世居烏喇地方國初来歸其孫布楊武原任驍騎校布喀那原任䕶軍校曽孫諾克托原任城門尉達哈塔原任主事闗柱由䕶軍校從征察哈爾布爾尼扵大鹵地方奮勇擊賊有功授雲騎尉任佐領卒其子桑格襲職又喀克錫之曽孫阿哈布由佐領從征浙江福建扵衢州府撃敗賊偽提督周烈等