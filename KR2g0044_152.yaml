body:
  text: 八旗滿洲氏族通譜目録卷七十六附載滿洲旗分内之尼堪姓氏劉氏劉祺勇劉文孝劉大賔劉自明劉舉劉如鎮福昌劉朝奉劉克䕃烏色劉德劉三德劉武劉達劉鍾聲劉子貴劉中生劉琨劉夢龍劉安國劉國勲劉思舜劉登劉純佑劉成貴劉承選劉忠劉思成劉邦遵劉文惠劉拱劉應聲劉登科劉景松陳氏陳遵賢陳桂陳文祥陳如福陳中道陳有泗陳天良倭和陳銳陳安邊陳勇陳達色巴哈達陳恭陳子新陳達陳達興陳有彩陳嘉祐陳剛陳世會陳均陳門増陳量德陳善陳宜亮周氏周義强全柱德明周永明三岱周文奎桑格周大道周宏周成徳周易明周良正周應福周福周志德周成功周國安周新明周優周起龍徐氏徐世虎徐凱徐文高董江徐克成徐紀制徐正徐達徐尚文徐滋德徐尤才徐清徐宗道徐治誠徐聮璧徐其翰徐海徐先進徐金鐘高氏高鳳爵留色高竒遇高永象高竒功高文舉高應登高聞舉高有成高登第高輝久高尚意高上義高商彝高國祥高揚敏崔氏崔鐸崔善岱崔明崔天祜崔陞崔文生崔國寳崔國福崔景元崔潮崔國臣崔天禧崔善楊氏楊景升楊有先根滋楊元華陶色楊世勲楊應元楊承宗楊和祥楊世捃楊景貴楊貳楊致祥孫氏孫守祖孫永文達思布煥孫榮德孫艾孫達孫材孫全孫世清孫名揚孫世龍孫林趙氏趙為仁趙宏祺趙忠德趙景順趙達趙資學趙國泰趙通趙啓新趙鎮國趙伊福趙千倉胡氏胡來象胡朝賔胡悅胡福國胡有聲胡存華胡有徳胡國相胡起龍胡文升胡有章馬氏馬有祿馬鳳鵬馬資福馬自高馬伯元馬承德馬承功馬㢘煥馬德科馬變龍馬有倉欽定四庫全書
