body:
  text: 八旗滿洲氏族通譜卷五十七蒙鄂索氏䝉鄂索為滿洲一姓其氏族散處於瓦面河等地方福哈察鑲黃旗人世居瓦面河地方其子吳爾都原任前鋒參領曽孫桑古理原任驍騎校元孫章固理原任五品官肯布三達理俱原任護軍校安達理原任郎中四世孫都蘭泰原任五品官哲庫訥原任郎中長綬原任筆帖式留竒現任驍騎校馬海正紅旗包衣人世居長白山地方原任典儀其子尼雅哈亦原任典儀孫額特赫現任包衣參領曽孫成寧現任司庫增盛現任筆帖式成寧增盛今俱𨽻本旗滿洲旗分西特庫正藍旗人世居渾春地方其曾孫瑪海原任防禦阿西坦原任中書旺嘉原任護軍校博施原任步軍校屯岱原任管守信炮官元孫塞錫喀原任司庫達理善現任親軍校額爾吉訥正藍旗人世居拉發地方其元孫孔果爾岱原任護軍校察庫鑲藍旗人世居沾河地方其四世孫遼敦原任給事中常受原任護軍參領五世孫蘇通阿原任主事拜山原任步軍校索住現任驍騎校六世孫伊常阿現任步軍校邁瑪理鑲藍旗人世居訥殷江地方原任護軍校其子塔爾禪原任郎中綏哈鑲藍旗人世居瓦爾喀什地方其孫巴什現任護軍校以上俱係國初來歸之人倭赫正白旗包衣人世居長白山地方原任牧長其子愛音布祿亦原任牧長孫灣他哈原任筆帖式元孫永泰現任內副管領塔克圖鑲藍旗人原籍無考其曽孫薩哈那原任主事瑚什塔鑲藍旗人原籍無考其子額雷原任驍騎校以上俱係來歸年分無考之人薩察氏薩察為滿洲一姓其氏族世居瓦爾喀及渾春地方伊爾善鑲藍旗人世居瓦爾喀地方原任三等護衛其子尼雅哈原任護軍校喀爾濟善鑲藍旗人世居瓦爾喀地方原任鳴贊其子德赫原任典儀孫赫特赫亦原任典儀巴米達鑲藍旗人世居瓦爾哈地方原任典儀其子星額圖原任五品官納爾拜鑲藍旗人世居瓦爾喀地方其子伊祿原任驍騎校瑪星阿鑲藍旗人世居瓦爾喀地方其孫殷達渾原任護軍校曽孫穆清額亦原任護軍校輝特鑲藍旗人世居瓦爾喀地方原任驍騎校其子赫楞額原任筆帖式濟伯鑲藍旗人世居渾春地方其孫尼瑪達原任護軍校札克丹原任驍騎校曽孫章保原任護軍校元孫阿思泰現係副驍騎校以上俱係國初來歸之人騰柱鑲藍旗人世居渾春地方原任步軍校邁堪鑲藍旗人世居渾春地方其子戴哈現任護軍校達斯環鑲藍旗人世居渾春地方其子富勒赫現係副驍騎校以上俱係來歸年分無考之人錫墨勒氏錫墨勒為滿洲一姓其氏族散處於渾春庫爾喀等地方方喀拉鑲藍旗人世居渾春庫爾喀地方其孫雅賚原任護軍校曽孫博爾岱現任護軍參領蘇普庫鑲藍旗人世居渾春庫爾喀地方其孫常明原任護軍校敦多竒鑲藍旗人世居渾春庫爾喀地方其子嘉績原任佐領孫常祿原任協領曽孫瑪蘭泰原任六品典儀雅塞鑲藍旗人世居渾春庫爾喀地方其子存住原任護軍校孫三格現任副護軍參領遲資鑲藍旗人世居輝河地方其子岱格原任三等護衛孫那爾泰現任護軍校薩爾都鑲藍旗人世居渾春庫爾喀地方其子揆保原係委署護軍校東阿布鑲藍旗人世居渾春地方其曽孫都理庫現係副護軍校以上俱係國初來歸之人尼雅瑚理正白旗人世居拉門穆瑚地方原任驍騎校其子那哈喇孫穆爾泰俱原任驍騎校阿哈那正白旗人世居三姓地方尼雅瑚理同族其子巴達原係牧副以上俱係來歸年分無考之人劉佳氏劉佳為滿洲一姓其氏族散處於李佳和羅等地方劉尚彩鑲白旗包衣人世居李佳和羅地方其曽孫吳魁現任護軍校右係國初來歸之人濟拉密正紅旗人世居瓦爾喀地方其孫勝鈕原任七品官右係天聰時來歸之人穆當額正紅旗人世居烏喇地方其孫善圖現係武舉人曽孫邁拉蓀現係副榜庫蘇理鑲紅旗人世居喀爾沁地方其子伊蘭泰原任包衣大巴彥圖正藍旗人世居輝發地方其子巴什義原任典儀劉志桓正藍旗包衣人世居新屯地方其孫珠爾蘇現任護軍校布希正藍旗包衣人世居新屯地方其曽孫薩克錫現任護軍校以上俱係來歸年分無考之人博爾圖克正紅旗人世居札穆納地方阿魯正紅旗人世居松花江地方以上俱係康熙時自科爾沁撤回之人果爾吉氏果爾吉為滿洲一姓其氏族散處於郭絡羅河等地方艾新保正白旗人世居郭絡羅河地方原任護軍校其子齊蘭保原任步軍校右係國初來歸之人蘇爾泰正黃旗人世居吉林烏喇地方阿都正紅旗人世居哈達地方阿爾布鑲白旗人世居白都訥地方哈爾圖鑲白旗人世居烏喇地方舍鑲藍旗人世居吉林烏喇地方愛圖鑲藍旗人世居吉林烏喇地方以上俱係康熙時自科爾沁撤回之人武佳氏武佳為滿洲一姓其氏族散處於烏喇等地方杭愛鑲黃旗人世居烏喇地方其子恩特原任藍翎侍衛右係國初來歸之人達清阿鑲紅旗人世居索倫地方其子唐禮原任驍騎校右係來歸年分無考之人茂岱鑲白旗人世居費達木村地方霞穆岱鑲紅旗人世居五間房地方其孫巴札爾現係副驍騎校舒倫鑲紅旗人世居吉林烏喇地方鄂謨克圖鑲紅旗人世居吉林烏喇地方以上俱係康熙時自科爾沁撤回之人佟鄂絡氏佟鄂絡為滿洲一姓其氏族散處於札庫塔等地方札克丹鑲白旗人世居札庫塔地方其曽孫博爾博和原任護軍校通泰現任驍騎校元孫額色理原任防禦花色原任步軍校珠保住原任護軍校哈什太現任驍騎校章梅現任前鋒校倭濟鑲白旗人世居札庫塔地方札克丹同族其孫苖泰原任筆帖式花林泰鑲白旗人世居札庫塔地方其子穆臣原任護軍校開喀鑲白旗人世居巴顔烏喇地方其孫羅多理現任驍騎校曽孫楚爾哈納現任副護軍參領以上俱係國初來歸之人阿爾賽鑲藍旗人世居當務理地方右係康熙時自科爾沁撤回之人郭佳氏郭佳為滿洲一姓其氏族散處於蘇完等地方嘉郎阿鑲紅旗人世居蘇完地方其子福爾丹原任七品官曽孫華色原任步軍校綽和諾原任步軍參尉元孫赫楞額現任護軍校納親鑲藍旗人世居蓋州地方原任驍騎校其子博濟亦原任驍騎校納親親兄孟安之子松愛原任佐領孫蘇拜現任二等護衛額倫泰現任防禦納親親弟格立泰之子伊桑阿原任防禦納海原任筆帖式曽孫福德現任五品典儀瑚理鑲藍旗人世居瓜圖理地方其曽孫六十八現任驍騎校以上俱係國初來歸之人常格鑲藍旗包衣人世居哈什地方其孫郭二格現任護軍校右係天聰時來歸之人偉禮正白旗人世居輝發地方右係康熙時自科爾沁撤回之人梅赫理氏梅赫理為滿洲一姓其氏族世居那木都魯地方吳蘇勒正白旗人世居那木都魯地方其元孫華善原任護軍參領四世孫滿岱現任三等侍衛阿寧阿正白旗人世居那木都魯地方原任前鋒校其子福喀納原任主事格巴庫原任護軍校孫留巴實原任筆帖式齊瑪哈正白旗人世居那木都魯地方其孫沙理原任護軍校曽孫英格亦原任護軍校巴爾嘉正白旗人世居那木都魯地方其曽孫阿爾賽原任護軍校四世孫永安現任筆帖式達禮庫正白旗人世居那木都魯地方原任驍騎校以上俱係國初來歸之人瑚錫理氏瑚錫理為滿洲一姓其氏族散處於葉赫和多穆哈廉等地方索爾賓正紅旗人世居葉赫和多穆哈廉地方其孫黑色原任步軍校浩鑲藍旗人世居虎爾哈地方其曽孫索泰現任護軍校金柱鑲藍旗人世居瓦爾喀地方其孫哈克山現任護軍校以上俱係國初來歸之人溫岱正白旗人世居卦爾察渾春地方其子鄂密善原任護軍校其親弟勞哈之孫阿拉密原任步軍校三布原任七品官右係來歸年分無考之人巴爾圖鑲紅旗人世居白都訥地方右係康熙時自科爾沁撤回之人䝉古楚氏蒙古楚本係地名因以為姓其氏族散處於烏喇䝉古楚山等地方鄂松果正白旗人世居烏喇䝉古楚山地方原任防禦其長子格特布原任步軍總尉次子海州原任護軍校孫常在納爾泰和理俱原任驍騎校六格原任護軍校雅庫納原任員外郎圖克善原任筆帖式曽孫雙頂亦原任筆帖式額爾登額現任筆帖式元孫薩哈布現任前鋒校巴錫正白旗人世居葉赫地方其孫綽爾門原任藍翎侍衛曽孫坦品原任備箭首領瑚塔善正藍旗人世居瀋陽地方其孫札克丹原任主事族孫雅圖原任護軍校以上俱係國初來歸之人瑚什屯正藍旗包衣人世居烏喇地方其長子薩穆哈原任三等護衛次子巴琳原任六品官第四子舒淑原任護軍校孫薩林原任二等護衛右係來歸年分無考之人崇吉喇氏崇吉喇為滿洲一姓其氏族散處於烏喇等地方鍾泰鑲白旗人世居烏喇地方其曽孫珠蘭保原任主事賽哈納現任護軍校元孫金岱原任筆帖式札普玖正藍旗人世居虎爾哈地方其子納爾玖原任步軍校孫殷保原任筆帖式曽孫佟泰原任郎中元孫薩拉原任筆帖式以上俱係國初來歸之人僧庫正紅旗人世居瓦爾喀地方其孫常綬文碧俱原任驍騎校曽孫色克錫愛山俱原任護軍校彌勒原任驍騎校元孫佟泰現任二等護衛右係天聰時來歸之人貝赫訥鑲紅旗人世居訥殷地方其元孫福登額現任員外郎右係康熙時自科爾沁撤回之人額爾赫氏額爾赫為滿洲一姓其氏族散處於綏分等地方綽拜正白旗人世居綏分地方其孫齊希納原任副護軍參領鄂爾多瑪正白旗人世居尼爾吉地方原任驍騎校以上俱係國初來歸之人穆喀理正白旗人世居黑龍江地方原任佐領其子圖克綽科原任佐領孫特普特亦原任佐領曽孫永泰郭羅爾察俱原任佐領元孫德倭爾圖原任藍翎侍衛達魯察現任三等侍衛額爾錦正藍旗人世居愛渾地方其曽孫凖齊原任步軍校阿達禪原任主事元孫伊滿代原任委署參領兼佐領蘇海現任佐領周施現任步軍校四世孫和嘉現任護軍校博爾赫圖現任委署護軍參領以上俱係來歸年分無考之人布雅穆齊氏布雅穆齊為滿洲一姓其氏族散處於噶哈里等地方齊松阿正黃旗人世居噶哈里地方其曾孫溫成格原任藍翎侍衛尼喀那正紅旗人世居噶哈里地方原任驍騎校貴勒赫正藍旗人世居吉陽地方其孫福喀原任佐領謨爾渾原任步軍校以上俱係國初來歸之人訥努鑲黃旗人世居黑龍江地方其曽孫佳努原任頭等侍衛格爾蘇現任頭等侍衛元孫托謨爾渾現任三等侍衛右係來歸年分無考之人都理氏都理為滿洲一姓其氏族散處於馬察等地方阿穆清阿正白旗人世居馬察地方其曽孫蘇楞泰原任前鋒校圖斯灣正紅旗人世居德都理地方其子博爾濟布原任佐領以上俱係國初來歸之人春布爾岱正白旗人世居德敦村地方其孫三保現任親軍校布爾圖理鑲白旗人世居黑龍江地方其孫韓都現任驍騎校以上俱係來歸年分無考之人倭勒氏倭勒為滿洲一姓其氏族散處於齊齊哈爾等地方喀察正白旗人世居齊齊哈爾地方其子鄂拜巴蘭圖俱現任驍騎校察哈岱鑲藍旗人世居烏喇地方其子勒赫勒原任城門尉以上俱係國初來歸之人錫爾祜鑲紅旗人世居黑龍江地方其曽孫伊禮布原任典儀右係天聰時來歸之人布顔圖鑲白旗人世居黑龍江地方原任前鋒參領其孫昂吉圖原任協領由正白旗改𨽻右係來歸年分無考之人尼陽尼雅氏尼陽尼雅為滿洲一姓其氏族世居費達木村及黑龍江地方滿圖瑚正白旗人世居費逹木村地方其孫齊那爾現任驍騎校格爾布正白旗人世居費達木村地方鄂理正白旗人格爾布同族世居費達木村地方葛普克正白旗人格爾布同族世居黑龍江地方其曽孫勒普登現係牧副以上俱係康熙時自科