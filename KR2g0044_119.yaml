body:
  text: 八旗滿洲氏族通譜卷五十九鑲黃旗有名位希姓精吉氏精吉為滿洲一姓此一姓世居吉林烏喇地方喀喇鑲黃旗人中國初來歸其孫錫琳原任郎倭赫原任六品官薩爾都氏薩爾都為滿洲一姓此一姓世居哈達地方拖博輝鑲黃旗人任國初來歸原任筆帖式其子佛保原郎中孫賚圖瑚原任三等侍衛和嶽絡氏和嶽絡為滿洲一姓此一姓世居虎爾哈地方達禮渾鑲黃旗人衛國初來歸其孫薩禮布原任頭等侍元孫哈爾圖原任長史瑪寧阿原任護軍校四世孫德楞泰原任筆帖式舍顏氏舍顏為滿洲一姓此一姓世居費雅郎阿地方那爾渾鑲黃旗人任國初來歸其曾孫圖瓦鼐滿岱俱原驍騎校元孫翁愛原任步軍參尉四世孫五十七原任驍騎校佛寧現任副護軍參領畢魯勒氏畢魯勒為滿洲一姓此一姓世居蘇完地方鄂和達鑲黃旗人爾國初來歸其子塞勒原任驍騎校吳秦薩爾珀俱原任步軍校孫佛隆鄂原任護軍校曾孫瑪達現任驍騎校瑚克錫勒氏瑚克錫勒為滿洲一姓此一姓世居伊蘭費爾塔哈地方偏圖鑲黃旗人現國初來歸其孫綽蘭泰任驍騎校順布魯氏順布魯為滿洲一姓此一姓世居哈爾敏地方科啓鑲黃旗人爾國初來歸其弟愛納之孫瓦達原任驍騎校舒發察氏舒發察為滿洲一姓此一姓世居綏河地方雅努鑲黃旗人驍國初來歸原任牧長其子通愛原任騎校孫三格現任護軍校殷佳氏殷佳為滿洲一姓此一姓世居嘉木湖地方噶達渾鑲黃旗人孫國初來歸原任鐵匠協領其長綬現任驍騎校圖爾敦氏圖爾敦為滿洲一姓此一姓世居墨爾根城地方蘇拉鼐鑲黃旗人住國初來歸其四世孫揚保原任護軍校慶格理氏慶格理為滿洲一姓此一姓世居黑龍江地方蓋穆鑲黃旗人天聰時來歸其子愛音布原任護軍校孫章保住現任驍騎校蓋穆之弟巴爾圖原任頭等侍衛又蓋穆之弟巴顔穆之子巴喀穆原任步軍校楊柱原任驍騎校蘇拉喇氏蘇拉喇為滿洲一姓此一姓世居黑龍江地方塔凱鑲黃旗人天聰時來歸其子諾恩都原任頭等侍衛孫蘇布爾圖原任員外郎額森特原任護軍校阿爾拉氏阿爾拉為滿洲一姓此一姓世居黑龍江地方洪阿察鑲黃旗人天聰時來歸其曾孫諾納爾圖現任頭等侍衛元孫謨錫爾圖現任藍翎侍衛墨勒氏墨勒為滿洲一姓此一姓世居葉赫地方伊登額鑲黃旗人天聰時來歸其子岱哈原任驍騎校曾孫常保亦原任驍騎校元孫安泰現任防禦四世孫良保住原任頭等侍衛坦台現任驍騎校五世孫富明阿現任三等侍衛巴爾拉氏巴爾拉為滿洲一姓此一姓世居遼河地方布顔圖鑲黃旗人天聰時來歸原任頭等侍衛兼佐領敖拉托欣氏敖拉托欣為滿洲一姓此一姓世居黑龍江地方古禮爾勤鑲黃旗人天聰時來歸其四世孫達賚現任二等侍衛丹布現任三等侍衛拜英格理氏拜英格理為滿洲一姓此一姓世居墨爾根城地方海泰鑲黃旗人天聰時來歸其四世孫額爾伯爾圖現任前鋒校穆雅氏穆雅為滿洲一姓此一姓世居齊齊哈爾地方吳凱鑲黃旗人天聰時來歸其孫穆成額現任護軍校穆金泰現任筆帖式攸絡庫氏攸絡庫為滿洲一姓此一姓世居黑龍江地方卓思科鑲黃旗人天聰時來歸其元孫雅奇那原任驍騎校鄂羅氏鄂羅為滿洲一姓此一姓世居長白山地方瑚什理鑲黃旗包衣人天聰時來歸原任廄長其子佟桂原任內管領嘉普塔喇氏嘉普塔喇為滿洲一姓此一姓世居輝發地方瑚什巴鑲黃旗包衣人天聰時征服其子索爾和托原任護軍校富森氏富森為滿洲一姓此一姓世居開原地方法沙善鑲黃旗包衣人天聰時征服其曾孫玉柱根柱俱現任筆帖式瑚遜氏瑚遜為滿洲一姓此一姓世居五姓莊地方札林鑲黃旗包衣人來歸年分無考其子薩穆哈原任牧長正黃旗有名位希姓佟啓氏佟啓為滿洲一姓此一姓世居佛阿拉地方魯克都理正黃旗人校國初來歸其子松鄂圖原任驍騎孫阿爾賽原任御史曽孫森特赫現任驍騎校元孫佟璋現任筆帖式葛爾克氏葛爾克為滿洲一姓此一姓世居格爾欽地方永阿泰正黃旗人原國初來歸其孫布圖特鄂爾奇泰俱任驍騎校曾孫鄂嶽原任協領圖佳氏圖佳為滿洲一姓此一姓世居松花江地方昂阿拉正黃旗人原國初來歸其子拖絡春任城門尉古爾吉氏古爾吉為滿洲一姓此一姓世居廣寧正安堡地方拖科泰正黃旗人現國初來歸其元孫順拜任步軍校傅錫理氏傅錫理為滿洲一姓此一姓世居特宜分地方喀齊都正黃旗人原國初來歸其孫鄂倫泰任步軍校墨佳氏墨佳為滿洲一姓此一姓世居遼陽地方墨光顯正黃旗人原國初來歸其子常綬任護軍校伊拉齊氏伊拉齊為滿洲一姓此一姓世居阿庫里地方德希勒正黃旗人原國初來歸其子麻碩色任護軍校額爾格濟氏額爾格濟為滿洲一姓此一姓世居廣寧正安堡地方吳庫布賴正黃旗人原國初來歸其元孫圖赫任筆帖式倭赫氏倭赫為滿洲一姓此一姓世居界凡地方龎愛正黃旗人柱國初來歸其曾孫德保現係生員吳聶齊氏吳聶齊為滿洲一姓此一姓世居黑龍江地方鄂敦正黃旗人天聰時來歸其孫安泰原任護軍校曾孫瑚保亦原任護軍校伊靈阿現任郎中元孫常清現任頭等侍衛都克達氏都克達為滿洲一姓此一姓世居留福村地方科盤正黃旗人天聰時來歸其曾孫覺和拖原任護軍校桑格原任城守尉色成額原任護軍參領武德現任副護軍參領元孫優德現任藍翎侍衛赫爾濟氏赫爾濟為滿洲一姓此一姓世居長白山地方伊莽阿正黃旗人天聰時來歸其子納秦原任步軍校孫保住原任八品官雅齊納現任副護軍參領曾孫和斌現任筆帖式錫爾弼氏錫爾弼為滿洲一姓此一姓世居葉赫地方額宜色正黃旗人天聰時來歸其子阿漢泰