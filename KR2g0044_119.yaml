body:
  text: 八旗滿洲氏族通譜卷五十九鑲黄旗有名位希姓精吉氏精吉為滿洲一姓此一姓世居吉林烏喇地方喀喇鑲黄旗人中國初来歸其孫錫琳原任郎倭赫原任六品官薩爾都氏薩爾都為滿洲一姓此一姓世居哈達地方拖博輝鑲黄旗人任國初来歸原任筆帖式其子佛保原郎中孫賚圖瑚原任三等侍衛和岳絡氏和岳絡為滿洲一姓此一姓世居虎爾哈地方達禮渾鑲黄旗人衛國初来歸其孫薩禮布原任頭等侍元孫哈爾圖原任長史瑪寧阿原任䕶軍校四世孫徳楞泰原任筆帖式舍顏氏舎顏為滿洲一姓此一姓世居費雅郎阿地方那爾渾鑲黃旗人任國初来歸其曾孫圖瓦鼐滿岱俱原驍騎校元孫翁愛原任步軍叅尉四世孫五十七原任驍騎校佛寜現任副䕶軍叅領畢魯勒氏畢魯勒為滿洲一姓此一姓世居蘇完地方鄂和達鑲黄旗人爾國初来歸其子塞勒原任驍騎校呉秦薩爾珀俱原任步軍校孫佛隆鄂原任䕶軍校曾孫瑪達現任驍騎校瑚克錫勒氏瑚克錫勒為滿洲一姓此一姓世居伊蘭費爾塔哈地方偏圖鑲黄旗人現國初来歸其孫綽蘭泰任驍騎校順布魯氏順布魯為滿洲一姓此一姓世居哈爾敏地方科啟鑲黃旗人爾國初来歸其弟愛納之孫瓦達原任驍騎校舒發察氏舒發察為滿洲一姓此一姓世居綏河地方雅努鑲黃旗人驍國初来歸原任牧長其子通愛原任騎校孫三格現任䕶軍校殷佳氏殷佳為滿洲一姓此一姓世居嘉木湖地方噶達渾鑲黄旗人孫國初来歸原任鐵匠協領其長綬現任驍騎校圖爾敦氏圖爾敦為滿洲一姓此一姓世居墨爾根城地方蘇拉鼐鑲黃旗人住國初来歸其四世孫揚保原任䕶軍校慶格理氏慶格理為滿洲一姓此一姓世居黑龍江地方蓋穆鑲黃旗人天聰時来歸其子愛音布原任䕶軍校孫章保住現任驍騎校蓋穆之弟巴爾圖原任頭等侍衛又蓋穆之弟巴顔穆之子巴喀穆原任步軍校楊柱原任驍騎校蘇拉喇氏蘇拉喇為滿洲一姓此一姓世居黑龍江地方塔凱鑲黃旗人天聰時来歸其子諾恩都原任頭等侍衛孫蘇布爾圖原任員外郎額森特原任䕶軍校阿爾拉氏阿爾拉為滿洲一姓此一姓世居黒龍江地方洪阿察鑲黃旗人天聰時来歸其曾孫諾納爾圖現任頭等侍衞元孫謨錫爾圖現任藍翎侍衛墨勒氏墨勒為滿洲一姓此一姓世居葉赫地方伊登額鑲黄旗人天聰時来歸其子岱哈原任驍騎校曾孫常保亦原任驍騎校元孫安泰現任防禦四世孫良保住原任頭等侍衛坦台現任驍騎校五世孫富明阿現任三等侍衛巴爾拉氏巴爾拉為滿洲一姓此一姓世居遼河地方布顔圖鑲黃旗人天聰時来歸原任頭等侍衞兼佐領敖拉托欣氏敖拉托欣為滿洲一姓此一姓世居黑龍江地方古禮爾勤鑲黄旗人天聰時来歸其四世孫達賚現任二等侍衛丹布現任三等侍衛拜英格理氏拜英格理為滿洲一姓此一姓世居墨爾根城地方海泰鑲黃旗人天聰時来歸其四世孫額爾伯爾圖現任前鋒校穆雅氏穆雅為滿洲一姓此一姓世居齊齊哈爾地方吳凱鑲黃旗人天聰時来歸其孫穆成額現任䕶軍校穆金泰現任筆帖式攸絡庫氏攸絡庫為滿洲一姓此一姓世居黒龍江地方卓思科鑲黄旗人天聰時来歸其元孫雅奇那原任驍騎校鄂羅氏鄂羅為滿洲一姓此一姓世居長白山地方瑚什理鑲黃旗包衣人天聰時来歸原任廐長其子佟桂原任内管領嘉普塔喇氏嘉普塔喇為滿洲一姓此一姓世居輝發地方瑚什巴鑲黄旗包衣人天聰時征服其子索爾和托原任䕶軍校富森氏富森為滿洲一姓此一姓世居開原地方法沙善鑲黃旗包衣人天聰時征服其曾孫玉柱根柱俱現任筆帖式瑚遜氏瑚遜為滿洲一姓此一姓世居五姓莊地方札林鑲黄旗包衣人来歸年分無考其子薩穆哈原任牧長正黃旗有名位希姓佟啟氏佟啟為滿洲一姓此一姓世居佛阿拉地方魯克都理正黄旗人校國初来歸其子松鄂圖原任驍騎孫阿爾賽原任御史曽孫森特赫現任驍騎校元孫佟璋現任筆帖式葛爾克氏葛爾克為滿洲一姓此一姓世居格爾欽地方永阿泰正黃旗人原國初来歸其孫布圖特鄂爾奇泰俱任驍騎校曾孫鄂岳原任協領圖佳氏圖佳為滿洲一姓此一姓世居松花江地方昂阿拉正黃旗人原國初来歸其子拖絡春任城門尉古爾吉氏古爾吉為滿洲一姓此一姓世居廣寧正安堡地方拖科泰正黄旗人現國初来歸其元孫順拜任步軍校傅錫理氏傅錫理為滿洲一姓此一姓世居特宜分地方喀齊都正黄旗人原國初来歸其孫鄂倫泰任步軍校墨佳氏墨佳為滿洲一姓此一姓世居遼陽地方墨光顯正黃旗人原國初来歸其子常綬任䕶軍校伊拉齊氏伊拉齊為滿洲一姓此一姓世居阿庫里地方德希勒正黃旗人原國初来歸其子麻碩色任䕶軍校額爾格濟氏額爾格濟為滿洲一姓此一姓世居廣寧正安堡地方吳庫布賴正黃旗人原國初来歸其元孫圖赫任筆帖式倭赫氏倭赫為滿洲一姓此一姓世居界凡地方龎愛正黄旗人柱國初来歸其曾孫徳保現係生員呉聶齊氏吳聶齊為滿洲一姓此一姓世居黑龍江地方鄂敦正黃旗人天聰時来歸其孫安泰原任䕶軍校曾孫瑚保亦原任䕶軍校伊靈阿現任郎中元孫常清現任頭等侍衛都克達氏都克達為滿洲一姓此一姓世居留福村地方科盤正黄旗人天聰時来歸其曾孫覺和拖原任䕶軍校桑格原任城守尉色成額原任䕶軍叅領武徳現任副䕶軍叅領元孫優徳現任藍翎侍衛赫爾濟氏赫爾濟為滿洲一姓此一姓世居長白山地方伊莽阿正黃旗人天聰時来歸其子納秦原任步軍校孫保住原任八品官雅齊納現任副䕶軍叅領曾孫和斌現任筆帖式錫爾弼氏錫爾弼為滿洲一姓此一姓世居葉赫地方額宜色正黄旗人天聰時来歸其子阿漢泰原任筆帖式達漢泰原任驍騎校孫顏珠瑚原任委署䕶軍叅領翰班現任䕶軍校白佳氏白佳為滿洲一姓此一姓世居佛阿拉地方阿蘭正黃旗人天聰時来歸其子渾托和原任佐領塔喇氏塔喇為滿洲一姓此一姓世居訥殷江地方鄂宻善正黄旗人天聰時来歸其孫皂保現任䕶軍校外保現任驍騎校宏義氏宏義為滿洲一姓此一姓世居洪揚子溝地方鄂克托正黃旗人天聰時来歸其孫六格原係副䕶軍校温屯氏温屯為滿洲一姓此一姓世居烏喇地方康泰正黄旗包衣人天聰時来歸其孫常在現任内管領富色勒氏富色勒為滿洲一姓此一姓世居屯昂阿地方噶布拉正黃旗人来歸年分無考其子錫哈納原任驍騎校康熙時因屢請来京効力授為雲騎尉噶布拉之孫本布現任前鋒校曾孫阿薩爾漢原任副䕶軍叅領阿爾圖現任驍騎校倭徹庫氏倭徹庫為滿洲一姓此一姓世居葉赫地方丹達哈正黃旗人来歸年分無考其子華封原任員外郎孫索柱原任郎中凱隆氏凱隆為滿洲一姓此一姓世居齊齊哈爾城地方赫門徳正黃旗人来歸年分無考其子徳思衮原任二等侍衛玉克墨氏玉克墨為滿洲一姓此一姓世居尼滿河地方鈕鼎阿正黃旗人来歸年分無考其孫都紳原任二等侍衛曾孫佛保現任藍翎侍衛伊喇氏伊喇為滿洲一姓此一姓世居三姓地方孔果絡正黃旗人来歸年分無考其孫鼐都現任三等侍衛克伊克勒氏克伊克勒為滿洲一姓此一姓世居三姓地方阿思瑚理正黃旗人来歸年分無考其孫庫勒訥克齊原任三等侍衛阿達理現任三等侍衛甘佳氏甘佳為滿洲一姓此一姓世居吉陽地方瑪優正黃旗人来歸年分無考其子額特貝孫保住俱原係雲騎尉齊達勒氏齊達勒為滿洲一姓此一姓世居葉赫地方綏赫正黃旗人来歸年分無考其子舒書原任驍騎校孫明泰現任防禦泰瑚特氏泰瑚特為滿洲一姓此一姓世居吉林烏喇地方博爾晉正黃旗人来歸年分無考其孫阿蘭泰現任藍翎侍衛墨爾迪氏墨爾迪為滿洲一姓此一姓世居黑龍江地方伊爾格武爾正黃旗人来歸年分無考其孫達哈素現任藍翎侍衛貴岳理氏貴岳理為滿洲一姓此一姓世居白都訥地方瑪隆武正黃旗人康熙時自科爾沁撤囘原任驍騎校公儀理氏公儀理為滿洲一姓此一姓世居費達木村地方錫倫正黃旗人康熙時自科爾沁撤回其孫瑪瑚原任驍騎校八旗滿洲氏族通譜卷五十九欽定四庫全書
