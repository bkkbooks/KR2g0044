body:
  text: 八旗滿洲氏族通譜卷十一他塔喇氏他塔喇為滿洲著姓其氏族散處於扎庫木安褚拉庫及各地方扎庫木地方他塔喇氏岱圖庫哈理國正白旗人世居扎庫木地方十戶來歸編佐領初率子孫族人及本地方五使其次子多羅額駙諾裔謨多之子英俄爾岱統之時界凡人來犯疆圉英俄爾岱奮勇迎敵於撒爾湖地方橫擊破之攻開原時斬降明之蒙古勇將阿爾布大破其衆取瀋陽攻城有功授三等輕車都尉復於鐵嶺敗宰賽兵取遼陽沿城力戰遂下其城加授二等輕車都尉初次大兵過北京征山東時留守遵化有敵人率衆兵犯城二次俱擊敗之保固城垣加授一等輕車都尉時初設六部擢戶部尚書兼本旗都統三年考績首勤攻務由一等輕車都尉優授三等男又六年考績兼綜衆務果斷有能由三等男優授三等子後定鼎燕京時連克錦州松山等處入山海關率本旗兵破流賊馬步兵二十萬衆敘功由三等子優封三等公又五年考績部務修舉晉封二等公係多羅額駙卒其子伊圖襲職緣事降為三等子遇恩詔加為二等子歷任內大臣卒其親弟碩塔襲職兼任佐領緣事革退其親叔之孫額爾金襲職原任領侍衛內大臣兼都統緣事革退碩塔之孫英敏襲職時削去恩詔所加之職承襲三等子任二等侍衛兼佐領緣事革退其親弟英俊襲職現任二等侍衛侍衛什長兼佐領又岱圖庫哈理之元孫塞格由佐領從征厄魯特噶爾丹破賊有功授雲騎尉卒其子薩克慎現襲職又岱圖庫哈理之長子拖博原係多羅額駙孫和多禮原任六品官曾孫尚裔圖由啓心郎屢次考績辦事有能不違指使授騎都尉兼一雲騎尉任佐領松熹原任六品官蘇納海原任國史院大學士兼戶部尚書加太子少保順塔原任郎中蘇賚原任藍翎侍衛御元孫薩竒原任原任頭等侍衛兼佐領常在原前侍衛畢雅竒任光祿寺少卿兼佐領瓦爾逹原任三等侍衛張格原任工部侍郎兼佐領蘇爾德原任副都統武格原任員外郎老格原任郎中雅爾哈原任贊禮郎存秀原任步軍校珠瑚納烏瑚納俱原任六品官四世孫固爾哈原任火器營總管兼佐領牛鈕原任禮部侍郎兼佐領總管北運河事務蘇巴泰原任孔目蘇赫富爾納俱原任郎中納親原任內閣侍讀學士阿林岱原任佐領英貴原任三等侍衛李保住原任驍騎校馬爾泰現任護軍校常泰現任筆帖式五福現任步軍校五世孫木和林現任禮部侍郎兼佐領木桑阿現任膳房總領木爾泰現任八品官木爾圖原任員外郎木爾德原任郎中木爾素現任員外郎唐愛原任筆帖式唐竒原任驍騎校明智現任驍騎校柏齡阿現任三等侍衛蘇崇阿現任內閣侍讀蘇凌阿現任中書蘇方阿蘇章阿俱現任筆帖式松福現任貼寫中書蘇魁現任藍翎侍衛六世孫舒齡現任筆帖式元福原任員外郎舒輅現任西安糧道舒瞻現係文進士按岱圖庫哈理與正紅旗安褚拉庫地方羅屯正黃旗訥殷江地方納林等同族達音布正白旗人岱圖庫哈理親弟之子也世居扎庫木地方國初率兄弟族人及本地方人來歸編佐領使統之授騎都尉時有已順之民人被蒙古掠去達音布率八十人追至達塔地方奪回擊敗其兵斬獲甚衆又屢為大兵前哨先衆克敵每次出兵未嘗空回因授為三等輕車都尉後取昻阿時陳亡其子阿哈尼堪襲職任佐領卒其弟阿濟格尼堪襲職平定朝鮮遇寧逺兵當先直入斬殺多人初次過北京征山東遇侯總兵殺其佩印之人奪印以歸圍錦州征杏山松山并著軍績加授一等輕車都尉又征寧逺等處俱有功加一雲騎尉定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之優授為一等男後破流賊滅福王平定河南江南時屢立戰功又攻揚州府指揮得宜敗敵克城優授為三等子平定福建時克賊兵二萬餘衆又取金華府城優授為一等子後征湖廣敗賊首何騰蛟直抵湘潭縣奪其門克之生擒何騰蛟優授為三等伯兼佐領卒其子伊禮布襲職兩恩詔加遇一等伯任都統管佐領後於巖山嶺陳亡其至子阿錫坦襲職任散秩大臣卒其親弟之子英德承襲任散秩大臣兼佐領緣事革退其親伯之子馬爾遜承襲任頭等侍衛緣事革去世職其親兄阿爾遜承襲任散秩大臣兼佐領卒其子六十一襲職現任藍翎侍衛又達音布之子戴衮由侍衛平定朝鮮著有軍功圍錦州時奮贈騎都勇擊賊陳亡遜承襲遇尉其子伊密恩詔加一雲騎尉卒其子賽必喀襲職卒其親叔祖之孫伊楞額襲職時削去恩詔所加之職承襲騎都尉原任冠軍使兼佐領今伊楞額之孫德貴承襲騎都尉現任佐領又達音布之孫阿密逹原任領侍衛內大臣兼佐領元孫愛蘇原任員外郎兼佐領四世孫阿爾金布愛清阿俱現任佐領德保現任五品官逹瑚巴顔鑲黃旗包衣人達音布之親兄也世居扎庫木地方國初來歸其子雅爾泰原任六品庫掌孫費揚古原任護軍參領曾孫靈普原任內務府總管兼佐領童保原任副護軍參領竒保現任七品官元孫福安福德俱現任筆帖式阿爾泰國正白旗人逹音布之親弟也世居扎庫木地方初來歸其子他塔喇談圖俱原任驍騎校孫西盛格原任甘肅布政使西爾圖原任原任郎中希京工部侍郎兼佐領曾孫楚隆額通額西豐額德格常隆俱原任筆帖式唐明常亮俱現任筆帖式元孫常英現任委署主事常武尤象保住道德俱現任筆帖式四世孫西林現任委署主事朱魯西爾哈國正白旗人岱圖庫哈理同族世居扎庫木地方初率所屬二百人來歸編佐領俾其長子都統阿敦之子談拜統之談拜由佐領以能稱職授騎都尉後取大凌河及察哈爾等處屢著軍功初次過北京征山東遇敵兵戰敗之敵兵敗走豐潤縣追擊其衆逼至城下斬其首將敘功加一雲騎尉二次過北京征山東攻利津縣克其城授為三等輕車都尉定鼎燕京時授為二等輕車都尉後任兵部尚書考績稱職授為一等輕車都尉從征四川於雞頭關率衆克敵復屢恩詔加敗賊張獻忠馬步兵有功授為三等男遇兩遇為二等男原任都統卒其子瑪爾賽承襲恩詔加為一等男兼一雲騎尉後征貴州由水路回兵遇賊首鄭成功率兵二萬餘乘船百餘隻聲言欲犯江寧瑪爾賽親為指畫大破其衆獲船二十餘隻賊兵棄船陸續登岸俱擊敗之復有賊兵十萬列於山上拒敵仍率本部兵破之優授為一等子歷任戶部尚書兼都統緣事削去恩詔及本身所得之職餘二等男以其親叔之孫佛保承襲任西安副都統兼佐領因不勝職革退仍以談拜之曾孫多竒禪承襲卒其子得保現襲職又朱魯西爾哈之孫喜佛由參領從征錦州贈騎都奮勇擊賊陳亡蒯齊承襲三遇尉其親弟之子恩詔加至二等輕車都尉後征浙江舟山有功授為一等輕車都尉任寧古塔副都統緣事削去恩詔所加之職餘騎都尉其親弟之子常明承襲後征雲南於石門坎黃草壩等處敗賊有功加一雲騎尉卒其子察爾達承襲原任佐領卒其子白哥承襲卒其親兄禪泰現襲職又朱魯西爾哈之次子布山原任都統孫興竒原任侍衛元孫納郎阿原任步軍副尉兼佐領莽愛費揚古俱原任佐領色勒原任筆帖式四世孫色克圖原任參領五世孫海德現任三等侍衛明靈現任司庫常靈現任筆帖式薩弼圖國正白旗人岱圖庫哈理同族世居扎庫木地方初時率所屬來歸編佐領使統之以任事有能授為騎都尉因征黑龍江有功加一雲騎尉後征錦州杏山松山等處屢著軍功授為三等輕車都尉定鼎燕京時加為二等輕車都尉又從征陜西擊流賊有功授為一等輕車都尉三遇恩詔加至二等男任副都統卒其次子國禮承襲後從征雲南擊賊陳亡其子阿哈納承襲卒其親弟馮忠襲職任禮部侍郎兼佐領卒其子巴什襲職時削去恩詔所加之職承襲一等輕車都尉卒其親兄之子和隆鄂現襲職又薩弼圖之長子噶布拉於定鼎燕京時屢著戰功授為二等輕車都尉任武備院卿兼侍衛班領卒其子博柱承襲從征厄魯特噶爾丹擊賊陳亡其子查克散承襲緣事降為騎都尉其子唐鼐現襲職又薩弼圖之第三子廣綬原任參領兼佐領孫博爾多原任頭等侍衛富爾納原任包衣參領兼佐領法哈納原任七品官喀爾納原任筆帖式曾孫圖喇原任三等侍衛薩哈連現任包衣護軍參領拉岱現任二等侍衛茶房總領兼佐領攸德原任三等侍衛兼佐領保什赫爾凖俱原任七品官蘇海杭西石柱俱原任筆帖式瑚什泰現係倉庫官元孫圖善現任郎中赫審現任大使赫臣寧保俱現任筆帖式又薩弼圖次弟謨爾渾之子庫拜原任二等侍衛孫巴喀原任三等侍衛又薩弼圖三弟米嶽什渾原任啓心郎其子托多原任二等侍衛恭安原任頭等侍衛孫穆合林原任三等侍衛華色原任員外郎索逹原任助教元孫巴顔泰現任驍騎校喀錫泰原任八品官又薩弼圖四弟鉢爾輝原任護軍統領鼐格國鑲白旗人岱圖庫哈理同族世居扎庫木地方初率一百二十餘人來歸編佐領以其孫瓜喇統之曾孫吳巴海由佐領定鼎燕京時有功授騎都尉後征瓦爾喀俘獲七十餘人圍錦州敗杏山松山兵破流賊滅福王平定河南江南時於潼關殿後大敗流賊兵復招服一府三州十二縣後駐防蘇州時有賊兵萬餘突入城中吳巴海連戰十一日敗賊二十三次克保其城以恩詔加功加一雲騎尉三遇步軍統領副都統兼佐領至一等輕車都尉任卒其孫希佛承襲從征江西湖廣屢著戰功於新口地方擊賊陳亡其子希爾根承襲後因追敘希佛勞績又加一雲騎尉卒其子賴泰襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉現任佐領又鼐格之孫瓜施顯原任佐領曾孫布爾散原任副都統兼大理寺卿西漢原任驍騎校喀拜原任護軍校色勒原任步軍校元孫隆三由員外恩詔授郎兩遇尉後征滕吉思兩敗賊兵征江西破賊為騎都首金聲桓進兵廣東於新會縣擊賊李定國有功優授為三等輕車都尉任御史兼佐領卒其子烏爾泰襲職任副都統卒其子伊爾賽襲職時削去恩詔所得之職承襲騎都尉又鼐格之元孫恰塔原任副都統濟錫哈原任頭等護衛楊冠原任給事中吳沙庫原任長史翁機訥原任員外郎索濟原任驍騎校博黑原任八品官阿拜原任筆帖式布唐武原係騎都尉四世孫武什原任防禦努爾泰原任長史兼佐領額爾赫圖原任頭等護衛訥梅原任中書錫章原任內閣侍讀章存住原任郎中和爾特原任佐領碩米原任八品官莽色由驍騎校從征山東大破賊首蔣金剛等兵平定陜西時在顯義關地方屢敗賊偽總兵高定蔡元等敘功授騎都尉任佐領卒其子赫德承襲卒其親兄之子占特現襲職又鼐格之五世孫勒圖原任護軍校六格現任驍騎校福喜現任筆帖式額爾本伸布俱原係監生常賚額圖渾俱原任筆帖式穆特布現係候補筆帖式六世孫祿保原任七品官常起現任筆帖式七世孫英綬現係候補筆帖式由鑲紅旗改隸郎格國鑲紅旗人岱圖庫哈理同族世居扎庫木地方初率族人來歸編佐領使其子阿爾布尼統之孫伊爾格尼胡什俱原任佐領逹都原任奉天將軍兼佐領曾孫阿爾法穆臣尼什哈僧格俱原任佐領格巴庫原任鳴贊元孫都敏由委署章京擊敗流寇又困延安府屢敗賊兵梯攻雲恩詔加陽府督衆登城克之授雲騎尉兩遇敗偽總兵為騎都尉兼一雲騎尉後征貴州屢羅大順等兵生擒賊首郝搖旗元宗禘等俘獲賊衆千餘并獲其印又招降偽總兵十四人偽官及兵七千餘衆生擒偽王朱盛朗授為二等輕車都尉歷任西安副都統卒其子蘇敏承襲從征廣西雲南等處擊敗賊偽將范齊韓等兵授為一等輕車都尉任護軍參領因病告退其恩詔所子蘇占承襲原任山西布政使