殷江地方人其曾孫四格原任佐領章保住艾喀俱原任八品官羅思漢原任驍騎校孝新烏喇地方人其子費揚古原任七品典儀鑲白旗汪三扎克丹地方人其曾孫莽吉圖原任筆帖式阿隆阿原任護軍校泰濟理原任驍騎校元孫常綬塔哈納溫察俱原任驍騎校常保住原任五品典儀尼雅哈納原任步軍校瓦哈納原任中書四世孫邁色原任護軍校察哈達原任頭等護衛英保住原任中允平善原任主事常祿現任副護軍參領倭和原係副驍騎校五世孫碩托理根住俱原任二等護衛塞合尼原任護軍校富色理現任頭等護衛存住現任驍騎校恩特赫現任護軍校由正白旗改隸尼滿布庫伊穆齊外庫扎克丹地方人其元孫明安圖原任佐領四世孫尼雅哈納原任六品官赫碩色原任筆帖式翁鄂托原任步軍校薩哈納原任護軍校素住原任四品典儀宗神保原任頭等護衛五世孫雅圖原任驍騎校漢楚喀原任三等護衛赫成額原任護軍校阿拜現任驍騎校奢理現任護軍校六世孫常柱現係副驍騎校七世孫赫達色現任防禦由正白旗改隸諾穆齊烏蘇地方人其孫額爾特原任中書曾孫福新現任前鋒校包衣拖托理伊蘭木地方人原任頭等護衛圖楞額伊蘭木地方人其子布蘭岱原任包衣大蘇拉泰原任四品典儀孫紐紐原任包衣大額爾遜原任三等護衛華色原任六品典儀索克錫烏喇地方人原任包衣大其子唐保原任六品牧長孫黑達色現任包衣大勒黑海州地方人其子紐紐原任八品官孫色勒原任包衣大鑲紅旗方喀拉薩爾湖地方人其子玉圖原任長史孫噶達渾原任二等護衛胡什穆原任包衣參領曾孫阿爾薩蘭原任親軍校喀爾扎訥殷江地方人其孫穆爾泰原任佐領曾孫努爾賽原任護軍校元孫森德現任驍騎校恩特原任筆帖式正藍旗阿倫寧古塔地方人其元孫福僧額現任筆帖式四世孫穆克登布亦現任筆帖式鑲藍旗希紐烏喇地方人其子郭合原任筆帖式以上俱係國初來歸之人正黃旗包衣禮當阿伊蘭木地方人原任司胙官其子覺和托原任筆帖式那爾泰原任牧長那海原任廄長孫那星阿查隆阿俱原任庫掌查庫達原任員外郎曾孫桑格原任內副管領元孫阿蘭泰現任護軍校那海伊蘭木地方人原任牧長其子哲庫訥原任倉長孫哲懇原任主事鑲白旗善福十方寺地方人其子瑭留原任驍騎校孫黑搆原任護軍校五奎現任護軍校以上俱係天聰時來歸之人鑲白旗武巴泰吉林烏拉地方人其曾孫額圖渾現任典儀兼副參領留玉現任八品官包衣滿都瑚吉林烏拉地方人其曾孫老格原任六品包衣大扎崑朱吉林烏拉地方人其孫六達色原任護軍校以上俱係來歸年分無考之人八旗滿洲氏族通譜卷十一
