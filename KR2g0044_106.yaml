body:
  text: 八旗滿洲氏族通譜目録卷五十三濟禮氏多克松鄂右係有傳吳努渾右係附載烏爾漢氏哈爾圖右係有傳達禮右係附載赫宜氏烏齡額右係有傳葛旒森徹訥瓦達蓀以上俱附載札蘇理氏科爾機達右係有傳喀玳右係附載拜都氏阿錫圖達賚以上俱有傳賴布氏札齊喀岱蒙阿以上俱有傳布賽氏賽喀那右係有傳札爾湖尼噶布拉以上俱附載噶努氏古爾巴泰右係有傳阿林右係附載烏蘇占氏鈕彥圖右係有傳阿蘭右係附載尼竒理氏蘇喀愛篤以上俱有傳恰素恩特以上俱附載鄂謨拖氏嘉穆蓀右係有傳當格凱費以上俱附載董佳氏鄂哈吳海穆敦以上俱有傳哲蘇肯華連吉紫阿蘇泰以上俱附載阿克占氏吳努綽法隆武以上俱有傳吳同保馬達理羅多巴本以上俱附載葉穆氏巴揚阿和什莽佳以上俱有傳安圖僧古理竒重額穆圖庫塔喀納特色以上俱附載喀爾拉氏吳岱屯泰以上俱有傳岱松阿薩哈連珠爾哈岱以上俱附載
  hash: sha256:b4dd95763bd2035fac7cc780ee562547c9865f49e9ecd8ef880652ac0e1b3002
