body:
  text: 八旗滿洲氏族通譜目録卷三十一瑚普察地方兆佳氏舒賽武達禪巴圗魯阿古沙瑚圗阿蘇哈倫布科色當布理以上俱有傳密山扎哈理髙達甘際泰愛喀格宜祿柏英額布拉塔伊爾哈齊吳當尼雅哈西章阿以上俱附載額爾敏地方兆佳氏覺色塔郎阿西喇巴滿平阿鄂通果賴達訥新以上俱有傳馬達哈寶貝墨爾根恩起本吉納松鄂托以上俱附載各地方兆佳氏達珠瑚布爾機屯布魯羅岱馬達漢夬滿噶哈喀喇珠爾庫以上俱有傳湯什理尼雅格盛德瑪爾善噶爾晉達布哈海瀾穆克登阿克住吳林布勒勒瑪哈爾齊禪弼托普嘉達崇阿塞勒章固理費約色章克拜布賽色偉托傅當阿武能巴海巴錫薩哈納尼堪豐色謨爾渾瑪海尼喀達福喀伊森喀泰烏靈額達爾休文德恆琥什洪愛海音禪額宜德什雅齊納阿普就伊薩祿科爾琨薩穆哈吳巴海岱春錫爾岱岱喀嶽納占珠和富喀蘭碧桑秀法庫理武齊理以上俱附載
  hash: sha256:24651480077ab18a3284bd51285353eaa1890f5cd09d165b201a60e05a16b522
