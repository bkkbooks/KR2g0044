body:
  text: 八旗滿洲氏族通譜目録卷四十七烏喇地方伊拉理氏額禮懇莽檢阿山以上俱有傳薩哈布右係附載葉赫地方伊拉理氏達哈那親達瑚薩爾都都喀禪喀寧阿哈爾哈庫爾當阿以上俱有傳鶴尚納齊布以上俱附載殷地方伊拉理氏羅拖納郎阿蘇爾都圖郎阿以上俱有傳瑪克星阿薩穆蘇瑚西屯琥爾巴以上俱附載各地方伊拉理氏布理哈納邁堪晉達理圖郎阿阿普達理達蘭轄清吉納伊克騰滿岱以上俱有傳瑚雅阿隆阿彰齊瑚璧圖穆成額啓泰福喀瑚什巴鄂和訥吳爾精阿和伸吳爾瑚舒書吳達海岱柱賽碧喀克穆尼丹布祿吉雅納舒舒羅什翁古屯布祿嶽爾璧福盛額珠楞額德穆貝顔布祿吳岱愛瑪達郭博理凱丕羅岱吳三泰哈穆布額赫訥以上俱附載
