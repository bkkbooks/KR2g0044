body:
  text: 八旗滿洲氏族通譜卷五十阿穆魯氏阿穆魯為滿洲一姓其氏族世居伊蘭費爾塔哈村及黑龍江地方阿蘇國鑲黃旗人世居伊蘭費爾塔哈村地方征山東初來歸其子阿爾泰由護軍校過北京梯攻沂水縣第二登城克之授雲騎尉卒其子觀音布襲職遇恩詔加為騎都尉卒無嗣其親伯之子愛音布襲職從征浙江舟山擊敗僞英毅伯阮思等兵於海上敘功加一雲騎尉後征浙江福建於郭塘山等處擊敗賊僞將劉國軒等兵數萬餘衆續征雲南擊賊僞將何繼祖等兵於石門坎黃草壩地方屢敗之敘功優授為二等輕車都尉任協領恩詔所卒其子四格襲職時削去尉任張家口總管緣加之職承襲三等輕車都事革退其親弟之子安德現襲職又阿蘇之孫瓦哈納原任防禦盧塔克鑲黃旗人阿蘇同族世居黑龍江地方天聰時來歸其曾孫費揚蘇由三等侍衛從征厄魯特噶爾丹奮勇破賊有功授雲騎尉緣事革職未襲以上俱係應立傳之人索爾多氏索爾多為滿洲一姓其氏族世居烏喇博爾濟城地方博托波國鑲白旗包衣人世居烏喇博爾濟城地方初過初來歸編佐領使統之其子多貝由佐領北京征山東擊敗太監馮永盛兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至恩詔加慶都縣敗之敘功授騎都尉三遇色分襲三等至二等輕車都尉卒其長子赫碩輕車都尉第三子廣凱分襲雲騎尉任頭等護衛赫碩色卒其子阿賚襲職任佐領卒其子扎恩詔所普占襲職時削去尉現任二等護衛廣凱卒其加之職承襲雲騎子觀音保現襲職又博托波之孫費揚古原任佐領夢蛟原任八品官曾孫廣格原任佐領延福原任護軍校和爾多原任員外郎博爾多現任頭等護衛布顔原任佐領哈達原任三等獲衛巴太現任護軍校元孫富楞額恩特赫默俱原任護軍校三保原任司庫寧古齊現任典儀勒爾謹現任四品典儀兼佐領伊靈阿現任護軍校額升格現任三等護衛右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗瓦古烏喇博爾濟城地方人其孫彬圖屯泰俱原任郎中曾孫五格原任驍騎校元孫宏德亦原任驍騎校薩克薩哈原任頭等護衛哈克散原任八品官景福現任八品官由正白旗改隸右係來歸年分無考之人俞爾庫勒氏俞爾庫勒為滿洲一姓其氏族散處於諾羅等地方綽琴鑲白旗人世居諾羅地方天聰時來歸其孫阿爾哈由閒散過北京征山東攻信陽縣不設雲梯首先登城克之以功授雲騎尉卒無嗣其親叔之子夏柱襲職三遇恩詔加至三等輕車都尉從征鄂爾多斯擊敗多爾晉兵征貴州擊賊僞總兵羅大順兵三萬餘衆回兵時遇海寇鄭成功兵擊敗之敘功授為二等輕車都尉因病告休其子柏色圖襲職卒其親恩詔所兄之子七格襲職時削去子常泰現襲職又綽加之職承襲騎都尉卒其琴之曽孫碩色原任員外郎元孫常綬由委署夸蘭大取昭定藏著有勞績卒後敘功贈雲騎尉其子存住襲職卒其子穆格現襲職和謨諾國鑲黃旗人世居松花江地方從征福建攻平和初來歸其曽孫忠泰由間散恩詔加縣首先登城克之敘功授雲騎尉兩遇職卒其至騎都尉兼一雲騎尉卒其子舒書襲恩詔所孫富良柱襲職時削去其親叔之子圖碧赫現加之職承襲雲騎尉卒襲職又和謨諾之四世孫索住原任佐領保通原任護軍校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗阿克齊魯黑龍江地方人其孫吳素爾漢原任三等侍衛曽孫納哈布亦原任三等侍衛恆特現任步軍校右係來歸年分無考之人滿扎氏滿扎為滿洲一姓其氏族世居庫察及葉赫地方素班國鑲藍旗人世居庫察地方京征山東梯攻平陰初來歸由閒散二次過北恩詔加縣第二登城克之授雲騎尉三遇孫松阿岱曽至三等輕車都尉卒其子葉青格孫西圖相繼承襲西圖卒其親叔雅蘭泰襲職時削去恩詔所加之職承襲雲騎尉卒其親叔之子雙喜襲職卒其親弟舒魯現襲職又素班之曽孫福保現任筆帖式右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗薩哈泰葉赫地方人其孫瑪色原任佐領曽孫齊勝寶現係副驍騎校松靄庫察地方人原任護軍校其子存住原任防禦圖理庫察地方人原任三等護衛艾察庫察地方人原任典儀庫察庫察地方人原任護軍校以上俱係國初來歸之人烏色氏烏色為滿洲一姓其氏族散處於葉赫等地方克拉國正紅旗人世居葉赫地方閒散從征大同攻德初來歸其曽孫阿哈占由恩詔加勝堡克之授雲騎尉三遇阿海襲職卒其叔噶至三等輕車都尉卒其子爾住襲職卒其子索濟孫滿色相繼承襲滿色卒其子巴顔圖現襲職又克拉之曽孫諾爾布原任參領元孫諾穆齊和寧俱原任參領費雅柱原任三等侍衛四世孫費雅哈原任筆帖式五世孫喜德現係生員吳瑪喀國正白旗人世居長白山地方驍騎校從征雲南初來歸其四世孫塞楞額由有功授雲騎尉卒其孫阿蘭泰襲職又吳瑪喀之六世孫保住原任驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗吳色葉赫地方人其孫吳珠昂巴原任步軍校曽孫錫蘭泰原任護軍校元孫達色現任驍騎校正白旗巴林吉林烏喇地方人其子武賽原任驍騎校孫古賽原任協領曽孫慶保現任協領薩哈璉現任二等侍衛包衣三泰瓦爾喀錫地方人其子占特原任司庫鑲白旗包衣購色佛阿喇地方人其子邁圖原任三等侍衛鑲藍旗吳泰松花江地方人其子巴錫訥原任驍騎校孫鄂爾布原任佐領以上俱係來歸年分無考之人佑祜魯氏佑祜魯本係地名因以為姓其氏族散處於英額等地方覺和託國正白旗人世居英額地方廣江西於荆州府南初來歸由護軍校從征湖昌府等處屢著軍功又擊敗賊首金聲桓等兵攻九江府不設雲梯首先登城被創敘功優授恩詔加騎都尉兩遇都尉卒其子瓦塔襲職卒其親弟至三等輕車恩詔所存住襲職卒其子黑達色襲職時削去加之職現襲騎都尉達敏國鑲黃旗人世居佑祜魯穆瑚舒村地方校從征初來歸其六世孫昂阿岱由委署護軍浙江福建擊敗賊僞將吳淑劉國軒等兵一萬六千餘衆續征雲南屢破賊僞將何繼祖等兵於石門坎黃草壩地方敘功授雲騎尉卒其子編塔哈襲職原任協領又達敏之六世孫渾達理由委署參領從征廣東於新會縣破賊李定國兵又於湖廣衡州府擊敗賊兵一萬餘衆擒僞總兵一員敘功授雲騎尉卒其子布達理襲職又達敏之六世孫赫碩色原任護軍參領舒書原任參領夸扎滿珠俱原任步軍校瑚爾竒原任主事鄂爾布錫圖庫俱原任護軍校吳達海原任佐領瑚禮善原任驍騎校塔錫布原任七品官七世孫華色原任通政使司通政使莽伊達原任包衣護軍參領保爾原任佐領黑色努山俱原任步軍校惠山桃色蘇赫俱原任護軍校柏赫訥楊海衆神保新塔錫俱原任驍騎校瑪爾漢原係副驍騎校瑚班原任郎中瑚占原任員外郎柏叟原任防禦福達理原任國子監司業錫哈納原任內閣學士兼禮部侍郎尼堪原任藍翎侍衛當什庫瑪鼐俱原任主事托克泰現任郎中德保現係生員戴色由委署章京從征江西湖廣於鄱陽湖等處屢敗賊兵授雲騎尉又征福建滅賊有功授為騎都尉任杭州副都統卒其子阿法哈孫阿蘭泰相繼承襲又達敏之七世孫昌格勒由委署驍騎校從征雲南屢敗賊僞將何繼祖等兵敘功授雲騎尉卒無嗣其親兄之子拜雅圖現襲職八世孫懷秦原任翰林院侍講學士嶽秦偉秦章滿色華善俱原任郎中達敘都蘭泰俱原任三等侍衛法保什旒華色俱原任護軍校常綬原任驍騎校老格原任委署參領巴爾賽原任筆帖式瑚星阿圖爾彬俱現任筆帖式阿爾占現任三等侍衛赫雅圖現任護軍校福住現係副驍騎校九世孫瑚什圖原任助教和商原係監生達錫原任筆帖式德祿阿穆泰俱原任護軍校錫僧現任步軍校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗羅丹嘉木湖地方人其曽孫賴恭原任護軍校元孫布克西原任給事中禮住存住俱原任筆帖式瑪爾泰原任鳴贊西蘭泰原任郎中翁格原任員外郎四世孫博禮原任國子監司業博濟原任給事中旒什現係候補守備永吉洛現任中書穆克登現係監生長升永吉祿俱現任筆帖式尼唐阿佑祜魯穆瑚舒村地方人其曽孫瑚新泰原任協領錫巴喀佑祜魯穆瑚舒村地方人其子卓克錫原任驍騎校元孫雙柱現係生員吳法松花江地方人其孫穆爾吉原任護軍校哈唐阿松花江地方人原任驍騎校正白旗鈕克虎爾哈地方人其元孫恆楚克原任佐領四世孫尹特原任郎中瓦爾達原任二等侍衛五世孫巴格原任筆帖式富彩現任護軍校鑲藍旗包衣都倫哈達地方人其子常綬原任驍騎校孫索柱原任護軍校以上俱係國初來歸之人鑲紅旗喀喀輝發地方人其元孫倭新保原任防禦桑格現任驍騎校右係天聰時來歸之人鑲白旗托密納烏喇地方人其孫富赫訥原任步軍校曽孫衆神保原任驍騎校四世孫德成額現任筆帖式鑲紅旗莽吉納輝發地方人其四世孫舒靈額原任護軍校富爾瑚原任驍騎校五世孫三保原任步軍校德色理原任護軍參領八十一現任護軍校六世孫德克積赫現任弓匠協領哲貝寧古塔地方人其孫吳巴什原任步軍校曽孫三達色現任護軍校以上俱係來歸年分無考之人圖色理氏圖色理為滿洲一姓其氏族散處於黑龍江懋塔哈村等地方滿諾國正黃旗人世居黑龍江懋塔哈村地方散二次初率兄弟族人來歸其曽孫赫圖由閒贈騎都過北京征山東梯攻滕縣首先登城殁於陳優尉無嗣其弟克錫圖襲職遇恩詔加一雲騎尉緣事革退其子四雅圖承襲卒無嗣其親伯特竒訥承襲卒其子薩爾拜承襲卒其恩詔所子通吉祿襲職時削去滿諾之元孫達最原任加之職現襲騎都尉又參領拉碩色原任城門尉泰晉原任防禦溫太原任護軍校四世孫赫竇原任弓匠協領吉哈納原任護軍校恩布原任驍騎校五世孫成格原任筆帖式克特勒國正黃旗人世居薩哈爾察地方從征四川屢立初來歸其子徹圖訥由護軍校贈騎都軍功後在野狐嶺擊賊陳亡優子阿爾達襲職尉兼一雲騎尉無嗣其親兄之卒其子索索理襲職索索理卒其姪赫圖訥現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗圖薩理沙濟地方人其孫章武原任筆帖式元孫綽和泰原係副驍騎校正黃旗阿爾善黑龍江阿克底村地方人其元孫瓦娃原任員外郎伊那庫原任步軍校鄂德原任筆帖式四世孫邁密善原任護軍參領圖禮善現任驍騎校圖爾泰現任給事中五世孫拉都渾原任驍騎校綽爾昆薩哈爾察地方人其孫華色原任佐領哈蘭太原任筆帖式納謨薩哈爾察地方人其孫夸色原任驍騎校正白旗博道薩哈爾察渾春地方人其曽孫塔克什庫原任筆帖式鑲紅旗穆組黑龍江地方人其子穆什哈原任驍騎校孫得祿原任佐領曽孫碩爾岱亦原任佐領元孫薩克薩哈原任協領雅克薩哈現係副護軍校扎穆太尼馬察地方人其曽孫伊哈納現任驍騎校以上俱係國初來歸之人正黃旗懋黑龍江穆理哈村地方人其曽孫久住現任護軍參領錫圖克安巴西穆訥地方人其元孫伊車楞嶽鼐俱原任防禦嶽納原任驍騎校達蘭太原任七品官四世孫赫達色原任佐領覺和托原任防禦王三柱英額俱原任驍騎校滿岱原任筆帖式五世孫伊蘭泰原任步軍校䝉古爾岱現任前鋒校以上俱係天聰時來歸之人正黃旗翁喀達瀋陽地方人其子車克圖里原任三等侍衛察爾久瀋陽地方人其元孫布克特訥原任副護軍參領勒騰額錦州地方人