body:
  text: 八旗滿洲氏族通譜目録卷四十八虎爾哈地方虎爾哈氏納漢泰扎爾固齊托克推阿喜布祿吳勒穆雅達渾郭爾琨以上俱有傳鄂錫右係附載新達謨城地方虎爾哈氏康喀賚扎爾固齊塔爾巴齊以上俱有傳富達理薩哈連以上俱附載各地方虎爾哈氏珠爾庫右係有傳訥爾圖墨爾根阿哈棣雅爾哈以上俱附載蘇佳氏尼雅星阿瑪納漢武拜以上俱有傳岱珠瑚烏巴海舒訥璧赫德色克特巴本愛星阿拜色圖巴泰布爾哈蘇柏和以上俱附載溫徹亨氏博爾濟烏雲珠以上俱有傳赫董額右係附載哲爾德氏塔布岱雅魯堪以上俱有傳哲爾德顔岱綽克托渾岱費揚古以上俱附載溫察氏安泰博多渾以上俱有傳巴哈納楠道尼雅哈溫齊以上俱附載
  hash: sha256:7a36e7061bbf502f77b8c56415b0a1a2790e48fcf986ec022bbd5881f362aeae
