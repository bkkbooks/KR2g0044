原任護軍校石印現任主事鑲白旗富那愷其子郭渾原任護軍校孫黑格原任筆帖式赫山原任步軍校曽孫海寧現係貢生由鑲黃旗改隸丹達禮其曽孫揚阿理現任驍騎校元孫覺和托原任防禦四世孫常德原任筆帖式由鑲黃旗改隸社圖其孫法喀現任護軍校由鑲黃旗改隸安都其孫達林原任護軍校那穆達立其曽孫彰綬原任護軍校元孫二官保原任筆帖式由鑲黃旗改隸勒岱原任七品官以上俱世居杭佳地方係國初來歸之人正藍旗包衣阿寧阿其子阿普達哈原任二等護衛孫查爾竒原任四品官曽孫常德亦原任四品官元孫雅圖原任八品官德保原任四品官四世孫常嵩原任頭等護衛鑲藍旗鄂嶽爾昆其子岱布原任頭等護衛孫丹什原任筆帖式鄂岱其孫倫拜原任護軍校曽孫葉社理原任筆帖式元孫岱明原任護軍校岱嵩阿現任員外郎四世孫岱圖現任內閣侍讀都珠瑚其曽孫多碧原任步軍校札達哈原任筆帖式元孫薩尼祿原任員外郎阿爾泰現任城門尉四世孫薩同阿現任筆帖式達爾察其子納塔海原任典儀孫拉書亦原任典儀庫特原任驍騎校曽孫額濟格阿爾禪俱原任護軍校鼐孟阿其曽孫薩林原任典儀元孫花色哲理哲文俱原任筆帖式穆哈連其曽孫索柱原任驍騎校以上俱世居杭佳地方係來歸年分無考之人各地方戴佳氏喜佛正黃旗包衣人世居葉赫地方來歸年分無考任內管領其子謨爾渾由內管領從征雲南有功授雲騎尉卒其親弟噶達渾襲職又喜佛之孫達春原任內副管領陶鑲藍旗人原籍及來歸年分俱無考由委署護軍校從征貴州擊賊有功授雲騎尉卒其子瑪哈爾圖承襲以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗賽都札庫木地方人其曽孫伊哈遜原任護軍校元孫蓀泰原任親軍校四世孫蓀當現任防禦五世孫蓀福現任驍騎校六世孫拴住原係副驍騎校正紅旗都囊阿葉赫地方人其孫三保原任佐領鑲紅旗阿布賴哈什馬和羅地方人其曽孫和爾泰原係副驍騎校張鼐哈什馬和羅地方人其曽孫四勒原任驍騎校常英哈什馬和羅地方人其元孫瑪隆武現係副護軍校索爾喜哈什馬和羅地方人其孫長綬原任驍騎校郭托札庫木地方人其曽孫班他哈原任護軍校元孫五碩色原任驍騎校保住原任護軍校四世孫察郎阿現任驍騎校鑲藍旗碩拉瑪東林屯頭地方人原任牧長以上俱係國初來歸之人正藍旗尚武努殷地方人其子阿賚原任御史右係來歸年分無考之人
