body:
  text: 八旗滿洲氏族通譜卷二十九叩德氏叩德為滿洲一姓其氏族世居於葉赫地方武訥赫正白旗人世居葉赫地方天聰時率七十二人來歸編佐領使統之從征烏喇奮勇爭先征明屢著軍績優授三等男又攻寧逺有功授為三等子初往北京攻遵化州等處力戰克之又攻大安口克其城叙功晉封三等公歷任都統卒其子廣泰承襲三等公任都統兼佐領緣事降為一等男令其兄齊墨克圖承襲從征寧逺錦州及黑龍江等處屢敗賊兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆叙功加一騎都尉授為三等子原任副都統卒將伊軍功所恩詔加得之騎都尉令其子薩哈納承襲遇遇一雲騎尉其一等男仍令廣泰承襲恩詔優授三等子緣事削一雲騎尉又兩遇恩詔加至二等子卒削去恩詔所加之職餘剩一等男亦令薩哈納承襲併為二等子任參領卒其親弟之子智勇襲職歷任副恩詔所都統緣事革退其子延福襲職時削去領又武加之職承襲三等子現任治儀正兼佐訥赫長子德穆圖由佐領定鼎燕京時入山海關大敗流賊馬步兵二十萬衆又追至慶都縣敗之授騎都尉後破流賊滅福王平定河南江南等處屢著戰功加一雲騎尉三遇恩詔加至一等輕車都尉歷任户部侍郎卒其子和特襲職任佐領緣事革退其親弟透特襲職任佐領卒其子圖斯哈襲職任佐領卒其子圖理襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其親伯祖之曽孫富色訥襲職卒其叔之子圖桑阿現襲職又武訥赫次子訥穆圖第六子碧禮克圖俱原任三等侍衛孫瑚什巴原任參領兼佐領瑚密色原任佐領苗蘭原任員外郎德內原任五品官瓦爾達原任六品官碩古色原任七品官官保原任驍騎校禮住原係廕生曽孫托克屯原任參領兼佐領色克圖原任佐領佛爾濟原任協領兼佐領長松原任防禦滿岱叩思海俱原係雲騎尉元孫額理原任佐領克星額原係雲騎尉法理原任防禦通寧原任藍翎侍衛蘇英格現任佐領赫紳現任防禦佛亮現任三等侍衛四世孫阿玉錫現任員外郎普恩現任筆帖式今隸本旗蒙古旗分錫巴禮國正白旗人世居葉赫地方散過北京征山東梯初來歸其子鄂爾推由間賜巴圖攻平度州首先登城克之時入山海關擊敗流魯號授騎都尉定鼎燕京恩詔授賊馬步兵二十萬衆叙功加一雲騎尉遇蘭襲為三等輕車都尉卒無嗣其親兄之子阿恩詔加職卒無嗣其父阿哈碩色襲職兩遇塔襲職卒至一等輕車都尉年老告退其弟三無嗣其親兄之子顏泰襲職卒其子伊特訥現襲職又錫巴禮之元孫五雲保現任筆帖式德爾德赫國正白旗人世居葉赫地方珠赫由委署參領從初來歸原任護軍校其子征江西湖廣於撫州府等處屢敗賊兵叙功授雲騎尉任步軍校卒其長子平安襲職次子赫達色現任步軍校又德爾德赫親兄烏巴岱之子舒書布原任驍騎校曽孫衮柱現任筆帖式又德爾德赫親弟阿格圖之孫三雅圖原任驍騎校令隸本旗蒙古旗分卓羅國正黃旗包衣人世居葉赫地方哈爾察俱原任初來歸其元孫達禮瑚訥雷薩護軍校固賽郭禮賽音巴理俱原任郎中三格色原任郎中兼佐領費揚古原任內務府總管兼佐領蘇爾瑚原任員外郎羅密色勒俱原任牧長郭堪原任筆帖式吳賽由郎中從征察哈爾布爾尼敗賊有功授雲騎尉卒其子沙渾襲職又卓羅之四世孫安泰原任整儀尉阿錫圖原任驍騎校亷煥原任鳴贊瑚鈕原任員外郎烏鈕原係監生賽音圖兆蕭俱原任筆帖式佳鼎原任包衣大富賚原任膳房總領赫達色原任牧長哈克三泰原係庫使多倫原任茶房總領吳齡阿現任護軍校伊山現任司胙官連璧現任護軍參領偏圖現任驍騎校五世孫神保原任郎中徹勒庫原任員外郎常德瑪什瑪鼐揚賽衆神保俱原任筆帖式齊格原任司胙官官保現任筆帖式濟榮現任鳴贊四十八現任員外郎伊福現任包衣護軍統領兼佐領韜德現任護軍校德善現任三等侍衛常福現任驍騎校以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載於後正紅旗巴爾柱葉赫地方人其子索倫原任驍騎校孫索理原任護軍校曽孫札拉克達亦原任護軍校右係國初來歸之人吳雅氏吳雅為滿洲一姓其氏族散處於哈達及各地方哈達地方吳雅氏額柏根國正黃旗人世居哈達地方膳房總領歷升內大初來歸其長子額森初任臣崇德時從征朝鮮遇有朝鮮遣人致書於明額森見而射之其人應弦而倒太宗文皇帝嘉其能即以其人所乘馬賜之又同超品公楊古利額駙率兵進𠞰大破朝鮮有朝鮮小卒藏匿石巖間竊發鳥鎗楊古利額駙中傷而殁太宗甚傷之忽有一人越山而去圖賴指而言曰彼山上東去者即傷死楊古利額駙之人也太宗因命額森追之次日即以其首來獻清州及大同太宗嘉之授為男爵後征山東濟南府臨等處屢立戰功加一騎都尉任佐領緣事削職其長子魏武係仁壽皇太后之父原任護軍參領雍正元年奉㫖額柏根係本朝舊族創業名家在太祖高皇帝時撫育禁庭視同子姪額森歷事三朝軍功𢡟著魏武天挺俊傑啓後承先厚德鍾靈篤生聖母宜加峻秩以協彛章將額柏根額森魏武俱追封一等公世襲罔替欽此魏武之子博啓承襲一等公仁夀皇現任散秩大臣兼佐領額森之次子嶽色因係太后之叔父特賜騎都尉原任司胙官又額柏根之次子赫勒原任筆帖式三子柏赫原任員外郎孫常索原任郎中金柱原任驍騎校瑚什巴原任筆帖式丕色原任員外郎曽孫魏凖現任大使柏爾屯原係御廕生常三阿爾泰俱原任護軍校禮保住原任前二等侍衛元孫柏永現任三等侍衛札秦現任副護軍參領柏寧現任六品官四世孫錫明現係廕生薩穆哈正黃旗人額柏根之兄也其子海色原任五品官翁鄂春原任佐領孫鐸啓鐸博和俱原任郎中鐸弼原任都察院副都御史內務府總管兼佐領鐸內原任員外郎曽孫巴喜納輝蘭俱原任員外郎五十原任護軍校拉色原任司胙官延德三拜俱原任佐領羅岱原任署正費揚古明安圖俱原任筆帖式明舒原任郎中明貴現任護軍校根柱現任佐領元孫索柱原任驍騎校佟愛原任護軍校扣樓原任司庫佛標任都統兼佐領以原官致仕海望現任太子少保內大臣議政大臣户部尚書總理三庫事務內務府總管兼佐領官保現任知府竒通額現係舉人玉神保現任主事全德現係監生四世孫兆惠現任盛京刑部侍郎衡位現任員外郎瑚什圖現係廕生托克松鄂正黃旗人額柏根伯父巴都蘭之子也其子察哈喇原任員外郎孫額赫禮亦原任員外郎豐色原任郎中華善原任主事曽孫福達理原任內閣學士兼禮部侍郎巴濟鼐原任筆帖式阿岱飄善俱原任護軍校麻色原任五品典儀哈爾賽原任三等侍衛保住原任七品官禪岱原任六品官雅爾泰原任鳴贊九成原任員外郎元孫七十原任三等侍衛吳達哈瓦爾喀俱原任六品官察爾産原任護軍校倭達色兆志俱現任驍騎校德保現任中書四世孫赫泰現任筆帖式莊德現任主事開泰現任內閣學士兼禮部侍郎五世孫伊爾哈原任三等侍衛聰敏文敏俱現任筆帖式屯布祿正黃旗人額柏根之叔祖也其曽孫阿爾泰原任親軍校正庫訥原任四品官元孫遂赫原任步軍校常綬原任驍騎校好善原任護軍校達禮瑚原任內閣學士兼禮部侍郎四世孫和爾屯現任防禦齊金現任頭等侍御侍衛班領瑪唐阿正黃旗人額柏根叔祖班布達之孫也其長子森特赫由三等侍衛從征浙江於台州地方遇僞將曽飬性等率水陸兵六萬餘衆來犯力戰陳亡贈雲騎尉以其子賴格承襲任四品典儀卒其兄之子桑格襲職原任參領又瑪唐阿次子薩木哈原任工部尚書三子胡世圖原任太常寺少卿孫新保原任刑部侍郎兼光祿寺卿錫祿原任整儀尉賽碧漢原任二等侍衛董海原任中書常綬原任八品官索住原任筆帖式薩爾圖原任員外郎性安原任副都統兼茶房總領定柱現任太僕寺少卿曽孫騷達色原任六品官伊爾根原任同知音布現任護軍參領碩色現任四川巡撫六十四五十八俱原任筆帖式舒啓現係舉人伊善常安俱現任筆帖式瞻住現係廕生伊常阿現任藍翎侍衛元孫瑪璘現任通政使司參議兼佐領穆克登現係廕生穆丹穆哈璉俱現係監生圖桑阿現任中書哈逢阿現任筆帖式瑚琛布國正藍旗人世居哈達地方由間散攻遵化州第初來歸其長子瑚伸布祿二登城克之授雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆叙功授為騎都尉恩詔加三遇等輕車都尉後追滕吉思擊土謝圖汗及至二碩羅汗等兵敗之征江西於南昌府擊敗賊髙總兵兵又征浙江舟山破溈英毅伯阮思等兵三萬餘衆叙功優授為一等輕車都尉兼一雲騎尉駐防江寧時擊海冦鄭成功陳亡贈為三等男以其第三子愛音察承襲從征吳逆於長沙府擊賊陳亡贈為二等男以其子雅岱承襲卒其子僧保襲職緣事革退其伯祖之孫仁德襲職時削去恩詔所加之職現襲一等輕車都尉乂瑚琛布次子吳山原任步軍校孫岱同原任二等護衛拜音察原任郎中三岱原任六品官布爾賽原任主事庚色勒原任護軍校曽孫雅什泰長綬福保俱原任筆帖式元孫福綬原任七品官豐紳現任六品官以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黃旗巴顔圖其曾孫三雅圖現任筆帖式右世居哈達地方係天聰時來歸之人正藍旗包衣郭爾端其孫薩哈蓮原任護軍校曾孫三達色原任三等護衛右世居哈達地方係來歸年分無考之人正白旗郎鄂理哈達地方人其四世孫吳哈達現任八品典儀伊喀理哈達地方人鑲白旗喀爾喀濟郎鄂理同族哈達地方人由正白旗改隸以上俱係康熙時自科爾沁撤回之人各地方吳雅氏納穆章國鑲黃旗人世居德爾吉穆湖地方征山東攻東初來歸其孫莽色由佐領過北京阿縣不設雲梯第二登城克之復破流賊征四川俱著戰功授雲騎尉卒其子瑪爾漢襲職遇恩詔授為騎都尉緣事降為雲騎尉任協領兼佐領卒其子石圖襲職卒其子石旒襲職現任四等侍衛又納穆章之孫瑚什布原任防禦曽孫穆楚原任佐領德舒原事給事中元孫溫普原任護軍統領兼佐領葉楞格原任協領四世孫禪住現任七品筆帖式拴住現任六品官葉爾德現任護軍校德昌現任吉林烏喇倉官阿納達國正紅旗人世居葉赫齊谷地方領從征厄魯特初來歸其孫綽和托由委署參噶爾丹有功授雲騎尉任佐領卒其子珠納海襲職現任佐領又阿納達之孫阿寧阿原任防禦曽孫伊蘭泰亦原任防禦珠拉納原係貢生珠蘭泰現任員外郎元孫托晉現係貢生以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗吳巴泰烏喇地方人原任弓匠協領其子旒達原任護軍校孫四海原任三等侍衛武瑚原任護軍校武爾德現任護軍校曽孫達賴原任護軍校正紅旗禪布祿哈克三地方人原任七品官其子阿普圖原任前鋒校孫庫察原任郎中曽孫牛鈕原任筆帖式色柏赫現任員外郎元孫五十七現任驍騎校巴爾岱禪布祿同族哈克三地方人其子阿鼐原任防禦孫衮泰現任防禦拉森泰現任驍騎校清江禪布祿同族哈克三地方人原任護軍校其孫富貴原任驍騎校包衣艾圖長白山地方人其子倭赫原任七品典儀鑲白旗和積格吉林烏喇地方人其孫舒揚原任筆帖式曽孫札庫塔原任驍騎校巴什吉林烏喇地方人其子巴音達原任驍騎校曽孫綏赫訥現任護軍校由正白旗改隸以上俱係國初來歸之人鑲紅旗包衣羌什庫訥殷地方人其曽孫阿都齊原任典儀元孫哈楚漢原任護軍校右係來歸年分無考