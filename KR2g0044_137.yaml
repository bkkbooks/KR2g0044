body:
  text: 八旗滿洲氏族通譜卷六十八附載滿洲旗分內之䝉古姓氏烏新氏烏新係隸滿洲旗分之蒙古一姓其氏族世居西拉木楞地方昂靄國鑲白旗人世居西拉木楞地方由驍騎校從征初來歸原任佐領其子碧禮克廣東廣西在韶州府地方擊敗賊僞將馬寶等兵一萬餘衆又敗賊僞將吳世琮馬步兵六千餘衆續征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊將胡國秉等兵於雲南城贈騎都下卒後叙功優圖襲職任副護軍參領卒其子尉其子鄂齊爾鄂鼐襲職現任護軍參領由正白旗改隸昂阿國鑲白旗人世居西拉木楞地方護軍校部委章初來歸原任佐領其孫赫色由京取昭定藏著有勞績叙功授雲騎尉任佐領卒其子齊納理現襲職由正白旗改隸以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗謨泰其孫謨絡原任員外郎曾孫花善原任步軍校達蘭泰現任步軍校四世孫達色現係副驍騎校由正白旗改隸布楞泰其子色楞原任護軍校元孫金住現任護軍校由正白旗改隸以上俱世居西拉木楞地方係國初來歸之人把嶽忒氏把嶽忒係隸滿洲旗分之䝉古一姓其氏族散處於阿壩垓等地方諾爾布正黃旗人世居阿壩垓地方天聰時來歸其子黑格原任員外郎白格原任主事孫諾穆渾原任陕西布政使永國由禮部侍郎往征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈騎都尉其子富明現襲職又諾爾布之曾孫富祿原任筆帖式巴爾國正黃旗人世居西拉木楞地方衛雅穆圖原任初來歸其子庫塞原任二等侍護軍校孫古爾布錫原任驍騎校保住原任護軍校曾孫羅桑亦原任護軍校巴明由委署護軍校從征浙江福建擊敗賊兵續征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊將胡國秉等兵於雲南城下叙功授雲騎尉任城守尉因年老告退其子德備襲職現任三等侍衛伊子逹凌現任中書又巴爾元孫札穆蘇現任驍騎校索柱現任佐領阿齊國正黃旗人世居西拉木楞地方州在凉水井等初來歸由護軍校從征雲南貴處擊敗賊僞將李成蛟等馬步兵三萬餘衆又擊敗賊僞將李定國等兵叙功授雲騎尉卒其孫齊爾襲職耨克國鑲黃旗人世居把嶽忒地方校孫巴爾密特原初來歸其子搆色原任護軍任都統伊蓀德原任驍騎校雷池鯤原係進士酸逹現任八品官曾孫伊昌阿原任筆帖式納秦現任前鋒校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黃旗克什克諾爾蓀克爾倫地方人其子阿克拜阿濟蓀俱原任佐領孫博絡尼原任委署護軍參領曾孫策林原任郎中兼參領元孫玉保現任中書烏薩齊西拉木楞地方人其曾孫圖巴原任護軍參領濟雅泰西拉木楞地方人其孫孟格圖原任藍翎侍衛曾孫克錫圖原任步軍校逹爾瑪錫原任佐領元孫章保住原任員外郎四世孫雲端現任驍騎校克特喀爾喀地方人其子定柱原任步軍校孫白官柱現任驍騎校曾孫齊克慎現任護軍校班札克西拉木楞地方人原任藍翎侍衛其子白竒原任驍騎校渾西拉木楞地方人原任通事其子巴圖原任驍騎校鄂濟拜西拉木楞地方人其孫鄂爾濟圖原任所副曾孫錫德理現任驍騎校卓理西拉木楞地方人原任護軍校其子色賁亦原任護軍校卓特巴原任驍騎校曾孫八十現任驍騎校外庫西拉木楞地方人其子三齊哈原任驍騎校忠克西拉木楞地方人其孫劉柱現任護軍校諾爾布逹史克爾倫地方人其孫常善保現任護軍校巴顔齊西拉木楞地方人其曾孫二格現係副護軍校正白旗南泰西拉木楞地方人其子丑色現任副護軍參領索爾和西拉木楞地方人其子瑟格原任佐領兼雲騎尉孫玉保原係雲騎尉白逹色現任驍騎校濟賴西拉木楞地方人其子黑色原任驍騎校孫班逹現係副驍騎校錫泰西拉木楞地方人其子納穆岱原任護軍校孫和尚原任筆帖式新錫現係前鋒藍翎頭目正紅旗阿爾瑚圖察哈爾地方人其五世孫烏逹海原任郎中六世孫僧保現任筆帖式七世孫法奇現任驍騎校明泰現任前鋒參領按阿爾瑚圖與本旗同里範泰法莽阿巴珠納阿爾圖鑲紅旗輝發地方謨和托等同族範泰察哈爾地方人阿爾瑚圖同族其子烏爾瑚原任驍騎校孫烏爾哈圖亦原任驍騎校法莽阿察哈爾地方人阿爾瑚圖同族其子舒淑布原任驍騎校巴珠納察哈爾地方人阿爾瑚圖同族其曾孫烏納哈賚原任五品官元孫台布原任護軍校二格原任筆帖式四世孫凖布原任護軍校札秦原任親軍校常德原任千總福明現任護軍校阿爾圖察哈爾地方人阿爾瑚圖同族其曾孫拜度原任千總元孫納親亦原任千總四世孫赫成額現任把總黑色現係副驍騎校綽克托西喇塔拉地方人其孫綽壘原任步軍校曾孫兆柱原任筆帖式鑲紅旗謨和托輝發地方人其元孫松藹原任護軍參領四世孫阿濟理現任護軍參領燕泰現任防禦額倫泰現任佐領五世孫阿爾蘇原任筆帖式按謨和托與正紅旗察哈爾地方阿爾瑚圖同族正藍旗巴顔兀魯特地方人其子僧格原任護軍校孫嶽州原任郎中洪惠兀魯特地方人其孫他布岱原任頭等護衛曾孫穆克登布現任護軍校以上俱係國初來歸之人鑲黃旗博爾和喀喇穆倫地方人其孫托爾博圖原任步軍校曾孫逹色原任驍騎校雅圖原任步軍校佛保現任副護軍參領元孫索鼐現任驍騎校正黃旗瑚岱鄂爾綽克鄂漠地方人其曾孫桑格現任驍騎校鑲藍旗包衣巴哈達中衛地方人其子巴爾蘇原任護軍校以上俱係天聰時來歸之人科本氏科本係隸滿洲旗分之蒙古一姓其氏族世居兀魯特地方巴朗國正黃旗人世居兀魯特地方擊敗賊首俞三等初來歸由護軍校從征山東兵續征四川在野狐嶺陽平關等處屢敗賊僞葉總兵等兵一萬餘衆又在蟠龍山遇賊僞將贈騎都王屛藩等率衆由水陸來戰奮勇進擊陳亡優尉其子華色襲職卒其子班珠爾襲職卒無嗣其親弟納顔現襲職右係應立傳之人其餘無事蹟可立傳者附載於後正黃旗優升兀魯特地方人其子鄂本泰原任通判右係國初來歸之人佟尼果特氏佟尼果特係隸滿洲旗分之䝉古一姓其氏族世居喀拉沁地方圖爾噶圖鑲藍旗包衣人世居喀拉沁地方天聰時來歸由閒散二次過北京征山東梯攻定州首先登贈騎都城陳亡巴逹穆蘇襲職遇尉其子恩詔加一雲騎尉卒其子圖蘇襲職卒其子烏靈阿襲職時削去恩詔所加之職現襲騎都尉右係應立傳之人阿穆尼普塔斯氏阿穆尼普塔斯係隸滿洲旗分之䝉古一姓其氏族世居蓀尼喀札理地方唐古泰國正黃旗人世居蓀尼喀札理地方京梯攻遵化初來歸其曾孫阿海由閒散往北贈騎都城越衆先登陳亡襲職因年老告退其親伯之尉無嗣其父阿邦恩詔加子䝉古拜襲職三遇其子巴圖賚襲職卒其親至二等輕車都尉卒恩詔所弟六十一襲職時削去其子蘭柱現襲職加之職承襲騎都尉卒右係應立傳之人布魯特氏布魯特係隸滿洲旗分之蒙古一姓其氏族世居喀爾喀地方托謨渾國正黃旗人世居喀爾喀地方士曾孫克瑟衣由初來歸其孫克錫古原任博賜巴圖閒散從征前屯衛攻中前所城第二登進克之魯號授佐領卒無嗣將應襲之佐領改為騎都恩詔加尉其親兄克什布賚襲職三遇祖之子阿哈襲至二等輕車都尉卒無嗣其伯職卒其子什逹襲職卒無嗣未襲後乾隆元年蒙特恩令其族曾孫八十承襲雲騎尉現任二等侍衛又托謨渾之曾孫郎凖原任驍騎校元孫吳逹理原任筆帖式右係應立傳之人烏濟吉特氏烏濟吉特係隸滿洲旗分之蒙古一姓其氏族世居巴顔喀喇及克西克騰地方烏巴璽國正藍旗人世居巴顔喀喇地方賊張獻忠兵陳初來歸由護軍校從征四川擊贈雲騎亡其子阿什圖襲職三遇尉恩詔加至三等輕車都尉卒其子札穆素襲職從征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊將胡國秉等兵於雲南城下後在武磨山擊賊將馬寶巴飬元等兵陳亡優贈騎都尉兼一雲騎尉授為一等輕車都尉兼一雲騎尉其親伯之子昂格理襲職卒無嗣其親弟之恩詔所子保綬襲職時削去車都尉卒無嗣其親叔之加之職承襲三等輕子阿玉錫襲職任佐領卒其子納蘇圖現襲職又烏巴璽之孫班第原任七品官曾孫丹巴現任副護軍參領右係應立傳之人其餘無事蹟可立傳者附載於後正藍旗文圖蓀克西克騰地方人其子額柯原任護軍校孫卓特巴原任驍騎校白竒克西克騰地方人其子白顔圖原任筆帖式孫華色原任驍騎校瀋揚巴顔喀喇地方人其孫阿敦原任驍騎校元孫五十六現係副驍騎校巴逹穆札克西克騰地方人其孫巴逹克圖原任驍騎校阿蘭圖巴顔喀喇地方人其曾孫三珠爾現任驍騎校以上俱係國初來歸之人劉佳氏劉佳係隸滿洲旗分之蒙古一姓其氏族世居察哈爾地方劉柱鑲黃旗包衣管領下人世居察哈爾地方來歸年分無考其子愛錫原任廄長孫索柱由內管聖躬領奉侍心敬謹小特恩賜騎都尉卒其子八逹色襲職現任三等侍衛右係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗誠德察哈爾地方人其子邁圖原任驍騎校右係天聰時來歸之人翁科特氏翁科特係隸滿洲旗分之蒙古一姓其氏族世居西拉木楞及兀魯特地方班布海國正黃旗人世居西拉木楞地方章京從征浙江初來歸其孫巴雅爾圖由委署舟山擊敗賊僞英毅伯阮思等兵於海上續征福建攻厦門擊敗海寇鄭成功等賊艘六百餘隻叙功授雲騎尉卒其子巴丹圖襲職右係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗錫喇竒塔特兀魯特地方人其孫兆玉現任驍騎校正黃旗烏納海兀魯特地方人原任驍騎校六十西拉木楞地方人其孫圖喇原任護軍校曾孫衆神保現任護軍校西爾拉岱兀魯特地方人其孫六十八原係副驍騎校以上俱係國初來歸之人鑲黃旗齊格兀魯特地方人原任郎中其子尚圖原任步軍校鄂齊爾原任頭等侍衛薩穆岱兀魯特地方人其子西喇普住原任二等侍衛奇臣原任員外郎孫西林現係生員察漢羅思兀魯特地方人原任三等侍衛其孫寶興原任護軍校以上俱係天聰時來歸之人烏齊喜特氏烏齊喜特係隸滿洲旗分之蒙古一姓其氏族世居兀魯特地方竇濟國鑲紅旗人世居兀魯特地方騎校從征雲南擊初來歸其孫博絡逹漢由驍贈雲騎賊陳亡禮保襲職卒無嗣其親叔班第襲職又尉其子竇濟之曾孫碧理克原任護軍校星格爾圖原任驍騎校元孫赫保現任驍騎校右係應立傳之人其餘無事蹟可立傳者附載於後鑲紅旗多鼐其孫雅圖原任防禦阿岱原任護軍校泗九原任七品官劉塔其子費耀哈原任驍騎校孫普明原任護軍校逹爾漢原任護軍校其孫三泰原任驍騎校逹賴其孫巴雅爾圖現任護軍校定柱其孫七十八現係文生員以上俱世居兀魯特地方係國初來歸之人兀魯特氏兀魯特係隸滿洲旗分之䝉古一姓其氏族散處於西拉木楞等地方拜琥賚國鑲黃旗人世居西拉木楞地方東擊太監馮永初來歸由廢員初過北京征山盛兵奮勇直入又防守董家口時有賊兵來犯步戰敗之叙功授雲騎尉卒其弟之子外逹襲恩詔加職三遇輕車都尉卒其子僧古爾濟襲職因年至三等恩詔所老告退其子三保襲職緣事削去現襲職加之職仍襲雲騎尉卒其子常生右係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗阿爾古西拉木楞地方人其子逹蘭泰原任護軍校孫諾穆齊亦原任護軍校保安原任參領曾孫保住原任三等侍衛赫碩色原任驍騎校佛保任原係監生阿巴哈西拉木楞地方人其子額爾濟圖