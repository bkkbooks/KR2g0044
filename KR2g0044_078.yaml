body:
  text: 八旗滿洲氏族通譜卷三十八巴雅拉氏巴雅拉為滿洲一姓其氏族散處於松花江虎爾哈木倫及各地方松花江地方巴雅拉氏圖勒慎國正白旗人世居松花江地方安由佐領從征大初來歸原任佐領其長子充同平定朝鮮及三次圍錦州時俱著有勞績二次過北京征山東梯攻壽光縣克其城授雲騎尉破流賊滅福王平定河南江南時屢著戰功進兵浙江攻克湖州府城叙功授騎都尉遇恩詔加一雲騎尉又從征江西敗賊首金聲桓王徳仁馬步兵數萬餘衆授為三等輕車都尉兩遇恩詔加至一等輕車都尉原任叅領兼佐領因老乞休其子才柱孫衆神保相繼承襲衆神保卒其子恩詔所色克圖襲職時削去兼一雲騎尉又圖勒慎親加之職現襲騎都尉兄之子敬古爾達從征扎庫塔地方追獲已降復畔之三村人衆授為騎都尉從征烏爾古宸地方斬獲甚衆又破清河城有功授為三等輕車都尉克遼東授二等輕車都尉又從征阿庫里尼滿地方獲人甚衆授為一等輕車都尉三遇恩詔加授二等男原任㕘領兼佐領卒其弟之子福爾都承襲因老乞休其子和尚襲職時削去恩詔所加之職承襲一等輕車都尉現任山海闗總管又圖勒慎之子圖錫屯原任前鋒校孫南京原任二等侍衛兼佐領進寳原任藍翎侍衛拜音布原係雲騎尉任郎中兼佐領拜布䦨原任三等侍衞曽孫長生原係雲騎尉博福原任司庫瞻泰原任副都統兼佐領書魯原任主事三保現任驍騎校兼署佐領通徳現任二等侍衞兼佐領元孫博善現係舉人博海現任三等侍衞兼佐領明英現任佐領富喀那正白旗人世居松花江地方來歸年分無考其子拜色由防禦從征雲南在黄草壩地方屢敗賊將何繼祖等兵後從征厄魯特噶爾丹時復擊賊有功優授騎都尉因病乞休其子巴爾喀襲職現任委署步軍校勒騰正白旗人世居松花江地方來歸年分無考其曾孫納達納原任佐領墨爾楚原任頭等侍衞達普守原任二等侍衞興古爾達原任三等侍衞元孫巴當阿原任散秩大臣兼佐領晉布理原任二等侍衞四徳保現任䕶軍校哲勒爾徳由二等侍衞從征厄魯特噶爾丹時奮勇擊賊贈雲騎陣亡子巴什承襲卒其子蘇爾方阿襲職現任尉其佐領又勒騰之四世孫華善原任佐領哈什現任城守尉海保現任二等侍衞順保福成額俱現任佐領珠爾賽現任二等侍衞柴達國鑲黄旗八世居松花江地方在宜都縣地方奮初來歸由䕶軍校從征湖廣贈雲騎勇擊賊陣亡承襲卒其子三保現襲職又柴達尉其子四哥之孫八十現係副䕶軍校哈爾庫正白旗人世居松花江地方來歸年分無考其元孫郎久原任步軍總尉四世孫達普都原伍義州副都統巴爾逹楚原任散秩大臣布扣巴鼐俱原任二等侍衞鄂諾芬原任䕶軍校五世孫色克楚伊爾求俱原任藍翎侍衞拜都瑚原任䕶軍校阿普塔札普札納俱原任佐領書爾塔額宜退俱原任頭等侍衞武提堪伊竒納和羅俱原任二等侍衞和克斗倭楞額鄂爾多琨拉普圖俱原任三等侍衞濟爾吉訥原任驍騎校六世孫愛穆蘭原任三等侍衞岱穆蘭原任頭等侍衞桑格現任六品官班布理現任頭等侍衞蘇堪現任二等侍衞根徳現任䕶軍校墨求現任步軍校圖庫現任驍騎校博赫原任牧長七世孫馬費英阿現任佐領恩庫訥正白旗人世居松花江地方來歸年分無考其子墨爾根原任散秩大臣孫綬志原任散秩大臣兼佐領拜塔原任䕶軍校諾蒂原任三等侍衞曽孫二格現任六品官噶哈國正白旗人世居松花江地方副都統兼佐領布初來歸其曾孫胡什塔原任爾塔原任步軍校伊巴徳原任親軍校元孫布唐阿原任郎中濟清額原任佐領旒爾現任驍騎校四世孫常神保現任䕶軍校納哈布現任步軍校四保原係副䕶軍校濟靈額原任五品官以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗舒舒那其孫雅爾瑪現任八品官曾孫富森泰現任䕶軍校兌秦現任八品官正白旗善道其子艾盧渾原任䕶軍叅領孫阿齊納原任䕶軍校元孫屯圖原任員外郎錫魯其子阿揚阿原任䕶軍校孫愛達原任三等侍衞策爾錦其孫三岱原任五品官法克嗒喀其曾孫興圖原任驍騎校元孫保雲現任筆帖式哈里休其曾孫珠綬原任驍騎校元孫蘇徳現任千總達斗其孫雲岱原任驍騎校穆爾泰原任䕶軍校元孫羅察原任驍騎校鑲白旗博爾騰其曾孫薩穆哈原任四品典儀元孫來保住現任三等䕶衞瑪錫圖現任筆帖式山鑲黄旗改𨽻鑲紅旗勒福其曾孫留勒現任副䕶軍叅領正藍旗海塔其子遜卓羅原任前鋒校孫敖拉善蒙郭俱原任驍騎校瞻布理原任䕶軍校元孫三柱原任䕶軍校阿穆竒拉其曾孫五十兒現任驍騎校以上俱世居松花江地方係國初來歸之人正白旗倭理克其孫噶西達奇法理俱原任二等侍衞韶西原任䕶軍校曾孫韋特原任頭等侍衞阿納布現任頭等侍衞楞保現任驍騎校瑪圖堪其孫囘索諾原任二等侍衞蘇爾泰原任驍騎校以上俱世居松花江地方係來歸年分無考之人虎爾哈地方巴雅拉氏夸克塔喀鑲黄旗人世居虎爾哈地方天聰時率一百三十人越長白山來歸授三等輕車都尉卒無嗣恩詔加其親兄之子巴薩哈襲職三遇從征湖廣時在至一等輕車都尉兼一雲騎尉荆州府敗賊一隻虎兵進攻杭州獲船百餘隻又於山東屢著軍績後征廣東在新會縣地方撃賊將李定國兵四萬餘衆叙功授為三等男卒其子班塔哈襲職卒其親弟巴薩理襲職因恩詔所病乞休其親兄之子老哥襲職時削去之孫六加之職承襲二等輕車都尉卒其親叔十襲職卒其叔祖之孫二哥現襲職又夸克塔喀親兄之孫薩穆哈原任員外郎薩哈連國鑲黄旗人世居虎爾哈地方俱原任佐領孫珠初來歸其子吳喀理吳爾懇蘭泰亦原任佐領古楞額由驍騎校從征湖廣屢敗賊兵後於岳州府奮勇擊賊陣亡贈雲騎尉其子衮泰襲職卒其孫金柱現襲職又薩哈連之曾孫薩棣原任驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗阿隆阿其孫和隆鄂原任藍翎侍衞曾孫阿爾塔原任郎中元孫佛保現任親軍校常官保現任驍騎校沙班其元孫阿爾璧善現任二等侍衞薩克提原任䕶軍叅領博爾鐸原任二等侍衞四世孫楊齊保現任三等侍衞瑪法察其孫保住原任防禦曾孫塞爾屯現係副榜白魯其曽孫連僧現任前鋒校都璧庫其孫額爾璧原任䕶軍校正紅旗岱柱其孫四格現任驍騎校曾孫岱同原任驍騎校竒穆托其孫金達理原任驍騎校曾孫英柱現任驍騎校正藍旗薩米達其孫鶴善原任驍騎校河圖原任典儀曾孫徳楞額原任前鋒叅領徳竒訥現任䕶軍校鈕爾胡山其曾孫哲庫訥巴布俱原任驍騎校元孫都爾庫原任七品官四世孫木達禪現任員外郎伊塔堪其曾孫薩爾善原任䕶軍校元孫鐘登原任佐領牛爾胡順其元孫安泰現任步軍校四世孫程明現任䕶軍校那爾布現係副驍騎校以上俱世居虎爾哈地方係國初來歸之人鑲黄旗洪科訥其子塔錫喀原任三等侍衞孫南柱原任䕶軍叅領曾孫薩鼐巴鼎俱現任筆帖式武苗其子玉爾達原任三等侍衞孫錫爾泰現任三等侍衞桑沙其子薩爾吉達原任䕶軍校以上俱世居虎爾哈地方係來歸年分無考之人木倫地方巴雅拉氏伊搆國正白旗人世居木倫地方普喀由佐領初次圍初來歸原任佐領其子雅錦州時屢敗松山杏山馬步兵二次過北京征山東梯攻齊東縣克其城授雲騎尉三遇恩詔加至三等輕車都尉任城守尉卒其孫布爾海襲職卒其子希賴襲職時削去恩詔所加之職承襲雲騎尉任署副都統兼佐領縁事革退其親叔四十八襲職原任山海闗總管又伊搆之孫額赫登由䕶軍叅領定鼎燕京時入山海闗擊流賊馬步兵二十萬衆有功授雲騎恩詔加尉卒其親叔之子博吉襲職遇卒其子徳綬襲為騎都尉歴任廣州將軍佐領恩詔所職卒其子徳備襲職時削去伯之孫噶爾璧襲加之職承襲雲騎尉卒其親職現任主事又伊搆之曾孫唐鼐原任員外郎兼佐領元孫中福現任三等侍衞兼佐領富徳現任佐領四世孫希特哈原任主事喬萬國鑲黄旗人世居木倫地方前鋒侍衞四世孫魯初來歸其元孫法柱原任克蘇原任䕶軍叅領達爾久原任驍騎校五世孫蘇泰現任副䕶軍叅領竒木察由䕶軍校進贈雲騎藏陣亡阿晉泰現襲職尉其子胡克珍鑲黄旗人世居木倫地方來歸年分無考其孫和喬原任藍翎侍衞曾孫都鈕因率本地方人六十四户在寧古塔効力實心任事著有勞績授雲騎尉原任前鋒叅領卒其子托渾柱現襲職又胡克珍之元孫卓爾韜由三等侍衞從征厄魯特噶爾丹擊賊有功授雲騎尉卒其親弟之子黑逹色襲職現任二等侍衞又胡克珍之曾孫阿魯堪原任三等侍衞元孫卓紐原任䕶軍叅領森都楞國鑲黄旗人世居木倫地方軍校孫恰薩蘭原任初來歸其子吉斗原任䕶二等侍衞曽孫禮法那由委署䕶軍校從征湖廣屢敗賊兵進攻雲南在黄草壩地方擊賊將何繼祖等大破之叙功授雲騎尉卒其子泰音保現襲職又森都楞親弟多思庫之孫伊魯喀原任三等侍衞曾孫積爾海原任藍翎侍衞興相鑲黄旗人世居木倫地方來歸年分無考其元孫吉魯堪由三等侍衞從征厄魯特噶爾丹擊賊有功授雲騎尉卒其子山東保現襲職賴鼐國正白旗人世居木倫地方驍騎校曾孫瑪琥善初來歸其孫武當阿原任原任山海闗總管加副都統銜雅爾那現任前鋒㕘領阿爾那現任步軍校元孫什圖原任七品官伊爾達現任筆帖式錫爾達現係廕生蘇瞻現係監生以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗卿球其曾孫賚都原任七品官元孫海通阿原任筆帖式四世孫永良現任通政使司叅議永泰現任八品官額爾森其孫托爾璧原任城守尉以上俱世居木倫地方係國初來歸之人正白旗額樓其孫飄色原任䕶軍校鑲紅旗商堅其孫亢凱原任三等侍衞曾孫僧克原任城門尉元孫黑色現任驍騎校以上俱世居木倫地方係來歸年分無考之人各地方巴雅拉氏尼堪國正白旗人世居卦爾察地方先登城克之授騎初來歸過北京攻永平府首賜巴圖都尉又從征兀札喇地方斬獲甚衆親弟之子魯號授為三等輕車都尉卒無嗣其恩詔加額赫訥襲職遇尉從征貴州囘兵時遇海賊鄭至二等輕車都成功來犯江寧擊敗之征山東敗賊首蔣金剛兵有功授一等輕車都尉卒其子赫雅圖薩穆哈先後承襲薩穆哈卒其親伯之孫張保住襲職時削去恩詔所加之職并職現襲三等輕車都尉又尼堪親弟詔後軍功所得之圖理肯之子倭和訥原係雲騎尉孫訥爾泰亦原係雲騎尉曾孫尼瑪齊亦原係雲騎尉元孫卓普圖現任中書噶普塔喀國正藍旗人世居法爾圖地方過北京征山東梯初來歸其孫夏爾久由閒散恩詔加攻棲霞縣第二登城克之授雲騎尉三遇征陜至三等輕車都尉卒其子殷逹渾襲職從西任平凉等處屢敗偽將呉之茂等賊兵有功後於軍前病故贈一雲騎尉為二等輕車都尉其子宗海承襲卒其子巴善襲職時削去恩詔所加之職承襲騎都尉縁事革退其子多隆郭現襲職又噶普塔喀之曾孫栢精原係監生元孫瓦爾達原任䕶軍校通吉善國鑲黄旗人世居黑龍江地方口等處著冇軍功初來歸由䕶軍校從征旅順授三等輕車都尉其子烏爾佳齊原任司庫孫興春原任䕶軍校佛保原任筆帖式曾孫雅圖原任筆帖式勞密現任驍騎校奎泰國正白旗人世居長白山地方征江南攻揚州府初來歸其孫岱納由閒散從贈騎都城擊賊陣亡伯之子布爾郭承襲遇尉無嗣其親恩詔加一雲騎尉卒其子覺和托孫留柱相繼承襲留柱卒其子二格襲職時削去恩詔所加之職承襲騎都尉卒其子薩充阿現襲職舒寧阿正黄旗人世居倭濟地方來歸年分無考其曾孫富爾賽由防禦從征厄魯特噶爾丹擊賊有功授雲騎尉卒其子新安襲職從征準噶爾在和通呼爾哈腦爾擊賊陣亡贈為騎都尉其子達春現襲職又舒寧阿之曾孫海亮原任佐領庫爾遜原任筆帖式多爾吉那國正白旗人世居扎庫塔地方衞兼䕶軍叅領從初來歸其子莽愛由頭等侍征察哈爾布爾尼在大鹵地方屢敗賊兵以功授雲騎尉卒無嗣其養子胡什布現襲職人多爾吉那之孫噶都渾原任頭等侍衞曾孫拉都渾原任三等侍衞元孫齊必圖原任司庫元正原任筆帖式四世孫棟樑現任二等侍衞文殊保現任筆帖式巴爾哈善國正白旗人世居長白山地方從征福建在建寕初來歸其子勾勒慎由佐領贈雲騎府擊鄭成功等兵被傷後因創發身故哈善之尉其子薩鼐孫華色相繼承襲又巴爾孫邦紐原任驍騎校曾孫賽達原任防禦元孫布漢現任驍騎校圖南正黄旗人世居庫穆努地方天聰時來歸其子殷太原任内閣學士兼禮部侍郎孫七十原任員外郎以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗吳法哈寕古塔地方人原任驍騎校孫喀爾齊喀亦原任驍騎校努哈連原任䕶軍校曾孫碩彬原任步軍校阿爾那原任防禦雅圖現任協領吳琳保現任䕶軍校綽寧阿黑龍江地方人其元孫阿普當吉現仕驍騎校秦第攸現任二等侍衞四世孫富密善現任三等侍衞蘇和黑龍江地方人其子叟呼徳原任步軍校尼庫黑龍江地方人其孫薩哈連原任驍騎校綬寧阿伊蘭費爾塔哈村地方人其孫穆努瑚原任驍騎校正黄旗董蕭烏丹村地方人其孫佐保原任三等侍衞常保原任防禦綏哈達原任佐領雅圖原任䕶軍校敖翁烏塞理地方人其五世孫黒雅圖原任步軍校圖三泰原任驍騎校噶爾柱現任防禦索爾豪庫穆圖地方人其孫阿蘭泰原任驍騎校曾孫蘇本泰現任防禦武爾登額庫穆圖地方人其孫富康現任䕶軍校正白旗撓那長白山地方人原任䕶軍叅領蘇克蘇客長白山地方人其孫雅色徳原任佐領曾孫黑色原任驍騎校霍倫長白山地方人其孫岱環原任步軍校曾孫三達理原任防禦夏圖原任驍騎校元孫桑格亦原任驍騎校尼永尼雅哈長白山地方人其孫桑格原任六品官尼爾豪尼馬察地方人其元孫岱屯原任䕶軍校四世孫望寶柱原任驍騎校克門原任䕶軍校倭和長白山地方人其曾孫常綬原任驍騎校岱倫長白山地方人原任驍騎校其子索柱亦原任驍騎校尼永尼堪長白山地方人其孫札海原任筆帖式正紅旗披揚郭綏分地方人其孫博爾和諾原任佐領瑪圖擴原任䕶軍校曾孫四保現任䕶軍校保色原任筆帖式鑲紅旗庫坦庫爾喀地方人原任䕶軍叅領其親弟達爾禪之五世孫薩蘭泰原任防禦福保現任親軍校渾達喀庫坦同族庫爾喀地方人其子孟古爾岱原任員外郎孫雅進泰原任主事曽孫訥星額現任三等䕶衞恩努肯庫坦同族庫爾喀地方人其孫佛瑚原任前鋒校黑雅圖原任四品典儀曾孫卓爾岱原任步軍校來住原任驍騎校赫紳原任三等侍衞元孫阿爾璧虎原任筆帖式呉爾佳齊庫坦同族庫爾喀地方人其孫哈濟納原任驍騎校曾孫巴顔布現任防禦三齊哈現任驍騎校照托倫長白山地方人其孫查爾布原任驍騎校曽孫阿臨泰現任佐領尼雅瑚多庫爾喀地方人其曽孫鄭克宜原任佐領元孫哲爾懇原任前鋒侍衞三雅圖現任前鋒校安保柱現任防禦四世孫巴顔圖現係副驍騎校正藍旗顔徳福長白山地方人其孫華色原任佐領三格原任䕶軍校曾孫薩爾圖原任驍騎校綽思圖巴顔和羅地方人其孫諾穆圖原任七品官元孫存徳現任䕶軍校瑪色現係副驍騎校包衣外庫法爾圖地方人其曾孫張保原任䕶軍校以上俱係國初來歸之人正白旗道達喀寧古塔地方人其曾孫吉蘭泰現任頭等侍衞兼步軍校哈爾久現任四等侍衞察爾拜原籍無考原任二等侍衞正藍旗包衣巴楞太王多羅樹地方人原任三等侍衛其孫西爾漢原任筆帖式由正黄旗改隸葉爾胡訥瓦爾喀地方人其子阿爾岱原任牧長孫阿爾泰原任䕶軍校雅爾泰原任筆帖式由正黄旗改隸以上俱係來歸年分無考之人八旗滿洲氏族通譜卷三十八
