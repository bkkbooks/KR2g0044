body:
  text: 八旗滿洲氏族通譜卷七十九附載滿洲旗分內之臺尼堪姓氏沈氏豐庫正黃旗人世居遼東地方來歸年分無考其孫沈都立原任員外郎綽爾岱原任吏部侍郎邁薩里原任筆帖式申保原任主事曽孫辛柱現任郎中西泰原任協領僧額勒現任編修常占現任司庫福祿現任筆帖式常柱華善俱原任筆帖式七十八現任八品官元孫三保現任筆帖式英受原任主事張氏張銑國正黃旗人世居遼陽地方都統曽孫雅圖現任初來歸其孫偏圖原任副六品官以上俱係三品以上大員照例列於卷首其餘敘載於後王氏王文華鑲黃旗包衣人世居臺地方天聰時來歸其孫四保原任員外郎石圖現任護軍校曽孫鼎住原任護軍參領王濟納正黃旗人世居長白山地方天聰時來歸其曽孫保住現任驍騎校王宗講正藍旗人世居大凌河地方來歸年分無考其曽孫那爾泰原任驍騎校元孫色勒朱爾哈泰俱現任步軍校綬謙正藍旗人世居大凌河地方來歸年分無考其孫福爾丹原任步軍校王弼正藍旗人世居大凌河地方來歸年分無考其子王照原任驍騎校孫阿爾賽原任孔目曽孫恭德現任驍騎校常住原任筆帖式元孫延禧現任鳴贊海德現任筆帖式海明現任中書王俊雲正藍旗人世居大凌河地方來歸年分無考其子克赫訥原任護軍校孫石柱亦原任護軍校劉氏福拉納正黃旗人世居蓋州地方天聰時來歸其孫費揚古原任信炮章京柏萬正黃旗人世居蓋州地方來歸年分無考其元孫常治原任驍騎校劉世蔭鑲白旗人世居遼陽地方天聰時來歸其孫托色原任護軍校曽孫恩特合現任典儀元孫額圖渾現任護軍校劉世恩鑲白旗人世居牛莊地方來歸年分無考其孫碩色原任驍騎校劉光祖鑲白旗人世居寧古塔地方來歸年分無考其子長保原任七品官劉天福正藍旗人世居大凌河地方來歸年分無考其曽孫烏爾泰現任護軍校張氏四譜正黃旗人世居蓋州地方天聰時來歸其曽孫常住現任驍騎校桂忠鑲白旗人世居牛莊地方來歸年分無考其孫阿爾泰原任六品官張恭生正藍旗包衣人世居撫順地方來歸年分無考其孫張玉柱原任六品官曽孫張順德原任筆帖式色墨理原任參領元孫定柱原任六品牧長明福現任筆帖式克惇正藍旗人世居大凌河地方來歸年分無考其元孫金湖現任頭等護衛兼佐領可敦正藍旗人世居大凌河地方來歸年分無考其元孫舒敏現任御史景善現任筆帖式四世孫廣艾現任筆帖式孫氏尚正黃旗人世居蓋州地方柯國初來歸其孫常關保現任驍騎校夢現任三等侍衛曽孫德恩現任二等侍衛孫朝臣鑲白旗人世居遼陽地方來歸年分無考其曽孫安達理金達理俱原任護軍校僧保現任筆帖式元孫偏圖原任典儀三雅圖現任護軍校白雅圖現任驍騎校觀音保現任遊擊四世孫七福現任筆帖式孫福正藍旗人世居大凌河地方來歸年分無考其曽孫薩海齊鼐俱原任步軍校四世孫穆特布現任筆帖式唐氏拉巴正黃旗人世居瀋陽地方天聰時來歸原任護軍校文高正藍旗人世居撫順地方來歸年分無考其曽孫六格原任城門尉納爾泰正藍旗人世居撫順地方來歸年分無考其子色克圖原任驍騎校楊氏舒昌正黃旗包衣人世居長白山地方天聰時來歸其孫三泰原任步軍校曽孫雅通阿現任驍騎校楊綬宗鑲白旗人世居遼陽地方天聰時來歸其子楊德成原任把總孫偏圖原任驍騎校曽孫九十佟保俱原任護軍參領存柱原任防禦元孫綽和諾現任防禦楊萬騰正藍旗人世居大凌河地方來歸年分無考其曽孫多穆拜原任步軍校李氏陶色正黃旗人世居瀋陽地方天聰時來歸其子林清原任步軍校孫額錫圖原任佐領李應孝正藍旗人世居大凌河地方來歸年分無考其曽孫白達色現任護軍校秋氏秋乾正白旗人世居遼陽地方來歸年分無考其元孫綽欣原任護軍參領拉色里現任防禦四世孫明善現任員外郎成亮正白旗人世居遼陽地方來歸年分無考其元孫僧格現任護軍校宋氏宋成義鑲白旗人世居牛莊地方來歸年分無考其孫倭赫原任主事曽孫蘇相齡原任太僕寺少卿宋柱鑲白旗人世居牛莊地方來歸年分無考原任千總其曽孫費揚古原任護軍校元孫白精亦原任護軍校常明原任驍騎校八十一現任八品官四世孫聖保現任員外郎圖氏圖進正黃旗人世居六臺地方色國初來歸其子石善原任驍騎校孫黑原任防禦圖照原任驍騎校薩穆哈原任太常寺少卿薩布哈原任筆帖式雅氏雅尚人正黃旗人世居吉林烏喇地方天聰時來歸其曽孫崇順原任步軍校元孫保平現任頭等侍衛侍衛班領保在原任中書馬氏馬健德正黃旗人世居遼陽地方郎國初來歸其元孫色倫泰現任中賴氏托色正黃旗人世居瀋陽地方天聰時來歸其子臨清原任步軍校孫額普圖原任佐領鄧氏留德正黃旗人世居蓋州地方天聰時來歸其元孫思久現任防禦雅凌阿原任驍騎校莫氏莫官憲正黃旗人世居遼陽地方軍國初來歸其子常綬原任護校江氏恭正黃旗人世居三臺地方驍國初來歸其元孫三陽泰現任騎校龎氏龎方正黃旗人世居蓋州地方天聰時來歸其曽孫達蘭泰原任驍騎校元孫雅爾布現任護軍校俞氏俞柱正黃旗人世居章羅地方天聰時來歸其元孫頗亷現任驍騎校黃氏西成額正黃旗人世居牛莊地方來歸年分無考其元孫多鼐現任驍騎校羅氏石圖正黃旗人世居吉林烏喇地方天聰時來歸原任護軍校其曽孫吉祿現係舉人郭氏觀齊肯正黃旗人世居蓋州地方天聰時來歸其元孫常保原任護軍校沈氏沈周鑲白旗人世居遼陽地方爾國初來歸其元孫金泰原任護軍校塞胡岱現任佐領多隆鄂現任驍騎校吳氏吳世虎鑲白旗人世居瀋陽地方來歸年分無考其子五十原任員外郎孫吳達理原任護軍校吳三保吳蘭泰俱原任筆帖式尤氏宣柱鑲白旗人世居沾河地方來歸年分無考其子烏色原任驍騎校孫阿爾圖原任三等護衛盧氏英魁鑲白旗人世居綬山地方來歸年分無考其孫羅和理原任驍騎校巴格原任步軍校曽孫常式現任護軍校蘇伯合現任八品官坡氏坡格來馬鑲白旗人世居鐵嶺地方來歸年分無考其曽孫皂保原任步軍校元孫常秋現任步軍校阿爾泰原任親軍校四世孫富魁現任驍騎校陳氏陳達鑲白旗人世居遼陽地方天聰時來歸其子陳山原任把總元孫占住現任贊禮郎孟氏孟承祖鑲白旗人世居匣塔子地方孫國初來歸其子孟懇原任護軍校元常升原任驍騎校聶氏聶勝公鑲白旗人世居遼陽地方軍國初來歸其孫聶受髙原任護校趙氏三泰鑲白旗人世居沾河地方來歸年分無考其曽孫七什原任護軍校高氏高國正鑲白旗人世居遼陽地方來歸年分無考其孫福助現任典儀周氏烏穆通鑲白旗包衣人世居遼東地方來歸年分無考其曽孫常保現任筆帖式向氏百綬鑲白旗人世居匣塔子地方來歸年分無考其元孫六十一現係生員徐氏徐成義正藍旗人世居撫順地方來歸年分無考其子徐子高原任護軍校孫長齡原任員外郎曽孫邁拉蓀現任長史朱氏朱成功正藍旗人世居大凌河地方來歸年分無考原任護軍校其子查克丹原任員外郎孫朱圖布原任筆帖式曽孫明倫現任靈臺郎史氏達成正藍旗人世居撫順地方來歸年分無考其孫赫楞額現任驍騎校宗氏宗武正藍旗人世居大凌河地方來歸年分無考其子宗有理原任護軍校顏氏博恭正藍旗人世居大凌河地方來歸年分無考其元孫噶哈理原任護軍校四世孫德興現任驍騎校八旗滿洲氏族通譜卷七十九欽定四庫全書
