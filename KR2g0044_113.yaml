任頭等護衛元孫托晉原任驍騎校四十八原任筆帖式官保現任右春坊右中允穆騰額現任筆帖式常安現任中書恩特赫墨現係生員四世孫福泰翻譯進士現任主事永浩現任中書永泰翻譯舉人現任筆帖式世爵亦現任筆帖式世英現係翻譯舉人穆燕氏穆燕為滿洲一姓此一姓世居渾春地方岱音布祿鑲藍旗人世居渾春地方來歸年分無考其曽孫朱山原任副都統瑚蘭原任五品官鄂通果原任筆帖式元孫蘇蘭亦原任筆帖式四世孫蘇赫臣現任驍騎校都善氏都善為滿洲一姓此一姓世居黑龍江地方門岱國鑲黃旗人世居黑龍江地方化城副都統孫常初來歸其子古葉理原任歸齊原任筆帖式拜格氏拜格本係地名因以為姓此一姓世居拜格山地方克拉喀國鑲紅旗人世居拜格山地方齊色原任初來歸其孫吉達原任長史盛京工部侍郎曽孫齊克新保原任筆帖式阿圖拉墨氏阿圖拉墨為滿洲一姓此一姓世居雅爾湖地方當古理國正白旗人世居雅爾湖地方忠吉圖原任二等初來歸原任藍翎侍衛其子侍衛侍衛什長鄂密岱原任佐領孫明安原任刑部侍郎扎克丹原任驍騎校曽孫塞克圖現任七品官騷達色現任護軍校賽音薩爾圖氏賽音薩爾圖為滿洲一姓此一姓世居札魯特地方巴格鑲紅旗人世居札魯特地方天聰時來歸原任戶部侍郎其子阿玉璽原任頭等護衛永泰原任筆帖式費楞額原任郎中孫赫色原任員外郎穆和林氏穆和林本係地名因以為姓此一姓世居穆和林地方葉臣廣固國正白旗人世居穆和林地方西巡撫曽孫米格初來歸其孫圖克善原任山原任三等侍衛花色薩爾圖俱原任七品官元孫圖世禧現任筆帖式四世孫圖俊亦現任筆帖式八旗滿洲氏族通譜卷五十六欽定四庫全書
