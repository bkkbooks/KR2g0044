body:
  text: 八旗滿洲氏族通譜卷五十六尼竺渾氏尼竺渾為滿洲一姓此一姓世居長白山地方甘篤國正黃旗人世居長白山地方義初編蒙古佐領初率子弟來歸因通蒙古文時授為佐領從征寧遠執纛先入往北京入邉之日遇明兵擊敗之又敗玉田縣兵以功優授三等輕車都尉天聰年間自捐榖石養贍佐領下户口蒙恩擢授兵部侍郎兼副都統三載考察稱職授為二等輕車都尉二次過北京征山東攻蠡縣克其城授為一等輕車都尉圍錦州屢敗松山杏山馬步兵又敗洪承疇三營兵有功加一雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣敗之平定江南攻崑山縣指恩詔授揮克其城授為三等男遇職卒無嗣其親叔巴二等男卒其子吳善布襲恩詔加爾賽襲職兩遇雲騎尉任佐領卒其孫常保襲至一等男兼一職任佐領卒其子萬神保襲職卒其伯曽祖之曾孫諾爾朴襲職任提督教習西番文館司業恩詔所卒其子宗佳襲職時削去藍蒙古旗分改𨽻加之職現襲三等男由鑲武爾格齊氏武爾格齊為滿洲一姓此一姓世居葉赫地方達都國鑲紅旗人世居葉赫地方散攻安州有功授雲初來歸其子額古理由間恩詔加騎尉卒無嗣其親叔之子德爾庫襲職三遇二至三等輕車都尉從征西川著有勞績授為等輕車都尉因病告退其子登德理襲職從征厄魯特噶爾丹奮勇破賊有功授為一等輕車恩詔所都尉因年老告休其子達琦襲職時削去加之職現襲騎都尉兼一雲騎尉瑚玉魯氏瑚玉魯為滿洲一姓此一姓世居烏喇地方瑚鈕國正藍旗人世居烏喇地方擊敗洪承疇三營兵初來歸由前鋒三圍錦州恩詔加敘功授雲騎尉三遇征貴州於十萬竒嶺遇賊至三等輕車都尉從偽總兵羅大順兵屢敗之回兵時於江寧地方擊敗海寇鄭成功兵三萬餘衆敘功授為二等輕車都尉卒其子桑格襲職因病告休其子臣布襲職卒其子齊式布襲職緣事削去恩詔所加之職其弟布庫承襲騎都尉卒其叔祖之孫圖克善襲職時削去詔後軍功所得之職現襲雲騎尉和和齊氏和和齊為滿洲一姓此一姓世居尼馬察地方僧蘇克國鑲藍旗人世居尼馬察地方領令其子法當阿初率兄弟及同里來歸編佐統之孫瓦住原任驍騎校曾孫蒙古爾岱原任主事根特由間散過北京征山東梯攻靈壽縣賜巴圖首先登城克之定鼎燕京時入山海關擊敗流魯號授騎都尉恩詔授賊馬步兵二十萬衆敘功加一雲騎尉遇泰襲三等輕車都尉卒無嗣其叔祖之孫阿蘭職任西寧總兵官卒其子巴爾圖襲職任參領卒其子柏海襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉又僧蘇克之元孫博濟原任副都統岱敏原任佐領瑚什巴原任筆帖式布岱二格俱原任護軍校阿岱阿爾布哈俱原任驍騎校騷達色現任協領薩穆哈由委署章京從征江西湖廣等處敗賊有功授雲騎尉卒無嗣其親弟之子徹勒襲職又僧蘇克之元孫渾岱由防禦從征厄魯特噶爾丹奮勇破賊有功授雲騎尉卒其子雅圖現襲職又僧蘇克之四世孫赫碩色原任護軍校沙爾泰現任護軍校亞頭現任驍騎校五世孫松阿理五什九俱現任驍騎校塔穆察氏塔穆察為滿洲一姓一姓世居黑龍江地巴哈納國正藍旗人世居黑龍江地方初過北京征山東初來歸其子剛阿達由間散恩詔加梯攻臨洛關第二登城克之授雲騎尉三遇西至三等輕車都尉卒其孫卓爾和襲職平定藏有功加一雲騎尉任參領卒其子瑪胡達襲職時削去恩詔所加之職承襲騎都尉緣事革退其族兄夸察襲職時削去詔後軍功所得之職現襲雲騎尉又巴哈納之孫忠古爾岱原任頭等護衛曾孫武華色原任防禦又巴哈納族孫錫楞泰由護軍校從征雲南於黃草壩等處敗賊有功授雲騎尉卒其子英努襲職又巴哈納族曽孫雅爾納原任步軍校族元孫劉保住福綬俱現任防禦夸爾達氏夸爾達為滿洲一姓此一姓世居哈達地方吳雲柱國正紅旗人世居哈達地方散過北京征山東梯初來歸其孫阿進泰由間恩詔授攻隆平縣第二登城克之授雲騎尉遇遇騎都尉卒無嗣其親兄阿哈尼堪襲職恩詔加一雲騎尉卒其子覺和托襲職從征察哈爾布爾尼於大鹵地方奮勇破賊有功授為三等輕恩詔所車都尉卒其子庫爾臣襲職時削去七格襲職加之職承襲騎都尉因病告退其子詔後軍時削去之職現襲雲騎尉又吳雲柱族元孫佛功所得隆鄂原任步軍校德都勒氏德都勒本係地名因以為姓此一姓世居德都勒地方科羅喀國正黃旗人世居德都勒地方參領從征厄魯特初來歸其元孫門岱由護軍贈雲騎噶爾丹擊賊陳亡之子根度襲職又科羅喀之尉因無嗣其親兄元孫鄂多鼐由間散從征福建攻建寧府首先登城克之敘攻授雲騎尉兩遇恩詔加至騎都尉兼一雲騎尉後征四川於朝天關等處屢敗賊偽總兵施存禮等兵授為三等輕車恩詔所都尉卒其子高山襲職緣事削去加及詔後軍功所得之職餘一雲騎尉亦令根度承襲併為騎都尉後因根度係養子革退未襲乾隆二年旨查奉旗湮沒未襲世職八恩賜雲騎尉令高山之子占保住承襲愷顔氏愷顔本係地名因以為姓此一姓世居愷顔地方竒拉爾圖國鑲黃旗人世居愷顔地方征貴州擊敗賊偽總初來歸由委署護軍校從兵田國欽等兵二千餘衆回兵時遇海冦鄭成功兵於江寧大敗之敘功授雲騎尉從征湖廣於茅麓山等處屢敗賊衆續征察哈爾布爾尼於大鹵地方奮勇破賊有功優授為騎都尉兼一雲騎尉卒其次子岱禪襲職緣事革退其子兆保襲職卒無嗣其親伯之子達揚阿襲職又竒拉爾圖之長子達巴理原任護軍校珠爾蘇氏珠爾蘇為滿洲一姓此一姓世居安禇拉庫地方南岱國正紅旗人世居安禇拉庫地方慶府奪門而入初來歸由間散從征湖廣攻寶恩詔加克其城授雲騎尉兩遇卒其孫章古理襲職任至騎都尉兼一雲騎尉恩詔所佐領卒其子札拉芬襲職時削去訥勒原任八加之職現襲雲騎尉又南岱之子品官孫璋藹原任筆帖式綽克秦氏綽克秦本係地名因以為姓此一姓世居綽克秦地方圖璧楞正藍旗人世居綽克秦地方來歸年分無考由護軍校從征浙江舟山擊敗賊偽英毅伯阮思等兵於海上續征湖廣屢敗茅麓山賊敘功授雲騎尉卒其長子圖理襲職從征湖廣攻石首縣兩手被傷告退其子瑚瞻現襲職又圖璧楞之次子吳爾德由委署護軍校從征雲南於石門坎黃草壩等處屢敗賊衆以功授雲騎尉卒無嗣其親兄之子瑚必善襲職卒將伊雲騎尉亦令瑚瞻承襲併為騎都尉安達拉氏安達拉為滿洲一姓此一姓世居黑龍江地方竒爾克德正藍旗人世居黑龍江地方天聰時來歸其子葉都赫由委署參領從征浙江在石塘等處擊敗賊偽參將鄭文鼎等兵賊偽總督趙得勝等率兵四萬餘在太平山扎立二十六營拒戰大破之又敗賊偽將劉國軒等兵於郭塘山後征雲南擊敗賊偽將何繼祖等兵於黃草壩賊偽將胡國秉等率兵萬餘出雲南城拒戰又擊敗之卒後敘功優贈騎都尉其子安住現襲職愛渾氏愛渾本係地名因以為姓此一姓世居愛渾地方布郎阿國鑲藍旗人世居愛渾地方敗賊奪船有功優授初來歸由領催從征浙江騎都尉卒其子布爾漢襲職海拉蘇氏海拉蘇本係地名因以為姓此一姓世居海拉蘇臺地方伊爾登正藍旗人世居海拉蘇臺地方來歸年分無考其子錫爾哈達由護軍校從征四川於龍潭驛等處擊敗賊兵數千餘衆後平定雲南屢敗賊偽將何繼祖等兵於石門坎黃草壩敘功優授騎都尉卒其子殷達理襲職因病告退其親兄之子西蘭泰現襲職又伊爾登之孫賽音達理原任驍騎校吳靈阿氏吳靈阿為滿洲一姓此一姓世居巴林地方綽克托鑲白旗人世居巴林地方來歸年分無考其孫輝保由護軍校從征浙江福建時賊偽總督趙得勝等率兵四萬在太平山扎立二十六營拒戰擊敗之又往援泉州奪洛陽橋解泉州之圍以功優授騎都尉卒其子明志襲職緣事革退其親叔之子索柱現襲職圖門氏圖門為滿洲一姓此一姓世居烏喇地方珠祿正白旗人世居烏喇地方來歸年分無考其孫章泰原任六品官赫深由驍騎校從征江西湖廣於建昌府等處擊敗賊首邵連登等兵數萬餘衆又於武岡州雙井鋪地方擊敗賊首吳國貴等兵敘功授雲騎尉卒其子雅圖襲職又珠祿之孫赫特由七品官從征江西於前津坡等處擊賊偽將李茂著等兵屢敗之敘功授雲騎尉卒其子羅密襲職又珠祿之曽孫明愷原任陵寢總理藩院侍郎愛星泰原任給事中瑚爾禪現任管拉巴現任護軍校元孫才柱原任主事阿林原任驍騎校勒第氏勒第為滿洲一姓此一姓世居黑龍江地方塞爾吉尼鑲黃旗人世居黑龍江地方天聰時來歸其孫都爾博臣原任步軍校曽孫桓濟布保進俱原任防禦布爾泰原任步軍校額宜圖由前鋒校從征湖廣於長沙府擊賊陳亡贈雲騎尉因無嗣其親兄之子松果托襲職任三等侍衛卒其子穆克德赫現襲職又塞爾吉尼之元孫索托現任步軍校五福現任護軍參領保平現任步軍校德明由二等侍衛從征凖噶爾在贈雲騎和通呼爾哈腦爾地方擊尉其子七十六現襲職又陳亡尼之四世孫爾吉廣福現任筆帖式克爾德氏克爾德為滿洲一姓此一姓世居烏喇地方阿爾納國鑲白旗人世居烏喇地方軍校從征雲南貴州初來歸其孫多克兑由護時於雙河口等處擊敗賊李定國兵數萬餘衆敘功授雲騎尉卒其子齊倫襲職又阿爾納之曾孫綬柱由驍騎校委署章京從征厄魯特噶爾丹及平定西藏俱有功授雲騎尉卒其孫德成現襲職又阿爾納之元孫齊琳現任防禦齊保現任驍騎校羅察現係副驍騎校由鑲黃旗改𨽻哲柏氏哲柏為滿洲一姓此一姓世居漢楚哈地方巴哈哈鑲紅旗人世居漢楚哈地方來歸年分無考其元孫額爾楚克原任佐領四世孫巴哈納亦原任佐領瑪琥原任江蘇巡撫薩哈塔由八品官從征陜西擊賊陳亡贈雲騎尉其子薩爾泰曽孫右衛相繼承襲又巴哈哈之五世孫托鼐原任中書六世孫馬世屯亦原任中書七世孫穆克德訥現任筆帖式圖普蘇氏圖普蘇為滿洲一姓此一姓世居葉赫地方溫塔錫鑲白旗人世居葉赫地方來歸年分無考原任散秩大臣其子謨爾洪原任藍翎侍衛孫來泰原任驍騎校鈕鈕現任佐領雙鼎現任副護軍參領赫達色現任防禦齊什由佐領從征西藏有功授雲騎尉任協領卒其子當色襲職現任防禦由正黃旗改𨽻托爾佳氏托爾佳為滿洲一姓此一姓世居齊齊哈爾地方郭秦布祿鑲黃旗人世居齊齊哈爾地方天聰時來歸由護軍校從征察哈爾布爾尼於大鹵地方奮勇破賊有功授雲騎尉卒其子伊蘭泰襲職格格氏格格為滿洲一姓此一姓世居黑龍江地方齊克勒正紅旗人世居黑龍江地方來歸年分無考其子翁山由護軍校從征陜西於平涼地方擊敗逆賊王輔臣兵敘功授雲騎尉任城門尉卒其子赫色布襲職任御史韓札氏韓札為滿洲一姓此一姓世居巴顔和羅地方哈齊納鑲藍旗包衣人世居巴顔和羅地方來歸年分無考其子韓佑原任典儀孫台弼圖由花馬池贈雲騎副將率兵征𠞰逆賊王輔臣陳亡承襲尉因無嗣其親弟巴什碩色相繼穆察氏穆察為滿洲一姓此一姓世居那木都魯地方寧古塔國正白旗人世居那木都魯地方軍校從征陜西初來歸其長子阿鼐由委署護於平涼地方擊敗逆賊王輔臣兵以功授雲騎尉卒其子納蘭泰襲職又寧古塔之次子海塔原任六品官多羅氏多羅為滿洲一姓此一姓世居葉赫地方托和倫國正紅旗人世居葉赫地方軍校從征雲南於黃初來歸其子烏那哈由護草壩