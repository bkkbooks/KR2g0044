body:
  text: 八旗滿洲氏族通譜目録卷二十二葉赫地方納喇氏金台石布揚古蘇納額駙舅舅阿什達爾漢柏爾赫圗瑚錫布克錫訥固三泰阿山瑚鈕額森哈爾松阿瑚沙喇剛阿達韶瞻哈爾薩蘇霸海阿拜愛敏台濟巴顔喀山古魯格楚瑚爾鄂謨克圗巴圗魯吳達哈博屯安達理阿布泰星格理額塞蘇巴海薩海賴都圗爾坤巴禧福哈禪蘇赫尼喀達武泰巴班肯濟克瑚席布托普齊楞僧吉拜竇以上俱有𫝊薩穆哈圗堪錫阿哈碩色台楚蓀布禄吳達哈昻阿喇薩克達理佛羅穆爾善岱察尼雅漢堪楚瑚巴滿岱舒蕃巴當阿巴雅理布彦圗徳肯凖布鄂博諾喀爾喀瑪阿蘇理庫魁雅爾布福松額噶什賢謨絡嘉渾格布庫格尼拜錫多絡福爾丹額爾濟布拉克圗星額理拉穆泰亨泰塔綬格巴庫雅郎阿克爾蘇堪泰蘇崇阿岱敏新達爾漢尼堪碩色額能額穆漢納穆占温布禄占占布禄和托阿那布商吉努濟穆圖哈達鼐蘇巴納林巴爾喀喀喇薩哈達和濟海渾岱葛肯尼雅哈葉赫齊額爾訥顔珠瑚瑚爾禪敦岱阿鼐納蘭泰佛爾赫夏瑚達成泰翁果圗納綬三達色阿納布納郎阿阿納達穆達禪陶泰費揚古章嘉邁圗渾格勒布約和理索凌阿阿本岱本布理納進恒格巴岱永藹徹爾博赫班積喇伸豸愛錫喀温泰圗巴海勒錫泰羅多理滿竇額赫岱精阿以上俱附載
