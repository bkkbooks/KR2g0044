body:
  text: 八旗滿洲氏族通譜卷六十四正紅旗無名位希姓雅爾薩喇氏雅爾薩喇為滿洲一姓此一姓世居黑龍江雅爾庫理村地方瑚哲墨正紅旗人清國初來歸其五世孫富阿現係前鋒鮑佳氏鮑佳為滿洲一姓此一姓世居安褚拉庫地方托謨爾泰正紅旗人柱國初來歸其曾孫費雅現係護軍喀爾佳氏喀爾佳為滿洲一姓此一姓世居索倫地方朱塔穆正紅旗人布國初來歸其元孫根現係護軍方佳氏方佳為滿洲一姓此一姓世居瀋陽地方方琯正紅旗人軍國初來歸其元孫存柱現係護由本旗包衣改隸富珠理氏富珠理本係地名因以為姓此一姓世居富珠理地方魯成額正紅旗人六國初來歸其曾孫七十現係護軍瑚圖理氏瑚圖理為滿洲一姓此一姓世居黑龍江地方愷穆庫正紅旗人哈國初來歸其曾孫吳達現係護軍濟拉喇氏濟拉喇為滿洲一姓此一姓世居長白山地方留柏正紅旗人保國初來歸其孫寧夏現係馬甲布希氏布希為滿洲一姓此一姓世居葉赫地方富森布正紅旗人喇國初來歸其曾孫圖現係閒散留濟理氏留濟理為滿洲一姓此一姓世居黑龍江地方福永正紅旗人天聰時來歸其曾孫四成現係前鋒錫爾馨氏錫爾馨為滿洲一姓此一姓世居和托阿拉地方三台正紅旗人來歸年分無考其曾孫福保現係護軍希普蘇氏希普蘇為滿洲一姓此一姓世居黑龍江地方蘇爾通正紅旗人來歸年分無考其孫瑪色現係護軍全佳氏全佳為滿洲一姓此一姓世居蓋州地方全仕登正紅旗人來歸年分無考其曾孫全福現係護軍由本旗包衣改隸莽佳氏莽佳為滿洲一姓此一姓世居蓋州地方滿泰正紅旗人來歸年分無考其曾孫巴顏圖現係護軍豐佳氏豐佳為滿洲一姓此一姓世居長白山瑪克丹地方豐國正正紅旗人來歸年分無考其四世孫蘇柱現係護軍由本旗包衣改隸瑚圖氏瑚圖為滿洲一姓此一姓世居葉赫地方瑚圖正紅旗人來歸年分無考其孫誠格現係馬甲崔佳氏崔佳為滿洲一姓此一姓世居哈達地方崔武色正紅旗人來歸年分無考其曾孫賽音泰現係馬甲由本旗包衣改隸伊蘇氏伊蘇為滿洲一姓此一姓世居蘇瓦顔溝地方石圖正紅旗包衣人來歸年分無考其孫達爾桓現係馬甲尼音圖氏尼音圖為滿洲一姓此一姓世居哈達地方色普格理正紅旗人康熙時自科爾沁撤回其孫六十七現係領催鈕圖氏鈕圖為滿洲一姓此一姓世居哈達地方䝉色正紅旗人康熙時自科爾沁撤回其孫塞楞額現係馬甲鑲白旗無名位希姓韓楚氏韓楚為滿洲一姓此一姓世居長白山地方卓爾泰鑲白旗人德國初來歸其曾孫石現係護軍農吉勒氏農吉勒為滿洲一姓此一姓世居哈達地方訥齊布鑲白旗人泰國初來歸其元孫雅楞現係護軍阿爾巴齊氏阿爾巴齊為滿洲一姓此一姓世居札滿和羅地方伊漢鑲白旗人護國初來歸其元孫靈泰現係軍由正白旗改隸成尼氏成尼為滿洲一姓此一姓世居遼陽地方刷禮鑲白旗人護國初來歸其元孫雙保現係軍由正黃旗改隸穆達齊氏穆達齊為滿洲一姓此一姓世居瓦爾納哈地方古爾哈那鑲白旗人班國初來歸其曾孫官現係領催楊那氏楊那為滿洲一姓此一姓世居楊察地方楊海鑲白旗人成國初來歸其曾孫常現係領催塞赫理氏塞赫理為滿洲一姓此一姓世居諾羅村地方福拉塔鑲白旗人興國初來歸其曾孫赫現係馬甲俞庫勒氏俞庫勒為滿洲一姓此一姓世居洪艾地方尼秋鑲白旗人馬國初來歸其元孫圖爾泰現係甲由正白旗改隸那克塔氏那克塔為滿洲一姓此一姓世居郭絡羅地方佟國鼐鑲白旗包衣人現國初來歸其曾孫九邇係馬甲吳魯理氏吳魯理為滿洲一姓此一姓世居沾地方武誠鑲白旗包衣人現國初來歸其曾孫烏晉泰係馬甲穆佳氏穆佳為滿洲一姓此一姓世居鄂漠和索羅地方瑚什巴鑲白旗包衣人現國初來歸其曾孫綬保係馬甲布薩氏布薩為滿洲一姓此一姓世居瓦爾喀地方布爾海鑲白旗人天聰時來歸其元孫額爾登峩現係護軍由正黃旗改隸猷格氏猷格為滿洲一姓此一姓世居寧古塔地方旒琥鑲白旗人天聰時來歸其元孫九格現係領催愛義氏愛義為滿洲一姓此一姓世居愛湖地方鄂爾多鑲白旗人來歸年分無考其曾孫達色現係護軍徹葉勒氏徹葉勒為滿洲一姓此一姓世居寧古塔地方成住鑲白旗人來歸年分無考其曾孫約松鄂現係護軍烏錫氏烏錫為滿洲一姓此一姓世居赫徹木地方拜布理鑲白旗包衣人來歸年分無考其曾孫四格現係馬甲額諸氏額諸為滿洲一姓此一姓世居舒舒地方薩穆哈鑲白旗包衣人來歸年分無考其孫穆魯現係馬甲由鑲藍旗改隸瑚爾佳氏瑚爾佳為滿洲一姓此一姓世居吉林烏喇地方瑚什圖鑲白旗人康熙時自科爾沁撤回其孫艾錫現係護軍瑚爾哈喇氏瑚爾哈喇為滿洲一姓此一姓世居白都訥地方拖泰鑲白旗人康熙時自科爾沁撤回其孫拉克錫現係馬甲鑲紅旗無名位希姓吳庫理氏吳庫理為滿洲一姓此一姓世居黑龍江地方庚吉訥鑲紅旗人騰國初來歸其四世孫穆峩現係前鋒黑赫穆氏黑赫穆為滿洲一姓此一姓世居黑龍江地方索和理鑲紅旗人鼐國初來歸其曾孫阿都現係護軍訥勒氏訥勒為滿洲一姓此一姓世居黑龍江地方明阿圖鑲紅旗人色國初來歸其曾孫五達現係領催敷臣氏敷臣為滿洲一姓此一姓世居黑龍江地方圖克禪鑲紅旗人泰國初來歸其曾孫富蘭現係領催秋舒理氏秋舒理為滿洲一姓此一姓世居扎庫木地方海色鑲紅旗人天聰時來歸其曾孫福隆阿現係護軍姚佳氏姚佳為滿洲一姓此一姓世居葉赫地方胡理鑲紅旗人天聰時來歸其曾孫六十三現係馬甲吳爾錫氏吳爾錫為滿洲一姓此一姓世居長白山地方吳錫蘭鑲紅旗人來歸年分無考其元孫成柱現係護軍由本旗包衣改隸吳努齊氏吳努齊為滿洲一姓此一姓世居蜚悠城地方訥蘇鑲紅旗人來歸年分無考其曾孫積明現係護軍溫登額氏溫登額為滿洲一姓此一姓世居黑龍江地方巴喇寧鑲紅旗人來歸年分無考其四世孫達桑阿現係護軍烏努氏烏努為滿洲一姓此一姓世居都白城村地方喀爾達鑲紅旗人來歸年分無考其曾孫常愷現係護軍烏什拉氏烏什拉為滿洲一姓此一姓世居扎庫木地方烏什蘭鑲紅旗人來歸年分無考其曾孫額升峩現係領催顏珠氏顏珠為滿洲一姓此一姓世居雅達渾村地方穆楚鑲紅旗人來歸年分無考其曾孫全保現係領催弼爾雅氏弼爾雅為滿洲一姓此一姓世居愛渾地方塔爾渾鑲紅旗人來歸年分無考其孫占保住現係馬甲朱爾奇氏朱爾奇為滿洲一姓此一姓世居薩爾哈占地方塔思哈鑲紅旗人來歸年分無考其元孫巴揚阿現係馬甲邊佳氏邊佳為滿洲一姓此一姓世居輝發地方德祿鑲紅旗包衣人來歸年分無考其元孫法秉現係馬甲恭佳氏恭佳為滿洲一姓此一姓世居哈達地方洪善鑲紅旗包衣人來歸年分無考其孫武什塔現係馬甲西爾圖氏西爾圖為滿洲一姓此一姓世居白都訥地方瑚什屯鑲紅旗人康熙時自科爾沁撤回其孫哈唐阿現係護軍墨呼理氏墨呼理為滿洲一姓此一姓世居吉林烏喇地方阿蘭泰鑲紅旗人康熙時自科爾沁撤回其曾孫佛保現係護軍哈蘇理氏哈蘇理為滿洲一姓此一姓世居吉林烏喇地方謨克圖鑲紅旗人康熙時自科爾沁撤回其曾孫阿哈現係護軍哈薩喇氏哈薩喇為滿洲一姓此一姓世居白都訥地方彩鍾鑲紅旗人康熙時自科爾沁撤回其元孫八十九現係馬甲墨爾赫氏墨爾赫為滿洲一姓此一姓世居哈達察漢地方莽喀喇鑲紅旗人康熙時自科爾沁撤回其孫伊柏勒現係馬甲哈思呼理氏哈思呼理為滿洲一姓此一姓世居白都訥地方梅赫鑲紅旗人康熙時自科爾沁撤回其曾孫朱蘭泰現係馬甲八旗滿洲氏族通譜卷六十四欽定四庫全書八旗滿洲氏族通譜卷六十四正紅旗無名位希姓雅爾薩喇氏雅爾薩喇為滿洲一姓此一姓世居黑龍江雅爾庫理村地方瑚哲墨正紅旗人清國初來歸其五世孫富阿現係前鋒鮑佳氏鮑佳為滿洲一姓此一姓世居安褚拉庫地方托謨爾泰正紅旗人柱國初來歸其曾孫費雅現係護軍喀爾佳氏喀爾佳為滿洲一姓此一姓世居索倫地方朱塔穆正紅旗人布國初來歸其元孫根現係護軍方佳氏方佳為滿洲一姓此一姓世居瀋陽地方方琯正紅旗人軍國初來歸其元孫存柱現係護由本旗包衣改隸富珠理氏富珠理本係地名因以為姓此一姓世居富珠理地方魯成額正紅旗人六國初來歸其曾孫七十現係護軍瑚圖理氏瑚圖理為滿洲一姓此一姓世居黑龍江地方愷穆庫正紅旗人哈國初來歸其曾孫吳達現係護軍濟拉喇氏濟拉喇為滿洲一姓此一姓世居長白山地方留柏正紅旗人保國初來歸其孫寧夏現係馬甲布希氏布希為滿洲一姓此一姓世居葉赫地方富森布正紅旗人喇國初來歸其曾孫圖現係閒散留濟理氏留濟理為滿洲一姓此一姓世居黑龍江地方福永正紅旗人天聰時來歸其曾孫四成現係前鋒錫爾馨氏錫爾馨為滿洲一姓此一姓世居和托阿拉地方三台正紅旗人來歸年分無考其曾孫福保現係護軍希普蘇氏希普蘇為滿洲一姓此一姓世居黑龍江地方蘇爾通正紅旗人來歸年分無考其孫瑪色現係護軍全佳氏全佳為滿洲一姓此一姓世居蓋州地方全仕登正紅旗人來歸年分無考其曾孫全福現係護軍由本旗包衣改隸莽佳氏莽佳為滿洲一姓此一姓世居蓋州地方滿泰正紅旗人來歸年分無考其曾孫巴顏圖現係護軍豐佳氏豐佳為滿洲一姓此一姓世居長白山瑪克丹地方豐國正正紅旗人來歸年分無考其四世孫蘇柱現係護軍由本旗包衣改隸瑚圖氏瑚圖為滿洲一姓此一姓世居葉赫地方瑚圖正紅旗人來歸年分無考其孫誠格現係馬甲崔佳氏崔佳為滿洲一姓此一姓世居哈達地方崔武色正紅旗人來歸年分無考其曾孫賽音泰現係馬甲由本旗包衣改隸伊蘇氏伊蘇為滿洲一姓此一姓世居蘇瓦顔溝地方石圖正紅旗包衣人來歸年分無考其孫達爾桓現係馬甲尼音圖氏尼音圖為滿洲一姓此一姓世居哈達地方色普格理正紅旗人康熙時自科爾沁撤回其孫六十七現係領催鈕圖氏鈕圖為滿洲一姓此一姓世居哈達地方䝉色正紅旗人康熙時自科爾沁撤回其孫塞楞額現係馬甲鑲白旗無名位希姓韓楚氏韓楚為滿洲一姓此一姓世居長白山地方卓爾泰鑲白旗人德國初來歸其曾孫石現係護軍農吉勒氏農吉勒為滿洲一姓此一姓世居哈達地方訥齊布鑲白旗人泰國初來歸其元孫雅楞現係護軍阿爾巴齊氏阿爾巴齊為滿洲一姓此一姓世居札滿和羅地方伊漢鑲白旗人護國初來歸其元孫靈泰現係軍由正白旗改隸成尼氏成尼為滿洲一姓此一姓世居遼陽地方刷禮鑲白旗人護國初來歸其元孫雙保現係軍由正黃旗改隸穆達齊氏穆達齊為滿洲一姓此一姓世居瓦爾納哈地方古爾哈那鑲白旗人班國初來歸其曾孫官現係領催楊那氏楊那為滿洲一姓此一姓世居楊察地方楊海鑲白旗人成國初來歸其曾孫常現係領催塞赫理氏塞赫理為滿洲一姓此一姓世居諾羅村地方福拉塔鑲白旗人興國初來歸其曾孫赫現係馬甲俞庫勒氏俞庫勒為滿洲一姓此一姓世居洪艾地方尼秋鑲白旗人馬國初來歸其元孫圖爾泰現係甲由正白旗改隸那克塔氏那克塔為滿洲一姓此一姓世居郭絡羅地方佟國鼐鑲白旗包衣人現國初來歸其曾孫九邇係馬甲吳魯理氏吳魯理為滿洲一姓此一姓