body:
  text: 八旗滿洲氏族通譜目録卷四十費雅郎阿地方章佳氏瑚魯瑚昌吉鼐莽色松琴圖爾坤黃占雷虎達爾丹以上俱有傳章佛青右係附載馬兒墩章佳地方章佳氏遜扎齊薩穆占以上俱有傳渾達理阿納庫噶哈布山費揚古鄂海以上俱附載各地方章佳氏賴塔瓜喇蘇扎巴圖巴克塔庫布理岱布祿以上俱有傳巴栁庫塔本瑚齊尚禮鄂武納巴布哈額赫楚謨克章格理格布渾博和理海藍鄂絡穆杜梁喀蘭巴海尼莽阿阿哈尼堪章國泰孔鄂絡白赫訥浩善扎庫達扎克丹蘇巴海章雲龍關住以上俱附載
