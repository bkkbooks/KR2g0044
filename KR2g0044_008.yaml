body:
  text: 八旗滿洲氏族通譜卷三哈達地方瓜爾佳氏巴岱國鑲黃旗人世居哈達地方布祿統之孫布達理初來歸設佐領令其子顔原任佐領噶布拉原任護軍校巴山初襲佐領以所任稱職授騎都尉取大凌河首先進擊初過北京征山東擊敗太監馮永盛兵又以梯攻巨鹿縣克其城加一雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵叙功授為三等輕車都尉三遇恩詔加至三等男後駐防江寧賊兵來犯陳斬僞王一僞總兵五殺賊兵千餘授為二等男卒其子舒恕襲職從征陕西擊敗逆賊王輔臣兵續征雲南賊僞將胡國秉等率兵萬餘出城拒戰奮擊大敗之授為一等男因年老告休其子常清襲職時削去恩詔所加之職承襲一等輕車都尉任佐領卒其子滿丕襲職現任藍翎侍衛又巴岱之曽孫翁果托盛原任頭等侍衛元孫穆成額原任濟保原任副京刑部侍郎常明原任副參領佛都統兼佐領國柱原任恭領兼佐領四世孫常在原任步軍校常雲現任三等侍衛兼佐領圖克坦現任二等侍衛布克沙鑲黃旗人巴岱之曽孫也由護軍恭領從征皮島首先登進初圍錦州城內兵出戰擊敗之又敗杏山松山來援兵奪其纛叙功授雲騎尉三圍錦州破洪承疇三營馬步兵過北京征山東取蒙陰沂水二縣授為騎都尉後追滕吉思擊敗土謝圖汗及碩羅汗等兵加一雲騎尉三遇恩詔加至一等輕車都尉歷任户部侍郎副都統兼佐領卒其子韓楚漢襲職任頭等侍衛卒其子哈恩詔所祿襲職時削去都尉兼一雲騎尉現任三等侍加之職承襲騎衛又布克沙之子賽錫布原任郎中貴福由二等侍衛兼佐領從征雲南攻沅江府克其城後征江西在建昌府鐘鼓山擊賊僞將李茂著兵力戰被傷身亡贈雲騎尉其子當色襲職卒其子積福襲職現任佐領又布克沙之孫愛錫原任郎中色赫原任三等侍衛兼佐領色爾圖原任護軍參領曽孫濟通原任三等侍衛兼佐領胡什哈國正紅旗人巴岱同族世居哈達地方哈滿都布初來歸其子金達錫原任典儀孫標謨什俱原任護軍校曽孫西爾門現任副護軍恭領元孫雅思哈現任驍騎校索爾科由驍騎校從征厄魯特噶爾丹奮勇破賊有功授雲騎尉任步軍副尉卒其子索敏現襲職瑪雅實希國正白旗人世居哈達地方布原任佐領常綬原初來歸任驍騎校其子占任護軍恭領族姪吳岱謨逹色俱原任護軍校吳爾祜由委署驍騎校從征福建在蓋峙山擊贈雲騎海寇鄭成功兵陳亡色襲職從征陜西擊敗逆尉因無嗣其親弟華賊王輔臣兵續征雲南賊僞將胡國秉等率兵萬餘出城拒戰奮擊大敗之叙功授為騎都尉卒無嗣其親兄之子長在襲職任護軍恭領卒其子赫英襲職現任護軍恭領又瑪雅實希族孫胡什布原任三等侍衛羅竒現任防禦石柱現任步軍校哈達現任前鋒校族曽孫林現任署丞碩瑪鑲紅旗人世居哈達地方來歸年分無考任護軍校其子布舒庫原任步軍校薩哈達由委署護軍恭領從征湖廣及察哈爾布爾尼俱有功授騎都尉任城守尉卒其子薩蘭泰五十八相繼承襲又碩瑪之孫邁齊原任筆帖式碩色國正藍旗人世居哈達地方護軍校從征福建擊初來歸其孫鄂莫克圖由贈騎都海寇鄭成功兵陳亡布襲職尉因無嗣其親弟新福爾納鑲黃旗人世居哈達地方天聰時來歸其子瓦爾達由前鋒校從征福建在建陽縣擊賊陳亡贈雲騎尉其子巴什襲職卒其子福神保現襲職又福爾納之孫賽珠瑚原任佐領曽孫綏哈納原任協領烏逹納原任防禦五十八原任佐領烏達哈現任佐領元孫赫楞現任護軍校赫成由護軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子烏爾瑚現襲職尼雅濟布國正紅旗人世居哈達地方驍騎校孫阿鈕由驍初來歸其子阿拉密原任騎校從征陕西於平凉府招撫叛逆王輔臣有功授雲騎尉任佐領卒其子薩蘭泰襲職又尼雅濟布之元孫阿秉阿現任員外郎吳達善現任主事林昌現任中書四世孫滿泰現任驍騎校邁佟阿國鑲白旗人世居哈達地方前鋒恭領曽孫巴什初來歸其孫都楞額原任泰原任司庫瑪隆阿原任六品典儀瑪爾吉原任筆帖式元孫來泰原任三等侍衛烏納海由前鋒校從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子烏靈阿現襲職由鑲黃旗改𨽻和隆格鑲黃旗人世居哈達地方天聰時來歸任護軍校其子尚舒原任步軍校德普特原任筆帖式孫伊蘭泰原任三等侍衛楊淑由護軍校從征厄魯特噶爾丹在昭莫多地方擊賊陳亡贈雲騎尉其子興常襲職現任二等侍衛胡錫屯正藍旗人世居哈逹地方來歸年分無考其子阿三泰由委署驍騎校從征廣東於韶州府擊敗賊僞將馬寶等兵萬餘衆續征雲南擊敗賊僞將何繼祖等兵於黃草壩叙功授雲騎尉卒其子哈福納現襲職額庫訥鑲藍旗人世居哈達地方來歸年分無考其孫勒德原任內閣學士兼禮部侍郎曽孫禪晉保原任筆帖式元孫福祿原任護軍校明玳現任護軍校福德現任千總以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗薩喇布其子薩哈那原任驍騎校孫牛鈕現係看守倉庫官正紅旗布哈其子布賴原任步軍校孫五格穆臣俱原任護軍校曽孫蘇伯圗現任護軍校元孫三格原任佐領鄂什泰其孫西特庫原任驍騎校曽孫鄂托原任護軍校元孫巴顔圗現任護軍校按鄂什泰與夲旗葉赫地方班濟那同族金達賴其子姜都原任驍騎校安布祿原任七品官鑲白旗安丕樓其元孫瑪岱現任護軍校都喀禪現任前鋒參領由鑲黃旗改𨽻正藍旗凱音布其孫色赫理原任員外郎曽孫明安原任典儀白起圗原任御史侃布祿其孫佛倫原任典儀和倫原任協領噶瑚原任四品官曽孫赫色原任護軍校佛綬原任驍騎校雅圗原任中書賽哈原任步軍校色赫徹現任副護軍