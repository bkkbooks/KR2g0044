body:
  text: 八旗滿洲氏族通譜目録卷九都英額地方赫舍里氏碩色巴克什希福巴克什額爾德尼巴克什以上俱有傳和多穆哈連地方赫舍里氏拜音達理扎爾固齊布爾薩海東金吳巴海錫來布達理額盛額巴賚額普通阿以上俱有傳莽金錫特庫滿泰色盛額達爾禪圖塔哈魏赫訥丹楚渾碧雅以上俱附載齋谷地方赫舍里氏宜巴理宜拜庫爾禪瑚世穆穆爾岱以上俱有傳英古禮蓀烏禮喀赫理布烏巴泰萬濟喀以上俱附載哈達地方赫舍里氏車爾布赫尼音塔哈拜音岱薩珠瑚岱音察阿顔塔喀爾沁舒瑚魯郭和托克錫邁圖額爾赫二搆王吉納屯泰塞克精額以上俱有傳覺和托他他布蘇格尼堪碩色薩穆哈殷他錫巴克坦布綽起法克禪穆雅那輝達吳巴圖安楚阿雅那莽吉祿嶽色達藍屯齊理王吉那圖思圖滿達爾漢艾圖以上俱附載
  hash: sha256:893628705e1eefb203ab98f29ec38eaed1beb2164f90a929b6ecc61b9a0fb508
