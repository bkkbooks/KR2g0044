body:
  text: 八旗滿洲氏族通譜目録卷二十五沙濟地方富察氏旺吉努萬塔錫延珠瑚本科理唐哈思瑚莽色喀爾喀瑪以上俱有傳雅穆喀拉都哈阿爾泰岱清阿阿納海巴爾竒尼堪達拉哈武什泰以上俱附載葉赫地方富察氏楚隆阿布丹阿布岱瑚錫泰琉達理桂森穆哈連葛巴庫多賴以上俱有傳巴爾賽拉克道鄂善薩爾普元保布克察碩本吉農阿理薩穆哈都錫布額赫納葛布庫齊克什喀阿克敦吳班博德訥烏班泰吳齊堪達希布赫勒諾音推恩特恆布穆布理恩格布竒拜額赫圖以上俱附載額宜湖地方富察氏阿爾都山額楚以上俱有傳喀克圖松塞克珠雅諾吉瑪哈以上俱附載扎庫塔地方富察氏德楞格瓦古理根圖恆以上俱有傳納庫哈普周禪都喀雅爾古布占墨爾格德圖爾吉訥布克圖以上俱附載蜚悠城地方富察氏艾通阿烏珠阿穆巴富喀塔禮費雅克塔策穆特赫積克黨阿以上俱有傳雅穆達阿密禪舒可式瑪福塔古揚素富喀達轄瑚烏朗阿明阿努和爾弼殷登沙達哈僧郭安楚瑚魯邁圖禮薩納塞赫訥邁凃以上俱附載
