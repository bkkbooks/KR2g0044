body:
  text: 八旗滿洲氏族通譜卷六十五正藍旗無名位希姓伊博氏伊博為滿洲一姓此一姓世居寧古塔地方噶鈕正藍旗人阿國初來歸其曾孫伊常現係前鋒瑚德勒氏瑚德勒為滿洲一姓此一姓世居烏喇地方瑚什巴正藍旗人泰國初來歸其曾孫巴爾現係護軍烏勒理氏烏勒理為滿洲一姓此一姓世居葉赫地方勞帖正藍旗人來歸年分無考其孫白格現係護軍程佳氏程佳為滿洲一姓此一姓世居蘇完地方索倫正藍旗人來歸年分無考其曾孫達禮善現係護軍寧佳氏寧佳為滿洲一姓此一姓世居寧古塔地方瑚圖正藍旗人來歸年分無考其孫瑚沙理現係護軍布爾尼氏布爾尼為滿洲一姓此一姓世居尼馬察地方那穆札正藍旗人來歸年分無考其曾孫阿三泰現係護軍瑚魯氏瑚魯為滿洲一姓此一姓世居烏喇地方雅納正藍旗人來歸年分無考其孫滿泰現係弓匠文札氏文札為滿洲一姓此一姓世居長白山地方倭楞額正藍旗人來歸年分無考其孫費雅山現係養育兵索多理氏索多理為滿洲一姓此一姓原籍無考蒙古正藍旗人來歸年分無考其曾孫福保現係領催薩穆希爾氏薩穆希爾為滿洲一姓此一姓世居索倫地方札林正藍旗包衣人來歸年分無考其四世孫三赫現係護軍通果蘇氏通果蘇為滿洲一姓此一姓世居老寨子地方揚古理正藍旗包衣人來歸年分無考其曾孫白奇圖現係馬甲卓顯氏卓顯為滿洲一姓此一姓世居雅爾渾費顔地方對秦正藍旗包衣人來歸年分無考其元孫石麟現係馬甲那木圖氏那木圖為滿洲一姓此一姓世居渾都和色地方多爾濟正藍旗包衣人來歸年分無考其曾孫蓀達理現係馬甲哈思琥氏哈思琥為滿洲一姓此一姓世居吉林烏喇地方達登正藍旗人康熙時自科爾沁撤回其曾孫多隆鄂現係護軍富思庫氏富思庫為滿洲一姓此一姓世居墨絡古地方博索泰正藍旗人康熙時自科爾沁撤回其孫雅魯現係護軍赫爾蘇氏赫爾蘇為滿洲一姓此一姓世居吉林烏喇地方赫爾禧正藍旗人康熙時自科爾沁撤回其元孫六十七現係護軍烏宇氏烏宇為滿洲一姓此一姓世居吉林烏喇地方哈瑪喇正藍旗人康熙時自科爾沁撤回其孫阿哈齊現係馬甲關佳氏關佳為滿洲一姓此一姓原籍無考伊森泰正藍旗人康熙時自科爾沁撤回其孫巴顏現係馬甲鑲藍旗無名位希姓扣岱氏扣岱為滿洲一姓此一姓世居哈達地方圖章阿鑲藍旗人阿國初來歸其曾孫達揚現係護軍修墨理氏修墨理為滿洲一姓此一姓世居虎爾哈地方嶽爾科舜鑲藍旗人蘇國初來歸其五世孫阿爾哈現係護軍額穆特立氏額穆特立為滿洲一姓此一姓世居黑龍江地方葛爾都赫鑲藍旗人阿國初來歸其元孫伊常現係護軍松吉氏松吉為滿洲一姓此一姓世居汪秦地方松安鑲藍旗人格國初來歸其曾孫黑現係親軍葉墨勒氏葉墨勒為滿洲一姓此一姓世居葉赫地方喀喇鑲藍旗人催國初來歸其曾孫明保現係領由本旗包衣改隸拜察氏拜察為滿洲一姓此一姓世居吉林烏喇地方拜哈理鑲藍旗人圖國初來歸其元孫台畢現係馬甲嶽察氏嶽察為滿洲一姓此一姓世居胡什塔地方永泰鑲藍旗人格國初來歸其曾孫白現係馬甲尼珠氏尼珠為滿洲一姓此一姓世居哈達地方阿爾泰鑲藍旗包衣人天聰時來歸其曾孫阿濟格二達色現係馬甲耿音氏耿音為滿洲一姓此一姓世居黑龍江地方禮布鑲藍旗人來歸年分無考其曾孫伊晉泰現係護軍遲佳氏遲佳為滿洲一姓此一姓世居哈達地方遲成鑲藍旗人來歸年分無考其曾孫薩靈阿現係護軍由本旗包衣改𨽻石佳氏石佳為滿洲一姓此一姓世居葉赫烏蘇河地方巴爾圖鑲藍旗人來歸年分無考其曾孫桑格現係領催都勒氏都勒為滿洲一姓此一姓世居額爾赫村地方穆奇常鑲藍旗人來歸年分無考其曾孫金柱現係領催南福祿氏南福祿為滿洲一姓此一姓世居虎爾哈地方伊爾善鑲藍旗人來歸年分無考其孫福住現係馬甲郎佳氏郎佳為滿洲一姓此一姓世居遼陽地方幹齊哈鑲藍旗人來歸年分無考其孫達蘭泰現係馬甲仁佳氏仁佳為滿洲一姓此一姓世居司堡地方仁達鑲藍旗人來歸年分無考其元孫成寶現係馬甲休佳氏休佳為滿洲一姓此一姓世居烏拉瑪地方伊載鑲藍旗人來歸年分無考其曾孫保爾現係養育兵赫哲氏赫哲為滿洲一姓此一姓原籍無考珠葉資鑲藍旗人來歸年分無考其孫保載現係弓匠唐佳氏唐佳為滿洲一姓此一姓原籍無考倭赫鑲藍旗人來歸年分無考其曾孫石柱現係護軍文德氏文德為滿洲一姓此一姓世居塔克什城地方拖克泰鑲藍旗人康熙時自科爾沁撤回其元孫常明現係護軍哈爾塔喇氏哈爾塔喇為滿洲一姓此一姓世居吉林烏喇地方瑪齊克鑲藍旗人康熙時自科爾沁撤回其孫愛拉現係領催八旗滿洲氏族通譜卷六十五欽定四庫全書
