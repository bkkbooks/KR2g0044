body:
  text: 八旗滿洲氏族通譜目録下卷六十六博爾濟吉特氏卷六十七薩爾圖氏䝉古爾濟氏鼐奇特氏郭爾羅特氏和爾氏實寳禪氏塔他爾氏舒魯氏岳諾特氏赫魯克氏彰扎爾氏郭爾羅斯氏翁阿理氏公吉喇特氏卷六十八烏新氏把岳忒氏科本氏佟尼果特氏阿穆尼普塔斯氏布魯特氏烏濟吉特氏劉佳氏翁科特氏烏齊喜特氏兀魯特氏庫布特氏龔吉爾氏布爾哈齊氏伊圖黙氏鄂卓氏威古特氏吹霍克親氏鄂爾圖特氏完顔氏海佳氏扣懇氏烏亮海氏扎拉爾氏卷六十九寳濟氏滿津氏博爾濟斯氏巴雅喇氏博碩氏塞克圖氏卓特氏納賴氏博爾濟氏葉何氏耨勒特氏烏蘭氏李佳氏瑪佳氏鄂爾濟斯氏張佳氏博爾濟克氏肇佳氏博絡氏齊穆克氏黄古臺氏阿拉克塔氏布楞都爾本氏沙喇圖魯騰氏柰曼氏白佳氏納喇氏唐古爾氏奇壘氏巴雅克氏烏理津氏阿魯特氏察哈爾氏克爾徳氏錫訥楚克氏達喇眀安氏鄂宻特氏洽特氏錫訥特氏吳喇忒氏雅蘇氏墨爾吉濟特氏吉禮圖氏卷七十謨爾唘特氏泰錫納喇氏瑪爾吉特氏翁濟爾金氏納雅氏瑚岳絡氏錫臨氏達絡克氏烏理特氏札哈蘇親氏克勒徳氏錫爾哈氏齊普齊努特氏兆巴爾氏薩爾珠特氏珠佳氏王札普氏瑚佳氏馬朗阿氏札哈拉氏克理特氏章圖理氏克穆齊特氏烏爾漢氏鐘吉氏通塞理氏卓爾和親氏札穆爾氏博爾器濟斯氏塔爾瑚努特氏博第斯氏博爾蘇特氏喀爾努克氏赫錫特氏禹爾氏札魯特氏索諾圖氏伍堯氏赦爾諾絡雅蘇氏烏齊熙理氏巴理氏烏納特氏韓佳氏沙岳特氏白蘇氏牛佳氏艾耀施氏黄佳氏冬果爾氏瑪喇拉氏蘇穆察氏王吉氏哈爾圖特氏赫爾氏章穆氏哈納克氏布蘇克氏齊普齊特氏達魯特氏哈蘇特氏哈理特氏卓啓斯氏蒙古氏烏喇特哈克氏巴顔圖氏阿魯絡特氏額哲特氏啓普樵氏杭津氏唐古特氏伊爾佳氏札穆雅氏常佳氏魯布理氏佳吉理氏瑚爾漢氏巴濟理氏馬吉特氏卓爾特氏陶佳氏科爾親氏曹佳氏來黙氏卷七十一蘇尼特氏札賴氏翁舍占氏烏朗哈特氏卓多穆氏陽吉氏珠爾吉特鄂謨克氏功格喇普氏濟喇敏鄂瑪特氏鄂拉本氏庫布克氏色徹氏克穆楚特氏瑪札克氏鄂喇坤氏瑚爾渾氏鄂謨克氏潮穆特氏納伊氏墨爾唘氏博爾齊特氏濟魯特氏吳佳氏兀札喇氏江吉氏鴻果絡氏瑚魯克氏汪札爾氏白達爾氏瑚爾庫爾氏齊普楚特氏博和羅克氏沙查海氏赫勒氏謨錫勒氏額爾輝額哲特氏精吉集氏托羅特氏式勒氏龔吉特氏舒穆爾氏兆絡特氏尹齋氏岳羅親氏博羅特氏孫尼耀特氏曹丹氏徹穆衮氏崔珠克氏李塔理氏侯佳氏索羅噶爾氏葉古禄特氏鄭訥魯特氏土黙特氏白禪氏旺舒特氏王古爾親氏兆達爾幹氏揚藹氏步古魯特氏孫津氏克穆楚氏布爾圖氏錫喇圖氏伊札爾氏札穆懇氏赫舍理氏髙達瑪氏佟尼耀特氏卷七十二金氏韓氏李氏朴氏張氏傅氏柏氏卷七十三洪氏崔氏劉氏黄氏岡氏楊氏吳氏陳氏文氏孫氏丁氏任氏伊氏朱氏徐氏車氏萬氏江氏邊氏何氏閔氏林氏佟氏瓦氏耿氏宋氏馬氏鄭氏曹氏郭氏沈氏方氏秦氏孟氏田氏辛氏卷七十四張氏李氏髙氏雷氏陳氏周氏胡氏董氏黄氏鈕氏吳氏劉氏尚氏韓氏馬氏王氏曹氏丁氏魏氏吕氏鄭氏羅氏白氏卷七十五王氏李氏張氏卷七十六劉氏陳氏周氏徐氏髙氏崔氏楊氏孫氏趙氏胡氏馬氏卷七十七董氏吳氏金氏許氏黄氏韓氏鄭氏郭氏佟氏何氏鄧氏姚氏蕭氏曹氏謝氏俞氏田氏丁氏白氏康氏汪氏閻氏羅氏姜氏戴氏梁氏孟氏顧氏朱氏杜氏蘇氏程氏尤氏任氏石氏宋氏潘氏祁氏聞氏紀氏袁氏于氏魏氏卷七十八侯氏裴氏方氏馮氏譚氏孔氏夏氏秦氏倪氏沈氏宗氏龍氏林氏邊氏傅氏薛氏葉氏閔氏衡氏錢氏剛氏柴氏史氏雷氏强氏蔣氏彭氏耿氏商氏勞氏鄒氏司氏賈氏喬氏龔氏靳氏朴氏陸氏牛氏辛氏穆氏屈氏盧氏陶氏鍾氏松氏宣氏甯氏邢氏顔氏岳氏曲氏屠氏宜氏唐氏梅氏呂氏鄢氏段氏查氏費氏鐵氏章氏井氏鞏氏焦氏萬氏苗氏郝氏戚氏時氏尹氏秋氏蔡氏受氏洪氏魯氏卷七十九沈氏張氏王氏劉氏張氏孫氏唐氏楊氏李氏秋氏宋氏圖氏雅氏馬氏賴氏鄧氏莫氏江氏龎氏俞氏黄氏羅氏郭氏沈氏吳氏尤氏盧氏坡氏陳氏孟氏聶氏趙氏髙氏周氏向氏徐氏朱氏史氏宗氏顔氏卷八十趙氏周氏劉氏李氏王氏張氏鍾氏周氏曹氏馬氏范氏盧氏趙氏袁氏杜氏髙氏金氏吳氏孔氏陳氏蘇氏康氏姬氏徐氏魏氏胡氏郎氏任氏蔡氏馮氏林氏于氏房氏姚氏湯氏謝氏邱氏施氏洪氏沈氏嚴氏梁氏韓氏田氏佟氏肖氏宋氏談氏晉氏許氏臣等謹按八旗滿洲氏族通譜八十卷乾隆九年欽定詳載滿洲氏族得姓之由及其所居之地以著族望有支姓繁衍分地而居者則各以其地冠之如𤓰爾佳氏居蘇完者標曰蘇完𤓰爾佳氏居葉赫者標曰葉赫𤓰爾佳氏以明其支派之别滿洲諸臣内有賜姓者仍附書於本姓而詳誌其賜姓之由俾譜系秩然每一姓中有勲勞懿行卓然著聞者冠於一姓之首各系小𫝊以光世徳至䝉古髙麗尼堪臺尼堪撫順尼堪之向𨽻滿洲厯年乆逺者並附於後仰惟我朝肇基東土徳威所布萬姓雲從而率屬歸誠舉族内附者復爭先恐後是以帷幄之臣熊羆之士炳著旗常自古以來莫能比盛而勲封世爵延及苗裔為國世臣是書所載實與國史列𫝊八旗通志詳略互見足相表裏云乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
