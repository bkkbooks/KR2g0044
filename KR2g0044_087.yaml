body:
  text: 八旗滿洲氏族通譜卷四十三喜塔臘氏喜塔臘為滿洲一姓其氏族散處于尼雅滿山等地方昻果都理巴顔國正白旗人世居尼雅滿山地方務府總管喀穆初來歸其四世孫搔福原任內圖原任啓心郎納林原任三等侍衛庫理由廢員歷任户部侍郎以其善撫胡爾漢等授為騎都尉定鼎燕京時加一雲騎尉五年考績稱職授為三等輕車都尉三遇恩詔加至一等輕車都尉兼一雲騎尉卒其子堯泰承襲卒其親叔扎爾琥承襲卒其親兄之子桑格承襲任護軍統領卒其子阿柱承襲卒以其襲職以來並無宣力之處不准再襲又昻果都理巴顔之五世孫拖岱原任員外郎業舒原任都察院副都御史卓克錫原任護軍參領哈思胡原任二等侍衛多尼堪原任護軍校碩岱由副都統議政大臣征山東雲南貴州等處及厄魯特恩優特噶爾丹俱有功尉任內大臣卒其子那丹珠授為三等輕車都承襲卒其親兄阿克山承襲任副都統兼佐領卒其親兄之子塔哈布現承襲又昻果都理巴顔之六世孫碩色原任三等侍衛尼雅哈原任藍翎侍衛漢楚哈由驍騎校從征雲南奮勇破賊屢著軍績優授為騎都尉卒其子哈班泰承襲現任佐領又昻果都理巴顔之六世孫海綬由護軍校從征凖噶爾在和通呼爾哈腦爾地方繫賊陳亡贈雲騎尉其子沙通阿現承襲又昻果都理巴顔之七世孫博鼐原任郎中約鼐現任二等侍衛多鼐明倫俱原任筆帖式輝色黑色俱原任三等侍衛海塔原任步軍校阿都齊原任驍騎校扎克山原任護軍校八世孫哈爾薩原任七品官羅密現任協領兼佐領德保現任頭等侍衛占泰現任護軍參領巴克山現任佐領德立慎赫倫俱原任三等侍衛塔立善原任藍翎侍衛雅拉原任驍騎校巴泰現任三等侍衛安泰現任主事博爾渾現任驍騎校岱保現任護軍校阿林現任筆帖式九世孫八十一十世孫圖拉俱現任筆帖式薩璧圖鑲黃旗人昻果都理巴顔之子也其七世孫殷達渾由前鋒校從征雲南等處有功授雲騎尉贈為騎後征湖廣在巖山嶺繫賊陳亡在現承襲又薩都尉其子倭赫承襲卒其子常璧圖之七世孫瓦漢原任御史崇圖原任七品官九世孫雅思哈現任二等侍衛侍衛什長海柱現任防禦禪察都都正白旗人昻果都理巴顔之孫也其四世孫薩克察由閒散從征山東梯攻夀光縣首先登城賜巴圖克之授騎都尉定鼎燕京時入山海關擊敗流魯號賊馬步兵二十萬衆復追至慶都縣大敗之敘功加一雲騎尉三遇恩詔加至一等輕車都尉卒其孫薩克素承襲卒其親弟薩克賽襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉又禪察都都之五世孫都蘭泰現任前鋒校薩海現任二等護衛吳海由護軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子吳爾登額現承襲又禪察都都之六世孫雅鼐現任驍騎校孔郭羅鑲藍旗人昻果都理巴顔之五世孫也原任筆帖式其子六十原任員外郎孫邁柱原任賜祭武英殿大學士兼吏部尚書卒任三等侍衛福舒葬如典禮諡文恭曾孫福延原原任司庫福良現任五品官又孔郭羅族姪竒拜原任步軍校孫安圖竒德俱原任護軍校巴達那阿爾賽俱原任驍騎校齊升現任驍騎校曾孫阿密達原任護軍校扎福塔現任親軍校阿塔正白旗包衣人昻果都理巴顔同族世居長白山地方國初來歸其子扎格原任佐領孫塔敏亦原任佐領曾孫桑格原任郎中參領兼佐領留格原任雲麾使參領兼內管領愛星阿原任員外郎兼內管領喜德原任內管領善德原任七品官黑色原任八品官蘇塔皂保俱原任筆帖式固克山原任內副管領元孫七十原任頭等侍衛來保現任刑部尚書兼內務府總管福海現任員外郎兼佐領薩爾圖夸色俱原任員外郎七十二格馬爾圖俱原任筆帖式佛保原任委署護軍參領邁圖原任內副管領四世孫成名原任司庫成倫現係廕生赫申原任委署護軍參領巴什現任委署主事明安保現任護軍校赫爾京額現任筆帖式五世孫全福現任護軍校布爾海鑲藍旗人昻果都理巴顔同族世居尼雅滿山地方國初來歸其元孫希柱原任護軍校黑碩色原任驍騎校三碩色原任三等護衛穆和倫原任户部尚書那海原任郎中四世孫舒魯原任員外郎珠魯原任筆帖式達碩德祿俱原任護軍校偏圖原任驍騎校穆謄原任三等護衛納丹珠現任主事五世孫索柱現任驍騎校伊三泰現係副護軍校艾蘇鑲藍旗人原籍來歸年分俱無考由護軍校從征察哈爾布爾尼及雲南俱有功優授騎都尉兼一雲騎尉卒其子漢楚哈承襲任參領卒其子寬達色承襲任三等護衛因病告退其弟巴林現襲職愛圖喀鑲黃旗人世居瓦爾喀蜚悠地方來歸年分無考其孫瑚松額原任佐領納勤原任驍騎校胡勤原任待詔穆臣由委署護軍校從征湖廣擊敗賊僞將馬寶等兵續征雲南擊賊僞將何繼祖等兵於石門坎黃草壩屢敗之又敗賊僞將胡國秉兵於雲南城下叙功授雲騎尉卒其子布庫襲職又愛圖喀之曾孫布達理原任防禦希佛原任護軍校代同原任筆帖式四世孫武蘭泰現任二等侍衛哈占現係副護軍校圖雅齊國正白旗人世居長白山地方從征浙江在舟山初來歸其孫布思泰由防禦贈雲騎地方擊賊陳亡承襲卒其子保林現承襲又圖尉其子布郎阿雅齊之曾孫圖郎阿原任郎中嶽羅國鑲白旗人世居董鄂地方協領孫惠色原任員初來歸其子阿陽蘇原任外郎阿爾蓀由八品官從征江西湖廣等處屢敗賊兵後征廣東在茅峯山擊賊陳亡贈雲騎尉其子瑚占承襲卒其子巴什承襲現任散騎郎又嶽羅之曾孫富海原任防禦齊明現任主事眀海現任筆帖式由正白旗改隸瑚桑阿國正藍旗人世居蓋吉地方孔尼堪原任倉場侍初來歸原任步軍校其子郎孫渾達理原任佐領渾泰原任鳴贊以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗郎吉納扎庫木地方人其子郎固理原任佐領孫噶克楚原任防禦曾孫花色原任郎中巴星阿蜚悠城地方人其孫扎拜原任驍騎校曾孫烏達禪原任城守尉元孫烏達納現任頭等侍衛正黃旗畢業素董鄂地方人其孫倭赫訥原任前鋒校曾孫錫漢原任驍騎校元孫倉密亦原任驍騎校納薩理現任防禦四世孫達爾達海原任驍騎校錫常現任步軍校常平現任護軍校由鑲藍旗改隸正白旗穆哈納一堵墻地方人其孫赫祿原任驍騎校元孫多鐸理原任步軍校鄂爾濟布原任護軍校四世孫赫色五世孫煥齊俱原任護軍校六世孫根保現任護軍參領業成格大凌河地方人其孫索柱原任驍騎校包衣雅爾拜昻果都理巴顔同族蓋吉地方人其元孫扎爾虎原任佐領四世孫克楚額赫俱原任護軍參領松山原任六品官薩哈連原任員外郎兼佐領薩穆哈色赫俱原任員外郎伊蘭珠索羅喜俱原任驍騎校五世孫綽起原任三等侍衛占岱原任防禦常堪原任驍騎校額爾德原任員外郎渾碩色原任護軍校阿爾法原任筆帖式六世孫常綬原任護軍參領和尚原任步軍校神保八十五俱原任司庫噶爾薩原任護軍校七世孫五格原任典儀寶鑑現任內管領正紅旗額圖理長白山地方人其孫桑格現任佐領曾孫克錫布現任副護軍參領阿寧達理葉赫地方人其子蘇舒原任防禦孫吳爾圖原任護軍校荆州現任護軍校溫普長白山地方人其孫楊保原任護軍校溫達錫瓦喀蘭地方人其子蓀達理原任護軍校瑪爾漢瓦喀蘭地方人其孫諾密原任護軍校鑲白旗包衣喀柱夸喇地方人原任前鋒侍衛其子南齊亦原任前鋒侍衛正藍旗楊崇阿昻果都理巴顔同族蓋吉地方人其五世孫穆克善原任頭等護衛尼喀達原任二等護衛胡楞格原任典儀六世孫舒什哈穆圖俱原任護軍校存柱原任司庫七世孫巴林泰現任驍騎校元保原任驍騎校八世孫富明現任護軍校騰果富克順地方人原係雲騎尉其子科那亦原係雲騎尉孫賽薩原任給事中曾孫塞勒原任二等護衛元孫錫柱現任二等護衛班布理富克順地方人其曾孫德爾岱原任防禦蘇瓦顔富克順地方人原任防禦其子夏蘭亦原任防禦孫三達理現任三等護衛扎蘇富克順地方人其孫藩達理原任步軍校三保現任防禦曾孫薩哈圖現任護軍校又扎蘇親弟巴爾渾原任包衣大其子哈爾渾原任驍騎校曾孫法拉原任護軍校法拉現隸本旗包衣伊克賽富克順地方人其孫伊蘇原任典儀伊賴原任護軍校哈克薩哈富克順地方人其孫羅密原任護軍校曾孫額爾福現任二等護衛包衣錫特庫昻果都理巴顔之子蓋吉地方人其四世孫碩碩渾原任三等護衛六世孫約羅原任驍騎校七世孫哈理杭岱俱原任三等護衛鄂羅順原任護軍校八世孫四格現任參領徐尼原任佐領依瑪現任驍騎校普福原任三等護衛吳爾圖原任典儀九世孫石柱現係生員鑲藍旗羅克索長白山地方人其四世孫阿岱原任防禦托布理長白山地方人其子塞爾特原任筆帖式塞伯理原任護軍校那爾泰耀州地方人其孫翁科代原任驍騎校以上俱係國初來歸之人正黃旗包衣遜塔葉赫地方人原任防禦其子錫蘭泰原任員外郎孫赫色原任郎中希佛原任主事右係天聰時來歸之人正白旗瑪拉尼雅滿山地方人其孫凖泰現任藍翎侍衛包衣布舒庫昻果都理巴顔同族尼雅滿山地方人其孫穆成額原任內管領華山原任委署護軍參領鑲白旗穆謄蓋吉地方人其曾孫哈坦現任護軍校元孫安泰現任八品官由正藍旗改隸鑲紅旗瑚錫圖輝發地方人其元孫禪濟保原任護軍校四世孫竒爾達現任佐領德䝉額蜚悠城地方人其孫吳祿喀原任防禦曾孫哈理原任前鋒校囊柱原任筆帖式元孫瑪理原任佐領多賴原任防禦四世孫華色亦原任防禦大同楊保住俱原任護軍校老碩色原任驍騎校五世孫塞克圖現任防禦馬喜代保俱原任驍騎校鑲藍旗岱蘇原籍無考原任城守尉其孫瑪什原任筆帖式塞德理原籍無考原任驍騎校以上俱係來歸年分無考之人泰楚魯氏泰楚魯為滿洲一姓其氏族世居渾春及音楚地方卓和諾國正藍旗人世居渾春地方征山東攻南宫縣不初來歸由閒散初過北京設雲梯首先登城克之授雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功授恩詔加騎都尉三遇都尉卒其子介石襲職從征雲南至二等輕車於石門坎黃草壩桂花寺等處力戰破賊授為一等輕車都尉又征厄魯特噶爾丹於昭莫多地方擊賊有功加一雲騎尉尋奉使策凌旺布處中途創發身亡贈為三等男其子卓鼐襲職歷任西安將軍緣事一併革退今復授副都統其親兄之子石相襲職時恩詔所削去職現襲二等輕車都尉又卓和諾之子雅加之瑚納原任護軍校孫昭格原任筆帖式右係應立傳之人其餘無事蹟可立傳者附載於後正藍旗哈柳克音楚地方人其孫賚達庫原任五品官曾孫格巴庫亦原任五品官額都原任佐領元孫特倫額綬俱原任佐領常格原任步軍校德保原任護軍校馬克圖渾春地方人其孫二格原任護軍校以上俱係國初來歸之人正白旗貝努渾春地方人其曾孫布色德原任藍翎侍衛右係來歸年分無考之人性佳氏性佳本係地名因以為姓其氏族散處於貝渾山秦等地方福瑚國正黃旗人世居貝渾山秦地方禦倭內由閒散初來歸其曾孫蘇爾太原任防賜巴圖過北京征山東攻定州首先登城克之魯號優授騎都尉兼一雲騎尉兩遇恩詔加至二等輕車都尉後從征福建擊敗賊僞姜總兵等兵征大同攻左衛克其城叙功授為一等恩詔加輕車都尉又遇奉天將軍卒其孫赫英襲職任一雲騎尉歷任恩詔所護軍參領卒其子恆德襲職時削去之元孫幹加