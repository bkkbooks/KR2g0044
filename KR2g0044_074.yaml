什哈原任驍騎校四世孫富爾泰現任親軍校舒穆魯之曾孫拜他原任步軍校元孫扎庫那原任䕶軍校費揚鄂查原任前鋒校其孫雅布拉原任前鋒侍衞曽孫隆什庫原任驍騎校内錫由贈雲騎䕶軍校從征湖廣擊賊陣亡元孫扎海原任郎尉其弟四格徳綬先後承襲中竒普什訥國正藍旗人世居扎庫塔地方官曾孫皂保亦原初來歸其孫甘泰原任五品任五品官伊哈納原任員外郎蘇達理原任三等䕶衛外圖庫原任步軍校噶林原任筆帖式元孫倭赫徳由䕶軍叅領從征準噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子明住現承襲哈爾蓀正白旗人世居尼雅新村地方來歸年分無考其孫綏福爾達原任散秩大臣阿鈕原任頭等侍衞曾孫蘇泰原任二等侍衛已蘭泰原任三等侍衞伊爾喬原任親軍校元孫布爾賽現任六品官以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗備渾嘉木湖地方人其子雅圖原任筆帖式姪孫六十三現任親軍校正黄旗徳普騰額瓦爾喀地方人其孫恰塔原任驍騎校曾孫五十七現任郎中元孫五福現任中書五禄現任筆帖式正紅旗奢爾瑚訥噶哈里地方人其孫會諾原任佐領富拉理長白山地方人其孫費揚阿現任步軍校明阿達噶哈里地方人其孫帕什納原任前鋒校曾孫徳楞泰現任䕶軍校鑲白旗圖柱和克通吉地方人其四世孫圖克理原任五品典儀五世孫通保原任郎中覺和托原任七品官六世孫通泰現任二等䕶衛由正黄旗改𨽻南濟蘭博爾屯博欣村地方人原任防禦阿舒布博爾屯博欣村地方人原任䕶軍校其元孫阿爾堪原任驍騎校四世孫索住現任三等䕶衞吳扎那和克通吉地方人其元孫達西漢現任䕶軍校由正黄旗改𨽻鑲紅旗巴倫和克通吉地方人其曽孫齊分原任佐領拉克蘇邁色俱原任防禦元孫多希納原任佐領吳那哈原任防禦莽凱原任親軍校胡鈕原任筆帖式四世孫岱精阿原任前鋒叅領達魯原任䕶軍參領查爾圖原任䕶軍校吳三泰原任驍騎校謨爾渾原任筆帖式五世孫威色原任五品官達竒蘭馬察俱原任䕶軍校博岱原任驍騎校六世孫屯泰原任䕶軍叅領塔顔生現任驍騎校七世孫赫赫原任五品官正藍旗倭新松花江地方人其曽孫滿保現任䕶軍校邁達原任協領海亮松花江地方人其曾孫珠格現任驍騎校寧徳松花江地方人其孫瑪林泰現係副䕶軍校塔泰松花江地方人其孫匡塔現係䕶軍校鑲藍旗察楚克什克城地方人其曽孫色類原任驍騎校胡什屯原任筆帖式元孫雅楞額現任驍騎校塞普崇阿現任䕶軍校以上俱係國初來歸之人正黄旗喀爾特伊拉富村地方人其曾孫塞克圖現任副䕶軍㕘領正白旗勒普都卦爾察地方人其曾孫扎爾布原任䕶軍校以上俱係天聰時來歸之人正藍旗海清阿松花江地方人其孫漢珠琥原任䕶軍校阿唐伊原任防禦曾孫莫林泰現任典儀鑲藍旗哈普沙原籍無考其子偏圖原任驍騎校以上俱係來歸年分無考之人八旗滿洲氏族通譜卷三十六
