body:
  text: 八旗滿洲氏族通譜卷三十六賽密勒氏賽密勒為滿洲一姓其氏族散處於薩哈爾察等地方通蛟國鑲黄旗人世居薩哈爾察地方過北京征山東初來歸其孫巴爾都禪由閒散梯攻兖州府首先登城克之優授一等輕車都尉定鼎燕京時入山海闗擊敗流賊馬步兵二十萬衆叙功加一雲騎尉卒其親兄多諾襲職三遇恩詔加至一等男卒其子塞爾色襲職任三等侍衞縁事革退其子常保襲職時削去恩詔所加之職承襲一等輕車都尉兼一雲騎尉卒其親弟黑達色襲職現任三等侍衞按通蛟與镶白旗黑龍江地方塔馨塔同族噶庫納國正紅旗人世居黒龍江地方二次過北京征山初來歸其孫布爾山由閒散恩詔加東攻壽張縣首先登城克之授雲騎尉三遇其至三等輕車都尉卒其子三保襲職卒無嗣親叔之子對利孫華色相繼承襲華色卒其子愛星阿襲職時削去恩韶所加之職承襲雲騎尉又噶庫納之元孫齊穆薩哈原係監生四世孫雅住原任筆帖式烏龍武原任防禦沙賴由叅領兼佐領從征準噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子武鍾阿現承襲塔馨塔鑲白旗人世居黑龍江地方天聰時來歸其曾孫達克薩喀由前鋒侍衛從征大同攻渾源州克其城續征雲南在七星闗等處屢敗賊白文選等馬步兵四萬餘衆又在磨盤山地方斬賊偽將杜明望後入緬國至阿窪城獲偽桂王叙功優授騎都尉又征察哈爾布爾尼在大鹵地方擊賊有功優授三等輕車都尉歴任副都統卒其子達賴孫多羅相繼承襲多羅卒其親弟多益現襲職又塔馨塔之曾孫巴爾喀原任䕶軍校元孫黨愛原任叅將又塔馨塔長兄貴林之孫墨庫訥原任步軍校次兄珠爾岱之孫邁穆原任協領曽孫索柱原任驍騎校伊納理原任䕶軍校馬成額現任䕶軍叅領元孫托賽現任步軍副尉按塔馨塔與鑲黄旗薩哈爾察地方通蛟同族拉爾保鑲白旗人塔馨塔之弟也其孫拜都喀由閒㪚二次過北京征山東梯攻商河縣首先登城克恩詔授之授雲騎尉遇嗣其親伯之孫海拉布襲職兩為騎都尉卒無恩詔加遇三等輕車都尉從征湖南在岔路口地方擊至敗賊孫可望馬歩兵續征浙江丹山擊偽英毅伯阮思等兵陣亡贈為二等輕車都尉其子揚古岱襲職縁事革退其子揚泰襲職任協領因病告退其子福保襲職時恩詔所削去職現襲騎都尉加之布喇錫鑲白旗人世居黑龍江地方天聰時來歸其子羅多渾由䕶軍校從征雲南入緬國至阿窪城獲偽桂王續征湖廣擊賊偽將呉應竒等兵陣亡贈雲騎尉無嗣其親兄之子拉巴襲職任三等䕶衞因病告退其子吳拉布現襲職伊爾吉禪國正藍旗人世居薩哈爾察地方佐領孟格原任初來歸其四世孫扎穆蘓原任刑部侍郎五世孫音特原任䕶軍校薩爾泰原任驍騎校卓爾久原係雲騎尉滿都理原任步軍校薩哈亷原任防禦碩翁格原任司庫馬世泰現任䕶軍校六世孫訥爾特原係雲騎尉愛音布現任䕶軍校瑪漢岱現任二等䕶衞兆賴現任員外郎兆海現任筆帖式兆希現任防禦溫徳布原任同知成徳布現任驍騎校楚爾漢由䕶軍校從征凖噶爾在和通呼爾哈腦爾地贈雲騎方擊賊陣亡訥現襲職按伊爾吉禪與本旗尉其子呉爾黑龍江地方克什納同族扎林正白旗人世居黑龍江地方來歸年分無考原任參領其子栢爾布霍爾原任内務府總管元孫薩圖亦原任内務府總管四世孫雲徳現任司庫多爾欽原任驍騎校多倫綽原任佐領五世孫多爾古慎亦原任佐領栢爾和策現任二等侍衞都普竒爾圗現任佐領克庫圖原任三等侍衞六世孫格巴克圖現係副驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗伊莽阿長白山地方人其子納齊侃原任步軍校孫保住原任筆帖式雅齊霞庫原任防禦雅竒納現任副䕶軍叅領曾孫和斑現任筆帖式七十齊齊哈爾地方人其子瓜禪原任步軍校赫達色原任䕶軍校邁圖原任驍騎校孫福保現係副䕶軍校達哈禪明安村地方人其曾孫貝和楚原任步軍校元孫雅圖原任䕶軍校烏雲布葢金蘓蘓地方人其子魏和圖原任驍騎校勒普赫索林村地方人其四世孫桑格現係副驍騎校正藍旗達什哈黑龍江地方人其曾孫尼其納原任步軍校元孫阿爾喀原任三等䕶衞索拜原任佐領查哈喇原任主事四世孫阿漢泰亦原任主事佛約絡原任驍騎校桓泰原任䕶軍㕘領五世孫赫升額原任六品典儀莽阿木黒龍江地方人其元孫莽嘉原任博士四世孫馬爾泰原任員外郎五世孫佛爾赫原任六品官克什納黑龍江地方人其子鼐喀布原任三等䕶衞孫珠拜原任防禦瑪爾賽原任䕶軍校曾孫瑪思哈亦原任䕶軍校留蘭現任驍騎校珠蘭泰現任䕶軍校按克什納與本旗薩哈爾察地方伊爾吉禪同族鑲藍旗性訥松花江地方人其孫尼爾庫原任防禦曾孫鄂錫原任步軍校元孫禮薩納原任驍騎校尼雅哈現任親軍校四世孫禪都現任驍騎校佟保現任二等䕶衞舒明阿現任筆帖式以上俱係國初來歸之人鑲黄旗尼達納黑龍江地方人其四世孫巴布霍原任步軍校五世孫巴爾布蓀現任䕶軍校又尼達納親兄他克齊納之曽孫勒庫尼原任頭等侍衞元孫巴龍阿原任前鋒叅領費克特訥原任驍騎校席特庫原任三等侍衞錫馨原任藍翎侍衙四世孫哈什瑪原任員外郎鄂爾索原任城門尉果克住原任歩軍校五世孫五景原任筆帖式又尼達納親弟達雅納之四世孫黑色原任䕶軍校德普克勒原任二等侍衞六世孫雅圖現任䕶軍校賴達黑龍江地方人原任協領其子渾布原任防禦常保原任筆帖式孫常雲現任大使赫雅圖現任筆帖式曾孫永泰亦現任筆帖式正紅旗商吉爾圖黑龍江地方人其元孫雅齊納原任驍騎校四世孫武倫泰現任副䕶軍㕘領五世孫鄂爾和諾現任䕶軍校鑲白旗阿南達黑龍江地方人其曾孫阿山珠原任内閣侍讀檀布禄原任佐領元孫徳慎現任筆帖式由正黄旗改𨽻薩克察黑龍江地方人其六世孫官保住現任驍騎校以上俱係天聰時來歸之人正黄旗嵩吉爾圖黑龍江地方人其子布爾遜原任步軍校孫竈神保現任防禦尼雅爾久現任副䕶軍叅領右係來歸年分無考之人精竒理氏精竒理為滿洲一姓其氏族㪚處於精竒理烏喇等地方巴爾達齊正白旗人世居精竒理烏喇地方順治時同族衆棄土内附抒誠來歸優授三等男兩遇恩詔加至一等男縁事革退未襲其弟薩哈連亦以來歸功授三等輕車都尉兩遇恩詔加至一等輕車都尉卒其第三子敖岱襲職任都統卒其子玉徳襲職時削去恩詔所加之職現襲三等輕車都尉薩哈連之長子堪楚堪亦以來歸功授騎都尉兩遇恩詔加至三等輕車都尉卒其親弟之子阿玉錫承襲卒其子禄明襲職時削去恩韶所加之職承襲騎都尉卒其弟丹柱現襲職薩哈連之次子謨密岱原係騎都尉孫薩克慎現係和碩額駙曾孫薩雲阿現任五品官又巴爾達齊之族叔薩喇原任前鋒校那喇原任驍騎校族弟昆班鄂托爾孔俱原任前鋒校布爾哈代原任驍騎校族姪貝徳素原任藍翎侍衞額特布原任佐領蘇當阿原任䕶軍校吉禄堪原任䕶軍㕘領蘇特原任驍騎校族孫瓦爾達原任弓匠協領桂投原任藍翎侍衞肻特原任佐領六十原任防禦赫赫現任佐領錫喇班第現任驍騎校六十五現任八品官拉格原係副驍騎校族曾孫常綬現任協領扎理穆正黄旗人巴爾達齊同族世居精竒理烏喇地方順治時同巴爾達齊棄上内附抒誠來歸以恩詔加功授騎都尉兩遇卒其次子栢爾赫圖承襲卒至三等輕車都尉恩詔所其親兄之子皂保襲職時削去衣保現承襲乂加之職承襲騎都尉卒其子白扎理穆之長子漢楚邁原任七品官又扎理穆族弟卓諾亦以來歸功授騎都尉兩遇恩詔加至三等輕車都尉卒其子博靈額孫圖莫爾徳曽孫巴海相繼承襲又扎理穆族弟圖瞻亦以恩詔加來歸功授騎都尉兩遇子衆神保襲職卒其子至三等輕車都尉卒其玉柱襲職縁事革退其親叔之子文保襲職時削去恩詔所加之職承襲騎都尉卒其子六十八現襲職鄂謨爾托正白旗人巴爾達齊同族世居精竒理烏喇地方國初來歸原任二等侍衞其子布濟爾岱原任副都統索倫總管兼佐領孫和通吉原任副都統兼索倫總管納蘓原任三等侍衞曾孫布延圖亦原任三等侍衞倬竒圖原任委署佐領阿爾薩蘭原任驍騎校和托克現任副都統品級索倫總管元孫巴扎爾現係六品廕生卓啟圖現任筆帖式常山現任䕶軍校噶扎爾圖現任藍翎侍衞又鄂謨爾托之族孫莽古達常舒俱原任二等侍衞多壘原任驍騎校阿玉璽現係副䕶軍校多錫竒爾阿爾善俱現任驍騎校珠爾乾哈圖現任侍衞清門三等謨廷鑲白旗人世居黒龍江地方來歸年分無考其孫杭州現任西安副都統曾孫哈爾吉現係廕生由正白旗改𨽻以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗徳敦黑龍江地方人其孫官保現任驍騎校鑲白旗愛達理黑龍江地方人原任驍騎校以上俱係來歸年分無考之人扎庫塔氏扎庫塔為滿洲一姓其氏族散處於瓦爾喀等地方舒通阿國正黄旗人世居瓦爾喀地方攻定興縣首先登初來歸其曾孫瑚鈕由閒㪚賜巴圖城克之騎都尉後從征湖廣等處在平隂縣擊魯號授贈一雲賊陣亡子穆成額孫三達禮曽孫奇爾薩相繼騎尉其承襲竒爾薩卒其子那爾布承襲現任三等侍衞人舒通阿之曾孫舒寧阿由驍騎校初過北京征山東攻欒城縣克其城後擊陸軍門兵陣亡贈騎都尉無嗣其兄之子雅穆哈納承襲三次過北京征山東梯攻薊州第二登城克之賜巴圖魯號授為二等輕車都尉定鼎燕京時入山海闗擊流賊馬步兵二十萬衆又追至慶都縣大敗之授為一等輕車都尉縁事降為騎都尉三遇恩詔加至二等輕車都尉卒其子雅圖承襲卒其子華沙布襲職時削去恩詔所加之職現襲騎都尉又舒通阿之元孫伊爾格徳由佐領擊流賊有功授騎都尉尋授為工部恩詔授郎中五年考績稱職加一雲騎尉遇等處俱有為三等輕車都尉後從征湖廣江西恩詔加功授為二等輕車都尉兩遇尉後從征河南陣至一等輕車都尉兼一雲騎贈為三亡男其子尹達理承襲卒其子伊什哈承襲從等征雲南在黄草壩等處屢著軍功授為二等男後縁事降為二等輕車都尉卒其子六格承襲現任䕶軍叅領又舒通阿之元孫翁郭里原任都統兼佐領烏薩拉原任佐領阿爾泰原任員外郎穆泰原任䕶軍叅領四世孫佟格現任佐領索柱原任員外郎呉爾齊海原任佐領伊哈達原任防禦良桂原任䕶軍校福綬現任䕶軍校富徳原任驍騎校五世孫巴顔泰現任㕘領兼佐領巴顔昌現任藍翎侍衞勒徳里巴顔圖俱原任主事張格拜色俱原任佐領席倫原任筆帖式玉柱現任筆帖式六世孫三格現任郎中保綬章達俱原任佐領七世孫三達色現任佐領保林現任筆帖式伊扎國正黄旗人世居噶哈里碧漢額里村地方辦事初來歸其曽孫弩山在前鋒統領任内以有能不違指使授三等輕車都尉後過北京征山東擊敗吳總兵髙太監等兵又三次圍錦州在松山杏山擊洪承疇兵屢著戰功授二等輕車都尉三遇恩詔優授二等男任内大臣卒其子托岱承襲原任副都統兼佐領縁事革退其親弟之子江米承襲陵寢總原任其親弟之子諾穆齊襲職時削去管卒恩詔所加之職現襲二等輕車都尉又伊扎之曾孫吉山由佐領破流賊滅福王平定河南江南等處贈騎都屢敗賊兵後任副都統於蘇州府擊賊陣亡尉其子哈山承襲遇恩詔加一雲騎尉任副都統卒其弟哈舒庫承襲兩遇恩詔加至二等輕車都尉從征