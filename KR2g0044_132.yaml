body:
  text: 八旗滿洲氏族通譜目録卷六十六附載滿洲旗分內之蒙古姓氏西拉木楞地方博爾濟吉特氏恩格德爾額駙古爾布什額駙達賴巴拜拉普什喜以上俱有傳兀魯特地方博爾濟吉特氏明安昂坤多爾濟瑣諾木垂爾扎爾奇普塔爾拜音代密賽布彥代達賴布當恩格壘常奇伊林齊鄂爾齋圖塞冷以上俱有傳札魯特地方博爾濟吉特氏巴克貝勒喀喇巴拜額爾濟格碩賓以上俱有傳羅色和碩齊羅色以上俱附載克爾倫地方博爾濟吉特氏噶爾馬葉爾登誇巴特馬祁他特衛徵額爾格爾珠爾寨桑達爾漢和碩齊塞冷瑣諾木塔思瑚爾海納木以上俱有傳推特克圖巴納穆春和寧以上俱附載把嶽忒地方博爾濟吉特氏巴喇阿爾薩以上俱有傳布魯海班第綽布海巴金以上俱附載各地方博爾濟吉特氏圖爾濟葉爾登巴爾巴圖魯昂坤杜稜寨桑扎爾固齊阿玉石吳巴什阿祿哈德爾格爾噶爾馬瑣諾木瑣諾木博羅特以上俱有傳巴蘭白瑚克什圖特墨白顏圖托達以上俱附載欽定四庫全書八旗滿洲氏族通譜目録卷六十六附載滿洲旗分內之蒙古姓氏西拉木楞地方博爾濟吉特氏恩格德爾額駙古爾布什額駙達賴巴拜拉普什喜以上俱有傳兀魯特地方博爾濟吉特氏明安昂坤多爾濟瑣諾木垂爾扎爾奇普塔爾拜音代密賽布彥代達賴布當恩格壘常奇伊林齊鄂爾齋圖塞冷以上俱有傳札魯特地方博爾濟吉特氏巴克貝勒喀喇巴拜額爾濟格碩賓以上俱有傳羅色和碩齊羅色以上俱附載克爾倫地方博爾濟吉特氏噶爾馬葉爾登誇巴特馬祁他特衛徵額爾格爾珠爾寨桑達爾漢和碩齊塞冷瑣諾木塔思瑚爾海納木以上俱有傳推特克圖巴納穆春和寧以上俱附載把嶽忒地方博爾濟吉特氏巴喇阿爾薩以上俱有傳布魯海班第綽布海巴金以上俱附載各地方博爾濟吉特氏圖爾濟葉爾登巴爾巴圖魯昂坤杜稜寨桑扎爾固齊阿玉石吳巴什阿祿哈德爾格爾噶爾馬瑣諾木瑣諾木博羅特以上俱有傳巴蘭白瑚克什圖特墨白顏圖托達以上俱附載
