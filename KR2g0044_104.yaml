body:
  text: 八旗滿洲氏族通譜目錄卷五十二墨爾哲勒氏強圖理希爾關蘇爾都瑚喀凡以上俱有傳宏鄂宏彀費爾佳登秀温寳額哲勒穆爾塔綽爾惠穆尤滿圖瑚陶旒吳虞爾渾吳什哈達格塞赫吳蘇瑚以上俱附載索齊勒氏旺珠瑚松圖以上俱有傳碩色琥什塔愛柱拜布海索爾和以上俱附載托謨氏春布理常書噶蘇葢穆以上俱有傳托喀穆阿爾都善塔爾布訥赫遜博濟爾岱索爾碧禪薩璧納羅博圖瑪庫理以上俱附載湯務氏尹塔右係有傳烏魯素喀爾堪嘉哈禪薩哈連以上俱附載都拉喇氏唐泰巴喀瑪以上俱有傳圖爾巴楚右係附載墨爾廸勒氏達巴鼐佛克楚以上俱有傳庫丑特克色赫圗性格巴有米提優以上俱附載喀爾達蘇氏庫爾布右係有傳公古代雅隆阿三布以上俱附載赫舒理氏舒瑚魯果和以上俱有傳武敏特安純以上俱附載輝羅氏額爾赫圗右係有傳哈普起唐碩徳克順以上俱附載
  hash: sha256:8fe465e6d9740b9ad5e24cd64c50bb731685b5197446b2f2cc258470b9823246
