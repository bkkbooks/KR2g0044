body:
  text: 八旗滿洲氏族通譜卷五十一鈕顔氏鈕顔為滿洲一姓其氏族世居於葉赫地方福喀圖國鑲藍旗人世居葉赫地方子吳達納由䕶軍叅初来歸授半個佐領其長領過北京征山東攻寳坻縣第三登城克之後攻薊州陣亡贈騎都尉以其弟之子瑚什屯承襲遇襲職時削去恩詔加一雲騎尉任佐領卒其子岳色恩詔所加之職承襲騎都尉卒其子扎什襲職卒無嗣其親叔瑚巴襲職現任䕶軍叅領又福喀圖之第三子喀爾圖第四子薩爾圖俱原任三等䕶衛第五子旺貴原任親軍校孫僧色博爾本俱原任三等䕶衛社圖渾原任翰林院侍讀學士勒圖渾原任給事中董智現任䕶軍校曽孫巴海原任主事魯素渾福格俱原任筆帖式福賚原係副驍騎校福安現任驍騎校右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗凖泰原任鳴賛其子阿哈納原任郎中賽璧漢原任驍騎校其子阿晉泰原任三等䕶衛錫特庫原任步軍校霞瑚原任驍騎校孫阿爾賽原任三等䕶衛烏拉岱原係庫使赫古原任筆帖式曽孫塞倫原任協領拉哈原任典儀紫蓀保原任筆帖式元孫哈福現任驍騎校岱音布祿福喀圖同族其子喀拜原任三等侍衞孫常綬原任驍騎校曽孫瑪爾賽原任筆帖式滿都布其子努賽原任䕶軍校孫立薩納原任驍騎校以上俱世居葉赫地方係國初來歸之人烏爾古宸氏烏爾古宸為滿洲一姓其氏族散處於木楞等地方和托諾鑲黄旗人世居木楞地方天聰時來歸以招降阿庫里尼滿地方有功賜丁壯十户即將阿庫里尼滿人丁編佐領使統之後征大同在沙城地方擊賊陣亡贈騎都尉其長子哈爾蘇襲職次子阿爾蓀由䕶軍校從征湖廣於常徳府擊敗賊偽安南王等兵數萬餘衆又徃援荆州時擊敗賊偽都督楊文英於江上獲船三隻敘功授雲騎尉卒其子武格襲職又和托諾之孫阿爾法原任都察院副都御史曽孫武枚原任筆帖式元孫武爾陳伊敏俱現任筆帖式格鈕國正紅旗人世居訥殷地方史平定山西在羅門初來歸其孫聶勒庫由御贈雲騎鎭擊賊偽將王屏藩兵陣亡襲又格鈕之元孫尉其子赫哲孫福永相繼承圖布齊現任驍騎校福善由䕶軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子額訥特現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗吳爾布理瓦爾喀地方人其元孫三保原任驍騎校喀濟海現任防禦四世孫巴瑪泰現任驍騎校右係天聰時來歸之人扎拉理氏扎拉理為滿洲一姓其氏族散處於瓦爾喀等地方阿努國正藍旗人世居瓦爾喀地方領令伊子阿爾喀初率滿洲五十户來歸編佐恩詔加統之復授騎都尉卒其孫多貝襲職遇爾多襲一雲騎尉卒其弟鄂拜襲職卒其子鄂恩詔所職卒其姪多爾濟襲職時削去商現襲職又阿加之職承襲騎都尉卒其子和努之孫噶哈原任佐領曽孫巴哈亦原任佐領元孫鄂爾濟原任三等䕶衞武登額國正白旗人阿努之親弟也任驍騎校邁圖原任初隨兄來歸其孫薩海原筆帖式曽孫三泰由驍騎校從征江西於吉安府擊賊陣亡贈雲騎尉無嗣以其親弟覺三承襲緣事革退其叔之子伊瑪琥襲職後覺三奉世宗憲皇帝特㫖復任頭等侍衞又武登額之曽孫蘇瑪祿原任筆帖式元孫雅思泰現任防禦貴勒赫現任驍騎校瑚保原任筆帖式四世孫宮博爾施現任筆帖式由正藍旗改𨽻索穆諾和國正藍旗人阿努同族世居瓦爾喀地方錦州擊初來歸其子西特庫由䕶軍叅領三圍敗洪承疇三營步兵敘功授雲騎尉後征四川擊賊張獻忠兵陣亡贈為騎都尉以其弟新泰承襲遇職卒其叔之子黑色恩詔加一雲騎尉卒其姪托絡襲恩詔所襲職卒其姪沙靈阿襲職時削去十九現襲職加之職承襲騎都尉卒其親兄五又索穆諾和之孫南泰原任防禦泰璧善國正藍旗人阿努同族世居瓦爾喀地方俱原任初來歸其孫哈理原任主事佛保伊漢長史滿都瑚由佐領從征福建攻厦門擊賊陣亡贈為騎都尉以其長子瑪爾漢承襲卒其親弟陶爾格襲職任三等䕶衞卒其弟之子鶴善襲職又泰璧善之曽孫達賴花色俱原任三等䕶衞石圖原任協領查穆布理原任佐領薩穆布理原任頭等䕶衛元孫常猷原任䕶軍叅領桑額原任鳴賛綽和鼐原係副驍騎校四世孫徳盛額現任䕶軍校富克察國正藍旗人阿努同族世居瓦爾喀地方過北京初來歸授為佐領其弟巴爾住由佐領征山東梯攻齊河縣首先登城克之授雲騎尉遇恩詔授為騎都尉卒無嗣其親兄之孫庫爾訥襲職又遇恩詔授為三等輕車都尉緣事降為騎都尉令其弟巴拜承襲任佐領卒其子蘇爾特襲職卒其姪莽愛襲職卒其父蘇尼克襲職卒其子定柱襲職時削去恩詔所加之職承襲雲騎尉現任䕶軍叅領兼佐領僧珠國正藍旗人阿努同族世居瓦爾喀地方建擊賊初來歸其孫阿禮善由䕶軍校從征福贈雲騎陣亡嗣其親弟吳爾山福達理先後承襲曽孫尉無敦達理原任步軍校蘇顔祿原任郎中元孫秉格現任驍騎校滿都琥國正藍旗人阿努同族世居瓦爾喀地方任前鋒初來歸原任前鋒校其子丹都琥亦原校孫阿爾法墨勒俱原任防禦岳拜原任甘肅巡撫岳海原任長史曽孫朝柱現任驍騎校書敏原任筆帖式蘇赫原係庫使元孫永住候補筆帖式永泰現係庫使以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗赫勒阿努同族瓦爾喀地方人其子恒徳原任佐領綏哈原任防禦曽孫瑪什喜現任牧長赫勒親弟更津之孫阿蘭泰現任二等侍衞瑚什圖那木都魯地方人原任步軍校正紅旗旒珠瑚烏喇地方人其孫綽起原任典儀曽孫羅思亦原任典儀元孫徳賚原任佐領正藍旗巴岱阿努同族瓦爾喀地方人其子葛巴由員外郎兩次監修有功議敘授騎都尉卒其子根特襲職任協領卒其子都爾岱襲職任三等侍衞卒其子竒徹布襲職現任佐領又巴岱之曽孫慕羲岱現任員外郎達爾蘇喀阿努同族瓦爾喀地方人其孫替存原任協領曽孫保住原任三等䕶衞貝楞額阿努同族瓦爾喀地方人其曾孫郎柱原任防禦莽吉圖原任驍騎校元孫都尼克吳什俱原任佐領格巴庫五十九俱原任驍騎校思泰現任䕶軍校四世孫格保原任委署䕶軍叅領扎森原任主事福徳現任筆帖式吳珠阿穆巴阿努同族瓦爾喀地方人其曽孫赫楞額原任佐領元孫徳祿現係庫使庫通額倭哲地方人原任驍騎校以上俱係國初來歸之人正藍旗包衣彰鳯儀扎庫木地方人其子彰圖色原任六品包衣大孫六十九原任䕶軍校曽孫觀音保現任筆帖式右係來歸年分無考之人温都氏温都為滿洲一姓其氏族散處於訥殷江及各地方訥殷江地方温都氏郎格國鑲白旗人世居訥殷江地方使統之其長子巴初率一百餘户來歸編佐領林原任前鋒校第三子楊鼐原任郎中兼佐領第四子忠内由佐領從征貴州屢敗賊兵師旋至鎭江地方擊敗海冦鄭成功水陸兵十萬餘衆敘功優授騎都尉卒無嗣其姪孫訥爾泰襲職兼佐領卒其子六十四現襲職又郎格之孫塞克徳原任都察院副都御史兼佐領勒貝原係七品廕生托什原任三等䕶衞嘉色原任御史兼佐領常綬原任頭等䕶衞珠遜原任郎中兼佐領郭海原任䕶軍校曽孫塞爾貝原任頭等䕶衞兼佐領塞爾特納喇俱原任筆帖式鄂海原任四川陜西總督徳理善原任䕶軍校勒綬現係副䕶軍校勒福現任佐領英愛現係倉庫官元孫寳柱原任中書圖克善圖桑阿俱原任佐領色黑倭楞俱原任二等䕶衞三喜保阿理俱原任内閣侍讀學士達理鄂理俱原任郎中吳林泰由佐領從征凖噶爾在和通呼爾哈贈雲騎腦爾地方擊賊陣亡襲現任佐領又郎格之四尉以其子吳鵬額承世孫瓦爾達原任䕶軍校寳金泰原係和碩額駙色明薩漢俱原任筆帖式又郎格次弟滿岱之孫瑚什巴原任主事曽孫五格原任驍騎校第四弟禮敦之子尼堪原任䕶軍叅領孫諸神保原任筆帖式常明原任七品官禪格原任步軍校曽孫九格現任筆帖式第五弟禮嘉之子伊頼原任御史孫伊遜徳伊津達俱原任員外郎伊臣徳原任筆帖式曽孫五雲泰現係副䕶軍校又郎格親伯布薩納之曽孫三泰原任七品官由鑲黄旗改𨽻鄂靈阿國鑲白旗人世居訥殷江地方二等䕶衞瑚什塔初來歸其曽孫艾揚素原任原任步軍校吳塞原任驍騎校元孫覺爾善原任驍騎校覺和托由驍騎校從征察哈爾布爾尼屢敗賊兵續征雲南擊賊偽將何繼祖等兵於黄草壩敗之敘功優授騎都尉年老告退其子佛綬現襲職又鄂靈阿之五世孫白楞現任驍騎校由鑲黄旗改𨽻薩爾泰國正藍旗人世居訥殷江地方廣等處屢立戰功初來歸由佐領從征江西湖贈騎都後駐防江寧在鎭江擊海冦鄭成功兵陣亡任尉以其子佛保住承襲卒其子塔鼐襲職現䕶軍叅領兼佐領濟普都理國鑲白旗人世居訥殷江地方騎校元孫赫雅圖初來歸其曽孫善碧原任驍原任典儀三瓦塞原任叅領瓦哈理原任右衞副都統鄂爾和原任所牧由鑲黄旗改𨽻以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗訥音圖其孫瑪爾漢瑪圖喀俱原任驍騎校瑪齊喀原任五品官曽孫索理原任御史元孫索爾敏原任郎中綏渾明格俱原任筆帖式清格原任三等䕶衞濟格現係副䕶軍校四世孫索泰原任編修法琳現任五官正由鑲黄旗改𨽻博洛渾其子音布祿原任翼長元孫額森特原任筆帖式四世孫華拉現任䕶軍校森特赫現係貢生五世孫巴什現任三等䕶衞由鑲黄旗改𨽻彌山其子碩塞原任驍騎校由鑲黄旗改𨽻羗什庫其曽孫多吉理原任䕶軍校正藍旗芬達理其孫久常原任䕶軍校曽孫本泰現任三等䕶衞庫爾禪其孫黑色現食半俸驍騎校曽孫徳楞泰候補筆帖式以上俱世居訥殷江地方係國初來歸之人各地方温都氏兆朗國正黄旗人世居綏分地方子艾塔原任筆帖式初來歸原任驍騎校其長次子尼雅瑚理由委署䕶軍校從征雲南貴州等處累著戰功授雲騎尉卒其子雅圖襲職又兆朗之孫衮楚原任筆帖式滿圖亦原任筆帖式右係應立傳之人其餘無事蹟可立傳者附載於後正白旗薩穆哈黄尼窪地方人原任弓匠恊領其子三帕原任員外郎曽孫瑚保住現任驍騎校班積理渾春地方人其曽孫吳宻雅喀原任驍騎校元孫格本額現任䕶軍校吳靈阿現任副䕶軍叅領巴圖理沾地方人其曽孫雅圖原任步軍校元孫瑚什巴都什巴俱原任信礟章京四世孫䨇喜原任䕶軍校彰福現任親軍校赫成額現任防禦福保現任筆帖式五世孫查海原係副䕶軍校章藹現任筆帖式佛爾屯現係副䕶軍校福靈阿馬察地方人其孫賽碧圖原任驍騎校正紅旗武靈阿瓦爾喀地方人其子尚吉那原任防禦孫薩克都現任驍騎校鑲白旗多托羅吳蘇里烏喇地方人其孫碩色原任驍騎校曽孫托色原任城門尉邁什現任驍騎校元孫雅郎阿現任三等䕶衞伊克綬多托羅同族蘇蘇里烏喇地方人其曽孫温岱現任防禦正藍旗訥勒布倭濟地方人其曽孫官保原任驍騎校柏色理原任副驍騎校元孫皂神保現任驍騎校阿穆鈕倭濟地方人其孫吳拉那原任驍騎校鑲藍旗堆泰吉陽地方人其子鄂通武原任郎中孫鄂理喜原任筆帖式曽孫蘇蘭泰現任佐領鄂進泰現任䕶軍叅領包衣托活瑪堆秦同族吉陽地方人原任六品官其子謨絡原任包衣大孫佛倫原任䕶軍校以上俱係國初來歸之人鑲紅旗温布祿阿庫里地方人其曽孫六什泰原任驍騎校右係天聰時來歸之人鑲白旗包衣葛布庫沙濟城地方人其孫麒麟普原任廐長卓爾和原任藍翎侍衞曽孫巴什現任頭等䕶衞兼包衣叅領由正黄旗改𨽻