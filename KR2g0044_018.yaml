等侍衛曽孫杜爾巴原任鳴贊色克圖原任員外郎阿林現任庶子威赫德現任鳴贊赫碩色原任主事存柱蘇合俱原任筆帖式元孫都蘭泰現任主事賽爾篤現任八品官齊什伍現任筆帖式四世孫穆克登布現任筆帖式商顔和羅國正紅旗人和和理同族世居董鄂地方受傷征初率族衆來歸由騎都尉征北京時目旅順口第二登城克之加一雲騎尉又征黒龍江有功授三等輕車都尉卒孫海山承襲卒無恩詔加嗣族叔外錫承襲遇其子拉薩理承襲卒其子至二等輕車都尉卒恩詔所哲庫訥襲職時削去車都尉卒其子多秦承襲加之職承襲三等輕卒其子僧額岱承襲卒無嗣其叔祖楞克訥承襲卒其弟海福承襲卒其姪常寧現承襲又商顔和羅之姪魁滿原任佐領圖延布原任筆帖式孫庫爾泰由佐領從征黒龍江有功授半箇前程扎竒納翁郭順蘇巴理俱原任員外郎鶴善原任信礟章京伊巴漢原任前鋒校翁艾原任頭等䕶衛沙渾原任䕶軍校納敏原任步軍校曽孫喀濟理原任博士珠陳禄格岳達俱原任步軍校桑格色保住阿囊阿雅才俱原任筆帖式吳成額原任郎中福當阿原任内閣侍讀碩色原任協領吳喀納原任防禦巴什原係廕生納三泰現任三等䕶衛元孫福達理原任䕶軍校穆翰佛隆五瑪齊伍吉圖色楞格朔爾格俱原任筆帖式阿蘭太原任頭等䕶衛干神保原任員外郎瓦爾達原任驍騎校察爾岱現任驍騎校錫哈納現任副䕶軍叅領富種徳現係監生四世孫蘇錦原任内閣侍讀學士蘇謙原任員外郎蘇泰原任二等䕶衛穆世卜原任中書穆世泰原任七品筆帖式官住原任䕶軍校額齊理現任䕶軍校蘇巴泰常明富順俱現任筆帖式常清現係生員五世孫端謹現任筆帖式卓托國正黄旗人和和理同族世居董鄂地方南貴州初來歸其元孫費赫齊由佐領從征雲贈騎都等處屢立戰功後於秦州擊賊陣亡優繼承襲尉兼一雲騎尉其子賽柱孫色克圖相色克圖卒其親弟富起臣現承襲又卓托四世孫雅塔海原任筆帖式五世孫訥爾森原任員外郎法特哈原任佐領多濟原任䕶軍校圖占原任防禦馬鼐原任筆帖式六世孫薩郎阿原任護軍校馬郎阿原任筆帖式那秦現任䕶軍校托洛諾現任驍騎校南都伊拉齊國鑲黄旗包衣人和和理同族世居董鄂地方時初來歸其元孫胡敏由委署章京定鼎燕京恩詔加著有勞績授為騎都尉三遇固察拉孫七十保至二等輕車都尉卒其子喇恩詔所住相繼承襲保住卒其子馬進泰襲職時削去加之職現襲騎都尉四世孫蘇庫原任員外郎謨爾渾原任䕶軍校五世孫佛保住莽吉納俱原任主事明德原任佐領六世孫德泰現任佐領來順現任䕶軍校由正黄旗包衣改隸巴蘇國鑲藍旗人和和理同族世居董鄂地方雷原任初來歸其孫穆成格原任司庫曽孫訥陜西按察使内圖原任佐領五十六由䕶軍校從征察哈爾布爾尼及湖廣貴州等處有功授雲騎尉卒其子福勒赫承襲卒親叔之子兑清格現承襲又巴蘇之曽孫赫雅圖原任主事元孫能格圖瑚什巴俱原任員外郎額爾格原任七品官徳禄原任佐領肇勒原任步軍校徳受原任䕶軍校赫申現任三等䕶衛四世孫赫林富魁俱現任主事明林現任筆帖式五世孫徳住現任筆帖式阿都兑齊正紅旗人和和理同族世居董鄂地方來歸年分無考其五世孫巴山由驍騎校從征貴州有功授雲騎尉任協領卒親兄赫色承襲由火器營委署夸蘭大取昭定藏有功卒贈雲騎尉其子赫明承襲又阿都兑齊之五世孫白格現任城守尉六世孫白永現任筆帖式白禄侯補筆帖式白泰現係生員都朱魯國正紅旗人和和理同族世居董鄂地方時在綏初來歸其孫倭赫由䕶軍叅領征流賊徳州延安府渾源州等處屢敗賊兵圍大同攻渾源州陣亡贈雲騎尉其子富喀承襲兩遇卒其子阿爾賽襲職時恩詔加至騎都尉兼一雲騎尉恩詔所削去職現襲雲騎尉加之以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載於後正黄旗伍巴泰其孫納郎阿原任員外郎正白旗來布其孫拉薩理原任三等侍衛曽孫靠山原任驍騎校正紅旗包衣温岱哈斯瑚和和理同族其元孫騷達色現任六品包衣大鑲紅旗科錫赫原任䕶軍校其孫皂保原任筆帖式薩岱原任步軍校蘇赫徳原任䕶軍叅領其子額斯特原任典儀孫和順鄂原係副䕶軍校以上俱世居董鄂地方係國初來歸之人正紅旗博和理和和理同族其孫華善原任員外郎曽孫皂保原任頭等䕶衛右世居董鄂地方係天聰時來歸之人正紅旗錫邦阿和和理同族其孫喀什泰原任䕶軍校曽孫常鼐亦原任䕶軍校元孫伊爾達穆原任驍騎校喀泰原任筆帖式四世孫納蘭泰現任䕶軍校右世居董鄂地方係來歸年分無考之人八旗滿洲氏族通譜卷八
