body:
  text: 八旗滿洲氏族通譜卷八董鄂氏董鄂本係地名因以為姓其氏族世居董鄂地方和和理國正紅旗人世居董鄂地方原係董鄂部長佐領初率部下來歸尚長公主為頭等大臣編使統之後征札庫塔取烏喇授為三等子卒其第四子和碩圖承襲由部統初次征北京擊敗馬蘭峪兵晉封三等公卒其子和爾本承襲任䕶軍統領卒其弟哲爾本蘇布先後承襲蘇布恩詔優卒和爾本之子衮布承襲遇春承襲任都統卒授一等公卒哲爾本之子鵬恩詔所其子増綬襲職時削去副都統卒其子恒泰承加之職承襲三等公任襲原任散秩大臣兼佐領縁事革追親兄之子色楞格現承襲雍正九年奉㫖追封和和理為勇勤公又和和理之次子多濟理原任副都統第三子雅星阿原任䕶軍叅領第五子杜雷由都統於定鼎燕京時入山海闗擊流賊馬步兵二十萬衆復追至慶都縣大敗之敘恩詔因功授騎都尉後遇一等男入勲臣之列加一雲係和碩額駙優授騎尉又因係公主之子加一雲騎尉為三等子兩遇恩詔優授二等伯卒其孫新達理承襲卒其子錫柱襲職時削去和碩額駙所得優授之職承襲二等男卒親叔齊什承襲原任都統兼佐領卒長子朱亮承襲卒其親弟富永襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉縁事革職未襲又和和理之長子雅什坦原任佐領其子伊特赫亦原任佐領忠泰原任驍騎校孫金特赫葛徳渾俱原任佐領滿常原任䕶軍叅領鏗特原任筆帖式曽孫晉海原任七品官乂和和理次子多濟理之長子噶濟海原任長史次子薩漢由委署章京征流賊追滕吉思碩羅汗及從征江西屢立戰功授雲騎尉卒其子謨達承襲從征貴州江寧等處有功授騎都尉原任副都統兼佐領卒其子巴格現承襲多濟理之孫朱馬拉原任三等䕶衛額能格原任頭等䕶衛拉堪原任䕶軍叅領兼佐領雅胡達原任郎中曽孫舒書原任䕶軍校巴克山原任䕶軍叅領托謨現任驍騎校隆科原任佐領元孫三泰現任協領又和和理第三子雅星阿之子錫爾達渾原任䕶軍叅領禪圖原任佐領曽孫普善原任頭等䕶衛薩克蘇原任佐領元孫普海原任鴻臚寺少卿噶禮原任江南江西總督縁事獲罪噶爾璧原任西安副都統色爾起原任主事蘇保現任佐領四世孫幹都現任親軍校噶漢太原任三等䕶衛達漢太現任叅將札漢太現任副䕶軍叅領色楞額現任獄官普太原任筆帖式五世孫玉衡現任䕶軍校趙玉阿晉俱現任筆帖式又和和理第四子和碩圖之子瑚什布原任都統曽孫老滿色原任副都統元孫富明原任頭等䕶衛宏茂原任員外郎立柱原任䕶軍叅領富漢富吉俱原任佐領富善原任員外郎富岳原任筆帖式四世孫富保原任委署䕶軍叅領恒興四十九富爾敏赫徳俱現任佐領常清恒德皂保俱原任佐領五世孫富清原任佐領魯克素國正白旗人和和理同族世居董鄂地方布初時同弟屯布率四百人來歸本名倫太祖髙皇帝賜名魯克素編佐領令伊次子席爾泰統之席爾泰由佐領歴晉十六大臣之列授遊擊賜人丁世職征瀋陽陣亡後因其妻違禁屠馬祭夫以千户官職户口贖罪席爾泰之長子拉都由閒散過北京擒斬賊哨兵二人征錦州擊敗杏山馬歩贈雲騎兵後征寧逺陣亡定鼎燕京時入山海闗擊流尉親弟巴都承襲賊馬步兵二十萬衆復追至慶都縣大敗之授騎都尉三遇恩詔加至二等輕車都尉征陜西延安府綏德州等處屢著戰功又擊敗賊魁一隻虎獲船十五隻征湖廣江西於岳州南昌等府擊敗賊首金聲桓王德仁等兵又征福建於福州府烏龍江地方敗賊獲船十二隻斬偽總兵一人偽都司一人後於羅源縣擊賊陣亡優贈一等輕車都尉兼一雲騎尉其子吳良阿承襲縁事革退吳良阿之子四格承襲現任叅領又魯克素之長子席漢由騎都尉兼佐領追殺卓農額駙屬下逃去之䝉古又攻朝鮮靉陽城偕二十贈三等人先登克之進攻三塔擊賊陣亡優衛揚錫木輕車都尉其次子鄂碩承襲攻前屯等處有功授二等輕車都尉圍錦州擊敗松山杏山馬步兵二次過北京征山東擊敗賊范軍門吳總兵等兵優授一等輕車都尉兼一雲騎尉定鼎燕京時於山海闗外擊流賊唐總兵復追至安肅縣大敗之授三等男於潼闗擊流賊率前鋒兵敗之又征江南於蘇州府擊敗楊軍門兵獲船二十五隻於杭州府擊賊生擒偽總兵一人又梯攻湖州府克其城獲偽總兵三人恩詔加授二等男三遇碩係至三等子以鄂端敬皇后父伯原任前鋒統領兼佐領卒次子費揚古特恩封三等承襲擢領侍衛内大臣授撫逺大將軍征噶爾丹凱旋時奉㫖大將軍費揚古駐札邊境綏輯蒙古固守地方征剿噶爾丹時奮揚軍威俾奸狡積寇一鼓而大敗之著賜從伯爵優陞為一等公欽此後費揚古卒去祭葬如典禮諡襄壯其子陳泰襲職時削恩詔所加之職承襲一等侯兼一雲騎尉縁事革退親弟圖巴現承襲又魯克素之孫羅碩由理事官定鼎燕京時入山海闗擊流賊馬步兵二十萬衆復追至慶都縣大敗之授騎都尉三遇恩詔加至二等輕車都尉縁事降為騎都尉兼一雲騎尉以羅碩係端敬皇后伯父授一等輕車都尉任禮部侍郎卒其三子舒敏分襲三等輕車都尉原任雲麾使孫吳泰分襲騎都尉舒敏卒後其子吳保承襲引疾乞休其子六十九承襲騎都尉兼一雲騎尉卒其子諾泰承襲現任二等侍衛吳泰卒其子吳海現承襲又魯克素之孫格蘭原任五品官曽孫羅敏原任兵部侍郎輝色原任三等侍衛鄂哈常山俱原任頭等侍衛常格原任五品官昻阿岱原任七品官常久原任筆帖式元孫鄂爾多原任吏部尚書都敏原任吏部侍郎博泰原任庶子常鼐原任郎中訥楞三保俱原任三等侍衛鄂鼐阿爾查圖俱原任佐領拉哈原任六品官董常現任郎中常保黒達色公保俱現任二等侍衛安泰現任佐領索泰原任筆帖式四世孫納秦原任副都統珠滿原任郎中寧徳現任員外郎保成博寛俱現任主事唐喀現任三等侍衛東郭絡現任五品官寧福現任佐領鄂羅錫原任八品官博立現係監生巴哈良都納哈博卓鄂羅善俱原任筆帖式阿爾賽原任䕶軍校五世孫永興現任都統永常現任安西提督永成現任七品官安恒桑格俱現係生員屯布鑲紅旗人魯克素之胞弟也其子柏黒原任佐領孫托絡輝亦原任佐領隨蓀原任典儀隨和多原任員外郎克塞格由䕶軍校二次過北京征山東梯攻安東衛首先登城克之授雲騎尉恩詔授卒其子哈爾吉承襲遇書承襲征浙江舟山有騎都尉卒親伯之子舒功又加一雲騎尉原任叅領兼佐領卒其子尼滿承襲原任御史兼佐領卒其子尼山襲職時恩詔所削去職承襲騎都尉現任佐領又屯布之曽孫加之哈那密原任長史兼佐領濟蘭原任頭等䕶衛察岱原任筆帖式元孫濟德原任佐領色爾登原任署正興禄佛保俱原任筆帖式四世孫常泰現係監生兑齊巴顔國鑲紅旗人和和理同族世居董鄂地方歸編三初同親伯之子阿格巴顔率領部屬來佐領令兑齊巴顔第三子噶爾呼機阿格巴顔之子阿蘭珠阿格巴顔親兄之子郎格各統一佐領以噶爾呼機辨事有能不違指使授為三等輕車都尉三次圍錦州時松山兵來犯噶爾贈二等呼機率纛殺入陣亡承襲遇輕車都尉其子碩色恩詔加至一等輕車都尉卒兄蘇栢承襲征浙江在舟山擊敗偽英毅伯阮思偽總制陳陸御等兵加一雲騎尉卒其子愷禄承襲卒其弟三塔哈象冠先後承襲象冠卒其孫托山襲職時削去恩詔所加之職承襲一等輕車都尉卒其子德忠襲職時削去詔後軍功所得之職現襲二等輕車都尉又兑齊巴顔之元孫托賴原任刑部尚書兼佐領四世孫托保原任副都統兼佐領托明現係廕生托福現任二等䕶衛托禄現任鳴贊五世孫徳寧亦現任鳴贊僧保現任佐領又兑齊巴顔之次子永順由革職叅將從征旅順口首先登城克之授二等輕車都尉又征黒龍江屢敗叛賊有功授一等輕車都尉三遇恩詔加至二等男任都統卒合併伊子耿圖軍功所得騎都尉為一等男兼一雲騎尉令耿圖承襲卒其子明額理孫烏爾山相繼承襲烏爾山卒其子烏爾勤襲職時削去恩詔所加之職承襲三等男卒其子惠昌現襲職乂兑齊巴顔之第四子邱由閒散從征額赫庫倫取新村征烏喇著有戰功又擊毛文龍兵取旅順口第二登城克之優授騎都尉又征黒龍江有功加一雲騎尉卒親弟邱禪堯占先後承襲後堯占從征太原府及征流賊屢立戰功授三等恩詔加輕車都尉三遇尉兼一雲騎尉卒其子勒爾圖至一等輕車都恩詔所承襲卒無嗣其姪孫拉布東襲職時削去兼佐加之職承襲三等輕車都尉現任副都統領乂兑齊巴顔之長子阿什巴原任頭等䕶衛孫都理原任步軍副尉塔理密拉渾格理俱原任佐領南圖原任助教曽孫都爾弼亦原任助教碩絡原任驍騎校明徳原任叅領明常原任佐領錫爾達原任四川陜西總督哈爾吉布原任主事元孫烏禮布原任黒龍江將軍世忠原任主事錫禮布花占俱原任筆帖式素著原任都察院副都御史都爾賽西達色俱原任員外郎世貴現任翰林院侍讀密山明山俱現任佐領寧古竒現任典儀明福現任前鋒侍衛額爾金現任防禦都和臣現任步軍校四世孫寧忠現任主事際良石色俱現任筆帖式五福現任鳴贊烏靈阿烏本阿俱原係廕生永禄達寧阿俱現係廕生和倫現任驍騎校又兑齊巴顔之姪章什巴原任佐領楊古理由佐領以不違指授所任稱職授騎都尉卒其孫穆圖曾孫昻艾相繼承襲昻艾卒其姪孫佛保現襲職又兑齊巴顔之姪孫勒璧舒書濟馬虎俱原任佐領曽孫克齊原任佐領蓀塔由䕶軍校從征雲南貴州於磨盤山擊賊陣亡贈雲騎尉其子綏哈承襲從征廣西雲南等處在石門坎黄草壩地方屢著戰功優授騎都尉兼一雲騎尉卒親弟蘇明承襲因病乞休親伯之孫蘇郎阿現承襲又兑齊巴顔之姪元孫卓爾海原任内大臣兼佐領同齊保原任佐領四世孫同綏現任佐領又兑齊巴顔之姪旺格由閒散從贈騎都征瀋陽步戰陣亡優初次過北京征山東擊敗尉其子哈爾薩承襲陸軍門兵又攻克慶都縣敘功加一雲騎尉卒其弟根特承襲遇恩詔加至一等輕車都尉卒其子馬哈達承襲縁事革退其弟六格襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉又兑齊巴顔之姪孫察巴海由閒㪚從征北京攻永平府陣贈騎都亡優子察達海承襲定鼎燕京時加一雲騎尉尉其恩詔加三遇等輕車都尉卒其子黒色承襲從征湖廣至一於長沙府地方擊偽將吳國貴兵數萬餘衆以功加一雲騎尉卒其子偉陀保承襲卒無嗣其姪孫善拔現襲職又兑齊巴顔之姪孫繆什渾原任協領曽孫六十原任員外郎阿克敦原任鳴贊通塞原任步軍校元孫保善原任中書馬錫禮現任步軍校四世孫巴西蘭原任中書常智現任二等䕶衛福勒渾現任防禦陸什現任驍騎校阿格巴顔鑲紅旗人兑齊巴顔之弟也初娶章佳地方杭佳章京之女為妻適遇我兵圍城杭佳章京令阿格巴顔助力阿格巴顔云此乃有徳之主誅爾兇亂我不惟不助力即一矢亦不肯發已而率瓦爾喀什部屬來歸因授其長子阿蘭珠為扎爾固齊管佐領阿蘭珠於征烏喇時身已被創直前衝入至顛仆不退益奮勇前擊殁於陣優贈三等男其弟布蘭珠承襲縁事降為三等輕車都尉弟布爾喀承襲駐防牛庄因追䝉古逃人折足恩詔加授為二等輕車都尉卒其兄之子譚泰承襲遇至一等輕車都尉卒其子圖理承襲兩遇恩詔加至三等男卒其親兄之子齊勒承襲年老乞休其子忠海襲職時削去恩詔所加之職承襲二等輕車都尉卒其子海崇阿承襲現任佐領後布蘭珠