body:
  text: 八旗滿洲氏族通譜目録卷六十八附載滿洲旗分内之䝉古姓氏烏新氏昂靄昂阿以上俱有傳謨泰布楞泰以上俱附載把岳忒氏諾爾布巴爾阿齋耨克以上俱有傳克什克諾爾蓀烏薩齊濟雅泰克特班札克渾鄂濟拜卓理外庫忠克諾爾布逹史巴顔齊南泰索爾和濟賴錫泰阿爾瑚圖範泰法莽阿巴珠納阿爾圖綽克托謨和托巴顔洪恵博爾和瑚岱巴哈逹以上俱附載科本氏巴朗右係有傳優陞右係附載佟尼果特氏圖爾噶圖右係有傳阿穆尼普塔斯氏唐古泰右係有傳布魯特氏托謨渾右係有傳烏濟吉特氏烏巴璽右係有傳文圖蓀白奇瀋揚巴逹穆札阿蘭圖以上俱附載劉佳氏劉柱右係有傳誠德右係附載翁科特氏班布海右係有傳錫喇奇塔特烏納海六十西爾拉岱齊格薩穆岱察漢羅思以上俱附載烏齊喜特氏竇濟右係有傳多鼐劉塔逹爾漢逹賴定柱以上俱附載兀魯特氏拜琥賚右係有傳阿爾古阿巴哈沙岱阿穆哈都吳什喜巴章武以上俱附載庫布特氏格梅右係有傳額森圖諾穆齊車本泰逹都爾丹巴巴朗拜岳絡以上俱附載龔吉爾氏巴拜右係有傳拜桑和尼齊以上俱附載布爾哈齊氏鄂通右係有傳伊圖黙氏阿哈麻色右係有傳鄂卓氏薩穆哈右係有傳威古特氏哈逹漢右係有傳吹霍克親氏逹蘭右係有傳鄂爾圖特氏耨德右係有傳完顔氏逹賚右係有傳海佳氏海潮龍右係有傳扣懇氏諾米徹沉右係有傳烏亮海氏庫布克壯圖以上俱有傳巴得馬右係附載札拉爾氏巴圖右係有傳古穆特古以上俱附載欽定四庫全書
