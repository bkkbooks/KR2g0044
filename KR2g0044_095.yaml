body:
  text: 八旗滿洲氏族通譜卷四十七伊拉理氏伊拉理為滿洲一姓其氏族散處於烏喇葉赫殷及各地方烏喇地方伊拉理氏額禮懇鑲藍旗人世居烏喇地方本姓納喇自其祖圖魯倫移居伊罕阿林城因改姓伊拉理氏國初来歸編佐領使統之其子穆爾泰原任協領額爾特由䕶軍校二次過北京征山東攻定陶縣不設雲梯第二登城又追流寇征四川俱有功授雲騎尉三遇恩詔加至三等輕車都尉年老告退其子達爾泰襲職歴任副都統兼佐領卒其子阿濟蘭襲職卒其恩詔所子博爾遜襲職時削去額禮懇之姪西特庫由加之職現襲雲騎尉又閒散二次過北京征山東梯攻曹州第二登城克之授雲騎尉三遇恩詔加至三等輕車都尉任協領卒其子西孟格襲職卒其子西爾們襲職緣事革職未襲乾隆元年特恩䝉復賜雲騎尉其子福特現承襲又額禮懇之孫阿山原任江南江西總督刑部尚書兼佐領蘇赫徳原任員外郎蘭登原任防禦根登原任主事雅爾泰原任助敎曾孫蘇納海原任䕶軍參領圖海原任員外郎蘇納布努山瑪濟蘭俱原任郎中法三原任鴻臚寺少卿兼佐領法敏原任山東巡撫法德原任三等侍衞積善原任江西按察使伊布原任䕶軍參領伊圖蘇海俱原任筆帖式富祿原任䕶軍校謨多理原任驍騎校元孫蘇爾布原任洗馬蘇爾德原任郎中釋迦保原任三等䕶衛佛保原任通政使司通政使常有原任户部侍郎兼副都統德勝現任員外郎圖拉原任員外郎伊希徳現任典籍五格現任贊禮郎寶銘現任防禦色克圖現任驍騎校福德現任員外郎兼佐領福基現任員外郎圖興原任同知福亮彌勒保俱現任筆帖式伊唐阿達賴俱現任驍騎校蘇眀蘇達色福恒俱原任筆帖式伊棟阿富賴神保俱原係監生四世孫伊正泰原任主事薩哈璉原任山西布政使欣泰原任員外郎蘇章阿積行俱現任内閣侍讀圖玉現任筆帖式伊滿現任六品官二保現任贊禮郎圖璽現任同知伊敏現任筆帖式伊倫原係庫使蘇崇阿原係舉人按額禮懇與本旗輝發地方伊克騰同族莽檢正白旗包衣人額禮懇同族世居烏喇地方来歸年分無考其孫遜達理原任上駟院大臣兼佐領蘇岱原任䕶軍校元孫渾塔現任七品官四格現任驍騎校四世孫常祿現任䕶軍校阿山國鑲白旗人世居烏喇地方騎校從征江西廣西初来歸其子圖林帕由驍等處屢敗賊李茂著范齊韓等兵續征雲南敗賊偽將何繼祖等兵於石門坎黄草壩敘功優授騎都尉卒其子佛保孫羅甘相繼承襲以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲紅旗薩哈布其子拖羅順原任協領孫拖理原任防禦拖新原任藍翎侍衛右世居烏喇地方係國初来歸之人葉赫地方伊拉理氏達哈那鑲黄旗人世居葉赫地方天聰時来歸其子丹岱由佐領二次往北京率領䕶軍攻取邊城又梯攻安肅縣城克之授雲騎尉二次圍錦州屢敗松山杏山兵敘功授為騎都尉兼一雲騎尉贈為一後擊洪承疇兵陣亡優哈塔承襲三遇等輕車都尉以其子達恩詔加至二等男厯任理藩院侍郎卒其子硜特襲職任䕶軍參領卒其子納仆襲職時削去恩詔所加之職承襲一等輕車都尉卒其親伯之子圖薩圖襲職現任佐領又達哈那之曾孫福喀達原任三等侍衛碩格色原任郎中西爾登原任内閣學士兼禮部侍郎元孫伊密特現任六品官靈泰原任筆帖式親達瑚鑲黄旗人世居葉赫地方天聰時来歸由佐領定鼎燕京時入山海關擊流賊馬步兵二十萬恩詔加衆又追至慶都縣大敗之敘功授騎都尉遇江一雲騎尉卒其次子沙納海襲職歴任黑龍恩詔所將軍卒其子塔塔善襲職時削去查爾岱現襲加之職承襲騎都尉卒其兄之子職又親達瑚之長子巴圖原任䕶軍統領第三子郭禮原任二等侍衛第四子佛隆果原任八品官第五子黄茂原任内閣學士兼禮部侍郎第六子薩林原任七品官孫綽啟原任佐領色倫三柱俱原任員外郎鄂欣現任佐領那海原任員外郎沙圖蘭現任筆帖式德克秦衆神保圖爾彬俱原任筆帖式納山現係監生曾孫明通現任三等侍衛兼佐領瑪爾吉現任主事伏魔保現任䕶軍校鄂凱現任筆帖式巴什原任筆帖式薩爾都鑲黄旗人世居葉赫地方天聰時来歸其曾孫滿泰原任員外郎元孫阿哈泰由委署章京從征貴州回兵時於鎮江府擊敗海寇鄭成功兵敘功授雲騎尉卒其子寳善襲職從征厄魯特噶爾丹有功授為騎都尉任䕶軍參領卒其子吳雲圖襲職又薩爾都之元孫温達理原任員外郎年爾原任步軍校色赫偏鼎俱原任驍騎校新達理原任步軍校舒書原任筆帖式四世孫瓦爾達原任佐領吳格色原任内閣學士兼禮部侍郎烏拉岱原任員外郎精格理原任五品官多博海巴爾遜俱原任筆帖式五世孫吴羅圖原任郎中滿色現任驍騎校英泰現任五品官三德蘭圖武什坦俱原任筆帖式六世孫烏密泰原任筆帖式都喀禪國鑲白旗人世居葉赫地方任中書元孫齊什原初来歸其曾孫納郎阿原任䕶軍校伊朋額原任筆帖式薩爾納由委署䕶軍校從征雲南屢敗賊偽將何繼祖等兵於石門坎黄草壩地方敘功授雲騎尉後征厄魯特噶爾丹有功授為騎都尉卒其子增綬襲職緣事革退其弟四格現襲職又都喀禪四世孫瑪色現任佐領納爾賽現任二等䕶衛由鑲黄旗改隸喀寧阿國鑲白旗人世居葉赫地方䕶軍校從征雲南於初来歸其孫六十由委署贈雲騎銀錠山擊賊陣亾克濟訥相繼承襲又喀寧阿尉其子二格孫德之曾孫胡什巴原任佐領瑪色原任三等䕶衛穆爾泰原任䕶軍校元孫伊三泰現任三等䕶衛富有現任䕶軍校富爾賽原任驍騎校伊晉泰原任筆帖式哈爾哈國鑲白旗人世居葉赫地方任郎中元孫搆色原初来歸其曾孫賽音達原任筆帖式四世孫阿爾泰現任䕶軍統領福柱菩薩保俱現任䕶軍校庫爾當阿正黄旗人世居葉赫地方天聰時来歸其曾孫正庫訥原任内閣學士兼禮部侍郎布顔原任八品官元孫鎮泰原任内閣侍讀學士常書原任弓匠協領花色原任驍騎校常綬原任筆帖式四世孫岳鼐原任二等䕶衛来保六格俱原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗鶴尚其子搜色原任員外郎華色原任步軍校孫珠瑪拉祿綬俱原任中書瓦色原任筆帖式今隸本旗蒙古旗分包衣納齊布其孫米哈那原任廐長烏努春華善俱原任牧長曾孫穆爾渾原任筆帖式以上俱世居葉赫地方係来歸年分無考之人殷地方伊拉理氏羅拖國正藍旗人世居殷地方驍騎校曾孫寧格理原初来歸其孫屯積原任任步軍校德爾德原任䕶軍校三格色原任驍騎校哈奈由驍騎校從征福建擊賊陣亡贈雲騎尉以其子完達理承襲任三等䕶衛卒其弟之子札哈達襲職現任佐領又羅拖之曾孫夸克西由佐領從征貴州廣西等處屢敗賊衆又征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩地方敘功優授騎都尉卒其子開保襲職卒其子福成現襲職又羅拖之元孫勒徳原任員外郎星格理原任待詔安圖現任協領彰保住原任驍騎校雲圖原係副䕶軍校四世孫伊新原任員外郎伊泰現任鳴贊納郎阿國正藍旗人羅拖同族世居殷地方衛朱赫訥由初来歸其孫蘇赫訥原任三等侍領催初過北京征山東梯攻故城縣第二登城克之授雲騎尉卒其子穆都臣襲職三遇恩詔加至三等輕車都尉從征廣東於新㑹縣擊敗賊李定國兵敘功授為二等輕車都尉卒其子穆爾佳襲職緣事革退其子寧古塔珠全保先後承襲珠全保卒其子清寧襲職時削去恩詔所加之職承襲騎都尉卒其親叔之子清平現襲職蘇爾都國正藍旗人羅拖同族世居殷地方海關擊敗流初来歸由佐領定鼎燕京時入山恩詔加賊馬步兵二十萬衆敘功授雲騎尉三遇襲職至三等輕車都尉任參領卒其子吳爾都任郎中兼佐領卒其子吴爾賽襲職卒其兄之子百啟襲職時削去恩詔所加之職承襲雲騎尉任佐領卒其子温竒襲職任佐領卒其子啟通阿現襲職又蘇爾都之孫温達爾庫原任筆帖式曾孫吳爾賽原係生員圖郎阿國正藍旗人羅拖同族世居殷地方尚書四世孫初来歸其元孫索諾和原任兵部圖爾瑚原任主事索保現任步軍校索柱原任三等䕶衛蘇爾瑚索拜俱原任筆帖式五世孫蘇赫臣原任給事中以上俱係應立傳之人其餘無事蹟可立傳者附載於後正藍旗瑪克星阿羅拖同族其孫對親原任佐領曾孫登特原任防禦薩穆蘇羅拖同族其曾孫雅哈納原任佐領四世孫特克新原任筆帖式瑚西屯羅拖同族其孫謨絡原任三等䕶衛曾孫渾泰原任前鋒校瑚爾泰原係監生元孫達漢原任驍騎校琥爾巴羅拖同族其孫郭賚原任䕶軍校曾孫雙来現任步軍校元孫鄂岱現任䕶軍校以上俱世居殷地方係國初来歸之人各地方伊拉理氏布理哈納鑲紅旗人世居蜚悠城地方来歸年分無考其孫吉蘇喀原任驍騎校曾孫阿囊阿由佐領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆追滕吉思擊敗土謝圖汗及碩羅汗等兵有贈為騎功授雲騎尉後於東昌府擊土寇陣亡都尉以其子阿岱承襲三遇恩詔加至二等輕車都尉卒其子阿晉泰襲職卒其子德海襲職任佐領卒其子瑪清阿襲職時削去恩詔所加之職承襲騎都尉任三等侍衛又布理哈納之元孫謨簡原任典儀編都原任佐領固勒納現任驍騎校四世孫保柱現任前鋒參領兼佐領常金保現任副䕶軍參領札哈理現任䕶軍校巴爾納現任步軍校福綬原任防禦巴賴原係監生邁堪鑲紅旗人布理哈納同族世居蜚悠城地方来歸年分無考其子衮泰由驍騎校從征江西湖贈雲騎廣等處於来龍山擊賊陣亡常貴綬現襲職尉以其子常在承襲卒其子晉達理國正紅旗人世居德爾吉河地方北京征山東梯初同兄阿密達来歸由閒散過恩詔加攻容城縣第二登城克之授雲騎尉三遇子什至三等輕車都尉卒其子華色襲職卒其恩詔所格襲職時削去騎尉現任加之職承襲雲陵寢翼長圖郎阿正黄旗人世居訥殷江地方天聰時来歸其六世孫岳丹由副䕶軍參領從征凖噶爾在和通贈雲騎呼爾哈腦爾地方擊賊陣亡阿之六世孫拉達尉其子永善現襲職又圖郎哈現任藍翎侍衛巴格現任防禦楊桑阿現任親軍校八十五現任筆帖式七世孫福順現任防禦阿普達理國鑲黄旗人世居哈爾敏地方䕶軍校四世孫賽初来歸其元孫索爾端原任納原任員外郎鍾義現任筆帖式常阿原任筆帖式果保住齊格俱原任驍騎校福達理由委署參領取昭定藏著有勞績授雲騎尉卒其子阿魯襲職現任三等侍衛又阿普達理之五世孫索柱觀音保雅圖俱原任員外郎謨思泰現任三等侍衛常保六十三俱原任䕶軍校鉄思泰原任前鋒校六世孫栢嵗原任七品官達蘭轄國正藍旗人世居赫石地方委署驍騎校從征江初来歸其曾孫吴沙理由西湖廣等處屢敗賊衆續征雲南於武磨山擊敗賊偽將馬寶兵敘功授雲騎尉年老告退其弟之孫索本泰現襲職清吉納國正黄旗人世居瀋陽地方任步軍校五十巴原初来歸其元孫瑚什巴原任䕶軍校雅圖由筆帖式差往貴州在鎮逺府遇難盡節贈雲騎尉其子留保柱孫栢色相繼承襲又清吉納之四世孫三保現任親軍校隆安保現係副驍騎校善棟原係副驍騎校伊克騰國鑲藍旗人世居輝發地方驍騎校曾孫魏赫訥初来歸其孫索特海原任原任廣州副都統索爾璧原任内閣侍讀學士凖布魯原任驍騎校達色原任城門尉元孫伊齊巴原任郎中額爾特原任佐領留什法爾泰俱原任員外郎瑪哈泰伊理布魁古理俱原任䕶軍校安泰原任筆帖式四世孫瑪爾吉原任郎中桑格現任驍騎校伊敏豐盛格俱原任筆帖式五世孫伊明阿現任八品官石柱現任筆帖式佛章現係生員按伊克騰與本旗烏喇地方額禮懇同族滿岱國鑲白旗人世居輝發地方肅巡撫孫吉隆阿原初来歸其子舒書原任甘任司庫由正黄旗改隸以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗瑚雅長白山地方人其曾孫林泰現任驍騎校阿隆阿倉地方人其孫昻金泰原任驍騎校正白旗彰齊虎爾哈烏喇地方人其子金布原任員外郎孫鐘福現任驍騎校博爾和現任筆帖式瑚璧圖阿喇地方人原任步軍校正紅旗穆成額長白山地方人其孫蘇赫訥原任驍騎校鑲白旗啟泰輝發地方人其子巴瑚岱原任佐領孫輝納亦原任佐領曾孫禪岱原任郎中錫三泰原任筆帖式兆敏原任驍騎校元孫伊明德現任五品典儀由正黄旗改隸福喀吉林烏喇地方人原任驍騎校其孫席圖現任佐領由正白旗改隸瑚什巴吉材烏喇地方人原任防禦由正白旗改隸鄂和訥札庫塔地方人其子伊福訥原任驍騎校孫偏圖原任筆帖式呉爾精阿輝發地方人其子卓和理原任驍騎校孫達岱亦原任驍騎校瑚理巴原任䕶軍校曾孫賚達原任驍騎校巴格現任䕶軍校麻色原係副䕶軍校由正黄旗改隸鑲紅旗和伸英額地方人其孫吳達禪原任防禦吳爾瑚多爾吉河地方人其孫常祿原任䕶軍校曾孫塔布那現任驍騎校鑲藍旗舒書輝發哈達地方人其曾孫佛爾泰原任六品官都本原任䕶軍校元孫達齊蘭原任驍騎校四世孫謨楞格現任頭等䕶衛吴達海哈達地方人其孫瑚什巴原任驍騎校曾孫瑚倫保原任員外郎岱柱哈達地方人其子拉巴什原任防禦孫官董原任䕶軍校呉達禮原係副䕶軍校曾孫西孟格現任中書賽碧喀哈爾敏地方人其子諾齊原任三等䕶衛孫西克訥原任驍騎校德特赫原任三等䕶衛元孫蓋周現任䕶軍校石達海原任驍騎校克穆尼多爾吉河地方人其孫齊什四現任前鋒校丹布祿葉赫哈達地方人其四世孫阿爾特原任䕶軍校五世孫安平原任驍騎校七世孫伊時泰現任驍騎校二格達賴俱原任䕶軍校富拉禪原任筆帖式吉雅納多爾吉河地方人其曾孫拜達色現任驍騎校舒舒葉赫哈達地方人其五世孫瑪拉喜原任驍騎校六世孫巴什現任䕶軍校羅什卦爾察地方人原任鐵匠協領其子三成亦原任鐵匠協領以上俱係國初来歸之人鑲黄旗翁古哈達地方人其孫華色原任八品官正黄旗屯布祿輝發地方人其孫官保原任郎中曾孫福保哈賴俱原任筆帖式英格原任䕶軍校元孫薩穆喀雅齊納内格俱原任驍騎校福拉納原任䕶軍校四世孫思明現任䕶軍校岳爾璧訥殷江地方人其孫巴錫納原任郎中長赫原任驍騎校鑲紅旗福盛額輝發地方人其元孫豐色現任步軍校赫達色原任䕶軍校四世孫齊格原任署䕶軍參領珠楞額輝發地方人原任六品典儀其子恭保原任䕶軍校德穆貝安褚拉庫地方人其曾孫額爾金現任筆帖式顔布祿輝發地方人其曾孫固納理原任前鋒校元孫伊成格倭齊訥俱原任筆帖式以上俱係天聰時来歸之人正黄旗吳岱赫舎里河地方人其曾孫薩哈爾齊現任䕶軍校正白旗愛瑪達長白山地方人其曾孫尼哈原任筆帖式元孫伊福現任驍騎校包衣郭博理長白山地方人其子桂岱郭克濟俱原任内管領羅克什原任藍翎侍衛孫鄂都理原任司庫永保原任筆帖式曾孫萬圖庫現任䕶軍校賚圖庫現任主事凱丕蘇蘇烏喇地方人原任廐長鑲紅旗羅岱輝發地方人其孫伍什原任䕶軍校曾孫羅密德現任驍騎校吳三泰蜚悠城地方人其子尼雅哈原任驍騎校正藍旗哈穆布赫石地方人其孫黑格現任驍騎校以上俱係来歸年分無考之人正黄旗額赫訥赫舎里地方人右係康熙時自科爾沁撤回之人八旗滿洲氏族通譜卷四十七
