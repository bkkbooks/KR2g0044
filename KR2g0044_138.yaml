body:
  text: 八旗滿洲氏族通譜目録卷六十九附載滿洲旗分內之䝉古姓氏寶濟氏鄂鼐顧祿古諾木齊白第察爾岱傅爾建阿爾詹滿津氏巴雅鼐海塞鐸松鄂哈喇丹岱鐸博碧禮克博爾濟斯氏䝉格圖華顔班第德爾格斯額斯赫僧格梅楞巴雅喇氏圖賴滿珠習理碩布顧祿古鄂博特博羅特博碩氏端爾塞楞善積巴拜烏拉岱塞克圖氏晉保和托齊賽濟圖常噶岱卓特氏珠布式葉武巴逹理庫圖齊沙瑚塔納賴氏逹都瑚庫蘇爾岱桑格博爾濟氏逹賴海塞幹生葉何氏班第納穆岱賴塞耨勒特氏額穆蘇布顔圖特黑烏蘭氏齊齊克滿逹理丹岱李佳氏阿賽黃臘瑪佳氏瑪逹爾布岱鄂爾濟斯氏杜噶爾岱綽啓理張佳氏七十瓦騧博爾濟克氏額塞孟福肇佳氏珠蘭泰博爾絡岱博絡氏鄂托倫卓吉齊穆克氏巴喜碧禮克黃古臺氏謨談巴賴阿拉克塔氏果古額布格德布楞都爾本氏額爾蓀白奇特沙喇圖魯騰氏恩鐸額爾濟圖奈曼氏達犖額克順白佳氏瑪載鐸爾濟納喇氏衮布珠瑪喇唐古爾氏唐武玉泰奇壘氏尼噶理班逹爾錫巴雅克氏叟塞伊懇烏理津氏錫喇普囊蘇鄂屯阿魯特氏古魯盧濟敦督察哈爾氏布音圖卓鐸巴克爾德氏圖倫白逹理錫訥楚克氏阿齊圖䝉格圖逹喇明安氏鄂巴朝保鄂密特氏鄂璧爾巴爾烏勒布懇洽特氏錫理德克諾木圖錫訥特氏椿晉恩克吳喇忒氏哲美孟格圖雅蘇氏黃華爾圖特普施墨爾吉濟特氏黃茂班第吉禮圖氏阿理雅喀喇巴克什欽定四庫全書八旗滿洲氏族通譜目録卷六十九附載滿洲旗分內之䝉古姓氏寶濟氏鄂鼐顧祿古諾木齊白第察爾岱傅爾建阿爾詹滿津氏巴雅鼐海塞鐸松鄂哈喇丹岱鐸博碧禮克博爾濟斯氏䝉格圖華顔班第德爾格斯額斯赫僧格梅楞巴雅喇氏圖賴滿珠習理碩布顧祿古鄂博特博羅特博碩氏端爾塞楞善積巴拜烏拉岱塞克圖氏晉保和托齊賽濟圖常噶岱卓特氏珠布式葉武巴逹理庫圖齊沙瑚塔納賴氏逹都瑚庫蘇爾岱桑格博爾濟氏逹賴海塞幹生葉何氏班第納穆岱賴塞耨勒特氏額穆蘇布顔圖特黑烏蘭氏齊齊克滿逹理丹岱李佳氏阿賽黃臘瑪佳氏瑪逹爾布岱鄂爾濟斯氏杜噶爾岱綽啓理張佳氏七十瓦騧博爾濟克氏額塞孟福肇佳氏珠蘭泰博爾絡岱博絡氏鄂托倫卓吉齊穆克氏巴喜碧禮克黃古臺氏謨談巴賴阿拉克塔氏果古額布格德布楞都爾本氏額爾蓀白奇特沙喇圖魯騰氏恩鐸額爾濟圖奈曼氏達犖額克順白佳氏瑪載鐸爾濟納喇氏衮布珠瑪喇唐古爾氏唐武玉泰奇壘氏尼噶理班逹爾錫巴雅克氏叟塞伊懇烏理津氏錫喇普囊蘇鄂屯阿魯特氏古魯盧濟敦督察哈爾氏布音圖卓鐸巴克爾德氏圖倫白逹理錫訥楚克氏阿齊圖䝉格圖逹喇明安氏鄂巴朝保鄂密特氏鄂璧爾巴爾烏勒布懇洽特氏錫理德克諾木圖錫訥特氏椿晉恩克吳喇忒氏哲美孟格圖雅蘇氏黃華爾圖特普施墨爾吉濟特氏黃茂班第吉禮圖氏阿理雅喀喇巴克什
