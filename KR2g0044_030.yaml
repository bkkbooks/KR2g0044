body:
  text: 八旗滿洲氏族通譜卷十四瓦爾喀地方伊爾根覺羅氏赫臣國正黃旗人世居瓦爾喀地方初偕族衆來歸奉命往羅多羅和部落招降其衆時葉赫抗命復奉慨奮命往撫為葉赫所拘威凌勢迫以期其降赫臣慷太祖高罵誓死不屈遂被害天命四年葉赫既平濟交皇帝追憫赫臣前勳將葉赫大臣沙津台與其子克福刃之以酬父怨以慰忠魂仍以盡節功令其子克福管佐領事天聰八年以克福辦事有能不違指使授騎都尉擢吏部理事官圍錦州時有諾木齊率家屬自明地來歸為敵兵所困克福奮勇殺入翼之以出復略錦州地直至城南斬獲甚衆敘功賞賜人畜銀兩位克福與內兩旗大臣等相約矢志公世祖章皇帝即恩詔加忠共為誓章兩遇任至三等輕車都尉陵寢總管卒其孫凱音布襲職康熙十年揀選材能特授御史厯升禮部侍郎奉命往廣東審理苖蠻讞決明允加議政大臣尋升戶部尚書後以年老乞休奉旨原官致仕卒其次子喀爾吉善襲職時削去賜祭葬如典禮恩詔所加之職承襲騎都尉現任山東巡撫又赫臣之孫托爾弼原任佐領達德由委署參領從征雲南擊賊有功授雲騎尉卒無嗣其親伯之孫扎祿襲職任佐領又赫臣之元孫常山原任贊禮郎四明原任員外郎兼佐領圖密善原任郎中四世孫定長現任內閣侍讀兼佐領定敏現係生員定安現係監生又赫臣之族裔齊納哈原任步軍校沙那哈珠琉俱原任防禦碩色原任佐領羅密原任驍騎校福保原任給事中明德費揚古伊錫泰俱原任筆帖式楞布鄂彭俱原任護軍校七十索柱俱原任驍騎校鄂昌原任御史扎爾瑚現任防禦烏爾泰原任筆帖式烏什泰現任司獄富昌原任筆帖式佛昌原任三等侍衛喀齊蘭正黃旗人赫臣之孫克福之子也初襲佐領旋擢吏部理事官從征浙江舟山大敗賊衆獲紅衣等炮後征湖廣招降甚衆獲軍器無算厯任副都統卒賜祭葬如典禮其次子法保原任副都統第三子關布原任郎中第四子達爾漢由委署護軍參領從征厄魯特噶爾丹著有勞績授雲騎尉卒其子德林襲職現任三等侍衛又喀齊蘭第五子晉布原任郎中第六子阿薩那原任錦州副都統兼大凌河總管第七子默祿原任二等侍衛第十子八十五現任筆帖式孫查海長在查賚阿爾岱德綬俱原任筆帖式海常原任佐領常格原任員外郎常祿現任防禦三圖現任御史海寧現任佐領敦拜同圖俱現任筆帖式曾孫增福現任防禦永全現任佐領滿岱現任司庫滿貴現係生員卓禮喀國正黃旗人赫臣同族世居瓦爾喀地方厯任初來歸其孫伊桑阿順治乙未科進士聖祖文華殿大學士兼吏部尚書後以年老乞休重老仁皇帝謂大學士阿蘭泰曰伊桑阿為人厚成辦事年久爾二人自任大學士以來不生事端凡事推誠從公料理不獨朕知之天下無不知者非尸位素餐者可比伊桑阿雖以年老求罷朕不忍令去也欽此四十一年復以年老乞休奉旨卿品行端凝才識敏練自簡任機務以來鎮靜和平實心盡職勤勞歲久準以原官致仕仍著加意調攝賜以副朕篤念老臣之至意欽此尋卒子伊都善原任祭葬如典禮諡文端立碑墓道其長副都統次子伊克善現任御史第三子伊都立原任山西巡撫孫福鼐原任筆帖式福增額現係和碩額駙明福現任員外郎伊倫現任筆帖式又伊桑阿親兄璧桑阿之長子逹敏原任頭等侍衛次子賽弼圖原任防禦第三子旒五原任鳴贊孫逹海現任郎中善泰現任主事又卓禮喀之曾孫星保原任驍騎校景文鑲紅旗人世居瓦爾喀地方來歸年分無考其孫科思和理原任護軍校曾孫英色勒原任典儀伊拉瑚原任護軍校薩寧阿原任前鋒校元孫阿瑚納原任筆帖式伊薩祿原任前鋒校蓀達理由護軍校從征浙江福建於武功山等處擊敗賊偽將劉國軒等兵續征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉等兵於雲南城下敘功授雲騎尉卒其子文殊保襲職又景文之四世孫蘇鼐原任佐領塔寧阿原任員外郎伊巴丹原任護軍校朱爾瑚逹現任驍騎校五世孫翁鄂托殷達渾俱原任驍騎校孟昌現任前鋒校碩拜由委署驍騎校從征廣東廣西擊賊偽將范齊韓等兵屢敗之續征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉等兵於雲南城下敘功授雲騎尉任佐領年老告退其子吳達理襲職又景文之六世孫三達理原任步軍校阿三台原任親軍校阿揚阿原任護軍校七世孫西特庫原係副驍騎校帕善現係副驍騎校李保住現係副護軍校以上俱係應立傳之人其餘無事迹可立傳者附載於後正紅旗和託理其元孫珠程額原任驍騎校華色現任驍騎校四世孫珠善現任護軍校右世居瓦爾喀地方係天聰時來歸之人鑲紅旗菴卜祿其子敦達理原任主事曾孫赫勒原任步軍校右世居瓦爾喀地方係來歸年分無考之人松花江地方伊爾根覺羅氏顧喬鑲黃旗人世居松花江地方原名農達理其先世族人殷繁分居東西二寨西寨人移居虎爾哈地方改姓蒙鄂絡氏東寨人移居原籍改姓巴雅喇氏惟農達理之始祖移居近城未改原國姓至其祖科球認明族黨仍復為一姓初時農達理聞太祖高皇帝遣使百餘騎東往為賊兵所困即往援救出九人太祖嘉其功賜名科球重加賞賚復設半個佐領使統之後因科球之名與伊祖名同改名顧喬其長子顧納禪由間散從征大同攻小石城先登克之賜巴圖魯號優授騎都尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功加一雲騎尉又破流賊滅福王平定河南江南等處屢著戰功後攻杭州數敗賊衆授為三等輕車都尉卒其子恩詔授顧蘇襲職遇都尉卒其子佛嶽襲職卒無嗣其為二等輕車賜祭葬親叔顧八代襲職厯任禮部尚書卒加太傅如典禮諡文端雍正十二年特旨崇祀賢良祠十三年加襲職時削去贈太師立碑墓道其子顧儼恩詔所加之職承襲三等輕車都尉厯任副都統緣事革退其親弟顧僖襲職因病告退其親兄之子顧畨襲職卒其親伯之子顧清襲職緣事革退其弟顧純襲職現任副都統兼佐領又顧喬之次子羅多理從征雲南有功授雲騎尉卒無嗣其親兄之孫顧侃襲職又顧喬之孫依素由七贈雲騎品官從征廣東擊賊偽將馬雄等兵陳亡之曾尉其子顧俊孫哈克散相繼承襲又顧喬孫顧儀原任郎中元孫顧謙原任筆帖式顧泰現任三等侍衛顧琮現任漕運總督顧珽現任主事顧齊現任五品官顧珊現任員外郎顧繼祖現任筆帖式四世孫顧世衡亦現任筆帖式雅爾布鑲黃旗人顧喬同族世居松花江西塞地方後移居虎爾哈地方改姓蒙鄂絡氏至其族祖科球認明族黨仍復原姓天聰時來歸往取博濟理并降其村衆七百人以功授騎都尉卒無嗣恩詔加其親弟翁阿岱襲職三遇子齊蘭布襲職卒其至二等輕車都尉卒其長恩詔所子玉代襲職卒其子特克慎襲職時削去翁阿加之職承襲騎都尉卒其子德福現襲職岱之次子和合理原係監生孫蓀保住原任筆帖式曾孫彰蘇莽蘇巴彥俱現任筆帖式又雅爾布之族裔達碩色原任七品官伸福現任協領蘇寧阿鑲黃旗人顧喬同族世居松花江東寨地方後改姓巴雅喇氏至其族祖科球認明族黨仍復原姓天聰時來歸原任二等侍衛其子精尼喀由三等侍衛從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉等兵於雲南城下敘功優授騎都尉卒其子精阿理襲職卒其親兄精錫襲職卒其親弟高幹現襲職又蘇寧阿之孫蘇爾圖現任筆帖式曾孫希賢現係生員以上俱係應立傳之人其餘無事迹可立傳者附載於後正藍旗華色原任驍騎校右世居松花江地方係來歸年分無考之人阿庫里地方伊爾根覺羅氏竒雅穆國鑲紅旗人世居阿庫里地方諾多禮原任護軍初來歸原任三等侍衛其子校孫竒努由間散從征山西攻芮城縣首先登城克之賜巴圖魯號優授騎都尉兩遇四川於朝天關等處擊恩詔加至三等輕車都尉後征敗賊偽總兵石存禮等馬步兵授為二等輕車都尉卒其子胡世霸襲職從征厄魯特噶爾丹於昭莫多地方奮勇敗賊有功授為一等輕車都尉厯任都統卒其子塞爾古德襲職時削去恩詔所加之職承襲三等輕車都尉卒其子立柱襲職時削去詔後軍功所得之職現襲騎都尉又竒雅穆之曾孫胡世圖原任都統都世圖塔郎阿俱原任佐領元孫常明現任護軍校喜柱現任員外郎赫達色現任驍騎校胡成額國鑲藍旗人竒雅穆同族世居阿庫里地方都喀初來歸其元孫屯多原任護軍校四世孫士原任博士五世孫海塞原任挈壺正滿都原任工部尚書夸柱原任護軍校六世孫禮柱原任中書同泰原任郎中春山壬辰科進士翰林院庶吉士前內閣學士兼禮部侍郎佐領現任盛京兵部侍郎七世孫塔鈕原任佐領明保現任員外郎鶴年丙辰科進士翰林院庶吉士現任國子監司業八世孫塔色納現任護軍校以上俱係應立傳之人其餘無事迹可立傳者附載於後正黃旗法克圖其曾孫章保原任藍翎侍衛扎素現任三等侍衛穆克德什現任藍領侍衛鑲紅旗塔靈阿竒雅穆同族其六世孫董智現任驍騎校和隆武現任副護軍參領奪魁現任八品官鑲藍旗伊普星阿竒雅穆同族原係雲騎尉其子西柱孫索爾和俱原係雲騎尉以上俱世居阿庫里地方係國初來歸之人佛阿拉地方伊爾根覺羅氏塞楞鄂哈思虎國鑲黃旗人世居佛阿拉地方軍校愛滿由郎中初來歸其元孫索達原任步從征浙江舟山擒賊有功授騎都尉卒無嗣其親兄之孫華色襲職又塞楞鄂哈思虎之四世孫蓀屯蘇克薩納俱原任護軍校噶薩理原任荆州副都統本托和原任驍騎校烏克松阿原任防禦安泰由護軍校從征凖噶爾在和通呼爾哈腦爾地方奮勇擊賊陳亡贈雲騎尉其子德興現襲職又塞楞鄂哈思虎之五世孫華善原任甘肅巡撫頗亷原任防禦黑色原係監生庫庫理現任護軍校蘇理現任防禦六世孫德鄭福謙俱原任員外郎瑪思泰原任三等侍衛阿濟理現任護軍參領福爾泰現任驍騎校七世孫達色現任護軍校兆德現任六品盛官德新現任八世孫德賢現任筆帖式京工部侍郎福喀正黃旗人世居佛阿拉地方來歸年分無考其曾孫沙納海由驍騎校從征凖噶爾在和通呼贈雲騎爾哈腦爾地方奮勇擊賊陳亡尉其子關保現襲職以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗包衣凱起原任牧長其曾孫蘇赫訥現任頭等侍衛郎中兼佐領哲庫訥現任司庫正黃旗噶哈其孫察爾岱原任給事中蘇克察祿原任員外郎曾孫丑和現任步軍校阿靈阿原任藍翎侍衛正紅旗喀爾齊其元孫桓塔原任御史達岱綽英額俱原任防禦額塞原任驍騎校福達齊原任弓匠協領拉巴原係監生四世孫巴爾都原任筆帖式綽錫禧原任護軍校伊蘭住原任驍騎校五世孫瓦星阿原任佐領阿庫達原任步軍校屯瑚原任驍騎校阿納塔現任驍騎校六世孫胡海原任郎中桑格原任筆帖式察海現任護軍參領福海成海俱現任筆帖式德明現任主事七世孫定福現任筆帖式定柱瑚蘭泰俱現係監生八世孫傅起現任筆帖式按喀爾齊與正黃旗賴布村地方薩琥同族阿尼庫其曾孫納喀布原任步軍校元孫齊軾原任驍騎校四世孫雅福亦原任驍騎校鑲紅旗瑪晉泰其子巴爾吉原任前鋒校孫阿禮善原任防禦章武原任主事桑鼐現任驍騎校曾孫章鼐現任司庫丹達理其子蘇克晉原係生員孫齊格原任防禦曾孫碩爾吉那原任鳴贊四格現係副驍騎校阿爾布哈其曾孫庫滿原任城門尉元孫國保原任防禦瑚爾琥其五世孫南泰原任筆帖式六世孫華色原任