body:
  text: 八旗滿洲氏族通譜卷三十三李佳氏李佳為滿洲一姓其氏族散處於扎庫木李佳和羅及各地方扎庫木地方李佳氏佟國國正紅旗人世居扎庫木地方覺善由佐領從征初來歸設佐領使統之其子葉赫及取遼東遵化昌黎諸城每次先登身被多創敘功授騎都尉往北京至灤州遇明兵攻城奮勇往援大敗其衆授為三等輕車都尉取大凌河擊敗監軍道張春兵錦州兵來援直入敵陳斬殺無算授為二等輕車都尉三次圍錦州松山騎兵來奪我紅衣炮擊却之定鼎燕京時入山海關追擊流寇被炮傷授為一等輕車都尉兼一雲騎尉遇恩詔授為三等男征山東湖廣於齊河縣地方𠞰土冦破其七寨又擒斬賊渠掃地王於恩縣又屢敗流冦一隻虎於荆州府進兵江西討叛鎮金聲桓賊黨王得仁引兵二萬餘來薄我營兩敗之賜巴圖繼抵信豐縣攻克其城授為二等男魯號兩遇恩詔加至三等子歷任都察院左都御史卒其子噶爾圖襲職卒其兄薩爾圖襲職任佐領卒其子三泰襲職任佐領卒其親伯之孫關保襲職時削去恩詔所加之職承襲三等男現任參領兼佐領又佟國之孫吉爾塔布原任都統兵部尚書議政大臣兼佐領布爾漢原任員外郎兼佐領曽孫雲岱原任委署護軍參領兼佐領本岱原任刑部侍郎兼佐領博爾屯原任筆帖式元孫黑達色原任三等護衛色赫原任副護軍參領福深原任員外郎兼佐領崇保現任佐領永柱現任筆帖式四世孫成德原任筆帖式噶哈穆國正紅旗人佟國同族世居扎庫木地方扎賽原初來歸其子布爾泰原任弓匠協領孫任步軍校薩賽由員外郎委署參領從征湖廣在茅麓山擊賊陳亡贈雲騎尉其子常德保襲職任護軍參領卒其子多理襲職又噶哈穆之曽孫甘柱原任內閣侍讀學士噶魯原任郎中雅魯莽吉圖俱原任筆帖式元孫昻吉圖原任員外郎恭成現任筆帖式阿克楚國鑲黃旗人世居扎庫木地方征大同攻新井城初來歸其孫掦愛由間散從贈騎都以第二登進殁於陳優遇尉其子雅塔理襲職三恩詔加至二等輕車都尉從征貴州回軍時遇海冦鄭成功兵擊敗之敘功授為一等輕車都尉任副都統卒其子雅爾瑚襲職任參領年老告退其子雅隆阿襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉又阿克楚之曽孫江圖原任佐領薩璧原任防禦元孫馬進泰原任員外郎馬爾賽原任防禦費雅思哈原任司庫布沙理阿爾圖俱原任筆帖式李順現任防禦四世孫赫雅圖原任主事馬山原任筆帖式顔岱國鑲黃旗人世居扎庫木地方征厄魯特噶爾丹初來歸其孫常祿由防禦從奮勇破賊有功授雲騎尉年老告退其子黑逹色襲職尋由副參領從征凖噶爾在和通呼爾贈騎都哈腦爾地方擊賊陳亡尉其子德興現襲職雅哈納國鑲黃旗人世居扎庫木地方領從征浙江擊敗初來歸其子錫賚由委署參賊偽將劉國軒兵於郭塘山續征雲南於黃草壩地方擊敗賊偽將何繼祖等兵敘功授雲騎尉卒其子鐘德襲職孫仙保現任詹事府少詹瓜納國鑲黃旗人世居扎庫木地方從征江西圍撫州初來歸其孫哈達由護軍校府城內兵出戰擊敗之又於千金坡敗賊偽將李茂著兵後偽都督夏國相等引賊萬餘在來龍山拒戰奮擊大破之敘功授雲騎尉任佐領卒其子石圖襲職又瓜納之曽孫喀郎吉原任護軍校三雅圖原任步軍校常明原任驍騎校元孫永常現任驍騎校臣柱現任筆帖式恭布祿國正白旗人世居扎庫木地方吳三桂有功授雲初來歸其子錘愛從征逆藩騎尉卒其子羅密襲職又恭布祿之曽孫蘇完柱現任驍騎校以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗蓋新其孫富拉塔原任主事竒禮原任步軍校曽孫七十保原任護軍參領元孫瑚什巴現任防禦巴海現任驍騎校正紅旗阿祝瑚佟國同族其四世孫扎福塔原任步軍校占岱原護軍校五世孫兆賴現任護軍參領東阿佟國同族其曽孫哲爾圖原任前鋒校元孫常鼐原任筆帖式赫碩色原任護軍校四世孫吳齊喀亦原任護軍校星柱現任筆帖式王錫佟國同族其孫格濟原任驍騎校蓀布祿佟國同族其孫瑚圖原任防禦薩克星阿佟國同族其元孫努赫齊原任筆帖式以上俱世居扎庫木地方係國初來歸之人正藍旗明玉其子拉哈原任護軍校華色現任三等護衛孫五格原任護軍校五格今𨽻本旗包衣右世居扎庫木地方係來歸年分無考之人李佳和羅地方李佳氏阿都都哈國鑲白旗包衣人世居李佳和羅地方參領取大初來歸其元孫鄂堪巴圖魯由護軍凌河生擒蒙古一人從征山東梯攻齊東昌邑二縣俱克其城授雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣敗之授為騎都尉平定江南攻松江府不設雲恩詔授梯克其城敘功優授為二等輕車都尉遇阿都為一等輕車都尉後以出征獲罪未襲又都哈之五世孫塞勒托代俱原任護軍校齊蘭布原任佐領六世孫旺扶亦原任佐領來存原任驍騎校圖山現任筆帖式五雅圖現任護軍校按阿都都哈與本旗德爾吉色欽地方和托費揚古同族寧古齊國正白旗包衣人阿都都哈之曽孫也初來歸太祖高皇帝特恩命入正白旗包衣以育養之後編佐領使統之任參領卒其次子努山承襲佐領從征大同越衆登城殁於陳其兄朱山承襲佐領從征皮島陳亡其第四弟吳山承襲佐領後追贈為騎敘朱山陳亡之功襲三遇都尉亦令吳山承恩詔加至二等輕車都尉卒其子舒爾圖庫襲職卒其子噶爾巴襲職卒其弟塔爾巴襲職時削去恩詔所加之職承襲騎都尉卒其親兄之子德寧襲職現任頭等護衛又寧古齊第三子蘇山由佐領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣敗之敘功授雲騎尉卒無恩詔加嗣其親弟之子舒書襲職遇德襲職卒其子永一雲騎尉任郎中卒其子常恩詔所柱襲職時削去都尉又寧古齊第五子庫山原加之職現襲騎任佐領第六子溫察原任庫掌孫薩爾查原任佐領伯爾德原任驍騎校皂格原任筆帖式曽孫噶爾明原任護軍參領法保阿密坦伊巴坦額爾金布俱現任筆帖式查蘭布明安現任主事元孫九格原任護軍校際泰現任筆帖式郭賴現任護軍校顧郎阿國鑲黃旗人阿都都哈同族世居李佳和羅地方初來歸由護軍校追勦流寇於延安府承天府贈雲騎屢著軍功後征四川擊張獻忠兵中矢陳亡尉其子穆成格襲職三遇恩詔加至三等輕車都尉卒其子賽音布襲職後緣事削去恩詔所加之職其子皂保現襲雲騎校又顧郎阿族姪伊圖原任六品官常綬原任筆帖式族孫尼喀理原任護軍校瑚什保現任親軍校曽孫三保原任員外郎元孫保住現任八品官綏占國正白旗人阿都都哈同族世居李佳和羅地方初率族衆來歸受備禦任佐領其子希達原任城守尉顔達理原任護軍校丹拜原任佐領孫勒特穆占俱原任郎中蓋達原任驍騎校曽孫官綬原任城守尉赫碩色兆旒俱原任護軍校謨絡原任頭等侍衛元孫蘇滿原任同知又綏占親兄博泰之孫伊普原任護軍校綏占親叔阿濟格費揚古之曽孫穆理庫原任防禦綏占伯祖輝和羅之四世孫五十一原任前鋒校綏占族孫勞翰原任護軍參領雅賴原任防禦賽布祿原任護軍校南濟蘭原任步軍校族曽孫羅起原任護軍統領佛保原任太僕寺少卿三格原任三等侍衛索爾和多原任佐領族元孫長綬原任郎中噶爾薩原任員外郎佛倫原任護軍參領巴格噶爾哈圖俱原任筆帖式達珠瑚國鑲紅旗人阿都都哈同族世居李佳和羅地方初率李佳等七村人來歸以所任稱職校副將太祖高銜統兵征瓦爾喀部落大獲全勝部落又獲其皇帝嘉悅賞賚甚優續征卦爾察人畜以歸預十六大臣之列其孫倭赫原任護軍校雅哈原任二等護衛曽孫鄂察原任佐領舒蓋原任二等護衛伊蘭泰原任筆帖式元孫德色福倫俱原任筆帖式恆廣現任員外郎德倫現任同知隆廣隆興俱現任筆帖式久住現任驍騎校福祿現任防禦由正白旗改𨽻楊果理國正紅旗人世居李佳和羅地方官孫田保原任初來歸其子哈爾巴原任六品驍騎校德爾肯由防禦從征逆藩耿精忠在石塘地方擊賊偽將連騰雲兵陳亡贈雲騎尉其孫薩納海襲職緣事革退其弟佛保現襲職又揚果理之曽孫常保原任郎中以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗吕敦其孫愛祿庫原任驍騎校元孫張保住亦原任驍騎校正黃旗錫琳其孫薩哈察存柱俱原任員外郎伊錫泰原任防禦曽孫雙喜現任副護軍參領永善現任主事積玉其子愛音達原任七品官正白旗進泰其子黑色原任防禦舒格原任六品官孫吳達海原任筆帖式曽孫額森特發克晉俱原任護軍校以上俱世居李佳和羅地方係國初來歸之人各地方李佳氏謨和托國正紅旗包衣人世居長白山地方初來歸其子葉葉圖拉塔奉太祖高皇帝命往葉赫被禁十八載及葉赫來歸二人始還太祖恤其勤勞佐領令葉葉圖之子塔爾布統之又謨贈世襲銀牌編和托之曽孫烏瑪理伯勒俱原任佐領音登原任頭等護衛色勒原任三等護衛元孫覺和托原任員外郎四格原任參領兼佐領章蓀碩格色俱原任佐領三那密原任頭等護衛兼佐領塞貝原任助教瑚理原任七品官七十原任六品包衣大四世孫阿爾賽原任二等護衛明德得祿圖桑格俱原任六品包衣大蘇扎庫原任郎中書通阿現任六品包衣大阿濟理現任四品典儀兼佐領阿爾圖國正藍旗人世居李佳村地方騎校曽孫瑪爾卓初來歸其孫岱濟理原任驍原任員外郎蘇布理由委署參領從征察哈爾布爾尼於大鹵地方擊敗賊衆後平定雲南於石門坎黃草壩等處屢敗賊偽將何繼祖王有功等兵又擊敗胡國秉於雲南城下賊偽將馬寶等復率兵萬餘在武磨山拒戰大破之敘功優授騎都尉兼一雲騎尉卒其子瑪齊襲職因病告退其子色爾泰現襲職又阿爾圖之元孫靖受原任筆帖式四世孫薩海現任護軍校庫德國正紅旗人世居界凡地方擊曽孫布爾喀揚都初來歸其孫噶哈原任遊俱原任佐領吳爾漢原任主事瑚密色任户部理事官遇恩詔授騎都尉元孫瑪齊蘭原任七品官齊齊蘭原任護軍校禪什布原任國子監祭酒本泰原任步軍校孔愛原任佐領寧古訥原任前鋒校卓佛和從征逆藩吳三桂有功授雲騎尉卒其子噶禮襲職又庫德之四世孫天保班布理俱原任防禦鄂碩鄂謨克托俱原任筆帖式德舒原任鳴贊齊謨克托現任筆帖式五世孫達保原任委署護軍參領富勒赫現任驍騎校七十八國鑲黃旗人世居瀋陽地方護軍校以奉侍初來歸其子委登雲原任世宗憲皇帝敬謹小心訥爾特承襲任頭等侍衛卒其特恩賜騎都尉令其子孫德福現襲職和托費揚古鑲白旗人世居德爾吉色欽地方來歸年分無考其孫吳達禪原任驍騎校曽孫巴保住由副護軍參領從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子六十一現襲職又和托費揚古親兄遜拜之子郎愷原任步軍校孫珠臣原任郎中曽孫明綬原任光祿寺卿黑色恆特俱原任筆帖式元孫扎爾杭阿現任驍騎校又和托費揚古規兄綬遜之子阿蘇原任步軍校孫托晉原任員外郎又和托費揚古親叔和羅之孫阿宗阿原任驍騎校曽孫敦岱原任護軍校都按和托費揚古與正白旗李佳和羅地方阿都哈同族托和倫正紅旗人世居葉赫地方來歸年分無考其子吳那哈由護軍校從征雲南擊敗賊偽將何繼祖等兵於黃草壩又征厄魯特噶爾丹於昭莫多地方破賊有功授雲騎尉任城守尉卒其子沙色襲職從征凖噶爾在和呼爾哈腦爾地方擊賊陳亡其子凌保現