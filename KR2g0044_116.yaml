body:
  text: 八旗滿洲氏族通譜目録卷五十八卓晉氏滿都渾塞赫色穆奇理氏岱達理阿郎阿廣佳喇氏奇堂儀札爾布吳察喇氏聶爾蘇克星額蒼瑪爾紀氏阿禄額聶赫赫書氏什圖赫爾喜康傑達氏色爾古楞奇希圖吉魯氏噶爾圖博爾渾都魯氏吳爾蛟薩穆哈理沙拉氏楚楞瓦爾達鄂穆綽氏阿圖理巴斯克培佳氏二格色巴哈達舒穆理氏鄂偲三達理鄂爾綽絡氏巴爾達雅爾吉勒徐吉氏巴顔達成達爾充阿氏巴賽謨綽海烏爾瑚濟氏古思克桑格顏濟理氏雅郎阿和爾親卓起氏耀徳尼輝色鄂索絡氏岱音布禄塞克鈕瑚特氏佛特訥囊努盛佳氏那瑪理庫爾禪倭徹赫氏燕泰永安索察氏那穆岱伊拉理赫葉勒氏赫碩色巴爾瑪禄葉勒氏穆魯肯阿爾炳阿拜晉氏茂訥爾特布濟爾岱烏雅察氏沙渾那爾布穆克圖氏佛􅧂烏喀札拉氏巴瑚托羅傅佳氏尼雅哈覺禪郭渾氏科濶理克爾格尼錫理氏徳普古方喀納赫佳氏馬福納拉理喀强恰理氏强効强玉昇鍾吉氏齊布鍾元徳梅楞氏三保錫爾騰舒禄氏凖布魯保住琨都勒氏額圖楞喀爾魁額色氏呉成額達濃阿伏爾哈氏碩色哲庫訥覺佳氏尹達瑚齊法庫理瑚雅氏艾丹布瑚什塔都佳氏墨爾根穆訥克謨克拖氏登尼費克什布魯虞佳氏英額理虞萬良碧喇氏烏努瑚齊常綬伊庫魯氏伊爾琥蘇庫納多羅宏氏索諾庫楞徳鈕赫氏福幹衮布魯翁鈕絡氏本拜二武吉普禇氏車克穆薩爾泰金佳氏晉什納密固實石穆魯氏布札葉錫馬察氏瑚什喀瑚拉爾岱赫濟理氏蘭達揚著蒙鄂絡氏鄂什科多郭羅氏嘉喬資安布禄納塔氏雅爾納莽吉理佟塞勒氏富德達爾濟欽定四庫全書
