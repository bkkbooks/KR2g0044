body:
  text: 八旗滿洲氏族通譜目録卷三十六賽密勒氏通蛟噶庫納塔馨塔拉爾保布喇錫伊爾吉禪扎林以上俱有傳伊莽阿七十達哈禪烏雲布勒普赫達什哈莽阿木克什納性訥尼達納賴達商吉爾圖阿南達薩克察嵩吉爾圖以上俱附載精竒理氏巴爾達齊扎理穆鄂謨爾托謨廷以上俱有傳徳敦愛達理以上俱附載扎庫塔氏舒通阿伊扎噶布拉阿柱瑪爾圖吉拉喀僧塞竒普什訥哈爾蓀以上俱有傳備渾徳普騰額奢爾瑚訥富拉理明阿達圖柱南濟蘭阿舒布呉扎那巴倫倭新海亮寧徳塔泰察楚喀爾特勒普都海青阿哈普沙以上俱附載
