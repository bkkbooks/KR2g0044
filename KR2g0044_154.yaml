body:
  text: 八旗滿洲氏族通譜目録卷七十七附載滿洲旗分內之尼堪姓氏董氏董芝翰董登文董制彩董艾濟董受倉董翰傑董國新董國柱董應陸董留紀吳氏浩善吳珍亨吳衍俊吳尚禮吳良璧吳受益班第吳瞻儀堯泰吳受倉金氏金浩善金文具金繼祖金雯聚金汝相金文成金剛塞克理金棠金國泰許氏許傑許升許德成許登魁許茂官許國聘許制孝許官許升黃氏黃泰黃受理黃國泰黃彥法阿哈立黃易春黃世彥黃宗聖黃天得韓氏韓德浩善肇格韓定國韓有明韓顔賞韓正國尹達理韓和尚鄭氏鄭都鄭明鄭二格鄭朝輔鄭華龍桑格滿泰鄭義德鄭達郭氏郭提道郭思郭有時塔拉渾郭尚忠郭文祥丹保佟氏佟雲登尹泰佟如金佟守禮佟茂登佟田猷佟墨圖何氏進忠何齊藍何盤何誠正何得運何天強何錫儒鄧氏鄧安明鄧元魁鄧士滋鄧國升鄧承印鄧景福姚氏姚世宏姚達姚自得姚紀明姚自優賞琪蕭氏蕭科蕭友璘蕭宗保六格塞柱蕭宗曹氏曹良輔曹隆曹大格色曹祖保曹尤士曹瑞謝氏謝國龍謝承宗謝九鳯謝承恩謝益謝進言俞氏俞耀龍噶哈納俞世臣俞進瓦米達田氏田應龍田進忠田登外朗田坡丁氏丁國泰丁紀功丁大勇丁進忠六格白氏白爾蘇黃旄白毫白超寬白齊義康氏綬敏羅敏吳什泰費揚古胡什泰汪氏鳯祥汪整汪世臣汪登魁汪承詔閻氏閻成儒閻巴格閻齊偉閻義羅氏羅世泰羅經詩羅濟全五十九薑氏薑有祿薑遠費色薑茂勳戴氏戴雲龍和尚戴忠戴永祥梁氏育色梁自德梁國棟梁世節孟氏孟高孟克孟三元孟彬顧氏顧永蔭顧興桑格柴世保朱氏朱景懷滿色朱有福朱玉杜氏杜天成杜交杜克讓杜延蘇氏蘇有德蘇成德蘇宗程氏程達仁程九公程倫尤氏尤裕尤明尤成漢任氏任五十德寧任六石氏鐘升石尚禮石有成宋氏宋成功紀功毛色潘氏潘天福福德潘天户祁氏祁子量祁天福祁文奎聞氏聞尚元聞德猷聞世同紀氏紀星紀鳳紀永升袁氏袁九玉袁朗袁九德于氏于大世于應舉于志祥魏氏元保魏善人魏忠彬欽定四庫全書
