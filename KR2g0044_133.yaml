之長子古祿以來歸功授騎都尉後因承襲父職將本身所得之騎都尉移與親弟綽克托承襲卒無嗣其親弟圖薩襲職遇恩詔加一雲騎尉任佐領卒其子喇嘛襲職卒無嗣其叔碧理克圖襲職卒其子拜思瑚朗襲職卒其子觀音保現襲職又圖爾濟葉爾登第五子格捫第六子額爾濟圖俱原任佐領孫性格庫亦原任佐領曾孫明泰明善俱現任佐領明德現任驍騎校三保現任防禦元孫福昌現係廕生四世孫福僧格亦現係廕生巴爾巴圖魯鑲白旗人圖爾濟葉爾登同族世居察哈爾地方天聰時來歸授三等男卒其次子諾門達賴恩詔加襲職三遇兼一雲騎尉卒其孫阿都海襲職任至一等男佐領緣事革退其子孫保住現襲職又巴爾巴圖魯第三子邁蘭由護軍參領從征江西湖廣贈雲騎在建昌府擊賊陳亡卒其子法象現襲職又巴尉其孫多坡爾襲職爾巴圖魯之孫浩善歷任散秩大臣拉普錫原任驍騎校多克濟顯原任三等侍衛四世孫保興保國俱現任六品官金齊顯現任佐領昂坤杜稜正黃旗人世居察哈爾地方天聰時來歸授三等男卒其第三子綽爾濟襲職遇恩詔授為二等男緣事降為一等輕車都尉兼一雲騎尉又遇恩詔授為三等男緣事革退其親弟噶爾馬襲職卒無嗣其親兄之子賽音察渾襲職卒無嗣其親伯之孫德爾格爾襲職卒其子官保襲職因病告退其子巴喀納襲職時削去恩詔所加之職承襲一等輕車都尉兼一雲騎尉現任佐領又昂坤杜稜之次子吳先達理以來歸功恩詔加授騎都尉卒其子伊絡爾襲職遇襲職任協領一雲騎尉任佐領卒其子薩哈連恩詔所因年老告退其孫陳德襲職時削去四子明貴加之職現襲騎都尉又昂坤杜稜第恩詔加以來歸功授騎都尉卒其子札木蘇襲職三遇至二等輕車都尉卒無嗣其親伯之孫烏爾圖納蘇圖襲職卒無嗣其親兄浩善襲職任護軍參領兼佐領緣事革職未襲又昂坤杜稜之孫博勒原任二等侍衛兼佐領阿哈原任頭等侍衛兼佐領曾孫長綬保柱俱原任三等侍衛兼佐領元孫桑格原任副都統雅圖現係副護軍校四世孫馬喀納現任驍騎校寨桑札爾固齊正藍旗人世居瑚倫博宜爾地方天聰時同兄弟率部屬來歸授三等男編佐領使統之卒其恩詔加子札住襲職兩遇卒其子陶蕃齊襲職任佐領至一等男任佐領恩詔所卒其親兄之子瑪尼襲職時削去其子遵珠克加之職承襲三等男任散騎郎卒現襲職又寨桑札爾固齊第四弟之子多爾濟以來歸功授騎都尉兩遇恩詔加至三等輕車都尉卒其孫丹巴襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為恩詔所二等輕車都尉卒其子劉保襲職時削去退其加之職承襲騎都尉兼一雲騎尉緣事革親弟達色襲職卒削去伊父丹巴軍功所得之雲騎尉其族叔三韋䭾現襲騎都尉又寨桑扎爾固齊之孫甘珠爾原任佐領阿玉石正藍旗人寨桑扎爾固齊第五子之子也以來歸功授騎都尉兩遇恩詔加至三等輕車都尉卒其子達理襲職卒無嗣其伯祖之子札納襲職從征浙江舟山擊敗賊僞英毅伯阮思等兵數萬餘衆叙功授為二等輕車都尉緣事革去本身所得之雲騎尉餘剩三等輕車都尉其親兄之子博爾博蓀承襲卒其子常保住襲職緣事革退其親弟伊蘇特襲職恩詔所時削去承襲騎都尉任散騎郎兼佐領加之職吳巴什國鑲藍旗人世居克西克騰地方初來歸授三等男遇恩詔授為二等男卒其叔圖巴襲職兩遇納達襲職又恩詔加至一等男兼一雲騎尉卒其子阿吳巴什之叔瓦色以來歸功授騎都尉卒其子奇泰襲職卒其子巴什理襲職遇恩詔加一雲騎尉卒無嗣將伊所襲之騎都尉兼一雲騎尉令伊叔祖之子阿納達襲職併為一等子贈一雲從征江西在新口費園地方擊賊陳亡尉卒其騎尉其子六格承襲一等子兼一雲騎恩詔所長子沙津襲職時削去一雲騎尉現任散秩大加之職承襲一等男兼臣次子沙通阿現任四品典儀第三子沙郎阿現係廕生阿祿哈鑲黃旗人世居科爾沁地方天聰時來歸擢內大臣授三等輕車都尉順治二年世祖章皇帝以阿祿哈係為二等輕車都尉三遇太宗文皇帝眷顧之臣授恩詔優加至一等男歷任領侍衛內大臣卒秩大臣孫賜祭葬如典禮諡勤僖其子鄂齊爾原任散阿畢達亦原任散秩大臣濟納承襲一等男尋升散秩大臣後䝉聖祖仁皇帝特恩將伊原籍所屬人等編設佐領使統之令居於察哈爾地方卒其親弟之孫烏什布恩詔所襲職時削去二等輕車都尉現任察哈爾佐領加之職承襲德爾格爾國正藍旗人世居察哈爾地方初來歸授三等輕車都尉遇恩詔授為二等輕車都尉卒其子鄂克綽特巴襲職兩遇恩詔加至一等輕車都尉兼一雲騎尉從征湖廣在衡州府擊賊陳亡贈三等男其子根敦襲職卒其親兄格穆德襲職卒其子阿喇普坦襲職任佐領緣事降為二等輕車都尉其子蘭納襲職現任佐領又德爾格爾之弟錫拉奇塔特原係騎都尉其子蒙庫原係三等輕車都尉麻什原任佐領阿什圖原任七品官孫保住亦原係三等輕車都尉噶爾馬瑣諾木正黃旗人世居阿霸垓地方天聰時來歸尚公主封為額駙其子寨桑因係公主所出授三等子編設佐領使統之歷任散秩大臣卒世職未襲其子經綸因係公主之孫授三等輕車都尉乾卒其子巴爾品襲職現任副都統木之子齊蘭清門侍衛兼佐領又噶爾馬瑣諾保原任佐領孫經緯原任散秩大臣兼佐領曾孫富尼稚漢現任筆帖式瑣諾木鑲藍旗人世居烏葉爾白柴地方天聰時來歸原任散騎郎其子圖巴原任護軍參領兼佐領孫舒穆布原任江南江西總督增綬原任筆帖式曾孫德成原任員外郎納蘭泰原任親軍校元孫博林現任中書碩瞻係和碩額駙原任散騎郎博敏現任主事博羅特正黃旗人世居克西克騰地方來歸年分無考原任理藩院侍郎其子浩善原任三等侍衛常綬原任二等侍衛以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗包衣巴蘭阿壩垓地方人原任包衣大其子巴克山原任二等護衛孫福善現任驍騎校右係國初來歸之人正白旗包衣白瑚克什圖科爾沁地方人其曾孫岱色現任員外郎特墨察哈爾地方人原任散騎郎白顔圖科爾沁地方人原任牧長其曾孫劉泰原任內副管領托達阿祿科爾沁地方人其子瑚什現任護軍校以上俱係來歸年分無考之人八旗滿洲氏族通譜卷六十六欽定四庫全書
