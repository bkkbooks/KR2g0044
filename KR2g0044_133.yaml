body:
  text: 八旗滿洲氏族通譜卷六十六附載滿洲旗分內之䝉古姓氏博爾濟吉特氏博爾濟吉特係𨽻滿洲旗分之蒙古一姓其氏族甚繁散處於西拉木楞兀魯特札魯特克魯倫把嶽忒及各地方西拉木楞地方博爾濟吉特氏恩格德爾額駙國正黃旗人世居西拉木楞地方尚公主封為額初率部屬首先來歸授三等子駙將率來部屬編佐領令伊屬人邁圖統之恩格德爾卒諡端順其長子囊努克原係廢員順世祖章治二年囊努克係皇帝以太宗文皇帝眷顧之臣授騎都尉三遇又恩格德爾之恩詔加至二等輕車都尉歷任內大臣次子滿敦以來歸功授騎都尉卒其子翁諾和襲職三遇恩詔加至二等輕車都尉卒其子悅良襲職現任參領兼佐領又恩格德爾第四子額爾克戴青因係公主所出授三等輕車都尉後襲伊父三等子將伊所得之職與伊弟索爾哈承襲順治二年世祖章䝉帝特恩授額爾克戴青為二等子尋晉一等皇恩詔晉侯兩遇等公後其弟索爾哈卒將伊職仍令額封為二爾克戴青承襲晉封為一等公緣事革退其子岱綬承襲二等公卒減一雲騎尉其親兄費揚古承襲三等公任內大臣卒其子拉爾泰承襲三等公任散秩大臣卒其親兄阿爾泰承襲三等公任領侍衛內大臣緣事革退其親弟之子噶爾薩襲職時削去恩詔所加之職承襲一等侯雍正七年䝉其封號為奉世宗憲皇帝特恩復封為三等公九年加義公現任散秩大臣兼佐領又恩格德爾第五子索爾哈所襲伊兄額爾克戴青之三等輕車特恩仍都尉於康熙六年復蒙等侍衛侍衛班領兼佐令其子色楞承襲任頭領因病告退其子伊特格爾圖襲職任三等侍衛卒其親弟札克丹襲職往征凖噶爾在厄爾得尼昭地方擊賊有功授為二等輕車都尉歷任內大臣都統兼佐領原官致仕又恩格德爾恩詔授之孫茂奇塔特由頭等侍衛遇一雲騎尉卒其騎都尉從征江西擊賊有功加子浩善襲職任二等侍衛兼佐領曾孫德綬原任四品官札祿原任治儀正格爾圖原任三等侍衛兼佐領英泰現係廕生元孫蓀札齊原任佐領勒克原任三等侍衛札庫齊現任六品官和爾敦現任佐領博爾和現任五品官四世孫錫䝉額現任防禦班塔哈福寧俱現係廕生又恩格德爾親弟莽果爾代以率部屬首先來歸授三等子定鼎燕京時入山海關擊敗流賊馬恩詔優步兵二十萬衆叙功授為二等子三遇任內大晉一等伯卒其親兄之子巴特馬襲職臣因病告退其子額森襲職任頭等侍衛緣事革退其親兄四格襲職任散秩大臣緣事革退恩詔所其親伯之曾孫班達爾沙襲職時削去臣兼佐加之職承襲二等子現任委署散秩大領又莽果爾代之子滿珠錫理原係廢員順治二年䝉世祖章皇帝特恩授騎都尉遇色襲職卒無嗣其親伯恩詔加一雲騎尉卒其親弟海之孫巴齡襲職後將伊父囊努克之二等輕車都尉亦令伊子巴齡承襲合併為三等男任頭陵寢總等侍衛卒其子賽音察克襲職任襲職時削去管緣事革退其親伯之曾孫布占恩詔所加之職現襲三等輕車都尉按恩格德爾額駙與本旗兀魯特地方明安鑲黃旗札魯特地方巴克貝勒等同族古爾布什額駙鑲黃旗人恩格德爾額駙同族世居西拉木楞地方國初率部屬首先來歸授三等子尚公主封為額駙賜清卓理克圖號將率來部屬編佐領使統之後圍錦州擊寧逺兵有功授為二等子遇恩詔授為一等子歷任兵部尚書卒楞襲職卒其子多賜祭葬如典禮諡敏襄其第三子色爾濟襲職卒其親弟善巴襲職任頭等侍衛卒無嗣其親伯之子阿什坦襲職時削去恩詔所加之職承襲二等子任二等侍衛因病告退其親弟沙津襲職任三等侍衛卒其親兄之子伽藍保襲職現任雲麾使又古爾布什之長子鄂齊爾由閒散䝉恩授騎都尉遇尉緣事降為騎都尉又兩遇恩詔加一雲騎恩詔加至三等輕車都尉任副都統卒其子訥圖襲職任佐領卒其子白奇圖襲職時削去恩詔所加之職現襲騎都尉又古爾布什之次子古祿原任二等侍衛第四子松江原任佐領兼雲騎尉孫端柱原係雲騎尉禪保原任頭等侍衛兼佐領納穆原任七品官費揚古原任護軍校七十五原任八品官曾孫瑪哈原任筆帖式卓特巴原任員外郎寶訓原任五品官對秦現任陽石木總管巴海現任贊禮郎元孫國柱現任佐領又古爾布什親弟囊諾克之子奇塔特原任護軍校孫索柱原任筆帖式達賴鑲黃旗人古爾布什之弟也以來歸功授騎都尉後圍錦州攻寧逺擊賊有功授為三等輕車恩詔加都尉卒其子索爾和襲職三遇任頭等侍衛卒至一等輕車都尉兼一雲騎尉其子赫紫襲職任三等侍衛緣事降為三等輕車都尉其子常福綬襲職任三等侍衛因病告退其子格墨爾襲職歷任副都統緣事革退其弟滿色襲職現任佐領又達賴元孫蓀札齊現任司庫四世孫巴圖現任筆帖式巴拜鑲白旗人恩格德爾額駙同族世居西拉木楞地方國初率部屬首先來歸授三等子編佐領令伊屬人昂阿統之巴拜卒其次子阿玉石襲職遇詔恩授為二等子卒其子賚善襲職歷任散秩大臣兼佐領卒其子菴保襲職時削去恩詔所加之職承襲三等子任長史兼佐領赫成格原任佐領七十現任佐領官柱現係廕生元孫五十六現任員外郎永福現任佐領本泰現任親軍校又巴拜之長子科爾坤原任佐領孫明阿圖原係廕生錫圖原任佐領曾孫賽音達理原任佐領元孫穆爾泰亦原任佐領拉普什喜正白旗人恩格德爾額駙同族世居西拉木楞地方恩詔國初來歸授騎都尉三遇子班濟襲職卒無嗣未加至二等輕車都尉卒其世宗憲襲雍正十一年蒙子顏達色承襲雲騎尉緣事皇帝特恩令其養革退其養子德林現襲職以上俱係應立傳之人兀魯特地方博爾濟吉特氏明安國正黃旗人世居兀魯特地方來歸授三等子將初率子弟及全屬部落首先率來部落編佐領令伊屬人阿邦統之明安三遇恩詔優晉二等伯卒其第六子郎蘇襲職緣事革退其子班第襲職因病告退其親弟巴圖襲職歷任世宗憲內大臣卒其子瑪蘭泰襲職雍正七年䝉之子皇帝特恩封為一等侯緣事革退其親叔博倫岱承襲一等侯現任散秩大臣又明安第五子納穆僧格由頭等侍衛從征福建攻厦門贈騎都擊海寇鄭成功陳亡優親弟之子舒庫爾襲職尉兼一雲騎尉無嗣其因病告退其子二格襲職現任二等侍衛又明安之元孫衮布現任佐領永清現係廕生德玉現任四品官呂忠現任筆帖式按明安與本旗西拉木楞地方恩格德爾額駙鑲黃旗札魯特地方巴克貝勒等同族昂坤正黃旗人明安之長子也以來歸功授三等輕車都尉從征囊努克及札魯特俱著有勞績後賜達爾圍錦州擊敗大凌河兵叙功授為三等男年漢和碩齊號卒其子鄂齊理襲職順治二世祖章皇帝以鄂齊理係為二等男遇太宗文皇帝御前大臣授恩詔授為一等男緣事降為三等男又兩遇子丹辰襲恩詔仍授為一等男緣事降為二等男卒其職卒其親弟阿玉石襲職卒無嗣其叔祖之子佟保襲職緣事革退其子圖喇襲職卒其親伯之子明忠襲職現任三等侍衛多爾濟正黃旗人明安之次子也以來歸功授騎都尉從征札魯特有賊人巴魯克者同三人竊牧畜逃去多爾濟隻身追及生擒巴魯克而回征董䕫及克西克騰等處屢敗賊兵斬俘甚衆取大凌河首先破賊入錦州境先薄城下斬二十三人城內賊兵悉出拒戰大擊敗之叙功優授為世祖章一等男順治二年皇帝以多爾濟係太宗文皇帝眷顧之臣授為三等子卒無嗣其親弟綽爾濟襲職三遇恩詔加至一等子兼一雲騎尉緣事革去本身所得之騎都尉兼一雲騎尉餘剩三等子令其親弟納穆僧格承襲後以綽爾濟前罪可原止革去騎都尉授為二等子復令綽爾濟承襲歷任內大臣卒無嗣其親弟之子保柱襲職任佐領卒其子保綬襲職時削去恩詔所加之職承襲三等子因病告退其親弟佛佑襲職現任佐領瑣諾木國正藍旗人明安同族世居兀魯特地方令伊屬初率部屬首先來歸授二等子編佐領人諾穆圖統之瑣諾木卒其長子博奔襲職緣事革退其親弟噶爾馬僧格襲職三遇恩詔加至三等伯卒其親兄之子穆赫林襲職緣事革退其親叔之孫赫達色襲職任佐領緣事革退恩詔所其親伯之孫根敦札普襲職時削去退其親兄加之職承襲二等子任協領緣事革達克薩哈襲職現任佐領又瑣諾木之次子古穆原任護軍參領孫什圖原任五品官曾孫噶提原任參領元孫倭伸原任筆帖式梅勒圖原任助教席林現任員外郎阿爾賽現任五品官四世孫白興現任五品官端柱現任佐領伊布音三福俱現任筆帖式垂爾札爾國正藍旗人明安同族世居兀魯特地方次子巴初率部屬來歸授二等輕車都尉卒其朗襲職尋升都察院理事官因考察辦事有能授為一等輕車都尉二次過北京征山東擊敗擡頭營馬步兵破流賊滅福王平定河南江南等處屢著戰功續征福建至金華府等處擊敗賊黃總兵等兵數萬餘衆招撫一府三縣又攻南安縣首先奪門克其城叙功加一雲騎尉兩恩詔加遇二等男歷任都察院副都御史卒其子拉普至齊襲職從征雲南大敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊將胡國秉等兵於雲南城下叙功優授為一等男兼一雲騎尉任護軍參領兼佐領卒其子旒相襲職歷任刑部侍郎恩詔所兼佐領因病告退其子永綬襲職時削去襲職加之職承襲二等男任佐領卒其子果新時又削去伊曾祖拉普齊軍功所得之騎都尉現襲一等輕車都尉兼一雲騎尉又垂爾札爾之長子達爾瑪第三子戴青俱原任護軍參領曾孫布岱赫特赫俱原任佐領德色原任員外郎勒色理原任典儀托普齊原任副參領元孫德興現係廕生福赫現任山海關副都統林親現任二等侍衛兼佐領奇普塔爾國鑲黃旗人明安同族世居兀魯特地方親弟衮初率部屬來歸授騎都尉緣事革退其布襲職從征寧逺及札魯特俱有功授為三等輕車都尉卒其子保住襲職遇恩詔授為二等輕車都尉歷任副都統卒其子善福襲職任佐領卒其子撤爾特襲職時削去恩詔所加之職承襲三等輕車都尉現任佐領又奇普塔爾親弟衮布之孫善勷原任二等侍衛兼佐領善綬原任頭等侍衛兼佐領曾孫金柱原任護軍參領德昌現任三等侍衛元孫佛昌現任筆帖式又奇普塔爾叔祖炳圖之孫多爾濟以來歸功授三等輕車都尉卒無嗣其親弟之子恩詔加特靈襲職任佐領三遇雲騎尉卒無嗣削去至一等輕車都尉兼一恩詔所加之職又將多爾濟來歸功所得之三等輕車都尉降為騎都尉令奇普塔爾親弟衮布之曾孫德綬承襲拜音代國正紅旗人明安同族世居兀魯特地方領令其初率部屬來歸授二等輕車都尉編佐弟密賽之子鄂爾椎統之拜音代卒其子綽爾濟襲職三遇恩詔加至三等男卒其孫薩喇襲職卒無嗣其叔祖之子色精䓻承襲三等男後將伊父塞冷從征廣東軍功所得之雲騎尉亦令伊子色精䓻承襲併為二等男從征江西在鍾家嶺地方擊賊僞贈一等葉都督等馬步兵陳亡佐領卒其長子喇嘛保男令其子常舒承襲任恩詔所襲職時削去功所得之職承襲一等輕車都尉加併塞冷軍現任青州副都統次子齊林現任佐領密賽正黃旗人拜音代之弟也以率部屬來歸授三等輕車都尉因年老告退其子鄂爾椎襲職定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆後破流賊滅福王平定河南江南等處屢著恩詔加戰功授為二等輕車都尉三遇征雲南大敗賊至三等男卒其子巴拜襲職從僞將何繼祖等兵於石門坎黃草壩又敗賊將胡國秉等兵於雲南城下叙功授為二等男卒其子賴音住