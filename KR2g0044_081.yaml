body:
  text: 八旗滿洲氏族通譜卷四十章佳氏章佳本係地名因以為姓其氏族甚繁散處於費雅郎阿馬兒墩章佳及各地方費雅郎阿地方章佳氏按章佳氏穆都巴顔初居長白山俄穆和蘇魯地方因子孫繁衆率五子遷於瓦爾喀什羅爾錦地方後其五子又各居一地長子扎克丹巴顔遷費雅郎阿地方次子章庫始遷馬兒墩章佳地方再遷穆奇倭赫昂巴等地方第三子輝色遷宜漢阿拉地方第四子薩穆什庫遷牡丹村地方第五子瓜喇遷舍倫村地方瑚魯瑚昌吉鼐正藍旗人穆都巴顔長子扎充丹巴顔之子也原居長白山俄漠和蘇魯繼遷費雅郎阿地方國初來歸其元孫庫岱原任佐領阿思哈原任三等護衛拜音達理原任步軍校四世孫唐凱原任員外郎阿克敦現任吏部侍郎署都統協辦步軍統領衙門刑名事務偏圖原任三等護衛齊山原任驍騎校賽音布原任詹事府少詹事兼佐領沙渾喀爾泰俱原任護軍校五世孫蘇巴理由護軍恭領從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授雲騎尉任前鋒參領兼佐領卒其孫多倫襲職現任佐領又瑚魯瑚昌吉鼐之五世孫花色原任筆帖式阿桂現任員外郎倭錫騰原任郎中僧保原任護軍校薩弼原任三等護衛玉麟現任通判常德明阿圖俱現任護軍校六世孫塔蘇理原任三等護衛圖巴原任典儀福昌阿現任治儀正黑黑原任協領莽色國正藍旗人瑚魯瑚昌吉鼐第七子也原任郎中初來歸其曽孫額黑原任佐領丹泰恩詔授兼佐領元孫當古理由員外郎兩遇伯阮思等騎都尉從征浙江舟山擊賊僞英毅兵三萬餘衆叙功加一雲騎尉歷任西安副都統卒其子徹勒渾襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授三等輕車都尉任城守尉卒無嗣未襲又莽色之元孫豐阿拉原任迎送官福爾吉原任典儀囊凱原任郎中兼佐領四世孫善拜原任佐領福海原任郎中八十現任護軍參領徹徹渾原任前鋒侍衛徹理渾福住俱原任三等護衛五世孫徹黑亦原任三等護衛蘇章阿現任佐領福音現任筆帖式松琴鑲黃旗人穆都巴顔長子扎克丹巴顔之孫也世居費雅郎阿地方天聰時來歸其曽孫達蘇由護軍參領從征皮島首先擊賊三圍錦州屢敗松山杏山馬步兵後取寧逺及黑龍江等處圍博和理城招降哈爾塔孫等四村擒護叛黨百人定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又退至慶都縣敗之叙功授騎都尉後圍太原屢敗賊兵又征流賊至承天府大敗之續征四川擊敗賊張獻忠馬步兵叙功加雲騎尉兩遇一恩詔加至二等輕車都尉圍大同敗賊有功授為一等輕車都尉又遇恩詔加一雲騎尉歷任內大臣緣事革退世職後因追念達蘇矢忠效力不改初心仍授一等輕車都尉令其子達禧承襲又松琴之曾孫愛塞原任郎中阿爾泰原任步軍校阿素原任護軍校元孫阿爾賽原任中書安布現任護軍參領喀爾喀原任護軍參領舒淑原任七品官四世孫喀爾察亦原任七品官佛保原任郎中佟保原任護軍校班布原任藍翎侍衛黑色現任護軍校桑格現任筆帖式圖爾坤黃占鑲白旗人瑚魯瑚昌吉鼐之曾孫也世居費雅郎阿地方國初率百餘户來歸設佐領使統之其長子喀爾塔喇由護軍參領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又連敗流賊於懷慶府榆林州承天府等處叙功授雲騎尉遇恩詔授為騎都尉續征江西於橦梓渡兩敗賊洪總兵等兵又擊敗賊首金聲桓王德仁等馬步兵七萬餘衆焚其舟七百餘隻後攻饒州府不設雲梯克其城叙功加一雲騎尉兩遇恩詔優授為一等輕車都尉升任護軍統領征湖南於衡州府擊賊陳亡超贈為三等男諡忠壯勒石紀焉其第三子赫特赫襲職從征福建屢敗賊僞總兵黃昌等兵於海上後贈騎都攻海冦鄭成功於厦門陳亡優及赫爾德之子尉因無嗣其兄赫紳弟赫爾德衡鼐相繼承襲赫特赫所襲伊父之三等男令其弟格爾德承襲任佐領卒其子葛爾圖襲職恩詔所時削去承襲三等輕車都尉任佐領卒無嗣其加之職親弟訥爾圖勒爾圖先後承襲勒爾圖緣事革退其親伯之孫滿住襲職現任佐領又圖爾坤黃占之孫赫勒布原任副都統兼佐領曾孫博爾騰原任佐領赫爾圖原任主事赫爾錦原任典儀元孫巴顔圖現任佐領又圗爾坤黃占族孫本泰拉古俱原任護軍校薩禮瑚原任步軍校巴爾塔理碩格俱原任驍騎校根泰原任二等護衛福堪原任防禦曽孫黑色原任驍騎校常綬七十三俱原任護軍校沙納哈原任御史滿都原任防禦常格現任護軍校由正藍旗改隸雷虎鑲白旗人圖爾坤黃占之孫嘉哈之長子也初為工部啓心郎監造天壇殿議叙授雲騎尉歷任工部侍郎卒其孫西城格奉先襲職又雷虎之子錫爾騰原任典儀曾孫舒敏泰現任親軍校又雷虎之弟黑虎由頭等護衛贈雲騎從征福建攻海寇鄭成功於厦門陳亡蓮花山尉其子齊襲職從征廣東在韶州府擊賊被創身亡叙功加一雲騎尉令其親弟徹克承襲騎都尉卒無嗣其親伯之孫佑住襲職又雷虎之弟雷徹原任頭等護衛桑海原任佐領弟之子福海原任員外郎徹赫理原任郎中德爾圖原任佐領達爾丹鑲白旗人圖爾坤黃占親弟額勒訥瓜喇之孫也由護軍校從征湖南在岔路口地方擊賊孫克望馬步兵續征湖廣在茅麓山連敗賊首李來亨等兵一萬五千餘衆叙功授雲騎尉卒其子肇四海現襲職又達爾丹親弟瑪什泰原任驍騎校其子瑪爾禪原任護軍校又達爾丹親伯阿岱之孫唐保原任護軍校曽孫三惠原任三等護衛元孫富星格現係監生以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗章佛青其子舒古色原任護軍校孫薩爾都原任七品官曽孫恭楚原任步軍校七十原任驍騎校元孫關泰原任六品典儀又章佛青親弟章庫之孫瞻布祿原任七品典儀曾孫噶爾巴原任護軍校元孫三格原任二等護衛右世居費雅郎阿地方係國初來歸之人馬兒墩章佳地方章佳氏遜扎齊鑲黃旗人穆都巴顔次子章庫之曾孫也世居馬兒墩章佳地方國初率子孫來歸天聰時授佐領其長子蘇爾泰原任上駟院大臣次子達爾泰初任包衣佐領因監造宫殿議叙授雲騎尉卒其子竇特襲職遇恩詔授為騎都尉任郎中恭領兼佐領卒其孫哈達襲職現任領侍衛內大臣又遜札齊之孫蘇達原任二等侍衛科岱原任委署護軍參領曽孫海寬原任二等侍衛參領兼佐領納海原任委署護軍參領碩色原任驍騎校薩哈理現任驍騎校元孫碧喇現任佐領額爾敏現任筆帖式四世孫德仁現任八品官德智現任員外郎德瑞現任筆帖式薩穆占國鑲黃旗人世居馬兒墩章佳地方福建梯攻泉初來歸其孫騷達色由閒散從征賜巴圖州府第三登城克之厄魯特噶爾丹於昭莫多魯號授騎都尉後征地方奮勇破賊有功加一雲騎尉卒其子明保現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗渾達理遜扎齊叔祖羅色塔之曽孫也因效力有年授雲騎尉其子溫托輝原任員外郎巴什原任司庫曾孫關保原係雲騎尉文殊保現任筆帖式又渾達理親弟輝山之孫四格原任二等侍衛兼佐領又渾達理親伯塞克禪之子薩穆哈原任二等侍衛兼員外郎孫薩爾圖現任郎中曾孫圓明現任護軍校烏拉現任膳房總領巴蘭泰現任員外郎元孫永定現任八品天文生又渾達理叔祖岱堪之孫都賚原任司庫曾孫圖爾古亦原任司庫元孫常旒原任護軍校阿納庫遜扎齊同族其子占晉布原任防禦兼雲騎尉扎爾達原任驍騎校孫保住原任筆帖式羅密原係雲騎尉法新原係庫使正黃旗噶哈遜扎齊同族其四世孫關徹原任防禦五世孫吳拉納原任員外郎吳爾喀納原任郎中六世孫德舒原任護軍校瞻泰現任司務恭安海新俱現任筆帖式七世孫拜思哈現任驍騎校八世孫八十一現任護軍校以上俱世居馬兒墩章佳地方係國初來歸之人正黃旗包衣布山原任牧長其子碩色原任雲麾使右世居馬兒墩章佳地方係天聰時來歸之人鑲黃旗包衣費揚古其孫白爾滕原任員外郎曾孫敬古塞原任內管領恩特原任茶房總領白韶原任副總領元孫章保現任委署司庫王保住現任內管領三住原任內管領李保金梁俱現任筆帖式鄂海原任牧長以上俱世居馬兒墩章佳地方係來歸年分無考之人各地方章佳氏賴塔鑲黃旗人穆都巴顔第三子輝色之曾孫也原居長白山俄漠和蘇魯繼遷宜漢阿拉地方國初來歸其長子圖顔原任佐領次子伊奇納原任防禦第三子阿山原任護軍校孫尹布原任庶子塞爾特原任驍騎校曾孫尹泰由翰林院筆帖式歷任東閣大學士兼兵部尚書乾隆三㫖尹年以疾卒奉宣力年久泰耆舊老成皇考簡拔於退休之後屢加擢用洊陟綸扉寧靜和平奉職維謹去年伊子尹繼善來京陛見朕因尹泰年已衰邁留尹繼善在京授為刑部尚書以便朝夕奉養伊旋以老病乞休朕慰留再三始允所請今夏舊病復作特賞太醫疹視冀其痊可今聞溘逝深為軫悼已命散秩大臣率領侍衛賜奠茶酒著加太子太傅於應得恤典外加祭一次以示優禮舊臣之至意欽此賜祭葬諡文恪立碑墓道又賴塔之曾孫薩克察原任防禦塞固理現任護軍校元孫薩海原任防禦尹篤善原任郎中尹明善原係生員尹繼善癸卯科進士翰林院編修現任署理江南江西總督四世孫慶柱現任員外郎慶安現係生員慶德現係副榜慶和現係舉人慶雲現係廕生又賴塔親叔博羅之四世孫扎爾吉達原任司務瓜喇鑲紅旗人穆都巴顔第五子也原居長白山俄漠和蘇魯繼遷舍倫村地方國初來歸其孫岱音布祿原任驍騎校噶爾漢原任陵寢翼長元孫雅圖武齊喀阿爾納俱原任防禦瓦丹原任驍騎校雅他喇庫原任護軍校四世孫賽音布原任步軍校馬哈塔武達海俱原任驍騎校阿爾賽海惠俱原任防禦雅瑚原任筆帖式輝色原任護軍校格巴庫由驍騎校部委參領從征四川於盤龍山等處屢敗賊兵叙功優授騎都尉任佐領卒其子邁錫理襲職任步軍副尉卒其子馬爾泰襲職又瓜喇五世孫朱成額原任筆帖式朱爾喀五格俱原任護軍校八十一現任護軍校神保原任江寧副都統赫慎泰現任步軍校進寶住原任驍騎校六世孫德楞額現任驍騎校雅爾泰保格俱現任防禦蘇扎國鑲藍旗人賴塔同族世居牡丹村地方常綬原初征服其孫松噶岱原任筆帖式曾孫任步軍校楊舒原任員外郎元孫偏圖原任三等護衛明圖原任欽天監監正加太常寺卿銜延泰原任筆帖式四世孫格佛赫現任驍騎校占岱原任護軍校英岱現任佐領佟善現任筆帖式明祿現任贊禮郎顔福雅爾賽俱原任筆帖式又蘇扎之弟蘇揚武之曾孫托和瑪原任驍騎校托賴原任員外郎元孫鄂鼐原任三等護衛三黑原任佐領馬海噶爾弼喀爾喀俱原任護軍校蓬萊現任委署護軍參領書舒原任筆帖式四世孫馬唐阿現任護軍參領巴善現任驍騎校達格原任護軍校五世孫達色亦原任護軍校又蘇扎族裔瑪康阿原任護軍校保住現任護軍校福保澤臣俱現任典儀額爾泰現任驍騎校阿杭阿現係翻譯舉人巴圖國鑲黃旗人世居巴爾都城地方過北京征山東初來歸其孫球蘭由閒散二次攻克兖州府第七登城攻克寧陽縣第二登城叙功授雲騎尉遇恩詔授為騎都尉後破流賊滅福王平定河南江南等處著有勞績又防守滄州連敗賊首管濟明等兵圍大同攻渾源州手被炮傷加一雲騎尉兩遇恩詔加至二等輕車都尉因年老告退其第四子和托襲職從征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊僞將胡國秉等兵於雲南城下叙功授為一等輕