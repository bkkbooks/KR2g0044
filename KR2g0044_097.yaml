body:
  text: 八旗滿洲氏族通譜卷四十八虎爾哈地方虎爾哈氏虎爾哈本係地名因以為姓其氏族散處於虎爾哈新達謨城及各地方納漢泰扎爾固齊國正紅旗人世居虎爾哈地方授扎爾固齊初編初同兄弟族屬率鄉人來歸賜滿洲佐領令管之後因效力又奴僕二十户賜偹禦以旌之其三子謨績原任佐領第四子科托拜由佐領定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之敘功授雲騎尉遇恩詔授騎都尉任參領卒其子科爾兌襲職從征浙江舟山屢著戰功加一雲騎尉任副都統征剿厄魯特噶爾丹有功授三等輕車都尉卒其子圖拉襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其姪德昌德舒先後承襲德舒卒其子薩克都襲職時削詔後軍去所得之職現襲雲騎尉又納漢泰札爾固齊功之孫正克原任驍騎校錫蘭泰原任筆帖式查達海原任郎中兼委署參領佐領勒璧由佐領贈雲騎從征湖廣擊僞將巴養元等兵於洞庭湖陳亡尉其孫胡什屯現襲職又納漢泰扎爾固齊之曾孫德爾塞原任委署參領兼佐領李雅納原任七品官常鼐原任護軍參領兼佐領鄂爾渾原任佐領圖占原任典儀巴爾都現任副護軍參領兼佐領禪圖現任護軍校元孫二格原任護軍校尚吉納現任筆帖式四世孫巴顔圖原任佐領又納漢泰扎爾固齊族姪外山原任七品官孫吳什坦原任驍騎校吳達禪現任護軍參領曾孫扎什泰現任護軍校按納漢泰扎爾固齊與鑲藍旗新達謨城地方康喀賚扎爾固齊席百地方珠爾庫等同族托克推正紅旗人納漢泰扎爾固齊之弟也因辦事有能不違指授授騎都尉後駐防南界擊敗賊兵有功授三等輕車都尉原任副都統緣事降為騎都尉卒其子謨和托襲職後緣事未襲又托克推之孫阿積理原任荆州副都統瓦爾喀原任步軍校曾孫三保陳堯俱原任筆帖式佛保原任佐領陳布祿原任郎中奮布祿現任步軍校喀喇現任參領兼佐領元孫胡當阿原任筆帖式綽克托現任挈壺正阿喜布祿正紅旗人納漢泰扎爾固齊族弟也初由護軍校委署章京定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之叙功授雲騎尉遇恩詔授騎都尉後緣事未襲仕至護軍參領其子蓀泰原任永定河分司孫伊常阿原任御史伊爾賽現任筆帖式曾孫伊積善亦現任筆帖式伊都善現係監生又阿喜布祿之兄岱敏原任護軍校其子瑚錫巴原任郎中孫瑪常阿原任中書曾孫滿丕現任筆帖式吳勒穆正紅旗人納漢泰扎爾固齊族弟也初任護軍校天聰時充使奉命往明因與明抗禮不屈設佐領使統之又以諳練文太宗文皇帝嘉之賜蟒袍字授户部員外郎尋升郎中其長子本拜原任頭等護衛次子鄂齊理原任郎中兼護軍參領佐領孫倭赫訥由護軍參領從征厄魯特噶爾丹有功授雲騎尉卒其次子法福理襲職長子法岱原任佐領法岱長子蓀保住由佐領從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子常明現襲職法岱次子吳訥什現任佐領又吳勒穆之孫博令阿原任典儀達爾馬原任郎中兼佐領博爾濟原任給事中兼佐領曾孫公太原任筆帖式宗柱原任主事元孫常年現任副參領兼佐領雅達渾鑲紅旗人納漢泰扎爾固齊同族世居虎爾哈地方國初來歸其元孫阿珠琥原任參領阿錫納原任三等護衛哈什原任驍騎校四世孫敦拜原任護軍參領都蘭原任委署護軍參領烏理原任三等護衛丹達理原任協領蘇巴泰原任郎中外音布寧德俱原任六品官索倫原任護軍校松果托原任驍騎校同阿理原任筆帖式僧額特由驍騎校從征浙江福建等處有功又從征厄魯特噶爾丹屢著戰功授雲騎尉年老休致其子白達色現承襲又雅特渾之五世孫廣生原任佐領尹綬原任護軍校三齊喀原任驍騎校鄂齊理原任典儀偏圖原任郎中旺鼐現任筆帖式噶納渾由護軍校平定雲南在黃草壩等處屢立軍績授雲騎尉原任三等護衛因病乞休其子保善襲職現任獨石口副都統又雅達渾之六世孫富雲保原任三等護衛英綬現任步軍校達春現任驍騎校額爾登額常泰俱現任典儀永安阿拉密俱原任筆帖式文海現任筆帖式明綬現係生員七世孫九成現任筆帖式郭爾琨鑲紅旗人納漢泰扎爾固齊同族世居虎爾哈地方來歸年分無考其孫哈什泰原任員外郎勒東額原任防禦曾孫哈理由八品官從征江西湖廣屢著戰功又征雲南擊敗賊將何繼祖等兵於黃草壩又敗賊將胡國秉等兵於雲南城下叙功優授騎都尉任佐領卒其子沙晉承襲卒其子訥清額現襲職又郭爾琨之曾孫觀音保原任給事中元孫色特原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗鄂錫其子吳達錫原任步軍校孫七十八現任迎送官右世居虎爾哈地方係來歸年分無考之人新達謨城地方虎爾哈氏康喀賚扎爾固齊國鑲藍旗人世居新達謨城地方授扎爾固齊班初率兄弟來歸設佐領使統之預十六大臣之列仕至工部尚書其子錫納海由佐領圍錦州哨探擒諜定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之敘功授雲騎尉三遇恩詔加至三等輕車都尉任副都統兼佐領卒其孫道福色襲職任副都統兼佐領卒其子胡林襲職恩詔所時削去承襲雲騎尉現任都統兼佐領又康喀加之職賚扎爾固齊之孫魏圖原任護軍參領兼佐領魏凖原任八品官常祿原任佐領曾孫常元原任二等護衛禪拜原任佐領如福原任防禦禪岱現任佐領元孫華善現任六品官六十現任驍騎校四世孫魏赫齊現係廕生按康喀賚扎爾固齊與正紅旗虎爾哈地方納漢泰扎爾固齊本旗席百地方珠爾庫等同族塔爾巴齊鑲藍旗人康喀賚扎爾固齊同族世居新達謨城地方國初來歸其子新達理原任司庫孫托克托和托克托海俱原任頭等護衛張德第原任四川巡撫曾孫滿丕由前鋒參領從征貴州屢擊敗僞侯李成蛟僞晉王李定國等兵又征山東擊敗土賊于七等兵敘功授雲騎尉後征逆藩吳三桂有功授騎都尉卒其子席蘭承襲卒其子三德現襲職又塔爾巴齊曾孫馬察原任頭等護衛白晉原任員外郎福通阿原任游牧處總管常舒原任署丞元孫錢嘉保察密納俱原任筆帖式舒密納現任筆帖式武同保原任驍騎校四世孫福儀現任中書福成現任員外郎福玉現任主事福寧白綬俱現任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗富達理係康喀賚扎爾固齊族弟其孫沙進原任護軍校屯珠瑚原任驍騎校曾孫禪濟布原任御史黑色原任步軍校色爾固德現任防禦鑲藍旗薩哈連係康喀賚扎爾固齊族弟其子喀賚原任前鋒參領孫官保原任防禦曾孫蒼密原任驍騎校以上俱世居新達謨城地方係國初來歸之人各地方虎爾哈氏珠爾庫國鑲藍旗人世居席百地方防禦孫性安原任初來歸其子噶爾珠原任盛京工部侍郎曾孫常安原任筆帖式按珠爾庫與本旗新達謨城地方康喀賚扎爾固齊正紅旗虎爾哈地方納漢泰扎爾固齊等同族右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗訥爾圖珠爾庫同族席百地方人其子穆達圖曾孫海順俱原任驍騎校墨爾根席百地方人其曾孫興古原任驍騎校以上俱係國初來歸之人正紅旗阿哈棣蘇完哈達地方人鑲白旗雅爾哈白都訥地方人以上俱係康熙時自科爾沁撤回之人蘇佳氏蘇佳為滿洲一姓其氏族散處於葉赫等地方尼雅星阿國正紅旗人世居葉赫地方閒散二次過北京征初來歸其曾孫歸穆臣由贈騎都山東梯攻郯城縣首先登城陳亡尉以其子尼堪承襲三遇恩詔加至二等輕車都尉卒其叔福爾賽襲職緣事革退其子瓦爾達福穆齊先後承襲福穆齊卒其兄阿海襲職從征雲南於黃草壩地方擊賊有功授為一等輕車都尉卒其子赫達色襲職卒恩詔所其子三保襲職時削去一雲騎尉又尼雅星阿加之職現襲騎都尉兼之元孫偏圖原任步軍總尉鈕鈕原任步軍校喀賚由委署參領從征浙江福建於半山嶺擊賊劉秉仁步戰敗之又大敗賊僞將劉國軒等兵續征雲南屢敗賊僞將何繼祖等兵於石門坎黃草壩敘功優授騎都尉卒無嗣其兄之孫阿揚阿襲職任協領緣事革退其弟額綸泰襲職現任參領兼佐領後阿揚阿復由二等護衛歷任天津都統又尼雅星阿之四世孫羅密勒德俱原任防禦齊金泰現任驍騎校尼侃由委署護軍校從征貴州屢著勞績授雲騎尉卒其子察爾拜襲職又尼雅星阿之五世孫保住現任護軍校兆保柱現任六品官六世孫齊保現任護軍參領兼佐領七世孫色普勝額現係五品廕生又尼雅星阿族姪圖林帕外庫俱原任佐領烏林帕原任西安副都統古音特原任郎中法爾泰現任佐領黑達色現任驍騎校孫索住原任防禦觀音保古英額俱原任郎中富蘭圖現係六品廕生彰保住原任筆帖式圖理原任驍騎校蘇德保現係副驍騎校曾孫旒住現任筆帖式瑪納漢國正紅旗人原籍無考由驍騎校從征陜西四川初來歸其子渾托和等處屢敗賊兵敘功授雲騎尉任城守尉年老告退其子蘇達海襲職現任佐領孫蘇納海原任佐領武拜國鑲紅旗人世居尼雅滿地方護軍校從征察哈初來歸其子武喀達由委署爾布爾尼屢敗賊衆從征湖廣在永興縣地方擊賊陳亡贈雲騎尉以其子旺田綬承襲卒其子雅圖現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗岱珠瑚葉赫地方人其曾孫陳保住原任城守尉八十原任筆帖式謨和理原任驍騎校元孫蘇巴理原任筆帖式烏巴海扎庫木地方人其子烏巴泰原任佐領孫華色現任佐領鑲白旗舒訥德里倭赫地方人原任驍騎校正藍旗璧赫德葉赫地方人其孫旒保原任驍騎校曾孫二格原任護軍校元孫蘇楞阿現任防禦色克特葉赫地方人其子松阿岱原任防禦孫索鼐亦原任防禦巴本葉赫地方人其元孫拜察原係副護軍校鑲藍旗愛星阿黑龍江地方人其曾孫烏當阿原任典簿以上俱係國初來歸之人鑲白旗拜色葉赫地方人其子雅泰原任護軍參領孫留色原任防禦圖巴泰葉赫地方人其曾孫䝉古原任主事新達理原任佐領元孫禮柱亦原任佐領四世孫索柱現任驍騎校鑲紅旗布爾哈葉赫地方人其孫賚格原任驍騎校蒼保原任護軍校四保原係副驍騎校以上俱係天聰時來歸之人鑲白旗包衣蘇柏和訥殷地方人其曾孫尼雅哈原任護軍校元孫觀音保現任二等護衛右係來歸年分無考之人溫徹亨氏溫徹亨為滿洲一姓其氏族世居烏喇及葉赫地方博爾濟國鑲黃旗人世居烏喇地方入山海關擊敗流賊初來歸其子額森由佐領恩詔加馬步兵二十萬衆敘功授雲騎尉三遇任步軍至三等輕車都尉卒其子武三泰襲職恩詔所總尉卒其子武爾賽襲職時削去孫巴山由佐加之職現襲雲騎尉又博爾濟之領從征雲南擊敗賊僞將何繼祖等兵于黃草壩卒後敘功贈雲騎尉其子金保住襲職任佐領卒其子舍格現襲職又博爾濟之曾孫武賚現任護軍統領兼佐領元孫文永現任六品官文祿現任筆帖式又博爾濟親弟之孫雅爾納原任佐領曾孫耀多理原任步軍校穆哈納原任護軍校福喀原任護軍參領達都原任筆帖式錫爾哈現任防禦元孫保住原任驍騎校桑格現任二等侍衛喀爾泰現任護軍校拉興由前鋒校從征凖噶爾贈雲騎在和通呼爾哈腦爾地方擊賊陳亡尉其子常生現襲職烏雲珠國鑲黃旗人世居葉赫地方長孫常綬原任護軍初來歸其子保住原任牧世宗憲參領因奉侍心皇帝敬謹小特恩賜騎都尉其子海保襲職任奉宸院卿緣事革退其子巴爾璫現襲職又烏雲珠之孫坦泰原任步軍校曾孫赫碩色原任驍騎校章德保原任護軍校元孫四格原任驍騎校二保住現任前鋒校福泰現係監生以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗赫董額葉赫地方人其四世孫騰特原任員外郎達蘭泰原任驍騎校五世孫碩色原任郎中噶達渾原任佐領常明額爾明俱原任筆帖式六世孫多羅岱現任驍騎校甘最現任護軍校右係天聰時來歸之人哲爾德氏哲爾德為滿洲一姓其氏族散處於界凡等地方塔布岱國正黃旗人世居界凡地方領過北京征山東屢初來歸其長子顧山由佐贈騎都著勞績續征朝鮮陳亡三遇尉以其子福達理承襲恩詔加至二等輕車都尉卒其子福哈禪襲職因病告退其親弟福興襲職時削去恩詔所加之職承襲騎都尉卒其子福爾森現襲職又塔布岱次子尼雅哈琦由七品官從征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又破賊僞將胡國秉兵於雲南城下敘功授雲騎尉其曾孫官德現襲職雅魯堪國正白旗人世居烏喇地方任刑部侍郎次子額初來歸其長子琦通額原星額原任禮部侍郎孫烏爾泰琦仁柏綬德清常明俱原任八品筆帖式額騰原任員外郎穆赫林原任三等侍衛通保原任二等侍衛牛鈕原任中書哲臣現任二等侍衛侍衛什長伊臣原任防禦曾孫法保赫伸俱原任七品筆帖式竒徹博現任七品筆帖式愛隆阿伊昌阿俱現任三等侍衛寧古齊現任藍翎侍衛以上俱係應立傳之人其餘無事蹟可立傳者附載於後正藍旗哲爾德哈達地方人其子蘇楞額原任員外郎鑲藍旗顔岱烏喇哈達地方人其曾孫尼雅哈原任參領元孫哲隆阿原任主事哲庫訥原任三等護衛常齡現任筆帖式四世孫哲三泰現任八品天文生綽克托烏喇地方人其孫德什圖原任防禦曾孫巴泰現任佐領以上俱係國初來歸之人鑲黃旗包衣渾岱長白山地方人其孫塞楞原任員外郎曾孫雅圖現任八品官常寧現任筆帖式正白旗包衣費揚古板城寨子村地方人其子旺泰原任內管領英泰原任牧長以上俱係來歸年分無考之人溫察氏溫察為滿洲一姓其氏族散處於葉赫等地方安泰國正紅旗人世居葉赫地方外郎兩遇初來歸其子謨絡渾由員恩詔授騎都尉後因監造一雲騎尉從征福建海寇屢乾清宫等殿議叙加贈騎都敗賊兵後於厦門擊賊陳亡優車都尉卒其親尉以其子富納海承襲二等輕恩詔所弟之子巴蘭泰襲職時削去騎尉卒其子德保加之職承襲騎都尉兼一雲現襲職又安泰之孫富爾敦原任筆帖式按安泰與本旗同里巴哈納同族博多渾國鑲白旗人世居葉赫地方原任護軍校元孫滿初來歸其曾孫克爾特赫色現任禮部侍郎常綬原任筆帖式四世孫二達色原任典儀永德現任三等護衛滿福現係廕生以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗巴哈納葉赫地方人其曾孫哲備原任防禦元孫鄂啓穆理俱原任筆帖式滿丕原任驍騎校按巴哈納與本旗同里安泰同族鑲藍旗楠道輝發地方人其曾孫倭濟理原任驍騎校察喇現係副護軍校尼雅哈輝發地方人原任筆帖式以上俱係國初來歸之人正紅旗溫齊烏喇地方人其孫蓀達理現任驍騎校右係天聰時來歸之人八旗滿洲氏族通譜卷四十八
