  text: 八旗滿洲氏族通譜目録卷八董鄂氏和和理魯克素屯布兑齊巴顔阿格巴顔郎格努愷愛塔胡勒琥商顔和羅卓托南都伊拉齊巴蘇阿都兑齊都朱魯以上俱有傳伍巴泰來布溫岱哈斯瑚科錫赫薩岱蘇赫德博和理錫邦阿以上俱附載
