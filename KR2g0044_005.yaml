body:
  text: 八旗滿洲氏族通譜目録卷二安褚拉庫地方瓜爾佳氏碩翁科洛巴圖魯勞薩王柱滿珠馬克都和托魏班安楚達以上俱有傳鄂碧尼堪拉都理色古德蓋都阿濟納夸色索理唐章阿輝雅錫爾門以上俱附載尼馬察地方瓜爾佳氏尼唐阿奇唐阿達爾巴齊翁果春以上俱有傳薩穆哈伊桑阿殷達渾岱音布推布訥綬楞額殷達渾章色札圖喀潭札理薩蘇喀格爾模亨泰祿巴拜哈達吉思哈隆托科薩薩理圖爾渾南泰以上俱附載瓦爾喀地方瓜爾佳氏札爾赳瞻丕理穆哈達瓦珠赫勒和碩薩穆達理俄孟額額爾碧赫達卓瑪瑚善巴顔宗以上俱有𫝊瓦爾喀阿都禮鄂穆崇額阿濟那穆克登額嗒思哈那木哈達薩穆哈那喀克蘇尼錫特訥珠升阿杜喜達爾禪察爾圖穆庫努赫齊顔達爾漢塞爾圖觀保以上俱附載嘉木湖地方瓜爾佳氏塔晉巴顔對親瑚瑚那法庫那以上俱有傳達爾胡齊那達理海蘭果鏗愛素郭渾安布祿嘉滿吳訥軾翁鄂順薩爾錫以上俱附載長白山地方瓜爾佳氏胡瞻阿珠果巴顔額赫禮齊克騰以上俱有傳滿都理柏爾格圖方柱巴爾漢那翰布薩木哈巴顔瑪爾圖哈巴穆鼐嘉木素赫藍泰克新吳晉泰海塞珠山雄圖瓦禮雅達胡爾薩岱精阿達賚以上俱附載蜚悠城地方瓜爾佳氏透登額額瑚德德普色沙精阿達士希以上俱有傳愛唐阿法囊阿鼐倭世渾瑪泰聶松額葉普舒喀圖理以上俱附載輝發地方瓜爾佳氏舒隆桑固理達巴馬屯外山顔錫以上俱有傳關東阿那太巴顔達理金保碩穆多堪布祿金布鄂克什布他納董智達海達拜濟眀瑪瑚布爾哈錫罕吳海倭赫那郎阿西圖藩泰韓珠琥馬濟納王剛巴胡達烏遜濟勒翁愷隆安翁勤杭奇瑚程額那漢布拉哈爾吉霸以上俱附載
