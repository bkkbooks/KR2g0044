  text: 八旗滿洲氏族通譜目録卷七十三附載滿洲旗分內之髙麗姓氏洪氏牟易金洪德克孫敬文洪義仁洪鄧南洪顔林崔氏江那米崔泰崔禮弼鐘格尼朔陽西梅楞福羲劉氏薩穆吉劉平武能三鼐劉文宣黃氏黃琉伊勒穆蘇法保崔莽牛傑尼岡氏茂思費查庫濟爾密喜德葉米楊氏蘇巴濟傑漢尼吳氏吳岱榜吳那海陳氏陳都霸顔文氏文瑞孫氏玉蘭丁氏古爾馬渾任氏外朗伊氏朋楚尼朱氏仲格徐氏徐大勇車氏調亥萬氏滿春尼江氏桂羲邉氏邉南何氏何龍普閔氏鐵令義林氏林尚禮佟氏佟佐瓦氏濟禮耿氏耿世尼宋氏愛楠宋琉傑碩馬氏高理馬色鄭氏謝基鄭義南曹氏曹基曹國相郭氏鄧那米沈氏傑林璧方氏德克什秦氏囊弼紫孟氏羅岱田氏興尼璧辛氏星嘉那密欽定四庫全書八旗滿洲氏族通譜目録卷七十三附載滿洲旗分內之髙麗姓氏洪氏牟易金洪德克孫敬文洪義仁洪鄧南洪顔林崔氏江那米崔泰崔禮弼鐘格尼朔陽西梅楞福羲劉氏薩穆吉劉平武能三鼐劉文宣黃氏黃琉伊勒穆蘇法保崔莽牛傑尼岡氏茂思費查庫濟爾密喜德葉米楊氏蘇巴濟傑漢尼吳氏吳岱榜吳那海陳氏陳都霸顔文氏文瑞孫氏玉蘭丁氏古爾馬渾任氏外朗伊氏朋楚尼朱氏仲格徐氏徐大勇車氏調亥萬氏滿春尼江氏桂羲邉氏邉南何氏何龍普閔氏鐵令義林氏林尚禮佟氏佟佐瓦氏濟禮耿氏耿世尼宋氏愛楠宋琉傑碩馬氏高理馬色鄭氏謝基鄭義南曹氏曹基曹國相郭氏鄧那米沈氏傑林璧方氏德克什秦氏囊弼紫孟氏羅岱田氏興尼璧辛氏星嘉那密
