body:
  text: 八旗滿洲氏族通譜目録卷十九馬察地方佟佳氏巴篤理札爾固齊雅西塔哲克錫巴班薩穆哈圗顧胡圗約達尼繆施渾拜卓拜綏哈以上俱有傳庫察岱哈武賽雅爾巴吳達齊索桑阿岱密喀雅魯納穆岱羅岱以上俱附載雅爾湖地方佟佳氏達爾漢侍衛扈爾漢阿爾賽布爾賽凖塔巴圗魯瑚什布達賴丹布薩木什喀達爾泰雅賴岱嵩阿覺善以上俱有傳沙納海莽愛佟啓剛固穆圗善以上俱附載加哈地方佟佳氏渾托和額濟訥蘇敏都都尼堪外蘭敦拜章京薩穆什喀蒙古吳章阿索爾和德備以上俱有傳倭濟赫武海星額理桑固厄謨和善外善郭和齊富拉塔瑪時泰額圗庫巴顔邁堪武拜泰星阿鄂爾和順以上俱附載
  hash: sha256:862b53a5ad27685ef12f2f9706573551d0c7b1f53496e94e95e1815384f62218
