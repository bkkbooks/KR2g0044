body:
  text: 八旗滿洲氏族通譜目録卷十一扎庫木地方他塔喇氏岱圖庫哈理達音布達瑚巴顔阿爾泰朱魯西爾哈薩弼圖鼐格郎格和索理巴逹巴顔賽珠瑚嶽博烏丹顔特巴林錫東額布三圖以上俱有𫝊薩克蘇阿爾泰碩薩納該達瑚什塔羅機溫察杭齊巴馬穆平阿布郎阿阿愷胡什那伊渾蘇爾都郎達理客楚達谷尼赫攸海色阿哈碩色卓和理嶽瀚噶奴訥古理漢濟郎鄂通鄂凖布祿薩瑪拉馬福禪伊泰當西堪額爾格德光衮班布理扎努艾孫三齊哈理格色敦達理倫拜舒完岱兌齊柏德洪鄂托業爾古達根泰穆哈連岱喀蘇密納以上俱附載安褚拉庫地方他塔喇氏羅屯穆當阿羅禮穆都以上俱有傳貝渾喀齊布雅隆阿阿爾金博牛阿達爾漢艾揚蘇巴布善以上俱附載各地方他塔喇氏納林瑪福他寧古齊章武理墨爾根翁安以上俱有𫝊賚格拜穆達理邁圖孝新汪三尼滿布庫伊穆齊外庫諾穆齊拖托理圖楞額索克錫勒黑方喀拉喀爾扎阿倫希紐禮當阿那海善福武巴泰滿都瑚扎崑朱以上俱附載
  hash: sha256:3bf318659f8f2b1e299695352ecec7bf4713fb65ed7062edd11a685e34cae6db
