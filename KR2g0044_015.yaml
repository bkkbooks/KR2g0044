body:
  text: 八旗滿洲氏族通譜目録卷七綏分地方馬佳氏瑚石圖海錫哈巴克什敦柱格克特達進以上俱有𫝊屯鐸顧鼐圖爾巴哈以上俱附載馬佳地方馬佳氏赫東額郎塞胡什巴羅爾機對齊巴阿喜瑚拉渾羅托以上俱有𫝊綽絡顔布祿謨庫訥爾庫噶哈多齊音達渾福當阿恩克朔色赫爾素倭赫德碩色額赫訥德都翩翩偉赫圖穆哈達以上俱附載各地方馬佳氏塔蘭珠穆哈連珠英額尼喀理德什庫顔泰蒙武岱以上俱有𫝊馬穆敦魯布善鈕赫輝瑚魯莽吉圖托吉納吳爾漢阿瑚穆隆什瑚烏克星額馬爾哈齊席本瑚秦金泰庫庫哈山勒貝富塔丹巴祿敦多瓦爾達錫喇巴兆山阿爾本博絡瑚什巴舒穆喀努班第達海懷班阿林達英額瑚清額薩穆哈馬成關烏喀都爾班馬錫納庫尼堪圖爾哈艾必達鄂鼐圖克善馬達常琦以上俱附載
  hash: sha256:927e5fe8414e91305984739be3964c6fabc4699067e9ec97ffb6909e14f9c418
