body:
  text: 八旗滿洲氏族通譜目録卷六十七附載滿洲旗分内之䝉古姓氏薩爾圖氏栢德謨和理禇庫巴圖魯以上俱有傳賽音巴彦岱舒爾穆托爾本格博爾齊庫捫孟柯拜岱以上俱附載蒙古爾濟氏耀柰巴圖魯右係有傳鼐奇特氏諾穆賴右係有傳郭爾羅特氏布顔塔布嚢右係有傳額宜圖右係附載和爾氏巴都瑚右係有傳絡羅渾右係附載實寳禪氏達巴海右係有傳泰衮右係附載塔他爾氏鄂布哈和濟格爾以上俱有傳瑚蘇貝右係附載舒魯氏席圖右係有傳岳諾特氏阿宻西理右係有傳納宻逹右係附載赫魯克氏查木蘇右係有傳彰札爾氏鄂爾濟圖右係有傳郭爾羅斯氏衛寨桑右係有傳翁阿理氏逹雅齊右係有傳公吉喇特氏納穆賽右係有傳色能愛滿瑚貝孟格德爾和濟格爾以上俱附載欽定四庫全書八旗滿洲氏族通譜目録卷六十七附載滿洲旗分内之䝉古姓氏薩爾圖氏栢德謨和理禇庫巴圖魯以上俱有傳賽音巴彦岱舒爾穆托爾本格博爾齊庫捫孟柯拜岱以上俱附載蒙古爾濟氏耀柰巴圖魯右係有傳鼐奇特氏諾穆賴右係有傳郭爾羅特氏布顔塔布嚢右係有傳額宜圖右係附載和爾氏巴都瑚右係有傳絡羅渾右係附載實寳禪氏達巴海右係有傳泰衮右係附載塔他爾氏鄂布哈和濟格爾以上俱有傳瑚蘇貝右係附載舒魯氏席圖右係有傳岳諾特氏阿宻西理右係有傳納宻逹右係附載赫魯克氏查木蘇右係有傳彰札爾氏鄂爾濟圖右係有傳郭爾羅斯氏衛寨桑右係有傳翁阿理氏逹雅齊右係有傳公吉喇特氏納穆賽右係有傳色能愛滿瑚貝孟格德爾和濟格爾以上俱附載
