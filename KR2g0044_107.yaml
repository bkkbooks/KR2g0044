body:
  text: 八旗滿洲氏族通譜卷五十三濟禮氏濟禮為滿洲一姓其氏族世居長白山及砮宜地方多克松鄂國正黃旗人世居長白山地方散二次過北京征初來歸其子吳珠克圖由間山東梯攻泗水縣第一登城因無繼登之人殁於陳贈騎都尉其子黨色襲職遇其子額勒渾襲職現任協恩詔加一雲騎尉因病告退領又多克松鄂之曽孫長舒原任筆帖式右係應立傳之人其餘無事迹可立傳者附載於後鑲藍旗吳努渾砮宜地方人其孫阿濟泰現任護軍校曾孫官德現任驍騎校右係國初來歸之人烏爾漢氏烏爾漢為滿洲一姓其氏族世居遼河地方哈爾圖鑲白旗包衣人世居遼河地方來歸年分無考其孫會保由護軍校從征浙江福建於諸暨縣擊敗賊首王宗仁兵二千餘衆又於泉州府奪橋解圍有功優授騎都尉卒其子明治襲職緣事革退其親叔之子索柱現襲職由正白旗改𨽻右係應立傳之人其餘無事迹可立傳者附載於後鑲曰旗包衣達禮遼河地方人哈爾圖同族原任三等護衛其子搆色原任驍騎校博羅特原任三等護衛孫竈神保原任八品官四格原任知縣由正白旗改𨽻右係來歸年分無考之人赫宜氏赫宜為滿洲一姓其氏族散處於舒勒赫等地方烏齡額正黃旗人世居舒勒赫地方來歸年分無考因世代輸誠進貢又率三十一戶一百十五名丁壯來歸遂遷居寧古塔地方與舊滿洲官兵一體效力可嘉優授騎都尉任佐領卒其孫孔鄂羅襲職卒其子富爾吉岱現襲職又烏齡額之子逹哈尼原任佐領孫滿達現任佐領都錫克現任護軍校右係應立傳之人其餘無事迹可立傳者附載於後正黃旗葛旒屯昂阿地方人烏齡額同族原任佐領其孫布雷亦原任佐領曽孫七十六現任佐領森徹訥屯昂阿地方人烏齡額同族其子倭楞格謨爾和順俱原任二等侍衛瓦達蓀錦州地方人烏齡額同族原任驍騎校其子那爾泰亦原任驍騎校以上俱係來歸年分無考之人札蘇理氏札蘇理為滿洲一姓其氏族世居卦爾察及白都訥地方科爾機達鑲紅旗人世居卦爾察地方天聰時來歸其孫海塔原任護軍校曽孫巴爾濟圗原任防禦納蘭泰由委署護軍校從征浙江福建擊敗賊偽將劉國軒等兵數萬餘衆續征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩地方敘功授雲騎尉後征厄魯特噶爾丹奮勇破賊有功授為騎都尉卒無嗣其親弟定住襲職卒其子三格現襲職又科爾機逹之元孫石圖原任佐領右係應立傳之人其餘無事迹可立傳者附載於後鑲紅旗喀玳白都訥地方人右係康熙時自科爾沁撤回之人拜都氏拜都為滿洲一姓其氏族世居葉赫地方阿錫圖國正白旗人世居葉赫地方子克什圖由親軍校初來歸原任前鋒參領其從征察哈爾布爾尼於大鹵地方奮勇破賊有功授雲騎尉卒其子布蘭泰襲職現任副都統署理馬蘭口總兵官印務又阿錫圖之孫布達錫理原任驍騎校曽孫永貴現任員外郎元孫善柱原任八品官達賚國鑲白旗人阿錫圖同族世居葉赫地方佐領孫初來歸設佐領使統之其子達布原任瓦齊理亦原任佐領拉都渾原任理藩院侍郎曽孫雅圖原任主事薩克愼原任佐領圖喇現任佐領吳爾希素現任親軍校元孫福尼雅漢現任陵寢翼長又達賚族姪多尼原任護軍校巴達克原任驍騎校今𨽻本旗蒙古旗分以上俱係應立傳之人賴布氏賴布為滿洲一姓其氏族世居札庫木及佛阿拉地方札齊喀國正白旗人世居札庫木地方領赫成額由三等初來歸其曽孫華色原任參侍衛從征浙江舟山擊敗偽英毅伯阮思等兵於海上敘功授雲騎尉卒其親弟之孫凖泰襲職又札齊喀之元孫烏魯喀原任驍騎校四世孫嶽幹原任郎中武岱原任前鋒校兆塔現任步軍校恩特現任三等侍衛五世孫薩穆哈圖現任前鋒校岱蒙阿正黃旗人世居佛阿拉地方天聰時來歸其子賽音布瑚敏俱原任員外郎孫鄂通武原任四品官碩幹原任總漕布幹原任員外郎嶽幹達爾華俱原任副都統哈錫庫原任主事鄂幹原任筆帖式曽孫明德原任協領和和理原任主事祿什原任筆帖式常明現任城守尉官保現任藍翎侍衛賴成德現任員外郎元孫羅索理原任員外郎富爾翰現任主事布納吉隆阿賴圖俱現任筆帖式四世孫布章阿現任中書以上俱係應立傳之人布賽氏布賽為滿洲一姓其氏族散處於葉赫等地方賽喀那國鑲白旗人世居葉赫地方察哈爾布爾尼於大初來歸由護軍參領從征鹵地方奮勇破賊有功授雲騎尉歷任副都統卒其子薩穆齊喀襲職原任二等侍衛又賽喀那之子納齊喀原任湖廣巡撫車爾赫原任防禦寨爾赫原任主事孫永泰原任給事中寧泰現任署正寶善現任司庫誠格明泰俱現任筆帖式曽孫松柏現任中書又賽喀那族孫烏蘭太原任城守尉拜哈圖原任鳴贊格色特原任司務白起泰巴爾虎陳布祿赫申德齡俱現任筆帖式五十六現任前鋒校右係應立傳之人其餘無事迹可立傳者附載於後正紅旗包衣札爾湖尼薩哈爾察地方人其孫外庫原任典儀曽孫塔圖庫原任頭等護衛賴圖庫原任護軍校寶善現任八品官元孫塞克圖現任佐領塞赫理現任護軍校右係國初來歸之人正藍旗噶布拉輝發地方人其孫白赫訥原任佐領曽孫羅爾賽原任司庫右係來歸年分無考之人噶努氏噶努本係地名因以為姓其氏族世居噶碩克村及噶努山地方古爾巴泰正白旗人世居噶碩克村地方來歸年分無考其子鄂爾布由前鋒校從征福建於厦門擊敗贈雲騎海寇鄭成功兵後差往蓋峙山殁於軍府擊賊尉其子吳喀納襲職從征湖廣於長沙贈為騎偽將吳國貴兵陳亡之子寧尼雅及寧尼雅之都尉因無嗣其親伯子布爾賽相繼承襲又古爾巴泰之曽孫班第現任步軍校右係應立傳之人其餘無事迹可立傳者附載於後正白旗阿林噶努山地方人其曽孫僧保住現任藍翎侍衛右係國初來歸之人烏蘇占氏烏蘇占為滿洲一姓其氏族世居瓦爾喀什海蘭河地方鈕彥圖國正紅旗人世居瓦爾喀什海蘭河地方任防禦初來歸其子顔布原任七品官南泰原禪布由護軍從征浙江於衢州府擊敗賊偽都督周烈等兵二萬餘衆敘功授雲騎尉卒其子察爾圖襲職任佐領又鈕彥圖之孫長賚原任防禦納爾布原任筆帖式曽孫五十九原任員外郎蘇珠圖現任防禦元孫烏訥錫現任筆帖式右係應立傳之人其餘無事迹可立傳者附載於後正紅旗阿蘭瓦爾喀什海蘭河地方人其孫瑚錫屯原任典儀孫綽鼐原任驍騎校右係國初來歸之人尼竒理氏尼竒理為滿洲一姓其氏族散處於烏喇等地方蘇喀國正紅旗人世居烏喇地方驍騎校孫溫普亦原初來歸其子圖爾休原任任驍騎校曽孫阿思瑚歷任都察院副都御史緣事降為四品官從征湖廣在巖山嶺擊賊陳贈雲騎亡其子布爾竒尼襲職任護軍參領卒其子福尉登額現襲職又蘇喀之曽孫布理克由七品官從征察哈爾布爾尼奮勇破賊有功授雲騎尉卒無嗣其親弟之孫福成額襲職任副參領又蘇喀之元孫華色原任御史愛篤鑲黃旗人世居渾春地方天聰時率兄弟來歸其子薩克楚原任驍騎校孫布喇達現任防禦曽孫圖喇達現任護軍校扎秦現任千總福祿現係武舉又愛篤親兄德爾休之孫阿爾瑚禪原任青州副都統曽孫固楞泰現係廕生又愛篤親叔固納喀之曽孫鈕祜德原任四品官舒祜德原任郎中徹祜德原任防禦元孫尼坦現任三等侍衛以上俱係應立傳之人其餘無事迹可立傳者附載於後正黃旗恰素德爾吉倭濟地方人其曽孫尹達理原任驍騎校元孫存柱現任佐領明泰現任護軍校鑲白旗恩特蘇發地方人其曽孫多三保原任員外郎圖林原任驍騎校多爾遜現任步軍校多善現任郎中元孫圖占現任親軍校以上俱係來歸年分無考之人鄂謨拖氏鄂謨拖為滿洲一姓其氏族世居尼馬察地方嘉穆蓀鑲黃旗人世居尼馬察地方天聰時來歸其子庫爾禪原任前鋒參領馬健原任頭等侍衛孫陵寢總烏爾禪原任二等侍衛存柱原任三等侍衛錫管馬靠原任護軍參領賚色原任柱由委署護軍校從征浙江於太平山擊敗賊偽總督趙德勝等兵四萬餘衆續征雲南屢敗賊偽將何繼祖等兵於石門坎黃草壩地方敘功授雲騎尉歷任西安將軍卒其子錫爾達現襲職又嘉穆蓀之曽孫精住原任郎中錫安原任佐領錫爾德現任筆帖式達成現任護軍校安達海由護軍校從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子關保現襲職又嘉穆蓀之元孫鄂起現任步軍校鄂鼐現任郎中鄂泰原任給事中瞻泰原任同知鄂爾賽現任員外郎四世孫雙全現任筆帖式右係應立傳之人其餘無事迹可立傳者附載於後鑲紅旗當格尼馬察地方人其元孫圖舒原任前鋒校四世孫皂保原任護軍校威忠格原任員外郎五世孫赫斗原任護軍校六世孫拜山保現任鳴贊卓隆阿現任筆帖式右係國初來歸之人鑲黃旗凱費尼馬察地方人原任佐領其子桑格原任二等侍衛穆舒原任御史孫穆登原任員外郎曽孫清明現任步軍校穆魯原任筆帖式右係天聰時來歸之人董佳氏董佳為滿洲一姓其氏族散處於嘉木湖等地方鄂哈國鑲黃旗人世居嘉木湖地方美赫由護軍校從初來歸原任護軍校其曽孫征雲南有功授雲騎尉卒孫巴郎承襲又鄂哈之曽孫忠住原任筆帖式穆克善原任驍騎校薩穆哈原任護軍校元孫巴爾都原任防禦瓦色原任筆帖式四世孫偏圖原任佐領隨哈達原任主事吳海國鑲黃旗人世居嘉哈地方都察院左都御史碩初來歸其曽孫薩海原任色原任驍騎校金布代音布俱原任防禦元孫六十五原任三等侍衛遂哈原任員外即巴都善現任同知滿達理原任護軍校費揚阿現任驍騎校齊格現任護軍校四世孫額爾格圖亦現任護軍校郭邁原任三等侍衛滿泰原任筆帖式佟肯現任筆帖式穆敦國鑲黃旗人世居嘉木湖地方門尉曽孫倭赫原初來歸其孫吳巴禮原任城盛任刑部侍郎赫碩色原任佐領元孫赫楞泰現京任佐領四世孫積住原任佐領索住原任驍騎校五世孫賽哥賽德俱現任驍騎校六世孫赫成額現係監生以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗哲蘇肯華連董佳城地方人其子哲貝原任遊擊孫瓦禮原任步軍副尉克登原任護軍參領曽孫馬爾虎善原任委署護軍統領都爾巴吳當阿俱原任員外郎完穆布原任博士康桑吉原任防禦海色原任步軍校常山原任筆帖式元孫善布原任御史七哥色原任驍騎校佛思原任員外郎石格現任員外郎滿都虎常綬托福俱原任筆帖式董齡現任筆帖式董泰現任庶吉士四世孫能圖現任中書明鐸董舒俱現任筆帖式常海原任筆帖式豪尚現係副驍騎校鑲藍旗吉紫渾秦地方人其子花色原任護軍校以上俱係國初來歸之人鑲黃旗阿蘇泰哈達地方人其元孫薩哈泰原任步軍校老哥原任護軍校定柱原任弓匠協領四世孫華善原任員外郎秋勒現任驍騎校五世孫黑達色現任佐領永泰永寧俱現任筆帖式右係天聰時來歸之人阿克占氏阿克占為滿洲一姓其氏族散處於哈達等地方吳努綽國正紅旗人世居哈達地方署護軍校從征雲南初來歸其子胡什屯由委在石門坎擊敗賊兵一萬餘衆敘功授雲騎尉卒其子德山柱承襲法隆武國正紅旗人世居哈達地方察院副都御史孫順初來歸其子碩絡原任都拜原任護軍校以上俱係應立傳之人其餘無事迹可立傳者附載於後正紅旗吳同保葉赫地方人原任鐵匠協領鑲白旗馬達理葉赫地方人其子馬錫原任步軍校鑲藍旗羅多蘇完地方人其子布舒原任御史孫英