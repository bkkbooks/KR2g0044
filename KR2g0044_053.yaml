body:
  text: 八旗滿洲氏族通譜目録卷二十六訥殷地方富察氏孟古慎郭和舒穆魯伊郎阿布哈金達錫納濟拉弼拖普佳鄂通果倭赫訥哲庫訥鈕衡額瑪蘭蒙鄂絡岱濟索諾庫德赫錫亨艾星阿穆當阿瓦柱伊爾海色克錫布占叟文阿希達康愷以上俱有傳顔岱阿爾泰艾哈圖石圖雅瑚班濟哈都岱托璞嘉布克達善阿濟根滿都理蒙古爾岱克穆訥科爾喀果赫穆瑚納瑪爾洪阿阿賴蘇柏赫舒書諾音托和尼克德蓀札齊費揚古胡什屯珠都勒西哈那鄂爾索鄂和布納林齊色蘇完索爾科多圖爾哈金保柱艾古理富喀以上俱附載額赫庫倫地方富察氏富塔納慶舒都慶訥以上俱有𫝊阿祿費柱鄂爾東果德爾葛色赫爾博古伊哈齊吳爾德嘉隆阿哲爾蛟尚納喀費嶽色庫喬伊柱蘇色佛拖理瑚濟穆以上俱附載訥殷江地方富察氏翁阿岱圖巴哈常貴愛達漢以上俱有𫝊濟爾海舒竒墨爾根達巴爾漢博吉以上俱附載吉林烏喇地方富察氏瓦星阿右係有傳阿蘇喀阿舒布雅琥吳雲珠碧禮克圖德爾德赫古普庫德爾登額博克瑚齊莽色萬察庫博索泰達爾都薩穆哈圖哈拜阿納瑚以上俱附載長白山地方富察氏蘇爾東阿安錦以上俱有傳枚素和寧光東拉拉雅清阿碩色巴顔坦布多起華色瑚圖博蓀泰以上俱附載
