body:
  text: 八旗滿洲氏族通譜目録卷十三撒爾湖地方伊爾根覺羅氏瓜喇恩特拉哈墨爾根伊爾喀巴圖魯羅洛渾格善華善色伯察哈博亮以上俱有傳墨爾根穆成額以上俱附載呼訥赫地方伊爾根覺羅氏噶蓋扎爾固齊孟格圖阿爾哈巴顔納齊布額齊布溫察綏哈謨絡瑚密色圖元布以上俱有傳薩克什哈右係附載雅爾湖地方伊爾根覺羅氏桑古尼哈爾巴巴圖魯納凱顔布祿以上俱有傳達爾邦阿布爾謄達古蒙古瞻鑒拜滿柱蘇雅蘇瓦顔戴栁費揚古耀色烏什以上俱附載烏喇地方伊爾根覺羅氏納爾遜唐古善顔布祿以上俱有傳吳達禪達春噶爾圖察哈理吳達理薩哈亷福喀羅多理衛生額薩爾巴哈噶達渾碩色以上俱附載
  hash: sha256:f11748a8fe7e6e1dd3f331ed978d23d604748fdb02d95819348d838fffc3dad3
