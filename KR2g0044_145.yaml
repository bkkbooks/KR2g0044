body:
  text: 八旗滿洲氏族通譜卷七十二附載滿洲旗分內之高麗姓氏金氏金氏係隸滿洲旗分之高麗一姓其氏族散處於易州等地方新逹理正黃旗包衣人世居易州地方天聰元年率子弟來歸授為通事官時有新歸附高麗通事官登納米密致書輸我軍虛實導其王發兵水陸並進已為內應新逹理覘獲其書奏之置登納賜之又米於法遂以其家資者亦高麗人也常往來髙睿親王家人恩尼比麗致書其父潛蓄異志新逹理復覘獲其書恩尼比亦伏誅崇德二年從征高麗遇伏兵以計太宗文敗之大軍進至岡花屯妻孥新逹理仰體皇帝諭令勿傷其國王聖意善為保全加賞賚以俘獲高麗人户分編佐領太宗文皇帝優特命新逹理統之兼內務府三旗火器營總管事後從征松山奮勇追擊斬獲七十人得馬四十匹又賞賚後殱海濱叛賊有功復蒙長子噶布拉原任三等以疾卒於官生子三人侍衛次子胡住原任二等侍衛參領兼佐領第三子花住原任員外郎兼佐領花住之子常明御原任臣領侍衛內大臣辦理前大上駟院事務內務府總管兼佐領乾隆二年以監修陵寢規模宏整工程完固月初五日奉賜雲騎尉乾隆七年七皇旨領侍衛內大臣常明祖皇考時在內庭行走效力多年人甚勤慎心性直朴侍奉朕躬誠意肫摯聞伊舊病復發即遣御醫診視猶兾其痊愈以享遐年今聞病勢沉重朕心深為軫念著大阿哥前往看視如病不能痊愈著加特恩贈太子太保賞內庫銀一千兩以為伊後事之用著大阿哥攜茶酒致奠以示朕優待老臣之至賜意欽此旋於本日卒其親弟石瑞承襲雲騎尉又祭葬如典禮諡慤勤新逹理之曾孫花色原任佐領塔克圖現任三等侍衛雙保現任整儀尉兼佐領元孫金九現係廕生又新逹理之次弟音逹理原任佐領三弟三逹理原任通事官其孫三保現任巡視長蘆鹽政武備院卿兼佐領曾孫金鼎現任藍翎侍衛金輝金鑑俱係藍生又新逹理第四弟季贈雲騎逹理由護軍校從征福建擊海賊陳亡又季逹尉其長子公保常次子常綬相繼承襲理之孫趙柱現任驍騎校曾孫濟蘭原任護軍校烏林太現任護軍校都賚鑲黃旗包衣人原藉來歸年分俱無考原任通事官其子浩善由委署護軍校從征浙江福建屢立戰功授雲騎尉卒其子常德襲職德倍國鑲藍旗包衣人原籍無考其長子鄂拜原任護初來歸原任六品通事官軍校次子幾蚌伊由司庫從征察哈爾布爾尼於大鹵地方擊賊陳亡贈雲騎尉無嗣其親兄之子華色襲職卒其子佛保襲職現任佐領以上俱係應立傳之人其餘附載於後正黃旗金天保原籍無考其孫馬尼原任驍騎校馬爾圖原任佐領曾孫萬春保原任護軍校福祿原任防禦玉爾弼原籍無考其孫長赫原任驍騎校巴什那原任郎中天鳳尼原籍無考其子南蚌伊原任驍騎校包衣嘉理哈原籍無考其孫布蘭泰現係馬甲鑲白旗包衣金登海州地方人其曾孫存柱現係馬甲鑲紅旗包衣明色尼開城府地方人原任五品通事官其子向拜原任六品通事官孫常柱原任員外郎元喜原任七品通事官舒倫原任六品通事官曾孫吉兆現任七品通事官常春現任筆帖式鑲藍旗包衣金德裴原籍無考原任六品通事官其子恩尼弼原任六品通事官孫格古尼亦原任六品通事官曾孫雅圖現任三等護衛元孫哈鳳阿現任筆帖式海古尼原籍無考原任護軍校其子孟逹理原任驍騎校孫七十三原任護軍校琉保德現任三等護衛曾孫金城現任主事濟古尼易州地方人其子索義原任司庫山龍伊原籍無考其子濃尼弼原任六品通事官孫舒書亦原任六品通事官曾孫金齊顯原任中書永特基原籍無考原任通事官其孫烏爾薩原任八品典儀定海吉金家堡地方人其子蓋吉原任牧長碩色原籍無考其曾孫常在現係馬甲以上俱係國初來歸之人正黃旗包衣石孔儀開城府地方人原任藍翎侍衛其子石圖原任暢春苑總管曾孫吉隆阿現任筆帖式那穆遂易州地方人其次子沈明義原任驍騎校三子三格原任通事官曾孫格蚌額現任委署護軍參領元孫塞欽現任筆帖式顔蓀尼易州地方人其孫常綬原任通事官倭赫易州地方人原任護軍校金楠易州地方人其子鄧尼璧原任護軍校金山易州地方人其長子金俊盛原任庫掌次子金官著原任七品官孫普輝現任筆帖式聶禮弼得州地方人原任通事官天布基望京地方人其子進寶原任驍騎校仲什尼易州地方人其孫金花色現係馬甲巴顔岱得州地方人其孫精額理現係馬甲金聲得州地方人其元孫七十現係馬甲春社得州地方人其孫六逹色現係馬甲金那密得州地方人其曾孫大漢現係馬甲金布吉易州地方人其曾孫三逹色現係馬甲金春易州地方人其曾孫金關保現係馬甲顧東遂得州地方人其孫金赫色現係領催額色理原籍無考其孫四十三現係護軍林清原籍無考其孫永常現係護軍正紅旗包衣德純開城府地方人其子登色尼原任通事官孫二格亦原任通事官鑲白旗包衣戴哈尼易州地方人原任四品典儀兼通事官其子金泰原任內閣侍讀孫廣福原係副榜世祿原任侍讀學士廣綬原任糧道曾孫明逺松齡俱係監生愛錫蓋州地方人其孫二逹色現係馬甲滿住蓋州地方人其孫白逹色現係間散鑲紅旗金繼先蓋州地方人其曾孫六十現任驍騎校鑲藍旗包衣赫基原籍無考其子鐵拉米原任八品通事官孫竒那米原任佐領曾孫桂靈現任護軍校金誠原籍無考其孫溫普現任八品官齊都隨原籍無考其孫菩提保現係馬甲書義原籍無考其孫烏什現係馬甲以上俱係天聰時來歸之人鑲黃旗包衣胡錫義易州地方人原任內副管領其孫明額理原任員外郎元孫邁圖現任筆帖式楚鼐易州地方人其曾孫觀音保現任護軍校正白旗包衣特克秦望京地方人原任通事官其子章猷原任典儀曾孫額爾登現任鳴贊吳雲住原任筆帖式鑲紅旗包衣金德隆紅溪堡地方人其曾孫穆特赫現係生員正藍旗包衣蕩色原籍無考其孫金赫色現係馬甲鑲藍旗包衣精額理原籍無考其曾孫董柱現係領催以上俱係來歸年分無考之人韓氏韓氏係隸滿洲旗分之高麗一姓其氏族散處於易州等地方韓雲國正紅旗人世居易州地方輕車都尉編佐領使初同弟韓尼來歸授二等統焉後三圍錦州擊松山馬兵敗之定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之敘功授為一等輕車都尉卒其子韓基襲職三遇恩詔加至二等男其元孫韓都襲職時削去叔之子韓恩詔所加之職承襲一等輕車都尉卒其親占襲職現任防禦又韓雲之曾孫常保原任三等護衛韓尼國正紅旗人世居易州地方輕車都尉三遇初同兄韓雲來歸授三等恩詔加至一等輕車都尉兼一雲騎尉卒其第五子傑海襲職任防禦卒其孫晉德襲職現任長史兼佐領又韓尼之長子傑林原任長史兼佐領次子傑殷由護軍統領從征察哈爾擊賊有功又引兵赴榆林平定延安等處參贊軍務纍著勞績優授騎都尉其長子花色次子傑瑚孫顔泰相繼承襲又韓尼第三子傑都由護軍參領從征福建於厦門地方擊海賊鄭成功舟師敗之又從征四川於朝天關擊敗賊偽總兵施存禮等兵一萬七千餘衆又於盤龍山擊賊偽將王贈騎都屏藩等兵殿後陳亡優親兄之子韓成襲職任尉兼一雲騎尉無嗣其頭等護衛卒其子明圖襲職現任參領又韓尼第四子那秦原任黑龍江副都統第六子星韶原任佐領孫韓坦文泰俱原任筆帖式韓普現任筆帖式瑪奇現任城守尉韓簽原任員外郎晉山現任頭等護衛那林現任護軍校倭赫訥現任二等護衛曾孫明倫永福俱現任筆帖式康泰現任鳴贊傳常現任頭等護衛聶尼正黃旗包衣人世居易州地方天聰時來歸其孫碩石提由委署驍騎校從征浙江福建纍著戰功授雲騎尉卒其子斯格襲職現任護軍校又聶尼之曾孫保色原任藍翎侍衛以上俱係應立傳之人其餘附載於後正黃旗嶽拉米原籍無考其子哈什器原任護軍校正紅旗舒穆海易州地方人其子訥斯赫理原任頭等護衛孫瑪哈逹原任鳴贊曾孫塔穆布那穆布俱原任筆帖式嶽穆布現任協領楚穆布現任步軍校以上俱係國初來歸之人正黃旗包衣席圖庫安法地方人其子桑格原任內副管領由鑲黃旗包衣改隸鄧儀弼易州地方人其曾孫羅密現係馬甲博龍義開城府地方人其曾孫普哲現係護軍帖禮弼易州地方人其元孫塔哈廉現係護軍額爾社原籍無考其孫赫順現係領催正紅旗韓齊理原籍無考其曾孫逹桑阿現係馬甲鑲藍旗包衣傅朗阿原籍無考其孫八十一現係馬甲以上俱係天聰時來歸之人李氏李氏係隸滿洲旗分之髙麗一姓其氏族散處於黃河套等地方騰那弼鑲藍旗包衣人原籍無考天聰時來歸其孫滿逹由護軍校從征準噶爾在和通呼爾哈腦爾贈雲騎地方擊賊陳亡現襲職尉其子達崇阿右係應立傳之人其餘附載於後正黃旗包衣李仁傑黃河套地方人原任通事官其子李蒙山亦原任通事官孫李培官原任員外郎曾孫輝乾原任司胙官僧輝開城府地方人原任通事官其子柏崇義原任傅南苑總管孫穆清額現任護軍校海現任筆帖式李黨鼎黃河套地方人其子逹蕭原任通事官喀爾薩平安道地方人原任通事官其子桂協尼原任驍騎校孫來住原任庫掌曾孫德克晉現任筆帖式三拜易州地方人其曾孫通保現係馬甲正紅旗龎塞凱原籍無考其曾孫桑格現係護軍鑲白旗包衣老格蓋州地方人其子四十九原任包衣大孫安岱翁泰亦俱原任包衣大佛太現任頭等護衛葛爾太原任護軍校曾孫明住原任包衣參領鑲藍旗東安原籍無考其孫齊什原任驍騎校伊爾逹穆赫逹色俱原任三等護衛石泰栁關屯地方人其子李髙原係生員包衣李四格李佳堡地方人其曾孫薩秉阿現係馬甲以上俱係天聰時來歸之人鑲黃旗包衣都拉米易州地方人其孫查漢岱現任七品牧長右係來歸年分無考之人朴氏朴氏係隸滿洲旗分之高麗一姓其氏族散處於易州等地方東安鑲白旗包衣人世居易州地方天聰時來歸原任內大臣其子圖爾薩原任包衣大孫赫逹色原任護軍校雅竒保原任五品典儀曾孫赫二格現任護軍校元孫赫玉柱現任八品官右係應立傳之人其餘附載於後鑲白旗包衣伊克濟理平壤地方人其孫逹色現任六品包衣大曾孫朴存柱亦現任六品包衣大右係國初來歸之人正黃旗包衣舒吉理開城府地方人其子德音尼原任通事官孫金柱現任驍騎校常柱費揚阿俱現任通事官曾孫蘇成額亦現任通事官巴普濟平安道地方人其孫三保柱原任筆帖式巴什紫現任護軍校滿社吉開城府地方人原任通事官其孫巴蘭泰亦原任通事官阿良義易州地方人其元孫二逹色現係馬甲傑臨弼蜀川地方人其孫保成現係馬甲以上俱係天聰時來歸之人張氏張氏係隸滿洲旗分之高麗一姓其氏族散處於易州等地方檀濟尼國正藍旗人世居易州地方任六品通事官孫雅初來歸其子薩克什理原圖原任都統弼里克圖原任頭等護衛曾孫塞爾圖亦原任頭等護衛塞亨原任護軍參領右係應立傳之人其餘附載於後正白旗包衣碩禮望京地方人原任通事官其長子尼瑪爾泰原任內管領次子常保原任庫掌孫桑格現任驍騎校五雲著原任筆帖式塞克圖現係武舉右係國初來歸之人正黃旗包衣郭弼易州地方人其子桑格原任主事孫佛保原任護軍校法保原任委署護軍參領鑲白旗包衣僧訥米開州地方人原任六品包衣大以上俱係天聰時來歸之人正紅旗尼瑪碧漢地方人原任典儀其孫錫蘭太現任驍騎校包衣畨德柱碧漢地方人尼瑪同族其子費逹理原任七品典儀鑲藍旗包衣張鵬翼原籍無考其孫張保住現係間散以上俱係來歸年分無考之人傅氏傅氏係隸滿洲旗分之高麗一姓此一姓原籍俱無考三蘇正黃旗人原籍來歸年分俱無考其子薩哈那原任驍騎校孫新太原任司庫額衣圖原任副都統曾孫魯格現任筆帖式赫雅圖現任護軍校傅臣現任郎中傅森現任員外郎右係應立傳之人其餘附載於後正黃旗聶樓原籍無考其孫那什泰原任驍騎校右係國初來歸之人正黃旗包衣謨齊尼原籍無考其孫福保住現係弓匠右係天聰時來歸之人柏氏柏氏係隸滿洲旗分之高麗一姓此一姓世居易州地方柏雲正黃旗包衣人世居易州地方天聰時來歸其孫海保原任通事官海錫尼由委署護軍校從征浙江福建擊逆賊耿精忠兵敗之又解泉州圍奪洛陽橋被創身亡優贈騎都尉其曾孫巴顔岱現襲職又柏雲之元孫積善現任庫掌右係應立傳之人八旗滿洲氏族通譜卷七十二欽定四庫全書
