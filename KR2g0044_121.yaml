body:
  text: 八旗滿洲氏族通譜卷六十正白旗有名位希姓珠赫勒氏珠赫勒為滿洲一姓此一姓世居烏喇地方努他拉正白旗人四國初來歸其曾孫邁堪原任護軍校世孫廣玉現任員外郎廣玉今隸本旗包衣博爾衮氏博爾衮為滿洲一姓此一姓世居那木都魯地方郭和達正白旗人伊國初來歸原任驍騎校其子齊鼐原任佐領阿魯氏阿魯為滿洲一姓此一姓世居索倫地方揚武正白旗人原國初來歸其孫倭精額任三等侍衛敖佳氏敖佳為滿洲一姓此一姓世居馬察地方海蘭正白旗人曾國初來歸其孫什圖原任驍騎校孫薩爾泰現任防禦瑚錫喀氏瑚錫喀為滿洲一姓此一姓世居黑龍江地方費雅庫納正白旗人騎國初來歸其曾孫赫楞泰原任驍校元孫瑪琦納原任護軍校齊格現任七品官朱錫理氏朱錫理為滿洲一姓此一姓世居蜚悠城地方額圖瑚正白旗人現國初來歸其曽孫頗廉任驍騎校珠雅拉氏珠雅拉為滿洲一姓此一姓世居烏喇地方塞白圖正白旗人驍國初來歸原任騎校阿爾布氏阿爾布為滿洲一姓此一姓世居烏喇地方䝉果爾鐸正白旗人軍國初來歸其四世孫衮齊原任護校五世孫張保住原任筆帖式齊克騰氏齊克騰為滿洲一姓此一姓世居烏喇地方西喇布正白旗人原國初來歸其孫色成額任護軍校吳濟佳喇氏吳濟佳喇為滿洲一姓此一姓世居長白山地方博爾鐸正白旗人原國初來歸其孫常舒保任護軍校文達氏文達為滿洲一姓此一姓世居葉赫地方瑚什正白旗人原國初來歸其孫吳達禪任筆帖式楞布爾勤氏楞布爾勤為滿洲一姓此一姓世居索倫地方瑚瑪爾岱正白旗人崇德時來歸原任頭等侍衛都克塔理氏都克塔理為滿洲一姓此一姓世居努克特勒地方索索渾正白旗人崇德時來歸其孫三雅圖現任護軍校阿拉邊前氏阿拉邊前為滿洲一姓此一姓世居索倫地方席韜正白旗人來歸年分無考其子布拉達哈原任頭等侍衛圖爾塔拉氏圖爾塔拉為滿洲一姓此一姓世居黑龍江地方雅哈爾正白旗人來歸年分無考其子通古原任頭等侍衛錫克德氏錫克德為滿洲一姓此一姓世居卦爾察地方瑪克圖正白旗人來歸年分無考原任防禦其子瑪拉原任藍翎侍衛孫存格現任副護軍參領今𨽻本旗䝉古旗分羅察氏羅察為滿洲一姓此一姓世居索倫地方顧楞泰正白旗人來歸年分無考原任二等侍衛其子羅彌達原任護軍校伊穆氏伊穆為滿洲一姓此一姓世居紅雲堡地方喀喀正白旗人來歸年分無考其孫穆爾泰原任二等侍衛元孫元圖原任筆帖式墨克廷氏墨克廷為滿洲一姓此一姓世居黑龍江地方葛祿德正白旗人來歸年分無考其孫巴什圖現任三等侍衛又葛祿德親弟永索岱之子玉庫原任驍騎校孫札瑪哈現任三等侍衛瑪爾丹氏瑪爾丹為滿洲一姓此一姓世居札庫木地方雅圖正白旗人來歸年分無考其孫伊福內現任步軍校四格現任驍騎校額爾格圖氏額爾格圖為滿洲一姓此一姓世居黑龍江地方謨林察正白旗人來歸年分無考其孫龎吉原任藍翎侍衛色勒理氏色勒理為滿洲一姓此一姓世居渾春地方達耀正白旗人來歸年分無考其曾孫克穆努現任藍翎侍衛武庫登吉氏武庫登吉為滿洲一姓此一姓世居齊哈爾地方鄂爾渾春正白旗人來歸年分無考其孫囊賴現任藍翎侍衛章齊氏章齊為滿洲一姓此一姓世居那木都魯地方錫常正白旗人來歸年分無考其孫福楞儀現任驍騎校賈佳氏賈佳為滿洲一姓此一姓世居烏喇地方精額理正白旗人來歸年分無考原任驍騎校都雅爾氏都雅爾為滿洲一姓此一姓世居渾湖理努克特勒地方蒙果爾岱正白旗人來歸年分無考原任護軍校其子阿穆察庫亦原任護軍校亨奇勒氏亨奇勒為滿洲一姓此一姓世居吉林烏喇地方沙爾希納正白旗人來歸年分無考其孫瑚孟額原任護軍校格晉氏格晉為滿洲一姓此一姓世居佛阿拉地方璧耀和齊正白旗包衣人來歸年分無考其子烏錫泰原任佐領元孫阿穆哈原任護軍校希薩爾氏希薩爾為滿洲一姓此一姓世居輝發地方高琯正白旗包衣人來歸年分無考原任牧長其曾孫定柱現任護軍校鄂通氏鄂通本係地名因以為姓此一姓世居鄂通地方色克正白旗包衣人來歸年分無考其元孫常興現任庫掌公鄂理氏公鄂理為滿洲一姓此一姓世居松花江地方古穆正白旗人康熙時自科爾沁撤回其曾孫諾穆索理現任六品典儀正紅旗有名位希姓穆盧氏穆盧為滿洲一姓此一姓世居索倫地方達哈那正紅旗人僧國初來歸其孫久勒原任鳴贊曾孫庫勒原任二等護衛色穆懇現任山東糧道元孫阿隆阿原任中書札哈瑪氏札哈瑪為滿洲一姓此一姓世居尼馬察地方聶度正紅旗人孫國初來歸其曾孫福當阿原任郎中元達禮瑚原任七品官拜山原任郎中四世孫阿隆阿原任員外郎尼雅漢原任主事五世孫尼爾錦現任同知墨克勒氏墨克勒為滿洲一姓此一姓世居葉赫地方納顔布正紅旗人現國初來歸其曾孫常明任護軍參領謨爾齊理氏謨爾齊理為滿洲一姓此一姓世居噶哈地方敦鐸和正紅旗人德國初來歸其子阿寧泰原任翼長孫成額原任筆帖式曾孫傅喀原任護軍校舍勒原任前鋒侍衛伊勒爾濟氏伊勒爾濟為滿洲一姓此一姓世居吉陽地方圖郎阿正紅旗人世國初來歸其元孫舒書原任主事四孫富有現任五品官五世孫蘇克三原任驍騎校順古爾岱原任護軍校都爾勒氏都爾勒為滿洲一姓此一姓世居黑龍江庫魯穆圖村地方哲爾德正紅旗人孫國初來歸其曾孫頗廉現任主事元薩寧阿薩穆哈俱現任筆帖式韓楚哈氏韓楚哈為滿洲一姓此一姓世居綏分地方葛伯正紅旗人衛國初來歸其孫葛穆特訥原任三等護曾孫錫保住原任筆帖式遍圖原任驍騎校元孫札克丹武什蘭俱原任驍騎校德穆圖原任防禦邁蘭現任護軍校四世孫積貴原任驍騎校五世孫福神保現任護軍校六世孫瑚理黑色俱現任驍騎校舒爾都氏舒爾都為滿洲一姓此一姓世居葉赫地方拜色正紅旗人阿國初來歸其子星額理原任驍騎校孫蘭泰原任步軍校納爾泰現任護軍校徐察氏徐察為滿洲一姓此一姓世居蓋州城鄂羅多地方寶色正紅旗人驍國初來歸原任騎校福塔氏福塔為滿洲一姓此一姓世居長白山地方曾啓盛正紅旗人本國初來歸原任典儀由旗包衣改隸奇德理氏奇德理為滿洲一姓此一姓世居葉赫地方鼐音達理正紅旗人校國初來歸其孫吳爾圖原任護軍柴達理原任筆帖式錦州現任護軍校元孫博思圖現任七品官瑚琥氏瑚琥為滿洲一姓此一姓世居虎爾哈烏喇地方圖喇正紅旗人善國初來歸其子博禮原任中書宗佳氏宗佳為滿洲一姓此一姓世居輝和地方吳資正紅旗人來歸年分無考其孫滿丕原任驍騎校札克丹原任護軍校曾孫五十九亦原任護軍校常德原係進士訥迪氏訥迪為滿洲一姓此一姓世居黑龍江地方噶哈正紅旗人來歸年分無考其子賚岱原任護軍校瓦爾佳氏瓦爾佳為滿洲一姓此一姓世居長白山地方納蘭泰正紅旗人來歸年分無考其子鄂色原任護軍校八旗滿洲氏族通譜卷六十欽定四庫全書八旗滿洲氏族通譜卷六十正白旗有名位希姓珠赫勒氏珠赫勒為滿洲一姓此一姓世居烏喇地方努他拉正白旗人四國初來歸其曾孫邁堪原任護軍校世孫廣玉現任員外郎廣玉今隸本旗包衣博爾衮氏博爾衮為滿洲一姓此一姓世居那木都魯地方郭和達正白旗人伊國初來歸原任驍騎校其子齊鼐原任佐領阿魯氏阿魯為滿洲一姓此一姓世居索倫地方揚武正白旗人原國初來歸其孫倭精額任三等侍衛敖佳氏敖佳為滿洲一姓此一姓世居馬察地方海蘭正白旗人曾國初來歸其孫什圖原任驍騎校孫薩爾泰現任防禦瑚錫喀氏瑚錫喀為滿洲一姓此一姓世居黑龍江地方費雅庫納正白旗人騎國初來歸其曾孫赫楞泰原任驍校元孫瑪琦納原任護軍校齊格現任七品官朱錫理氏朱錫理為滿洲一姓此一姓世居蜚悠城地方額圖瑚正白旗人現國初來歸其曽孫頗廉任驍騎校珠雅拉氏珠雅拉為滿洲一姓此一姓世居烏喇地方塞白圖正白旗人驍國初來歸原任騎校阿爾布氏阿爾布為滿洲一姓此一姓世居烏喇地方䝉果爾鐸正白旗人軍國初來歸其四世孫衮齊原任護校五世孫張保住原任筆帖式齊克騰氏齊克騰為滿洲一姓此一姓世居烏喇地方西喇布正白旗人原國初來歸其孫色成額任護軍校吳濟佳喇氏吳濟佳喇為滿洲一姓此一姓世居長白山地方博爾鐸正白旗人原國初來歸其孫常舒保任護軍校文達氏文達為滿洲一姓此一姓世居葉赫地方瑚什正白旗人原國初來歸其孫吳達禪任筆帖式楞布爾勤氏楞布爾勤為滿洲一姓此一姓世居索倫地方瑚瑪爾岱正白旗人崇德時來歸原任頭等侍衛都克塔理氏都克塔理為滿洲一姓此一姓世居努克特勒地方索索渾正白旗人崇德時來歸其孫三雅圖現任護軍校阿拉邊前氏阿拉邊前為滿洲一姓此一姓世居索倫地方席韜正白旗人來歸年分無考其子布拉達哈原任頭等侍衛圖爾塔拉氏圖爾塔拉為滿洲一姓此一姓世居黑龍江地方雅哈爾正白旗人來歸年分無考其子通古原任頭等侍衛錫克德氏錫克德為滿洲一姓此一姓世居卦爾察地方瑪克圖正白旗人來歸年分無考原任防禦其子瑪拉原任藍翎侍衛孫存格現任副護軍參領今𨽻本旗䝉古旗分羅察氏羅察為滿洲一姓此一姓世居索倫地方顧楞泰正白旗人來歸年分無考原任二等侍衛其子羅彌達原任護軍校伊穆氏伊穆為滿洲一姓此一姓世居紅雲堡地方喀喀正白旗人來歸年分無考其孫穆爾泰原任二等侍衛元孫元圖原任筆帖式墨克廷氏墨克廷為滿洲一姓此一姓世居黑龍江地方葛祿德正白旗人來歸年分無考其孫巴什圖現任三等侍衛又葛祿德親弟永索岱之子玉庫原任驍騎校孫札瑪哈現任三等侍衛瑪爾丹氏瑪爾丹為滿洲一姓此一姓世居札庫木地方雅圖正白旗人來歸年分無考其孫伊福內現任步軍校四格現任驍騎校額爾格圖氏額爾格圖為滿洲一姓此一姓世居黑龍江地方謨林察正白旗人來歸年分無考其孫龎吉原任藍翎侍衛色勒理氏色勒理為滿洲一姓此一姓世居渾春地方達耀正白旗人來歸年分無考其曾孫克穆努現任藍翎侍衛武庫登吉氏武庫登吉為滿洲一姓此一姓世居齊哈爾地方鄂爾渾春正白旗人來歸年分無考其孫囊賴現任藍翎侍衛章齊氏章齊為滿洲一姓此一姓世居那木都魯地方錫常正白旗人來歸年分無考其孫福楞儀現任驍騎校賈佳氏賈佳為滿洲一姓此一姓世居烏喇地方精額理正白旗人來歸年分無考原任驍騎校都雅爾氏都雅爾為滿洲一姓此一姓世居渾湖理努克特勒地方蒙果爾岱正白旗人來歸年分無考原任護軍校其子阿穆察庫亦原任護軍校亨奇勒氏亨奇勒為滿洲一姓此一姓世居吉林烏喇地方沙爾希納正白旗人來歸年分無考其孫瑚孟額原任護軍校格晉氏格晉為滿洲一姓此一姓世居佛阿拉地方璧耀和齊正白旗包衣人來歸年分無考其子烏錫泰原任佐領元孫阿穆哈原任護軍校希薩爾氏希薩爾為滿洲一姓此一姓世居輝發地方高琯正白旗包衣人來歸年分無考原任牧長其曾孫定柱現任護軍校鄂通氏鄂通本係地名因以為姓此一姓世居鄂通地方色克正白旗包衣人來歸年分無考其元孫常興現任庫掌公鄂理氏公鄂理為滿洲一姓此一姓世居松花江地方古穆正白旗人康