body:
  text: 八旗滿洲氏族通譜卷六十二正藍旗有名位希姓䝉果資氏䝉果資為滿洲一姓此一姓世居綏分地方拜新正藍旗人永國初來歸其曾孫塞爾古德原任佐領郭爾德原任驍騎校元孫塞爾登現任三等護衛舒克都理氏舒克都理為滿洲一姓此一姓世居黑龍江地方阿克善正藍旗人原國初來歸原任七品官其子艾達哈任驍騎校孫根保原任防禦曾孫葛思特原任二等護衛舒芳舒德俱現任筆帖式費佳氏費佳為滿洲一姓此一姓世居訥殷江地方達音正藍旗人原國初來歸其子穆成阿任三等護衛阿塔穆氏阿塔穆為滿洲一姓此一姓世居葉赫地方阿弼喀正藍旗人曾國初來歸其孫錫蘭泰原任五品官孫瑪爾吉原任筆帖式元孫勒克現任三等護衛西法齊氏西法齊為滿洲一姓此一姓世居綏分地方伊思瑚正藍旗人校國初來歸其曾孫四格原任步軍八十六現任護軍校孔尼喇氏孔尼喇為滿洲一姓此一姓世居黑龍江地方圖綬武正藍旗人泰國初來歸原任驍騎校其元孫那爾原任筆帖式格叟原任防禦四世孫畢拉岱現任防禦密札氏密札為滿洲一姓此一姓世居尼馬察地方敦鐸正藍旗人世國初來歸其六世孫董錫原任防禦七孫德穆圖雅圖俱原任驍騎校雅思哈現任防禦阿思哈現任驍騎校九世孫蘇成阿吳隆額俱現任驍騎校倭徹勒氏倭徹勒為滿洲一姓此一姓世居葉赫地方倭赫訥正藍旗人原國初來歸其孫桑格任五品官多興氏多興為滿洲一姓此一姓世居殷地方古爾蒙額正藍旗人帖國初來歸其子綽布岱原任筆式孫多寶原任鳴贊博都理氏博都理為滿洲一姓此一姓世居索倫地方博倫泰正藍旗人原國初來歸其子塔爾布任驍騎校何齊拉氏何齊拉為滿洲一姓此一姓世居雅蘭地方兌樓正藍旗人原國初來歸其孫瓦爾達任驍騎校雅佳氏雅佳為滿洲一姓此一姓世居輝發地方什達色正藍旗人原國初來歸其子雅郎阿任護軍校桓泰氏桓泰為滿洲一姓此一姓世居雅蘭地方那蘇正藍旗人七國初來歸原任品官喀爾庫氏喀爾庫為滿洲一姓此一姓世居烏喇地方阿爾哈正藍旗人曾國初來歸其孫達蘭泰原任筆帖式孫羅藏亦原任筆帖式阿顏岱現任前鋒校福錫氏福錫為滿洲一姓此一姓世居福山地方倭赫正藍旗包衣人哈國初來歸原任三等護衛其子達原任護軍校莽果氏莽果為滿洲一姓此一姓世居烏喇地方唐柱正藍旗包衣人瑪國初來歸其子韓岱原任護軍校孫伊善雅哈理俱原任護軍校孔果絡氏孔果絡為滿洲一姓此一姓世居黑龍江地方圖爾漢正藍旗人來歸年分無考其子準泰原任驍騎校孫吳珠爾現任佐領葉祿氏葉祿為滿洲一姓此一姓世居葉赫地方尼唐阿正藍旗人來歸年分無考其子雅圖現任步軍校瓢佳氏瓢佳為滿洲一姓此一姓世居薩穆占地方剛察正藍旗人來歸年分無考其元孫格圖肯現任六品典儀札克塔氏札克塔為滿洲一姓此一姓世居黑龍江地方錫爾哈正藍旗人來歸年分無考原任驍騎校綽絡氏綽絡為滿洲一姓此一姓世居黑龍江地方綽克托正藍旗人來歸年分無考原任驍騎校索濟雅喇氏索濟雅喇為滿洲一姓此一姓世居大凌河地方巴什正藍旗包衣人來歸年分無考其孫法保原任驍騎校瓦爾喀氏瓦爾喀為滿洲一姓此一姓世居吉林烏喇地方旺福正藍旗包衣人來歸年分無考其孫志明現任護軍校鄂卓絡氏鄂卓絡為滿洲一姓此一姓世居瓦爾喀地方伊拉齊正藍旗包衣人來歸年分無考其曾孫常綬現係監生瑚爾哈蘇氏瑚爾哈蘇為滿洲一姓此一姓世居吉林烏喇地方鄂謨克圖正藍旗人康熙時自科爾沁撤回原任佐領其孫班達爾善亦原任佐領曾孫達賚現任三等護衛元孫阿拉普坦現任護軍校鑲藍旗有名位希姓恆吉理氏恆吉理為滿洲一姓此一姓世居董鄂地方塞爾庫德鑲藍旗人領國初來歸其孫祿吉原任前鋒參兼佐領華霞原任護軍校曾孫納拉原任三等護衛索徹理氏索徹理為滿洲一姓此一姓世居烏喇地方碩色鑲藍旗人騎國初來歸原任防禦其子鄂色原任驍校多色原任主事托理原任員外郎錫强氏錫强為滿洲一姓此一姓世居鄂爾渾地方貝成額鑲藍旗人現國初來歸其曾孫英額圖任副護軍參領申穆理氏申穆理為滿洲一姓此一姓世居朱舍理地方哲鍾峩愛塔鑲藍旗人原國初來歸其六世孫保柱任四品典儀杭佳氏杭佳為滿洲一姓此一姓世居哈達地方杭山鑲藍旗人任國初來歸其子占住原三等護衛巴雅爾齊氏巴雅爾齊為滿洲一姓此一姓世居諾羅地方喀蘭泰鑲藍旗人領國初來歸其曾孫和尚現任弓匠協佛保現任委署副護軍參領阿賚氏阿賚為滿洲一姓此一姓世居翁郭羅城地方赫紳鑲藍旗人親國初來歸其孫郭吉納原任步軍校其弟勒錫之孫三雅圖原任護軍校伊爾穆氏伊爾穆為滿洲一姓此一姓世居哈達地方察爾泰鑲藍旗人赫國初來歸其曾孫額爾原任步軍校錫瑪拉氏錫瑪拉為滿洲一姓此一姓世居額楚地方塔克圖鑲藍旗人瑚國初來歸其曾孫塞爾原任步軍校瑚爾泰氏瑚爾泰為滿洲一姓此一姓世居輝發地方馬達布鑲藍旗人原國初來歸其子德柱任驍騎校喀克錫理氏喀克錫理為滿洲一姓此一姓世居陽石木地方輝塔鑲藍旗人原國初來歸其子恰塔任驍騎校索絡恰氏索絡恰為滿洲一姓此一姓世居雅爾湖地方噶哈達鑲藍旗人原國初來歸其曾孫塞勒任驍騎校沙達喇氏沙達喇為滿洲一姓此一姓世居輝發地方榜鈕鑲藍旗人原國初來歸其孫武赫任護軍校范佳氏范佳為滿洲一姓此一姓世居輝發地方額爾濟圖鑲藍旗人本國初來歸原任護軍校由旗包衣改隸努魯氏努魯為滿洲一姓此一姓世居輝發地方多和倫鑲藍旗人原國初來歸其孫賽弼圖任筆帖式額哲氏額哲為滿洲一姓此一姓世居蘭河山地方赫色鑲藍旗包衣人色國初來歸其孫瑪色原任護軍校曾孫爾圖亦原任護軍校蘇爾佳氏蘇爾佳為滿洲一姓此一姓世居松花堡地方和隆阿鑲藍旗包衣人任國初來歸其曾孫珠勒現護軍校申佳氏申佳為滿洲一姓此一姓世居烏喇地方鄂爾積圖鑲藍旗包衣人任國初來歸其孫雅圖原護軍校謨嶽絡氏謨嶽絡為滿洲一姓此一姓世居舒穆祿村地方雲布鑲藍旗包衣人天聰時來歸原任護軍校玉圖墨氏玉圖墨為滿洲一姓此一姓世居哈達地方薩弼鑲藍旗包衣人天聰時來歸原任八品官洪果奇氏洪果奇為滿洲一姓此一姓世居長白山地方和爾和鑲藍旗人來歸年分無考其子達理原任佐領孫達爾泰亦原任佐領周成氏周成為滿洲一姓此一姓世居周齊理地方喀特蘇鑲藍旗人來歸年分無考其孫喀爾泰現任三等護衛哈巴氏哈巴為滿洲一姓此一姓世居哈逹地方布爾哈岱鑲藍旗人來歸年分無考其孫雙喜原任護軍校那爾賽現任驍騎校嘉穆瑚氏嘉穆瑚為滿洲一姓此一姓世居輝發地方佟凱鑲藍旗人來歸年分無考其孫定柱原任護軍校良佳氏良佳為滿洲一姓此一姓世居瀋陽地方善慶鑲藍旗人來歸年分無考其孫良德宏原任天文生由本旗包衣改隸舒佳氏舒佳為滿洲一姓此一姓世居黑龍江法喀堡子地方愛星阿鑲藍旗人來歸年分無考其孫武當阿原任典簿䝉果氏䝉果為滿洲一姓此一姓原籍無考溫達爾瑚鑲藍旗人來歸年分無考原任步軍校其子郭梓原任司庫孫郭泰原任員外郎努爾哈拉氏努爾哈拉為滿洲一姓此一姓原籍無考錫爾塔齊鑲藍旗人來歸年分無考原任步軍校其子庫坦保原任驍騎校圖爾佳氏圖爾佳為滿洲一姓此一姓原籍無考札爾吉納鑲藍旗人來歸年分無考其孫綏哈原任驍騎校洪衮氏洪衮為滿洲一姓此一姓世居薩哈爾察地方阿珠瑚鑲藍旗包衣人來歸年分無考其子費顏達理原任參領錫圖原任護軍校孫額爾塞原任六品包衣大馬操原任護軍校拜嘉喇氏拜嘉喇為滿洲一姓此一姓世居虎爾哈地方拜圖鑲藍旗包衣人來歸年分無考其元孫阿保現任三等護衛納哈塔氏納哈塔為滿洲一姓此一姓世居郭絡羅溝地方徹克鑲藍旗包衣人來歸年分無考其曾孫四格現任護軍校元孫穆克登布現任七品典儀尼庸特氏尼庸特為滿洲一姓此一姓世居法穆納哈達地方阿祿鑲藍旗人康熙時自科爾沁撤回其孫諾爾布原任典儀曾孫阿那納現任驍騎校哈爾拉氏哈爾拉為滿洲一姓此一姓世居吉林烏喇地方溫察海鑲藍旗人康熙時自科爾沁撤回其孫額爾特現任驍騎校瑚塔氏瑚塔為滿洲一姓此一姓世居科爾沁地方阿納庫鑲藍旗人康熙時自科爾沁撤回其元孫吳濟赫原任副驍騎校八旗滿洲氏族通譜卷六十二欽定四庫全書八旗滿洲氏族通譜卷六十二正藍旗有名位希姓䝉果資氏䝉果資為滿洲一姓此一姓世居綏分地方拜新正藍旗人永國初來歸其曾孫塞爾古德原任佐領郭爾德原任驍騎校元孫塞爾登現任三等護衛舒克都理氏舒克都理為滿洲一姓此一姓世居黑龍江地方阿克善正藍旗人原國初來歸原任七品官其子艾達哈任驍騎校孫根保原任防禦曾孫葛思特原任二等護衛舒芳舒德俱現任筆帖式費佳氏費佳為滿洲一姓此一姓世居訥殷江地方達音正藍旗人原國初來歸其子穆成阿任三等護衛阿塔穆氏阿塔穆為滿洲一姓此一姓世居葉赫地方阿弼喀正藍旗人曾國初來歸其孫錫蘭泰原任五品官孫瑪爾吉原任筆帖式元孫勒克現任三等護衛西法齊氏西法齊為滿洲一姓此一姓世居綏分地方伊思瑚正藍旗人校國初來歸其曾孫四格原任步軍八十六現任護軍校孔尼喇氏孔尼喇為滿洲一姓此一姓世居黑龍江地方圖綬武正藍旗人泰國初來歸原任驍騎校其元孫那爾原任筆帖式格叟原任防禦四世孫畢拉岱現任防禦密札氏密札為滿洲一姓此一姓世居尼馬察地方敦鐸正藍旗人世國初來歸其六世孫董錫原任防禦七孫德穆圖雅圖俱原任驍騎校雅思哈現任防禦阿思哈現任驍騎校九世孫蘇成阿吳隆額俱現任驍騎校倭徹勒氏倭徹勒為滿洲一姓此一姓世居葉赫地方倭赫訥正藍旗人原國初來歸其孫桑格任五品官多興氏多興為滿洲一姓此一姓世居殷地方古爾蒙額正藍旗人帖國初來歸其子綽布岱原任筆式孫多寶原任鳴贊博都理氏博都理為滿洲一姓此一姓世居索倫地方博倫泰正藍旗人原國初來歸其子塔爾布任驍騎校何齊拉氏何齊拉為滿洲一姓此一姓世居雅蘭地方兌樓正藍旗人原國初來歸其孫瓦爾達任驍騎校雅佳氏雅佳為滿洲一姓此一姓世居輝發地方什達色正藍旗人原國初來歸其子雅郎阿任護軍校桓泰氏桓泰為滿洲一姓此一姓世居雅蘭地方那蘇正藍旗人七國初來歸原任品官喀爾庫氏喀爾庫為滿洲一姓此一姓世居烏喇地方阿爾哈正藍旗人曾國初來歸其孫達蘭泰原任筆帖式孫羅藏亦原任筆帖式阿顏岱現任前鋒校福錫氏福錫為滿洲一姓此一姓世居福山地方倭赫正藍旗包衣人哈國初來歸原任三等護衛其子達原任護軍校莽果氏莽果為滿洲一姓此一姓世居烏喇地方唐柱正藍旗包衣人瑪國初來歸其子韓岱原任護軍校孫伊善雅哈理俱原任護軍校孔果絡氏孔果絡為滿洲一姓此一姓世居黑龍江地方圖爾漢正藍旗人來歸年分無考其子準泰原任驍騎校孫吳珠爾現任佐領葉祿氏葉祿為滿洲一姓此一姓世居葉赫地方尼唐阿正藍旗人來歸年分無考其子雅圖現任步軍校瓢佳氏瓢佳為滿洲一姓此一姓世居薩穆占地方剛察正藍旗人來歸年分無考其元