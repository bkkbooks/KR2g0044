  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0044_WYG_055-1a, image: WYG0455/WYG0455-0440c.png}
body:
  text: 八旗滿洲氏族通譜目録卷二十七各地方富察氏殷達瑚齊鄂備科羅惠博爾鍾果充順巴本博索富禮塔温普理沙濟艾達佟阿泰尼喀善鄂邁豐訥赫以上俱有傳鄂和剛泰尼堪殷德理吉山巴什伊拉理阿寕阿輝泰尼雅唐鄂蓀布祿鄂禮喀達巴爾漢博絡納穆剛法費揚古瑚錫敦拜珠瑚僧蘓瑚圖德福伊都理田善富喀察皎鑒額依都理哈爾吉達色納喇阿佳豐紳滿丕星額理官泰胡什塔葉硜額鄂爾博諾莽吉理達金薩爾禪滿羆尼雅哈遼東喀巴爾努札喀永福謨瑚祿古爾賽堪錫内勒錫爾泰布爾賽博竒鄂克索穆楞額徹訥察穆漢岱資烏爾瑚愛達吉爾都布森特珠赫訥倭赫雅穆達薩哈亮阿竒那達岱吳達哈囊果禮勞翰敦都巴滿珠滿岱羅多理渾巴都爾琥班布多炳阿噶漢達爾蘓喀盧克素他爾布烏隆古松果圖哈坦吳札樓拖賴瓦色哈爾松阿德赫綽克拖艾禪尼堪喀穆圖馬克住噶爾圖鄂竒達額魁庫拜章佳赫色岱明西岱阿綽庫希達塞倫泰滿色囊達爾古德勒瑪齊喀喀理科齊雅圖額森科竒凱倫恩克烏魯瑚圖多和達古鈕巴班揚阿理蒙庫納穆達什喀爾泰和起富拉渾圖梅達什綽托倫法爾錫圖孟馬爾漢星額特黨色莽喀喇胡什屯郭爾布鼐色達納渾以上俱附載
