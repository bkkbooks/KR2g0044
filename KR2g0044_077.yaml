body:
  text: 八旗滿洲氏族通譜目録卷三十八松花江地方巴雅拉氏圖勒慎富喀那勒騰柴達哈爾庫恩庫納噶哈以上俱有傳舒舒那善道錫魯策爾錦法克塔喀哈里休達斗博爾騰勒福海塔阿穆竒拉倭理克瑪圖堪以上俱附載虎爾哈地方巴雅拉氏夸克塔喀薩哈連以上俱有傳阿隆阿沙班瑪法察白魯都璧庫岱柱奇穆托薩米達鈕爾虎山伊塔堪牛爾胡順洪科訥武苗桑沙以上俱附載木倫地方巴雅拉氏伊搆喬萬胡克珍森都楞興相賴鼐以上俱有傳卿球額爾森額樓商堅以上俱附載各地方巴雅拉氏尼堪噶普塔喀通吉善奎泰舒寧阿多爾吉那巴爾哈善圖南以上俱有傳呉法哈綽寧阿蘇和尼庫綬寧阿董蕭敖翁索爾豪武爾登額撓那蘇克蘇客霍倫尼永尼雅哈尼爾豪倭和岱倫尼永尼堪披揚郭庫坦渾達喀恩努肯吳爾佳齊昭托倫尼雅瑚多顔徳福綽思圖外庫道達喀察爾拜巴楞太葉爾胡訥以上俱附載
  hash: sha256:dea1acc1c3e4c38e0907fa70cf0ea0233be1892e5d8be5fd2024878c546d42cb
