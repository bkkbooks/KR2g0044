body:
  text: 八旗滿洲氏族通譜卷三十二郭絡羅氏郭絡羅本係地名因以為姓其氏族散處於沾河等地方常舒國鑲白旗人世居沾河地方使統之又編半個佐初同弟楊舒來歸編佐領領令其第四子布漢圖統之第六子察哈喇原任佐領孫錫賚由護軍參領二次過北京征山東入關時擊敗敵兵駐防密雲城擊敗趙軍門兵定鼎燕京時入山海關擊敗流寇叙功授騎恩詔加都尉三遇車都尉卒其孫哲庫訥曽孫哲色理至二等輕恩詔所相繼承襲哲色理卒其子髙普襲職時削去葉加之職承襲騎都尉現任佐領又常舒之孫錫由護軍參領初次過北京征山東擊敗吳軍門兵圍錦州擊敗杏山松山馬步兵征流賊於延安府屢敗賊衆後追滕吉恩擊圖謝圖汗兵陳亡贈騎都尉其親弟之子額爾孫襲職三遇禮常先後承恩詔加至二等輕車都尉卒其子秉淑富恩詔所襲富禮常卒其子永華襲職時削去舒之孫福加之職承襲騎都尉現任佐領又常拉克塔由都統入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣大敗之叙功授騎都尉平定福建攻處州府下其城又於泉州府擊敗僞黃總兵僞陳副將等兵招撫一州三縣加一恩詔加雲騎尉遇車都尉征江西遇賊首金聲桓王德至三等輕仁率舟兵來犯擊敗之獲船百餘隻又於南昌府獲賊糧二百餘船尋以病卒於軍優贈為一等輕車都尉其子福克都襲職卒其孫常明襲職時削去恩詔所加之職承襲二等輕車都尉因病告退其親伯之子溫保住現襲職又常舒之曽孫瑚什巴原任獲軍參領馬碩色原任員外郎鄂雷原任長史哈山吉斯哈徹爾捫齊克都俱原任佐領臣恩詔授布祿由理事官兩遇征山東攻陽信縣不設雲騎都尉二次過北京梯第三登城克之征四川於漢中府等處屢敗賊兵又征浙江舟山屢敗僞英毅伯阮思等兵叙功優授為三等輕車都尉卒其子馬進承襲卒其子薩克慎襲職現任佐領又常舒之元孫圖克善寧柱廷柱額爾濟圖福爾敏喀爾濟海齊魁齊隆俱原任佐領都爾克原任內閣侍讀學士靈通阿原任員外郎音柱原任典儀福爾布福爾瑚俱現任佐領馬爾齊海原任四品官四世孫平柱現任主事達賚原任佐領宏科原任御史色爾布原任員外郎岱琦原任陜西巡撫德庫訥原任筆帖式阿爾拜原任四品官明申高華俱現任佐領岱錦現任主簿都隆阿現任前鋒校富桑阿候補筆帖式五世孫柏星現任六品官由鑲黃旗改𨽻楊舒太祖高正藍旗人常舒之弟也為和碩額駙預四大臣皇帝以女弟公主降焉之列其長子沙努喀原任佐領次子達爾漢尚公主為和碩額駙任都統預五大臣之列原𨽻鑲黃旗後因公主欲依親屬居處奏明太祖楊舒之子等率佐領由鑲黃旗改隸正藍旗常舒之子等率佐領由鑲黃旗改隸鑲白旗楊舒之孫舒書原任佐領鄂羅色臣由廢員三圍錦州擊敗松山馬兵又敗洪承疇三營步兵叙功優恩詔加授二等輕車都尉遇至一等輕車都尉後特恩授為三等男又兩遇統加太子太保卒其子鄂特恩詔加至二等子歷任都渾襲職歷任都統加太子太保卒鄂善襲職歷任都統兼佐領緣事革退其親伯之孫鄂岱襲恩詔所職時削去襲一等輕車都尉兼一雲騎尉現任加之職承散秩大臣兼佐領又楊舒之曽孫瓦爾達鄂禮明登俱原任佐領勒貝原任都統兼佐領噶達渾原任護軍參領鄂海原任護軍參領兼佐領漢班桑色俱原任頭等護衛色德原任三等護衛殷德原任筆帖式察普丹由護軍參領從征雲南入緬國至阿窪城獲僞桂王後征江西於贈雲騎新口費園地方擊賊陳亡領卒其子額爾登額尉其孫朱爾薩襲職任佐襲職現任佐領又楊舒之元孫鼐格原任頭等護衛華色原任前鋒參領兼佐領倭赫珠爾扎哈沙通阿俱原任佐領鄂本泰現任三等侍衛竒通保謨爾渾武什哈齊俱現任佐領雅通阿原係副護軍校四世孫鄂密原任散秩大臣兼佐領鄂起原任副護軍參領鄂進現任副參領兼佐領瑚錫國鑲黃旗人常舒同族世居沾河地方古原任五初來歸其孫雅遜原任護軍校費掦品官曽孫格思特原任四川陜西總督巴什原任護軍參領元孫葉成額原任郎中博成格原任主事根特由主事從征厄魯特噶爾丹在烏藍布通地方擊賊陳亡贈雲騎尉其子訥爾布現襲職又瑚錫之四世孫格爾敏原任郎中永竒原任員外郎色赫布音德布俱原任筆帖式格爾福現任郎中葉赫布現任同知格爾圖格爾彬德智俱現任筆帖式永貴現任八品官五世孫保成現任中書又瑚錫親弟之孫伊圖原任郎中謨謨輝原任防禦蒙古兑由閒散過北京征山東攻博平縣不設雲梯首先登城克之授雲騎尉三遇恩詔加至三等輕車都尉卒其孫德福承襲卒其弟文殊保襲職時削去恩詔所加之職現襲雲騎尉又瑚錫親弟之曽孫圖克善清齊布俱原任郎中阿納喜原任藍翎侍衛佟阿圖原任筆帖式元孫德貴原任防禦章格原任筆帖式四世孫馬金太現係監生又瑚錫之族孫瓦克善原任驍騎校曽孫保山亦原任驍騎校托爾太原任筆帖式元孫常林現任驍騎校滿寶現任七品官四世孫郭鼐現任筆帖式穆克登額候補筆帖式朱雅穆屯珠琥國鑲白旗人常舒同族世居沾河地方領初來歸其曽孫敦達理原任包衣佐太宗文皇帝升遐時敦達理捐軀以從恩賜三等輕車都尉其子倭赫襲職後特恩加為二等輕車都尉卒其子金特赫襲職遇歷任恩詔授為一等輕車都尉卒其子巴爾瑚達襲職恩詔所副都統緣事削去輕車都尉復緣事革退其親加之職承襲二等弟之子國璉襲職現任光祿寺卿又朱雅穆屯珠琥之曽孫達拜任佐領以死殉和碩肅親王恩賜三等輕車都尉其子噶爾哈圖襲職遇等處屢立恩詔授為二等輕車都尉後從征浙江福建軍功授一等輕車都尉任護軍參領卒其子保格襲職任護軍