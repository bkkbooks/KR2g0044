body:
  text: 八旗滿洲氏族通譜卷二十佟佳地方佟佳氏佟養正鑲黃旗人世居佟佳地方其祖達爾漢圖墨圗于明時同東旺王肇州索勝格等往來近邊貿易遂寓居于開原繼遷撫順天命四年大兵征明克撫順城養正同弟養性及族衆來歸太祖髙皇帝念養正原係滿洲將族人大半令居于佛阿拉恩養三年不加差役後養正從征遼陽有命駐守功授三等輕車都尉尋奉陳良䇿與居民潛通朝鮮界之鎮江城時中軍明將毛文龍令别堡之民詐稱兵至大呼噪城中驚擾良䇿乘亂執養正殺其子豐年併從者六十人叛投毛文龍養正抗節不屈遂被害雍正九年奉㫖追祿大夫一等公加贈太師諡忠烈立碑墓道併崇贈光祀昭忠寺其子孫現𨽻本旗漢軍旗分固按佟養正與正白旗馬察地方巴都理扎爾齊雅爾湖地方達爾漢侍衛扈爾漢正紅旗長白山地方尼堪洪科鑲白旗加哈地方尼堪外蘭鑲紅旗加哈地方蘇敏都都正藍旗加哈地方渾托和等同族佟圗賴鑲黃旗人佟養正之次子也初襲父三等輕車都尉從征大凌河擊敗明監軍道張春兵叙功授為二等輕車都尉二次圍錦州取白官兒屯台又取金塔口三台三圍錦州松山馬兵來犯擊敗之又敗山口步兵攻克塔山杏山二城授為一等輕車都尉又取前屯衛中後所二城加一雲騎尉後攻太原府方周視形勢城中步兵突出擊却之指揮進攻遂下太原招降全晉破流賊滅福王平定河南江南等處屢著軍功又擊髙太監舟兵獲船三十二隻攻揚州嘉興等城皆克之超擢為二等男尋授定南將軍率兵恢復寶慶征湖廣斬僞總兵陶養用于石橋門有賊僞伯胡一清集賊衆據全州率兵𠞰滅之遂下全州三遇恩詔加至三等子歷任兵部尚書兼都統因疾乞休世祖章皇帝念其勳勞加太子太保以原官致仕卒賜祭葬如典禮諡勤襄康熙元年聖祖仁皇帝即位覃恩追贈少保後以圗賴係孝康皇太后之父特恩追封一等公世襲罔替雍正元年世宗憲皇帝即位覃恩加贈太師致祭一次命建専祠其一等公伊子佟御書功宗元祀匾額賜之春秋致祭國綱承襲佟國綱鑲黃旗人佟圗賴之長子也初由頭等侍衛襲父一等公旋任內大臣兼都統議政大臣康熙聖祖仁十四年察哈爾布爾尼作亂奉率兵往鎮宣府皇帝特命授國綱為安北將軍特命國後厄魯特噶爾丹蠢動務至烏藍布通地方國綱與其弟國維參贊軍贈騎都綱率兵奮勇進擊身中鎗傷陳亡加尉兼一雲騎尉賜祭葬諡忠勇立碑墓道雍正元年忠寺其長子鄂倫世宗憲皇帝推恩加贈太傅崇祀昭岱承襲一等公歷任內大臣緣事獲罪次子法海原任兵部尚書第三子夸岱承襲一等公歷任工部尚書卒其子納穆圗承襲一等公現任領侍衛內大臣兼都統鄂倫岱之長子補熙承襲伊祖佟國綱之騎都尉兼一雲騎尉現任綏逺城將軍兼管右衛事務次子介福現任日講官起居注翰林院侍講兼佐領第三子介德現任五品官第四子介祿現任員外郎佟國維聖祖仁鑲黃旗人佟圗賴之次子也初任頭等侍衛相皇帝推恩委任授內大臣時有紅帽子賊潛命率侍煽惑國維發其奸奉擒其渠魁賊徒解散尋以衛三十人至大佛寺孝懿仁國維係父晉封一等公從征厄魯特噶爾丹至皇后之烏藍布通地方因兄國綱戰殁國維身冒矢石衝入賊陳大兵乘之遂敗其衆因疾乞休奉㫖以原官致仕卒端純雍正元年賜祭葬如典禮諡特恩加贈太傅子七人長子葉克書原任鑾儀衛鑾儀使次子德克新原任三等侍衛第三子隆科多承襲一等公原任吏部尚書第四子慶元原任光祿寺少卿第五子慶恆現任三等侍衛第六子慶復承襲一等公現任太子太保署廣東廣西總督第七子慶泰現任副都統兼佐領孫順阿顔係和碩額駙原任領侍衛內大臣嶽興阿原任副都統玉柱原任鑾儀衛鑾儀使庸德現任主事廣德現任五品官八十九現係廕生佟養性國正藍旗人佟養正親伯佟科之子也初自撫順來歸太祖髙皇帝嘉之授三等男以孫女降焉從征遼東有功優授為二等子卒其第三子六十襲職三遇恩詔晉封三等伯歷任都統卒其子佟國瑶承襲三等伯歷任福建將軍卒其子海福承襲三等伯卒恩詔所其子齊福襲職時削去事革退其子八十六襲加之職承襲二等子緣職現任佐領又佟養性之曽孫佟世功由佐領平定陕西于髙長坡擊賊僞總兵李黃英兵陳贈雲騎亡無嗣以其姪佟鑑承襲任參領兼佐領緣事尉革退其姪佟潾現襲職又佟養性之孫佟國玉原任員外郎曽孫佟世仁原任佐領佟世澤原任步軍副尉兼佐領元孫佟礦現任佐領佟溶原任佐領四世孫佟濓現任佐領今𨽻本旗漢軍旗分佟養材國正藍旗人佟養正親伯佟選之子也從征遼東初自撫順來歸其子佟恆年由閒散贈騎都授為領催遣守鎮江城兵變被害之子佟國印尉以其弟佟成年承襲卒其親兄襲職三圍錦州擊敗山口步兵洪承疇兵遁入髙橋南三臺以紅衣炮攻克之盡殺其衆又攻破塔山杏山二城加一雲騎尉後過北京征山東回兵取邉臺七座擊墻子嶺兵敗之又克中恩詔加後所前屯衛二城優授為二等輕車都尉三遇至三等男歷任工部侍郎卒其子佟世德襲職歷任副都統卒其子佟銓襲職卒其子佟澍襲職時削去恩詔所加之職承襲二等輕車都尉現任參領又佟養材之元孫佟浩原任佐領四世孫佟湧現任佐領又佟養材族曽孫佟世祿佟世印俱原任糧道今𨽻本旗漢軍旗分佟鎮國國鑲紅旗人佟養正同族世居佟佳地方擒獲廣初自廣寧來歸授三等輕車都尉後因寧賫送僞書之人超授為三等男卒其子佟一鵬襲職三遇恩詔加至一等男兼一雲騎尉因病告退其子佟光先襲職卒其子佟咨詢孫佟維藩相繼承襲佟維恩詔所藩卒其子佟桂襲職時削去卒其子佟兆勳現加之職承襲三等男任佐領襲職今𨽻本旗漢軍旗分努顔國鑲藍旗人佟養正同族世居佟佳地方其長子初率族衆及同里來歸設佐領使統之席特庫以辦事有能不違指使授騎都尉從征大凌河屢敗賊兵征寧逺慶安等處多所俘獲叙功優授為三等輕車都尉過北京征山東遇墻子嶺兵擊敗之又敗吳總兵髙太監等兵三圍錦州敗松山馬兵復破洪承疇三營步兵授為二等輕車都尉定鼎燕京時敗僞唐總兵兵于山海關外追流賊至安肅縣斬獲甚衆授為一等輕車都尉取太原府于絳州渡口大敗流寇追滕吉思擊敗土謝圗汗及碩羅汗兵加一雲騎尉三遇恩詔加至一等男歷任副都統卒其子色爾古德襲職任佐領卒其子僧格特孫蘇丹相繼承襲蘇舟卒其子楚庫襲職現任副參領兼佐領又努顔次子鄂禮喀原任護軍參領兼佐領孫庫爾訥原任前鋒侍衛兼佐領庫爾臣原任長火兼佐領碩理原任八品官曽孫武爾禪原任副都統品級兼佐領保住滿色達爾占俱原任佐領元孫滿德現任參領兼佐領佟海現任佐領佟保現任六品官薩穆布原係廕生索達色原任佐領佟德原任三等護衛四世孫索靈阿現任乾清門二等侍衛兼佐領索爾敏原任佐領阿哈達現任六品官五世孫明海現係廕生噶哈國鑲藍旗人佟養正同族世居佟佳地方散從征初來歸設佐領使統之其子蘭拜由閒黑龍江有功授騎都尉三圍錦州擊敗松山馬兵又破洪承疇三營步兵定鼎燕京時入山海關敗流賊馬步兵二十萬衆叙功授為三等輕車都尉後征湖廣于元洲府黔陽縣等處屢敗恩詔優賊衆授為二等輕車都尉三遇部尚書兼都統加至二等男歷任太子太保吏議政大臣卒其子幹都海襲職歷任副都統兼佐領緣事革退其親弟蘇伯赫襲職任護軍參領兼佐領卒其子蘇赫襲職任郎中兼佐領卒其子常升襲職時削去恩詔所加之職承襲二等輕車都尉現任寧古塔副都統又噶哈之孫納山原任二等護衛倭赫原任四川陕西總督瑪拉原任頭等護衛曽孫官布原任副都統噶魯原任郎中兼佐領扎秦現任頭等侍衛兼佐領古爾渾原任護軍參領愛音布原任員外郎柏奇原任三等護衛齊拉渾現任筆帖式蘇爾特原任筆帖式索林原係監生元孫朱成額原任郎中索住原任員外郎邁塔原任筆帖式黑色原任護軍校雅蘭泰現任筆帖式花善原係舉人浩山二郎保俱現係監生韋駝保現任七品官常祿現任佐領常安現任驍騎校四世孫二住原任佐領常德現係廕生佟山國正藍旗人佟養正同族世居佟佳地方佟養肅初來歸原任兵部尚書兼佐領其長子原任副將次子佟養量由佐領取中後所前屯衛二城俱克之授雲騎尉後攻太原府克其城破流賊滅福王平定河南江南等處有功授為騎都尉三遇恩詔加至二等輕車都尉卒其姪佟康年襲職原任江西巡撫卒其姪佟國璜襲職卒其姪佟世圻襲恩詔所職時削去襲騎都尉卒其子佟鍈襲職現任佐加之職承領又佟山第三子屯岱由佐領三圍錦州擊敗松山馬兵又敗洪承疇三營步兵攻取塔山杏山二城授雲騎尉後攻中後所前屯衛俱克其城授為騎都尉征流賊于延安府屢敗賊衆續恩詔授征湖廣大敗賊于全州等處加一雲騎尉遇城為三等輕車都尉圍大同攻克渾源州等五恩詔加授為二等輕車都尉兩遇騎尉後緣事降為三至一等輕車都尉兼一雲等輕車都尉歷任浙江福建總督兵部尚書卒其子佟徽年襲職歷任湖南提督卒其子佟國燦襲職現任佐領又佟山之曽孫佟國光原任同知又佟山親兄佟拱之子佟養甲原任廣東廣西總督孫佟壯年原任都統兼佐領佟湘年佟淮年俱原任知府曽孫佟國相原任江西巡撫佟國佐原任參領兼佐領佟國弼佟國瑞俱原任知州佟國贊原係候補州同元孫佟世祺原任佐領佟世智現任佐領佟世正現係候補六品官佟世祈原任同知佟世佑原任知府佟世祁現任理問佟世功現任千總又佟山族姪佟養謨原任副將佟養靜原任佐領佟養介原任七品官佟養玉原任參將族孫佟希年原任佐領佟昌年原任糧道佟培年原任興泉道佟岱年現任千總族曽孫佟國昌佟國鼐俱原任佐領族元孫佟世德現任內閣侍讀學士佟世恆候補筆帖式佟世忠現任佐領今𨽻本旗漢軍旗分佟養澤國正藍旗人佟養正同族世居佟佳地方為騎都初自撫順來歸授三等輕車都尉卒降尉令其長子圗占承襲從征寧逺自中後所回兵攻臺炮烘身亡其子惠福襲職遇恩詔加一雲騎尉後圍大同攻渾源州等五城俱克之授為三等輕車都尉又兩遇恩詔加至一等輕車都尉任佐領卒無嗣其弟佟國俊襲職卒其子佟世煜襲職卒其親叔之子佟世恩詔所炳襲職卒其子佟鈁襲職時削去現任副參領加之職承襲騎都尉兼一雲騎尉兼佐領又佟養澤之次子佟義麟原任參將孫佟國儀原任員外郎曽孫佟世武原係廕生又佟養澤親弟佟養善之孫佟國洪原任知州又佟養澤親伯佟岱之孫佟鶴年原任建昌府總兵官佟羹年原任協領曽孫佟國智原任同知佟國鼎原任佐領佟國培原任防禦佟國璞原任參領佟國瑞現任參領元孫佟世麟原任南陽府總兵官佟世銓原任佐領又佟養澤族弟佟養琮原任參將佟養椿原任佐領族姪佟善年原任知州佟成年原任佐領佟慶年佟喬年俱原任知縣佟黨年原任步軍校佟有年原任防禦族孫佟國凱原任知府佟國元佟國釗俱原任知州族曽孫佟世道原任知縣佟世玉原任運判佟世英原任同知佟世䕃原任知府佟世表現任同知佟世相現任佐領今𨽻本旗漢軍旗分阿爾瑚理國鑲藍旗人佟養正同族世居佟佳地方領曽孫初來歸其孫都色密原係騎都尉任佐雅爾泰齊巴漢俱原任協領桑格原係騎都尉元孫旺齊原任員外郎費揚古現任筆帖式綏哈納原任筆帖式星格原任驍騎校