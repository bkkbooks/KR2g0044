body:
  text: 八旗滿洲氏族通譜卷二十七各地方富察氏殷達瑚齊國鑲藍旗人世居賽音訥殷地方滿達爾漢次安初來歸原任驍騎校生三子長達理三尼喀那滿達爾漢原任驍騎校其子薩穆哈原任三等護衛孫薩克新富密善俱原任佐領富明阿原任員外郎曽孫錫相現係監生胡尚阿現任護軍校安達理之子阿蘭泰歷任賜祭武英殿大學士兼吏部尚書加少保太子太保卒葬如典禮諡文清尼喀那由三等護衛從征江西於建昌府鐘鼓山等處纍著戰功征廣東廣西擊敗賊偽將馬寶等兵於韶州府續征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩敘功優授騎都尉歷任護軍統領卒無嗣其親兄之孫富寧安承襲歷任都統尋轉吏部尚書康熙五十四年䇿妄阿拉布坦來犯哈密奉命率滿洲侍衛十員馳赴軍營任故命爾前往軍中凡聖祖仁皇帝諭曰朕以爾堪信事俱宜詳慎若離朕相近猶可指授調遣今相隔甚逺遇有倉猝即馳驛傳送亦多需時日軍機大事不宜遲緩爾至彼有急調遣之事不必請旨即與將軍席柱商酌而行欽此五十六年奉旨軍務關係緊要富寧安授為靖逆將軍給與印信欽此雍正元年加文淵閣大學士四年還京奉世宗憲皇帝諭旨富寧安此畨軍前所行甚屬可嘉但未獲𠞰滅策妄阿拉布坦耳冨寧安身任將軍一心皇肫篤為國家宣力從前再三以進兵奏請於考之前皇考憐念凖噶爾人等不忍剪除是以未允其請倘欲剪除允其所奏富寧安定能擒滅策妄阿拉布坦矣皇策妄阿拉布坦之所以未滅者非伊力之不能實我考之至仁也富寧安在軍前多年約束兵丁辦理事務俱井井有條而且行止端方廉潔此數年以來領兵之將軍等聲名未有出富寧安之右者其於我皇考之寄任實心奮勉不負任使益彰皇考用人之明朕實嘉愛今朕代皇考推恩將朕之暖帽補褂素珠賜伊穿帶及縀匹銀兩被鞍黃扯手馬雙眼翎特行旌賞降旨該部封富寧安世襲侯爵爾諸大臣皆宜效法富寧安而行諸凡勿顧目前小利宜圖久逺榮顯如顧目前小利以致聲名大壞悔之亦無及矣果能一心效力豈惟主上嘉愛即上天亦必慈佑報之以福今國家升平大臣等雖無軍旅效力之處然內外諸事俱宜一體盡心爾等果能以富寧安為法一心宣力朕亦如富寧安一體加恩矣即如富寧安竒立德等俱係將軍而竒立德等行為無耻上負君上委任之恩下被屬員鄙薄蒙古等譏誚若朕於竒立德等亦視如富寧安一體加以恩榮衆人豈以朕為是哉竒立德等朕雖未加之以罪朕意以為尤甚於加之以罪也諸大臣祗應各以品行聲名為念於國家公務一意抒誠勉盡為臣以忠之道切勿瑣瑣然懷蓄私意今富寧安即標凖也特諭欽此五年轉士晉世職為一等侯旋奉武英殿大學命往陜西署理西安將軍印務六年緣事革去侯爵尋以疾卒於西安奉世宗憲皇帝諭旨富寧安人品端方操守廉潔秉掌銓衡經理戎政揚歷中外懋著勤勞謹慎小心始終一致簡任綸扉正資倚毗忽聞溘逝朕心深為軫悼應得恤典著察例具奏其喪櫬起程及歸途之費著督撫照看料理經過之處著地方官員於櫬前奠醊欽此櫬至京師特遣平郡王領內大臣一員侍衛十員往奠嗣奉賜祭葬如典禮追贈太子太傅諡文恭因無世宗憲皇帝諭旨將伊親妹之子烏蘇氏吳魯理繼富寧安為嗣承襲騎都尉任員外郎卒其子富成現襲職鄂備鑲紅旗人世居輝發地方天聰時來歸由佐領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之授雲騎尉後破流賊滅福王平定河南江南等處屢著戰功攻南恩詔加安縣奪門而入克其城授為騎都尉三遇縣擊至二等輕車都尉從征廣東廣西於新會賊偽將李定國等兵四萬餘衆恢復廣東三府三州十八縣廣西二州四縣敘功優授為一等輕車都尉兼一雲騎尉歷任副都統卒其三子瓦爾達襲職卒其四弟法克金襲職任佐領緣事革退其子法禮襲職任佐領卒其親伯之孫富亮襲職時削去恩詔所加之職并職承襲騎都尉現任佐領又鄂備之詔後軍㓛所得之長子阿爾琥由副都統征陜西擊敗賊偽總兵劉鰲山等兵於寶雞縣又招撫偽參將普國祥贈三等等七人續征湖廣於長沙府擊賊陳亡優佛保輕車都尉其子博禮襲職任佐領卒其子襲職任佐領卒其叔祖之孫德喜襲職現任佐領又鄂備之次子萬進原任佐領孫存保常保八十五俱原任佐領阿郎原任筆帖式法保原任八品官巴顔岱原任典儀曽孫常明七十三俱原任佐領又鄂備之弟墨勒由佐領從征四川屢敗賊偽總兵石存禮等兵後於秦州擊賊贈騎都偽將王屏藩兵陳亡優善襲職任佐領卒其子尉兼一雲騎尉其子花來格襲職任佐領緣事革退其弟索柱襲職現任佐領科羅惠國正藍旗人世居席百地方指使授騎都尉三遇初來歸以辦事有能不違恩詔加至二等輕車都尉卒其子金柱襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為一等輕車都尉因年老告退其子瞻祿襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉因病告退其親伯之孫高德現分襲伊祖科羅惠所得之騎都尉其親弟本祿分襲伊父金柱所得之雲騎尉現任委署步軍校又科羅惠之孫佛保原任筆帖式那達理原任雲騎尉曽孫阿太原任雲騎尉加至騎都尉騷達色原係副護軍校元孫達元原係騎都尉博爾鍾果國鑲藍旗人世居卦爾察地方征朝鮮攻克易州初來歸其子克勒由間散從初過北京征山東攻禹城縣不設雲梯第二登城克之敘功授雲騎尉卒無嗣其親兄之子伊恩詔加珠襲職三遇都尉卒其子額爾庫訥襲職卒其至三等輕車子吳雅圖襲職卒無嗣其親弟瑪哈納襲職時削去恩詔所加之職現襲雲騎尉又博爾鍾果之孫額蘇原任博士肯特原係監生曽孫保格原