body:
  text: 八旗滿洲氏族通譜卷二十七各地方富察氏殷達瑚齊國鑲藍旗人世居賽音訥殷地方滿達爾漢次安初來歸原任驍騎校生三子長達理三尼喀那滿達爾漢原任驍騎校其子薩穆哈原任三等䕶衞孫薩克新富宻善俱原任佐領富明阿原任員外郎曽孫錫相現係監生胡尚阿現任䕶軍校安達理之子阿蘭泰歴任賜祭武英殿大學士兼吏部尚書加少保太子太保卒𦵏如典禮諡文清尼喀那由三等䕶衞從征江西於建昌府鐘皷山等處累著戰功征廣東廣西擊敗賊偽將馬寳等兵於韶州府續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩叙功優授騎都尉歴任䕶軍統領卒無嗣其親兄之孫富寕安承襲歴任都統尋轉吏部尚書康熈五十四年䇿妄阿拉布坦來犯哈宻奉命率滿洲侍衞十員馳赴軍營任故命爾前徃軍中凡聖祖仁皇帝諭曰朕以爾堪信事俱宜詳慎若離朕相近猶可指授調遣今相隔甚逺遇有倉猝即馳驛傳送亦多需時日軍機大事不宜遲緩爾至彼有急調遣之事不必請㫖即與將軍席柱商酌而行欽此五十六年奉㫖軍務闗係𦂳要富寕安授為靖逆將軍給與印信欽此雍正元年加文淵閣大學士四年還京奉世宗憲皇帝諭㫖富寕安此畨軍前所行甚屬可嘉但未獲𠞰滅策妄阿拉布坦耳冨寕安身任將軍一心皇肫篤為國家宣力從前再三以進兵奏請於考之前皇考憐念凖噶爾人等不忍剪除是以未允其請倘欲剪除允其所奏富寕安定能擒滅策妄阿拉布坦矣皇策妄阿拉布坦之所以未滅者非伊力之不能實我考之至仁也富寕安在軍前多年約束兵丁辦理事務俱井井有條而且行止端方㢘潔此數年以來領兵之將軍等聲名未有出富寕安之右者其於我皇考之寄任實心奮勉不負任使益彰皇考用人之明朕實嘉愛今朕代皇考推恩將朕之煖㡌補褂素珠賜伊穿帶及縀疋銀兩被鞍黄扯手馬雙眼翎特行旌賞䧏㫖該部封富寕安世襲侯爵爾諸大臣皆宜效法富寕安而行諸凡勿顧目前小利宜圖久逺榮顯如顧目前小利以致聲名大壞悔之亦無及矣果能一心効力豈惟主上嘉愛即上天亦必慈佑報之以福今國家昇平大臣等雖無軍旅効力之處然内外諸事俱宜一體盡心爾等果能以富寕安為法一心宣力朕亦如富寕安一體加恩矣即如富寕安竒立德等俱係將軍而竒立德等行為無耻上負君上委任之恩下被屬員鄙薄蒙古等譏誚若朕於竒立德等亦視如富寕安一體加以恩榮衆人豈以朕為是哉竒立德等朕雖未加之以罪朕意以為尤甚於加之以罪也諸大臣祗應各以品行聲名為念於國家公務一意抒誠勉盡為臣以忠之道切勿瑣瑣然懐蓄私意今富寕安即標凖也特諭欽此五年轉士晉世職為一等侯旋奉武英殿大學命往陜西署理西安將軍印務六年縁事革去侯爵尋以疾卒於西安奉世宗憲皇帝諭㫖富寕安人品端方操守㢘潔秉掌銓衡經理戎政敭歴中外懋著勤勞謹慎小心始終一致簡任綸扉正資倚毗忽聞溘逝朕心深為軫悼應得恤典着察例具奏其喪櫬起程及歸途之費著督撫照㸔料理經過之處著地方官員於櫬前奠醊欽此櫬至京師特遣平郡王領内大臣一員侍衞十員徃奠嗣奉賜祭𦵏如典禮追贈太子太傅諡文恭因無世宗憲皇帝諭㫖將伊親妹之子烏蘓氏吳魯理繼富寕安為嗣承襲騎都尉任員外郎卒其子富成現襲職鄂備鑲紅旗人世居輝發地方天聰時來歸由佐領定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆又追至慶都縣大敗之授雲騎尉後破流賊滅福王平定河南江南等處屢著戰功攻南恩詔加安縣奪門而入克其城授為騎都尉三遇縣擊至二等輕車都尉從征廣東廣西於新㑹賊偽將李定國等兵四萬餘衆恢復廣東三府三州十八縣廣西二州四縣叙功優授為一等輕車都尉兼一雲騎尉歴任副都統卒其三子瓦爾達襲職卒其四弟法克金襲職任佐領縁事革退其子法禮襲職任佐領卒其親伯之孫富亮襲職時削去恩詔所加之職并職承襲騎都尉現任佐領又鄂備之詔後軍㓛所得之長子阿爾琥由副都統征陜西擊敗賊偽總兵劉鰲山等兵於寳雞縣又招撫偽叅將普國祥贈三等等七人續征湖廣於長沙府擊賊陣亡優佛保輕車都尉其子博禮襲職任佐領卒其子襲職任佐領卒其叔祖之孫德喜襲職現任佐領又鄂備之次子萬進原任佐領孫存保常保八十五俱原任佐領阿郎原任筆帖式法保原任八品官巴顔岱原任典儀曽孫常明七十三俱原任佐領又鄂備之弟墨勒由佐領從征四川屢敗賊偽總兵石存禮等兵後於秦州擊賊贈騎都偽將王屏藩兵陣亡優善襲職任佐領卒其子尉兼一雲騎尉其子花來格襲職任佐領縁事革退其弟索柱襲職現任佐領科羅惠國正藍旗人世居席百地方指使授騎都尉三遇初來歸以辦事有能不違恩詔加至二等輕車都尉卒其子金柱襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為一等輕車都尉因年老告退其子瞻祿襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉因病告退其親伯之孫高德現分襲伊祖科羅惠所得之騎都尉其親弟本祿分襲伊父金柱所得之雲騎尉現任委署歩軍校又科羅惠之孫佛保原任筆帖式那達理原任雲騎尉曽孫阿太原任雲騎尉加至騎都尉騷達色原係副䕶軍校元孫達元原係騎都尉博爾鍾果國鑲藍旗人世居卦爾察地方征朝鮮攻克易州初來歸其子克勒由閒散從初過北京征山東攻禹城縣不設雲梯第二登城克之叙功授雲騎尉卒無嗣其親兄之子伊恩詔加珠襲職三遇都尉卒其子額爾庫訥襲職卒其至三等輕車子吳雅圖襲職卒無嗣其親弟瑪哈納襲職時削去恩詔所加之職現襲雲騎尉又博爾鍾果之孫額蘓原任博士肯特原係監生曽孫保格原任郎中皂保原任䕶軍校寛他哈元保俱原係雲騎尉元孫伊常阿原係雲騎尉雅哈納現任䕶軍校唐喀現任副䕶軍叅領和林現任歩軍校富常原任筆帖式充順巴本國鑲黄旗人世居岳克通鄂城地方烏喇總管倭初來歸其元孫綏合納原任打牲赫訥原任防禦四世孫薩普蘓原任黒龍江將軍阿爾瑚理瑚爾賽俱原任防禦渾泰原任驍騎校五世孫雅圖原任三等侍衞坦太原任筆帖式阿納哈雅爾布俱原任防禦阿都胡原任驍騎校南督原任頭等侍衞常德歴任寕古塔將軍卒奉㫖將軍常德自赴軍前以來實心辦事効力多年今聞溘逝朕心深為憫惻著加思賞給騎都尉准襲三次欽此其親弟之子蘓爾東阿現襲職又充順巴本之五世孫薩克慎現任三等侍衞僧保現任副䕶軍叅領巴納海現任筆帖式六世孫雷順現任冠軍使哈理原任筆帖式楞吉原任䕶軍校塔爾善現任驍騎校碩色納阿那海班都理俱現任二等侍衞七世孫勒爾德現任頭等侍衞雅思哈原任三等侍衞七格現係五品廕生楊泰原任藍翎侍衞富赫紳現任䕶軍校按充順巴本與本旗同里巴什伊拉里地方珠赫訥等同族博索國正白旗人世居馬察地方署叅領從征浙江福初來歸其子齊式禮由委建於太平寨地方擊敗賊兵續征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功優授騎都尉卒其子存住襲職卒其子桑格現襲職富禮塔國正白旗人世居綏分地方任藍翎侍衞額宜勒初來歸其曽孫琉雅圖原原任管驛站官元孫布爾哈原任員外郎公安原任䕶軍校郭禮原任前鋒校薩爾圖綏哈俱原任驍騎校達飬阿由驍騎校從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩叙功授雲騎尉卒其子吳赫襲職現任副叅領又富禮塔之四世孫松阿理原任副都統佟安原任佐領索住原任前鋒侍衞古爾太原任防禦扎爾敏原任佐領海倫原任驍騎校存柱原任筆帖式阿爾泰原任員外郎拉巴理現任驍騎校尼滿原係副驍騎校瑪琥現係副䕶軍校兆宜秋原係騎都尉五世孫富星阿原係騎都尉伊爾達穆現任䕶軍叅領平凌現任䕶軍校二格索柱俱原任驍騎校富明現任筆帖式温普理國正黄旗人世居嘉木湖地方軍校達理瑚由委初來歸其曽孫英柱原任歩署䕶軍校從征察哈爾布爾尼於大鹵地方奮勇破賊有功授雲騎尉卒其子阿晉太襲職卒其子瑪錫泰現襲職又温普理之元孫雅松阿原任防禦五世孫三保原任員外郎五十六現任防禦元柱現任驍騎校六世孫富森泰現任驍騎校七十八現係副驍騎校沙濟國正藍旗人世居沙晉和羅地方章京從征保寕初來歸其曽孫星額理由委署有功授雲騎尉卒無嗣其親弟赫達色現襲職又沙濟之曽孫富太現係副䕶軍校艾達國正白旗包衣人世居蘓完地方邁堪原任庫掌初來歸其子阿布原任佐領孫元孫塔莽阿原任三等侍衞富爾丹原任䕶軍叅領薩穆哈圖伯精俱原任牧長鄂邁原任二等侍衞他穆哈那原任庫掌馬拉喜巴蘭俱原任䕶軍校法武現任䕶軍校書蓋原任驍騎校四世孫鄂新岱西新俱原任司庫沙坦漠爾渾俱原任驍騎校玖塔馬圖俱原任䕶軍校桑阿爾濟巴圖俱原任員外郎瑪庫禮原任郎中兼佐領薩哈連原任膳房總領鄂岱原任二等侍衞赫色華色俱原任主事拜坦馬桑阿西特庫俱原任筆帖式吳達禪原任庫掌拜蘓原任䕶軍校老格原係副驍騎校德亮現任筆帖式竒拉渾由䕶軍校從征浙江福建屢敗海賊鄭錦等兵於海上授雲騎尉任䕶軍叅領兼員外郎卒其子吳理襲職又艾達之五世孫羅雅圖原任員外郎兼佐領積綬現任司胙官六十五現任筆帖式瑪山現任六品官六世孫良慶現任主事經文現任翰林院庶吉士官元索現任鳴賛七世孫富達理現任委署主事八世孫常瑞現係生員佟阿泰國正藍旗人世居打牲烏喇地方征雲南擊敗賊初來歸其孫托色由驍騎校從偽將何繼祖等兵於石門坎黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功授雲騎尉任防禦卒其親伯之孫鄂色襲職尼喀善國鑲藍旗人世居黒龍江地方部侍郎元孫富德初來歸其曽孫佟泰原任禮臣原任筆帖式四世孫索柱現任佐領富伸現任䕶軍校鄂邁國正白旗人世居多爾渾地方俱原任防禦拉碧初來歸其曽孫殷塔錫存柱原任歩軍校龎海原任副都統元孫碩色杭吉納俱原任䕶軍校拉都渾原任䕶軍叅領老格現任六品官四世孫長柱現任驍騎校豐訥赫國鑲紅旗人世居界凡地方領布倫圖現任防禦初來歸其孫赫色原任佐曽孫塞爾圖現任寕夏副都統外庫現任佐領元孫巴什現係廕生以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗鄂和剛泰蘓完地方人其長子雅布善原任佐領次子鄂海原任䕶軍校孫巴浪原任協領曽孫福昌現任驍騎校尼堪伊蘭費爾塔哈地方人其子薩哈齊原任歩軍校曽孫薩岱原任佐領元孫常僧保現任佐領瑚什圖現任鳴賛殷德理虎爾哈地方人其長子碩色原係雲騎尉次子額爾古德原任佐領孫石保原係雲騎尉吉山哈達地方人其子喀山原任員外郎孫禪布原任七品官曽孫阿蘭泰現任䕶軍校巴什岳克通鄂城地方人其元孫都什巴現任二等侍衞侍衞班領按巴什與本旗同里充順巴本同族伊拉理巴什同族岳克通鄂城地方人其元孫松藹現任䕶軍叅領達蘭泰現任二等侍衞阿寕阿伊蘭費爾塔哈地方人其孫文拜原任三等侍衞鄂通果原任歩軍校曽孫佛保原任䕶軍校鄂爾賽原任親軍校輝泰哈達地方人其孫雲岱原任歩軍校曽孫吳進寳原任驍騎校正黄旗尼雅唐鄂噶哈理和羅舎林村地方人其曽孫透德原任佐領四世孫齊納喀原任博士金特赫原任歩軍校伊瑪圖原任防禦哲士原任驍騎校五世孫穆克原任防禦