body:
  text: 八旗滿洲氏族通譜卷七十附載滿洲旗分内之䝉古姓氏謨爾啟特氏謨爾啟特係𨽻滿洲旗分之䝉古一姓此一姓世居札魯特地方布顔圖鑲黄旗人孫國初来歸其子布爾賽原任佐領曾六格原任驍騎校費耀色原任員外郎元孫常禄現任䕶軍校泰錫納喇氏泰錫納喇係𨽻滿洲旗分之䝉古一姓此一姓世居札魯特地方多諾鑲黄旗人孫國初来歸其子碧禮克圖原任筆帖式杜克秀原任員外郎曾孫杜寛現任筆帖式華善現係監生瑪爾吉特氏瑪爾吉特係𨽻滿洲旗分之䝉古一姓此一姓世居札魯特地方逹頼鑲黄旗人元國初来歸其曾孫錫格現任佐領孫拜顔圖現任防禦翁濟爾金氏翁濟爾金係𨽻滿洲旗分之蒙古一姓此一姓世居札魯特地方實喇什保鑲黄旗人原國初來歸其孫圖爾齊白德訥俱任防禦曾孫花塞亦原任防禦官保原任驍騎校巴哈原任䕶軍校納雅氏納雅係隸滿洲旗分之䝉古一姓此一姓世居札魯特地方逹都瑚理鑲黄旗人布國初來歸原任歩軍校其子瑚什原任防禦孫轍爾泰現任贊禮郎瑚岳絡氏瑚岳絡係隸滿洲旗分之䝉古一姓此一姓世居札魯特地方巴爾瑚楞鑲黄旗人騎國初来歸其曾孫阿齊圖原任驍校雅圖原任䕶軍校元孫佛保現任防禦錫臨氏錫臨係隸滿洲旗分之蒙古一姓此一姓世居巴顔烏喇地方塞都鑲黄旗人孫國初来歸其子巴濟泰原任驍騎校曾卓爾泰現任歩軍校五十三現係副䕶軍校逹絡克氏逹絡克係隷滿洲旗分之蒙古一姓此一姓世居札魯特地方凱屛鑲黄旗人天聰時来歸其孫黨喀喇原任驍騎校曾孫逹爾瑪什現任佐領太平現任驍騎校烏理特氏烏理特係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方額爾格鑲黄旗人天聰時來歸其子綽爾們浩善俱原任二等侍衛濟蘭泰原任歩軍校恩克原任䕶軍校孫巴札爾原任防禦巴揚武原任䕶軍校札哈蘇親氏札哈蘇親係𨽻滿洲旗分之䝉古一姓此一姓世居札魯特地方阿哈齊鑲黄旗人天聰時来歸其子克席壘原任信礟章京克勒德氏克勒德係隸滿洲旗分之蒙古一姓此一姓世居巴顔烏喇地方察漢巴圖魯鑲黄旗人天聰時来歸其孫碩色原任驍騎校錫爾哈氏錫爾哈係隸滿洲旗分之䝉古一姓此一姓世居阿喇克綽忒地方巴顔巴圖魯鑲黄旗人天聰時来歸其孫三保原係監生齊普齊努特氏齊普齊努特係隸滿洲旗分之䝉古一姓此一姓世居巴爾古地方瑟特爾鑲黄旗人来歸年分無考其孫科羅齊現任副總管兆巴爾氏兆巴爾係隷滿洲旗分之䝉古一姓此一姓世居札魯特地方敦鐸鑲黄旗人来歸年分無考其孫拖克屯穆原任筆帖式元孫索柱現任䕶軍校薩爾珠特氏薩爾珠特係隸滿洲旗分之蒙古一姓此一姓世居敖漢地方鄂爾霍達鑲黄旗包衣管領下人来歸年分無考原任二等侍衛其子逹頼原任藍翎侍衛元孫阿穆瑚朗現任司庫偏圖現任筆帖式珠佳氏珠佳係隸滿洲旗分之蒙古一姓此一姓世居土黙特地方碧布賽鑲黄旗包衣管領下人来歸年分無考原任二等侍衛其子珠爾噶岱原任包衣䕶軍叅領王札普氏王札普係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方徹穆冬鑲黄旗包衣管領下人来歸年分無考原任䕶軍校其子竒塔納原任藍翎侍衛瑚佳氏瑚佳係隸滿洲旗分之䝉古一姓此一姓世居吳喇忒地方瑚璧泰鑲黄旗包衣管領下人来歸年分無考原任牧長馬朗阿氏馬朗阿係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方馬順鑲黄旗包衣管領下人來歸年分無考其子雅斯哈原任牧長札哈拉氏札哈拉係隸滿洲旗分之䝉古一姓此一姓世居阿霸垓地方阿都齊鑲黄旗包衣人来歸年分無考其子浩善原任驍騎校孫阿穆瑚朗原任䕶軍校克理特氏克理特係隸滿洲旗分之䝉古一姓此一姓世居阿禮瑪圖地方薩滿逹鑲黄旗包衣人来歸年分無考其孫班第現任八品官章圖理氏章圖理係隸滿洲旗分之䝉古一姓此一姓世居土黙特地方白顔鑲黄旗包衣管領下人来歸年分無考其元孫二逹塞現任筆帖式克穆齊特氏克穆齊特係隸滿洲旗分之䝉古一姓此一姓世居鄂謨克地方和托正黄旗人克國初来歸其孫三岱原任副䕶軍叅領什特現任防禦曾孫四孝現係生員烏爾漢氏烏爾漢係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方布顔泰正黄旗人任國初来歸原任佐領其子西喇普原驍騎校孫伊什哈普原任歩軍校華色原任驍騎校喇普詹現任䕶軍校僧保現任三等侍衛黒逹色原任䕶軍校曾孫巴雅爾亦原任䕶軍校鐘吉氏鐘吉係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方鐘繼祖正黄旗人防國初来歸原任佐領其孫索柱現任禦曾孫海岱現任䕶軍校通塞理氏通塞理係隸滿洲旗分之䝉古一姓此一姓世居薩哈爾察地方楚爾噶岱正黄旗人楚國初来歸其孫華色原任佐領又爾噶岱第五弟巴爾濟圖原任驍騎校其子賽碧圖亦原任驍騎校曾孫齊爾特原任䕶軍校又楚爾噶岱次弟納穆之孫夸色原任驍騎校卓爾和親氏卓爾和親係隸滿洲旗分之䝉古一姓此一姓世居克爾倫地方額森正黄旗人任國初来歸其孫德色原藍翎侍衛札穆爾氏札穆爾係隸滿洲旗分之䝉古一姓此一姓世居大凌河地方顔疇正黄旗人泰國初来歸其曾孫逹蘭原任驍騎校博爾器濟斯氏博爾器濟斯係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方碧禮克正黄旗人原國初来歸原任䕶軍校其子莽武鼐任驍騎校曾孫查什現係副驍騎校塔爾瑚努特氏塔爾瑚努特係隸滿洲旗分之䝉古一姓此一姓世居克爾倫地方昂噶岱正黄旗人孫國初来歸原任䕶軍校其元文鈞現係舉人博第斯氏博第斯係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方鐘德正黄旗人䕶國初来歸原任軍校博爾蘇特氏博爾蘇特係隸滿洲旗分之䝉古一姓此一姓世居西拉木楞地方布拉克正黄旗人現國初来歸其曾孫什魯克係副䕶軍校喀爾努克氏喀爾努克係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方額騰格爾正黄旗人係國初来歸其孫孟柯現副䕶軍校赫錫特氏赫錫特係隸滿洲旗分之蒙古一姓此一姓世居克爾倫地方色内正黄旗人津國初来歸其元孫赫現係舉人禹爾氏禹爾係隸滿洲旗分之䝉古一姓此一姓世居阿禄科爾沁地方烏赫齊正黄旗包衣管領下人原國初来歸原任頭等侍衛其子陶泰任二等侍衛孫巴岱原任郎中兼茶房總領白雅爾圖原任廐長博爾德原任藍翎侍衛塞楞原任牧長曾孫邁色原任茶房總領桑格五格俱原任内管領四格巴逹瑪俱原任筆帖式雅圖理原任廐長元孫富成現係監生赫慎泰安保七格俱現任筆帖式常有原任二等侍衛海倫現任庫掌長禄原任䕶軍校四世孫五十四現任筆帖式札魯特氏札魯特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方瑪哈正黄旗人天聰時来歸其孫五十七現任䕶軍校索諾圖氏索諾圖係隸滿洲旗分之蒙古一姓此一姓世居喀拉沁地方塔瑪海正黄旗包衣人天聰時来歸原任司庫其子塞爾古琳原任包衣䕶軍叅領伍堯氏伍堯係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方巴黨正黄旗包衣人天聰時来歸原任佐領其子額爾濟圖原任驍騎校孫伊蘇特原任三等侍衛赦爾諾絡雅蘇氏赦爾諾絡雅蘇係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方噶爾舟正黄旗人来歸年分無考其孫達瑪原任䕶軍校烏齊熙理氏烏齊熙理係隸滿洲旗分之䝉古一姓此一姓世居白玉圖地方多爾濟正黄旗包衣人来歸年分無考原任包衣䕶軍叅領其孫五十三原任䕶軍校曾孫德保現任藍翎侍衛兼牧長巴理氏巴理係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方托克托輝正白旗人元國初来歸其曾孫開圖原任主事孫色倫泰登特俱原任驍騎校賚圖原任䕶軍校韓逹理原任歩軍校四世孫清格勒由叅領出征擊賊受傷原品致仕現食全俸五世孫巴靈阿現任三等侍衛烏納特氏烏納特係隸滿洲旗分之蒙古一姓此一姓世居兀魯特地方逹海正白旗人魯國初来歸原任佐領其子巴岱原任䕶軍校韓佳氏韓佳係隸滿洲旗分之蒙古一姓此一姓世居西拉木楞地方羅泰正白旗人驍國初来歸原任騎校沙岳特氏沙岳特係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方巴爾泰正白旗人蓀國初来歸原任䕶軍校其子那普他原任䕶軍校孫蘇赫訥現任䕶軍校白蘇氏白蘇係隸滿洲旗分之䝉古一姓此一姓世居喀拉沁地方渾齊正白旗人佛國初来歸原任廐長其孫保原任筆帖式牛佳氏牛佳係隸滿洲旗分之䝉古一姓此一姓世居兀魯特地方檀拜正白旗人係國初来歸其子桑格原副驍騎校艾耀施氏艾耀施係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方恩格德正白旗包衣管領下人来歸年分無考原任廐長其孫拉普詹原任郎中伊住原任廐長黄佳氏黄佳係隸滿洲旗分之䝉古一姓此一姓世居大凌河地方星鼐正白旗包衣人来歸年分無考原任藍翎侍衛其子朝岱錫喇俱原任二等侍衛孫塞楞原任藍翎侍衛曾孫巴格現任八品官元孫五十現任筆帖式冬果爾氏冬果爾係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方都蘭泰正白旗包衣管領下人来歸年分無考原任内管領瑪喇拉氏瑪喇拉係隸滿洲旗分之䝉古一姓此一姓世居察哈爾地方翁果托正白旗包衣人来歸年分無考原任䕶軍校其子瓦爾逹原任牧長蘇穆察氏蘇穆察係隸滿洲旗分之䝉古一姓此一姓世居鄂爾多斯地方蘇穆圖正白旗包衣管領下人來歸年分無考其曾孫楊保住現任䕶軍校王吉氏王吉係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方王查普正白旗包衣管領下人来歸年分無考原任牧長哈爾圖特氏哈爾圖特係隸滿洲旗分之蒙古一姓此一姓世居察哈爾地方薩錫圖正白旗包衣管領下人来歸年分無考原任廄長其子武津亦原任廄長赫爾氏赫爾係隸滿洲旗分之䝉古一姓此一姓世居察哈爾地方濟爾圖正白旗包衣人来歸年分無考原任廄長章穆氏章穆係隸滿洲旗分之䝉古一姓此一姓世居科爾沁地方鄂德理正紅旗人校國初来歸其元孫哈什泰原任䕶軍四世孫五通保亦原任䕶軍校瑚新泰原任員外郎五世孫札海現任典儀章泰原任三等䕶衛章賚原任䕶軍校哈納克氏哈納克係隸滿洲旗分之䝉古一姓此一姓世居西喇塔拉地方布泰正紅旗人領國初来歸其孫納親原任佐常綬原任驍騎校布蘇克氏布蘇克係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方白善正紅旗人曾國初来歸其孫吹原任驍騎校孫逹蘭泰現任防禦齊普齊特氏齊普齊特係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方四格正紅旗人原國初来歸其孫雅圖任防禦逹魯特氏逹魯特係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方佟阿正紅旗人錫國初来歸其曽孫濟原任防禦阿蘇特氏阿蘇特係隸滿洲旗分之䝉古一姓此一姓世居西喇塔拉地方圖斯圖正紅旗人曾國初来歸其孫霍岱原任驍騎校孫耨格原任䕶軍校哈理特氏哈理特係隸滿洲旗分之蒙古一姓此一姓世居西喇塔拉地方諾穆璽正紅旗人原國初来歸其子諾穆渾任䕶軍校卓啟斯氏卓啟斯係隸滿洲旗分之䝉古一姓此一姓世居哈逹地方額勒克圖正紅旗包衣人衣國初来歸其孫八十原任六品包大曾孫赫慎現任驍騎校蒙古氏䝉古係隸滿洲旗分之蒙古一姓此一姓世居土黙特地方由庫正紅旗人来歸年分無考其