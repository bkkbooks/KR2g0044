body:
  text: 八旗滿洲氏族通譜目録卷十五各地方伊爾根覺羅氏葛伯庫尹達瑚齊巴哈塔巴岱阿蘭多什喀阿格納瓜喇噶哈托吉鄭古德薩琥葉臣達爾寬鄂凌阿章固理德休武星額巴克什布三台福祿丹達羅克什納拉哈理岱楚阿濟格蘇克桑阿瓦克丹鈕鐸理赫通額費達理色勒勒赫德雅爾泰仲書以上俱有傳碩色阿錫布塞赫特嘉渾巴寧阿濟鼐英格魯布世額克沁巴松哲爾欽吳山岱敏齋桑阿費揚古庫德勒斐養武翁鄂伊爾哈郭爾渾烏爾瑚岱邁喀伯楞額都督伊巴達錫爾登法鼐福哈禪萬布祿朱鼐蘇瓦雅圖瞻泰吉喜福僧額章武理華布夏敦積理阿鈕魏珠瑚賚祿綏巴哈塔鄂平吉博爾齊哈敦珠瑚遜達瓜喇蘇崇阿尹達渾竒魯策爾特章泰嘉渾巴顔魁堪瑚達海愛囊阿扎秦布拉岱西漢外蘭海山塔鈕渾都西特庫國麟胡什額齊布穆珠瑚晉桂諾音泰阿海噶哈滿丕納博爾渾朔塞馬興阿剛親顔珠瑚安泰阿庫扎顧寧阿愛瑚理噶住森特烏登額拉拉理羅什滿圖渾叟色塞勒布安吉圖洪布祿阿爾泰席圖庫巴爾泰墨訥克尼堪滿岱阿蘇蘭雅哈噶齊哈和隆鄂烏達哈特實羅多理幹珠琥金岱尼雅哈古那哈阿普達哈蓀塔福喀阿爾發雅賚賴塔兆星錫伯爾圖庫納塔納伯爾格瑪努琥扎哈理穆朱琥阿庫蘭鄂克松阿綏班石圖扎克三顧揚阿胡什巴科羅昆富賚碩岱浩善薩爾納布楞泰安布祿胡星阿滿色盛格亞哈謨爾渾倪雅哈汪柱屯特濟吉桑阿舒桑阿希特海薩爾圖顔泰安保揚著布顔珠瑚錫巴來弼孔吉納登德柏林兆廣德席特庫伯爾赫圖愛瑪納吳察勒克尼堪巴布理阿禮納顔布祿墨爾根穆奇鼐格松錦海啓凖泰莽祚胡什霸和通吉胡什泰葉爾古德烏山岱蓀羅察高萬吟章齊章泰赫佛多寧阿福拉渾偉山滿都理安達理多弼納塔金以上俱附載
