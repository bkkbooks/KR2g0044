body:
  text: 八旗滿洲氏族通譜目録卷二十八完顔地方完顏氏葉臣博爾晉愛音察英莪杭阿勒特孟安阿喀布祿呉孔額雅蘭阿爾塔錫科薩廣衮魯克蘓瑚爾拜西喇巴穆錫屯章錫伊拉秦巴顏吳雲珠巴顏特殷珠布爾遜邁蘭以上俱有傳布喜費揚古蓀札齊鑒布侃察喀哈齊堪喀尼穆禪都理西伯理喀凱科察翁果岱羅察尼侃諾木圖以上俱附載各地方完顏氏額克楚蘓山薩爾圖禮谷理札秦墨古德伸騰都楞額瓦哈理阿爾布哈通色呉古理尼雅哈三存方吉以上俱有𫝊伊瞻噶爾賽丹達理巴圖虎喀札費揚古那達齊薩祿阿爾察庫克察鈕楚赫富晨勒赫尚吉圖托諾海拉庫阿爾當阿屯泰康果邁哈吉斯泰圖門特陳德爾亨墨爾根殷達渾尼堪色楞衞泰舒格費徳理金保佟色雅薩岳塔達什泰莽吉圖闗齊王應可尼雅哈章泰王吉德吳濟海喀爾堪殷德布索爾和衮岱富善濟占桑格松古理蘓德恒偉羅渾秦布瑚呼納旺武王安國安王鄒吉癸兹鄂齊理查拉蓀額克秦張吉祿禮古額爾特以上俱附載
  hash: sha256:7573c0e3494e0baeeb737e522be7d4498f707e590e7bd7f5c5bb3aeff930c857
