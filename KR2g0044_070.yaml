body:
  text: 八旗滿洲氏族通譜卷三十四吳扎庫氏吳扎庫為滿洲一姓其氏族散處於噶哈里等地方洪尼雅喀國鑲紅旗人世居噶哈里地方家屬四十人來歸初偕弟薩蘇喀薩穆唐阿率授騎都尉因征明有功授為三等輕車都尉後征錦州力戰被傷授為二等輕車都尉歷任工部尚書副都統議政大臣卒其長子武拉禪承襲遇恩詔加至一等輕車都尉定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之後恩詔加征江西山東等處屢著戰功加一雲騎尉兩遇至二等男又征浙江舟山擊敗僞總制陳陸御僞英毅伯阮思等兵三萬餘衆敘功優授為一等男兼一雲騎尉尋緣事削一雲騎尉歷任刑部侍郎副都統議政大臣卒其子胡拉禪承襲一等男任前鋒參領緣事革退其親叔朱馬喇恩詔所襲職因病告休其子朱成額襲職時削去朱拉加之職現襲三等男又洪尼雅喀之次子恩詔加禪由啓心郎六年考績稱職授雲騎尉三遇襲至三等輕車都尉歷任副都統卒其子四格恩詔所職時削去襲雲騎尉卒其子徹申現襲職又洪加之職承尼雅喀之孫輝色原任頭等護衛拜都原任員外郎倭赫原任副都統兼佐領郎格原任典儀馬成額原任佐領吳舒由護軍參領從征厄魯特噶爾丹有功授雲騎尉卒其子吳洛圖襲職又洪尼雅喀之曽孫吳沙圖原任副都統雅圖原任頭等護衛徹鼐原任典儀胡齊原任護軍校吳赫圖現任凉州將軍設倫現任筆帖式朱靈現任藍翎侍衛朱泰現任六品官蘇寧阿穆寧阿俱現任佐領吳世圖由護軍校從征凖噶爾奮勇敗賊有功授雲騎尉卒其子吳爾秦襲職又洪尼雅喀之元孫瑚成原任佐領吳靈額現任六品官又洪尼雅喀之次弟薩蘇喀由閒散從征廣寧大凌河寧逺大同左衛等處屢立軍功授雲騎尉圍錦州屢敗敵兵定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之叙功擾授為三等輕車都尉歷任禮部侍郎副都統議政大臣卒其子阿蘇喀襲職卒其親弟墨齊納襲職遇恩詔加至二等輕車都尉歷任江寧將軍卒其子桑格襲職任佐領卒其子蘇成襲職時削去恩詔所加之職承襲三等輕車都尉卒其親弟德山襲職緣事革退其親叔之子和爾布襲職又洪尼雅喀第三弟薩穆唐阿原任護軍校齊綬國正白旗人世居綏分地方散過北京攻遵化州初來歸其孫多禮善由閒第三登城克之授雲騎尉從征大同奮勇擊賊陳亡贈騎都尉其親弟伊塞庫襲職三遇泰孫福森珠相繼恩詔加至二等輕車都尉卒其子蓀恩詔所承襲福森珠卒其兄之子七十襲職時削去又加之職承襲騎都尉卒其叔薩哈連現襲職齊綬之元孫金柱雅法納俱原任五品官四世孫賽音保亦原任五品官又齊綬之族曽孫赫碩色原任佐領元孫溫圖訥納爾布俱原任驍騎校尼喀達原任筆帖式四世孫蘇爾德現任協領豐保住現任步軍校按齊綬與本旗同里穆克登同族以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗星薩那倭濟石地方人其子席喇哈孫彰武俱原任驍騎校鑲紅旗瑪寧噶哈里地方人原任護軍校其子瑪拉原任防禦拉塔原任步軍校馬虎原任驍騎校孫馬爾素原任防禦納桑阿原任護軍校鑲藍旗碩翁科薩哈爾察地方人其次子岱福那三子豪哈達俱原任佐領孫朱星阿亦原任佐領曽孫伊瑪爾蘇原任筆帖式雅瑚爾善原任三等護衛元孫馬星阿原任郎中阿胡善原任三等護衛殷達理納哈那俱原任驍騎校四世孫達漢泰亦原任驍騎校桑格原任城門尉色成額現任驍騎校明福現係副護軍校五世孫馬通阿現任護軍校七十一現任步軍校白達色現係副護軍校溫普現係生員蘇克圖理薩哈爾察地方人其曽孫苖色原任護軍校元孫濟蘭泰現任筆帖式以上俱係國初來歸之人正白旗穆克登綏分地方人其孫吳拉納原任護軍校按穆克登與本旗同里齊綬同族鑲紅旗薩哈連噶哈里地方人原任驍騎校其子瓦爾達亦原任驍騎校孫蒼泰現任防禦拉塔噶哈里地方人其子花色原任驍騎校孫花喇現任驍騎校以上俱係來歸年分無考之人錫克特理氏錫克特理為滿洲一姓其氏族散處於卦爾察及各地方卦爾察地方錫克特理氏伊訥克國正黃旗人世居卦爾察地方騎尉卒其子渾承初時以不勞軍力來歸授雲襲後由侍衛三圍錦州時洪承疇率兵來援擊敗之又松山兵闖我營壘渾獨當營門力戰被贈巴圖傷不退授為一等輕車都尉定鼎燕京時加一魯號優恩詔優雲騎尉三遇兼一雲騎尉緣事革去雲騎尉從授為一等男征廣東於新㑹縣衡州府等處屢敗賊李定國兵叙功又加一雲騎尉後緣事降為一等輕車都尉卒其孫顯圖承襲卒其子明泰現襲職又伊訥克之孫阿喀尼由頭等侍衛從征江西湖贈騎都廣屢著軍績後在騾子山擊賊陳亡明泰承襲尉因無嗣將騎都尉亦今其子之孫合併為三等男塔那喀鑲紅旗人世居卦爾察地方天聰時率三百人來歸編佐領使統之從征大凌河有功後征旅贈騎都順口殁於陳喀承襲定鼎燕京時入山海關擊尉其子朱喇流賊馬步兵二十萬衆又追至慶都縣大敗之叙功加一雲騎尉三遇恩詔加至一等輕車都尉任參領兼佐領卒其子阿爾都孫阿錫蘭相繼承襲阿錫蘭因病乞休其子恩詔所石柱襲職時削去尉兼一雲騎尉又塔那喀之加之職現襲騎都曽孫阿蘭泰原任郎中塔那喀之弟塔爾吉善由閒散過北京征山東梯攻順德府第二登城賜巴圖克之優授騎都尉兼一雲騎三遇魯號恩詔加至一等輕車都尉卒其長子瑚拜承襲任頭等護衛卒其子帖丹承襲現任護軍參領塔爾吉善之次子巴爾圖原任佐領達哈塔原任郎中孫祝瓦齊原任頭等護衛三雅圖現任佐領曽孫巴揚阿原任佐領又塔那喀親弟之子克色理由驍騎校從征江西湖廣屢立戰功後攻長贈騎都沙府城陳亡優承襲任頭等護衛卒其子李保尉其子馬爾泰住承襲現任佐領又塔那喀之弟塔克柱原任佐領其子鄂起庫爾布什俱原任佐領庫圖克泰原任郎中孫永泰原任陜西巡撫黨阿賴原任都察院左都御史西泰四格俱原任佐領永福白格俱原任筆帖式色黑德現任驍騎校曽孫常魁原任佐領廣保原任頭等護衛廣德現任六品官廣綬現任主事元孫同官保現任六品官又塔那喀叔祖禪達之曽孫靠住原任典儀噶爾玖鑲紅旗人世居卦爾察地方天聰時率族人來歸以辦事有能不違指授授騎都尉因追喀木寧阿部落逃人葉雷至溫道地方獲之叙功授為三等輕車都尉遇恩詔加至二等輕車都尉卒無嗣其親伯之孫多碧承襲兩遇恩詔加至一等輕車都尉兼一雲騎尉卒其弟多起襲職卒其子索住襲職卒其子魏赫現襲職又噶爾玖之弟剛吉納由閒散從征大凌河執纛先進有功授騎都尉卒其子碩色承襲卒其弟托恩詔加普齊承襲卒其兄多果承襲三遇等處有功授至二等輕車都尉從征貴州江南為一等輕車都尉從征福建海冦在石塘嶺地方擊賊陳亡加贈一雲騎尉其子常保承襲卒其子吳海襲職時削去恩詔所加之職承襲三等輕車都尉卒無嗣其族姪博詔後軍克圖襲職時削去騎都尉又噶爾玖親伯特赫功所得之職現襲訥之孫鄂起原任筆帖式其子塞爾特原任主事按噶爾玖與本旗同里孔郭爾同族和托巴顔國正紅旗人居卦爾察地方雲騎尉卒其子庫色初時以不勞軍力來歸授恩詔加納承襲三遇都尉後征松花江及西安府山東至三等輕車等處俱有功授為二等輕車都尉卒其子拉塔承襲卒無嗣其弟色普格理及色普格理之子塞勒孫塞爾泰相繼承襲塞爾泰卒其子珠格襲職時削去恩詔所加之職現襲騎都尉按和托巴顔與本旗同里鄂隆達同族占泰正白旗人世居卦爾察地方來歸年分無考其子齊蘭布由護軍校從征江西在建昌府擊賊贈雲騎陳亡子五格孫都爾賽相繼承襲又占泰之弟尉其溫布原任驍騎校其孫鄂密納亦原任驍騎校以上俱係應立傳之人其餘無事蹟可立傳者附載於後正紅旗鄂隆達其曽孫三保原任前鋒校元孫拉薩理原任驍騎校黑達色現任親軍校雅圖原任七品官四世孫雅爾泰現任驍騎校按鄂隆達與本旗同里和托巴顔同族右世居卦爾察地方係國初來歸之人鑲紅旗敦圖原任驍騎校其孫馬理昆亦原任驍騎校曽孫齊蘭步原任護軍校元孫倫拜原任主事孔郭爾其孫愛新原任驍騎校曽孫常海原任筆帖式五什現任護軍校里按孔郭爾與本旗同噶爾玖同族該古孔郭爾同族其孫海達拉原任親軍校以上俱世居卦爾察地方係天聰時來歸之人各地方錫克特理氏郭克舒國正黃旗人世居松花江地方孫嘉巴原任參領初來歸其子延都原任佐領嘉隆阿由佐領以所在稱職不違指授授騎都尉從征黑龍江及松花江擊敗賊兵俘獲甚衆定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之叙功授三等輕車都恩詔加尉三遇輕車都尉兼一雲騎尉卒其子噶爾都至一等贈為三承襲征胡廣於巖山嶺地方擊賊陳亡佐領緣等男其子巴爾都襲職任武備院卿兼恩詔所事革退其親弟巴寶襲職時削去領兼佐領緣加之職承襲二等輕車都尉任參事革職其兄之子巴喀承襲卒其弟巴泰承襲現任佐領又郭克舒之曽孫嘉爾都由前鋒侍贈雲騎衛征湖廣於湘潭縣擊賊陳亡襲又郭克舒曽尉其子旺格孫阿爾圖相繼承孫費揚古原任護軍參領元孫綽洛原任筆帖式葛明原任中書又郭克舒之族曽孫穆逹都原任佐領元孫馬清阿現任七品官四世孫錫蘭泰現任護軍校右係應立傳之人其餘無事蹟可立傳者附載於後鑲黃旗巴爾凖伊蘭費爾塔哈地方人其元孫達色原任驍騎校蘇赫現任護軍參領正黃旗額齊布松花江地方人其子額什圖原任驍騎校吳沙湖原任佐領吳錫泰原任護軍校孫武三泰原任員外郎楊桑阿現任防禦查本阿原任防禦曽孫博津泰現任驍騎校額爾吉訥松花江地方人其子賽祝呼原任驍騎校孫高立䝉固爾岱俱原任四品官旒瑚舒書俱原任防禦曽孫長道現任驍騎校哈達松花江地方人其元孫長綬原任驍騎校四世孫查克川原任司庫岱錫錫喇河地方人其曽孫索拖原任主事嶽納素吉倫俱原任七品官元孫雅圖原任六品官常福現任八品官富寧現任筆帖式正紅旗敏春葉赫和多穆哈連地方人其子佳柱原任護軍校鑲白旗喀珠卦爾佳地方人其孫納爾拜原任驍騎校以上俱係國初來歸之人鑲紅旗巴顔黑龍江地方人其曽孫穆成格原任佐領元孫白楞泰原任護軍校官東現任驍騎校右係天聰時來歸之人正白旗錫拉布原籍無考其孫色承額原任護軍校鑲白旗敦拜訥殷地方人其曽孫瞻泰原任六品官元孫馬津現任驍騎校由正黃旗改𨽻以上俱係來歸年分無考之人正黃旗𣲖古古林烏喇地方人右係康熙時自科爾沁撤回之人庫雅拉氏庫雅拉為滿洲一姓其氏族散處於興堪村等地方克徹尼國正白旗人世居興堪村地方大兵前往三次共初來歸收服灰地方時導引獲人丁三百餘户俱安插於綏分地方又因三村户口梗化不服克徹尼攻服之叙功優授騎都尉又招撫額赫庫倫及阿庫里尼滿等處授為三等輕車都尉又以追獲阿達海功授為一等輕車都尉任佐領年老乞休其子額克仕訥襲職二次過北京征山東路經密雲縣明兵截戰擊敗之後攻克新城縣叙功加一雲騎尉三遇恩詔加至一等男卒其子薩爾查孫孟額圖相繼承襲孟額圖卒其弟福爾賽襲職時削去恩詔所加之職現襲一等輕車都尉兼一雲騎尉又克徹尼之孫佛衣保由佐領從征福建擊敗海冦贈雲騎鄭成功兵後征陜西在秦州擊賊陳亡卒其子尉其子德勒慎襲職任副都統兼佐領松山襲職現任協領松山之子德文現任佐領又克徹尼之兄德爾格慎原任膳房總領其子僧吉徹原任驍騎校塞爾敏原任護軍校孫明阿納原任三等侍衛索住原任郎中曽孫多爾賽原任筆帖式蘇成現任六品官又克徹尼親叔之子綏和多原任參領兼佐領孫奮績布原任助教元孫常柱原任筆帖式又克徹尼族孫布理喀原任佐領烏達那原任筆帖式曽孫哈達那原任前鋒統領愛珠哈現任三等侍衛嶽靈阿現任頭等護衛元孫伊德現任藍翎侍衛布克德固鑲紅旗人世居洪鄂村地方一次過北京征山初來歸其曽孫科齊由閒散恩詔加東梯攻濰縣第二登城克之授雲騎尉三遇克至三等輕車都尉卒其子忠吉納襲職又布德之元孫殷逹渾由護軍校從征四川於野狐嶺陽平關等處屢收賊兵卒後叙功贈雲騎尉因無嗣亦令忠吉納承襲併為二等輕車都尉任護軍參領卒其子祿德襲職卒其子德升恩詔所襲職時削去職承襲雲騎尉卒其族弟明德現加及合併之襲職又布克德元孫那爾善現任護軍校扎庫納正藍旗人原籍及來歸年分俱無考其子竒罔倫由閒散因辦事有能不違指使授騎都尉後三次圍錦州擊洪承疇兵陳亡其子哈福納襲職三遇恩詔加至二等輕車都尉緣事革退其子富訥襲職時削去恩詔所加之職承襲騎都尉卒其子楚寶襲職卒無嗣其叔紏訥承襲卒無嗣未襲後奉世宗憲皇帝恩㫖將原襲騎都尉減為雲騎尉令紏訥外孫壻那木都魯氏之敏森承襲以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗愛泰綏分地方人原任防禦其子外庫原任協領曽孫哲庫訥原任步軍校七十一現任佐領元孫福明現任護軍校永明現任前鋒校永福現任驍騎校額爾春愛泰同族綏分地方人其曽孫錫察拉原任護軍校錫喜納原任驍騎校輝和倫綏分地方人其曽孫杭球原任步軍校根培原任護軍校元孫色赫原任佐領石圖現任驍騎校四世孫錫喇圖現任嗚贊族曽孫吉藻原任步軍校達什休原任郎中慶綬原任七品官元孫華色原任佐領岱敏九十俱原任七品官布哈原任防禦四世孫蘇德現任護軍校穆喇渾渾春地方人其曽孫倭赫岱現任前鋒校色爾圖烏喇地方人其曽孫郝善原任筆帖式正紅旗阿喇楚烏蘇里地方人其曽孫噶布喇原任城門尉元孫噶爾薩原任協領全保現任協領包衣阿晉泰潘陽地方人其子瑚爾拜原任七品典儀鑲紅旗竒承額黑龍江地方人其曽孫胡什理原任驍騎校正藍旗扎哈達虎爾哈地方人其孫巴尼原任六品官以上俱係國初來歸之人正黃旗烏勒莫呼野河地方人其曽孫喀木原任步軍校正藍旗色爾球虎爾哈地方人其孫森特原任步軍校曽孫留保住現任三等護衛以上俱係天聰時來歸之人正白旗慶科吉林烏喇地方人其孫潘圖現任乾清門頭等侍衛佛忒訥渾春地方人其孫愛胡善原任佐領曽孫阿山巴克什納俱現任佐領阿爾珠現任二等侍衛巴爾䝉阿現任驍騎校族孫布色德原任藍翎侍衛赫穆努現任三等侍衛愛努潭春地方人其元孫車璧舍薩普喀沙俱現任三等侍衛四世孫塔爾穆善現任藍翎侍衛章吉納克徹尼同族黑龍江地方人其孫色克齊現任三等侍衛鑲紅旗社庫綏分地方人其孫精額德原任護軍校以上俱係來歸年分無考之人鑲白旗伊禮布福爾建哈達地方人右係康熙時自科爾沁撤回之人八旗滿洲氏族通譜卷三十四
