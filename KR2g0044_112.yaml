body:
  text: 八旗滿洲氏族通譜目錄卷五十六尼竺渾氏甘篤武爾格齊氏達都瑚玉魯氏瑚鈕和和齊氏僧蘇克塔穆察氏巴哈納夸爾達氏吳雲柱徳都勒氏科羅喀愷顔氏竒拉爾圖珠爾蘇氏南岱綽克秦氏圖璧楞安達拉氏竒爾克徳愛渾氏布郎阿海拉蘇氏伊爾登吳靈阿氏綽克托圖門氏珠祿勒第氏塞爾吉尼克爾徳氏阿爾納哲栢氏巴哈哈圖普蘇氏温塔錫托爾佳氏郭秦布祿格格氏齊克勒韓札氏哈齊納穆察氏寧古塔多羅氏托和倫褚庫爾氏瑚都崑武聶氏博紳郭爾本氏通吉鼐圖克敦氏謨敏葉庫理氏瑚勒納哲理氏恩格祿組佳氏額栢恒唐達氏佟堂卓克佳氏卓海崇果魯氏武魯克墨爾齊氏色克瓦理氏薩喇蔡佳氏洪海克葉勒氏克什圖富爾庫魯氏噶努萬旒哈氏尼喀達穆燕氏岱音布祿都善氏門岱拜格氏克拉喀阿圖拉墨氏當古理賽音薩爾圖氏巴格穆和林氏葉臣廣固欽定四庫全書八旗滿洲氏族通譜目錄卷五十六尼竺渾氏甘篤武爾格齊氏達都瑚玉魯氏瑚鈕和和齊氏僧蘇克塔穆察氏巴哈納夸爾達氏吳雲柱徳都勒氏科羅喀愷顔氏竒拉爾圖珠爾蘇氏南岱綽克秦氏圖璧楞安達拉氏竒爾克徳愛渾氏布郎阿海拉蘇氏伊爾登吳靈阿氏綽克托圖門氏珠祿勒第氏塞爾吉尼克爾徳氏阿爾納哲栢氏巴哈哈圖普蘇氏温塔錫托爾佳氏郭秦布祿格格氏齊克勒韓札氏哈齊納穆察氏寧古塔多羅氏托和倫褚庫爾氏瑚都崑武聶氏博紳郭爾本氏通吉鼐圖克敦氏謨敏葉庫理氏瑚勒納哲理氏恩格祿組佳氏額栢恒唐達氏佟堂卓克佳氏卓海崇果魯氏武魯克墨爾齊氏色克瓦理氏薩喇蔡佳氏洪海克葉勒氏克什圖富爾庫魯氏噶努萬旒哈氏尼喀達穆燕氏岱音布祿都善氏門岱拜格氏克拉喀阿圖拉墨氏當古理賽音薩爾圖氏巴格穆和林氏葉臣廣固
