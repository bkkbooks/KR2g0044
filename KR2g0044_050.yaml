body:
  text: 八旗滿洲氏族通譜卷二十四輝發地方納喇氏輝發本國名原姓益克得里係黑龍江岸尼馬察部人其始祖昂古里星古力自黑龍江載木主遷於札魯居焉因任居張地方之扈倫人噶揚噶土墨圖姓納喇氏遂附其姓宰七牛祭天改姓納喇星古力生子二長曰留臣次曰備臣備臣生納領噶耐寬納領噶耐寬生拉哈都督拉哈都督生噶哈禪都督噶哈禪都督生齊納根達爾漢齊納根達爾漢生王機砮王機砮降服輝發諸部於輝發河邉扈爾奇山築城居之因名輝發國貝勒王機砮卒孫拜音達理殺其叔七人自為輝發國貝勒通貴國鑲紅旗人王機砮之孫也世居輝發地方佐領初率兄弟及同里人等來歸授騎都尉編使統之卒無嗣其親弟之子索必達襲職任佐領卒其親兄羅必達襲職三遇恩詔加至二等輕車都尉任參領兼佐領緣事降為騎都尉兼一雲騎尉因年老告退其子甘生襲職歷任副都統兼佐領卒其子七十六襲職時削去恩詔所加之職承襲騎都尉現任協領又通貴親弟巴丹泰之孫禮三保原任佐領元孫福長現任佐領又通貴親叔古祿遜之子康喀拉以辦事有能不違指使授騎都尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆加一雲騎尉後平定淮安時梯攻通州城克之又招撫三縣叙功授為三等輕車都尉歷任刑部侍郎副都統兼佐領卒其子羅多理襲職三遇恩詔加至一等輕車都尉兼一雲騎尉任佐領卒無嗣其親弟之子佛爾輝襲職卒其子佛倫襲職時恩詔所削去職承襲三等輕車都尉任佐領卒其子玉加之寶現襲職古祿遜之孫鄂爾博鍚原任佐領莽佳由理藩院員外郎考察稱職授雲騎尉三遇恩詔加至三等輕車都尉卒其子佟嘉襲職從征山東擊敗賊首吕思渠等兵八千餘衆後征察哈爾布爾尼於大鹵地方奮勇破賊有功授為二等輕車都尉歷任都統兼佐領緣事削去本身所得之雲騎尉其子瑪琦承襲三等輕車都尉卒其孫巴格襲職時削去恩詔所加之職承襲雲騎尉現任委署步軍校古祿遜之曽孫華資原任佐領元孫濟蘭泰原任三等護衛特克慎現任佐領四世孫瑪泰現任典儀五世孫佟琳現任三等護衛又通貴親叔瑪玳之孫沙渾原任三等護衛和托由前鋒參領破流賊滅福王平定河南江南等處屢敗賊衆後征福建取汀州府第三登城克之授雲騎尉兩遇恩詔加至騎都尉兼一雲騎尉卒其子華善襲職卒無嗣其親叔瑪拉襲職卒其孫鄂鼐襲職時削去恩詔所加之職承襲雲騎尉卒其子八十一現襲職瑪玳之曽孫綽倫原任步軍校元孫本科原任驍騎校四世孫碩岱現任同知博雷現任筆帖式又通貴親叔瑪納海哈斯瑚之孫孟庫原任前鋒參領昂琦原任佐領曽孫德逺原任鳴贊阿爾泰原任郎中按通貴與本旗伊巴丹地方巴奇蘭正藍旗葉赫地方圖爾坤納穆占等同族薩碧圗國鑲藍旗人王機砮之孫也世居輝發地方山負初來歸其孫禮固由驍騎校從征浙江舟創奪船有功授雲騎尉尋任郎中編佐領使統之繼由護軍參領委署護軍統領征陕西屢敗叛逆王輔臣兵續征湖廣在長沙府擊賊僞將吳國貴兵陳亡贈騎都尉其孫哈札海瑚什他先後承襲俱任佐領又薩碧圗之曽孫禪岱原任佐領四世孫赫達色亦原任佐領赫爾圖現任佐領又薩碧圖親弟瑚什布之孫尚提布原任五品官曽孫孟格圗原係副榜莽科國鑲藍旗人王機砮之孫也世居輝發地方之其初率兄弟及同里人等來歸編佐領使統孫羅和原任副都統曽孫羅多原任護軍參領訥爾布原任佐領元孫薩賚四格訥理俱原任佐領武德現任佐領四世孫札拉芬原任佐領六十八現任佐領又莽科親兄薩穆哈之孫伊圖原任司庫索拜原任驍騎校索泰金圖俱原任筆帖式曽孫伊爾登舍楞德爾登俱原任筆帖式三檀國正藍旗人世居輝發地方統之其長子薩珠瑚初率屬下來歸編佐領使原任佐領薩珠瑚之孫雙柱原任三等護衛又三檀次子阿珠瑚之長子伊巴漢原任副都統兼佐領次子吳達禮原任吏部尚書兼佐領第三子伊巴克圖原任參領第四子愛圖原任長史第五子伊雷原任副都統孫勒琦原任副都統兼佐領多鼐進布俱原任護軍參領元福原任二等護衛鼐格係和碩額駙任佐領溫察庫納海俱原任頭等護衛鍚納海原任護軍參領伊納海原任二等護衛伊三布原任司庫伊爾圖由護軍參領從征福建擊海冦於厦門陳亡贈騎都優其子禪布襲職緣事革退其弟久勒襲職卒尉其子二格現襲職阿珠瑚之曽孫明宗原任佐領托克托和原任員外即阿林原任護軍統領兼佐領德韶現任佐領松藹現任二等護衛圖翰現任員外郎兆柱明舉俱現任筆帖式元孫札祿現任六品官佛佑現任筆帖式文光文琮俱現係生員又三檀第三子薩弼漢原任佐領其長子韓楚哈亦原任佐領次子喀爾沁由護軍參領從征厄魯特噶爾丹奮勇破賊有功授雲騎尉卒其子巴布海現襲職薩弼漢之孫徹克徹渾隆綬俱原任佐領隆福原任協領哈爾贈雲騎碧由頭等護衛從征福建擊海寇於厦門陳亡尉其子武智襲職現任四品典儀薩弼漢之曽孫徹海現任護軍校又三檀第四子瑚實由閒散從征旅順口及平定朝鮮俱有功後征皮島贈騎都陳亡優瑚札祿襲職三遇尉其子恩詔加至二等輕車都尉圍錦州擊敗松山杏山馬步兵破流賊滅福王平定河南江南等處屢著軍功授為一等輕車都尉歷任副都統卒其長子瑚弼善孫凖提保相繼承襲瑚札祿之次子孟贈雲騎保從征湖廣在洞庭湖擊賊陳亡職後薩靈阿尉因無嗣其親兄之孫薩靈阿襲恩詔所承襲伊父凖提保之一等輕車都尉時削去現加之職餘剩騎都尉兼一雲騎尉合併本身襲之雲騎尉授為三等輕車都尉瑚實之孫韶寶原任主事曽孫二丑色原任典儀又三檀第五子延達爾漢原任護軍校其長子雅賴由長史從征江西於鄱陽湖等處屢敗賊首黃浩兵贈騎都後在新口費園地方擊賊陳亡優退其弟福爾尉其子班第襲職任佐領緣事革敏襲職卒其子顯貴現襲職延達爾漢之次子雅海由前鋒參領從征福建擊敗海寇鄭成功兵又征叛逆察哈爾布爾尼於大鹵地方屢敗賊衆卒後叙功優贈騎都尉因無嗣其親兄之孫盂蘭保現襲職延達爾漢之孫延泰原任頭等護衛拉哈原任七品官曽孫廣綬原任頭等護衛拉薩理原任佐領元孫索柱現任佐領永柱現任遊擊又三檀第六子費揚古由佐領過北京征山東入邉之日擊敗馬總兵等兵又以梯攻濵州克其城授雲騎尉定鼎燕京時入山海關擊敗流賊二十萬衆叙功授為騎都尉平定河南江南等處屢敗賊恩詔加兵加一雲騎尉卒其長子雅素喀襲職三遇姪至一等輕車都尉任護軍參領卒無嗣其親星額圖襲職任佐領卒其親兄之孫恩特赫墨襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉費揚古之次子揚岱原任都統兼佐領第三子法瑚達原任長史兼佐領孫浩善原任頭等護衛格圖肯原任佐領耿額圖原任三等護衛法克進原任二等護衛曽孫羅思漢麗慶俱原任佐領松祿現任中書兼佐領七十六現任佐領博爾濟鑲黃旗人世居輝發地方天聰時來歸其孫特木爾原任佐領曽孫鄭庫訥原任博士額爾塞原任前鋒校圖魯什由員外郎定鼎燕京時追流賊至慶都縣敗之又追滕吉思擊敗土謝圖詔書值汗及碩羅汗等兵往送謀叛殁於亂軍鄂爾多斯札木蘇之黨贈雲騎尉其子舒書襲職兩遇後征浙江丹山擊敗僞恩詔加至騎都尉兼一雲騎尉英毅伯阮思等兵數萬餘衆斬僞總兵張興獲銅印一顆叙功授為三等輕車都尉又征雲南至𬗟國阿窪城獲僞桂王征四川擊敗賊僞將吳之茂等兵五千餘衆平定陕西擊敗賊僞將王屏藩兵於漢中府授為二等輕車都尉因病告休其子顧爾泰襲職歷任詹事府詹事引病乞休將二等輕車都尉减為騎都尉伊子敦柱襲職現任知府又博爾濟之元孫牛鈕原任藍翎侍衛哲貝原任御史兆山原任主事科爾濶岱原任兵部尚書杭琦原任內閣侍讀學士果禮原任參領桑格原任七品官賴虎原任驍騎校蘇赫由護軍校從征逆藩吳三桂於石門坎黃草壩地方擊敗賊僞將何繼祖等兵又敗賊將胡國秉於雲南城下卒後叙功優贈騎都尉其子綽科托襲職卒其子烏隆泰現襲職又博爾濟之四世孫七十八原任員外郎多爾進原任步軍校恩特原任副護軍參領常明原任護軍校達普蘇原任驍騎校五格哲綬俱原任筆帖式五世孫麗珠現任主事烏拉岱現任給使什長六世孫富謙現任筆帖式按博爾濟與正白旗那木都魯地方莽健鑲白旗吉林烏喇地方謨爾渾鑲藍旗包衣哈達地方明安等同族碩色吳巴世國正藍旗人世居輝發地方初來歸奉命前往招降察哈爾國察哈爾不從反誘之降碩色吳巴世不屈拘繫三年與守者通謀潛遁祼體忍太祖髙饑而歸悅皇帝嘉諭衆臣曰碩色吳巴世自葉赫來未久遂使察哈爾並非久食我惠之人而心志在主故祼體忍饑冒死而來甚屬可憫其給漢人三户男子十九人馬七匹牛六頭善養之勿加以役尋又奉敕招諭巴克貝勒時有昂阿貝勒者以兵三百邀諸路碩色吳巴世獨挺身前進大敗賊兵太祖嘉之賞賚甚優授騎都尉任碩色吳巴世之子吳陵寢總管卒其子觀音保襲職又努瑚原任頭等侍衛孫珠蘭泰原任郎中納爾穆原任員外郎兆柱原任親軍校納進現係看聖祖仁守倉庫官曽孫進布䝉吳巴世效力有年賞給皇帝追念伊曽祖碩色六品世職卒其弟富起襲職緣事革退其叔祖之孫福保現襲職又碩色吳巴世之曽孫福德福長俱原任筆帖式屯泰國鑲紅旗人世居輝發地方衮塔鍚原任備禦孫初來歸任二等護衛其子喀喇原任頭等護衛曽孫剛格原任佐領元孫福耀原任典儀綏向原任親軍校唐色由委署護軍校從征浙江屢敗賊僞將劉國軒兵於郭塘山等處續征雲南於石門坎黃草壩地方擊敗賊僞將何繼祖等兵叙功授雲騎尉歷任副都統卒其子薩楞泰現襲職又屯泰之四世孫常祿現任筆帖式碩國鑲紅旗人世居輝發地方城門尉拉拜原任筆初來歸其曽孫克特原任帖式元孫瑪沙原任佐領常新原任典儀四世孫瓦爾達原任筆帖式雅圖原任驍騎校瑪林保現任三等護衛克孟額現任驍騎校札琳由委署章京平定雲南於桂花寺地方擊敗賊僞將吳世璠等兵三萬餘衆叙功授雲騎尉卒其子瞻岱現襲職又碩之五世孫伊琳原任筆帖式達普唐阿現任頭等護衛六世孫伊福訥現任員外郎伊福善現任筆帖式蘇札庫鑲黃旗人世居輝發地方來歸年分無考其孫漢楚罕由佐領從征察哈爾布爾尼於大鹵地方奮勇破賊有功授雲騎尉卒其子雅住襲職任頭等侍衛又蘇札庫之曽孫葉內原任步軍校元孫本濶原任驍騎校四達色現任防禦阿鼐國正藍旗人世居輝發地方佛保由八品官從征初來歸任員外郎其子萬江西擊敗賊兵四千餘衆於南康府續征廣東在桂嶺頭地方擊賊陳亡贈雲騎尉其子萬達理孫安柱相繼承襲謨式鑲紅旗人世居輝發地方來歸年分無考任六品典儀其子精嘉由護軍校從征浙江福建著有軍功授雲騎尉卒其長子苗肖襲職次子阿爾泰現任三等護衛恩格德正藍旗人世居輝發地方來歸年分無考歷任禮部尚書兼佐領其子納海原任驍騎校納敏原任都統兼佐領孫諾敏原任山西巡撫訥敏原任二等護衛永福現任典儀曽孫諾穆圖原任甘肅布政使諾穆布原任御史諾穆泰現任同知諾穆秦現任筆帖式又恩格德親弟色赫原任郎中兼佐領其子舒瑚鼐原任內閣學士兼禮部侍郎納琳原任員外郎孫僧保原任筆帖式納蘭泰現任主事桑格現任筆帖式曽孫耀