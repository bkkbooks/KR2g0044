body:
  text: 八旗滿洲氏族通譜目錄卷四十二董鄂地方嵩佳氏孫扎理蘇法圖曬蘇爾吉索格索通阿拉哈和啟以上俱有傳古郎阿達古理哈理葛濟以上俱附載松江堡地方嵩佳氏胡什塔右係有傳赫達色蘇勒以上俱附載各地方嵩佳氏阿爾都善和色以上俱有傳蘇巴泰謨清阿以上俱附載宜特墨氏穆克圖阿哈達金泰以上俱有傳那穆布祿三坦班布理愛塔胡錫屯德勒本庫阿畢喀達格色阿普泰巴圖瑚喀喀濟以上俱附載扎思瑚理氏珍柱肯尼堪章泰托普齊以上俱有傳塔普舒拜音達喀岱以上俱附載瑚錫哈理氏托謨奎樓登布爾塔理以上俱有傳都爾柏阿松阿巴古祿格索希納莫特以上俱附載
  hash: sha256:5861c799a0d6f3f0245b2cb744610ef7016503e0373f53bcb3b234cfc955c58c
