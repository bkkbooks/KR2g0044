body:
  text: 八旗滿洲氏族通譜卷五十四薩克察氏薩克察為滿洲一姓其氏族散處於綏分等地方球羅理國鑲白旗人世居綏分地方騎校從征湖廣於嶽初來歸其子英額理由驍贈雲騎州府擊賊吳應麟等兵被創身亡病乞休其親尉其子穆臣承襲任頭等護衛因弟之子永福現襲職右係應立傳之人其餘無事蹟可立傳者附載於後正紅旗古拉庫尼馬察蘇蘇村地方人原任驍騎校其子翁阿達原任步軍校孫華善亦原任步軍校正藍旗薩竒納渾春地方人其曽孫瑪哈布原任協領鴻克訥扎布俱原任驍騎校茂格原任員外郎元孫勒起原任協領和思和理原任步軍校五十六原任防禦常綬原任五品官瑪西泰原任筆帖式永載原係副護軍校旒保住現任三等護衛四世孫成明原係副驍騎校布勒圖尼馬察地方人其曾孫皂保原任五品官元孫瑚什塔原任驍騎校瑪龍舞原係副驍騎校四世孫和尚原任驍騎校六世孫柏楞泰現任驍騎校又布勒圖親弟庫穆善之四世孫武黑現任護軍校鑲藍旗夸哈納德爾吉色欽虎爾哈地方人其子阿納庫原任驍騎校孫阿三泰現任護軍校阿思泰原係副護軍校以上俱係國初來歸之人烏爾答氏烏爾答為滿洲一姓其氏族散處於葉赫等地方嘉渾鑲紅旗人世居葉赫地方原係烏林答氏後移居觀音屯地方改為烏爾答氏國初來歸其孫多爾奪原任防禦多爾濟原任二等護衛曽孫格伯庫原任頭等護衛隆托原任三等護衛元孫葉努溫退夏瑚俱原任頭等護衛鄂爾多原任驍騎校四世孫多內額竒俱原任頭等護衛巴爾蓀魯錫納凖巴喇俱原任護軍校清布原任二等護衛瑚錫原任筆帖式巴達海由閒散從征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩地方叙功授雲騎尉卒其子克錫布祿孫滿丕相繼承襲又嘉渾之五世孫噶薩理原任御史吳晉泰扎薩理俱原任頭等護衛官珠原任八品官鼎柱原任典儀噶爾圖原任筆帖式阿爾圖原任步軍校吉隆阿原任防禦寅珠原任員外郎兼佐領六世孫常鼐巴格俱原任佐領寶良原任主事立柱原任御史齊士拔原任七品筆帖式吳黨阿原任司庫榮保原任八品官七十吳靈阿俱現任頭等護衛吳寧阿現任長史吳納海現任典儀吳竒現任驍騎校吳同保現任護軍校吳爾圖現任親軍校赫成額現任助教吳海現任筆帖式七世孫吳登額多隆鄂多永鄂六十五恆德寧珠俱現任筆帖式吳拉納現任典儀吳爾登現係生員布晉泰國鑲白旗人世居吉林烏喇地方俱原任驍騎校初來歸其曽孫岱珠瑚阿音達瑚什穆溫察俱原任護軍校元孫瑚什原任三等護衛達爾泰原任驍騎校䝉古爾岱原任助教翁愛由護軍校從征貴州於涼水井地方擊敗賊僞侯李成蛟等兵九千餘衆後征湖廣在贈雲騎彜陵州擊賊僞將劉之輔兵陳亡襲職又布晉尉其子兆色襲職卒其子諾海現泰之四世孫五十六原任藍翎侍衛雅柱原任驍騎校由正白旗改隸以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗布森泰布晉泰同族吉林烏喇地方人其曽孫瑪爾泰原任二等護衛碩色原任驍騎校元孫瑪騰額現任前鋒校由正白旗改隸右係國初來歸之人鑲紅旗鐸爾吉輝發地方人其曽孫清卜原任三等護衛右係來歸年分無考之人圖克坦氏圖克坦為滿洲一姓其氏族散處於吉林烏喇等地方烏魯素國鑲黃旗人世居吉林烏喇地方阿哈納原任驍初來歸其孫尼侃原任雲麾使騎校曽孫馬占原任藍翎侍衛華色原任二等侍衛吳達哈原任內閣侍讀學士福爾那原任親軍校瓦爾達貴亷俱原任護軍校阿爾納由親軍校從征陜西於平涼府擊敗逆賊王輔臣兵後征雲南擊敗賊僞將胡國秉等兵於雲南城下敘功授雲騎尉卒無嗣其親弟之子富保現襲職又烏魯素之元孫薩爾圖原任三等侍衛右係應立傳之人其餘無事蹟可立傳者附載於後正紅旗阿爾泰蘇完地方人其孫福哈善原任城門尉右係國初來歸之人正白旗包衣拜音察理布爾哈圖地方人原任內管領其子哲庫訥亦原任內管領孫果星額現任員外郎訥清額現任郎中訥素懇現任內管領曽孫偏格現任鳴贊元孫盛德現任筆帖式永德現任藍翎侍衛右係來歸年分無考之人郭爾佳氏郭爾佳為滿洲一姓其氏族散處於長白山等地方羅滿國鑲藍旗人世居長白山地方侍讀學士曽孫赫初來歸其孫瑪拉原任內閣碩色由驍騎校從征雲南擊敗賊僞將何繼祖等兵二萬餘衆又敗賊僞將胡國秉兵於雲南贈雲騎城下卒後敘功輝達及輝達之子安住相繼承尉無嗣其親叔襲又羅滿之曾孫常祿現任驍騎校右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗貝謨理安巴德普特布占台地方人鄂鼐嫩河地方人以上俱係康熙時自科爾沁撤回之人洪鄂春氏洪鄂春為滿洲一姓其氏族散處於伊漢阿林屯齊村等地方阿哈達國鑲藍旗人世居伊漢阿林屯齊村地方廣屢破初來歸其孫英阿岱由護軍校從征湖賊兵又征廣東擊敗賊李定國兵於新會縣等處敘功授雲騎尉卒無嗣親兄松阿岱其子佛隆鄂相繼承襲按阿哈達與本旗同里琦塔理同族華色國正白旗人世居雅蘭地方軍參領取昭定藏著初來歸其子貝和諾由護有勞績授雲騎尉卒其子積福現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗赫勒綏分地方人其子噶哈納原任司庫曾孫謨留原任驍騎校札魯倭濟地方人其曾孫恩格理原任驍騎校鑲白旗揚阿納沾河地方人其孫瓦爾達原任驍騎校曽孫烏雅圖現任護軍參領鑲藍旗琦塔理伊漢阿林屯齊村地方人其子赫勒原任防禦孫額勒原任郎中德勒德特赫俱原任防禦曽孫拉色原任中書明安圖原任防禦元孫福海現任驍騎校按琦塔理與本旗同里阿哈達同族穆禮堪琦塔理同族伊漢阿林屯齊村地方人其曽孫穆圖原任護軍校元孫瑚錫屯原任防禦四世孫穆朗阿原任驍騎校玉陳琦塔理同族伊漢阿林屯齊村地方人其曽孫佛爾赫原任驍騎校四世孫六格現任驍騎校伊喇布琦塔理同族伊漢阿林屯齊村地方人其孫五十八原任防禦元孫二格原任驍騎校巴晉泰琦塔理同族伊漢阿林屯齊村地方人其元孫博爾特托絡俱原任驍騎校以上俱係國初來歸之人正藍旗包衣賽音三布祿輝發地方人其孫葉青額原任二等護衛曽孫納親現任包衣大天常現任司庫外朗賽音三布祿同族輝發地方人其子喀爾布原任佐領孫霞拉原任護軍校以上俱係來歸年分無考之人額爾圖氏額爾圖為滿洲一姓其氏族散處於敦達敦等地方察竒滿泰國正黃旗人世居敦達敦地方委署參領從征雲初來歸其四世孫夏世泰由南擊敗賊僞將何繼祖等兵於石門坎黃草壩地方又敗賊僞將胡國秉等兵於雲南城下叙功授雲騎尉卒其子積蘭泰現襲職納喇鑲黃旗人世居黑龍江地方來歸年分無考其長子孟額特原任二等侍衛次子滿洲由三等侍衛從征雲南貴州等處屢著戰功授雲騎尉卒其兄之子英圖襲職卒其親弟之子僧保襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗江泰黑龍江地方人其曽孫滿都堪原任驍騎校元孫松善原係雲騎尉古魯原任護軍校四世孫吳爾泰原係雲騎尉鑲紅旗魯庫額爾圖村地方人其曽孫赫穆爾德原任驍騎校元孫庫庫德原任護軍校噶什塔原任筆帖式阿布岱原任驍騎校四世孫理三泰現任驍騎校克森特扎穆素俱原任護軍校以上俱係國初來歸之人鑲黃旗揚節鼐黑龍江地方人其孫瑪雅達原任信炮章京曽孫顔圖原任防禦格梅原任二等侍衛雅爾泰原任護軍校六格現任護軍校元孫法保亦現任護軍校鑲白旗遂勒丹明安額爾圖地方人其孫謨克德原任佐領烏瑚尼明安額爾圖地方人其元孫佛保現任防禦以上俱係天聰時來歸之人鑲黃旗綽爾門黑龍江地方人其子額德尼原任驍騎校孫瑚施保原任護軍校右係來歸年分無考之人彰錦氏彰錦為滿洲一姓其氏族散處於費雅郎阿等地方松額理正藍旗人世居費雅郎阿地方來歸年分無考其孫碩禮由委署護軍校從征浙江福建破僞總兵趙得勝等兵四萬餘衆續征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩地方敘功授雲騎尉卒無嗣其親兄之子薩爾圖襲職卒其子薩爾帕襲職現任頭等護衛兼佐領又松額理元孫章旒現任鳴贊黑達色原係副驍騎校四世孫特克愼現任副護軍參領杭蘇理鑲黃旗人世居沾地方來歸年分無考其元孫國柱由委署章京取昭定藏著有勞績授雲騎尉卒其子玉柱現襲職以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗伊齊哈穆溪地方人其四世孫蘇赫德原任驍騎校五世孫海常現任步軍校額爾登額現任驍騎校正紅旗札靈阿長白山地方人其子花色原任筆帖式吳泰那木察地方人其孫達蘭太原係副驍騎校包衣喇哈長白山地方人原任七品典儀鑲紅旗殷達瑚齊瀋陽地方人其孫達爾蘇原任步軍校薩納輝發地方人其子達蘇納原任驍騎校孫訥爾素原任防禦岱密納現係副護軍校濟拉蓀瀋陽地方人其曽孫都蘭泰現任親軍校正藍旗元保沾地方人其曽孫長生原任防禦元孫綬寶原任協領兼佐領又元保親兄格祿之曽孫華善現任護軍校二格烏喇地方人其子白起原任驍騎校孫長保住亦原任驍騎校以上俱係國初來歸之人鑲紅旗塞克西長白山地方人其子噶納海原任員外郎噶爾岱原任筆帖式孫鐵柱原任員外郎納爾布佟住佟保英住俱原任筆帖式曽孫黑格現任防禦七格現任五品典儀官保原任防禦沙色原任護軍校滿昌原任筆帖式柏倫泰長白山地方人其子柏色爾根原任防禦孫赫特赫原任護軍校尼楚赫原任驍騎校薩克錫長白山地方人原任八品官其子瓦爾布原係副驍騎校曽孫穆特布原係副護軍校以上俱係天聰時來歸之人正紅旗夸喀長白山地方人其子來法原任護軍校孫哈達現任城門尉喀拉長白山地方人其子納親原任典儀正藍旗錫理撫順地方人原任護軍校包衣額滕格那木都魯地方人其長子墨克原任佐領次子西特哈原任驍騎校孫塞蘭泰原任護軍校以上俱係來歸年分無考之人聶格理氏聶格理為滿洲一姓其氏族世居葉赫及輝發地方瑚爾漢國鑲白旗人世居葉赫地方署章京從征江西湖初來歸其孫瑚錫屯由委廣等處屢敗賊兵授雲騎尉卒其子常明襲職任參領又瑚爾漢之曽孫覺和托原任郎中卓博資原任長史六十現任步軍校元孫伊哈納原任筆帖式瑪哈納原任佐領賚格現任副護軍參領四世孫赫順現任主事五世孫育惠現係生員右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗達楚喀輝發地方人其曽孫穆臣原任步軍校元孫托錫原任郎中托和諾原任護軍校三雅圖現任五品典儀四世孫托晉原任驍騎校蘇爾泰原任郎中文格金柱俱現任護軍校郎啓輝發地方人其元孫薩蘭泰原任護軍校四世孫禮住原任驍騎校索達色原任筆帖式五世孫賽尚阿現任七品官漢班現任員外郎六世孫吳靈阿現任七品官以上俱係國初來歸之人正黃旗佛庫訥葉赫地方人其子華色原任參領孫塞克騰原任筆帖式滿都理輝發地方人其子松果托原任驍騎校孫正特松吉納俱原任驍騎校曽孫鄂色原任步軍校元孫赫達色現任親軍校以上俱係來歸年分無考之人揚佳氏揚佳為滿洲一姓其氏族散處於佛阿拉等地方阿珠瑚國鑲紅旗人世居佛阿拉地方鋒校達爾堪由護初來歸其孫達哈塔原任前軍校從征貴州屢著軍功授雲騎尉卒其子麻色襲職又阿珠