body:
  text: 八旗滿洲氏族通譜目録卷七十五附載滿洲旗分內之尼堪姓氏王氏王宏德王東海佛保王承德王三王成勳王忠孝王福王文王德王明王景祿王受德王世龍王石柱瓦克善王定邦王義品王裕功王守坤松塔王立鑄王德容王拜同王有在王留王盤王茂蘭王棟科王德錦王國椿王來勇王登清王崇彩王士選王老誠二格王來聘王繼清王强王道金王永盛王煥王傑蕭兹德柱王永德王二格桑格王思髙呼登筵金泰王天才王士宗王勇王一臣王泰王琮隆格英受大碩色王欽祖王熊王國用王艾王世泉王洋映琨王制鑑王文同王傑王應坤李氏瓢色達哈納李錦李棟李進輝存住李有詩李世清李朝元李思李藍春李存滋李朝奉蕭兹李廣書李永清李尚義李崇賢李鑑順四格李寅李時茂武色李柏李國棟白竒國泰李山李惟桓李有節李成功李天培李景柱李成棟李奉銀李文奎李先明李成龍李本李追李明揚李茂春李景成李時茂李玉恩李天成李守明李正李國任李有功李世福李天祿李著美李霸方逺李文燦二格色李思忠張氏張啓祥張長雲張嘉謀通泗張德耀張中升張三張茂張廣寧張厚權張祿臣張義德張起鳳張永福張繼業張天蛟張優才張景百張恭舉張國史烏色張國忠張義奎張起龍張邦祺鄴二張文元張鐘異張三興張世孝張遇龍張明理張奎張奉武張大用張德張應理張自强張雅圖張成良張宏傳張繼儒張鑑張雲龍張自祥張士傑張國治張齊正張善得張尚仁張德貴張雲蛟張德升張德功欽定四庫全書八旗滿洲氏族通譜目録卷七十五附載滿洲旗分內之尼堪姓氏王氏王宏德王東海佛保王承德王三王成勳王忠孝王福王文王德王明王景祿王受德王世龍王石柱瓦克善王定邦王義品王裕功王守坤松塔王立鑄王德容王拜同王有在王留王盤王茂蘭王棟科王德錦王國椿王來勇王登清王崇彩王士選王老誠二格王來聘王繼清王强王道金王永盛王煥王傑蕭兹德柱王永德王二格桑格王思髙呼登筵金泰王天才王士宗王勇王一臣王泰王琮隆格英受大碩色王欽祖王熊王國用王艾王世泉王洋映琨王制鑑王文同王傑王應坤李氏瓢色達哈納李錦李棟李進輝存住李有詩李世清李朝元李思李藍春李存滋李朝奉蕭兹李廣書李永清李尚義李崇賢李鑑順四格李寅李時茂武色李柏李國棟白竒國泰李山李惟桓李有節李成功李天培李景柱李成棟李奉銀李文奎李先明李成龍李本李追李明揚李茂春李景成李時茂李玉恩李天成李守明李正李國任李有功李世福李天祿李著美李霸方逺李文燦二格色李思忠張氏張啓祥張長雲張嘉謀通泗張德耀張中升張三張茂張廣寧張厚權張祿臣張義德張起鳳張永福張繼業張天蛟張優才張景百張恭舉張國史烏色張國忠張義奎張起龍張邦祺鄴二張文元張鐘異張三興張世孝張遇龍張明理張奎張奉武張大用張德張應理張自强張雅圖張成良張宏傳張繼儒張鑑張雲龍張自祥張士傑張國治張齊正張善得張尚仁張德貴張雲蛟張德升張德功
