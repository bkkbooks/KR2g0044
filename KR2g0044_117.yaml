body:
  text: 八旗滿洲氏族通譜卷五十八卓晉氏卓晉為滿洲一姓其氏族世居長白山地方滿都渾鑲黃旗人世居長白山地方其子薩哈廉原任前鋒參領孫長綬原任護軍校多魁三泰俱原任驍騎校曾孫額爾塞現任驍騎校塞赫鑲黃旗人世居長白山地方其孫黑色原任護軍參領蘇爾泰現任護軍校以上俱係國初來歸之人色穆奇理氏色穆奇理為滿洲一姓其氏族世居黑龍江地方岱達理鑲黃旗人世居黑龍江地方其曾孫吳默慎原任佐領元孫蘇郎阿原任步軍校齊什寶原任驍騎校額赫訥現任護軍校四世孫順科現任二等侍衛侍衛什長阿郎阿鑲黃旗人世居黑龍江地方原任步軍校以上俱係國初來歸之人廣佳喇氏廣佳喇為滿洲一姓其氏族世居葉赫及吉林烏喇地方奇堂儀正白旗人世居葉赫地方其四世孫桓岱現任護軍校六世孫白達色現任驍騎校札爾布鑲白旗人世居吉林烏喇地方其曾孫華山原任護軍校科山現任護軍校元孫三赫現任驍騎校以上俱係國初來歸之人吳察喇氏吳察喇為滿洲一姓其氏族世居安褚拉庫及烏喇地方聶爾蘇鑲紅旗人世居安褚拉庫地方其孫吳亮載原任協領右係國初來歸之人克星額正白旗人世居烏喇地方右係康熙時自科爾沁撤回之人蒼瑪爾紀氏蒼瑪爾紀為滿洲一姓其氏族世居黑龍江及碧新地方阿祿正黃旗人世居黑龍江地方其曾孫薩岱原任護軍校右係國初來歸之人額聶赫鑲黃旗人世居碧新地方原任佐領右係來歸年分無考之人赫書氏赫書為滿洲一姓其氏族世居葉赫及吉林烏喇地方什圖鑲白旗包衣人世居葉赫地方原任員外郎其子四格原任七品官孫僧額亦原任七品官碩色原任驍騎校由正白旗改隸右係來歸年分無考之人赫爾喜正藍旗人世居吉林烏喇地方右係康熙時自科爾沁撤回之人康傑達氏康傑達為滿洲一姓其氏族世居黑龍江地方色爾古楞正白旗人世居黑龍江地方原任佐領其子額能徹亦原任佐領孫色特爾現任頭等侍衛特金徹現任驍騎校奇希圖正白旗人世居黑龍江地方原任三等侍衛以上俱係來歸年分無考之人吉魯氏吉魯為滿洲一姓其氏族世居烏喇及吉林烏喇地方噶爾圖鑲藍旗人世居烏喇地方其孫納親原任員外郎納郎阿原任筆帖式曾孫柏赫原任典儀博爾渾鑲藍旗人世居吉林烏喇地方其孫長保原任護軍校以上俱係國初來歸之人都魯氏都魯為滿洲一姓其氏族世居長白山及黑龍江地方吳爾蛟鑲藍旗人世居長白山地方原任驍騎校其子長在原任筆帖式薩穆哈理鑲藍旗人世居黑龍江地方其孫奇穆特色木原任驍騎校元孫達薩理原任護軍校四世孫柏綏現係副護軍校以上俱係國初來歸之人沙拉氏沙拉為滿洲一姓其氏族世居瓦爾喀地方楚楞鑲白旗人世居瓦爾喀地方其孫南泰原任御史曾孫瑪爾賽原任內閣侍讀學士瓦爾達鑲白旗人世居瓦爾喀地方其孫花善原任驍騎校曾孫三格原任防禦元孫魯爾錦原任驍騎校以上俱係國初來歸之人鄂穆綽氏鄂穆綽為滿洲一姓其氏族世居佛訥赫村地方阿圖理鑲白旗人世居佛納赫村地方其曽孫成德原任佐領巴斯克鑲白旗人世居佛納赫村地方其孫博濟原任驍騎校以上俱係國初來歸之人培佳氏培佳為滿洲一姓其氏族世居東古村地方二格色鑲藍旗人世居東古村地方原任護軍校由本旗包衣改隸右係國初來歸之人巴哈達鑲藍旗包衣人世居東古村地方其子巴什原任護軍校右係來歸年分無考之人舒穆理氏舒穆理為滿洲一姓其氏族世居海蘭木及薩爾碧圖村地方鄂偲鑲藍旗人世居海蘭木地方其子布賴原任員外郎孫倭赫原任筆帖式曾孫赫爾特原任佐領右係國初來歸之人三達理鑲藍旗人世居薩爾碧圖村地方右係康熙時自科爾沁撤回之人鄂爾綽絡氏鄂爾綽絡為滿洲一姓其氏族世居蘇完及卦爾察地方巴爾達正黃旗人世居蘇完地方其曾孫克徹爾原任防禦拖爾海原任步軍校郎圖原任佐領元孫瑪瑚瑪爾圖俱原任防禦常保原任筆帖式四世孫兆柱原任防禦赫琳原任筆帖式五世孫伊常阿現任防禦右係國初來歸之人雅爾吉勒正黃旗人世居卦爾察地方其元孫景雲原任步軍校右係天聰時來歸之人徐吉氏徐吉本係地名因以為姓其氏族世居徐吉和羅地方巴顏正藍旗人世居徐吉和羅地方其子賽柱原任筆帖式右係國初來歸之人達成鑲紅旗包衣人世居徐吉和羅地方其曾孫墨理原任八品典儀元孫佛因泰現係生員右係來歸年分無考之人達爾充阿氏達爾充阿為滿洲一姓其氏族世居吉陽及黑龍江地方巴賽正黃旗人世居吉陽地方其孫多鼐敦鐸俱原任驍騎校曽孫三保原任郎中九柱原任護軍校石柱現任親軍校元孫托倫原任八品官謨綽海鑲藍旗人世居黑龍江地方其曾孫瑚仆巴原任驍騎校以上俱係國初來歸之人烏爾瑚濟氏烏爾瑚濟為滿洲世居松花江及烏姓其氏族理地方古思克正黃旗人世居松花江地方其子倭赫原任協領孫衮色原任防禦元孫巴晉泰現任防禦右係國初來歸之人桑格正藍旗人世居烏蘇理地方其子珠爾泰原任護軍校留福綬原任驍騎校孫華色原任防禦右係來歸年分無考之人顏濟理氏顏濟理為滿洲一姓其氏族世居瀋陽及白都訥地方雅郎阿正藍旗人世居瀋陽地方其曾孫七達色現任筆帖式發達現係副護軍校右係國初來歸之人和爾親鑲黃旗人世居白都訥地方右係康熙時自科爾沁撤回之人卓起氏卓起為滿洲一姓其氏族世居黑龍江及界凡地方耀德尼正白旗人世居黑龍江地方其子雅巴爾岱原任佐領輝色正藍旗人世居界凡地方其子烏巴仆庫原任驍騎校以上俱係國初來歸之人鄂索絡氏鄂索絡為