body:
  text: 欽定四庫全書御製八旗滿洲氏族通譜序我祖宗誕膺天命勃興東土德綏威讋奄甸萬姓維時龍從鳯附之衆雲合響應輻輳鱗集强者率屬歸誠弱者舉族內附我祖宗建師設長以涖之分旗隸屬以别之厥有熊羆之士不二心之臣效命疆場建謀帷幄親以腑肺重以婚姻酬以爵命逮入關定鼎或聚居遼左或散處燕畿錫之土田爰及苗裔至於今百五六十年生聚蕃衍時萬時億纍朝休養煦植鞠保胥勤越我嘉師咸能永世以滋大朕維祖宗德澤之深不可不繼修令緒益綿延惇固於無疆重慮物阜且博代序日逺族姓日繁不為之明章統系俾知世德所自將罔克念先人之勤無以光昭前烈爰發金匱石室之藏徵載籍稽圖譜考其入我朝來得姓所始表之以地系之以名官階勳績綴為小𫝊勳舊戚畹以及庶姓釐然備具秩然有條與國史相為表裏昔周小史定繫世辨昭穆左氏內外𫝊言天子建德因生賜姓胙土命氏而司商吹律以定姓名蓋萬物本乎天人本乎祖木有根而枝附焉水有源而流出焉譜牒者所以聨人情之渙而維舊俗之漓不可忽也相昔先民遺風敦朴不徒以族望相髙是書之作非如魏晉隋唐譜牒之學炫博聞而廣附㑹以膏梁閥閲為尚也書曰古我先王暨乃祖乃父胥及逸勤又曰惟乃祖乃父世篤忠貞服勞王家纘乃舊服無忝祖考前之人既以忠實勤勞覆幬其後嗣凡兹食舊德而服先疇者其何以無隳厥緒書亦曰率乃祖考之攸行昭乃辟之有乂是則朕所厚望也夫乾隆九年十二月初三日奉敕纂修八旗滿洲氏族通譜諭㫖八旗滿洲姓氏衆多向無彚載之書難於稽考著將八旗姓氏詳細查明並從前何時歸順情由詳記備載纂成卷帙候朕覽定刋刻以垂永久著滿洲大學士會同福敏徐元夢遵照辦理欽此八旗滿洲氏族通譜凡例一每卷之首以書名卷次頂格寫姓氏為綱標出地名人名為目並低二格寫綱目大書綱目下注語俱另起雙行細書各低二格以便擡寫姓氏下總書地名地名下各敘得姓緣由及支分派别人名下撮其人官階事實為傳一八旗滿洲大臣官員勳勞懿行俱詳載於國史館功臣傳及八旗通志列傳此書每姓之中應擇勳業最著者冠於一姓之首略舉梗概作傳其餘無事蹟可立傳及科爾沁撤回者俱附載於各姓各地方篇末一滿洲大臣官員凡應立傳之人自其得姓以來至雍正十三年以前物故者依次撰入其有始歸順之人雖係平等官職而其後人勳業昭著者並其後人一併撰入一滿洲內始立姓始歸順之人其所居地名可考者俱逐一開載以昭族望其地名無實據可慿者惟開載姓氏旗分官爵以備族姓之源一纂輯姓氏俱按原籍地名分類編輯即如瓜爾佳氏有居蘇完者則標出蘇完字樣居葉赫者則標出葉赫字樣各為一帙至於每一地方止一二人或三四人併原籍無考者難以另按地名分帙則標出各地方字樣統將一姓中之散處雜地者彚載於內共為一帙應立傳者立傳應附載者附載仍於本人名下注眀原籍其原籍無考者亦一併注眀一凡初來歸依有名位可考者通行載入外其有自始歸依之人以及後世子孫俱無名位者伊等自有家譜可考概不登録惟係希姓雖無名位亦載一二人以存其姓一纂修姓氏俱將所𨽻旗分開載人名之下其有一姓分𨽻數旗者將某與某旗某人同族注眀以備稽考一滿洲內有賜姓者應詳書賜姓原由仍附書本姓內以昭世系一漢軍蒙古旗分內有滿洲姓氏實係滿洲者應仍編入滿洲姓中一滿洲族姓甚繁而一姓之中所居地名不一此書應將所居地名先標於一姓總綱之下使展卷瞭然一滿洲各族內有旗分移易者應書現今旗分並注眀移易情由其年歲久逺無卷案可查而本家記載詳悉者亦與添入一滿洲八旗內有同姓而不同宗者有本屬同姓同宗而其支族别為一姓者應於本姓內詳晰注眀以嚴族姓之辨一八旗滿洲族姓有本人忘其姓氏祖居及歸順情由又無憑可查者概不載入其歸順情由雖無可考而功業顯著者仍應載入並注眀於各小傳之下一世職銜漢名已奉詔精騎尼哈番定為子阿思哈尼哈番定為男阿達哈哈番定為輕車都尉拜他拉布勒哈番定為騎都尉拖沙拉哈番定為雲騎尉漢文內應一併改正以遵今制乾隆五年十二月初八日奏定䝉古髙麗尼堪臺尼堪撫順尼堪等人員從前入於滿洲旗分內厯年久逺者注眀伊等情由附於滿洲姓氏之後其間有不能畫一之處爰列條例於左一包衣佐領及管領下人員內有北京尼堪三藩尼堪阿哈尼堪若一概載入與原奏三項尼堪不符應裁一滿洲旗分內䝉古尼堪臺尼堪撫順尼堪姓氏照滿洲例有名位者載無名位者刪一八旗髙麗𨽻滿洲旗分年久且人數無多雖無名位亦行載入惟阿哈髙麗開入佐領管領下者已經分晰不便載入一滿洲姓氏原有希姓若蒙古髙麗尼堪其姓氏外藩各省俱有只應論其有名位與否不便列為希姓一䝉古髙麗事蹟多與滿洲相同應照滿洲姓氏式樣編載惟尼堪等姓軍功顯著者甚少其有事蹟可考及三品以上大員俱書列於卷首餘皆叙載於後一纂輯八旗氏族通譜欽奉諭㫖原令記載姓氏不使淹沒雖敘其事蹟官爵不過略書梗概以便成書凡查考各項世職根由自有內閣吏部兵部檔冊可憑不得執此為據一京堂以上大員品秩不一故注眀所𨽻衙門以便敘次其郎中以下等員俱屬附載概不書寫衙門一外省督撫以下司道以上俱係大員故注眀省分其知府以下等員概不書寫省分一京都各省俱有都統副都統之名若不注眀省分難以分晰除在京之都統副都統不書旗分外其外省之都統副都統及將軍提鎮俱注眀駐劄地方一世職內有奉侍聖躬得授世職者立傳有襲次已完敕書雖已交部本家尚能記載立功情由有憑可查者亦立傳至無軍功得授世職者並襲次已完敕書交部無憑可查者俱入附載
