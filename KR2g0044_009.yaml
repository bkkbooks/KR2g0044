  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0044_WYG_009-1a, image: WYG0455/WYG0455-0100a.png}
body:
  text: 八旗滿洲氏族通譜目録卷四各地方瓜爾佳氏吳理戡吳拜蘇拜溫都理桂勒赫拜音達理巴圖魯搆色雅木達噶哈豐果阿球巴圖魯僧錫巴圖魯喀喀理甘塔堪寧古齊額赫愛達漢特庫尹伊巴庫卓當阿蒙古基巴顔格布庫郭和尼魯漢賽華泰錫扎爾固齊蘇炳額哈穆坦傅當阿博穆波赫英額赫墩扣岱惠堂阿昭齊喀拜阿都齊德備哲爾球哈錫坦禇爾漢瓦濟訥墨爾根努山尤噶成穆布蘭泰以上俱有傳柏盧喀殷達理尼雅哈齊阿格聶博爾塞巴奇理海倫布希蘭塞爾特素色訥海格吳霞拉顔塔海扎通阿哲爾瑚訥哲爾克葉爾森章齊扎爾虎齊進布剛阿岱薩克素楊額理登古噶哈布克察托和倫金達理哈理布瑚那西特庫科布理顔岱夸資諾海鄂多海明阿嘉蘭布馬爾虎阿爾圖伊克都孔果諾石留克果山謨喜魁喀尹登顔布祿克宜勒瑪庫理納朗阿索可習阿布賚塔穆吳寧額喀爾巴圖法哈拉華瞻楊桑阿卓坦扎薩拉旺堂阿扎哈理阿格尼台哈愛錫雅普達廣衮滿福理額爾赫濟噶濟納吳禮雅達伊禮布會尼喀吳禮外庫渾敦阿賽愛那薩咨那德希訥阿蘇賚尚常明阿濟格碩色烏達什新泰碩色尼堪布塔三鼐吉克濟理朔色李成功特順瓜爾察武留羅起索吉鼐竒韜德昌佟式吉那哈庫爾秦薩爾泰薩爾那布延圖殷達渾鄂穆綽科塔爾比希達漢阿克東阿密拉他艾星阿阿拜伊爾唐阿布塞赫邁圖達翰阿爾布善寧丹瑚騰額福倫泰瑪當阿阿實談石達理阿鼐艾當阿拉琥山達爾漢布爾山愛碧隆董安巴顔國安阿魯蘇布理嶽科齊克騰葉木濟常明烏琳三達理僧額巴棣吳訥格拖絡科齊額赫尼堪阿克塔渾托和文岱布爾哈武和寧珠布柏爾克索諾圖馬晉星額理納衍太和索圖喀蘭濟星格理額升達什舒爾古巴穆習理賽理巴圖魯那哈德阿都達都托克多理拖克拖賴巴拜多璧努馬拉喀瑪岱薩穆棣額爾德蒙格哈尚阿茂岱甘岱鼐鍾阿阿西那布濟格爾阿什圖薩木哈謨和絡錫禧星格理阿普薩哈巴哈察爾阿晉泰索遜泰圖盧克謨克拖當色羅達哈阿哈圖以上俱附載
