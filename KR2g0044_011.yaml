body:
  text: 八旗滿洲氏族通譜目録卷五長白山地方鈕祜祿氏額亦都巴圗魯車爾格圗爾格宜爾登鄂德綽哈爾索渾遏必隆薩穆哈圗額素勒勒巴克什德爾素方殷薩哈多齊清山圗哈泰以上俱有傳吉瑪哈吳什泰常果那蓀濟艾達哈舍錫柏哈斯瑚寧滾占嶽波楊安烏雲珠富爾薩以上俱附載英額地方鈕祜祿氏賴盧渾都督噶哈察鸞額赫理薩滿達古山巴顔賚達巴顔費雅達舒通阿台柱以上俱有傳永敦阿晉松阿達沙當阿外藍佳爾吉光都輝達邁三德克濟古伊哈齊訥庫固郎阿羅爾吉阿穆圖碩喀圖墨訥覺和托達思漢博色泰以上俱附載各地方鈕祜祿氏那爾察羅岱索和托墨爾根鄂米那喀啓富滿阿爾哈庫孟果爾岱班柱穆和楞蘇巴海艾圖哈以上俱有傳富爾那艾蘇烏玉齊格爾都羅爾蘇和拖達瑚薩郎阿輝和羅費揚古陶格額宜圖錫特佛柱蒙古爾岱德東額費揚古哈拉哈拉圖滿泰瑚秦留三巴顔圖舒赫德莽喀納吳班布達那蘇敏吳達善翁固費揚古噶哈善圖林帕鄂和理楊果圖達費音安泰錫以上俱附載
  hash: sha256:0df2ed33e5a627f3478a1ffb98437931384975f11e500a65dfc5c8c8d6bf343a
