body:
  text: 八旗滿洲氏族通譜目錄卷四十九額蘇理氏松果泰阿積爾圖喀爾齊岱羅托渾以上俱有傳雅哈那圖拉蘇岱吉羅凱伊爾得撤和爾瑚岱阿拉喇圖以上俱附載吳魯氏圖納哈右係有傳扎爾胡濟伊薩納法爾薩和爾起以上俱附載覺禪氏國德瑚柱以上俱有傳費揚格通柱碩通鄂温徹恒費揚古卓克錫庫塔進瑪希納楊古理潘喜吉納海貝楞額以上俱附載科竒理氏索爾和諾特穆慎以上俱有傳岱帯伊錫哈瑚珠以上俱附載把爾達氏沙精阿右係有傳通色巴倫達尼雅哈邁圖寧圖瑚圖夸哈達孟滾岳僧阿台碧訥以上俱附載尼沙氏楊固理右係有傳傅爾塔哈雅爾那以上俱附載黒龍江地方托活洛氏薩哈璉布爾迪以上俱有傳伊思宏費斐德羅羅密達克斗巴爾東阿塔克潭巴克薩翁吉納達爾布哈薩克薩哈布爾久圖爾休倭星額以上俱附載各地方托活洛氏克西訥寧古理騰竒靈格商古南泰竒穆納以上俱有傳喀訥都胡盧克達爾岱哈爾什吳達哈瑚西碩色福當阿雅穆素清吉那魯爾碧噶哈喀賚賽音布莽噶納察福拉察普吉綽隆額瓦克薩哈𢡟績德爾秉額騰球旺格以上俱附載
  hash: sha256:4859bbcf856f1d8770720cd986419b600abe419796e6ac7f66f6bf8d9cc3092e
