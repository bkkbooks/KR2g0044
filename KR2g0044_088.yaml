body:
  text: 八旗滿洲氏族通譜目録卷四十四費莫氏蘇和臣南濟蘭瑚世禮滿泰伊勒慎阿哈善愛達漢古寧阿雅濟達拉普達扎齊艾當阿愛明阿謨諾以上俱有傳拉古查克山南都哈克圖薩努薩爾吉那帥達花爾薩蒙古鼐吳能額愛興阿僧色克七莽阿翁格阿布格莽阿圖多尼喀諾穆齊那密達楚隆格穆哈連薩楚喀以上俱附載索佳氏對青阿和托齊什巴索秦阿哈圖以上俱有傳塔什巴阿爾遜嶽爾泰騷屯布魯那木占索通布魯音德他納琥葛拔庫阿鼐雅古納僧額勒克福森泰阿舒拔隨巴圖以上俱附載薩馬爾吉氏圖球弼祿以上俱有傳色深阿爾納葉琴本博瑚理吉吉納索爾和德竒爾弼善蘇都納鈕楚庫訥以上俱附載齊佳氏穆哈連右係有傳竒拔右係附載
  hash: sha256:bc30c2bedbb75448c44ac2adff20df62807aa7f3ad1985e064cfc9a52e6002c2
