body:
  text: 八旗滿洲氏族通譜目録卷六十四正紅旗無名位希姓雅爾薩喇氏瑚哲墨鮑佳氏托謨爾泰喀爾佳氏朱塔穆方佳氏方琯富珠理氏魯成額瑚圖理氏愷穆庫濟拉喇氏留柏布希氏富森布留濟理氏福永錫爾馨氏三台希普蘇氏蘇爾通全佳氏全仕登莽佳氏滿泰豐佳氏豐國正瑚圖氏瑚圖崔佳氏崔武色伊蘇氏石圖尼音圖氏色普格理鈕圖氏蒙色鑲白旗無名位希姓韓楚氏卓爾泰農吉勒氏訥齊布阿爾巴齊氏伊漢成尼氏刷禮穆達齊氏古爾哈那楊那氏楊海塞赫理氏福拉塔俞庫勒氏尼秋那克塔氏佟國鼐吳魯理氏武誠穆佳氏瑚什巴布薩氏布爾海猷格氏旒琥愛義氏鄂爾多徹葉勒氏成住烏錫氏拜布理額諸氏薩穆哈瑚爾佳氏瑚什圖瑚爾哈喇氏拖泰鑲紅旗無名位希姓吳庫理氏庚吉訥黑赫穆氏索和理訥勒氏明阿圖敷臣氏圖克禪秋舒理氏海色姚佳氏胡理吳爾錫氏吳錫蘭吳努齊氏訥蘇溫登額氏巴喇寧烏努氏喀爾達烏什拉氏烏什蘭顔珠氏穆楚弼爾雅氏塔爾渾朱爾奇氏塔思哈邊佳氏德祿恭佳氏洪善西爾圖氏瑚什屯墨呼理氏阿蘭泰哈蘇理氏謨克圖哈薩喇氏彩鍾墨爾赫氏莽喀喇哈思呼理氏梅赫欽定四庫全書八旗滿洲氏族通譜目録卷六十四正紅旗無名位希姓雅爾薩喇氏瑚哲墨鮑佳氏托謨爾泰喀爾佳氏朱塔穆方佳氏方琯富珠理氏魯成額瑚圖理氏愷穆庫濟拉喇氏留柏布希氏富森布留濟理氏福永錫爾馨氏三台希普蘇氏蘇爾通全佳氏全仕登莽佳氏滿泰豐佳氏豐國正瑚圖氏瑚圖崔佳氏崔武色伊蘇氏石圖尼音圖氏色普格理鈕圖氏蒙色鑲白旗無名位希姓韓楚氏卓爾泰農吉勒氏訥齊布阿爾巴齊氏伊漢成尼氏刷禮穆達齊氏古爾哈那楊那氏楊海塞赫理氏福拉塔俞庫勒氏尼秋那克塔氏佟國鼐吳魯理氏武誠穆佳氏瑚什巴布薩氏布爾海猷格氏旒琥愛義氏鄂爾多徹葉勒氏成住烏錫氏拜布理額諸氏薩穆哈瑚爾佳氏瑚什圖瑚爾哈喇氏拖泰鑲紅旗無名位希姓吳庫理氏庚吉訥黑赫穆氏索和理訥勒氏明阿圖敷臣氏圖克禪秋舒理氏海色姚佳氏胡理吳爾錫氏吳錫蘭吳努齊氏訥蘇溫登額氏巴喇寧烏努氏喀爾達烏什拉氏烏什蘭顔珠氏穆楚弼爾雅氏塔爾渾朱爾奇氏塔思哈邊佳氏德祿恭佳氏洪善西爾圖氏瑚什屯墨呼理氏阿蘭泰哈蘇理氏謨克圖哈薩喇氏彩鍾墨爾赫氏莽喀喇哈思呼理氏梅赫
