body:
  text: 八旗滿洲氏族通譜目錄卷一蘇完地方瓜爾佳氏費英東扎爾固齊納海索海圖賴巴本郎格雅爾巴衛齊卓普特鰲拜巴圖魯巴哈穆理瑪楊善宜蓀吉蓀吉賽吴賴希福三譚扎鼐克爾素車克達古善尼堪吴巴海扎爾瑚納丹布那爾布倭赫達敏阿納漢胡什布夸爾達鄂泰巴圖魯海音布巴圖魯巴布喀和碩推達邦阿巴林喀囊阿達拉密瑚瑚那蘇爾都塔納喀廣衮米哈那舒庫理桑固尼阿拉密那蘭達蘭倭赫訥瑚錫都智拔謨秦格爾根穆舒永安鄂爾齊布瑚爾赫訥葉楞額徳楞額岳爾多烏巴海薩木哈富爾琥托顯哈都芬凖布禄阿爾屯額西騰吳庫努墨爾根侃布阿都拜都伯喜隨遜清鑒托和倫科錫庫鄂理他薩哈㢘固都理伊喇齊石國柱石天柱石廷柱以上俱有傳琥爾哈齊墨葉訥拉哈佛爾和拉塔尼堪瑪克圖岱布庫那親陳特穆科爾謨古爾瑪渾喀喀噶崇阿夸爾達滿岱車穆色瓦爾喀尼雅哈理格布色爾特竒啟吳魯凖達滿丕塔哈那納達齊費雅達巴爾都扎爾祚兑齊索琳阿蘭泰賴都瑚吴爾占備親胡什寜古來弼訥呼理喀爾瑪他錫木敦噶哈都爾巴琥賚瑚馬寜阿法伊瑪馬納海薩齊圖巴海康果理索爾和倭赫巴達穆達爾侃額普錦布山布錫庫福蘭穆起岱音布禄哲爾庫那星阿竒郎阿愛寛多穆什武爾格訥貝僧額那木占阿哈尼堪阿爾拜博羅費揚古孟愛額滿巴拜索欣阿爾泰阿濟布徳楚扎濟扎庫尼庫色訥薩爾泰蘇博海阿爾薩蘭達格倉柱索爾和那塔察哈泰玉克布福禄暌徹拖多海多理衮登伯貝阿巴哈太鄂齊理松鄂拖瞻拜董庫瑚什屯額進泰以上俱附載
