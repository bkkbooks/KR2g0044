body:
  text: 八旗滿洲氏族通譜卷六十三鑲黃旗無名位希姓博爾濟氏博爾濟為滿洲一姓此一姓世居東城地方碩色鑲黃旗人額國初來歸其曾孫赫成現係護軍定紀理氏定紀理為滿洲一姓此一姓世居西城地方定保鑲黃旗人色國初來歸其元孫伊達現係馬甲拉顏氏拉顔為滿洲一姓此一姓世居界凡地方奇爾布哈鑲黃旗人來歸年分無考其曾孫輝色現係馬甲渾達奇氏渾達奇為滿洲一姓此一姓世居訥殷地方法穆達鑲黃旗包衣人來歸年分無考其曾孫考格現係馬甲托和爾秦氏托和爾秦為滿洲一姓此一姓世居齊齊哈爾地方鼐喀尼鑲黃旗人來歸年分無考其曾孫福僧額現係馬甲色爾傑氏色爾傑為滿洲一姓此一姓世居伊蘭費爾塔哈村地方克什訥鑲黃旗人來歸年分無考其孫邁祿現係養育兵伊穆圖氏伊穆圖為滿洲一姓此一姓原籍無考都喇錫鑲黃旗人來歸年分無考其孫吉善現係護軍葛佳喇氏葛佳喇為滿洲一姓此一姓世居長白山地方穆成額鑲黃旗包衣人來歸年分無考其孫四達色現係護軍富蘇瑚氏富蘇瑚為滿洲一姓此一姓世居吉林烏喇地方永愛鑲黃旗人康熙時自科爾沁撤回其四世孫齊齊克圖現係前鋒博爾卓克氏博爾卓克為滿洲一姓此一姓世居烏喇地方達達布鑲黃旗人康熙時自科爾沁撤回其曾孫雙鼎現係馬甲正黃旗無名位希姓佛多錫墨理氏佛多錫墨理為滿洲一姓此一姓世居朱舍理地方喜爾登額正黃旗人泰國初來歸其元孫常住現係護軍喀喇氏喀喇為滿洲一姓此一姓世居西巴理城地方阿海正黃旗人天聰時來歸其曾孫二達色現係護軍周延氏周延為滿洲一姓此一姓世居訥殷江地方周德武正黃旗人天聰時來歸其曾孫四十九現係護軍唐顏氏唐顔為滿洲一姓此一姓世居訥殷江地方拉巴正黃旗人天聰時來歸其孫札普善現係護軍陶佳氏陶佳為滿洲一姓此一姓世居伊蘇地方多爾吉正黃旗人來歸年分無考其曾孫吉爾塔渾現係前鋒鄭佳氏鄭佳為滿洲一姓此一姓世居瀋陽地方鄭爾正黃旗人來歸年分無考其曾孫武蘭泰現係親軍瑚鼎氏瑚鼎為滿洲一姓此一姓世居和羅山晉地方塔濟正黃旗人來歸年分無考其曾孫納郎阿現係領催格爾齊氏格爾齊為滿洲一姓此一姓世居尼馬察地方瓦爾達正黃旗人來歸年分無考其孫來格現係馬甲珠魯氏珠魯為滿洲一姓此一姓世居赫舍理河地方達爾瑚正黃旗人康熙時自科爾沁撤回其元孫羅藏現係牧副喀爾拉哈氏喀爾拉哈為滿洲一姓此一姓世居吉林烏喇地方恩格圖正黃旗人康熙時自科爾沁撤回其曾孫綽諾現係馬甲玉魯氏玉魯為滿洲一姓此一姓世居吉林烏喇地方圖爾特正黃旗人康熙時自科爾沁撤回其孫烏克蘇祿現係弓匠正白旗無名位希姓占尼氏占尼為滿洲一姓此一姓世居馬察地方薩穆札正白旗人保國初來歸其曾孫那爾現係護軍崔穆魯氏崔穆魯為滿洲一姓此一姓世居馬察地方九格正白旗人格國初來歸其曾孫老現係護軍梅佳氏梅佳為滿洲一姓此一姓世居綏分地方商吉穆正白旗人德國初來歸其曾孫存現係馬甲巴顔氏巴顔為滿洲一姓此一姓世居齊齊哈爾地方格文正白旗人來歸年分無考其孫哈濟爾圖現係前鋒瞻楚渾氏瞻楚渾為滿洲一姓此一姓世居卦爾察地方薩賚正白旗人來歸年分無考其曾孫保寶現係護軍札雅札喇氏札雅札喇為滿洲一姓此一姓世居雅蘭地方松吉納正白旗人來歸年分無考其孫額爾錦現係護軍石富察氏石富察為滿洲一姓此一姓世居倭濟地方庫庫訥正白旗人來歸年分無考其孫納當阿現係護軍達普圖氏達普圖為滿洲一姓此一姓世居黑龍江地方噶爾哈尼正白旗人來歸年分無考其孫阿尼雅爾圖現係護軍多拉爾氏多拉爾為滿洲一姓此一姓世居黑龍江地方嘉札喇庫正白旗人來歸年分無考其孫顔圖現係護軍多爾塔喇氏多爾塔喇為滿洲一姓此一姓世居黑龍江地方噶納武爾正白旗人來歸年分無考其子五十八現係護軍孟克宜勒氏孟克宜勒為滿洲一姓此一姓世居蜚悠城地方金達理正白旗人來歸年分無考其孫烏通額原係護軍克勒氏克勒為滿洲一姓此一姓世居尼雅滿洲地方尼喀理正白旗人來歸年分無考其孫佛保現係護軍嘉瞻氏嘉瞻為滿洲一姓此一姓世居黑龍江地方楚穆特穆正白旗人來歸年分無考其曾孫德克進現係護軍圖薩喇氏圖薩喇為滿洲一姓此一姓世居葉赫地方貝通正白旗人來歸年分無考其孫博森泰現係護軍東阿氏東阿為滿洲一姓此一姓世居那木都魯地方外蘭正白旗人來歸年分無考其孫六達色現係領催額宜蘇氏額宜蘇為滿洲一姓此一姓世居墨爾根村地方薩爾布正白旗人來歸年分無考其曾孫雅爾泰現係領催多秦氏多秦為滿洲一姓此一姓世居黑龍江地方錫務尼正白旗人來歸年分無考其孫多魯鼐現係拜唐阿阿喇氏阿喇為滿洲一姓此一姓世居烏喇地方鄂成額正白旗人來歸年分無考其孫英保住現係馬甲圖勒理氏圖勒理為滿洲一姓此一姓世居索倫地方興色爾正白旗人來歸年分無考其孫穆葉爾圖現係馬甲蓀綽爾氏蓀綽爾為滿洲一姓此一姓世居長白山地方鄂羅山正白旗包衣人來歸年分無考其曾孫四達色現係馬甲烏顏齊氏烏顔齊為滿洲一姓此一姓世居烏喇達呼里村地方薩郎阿正白旗人康熙時自科爾沁撤回其元孫羅卜藏現係拜唐阿楊額理氏楊額理為滿洲一姓此一姓世居白都訥地方多理正白旗人康熙時自科爾沁撤回其孫喀爾岱現係馬甲瑚佳氏瑚佳為滿洲一姓此一姓世居吉林烏喇地方都克錫正白旗人康熙時自科爾沁撤回其曾孫訥圖現係養育兵八旗滿洲氏族通譜卷