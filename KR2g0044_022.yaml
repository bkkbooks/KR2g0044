body:
  text: 八旗滿洲氏族通譜卷十葉赫地方赫舍里氏蓋喀穆國正白旗人世居葉赫地方鋒侍衛從征四川屢初來歸其子那哈布由前敗張獻忠兵生擒十八人斬首八級以功授雲騎尉三遇恩詔加至三等輕車都尉緣事降為騎都尉後以征湖廣雲南等處有功加一雲騎尉任前鋒參領卒恩詔所其子成思格承襲卒其子赫爾庫襲職時削去加之職承襲騎都尉卒其子文殊保承襲卒無嗣其叔格本額承襲卒其弟塞楞泰襲職時削去詔後軍功所得之職現承襲雲騎尉又蓋喀穆之子那爾布原任城守尉滿岱原任三等侍衛孫尼滿原任員外郎族孫艾山現任七品官曽孫喀爾圖現任鳴贊瑚祿國正黃旗人世居葉赫地方甘肅布政使孫薩穆初來歸其子瑚實圖原任哈原任三等侍衛喀爾喀原任員外郎曾孫謨得瑚原任郎中溫察原任護軍校能格由前鋒贈雲騎侍衛從征大同攻渾源州城殁於陳祿之元孫尉其子喀喇孫武紳相繼承襲又瑚存柱原任佐領謨和岱原任防禦舒書禮佛訥俱原任驍騎校索住原任中書四世孫常保原任庶子竒蘭泰原任護軍校格爾泰原任驍騎校五世孫本岱原任中書薩蘭泰現任護軍校米哈達原係副驍騎校喀塔哈國正紅旗人世居葉赫地方領定鼎燕京時有功初來歸其子阿爾賽由佐恩詔加授雲騎尉三遇尉卒無嗣親弟之孫諾密襲職至三等輕車都卒無嗣未襲舒賽國正紅旗人世居葉赫地方任佐領曽孫耀占由初來歸其孫金達爾漢原驍騎校從征浙江舟山等處有功授雲騎尉卒其子鼐格襲職又舒賽之元孫齊山原任佐領三齊哈原任主事四世孫陶舒現任驍騎校赫勒國正紅旗人世居葉赫地方委署參領從征察哈初來歸其曽孫常瑚魯由爾布爾尼屢敗賊兵又從征湖廣於湘陰縣等處敗賊有功授雲騎尉卒其子常新襲職又赫勒之元孫特克什楞原任員外郎武爾佳齊國正黃旗人世居葉赫地方任防禦元孫瑚什屯初來歸其曽孫哈世希原贈騎都由護軍校從征四川至盤龍山擊賊陳亡山卒尉其子蘇伯臣孫蘇克山相繼承襲蘇克其子六十五現襲職又武爾佳齊之元孫達雅納原任防禦四世孫富勒赫原任驍騎校吳爾嘉竒阿爾太俱原任筆帖式竒蘭保原任天文生五世孫錫扎保原任頭等侍衛庫爾禪原任驍騎校六世孫經濟保現任主事福海和倫俱現任筆帖式巴達爾堪國鑲藍旗人世居葉赫地方禦元孫常保由前鋒初來歸其孫色勒原任防侍衛從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其弟長玉現襲職音達渾鑲黃旗人世居葉赫地方天聰時來歸其曽孫鶴善希佛伊佛俱原任防禦雅爾圖原任驍騎校七十八現任驍騎校富拉塔由委署章京從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子佛關保現襲職又音達渾元孫吳什哈現任驍騎校泰布鑲黃旗人世居葉赫地方天聰時來歸其曽孫烏納哈原任江寧將軍元孫九成現任員外郎四世孫烏賽現係五品廕生以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗包衣阿普代原任筆帖式其孫葉克原任三等侍衛正白旗奮泰其孫阿陽阿原任步軍校曽孫遜綽和原任筆帖式元孫華爾岱現任護軍校同按奮泰與本旗蒙古旗分里滿達爾漢同族正紅旗布占其孫齊什原任步軍校海祿原任護軍校曽孫達布納原任護軍校伊爾哈什現任步軍校元孫石柱現任郎中赫德現任驍騎校四世孫達沖阿現係庫使那爾圖其曽孫巴海原任步軍校元孫莽艾現任頭等護衛塞爾泰現任佐領赫赫現任護軍校那秦其子吳達哈原任頭等護衛哈拉庫原任三等護衛孫森特原任佐領台畢泰原任筆帖式曽孫特爾忒原任頭等護衛珠山現係監生色楞原任護軍校元孫觀音保現係生員色楞之子孫今𨽻正藍旗包衣那親其子額色原任包衣參領孫額什赫原任包衣大由本旗包衣改𨽻齊分其子安泰原任防禦孫常綬原任驍騎校阿克占其孫拉塔原任護軍校元孫舒昌現任防禦米哈納其孫常綬原任護軍校曽孫逢泰原任驍騎校鑲白旗佟肯其曽孫巴格原任步軍校元孫常有現任四品典儀常德現任護軍校武錫其孫布達理原任護軍校曽孫常武原任筆帖式元孫薩克信原任親軍校勒得其孫才柱原任護軍校鑲紅旗根特其曽孫錫拉布原任郎中元孫竒蘭泰原任驍騎校四世孫伍什泰原任主事興格原任防禦穆爾賽現任護軍參領偏圖現任防禦正藍旗葉赫穆其孫薩岱原任城門尉午鈕原任六品官曽孫定柱現任護軍校元德現任驍騎校滿丕其孫雅納福原任驍騎校三陽其孫壯色原任驍騎校鑲藍旗包衣希佛訥其孫常山原任八品典儀以上俱世居葉赫地方係國初來歸之人鑲黃旗阿舜布祿其孫和索理原任驍騎校曽孫圖喇現任委署護軍參領正白旗滿達爾漢原任驍騎校其子舒書原任四品官孫祥格原任筆帖式曽孫五德現任護軍校又滿達爾漢之弟錫特庫原任防禦其子索禮原任佐領費顔圖原任郎中索敏原任員外郎孫常在保住俱原任員外郎七十三現任三等侍衛阿金圖原任防禦常保三格俱原任筆帖式曽孫明常現任筆帖式富泰現係副護軍校今𨽻蒙古旗分按滿達爾漢與本旗同里奮泰同族鑲紅旗都達哈其子瓦爾達原任主事希佛訥原任牧長以上俱世居葉赫地方係天聰時來歸之人正白旗包衣達蘭原任內管領其元孫圖喇現任庫掌正紅旗包衣納親其子瑚什巴原任八品典儀鑲紅旗吳爾山其孫吳達海原任協領尼塔哈原任護軍校曽孫希昌現任佐領恩特原任護軍校以上俱世居葉赫地方係來歸年分無考之人輝發地方赫舍里氏伯格國鑲藍旗包衣人世居輝發地方瑪由護軍校從初來歸原任佐領其長子蘇爾征浙江福建等處屢敗賊兵又征耿逆敗賊有功授雲騎尉卒其子六格現襲職又伯格之次子蘇拜由委署護軍校從征浙江福建等處有功授雲騎尉任佐領卒其子索柱襲職現任參領兼佐領又伯格第四子偏爾原任護軍校孫衛巴原任參領兼佐領常晉保現任二等護衛寧古秦現任八品官曽孫元德候補筆帖式桑務理鑲黃旗人世居輝發地方來歸年分無考原任驍騎校其子黨務理原任光祿寺卿孫何瞻胡慎泰俱現任郎中以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲藍旗外蘭其子希佛原任郎中孫齊新保原任防禦曽孫吳爾篤原任城守尉齊璧祿原任佐領齊巴海現任防禦立柱現係副護軍校阿普達理其曽孫珠楞阿現任藍翎侍衛達隆阿其曽孫噶爾漢現任驍騎校以上俱世居輝發地方係國初來歸之人鑲紅旗布占其七世孫巴靈阿原任防禦達福其孫赫金布現任七品官以上俱世居輝發地方係天聰時來歸之人正白旗包衣圖巴海其子赫色原任內管領孫八十原任委署護軍參領噶林原任護軍校臯官其曽孫定柱現任護軍校鑲紅旗阿克敦其元孫赫瞻現任翰林院侍讀兼佐領花色原任中書蓀塔哈現任驍騎校四世孫兆彭現任中書胡什穆其曽孫烏爾虎原任佐領沙渾雅圖俱原任驍騎校元孫騷達色原任護軍校巴圖現係副護軍校碩濟其曽孫穆塔什原任護軍校元孫孟圖原任護軍校四世孫莽鼐原任三等護衛索克色理原任佐領章固理原任前鋒校康固理原任護軍校晉海現任護軍校五世孫哈什泰原係副護軍校六世孫桑格原任護軍校伊昌阿現任驍騎校蓀達理其孫星額理原任前鋒校科普多其孫瓦哈理原任筆帖式曽孫金泰原任護軍校吳爾坤其曽孫雅柱原任驍騎校虎實穆其曽孫阿爾泰費德理俱原任驍騎校元孫禮保原任筆帖式正藍旗伊拉親原任驍騎校其子尼滿原任副將瓦爾達原任五品官尼馬爾太原任八品官孫偉陀保玉柱俱原任驍騎校綽克拖原任六品官保柱原任八品官包衣固賽原任六品包衣大其子喀圖理原任六品官孫阿爾善佟保柱俱原任護軍校曽孫均柱現任護軍校以上俱世居輝發地方係來歸年分無考之人各地方赫舍里氏成固爾德國正黃旗人世居黑龍江穆理哈村地方山東攻初來歸其子竒郎阿由間散過北京征恩詔加萊蕪縣第二登城克之授雲騎尉三遇承襲卒至三等輕車都尉卒無嗣其弟殷達蘭其子定綬承襲由副都統征凖噶爾授為將軍在阿爾泰地方破賊有功特賜一騎都尉授為一等輕車都尉後由前鋒統領在和通呼爾哈腦爾地方擊賊陳亡贈一騎都尉其子何義襲職時削去任副都統卒其子恩詔所加之職承襲二等輕車都尉扎拉豐阿現襲職文柱國鑲藍旗人世居烏喇地方散過北京征山東時初來歸其子他克都由間賜巴圖梯攻南樂縣首先登城克之魯號授騎都尉三遇恩詔加為二等輕車都尉卒其子阿那達襲職卒無嗣其親叔葉庫訥及其子吳達禪孫烏爾丹相繼世宗憲承襲無嗣未襲後奉都尉降為雲騎尉令烏爾皇帝恩旨將原襲騎丹親甥薩克達氏富明阿現承襲薩弼圖國鑲黃旗人世居沙爾虎地方東攻沂水縣克其初來歸由間散遇北京征山城破流賊滅福王平定河南江南等處有功又攻海寧縣不用雲梯首先登城克之敘功授雲恩詔授騎尉三遇車都尉卒其姪察哈爾圖承襲緣事為三等輕革退其子禪岱承襲緣事革退其子保住承襲緣事革退其子碩岱襲職時削去恩詔所加之職現襲雲騎尉烏雅納國鑲黃旗人世居瓦爾喀地方北京征山東攻平初來歸其孫德祿由間散過賜巴圖陰縣首先登城克之魯號授騎都尉遇恩詔加一雲騎尉卒其子德楚襲職卒無嗣德祿親叔之孫烏蘇理承襲卒其子烏什哈承襲卒其親恩詔所伯之子阿蘭太襲職時削去鐘太承襲卒其子加之職承襲騎都尉卒其子常祿保現襲職雅按烏雅納與本旗哈達地方阿顔塔安楚阿納穆雅納正藍旗何殷村地方德爾瑚理等同族胡魯穆正白旗人世居扎庫木地方來歸年分無考其曽孫阿克蘇尼由間散從征浙江福建屢立軍功授雲騎尉卒其孫黑色承襲又胡魯穆曽孫楞格由委署護軍校從征浙江福建及雲南等處屢敗賊衆敘功授雲騎尉卒其姪烏達理承襲又胡魯穆元孫花色原任委署護軍參領胡什那原任護軍校順古爾岱原任驍騎校四世孫拴住現任藍翎侍衛五世孫富喀理原任步軍校圖爾哈國鑲藍旗人世居塔山堡地方校征雲南入緬國初來歸其曽孫希佛由護軍贈雲騎敗賊有功後征浙江擊賊陳亡襲卒其子定柱尉無嗣其親叔之子五十一承現襲職遂班國鑲黃旗人世居哈爾敏地方初來歸授為防禦世職看守陵寢卒其孫四十九現襲職曽孫旒保住現任七品官尹登現任防禦元孫瑪爾瑚善現任護軍校又遂班親弟蘇克桑阿原任內務府總管其曽孫官保原任頭等護衛元孫松阿理隆阿理俱現任三等護衛又遂班之族孫尼雅漢原任佐領曽孫英綬現任步軍副尉兼佐領官保子孫今𨽻鑲白旗包衣額森鑲紅旗人世居長白山地方天聰時來歸其曽孫布顔原任禮部尚書謨絡原任郎中法爾薩原任頭等護衛元孫布達史原任護軍統領法山原任護軍參領常保原任員外郎四世孫白希現任頭等護衛以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗多博海赫席黑地方人其子多爾晉原任步軍校烏敏特松花江地方人其子佛爾綽原任驍騎校孫薩瑪拉原任防禦正黃旗楚庫白河地方人其孫喀爾喀由員外郎授騎都尉後因監修工程議敘加一雲騎尉原任郎中其孫道升現襲雲騎尉又楚庫曽孫屯泰原任員外郎何紹赫舍里河地方人其曾孫薩穆哈原任佐領元孫薩蘭太原任防禦特爾瑟特分地方人其孫穆里渾原任步軍校曽孫滿德現任筆帖式諾察特分地方人其子刷爾坦原任