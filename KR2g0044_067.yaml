body:
  text: 八旗滿洲氏族通譜目録卷三十三扎庫木地方李佳氏佟國噶哈穆阿克楚顔岱雅哈納瓜納恭布祿以上俱有傳蓋新阿祝瑚東阿王錫蓀布祿薩克星阿明玉以上俱附載李佳和羅地方李佳氏阿都都哈寧古齊顧郎阿綏占達珠瑚楊果理以上俱有傳吕敦錫琳積玉進泰以上俱附載各地方李佳氏謨和托阿爾圖庫德七十八和托費揚古托和倫齊松葉爾庫德以上俱有傳噶噶穆瑪喀拉李愷尼雅哈齊堯甘伊楞額舜彌喇格塞理李成琳阿克敦拜他庫盛柱托靈阿寶兹雙堅岱揚阿顔布祿紳布扎努柏延固倫泰阿那布蘇克素瑚常綏董住世泰六十三以上俱附載各地方黃佳氏達爾楚寧古齊布顔祿桑武以上俱有傳齊堪蘇賚葉爾古德阿都齊額德黃瑪舒舒穆齊以上俱附載
  hash: sha256:e130b5e8ce59832085a355a859c6bce75103bcb2dd10cc3c8fc5d2022bb4d76f
