body:
  text: 八旗滿洲氏族通譜卷八十附載滿洲旗分內之撫順尼堪姓氏趙氏常武鑲藍旗人世居撫順地方來歸年分無考其孫華敏原任護軍校曽孫王臣原任典儀元孫哲先原任工部侍郎四世孫臺柱現任御史臺敏現任同知周氏周文華國鑲紅旗人世居撫順地方子周鼎原任知州周初來歸原任甘肅巡撫其久岐原任護軍校孫周廷佐原任州同以上俱係三品以上大員照例列於卷首其餘敘載於後劉氏劉通鑲紅旗包衣人世居撫順地方元國初來歸其曽孫劉保住原任護軍校孫班濟泰現任護軍校劉世威正藍旗包衣人世居撫順地方來歸年分無考其子劉國正原任山西兵備道劉克正正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子劉光素原任七品官劉光耀原任八品官劉芳升原任知府孫劉國傑原任千總劉應正正藍旗包衣人世居撫順地方來歸年分無考其曽孫劉巴泰原任六品官元孫載使現任典儀劉啓雲正藍旗包衣人世居撫順地方來歸年分無考其子阿奈原任八品官孫劉永原任驍騎校劉有才正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子劉君保原任知縣孫劉欲修原任筆帖式元孫劉鵬霄現係副榜劉士美正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子白赫原任典儀李氏李三科正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子李雲成原任包衣大孫李國棟亦原任包衣大李國柱原任八品官曽孫偉滋原任二等護衛李應試正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子李天祿原任筆帖式孫索克濟哈亦原任筆帖式羅克濟哈現係候選州同索和托現係副榜曽孫六十五現任護軍校賽通阿現任典儀李英現係生員李萬良正藍旗包衣旗鼓人世居撫順地方來歸年分無考其曽孫李明德原任六品官元孫阿蘭泰現任護軍校李英原任知州李昌現係候選縣丞四世孫李玉兆現係舉人李榮兆李鳯兆李光兆俱現係生員李元德鑲藍旗包衣管領下人世居三達堡地方來歸年分無考其曽孫李三元原任司庫李登科鑲藍旗包衣人世居撫順地方來歸年分無考其曽孫三保現任知縣元孫伍格李克宏俱現係舉人李凱鑲藍旗包衣人世居瀋陽地方來歸年分無考其子李應春原任護軍校李三錦鑲藍旗包衣管領下人世居撫順地方天聰時來歸其曽孫李知勇原任驍騎校元孫李國修現任護軍校王氏王應奎正紅旗包衣管領下人世居撫順地方來歸年分無考其曽孫王達明現任主事王德明正紅旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫赫英現任護軍校托托穆鑲紅旗包衣人世居撫順地方孫國初來歸其曽孫王印原任防禦元王炎原任典儀四世孫王天祥原任副將王天保現任三等護衛王天爵王天綬俱原任護軍校玉天祿原任典儀五世孫柏哥原任筆帖式六世孫王化麟原任護軍校七世孫佛保住現任護軍校王紹安鑲紅旗包衣人世居撫順地方護國初來歸其曽孫雅爾哈原任三等衛王懷德正藍旗包衣旗鼓人世居撫順地方來歸年分無考其孫王世賔原任中書王世昌鑲藍旗包衣人世居撫順地方來歸年分無考其曽孫皂保現係貢生張氏張承業鑲白旗包衣管領下人世居撫順地方來歸年分無考其元孫張鼐現任筆帖式張久輝鑲紅旗包衣人世居開原地方騎國初來歸其曽孫色克圖現任驍校張邦祺正藍旗包衣人世居撫順地方來歸年分無考原任蕪湖兵備道達爾查正藍旗包衣人世居撫順地方來歸年分無考其孫張德現任護軍校桑格正藍旗包衣人世居撫順地方來歸年分無考其元孫同泰現任驍騎校張義禮正藍旗包衣人世居撫順地方來歸年分無考其孫張洪德原任驍騎校張洪濟原任護軍校鍾氏鍾有陽正白旗包衣人世居碩托地方來歸年分無考其子鍾雲祿原任員外郎鍾雲福原任牧長孫常在原任二等護衛兼佐領明海現任筆帖式曽孫扎史現任主事鍾元華正藍旗包衣人世居撫順地方來歸年分無考其子鍾國輔原任佐領曽孫鍾文選原任六品包衣大鍾文斗原任典儀鍾文漪原任司庫元孫鍾廷臣原任護軍校鍾廷玉原係生員四世孫鍾玉琳現任護軍校鍾林現任筆帖式鍾有德正藍旗包衣人世居撫順地方來歸年分無考其子鍾雲鑾原任驍騎校鍾有量正藍旗包衣人世居撫順地方來歸年分無考其曽孫鍾國存現係生員周氏周繼榮正紅旗包衣人世居撫順地方來歸年分無考其孫華色現任頭等護衛曽孫額爾登額現任參領兼佐領海柱現任牧長周簇正藍旗包衣旗鼓人世居撫順地方來歸年分無考其孫卓爾和原任逰擊周倍正藍旗包衣人世居鐵嶺地方來歸年分無考其元孫豐紳現任主事周彥成鑲藍旗包衣人世居瀋陽地方天聰時來歸其孫赫保住原任護軍校曹氏曹邦正藍旗包衣旗鼓人世居撫順地方來歸年分無考其子曹忠原任寧台道曹元原任知縣孫曹秉和原任同知曹秉政曹秉泰俱原任通判曽孫阿爾蘇原任筆帖式曹景岱原任縣丞曹志髙正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其子曹士蛟原任佐領孫索圖亦原任佐領曹志修原任知府曽孫曹文林原任典儀吳哈達原任參領兼佐領元孫曹岱柱現任三等護衛曹攀桂原任守備伊思哈原任典儀曹正桂原任縣丞達興安現任八品官四世孫曹琳現任筆帖式曹玉現任郎中曹琮現係候補筆帖式曹志德正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其子曹士榮原任司庫曹志祥正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫曹逢貴曹夢貴俱現係生員馬氏馬雲龍正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考原任佐領馬七正藍旗包衣旗鼓人世居撫順地方來歸年分無考原任六品包衣大馬世強鑲藍旗包衣人世居瀋陽地方天聰時來歸其子拉色原任驍騎校孫六十亦原任驍騎校范氏范思明正紅旗包衣旗鼓人世居遼陽地方來歸年分無考其孫范繼生原任主事曽孫范義現任八品官范思偉正紅旗包衣旗鼓人世居遼陽地方來歸年分無考其曽孫伊立布現任牧長盧氏盧士克正紅旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫盧俊現任六品包衣大盧蕭筵正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫訥勒原任三等護衛趙氏趙王撫正紅旗包衣旗鼓人世居榆樹堡地方來歸年分無考其曽孫武那達現任護軍校文林原任驍騎校趙文奎正藍旗包衣人世居撫順地方來歸年分無考原任知縣袁氏袁良士正紅旗包衣管領下人世居撫順地方來歸年分無考其子德和原任驍騎校二格四格俱原任護軍校孫袁文彬原任筆帖式曽孫袁生逺現任八品官袁撫安正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫袁子貴原任護軍校杜氏杜案正紅旗包衣旗鼓人世居遼陽地方來歸年分無考其曽孫杜國思現任八品官杜望元正藍旗包衣人世居撫順地方來歸年分無考原任知府其孫神保原任二等護衛高氏高繼儒正藍旗包衣管領下人世居遼陽地方來歸年分無考其子髙三偉原任六品包衣大孫髙成美原任淮揚道曽孫髙五雲原任知縣國禮鑲藍旗包衣人世居瀋陽地方天聰時來歸其孫普連現任參領兼佐領金氏金文學正藍旗包衣人世居撫順地方來歸年分無考其孫金國泰原任驍騎校金國棟原任八品官金國鼎現任護軍校兌色鑲藍旗包衣人世居撫順地方天聰時來歸其孫倭色現任三等護衛吳氏吳知藁正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫吳均凱現任八品官吳克新鑲藍旗包衣人世居撫順地方來歸年分無考其曽孫吳昌國現任筆帖式孔氏孔文選鑲黃旗包衣人世居撫順地方將國初來歸其曽孫孔宗順原任副陳氏陳國忠正紅旗包衣人世居撫順地方來歸年分無考其子陳英琦原任副將孫陳天䇿原任守備陳天柱原任知縣曽孫岱斌原任六品包衣大陳桑格原任八品官元孫黑達色現任司庫查親現任護軍校蘇氏蘇敏善正紅旗包衣人世居撫順地方來歸年分無考原任佐領其曽孫蘇正現任八品官康氏康永桂正紅旗包衣旗鼓人世居撫順地方來歸年分無考其曽孫康達色現任八品官姬氏明瞻鑲紅旗包衣人世居撫順地方原國初來歸原任直𨽻兵備道其子爾錢任遊擊孫丑滋原任護軍校徐氏徐天揚鑲紅旗包衣人世居撫順地方良國初來歸其子徐良佐原任逰擊徐卿原任知州孫徐元鼎原任參領兼佐領曽孫徐正原任典儀徐四格現任二等護衛魏氏魏其隆鑲紅旗包衣人世居撫順地方衛國初來歸其孫魏顯德原任三等護魏懷德原任護軍校曽孫噶布拉原任三等護衛他那現任三等護衛胡氏四達色鑲紅旗包衣人世居撫順地方衣國初來歸其孫胡名德原任六品包大郎氏郎文彥鑲紅旗包衣人世居三堡地方常國初來歸其子郎喜華原任知縣孫保原任典儀任氏任經正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其子任宏德原任啓心郎任宏亮原任郎中任治邦任五格俱原任六品包衣大孫廣太原任護軍校增綬原任同知常綬原任六品包衣大廣綬原任六品官印保原任筆帖式任文蕙原任州同任文煥原任縣丞曽孫巴圖原任八品官蔡氏蔡永年正藍旗包衣旗鼓人世居塔山堡地方來歸年分無考其子蔡義興原任知縣蔡義品原任副將馮氏馮世勇正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫馮國柱原任知縣曽孫馮先明亦原任知縣元孫馮爾章原任遊擊林氏林來鳯正藍旗人世居撫順地方來歸年分無考原任包衣大其子保德原任護軍校孫蘇克濟現任護軍校林超現任員外郎兼佐領費揚阿現任中書于氏于世傑正藍旗包衣人世居撫順地方來歸年分無考原任佐領其子外三原任佐領孫法保亦原任佐領瓦爾達原任八品官房氏房廷正藍旗包衣管領下人世居遼陽地方來歸年分無考其子房克成原任佐領孫房萬達亦原任佐領元孫房良弼原任護軍校姚氏姚顯功正藍旗包衣人世居撫順地方來歸年分無考其子姚制義原任佐領孫姚瑞麟原任八品官湯氏外三正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫他庫現任二等護衛他寧阿現係候補主事他進泰現係候補筆帖式謝氏謝登正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫西林布現任護軍校羅米現任六品包衣大邱氏邱巴正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其子拜唐阿原任六品典儀孫邱均原任八品官曽孫色成額現係生員元孫邱善現任驍騎校邱耀現任八品官施氏道強正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫朱隆阿現任護軍校洪氏洪有治正藍旗包衣旗鼓人世居撫順地方來歸年分無考其元孫洪世英現任護軍校四世孫洪之詔現係生員沈氏沈景福正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫沈文明原任千總四世孫沈什泰原任驍騎校嚴氏嚴得福正藍旗包衣旗鼓人世居瀋陽地方來歸年分無考其子嚴三格原任司庫梁氏梁智寬正藍旗包衣旗鼓人世居鐵嶺地方來歸年分無考其子梁恭偉原任縣丞韓氏秉德鑲藍旗包衣管領下人世居瀋陽地方天聰時來歸其子韓克祿原任郎中孫韓景惠原任參領韓景煥原任筆帖式曽孫韓文彬現任參領伊昌阿現任護軍校田氏田揚林鑲藍旗包衣人世居瀋陽地方天聰時來歸其子田修原任佐領佟氏德明鑲藍旗包衣人世居瀋陽地方來歸年分無考其孫四格現任八品典儀曽孫額爾登額原任三等護衛通肯現任護軍校肖氏多和倫鑲藍旗包衣管領下人世居瀋陽地方天聰時來歸其子魁瑪理原任護軍校孫雅竒現任三等護衛曽孫殿保現任護軍校宋氏宋時午鑲藍旗包衣人世居瀋陽地方天聰時來歸其孫宋二現任六品官談氏談元德鑲藍旗包衣人世居瀋陽地方天聰時來歸其子塔四原任驍騎校晉氏晉天受鑲藍旗包衣管領下人世居瀋陽地方天聰時來歸其孫吉爾占原任護軍校許氏許秉文鑲藍旗包衣人世居瀋陽地方來歸年分無考其曽孫許六兒現任八品官八旗滿洲氏族通譜卷八十欽定四庫全書
