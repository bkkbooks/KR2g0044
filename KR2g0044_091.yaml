body:
  text: 八旗滿洲氏族通譜卷四十五葛濟勒氏葛濟勒為滿洲一姓其氏族散處于雅蘭等地方巴雅拉國正白旗人世居雅蘭地方散導引大兵取西林初來歸其孫尤德黑由閒地方俘獲甚衆授騎都尉克遼東時有功加為二等輕車都尉任佐領卒其親弟和爾多襲職因罪革退將騎都尉仍令尤德黑之子禮佛訥承襲三遇恩詔加至二等輕車都尉卒其子常綬孫佛綸相繼承襲佛綸緣事革退其親叔祖之曾孫靈保襲職恩詔所時削去現襲騎都尉又巴雅拉之孫舒球從征加之職黑龍江時著有軍績授騎都尉卒其親叔之孫伊巴漢襲職三遇恩詔加至二等輕車都尉後從征雲南進兵緬國至阿窪城獲僞桂王復勦江西湖廣等處破賊吳國貴等屢立戰功授一等輕車都尉又加一雲騎尉歷任前鋒統領因老乞休其子蘇完住襲職恩詔所時削去承襲三等輕車都尉卒其親弟蘭柱襲加之職詔後軍職因罪革退削去騎都尉其親伯祖之四世孫功所得之職餘剩葛倫泰現承襲又巴雅拉之四世孫阿爾布原任步軍校五世孫富海現任佐領巴顔布祿國正黃旗人世居綏分地方任備禦四世孫雅普初來歸其元孫車爾柏原圖理亦原任備禦謨謨理初任備禦以任事有能不違指使授雲騎尉又從征阿庫里尼滿有恩詔加功授為騎都尉遇伊都理襲職兩遇一雲騎尉卒其子恩詔加至二等輕車都尉卒其子官柱襲職卒其子武爾瑚襲職時削去恩詔所加之職承襲騎都尉卒其子華色現襲職又巴顔布祿之五世孫哈嶽原任備禦堂久原任二等侍衛伊爾巴喀原任防禦吉隆阿原任參領慕道原任頭等侍衛六世孫海芬原任二等侍衛兼佐領塞楚原任協領國保原任主事四福原任驍騎校海布祿原任整儀尉七世孫武格現任佐領恭泰現任郎中興泰現任翰林院檢討金齊賢現任驍騎校八世孫懷䕃布現係進士富格愼國正紅旗人世居綏分地方任稱職授為騎都尉初來歸其子富喀那以所恩詔加後征黑龍江有功加一雲騎尉遇之子富爾瑚至三等輕車都尉卒無嗣其親弟恩詔加襲職兩遇車都尉後緣事削去本身所得之職至一等輕其親弟武達禪承襲三等輕車都尉從征福建屢敗賊兵在厦門地方陳亡贈一雲騎尉加為二等輕車都尉其親弟薩爾帕襲職卒其親兄之子福昌襲職因病乞休其親兄之恩詔所子根特襲職卒其子伊禮布襲職時削去之曾加之職現承襲三等輕車都尉又富格慎孫葛布立原係監生烏拉國正紅旗人世居綏分地方散從征山東梯攻莘初來歸其孫吳拉吉由閒縣克城有功授雲騎尉卒無嗣其親伯之子轄魯那襲職三遇恩詔加至三等輕車都尉卒其子雅爾納襲職因病乞休其親弟格林襲職時削去恩詔所加之職承襲雲騎尉卒其子宗柱現承襲拉薩理國鑲白旗人世居和通吉地方延安府地方擊敗初來歸由佐領從征陜西在恩詔加流寇授雲騎尉卒其子柏綬襲職三遇敗賊李至三等輕車都尉從征廣東在新㑹縣定國有功授為二等輕車都尉卒其子柏啓襲職卒其子德貝襲職時削去恩詔所加之職承襲騎都尉卒其親兄之子永泰現承襲雲騎尉又拉薩理之曾孫徹爾德原任參領由正黃旗改隸按拉薩理與本旗同里吳拉達尼雅米揚阿拜他瑚齊鄂羅休等同族法柱鑲黃旗人世居托克索地方來歸年分無考其元孫紐紐由護軍校從征雲南擊敗僞將馬寶等兵授雲騎尉後又征厄魯特噶爾丹於昭莫多地方擊賊有功授為騎都尉卒其子常明現襲職又法柱之曾孫法庫原任步軍校四世孫金保住原任護軍參領郭穆韶國正白旗人世居雅蘭地方等侍衛從征湖廣陳初來歸其孫梅和訥由二贈騎都亡子碩爾霍孫雅克三相繼承襲又郭穆韶之尉孫多托諾原任驍騎校濟禮哈國鑲白旗人世居和通吉地方從征雲南有功授初來歸其孫昻古達由前鋒騎都尉卒其子阿哈納孫安珠琥相繼承襲又濟禮哈之曾孫瑚鈕原任護軍校元孫都楞額原任五品官由正黃旗改隸璧爾圖理國正藍旗人世居寧古塔地方校曾孫顔泰原任初來歸其孫朔兌原任驍騎甘肅巡撫沙爾琥達原任郎中阿保原任員外郎阿爾達原任驍騎校阿爾賽原任護軍校元孫阿爾琥達由五品官從征陜西擊賊將王屏藩等兵陳亡贈雲騎尉其親弟之子格備現襲職又璧爾圖理之元孫恰塔原任參領葛色理原任二等護衛圖克盛善原任孔目四世孫葛山現任中書葛森原任京刑部侍郎葛林現任三等護衛葛都原任筆帖式葛賽現任筆帖式五世孫葛聲額現任護軍校舒敏現係廕生伊哈那鑲黃旗人世居綏分地方天聰時來歸其孫優德赫由佐領從征浙江擊賊僞都督姜揚順等贈雲騎兵被傷後因創發身亡從征厄魯特噶爾丹時尉其子夸克塔納襲職在西路擊賊有功授為騎都尉卒其子德保現襲職又伊哈那之孫巴珠納原任驍騎校曾孫額穆索原任郎中元孫武尚原任筆帖式烏登額原任驍騎校他理善國正藍旗人世居穆瑚地方任防禦孫烏雲保由初來歸其子達爾達漢原防禦部委章京取昭定藏著有勞績授雲騎尉卒其子富剛現襲職標哈竒國正白旗包衣人世居黑龍江地方什泰原任都初來歸原任寧古塔總管其子烏統元孫薩穆哈原任護軍校岱敏國正白旗人世居寧古塔地方原任寧古塔副都初來歸原任翼長其孫馬竒統多爾吉原任頭等侍衛曾孫多索理原任寧古塔副都統又岱敏親叔特普什齊之孫薩䝉額原任防禦曾孫郎吉原任協領以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黃旗庫都爾漢綏分地方人其元孫三格原任驍騎校色穆克理原任護軍校四世孫達巴納原任護軍參領岱音布原任員外郎塞勒現任步軍校薩哈連原任步軍校華色原任七品官馬拉原任防禦元保李通保俱原任驍騎校五世孫伊拉布現任三等侍衛木臣現任護軍校重喜現係副護軍校薩克察現係副驍騎校正白旗莽吉那雅蘭地方人原任佐領其子碩色亦原任佐領桑格原係雲騎尉竒都理那穆都魯地方人原任親軍校其子蘇薩納原任前鋒校察瑪原係雲騎尉孫瑪瑚亦原係雲騎尉曾孫瑪什太候補筆帖式秦保雅蘭地方人其孫滿達色現任護軍校正紅旗馬理綏分地方人其孫錫米那原任協領曾孫富察原任防禦英郭綏分地方人其曾孫南泰現任驍騎校鑲白旗拜他瑚齊和通吉地方人其四世孫伊都理原任郎中五世孫倭和現係副驍騎校由正黃旗改隸按拜他瑚齊與本旗同里拉薩理同族吉喇克塔和通吉地方人其子武思太原任步軍校孫衮太原任親軍校曾孫薩哈連現任驍騎校瑚什巴原任城門尉色爾古原任驍騎校元孫奔泰原任同知額爾遜原任護軍校額爾赫圖原任驍騎校由正黃旗改隸吳拉達和通吉地方人其孫賽三原任步軍校曾孫阿爾太現係副驍騎校由正黃旗改隸按吳拉達與本旗同里拉薩理同族尼雅米揚阿和通吉地方人其曾孫阿哈碩色原任防禦赫碩色原任護軍校由正黃旗改隸按尼雅米揚阿與本旗同里拉薩理同族鄂羅休和通吉地方人其曾孫華色原任三等護衛由正黃旗改隸按鄂羅休與本旗同里拉薩理同族胡什圖布爾哈地方人其孫溫泰原任六品官由正白旗改隸正藍旗古社倭濟地方人其四世孫他克蘇張家保俱原任驍騎校五世孫色爾德原任御史夸色原任驍騎校六世孫瑚圖原任筆帖式瑚穆祿現任八品官七世孫六十三現任同知阿拉哈渾春地方人其孫格巴庫原任驍騎校曾孫賴哈達現任協領伊拉齊雅蘭地方人其子鄂絡順原任佐領孫倭和圖原任三等護衛頗亷原任防禦巴通阿現任頭等護衛按伊拉齊與鑲白旗同里明阿圖同族鑲藍旗額穆琥訥庫爾喀地方人其孫拜喀理現任驍騎校曾孫都喀理現任親軍校以上俱係國初來歸之人正白旗巴格雅蘭地方人其子吳興泰現任佐領重格現任防禦常祿原任驍騎校鑲白旗明阿圖雅蘭地方人其曾孫六格現任二等護衛按明阿圖與正藍旗同里伊拉齊同族鑲紅旗費揚古綏分地方人其曾孫騷達色原任協領官保原任防禦保住現係副驍騎校達古原係騎都尉元孫達爾善達理善俱原係騎都尉隨哈達現任防禦昻鄂善原任驍騎校額爾德赫現係副驍騎校以上俱係來歸年分無考之人哲爾齊氏哲爾齊為滿洲一姓其氏族世居于尼馬察及吉林烏喇地方英格訥國鑲藍旗人世居尼馬察地方後從征黑龍江有初來歸授騎都尉緣事革職恩詔加功仍授騎都尉又加一雲騎尉三遇職卒其子至一等輕車都尉卒其子葉楞格襲恩詔所官保柱襲職卒其親弟百祿襲職時削去托克加之職承襲騎都尉兼一雲騎尉卒其子托和現襲職又英格訥之子福達産原任郎中岱音布原任主事賽碧圖原任城守尉額爾德赫原任佐領覺和托原任驍騎校禪拜原任六品官孫明阿圖原任三等護衛金藤原任署丞麻色原任防禦勒滕格原任司庫額滕格原任驍騎校額滕現任六品官曾孫達成原任筆帖式托普原係副護軍校右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗錫倫住吉林烏喇地方人其曾孫薩爾泰原任防禦鑲藍旗僧格訥尼馬察地方人其子雅哈原任佐領齊莽阿尼馬察地方人其子額禮慎原任二等護衛碩隆古尼馬察地方人其子達爾柱原任驍騎校以上俱係國初來歸之人索綽絡氏索綽絡本係地名因以為姓其氏族散處于輝發及各地方輝發地方索綽絡氏松果托國鑲紅旗人世居輝發地方山東梯攻臨清州首初來歸由閒散過北京征賜巴圖先登城克之尉定鼎燕京時入山海關擊敗流魯號授騎都恩詔加賊馬步兵二十萬衆敘功加一雲騎尉三遇繼至一等輕車都尉卒其子舒瑚德孫蒙古相恩詔所承襲䝉古卒其子豐盛阿襲職時削去果托之加之職現襲騎都尉兼一雲騎尉又松子舒爾赫原任親軍校舒爾圖原任防禦曾孫圖桑阿現任護軍校阿爾納國鑲紅旗人松果托同族世居輝發地方布原任初來歸其子薩璧原任員外郎孫官音二等護衛桑格原任郎中桑阿布由主事從征四川於寧羌州值逆賊王輔臣兵變殁於陳贈雲騎尉以其子五十八承襲因病告退其子穆爾善現襲職又阿爾納之曽孫魏蕃魏幹俱原任筆帖式魏完原任中書魏寧現任護軍校福達禪國鑲紅旗人世居輝發地方防禦曾孫額爾特原初來歸其孫阿爾賽原任任驍騎校訥爾特原任員外郎赫達色原任佐領常綬現任步軍校元孫索林原任副都統四世孫索進原係庫使松綬原任膳房總領拜書原任筆帖式官保原任典儀常源現任員外郎富安現任三等護衛巴顔圖現任佐領五世孫索明永德俱現任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲紅旗碩色松果托同族其子保色原任三等護衛孫博爾岱原任護軍參領右世居輝發地方係國初來歸之人各地方索綽絡氏都爾古鑲白旗人世居吉林地方原係本處貝勒其孫喀爾喀瑪於國初來歸編佐領使統之其曾孫喀爾巴拜納穆色啓俱原任佐領甘珠翰由員外郎從征錦州屢敗松山杏山賊兵又破流賊滅福王平定河南江南等處有功授雲騎尉五載考績授為騎恩詔加都尉兩遇車都尉卒其子瓦爾達襲職緣事革至三等輕退其親弟之子勒竒襲職緣事革退其子法保襲職卒其子佛爾圖襲職時削去恩詔所加之職承襲騎都尉緣事革退其叔祖佛倫泰襲職緣事革退其親伯之孫黑格現襲職又都爾古之元孫瑚尼雅由護軍參領從征山東湖廣等處有功授雲騎尉後征湖廣於茅麓山擊贈騎都賊陳亡優騎尉以其子瑚沙琥承襲任佐領緣尉兼一雲事革退其親兄諾邁襲職兼佐領卒其子蓀查齊襲職