body:
  text: 八旗滿洲氏族通譜卷十二覺羅氏覺羅為滿洲著姓內有伊爾根覺羅舒舒覺羅西林覺羅通顔覺羅阿顔覺羅呼倫覺羅阿哈覺羅察喇覺羅等氏其氏族蕃衍各散處於穆溪葉赫嘉木湖興堪薩爾虎呼訥赫雅爾湖烏喇瓦爾喀松花江阿庫里佛阿喇哈達汪秦及各地方穆溪地方伊爾根覺羅氏阿爾塔什國正藍旗人世居穆溪地方初率七村戶口來歸太祖高皇帝以宗室女妻之設佐領令其長子阿山統焉阿山以克遼東功授二等輕車都尉又以收錫岱部落之功授為三等男後攻取義州及洪山口邉城永平府等處纍著勞績授為三等子取皮島時率左翼舟師渡海前進克其島優授為一等子圍錦州擊敗松山馬兵過北京征山東兩敗馬總兵馬步兵征大同克取二城定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之晉封三等公歷任都統緣事降為一等子卒其子色黑襲職卒其弟嶽爾多襲職時察明伊父寃抑授為三等侯尋緣事革退仍降為一等子令其親兄之子發喀承恩詔加襲復緣伊祖阿山之罪降為一等男兩遇統領至三等子緣事復降為一等男歷任護軍後緣事革退其弟桑格襲職卒其子雅爾泰襲職任護軍參領卒其叔祖之子鄂爾多襲職任佐領卒其子圖納襲職任佐領緣事革退其親伯之孫兌齊襲職現任佐領又阿爾塔什之次子阿達海原係扎爾固齊預十六大臣之列第三子濟爾海原任都統第四子噶賚原任副都統兼佐領孫夸察尚公主封為額駙托倫費揚古俱原任二等護衛嶽博漠爾渾噶爾柱俱原任頭等護衛札塔由佐領三圍錦州擊敗松山馬兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功授騎都尉後征流賊於綏德州延安府武昌府等處屢敗賊兵又追滕吉思擊土謝圖汗及碩羅汗等兵敗之敘功優授為三等輕車都尉遇恩詔授為二等輕車都尉卒其子彰招襲職兩遇統卒恩詔加至一等輕車都尉兼一雲騎尉歷任副都其子札珠理襲職卒無嗣其親叔方格襲職從征察哈爾布爾尼於大鹵地方破賊有功授為恩詔所三等男歷任副都統卒其子范岱襲職時削去加之職承襲二等輕車都尉卒其子豐紳襲職任佐領緣事革退其伯祖之曾孫齊郎阿襲職時削去方格詔後軍功所得之職承襲三等輕車都尉現任佐領又阿爾塔什之曾孫雅圖法古汪格札克丹俱原任頭等護衛莽佳原任護軍參領兼佐領法禮原任長史關保赫盛額俱原任員外郎德起原任協領秦都原任筆帖式官泰原係廕生佛保原係監生元孫吉賽原任郎中浩善原任城守尉幹都原任參領延柱原任護軍參領延布係和碩額駙原任鑾儀衛鑾儀使法蘇原任中書揚桑阿舒密善俱原係監生四世孫札拉芬原任員外郎魁保原任筆帖式五十九現任佐領薩穆哈圖現任都司福森布現任親軍校四格現係廕生伊禮布現係舉人穆成格現係生員富成格唐佳庫俱現係監生五世孫榮善現任佐領榮布現任護軍校齊瑪塔正藍旗人阿爾塔什之弟也原任二等侍衛其子阿爾晉由廢員三圍錦州擊敗松山馬兵又追洪承疇馬步兵斬副將一員都司一員賊衆三百餘人敘功優授三等輕車都尉續征寧逺擊賊有功征黑龍江剿取二村招服三村獲丁壯一千餘衆定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之敘功優授為一等輕車都尉兼一雲騎尉破流賊滅福王平定河南江南等處屢著勞績授為三等男征四川於漢中府屢敗賊張獻忠馬步兵優恩詔加授為一等男遇八年一雲騎尉順治世祖章皇帝以阿爾晉不惜身命堅心為國優授為二等子兩遇恩詔加至一等子兼一雲騎尉歷任都統兼佐領卒其子濟世襲職歷任都統兼佐領後緣事獲罪其親弟之子卓林襲職任佐領緣事革退其親叔噶住襲職任佐領卒其子德克精額襲職時削恩詔所去之職承襲三等子任佐領卒其子伊靈阿襲加職任佐領卒其親叔之子六十五襲職現任三等侍衛兼佐領又齊瑪塔之孫庫穆絡禮滿色俱原任護軍參領瑪庫原任七品官阿林原任長史卓博原任前鋒參領曾孫安岱原任佐領外庫原任典儀成柱現係監生元孫明德原任三等侍衛兼佐領桑格現任驍騎校福全保現任佐領福貴現任五品官四世孫永清現任佐領薩穆察國正藍旗人世居穆溪地方大臣兼佐領孫兆逹初來歸其子延遜原任內原任頭等護衛兼佐領庫爾禪原任頭等護衛曾孫卓爾和原任前鋒參領兼佐領倫布理原任二等護衛魯瑚原任刑部侍郎兼佐領魯庫原任六品官科普索原係監生博林由委署護軍校從征浙江舟山擊偽英毅伯阮思等兵陳亡贈雲騎尉無嗣其親兄蘇赫襲職卒其子赫逹色現襲職又薩穆察之元孫德格晉保俱原任筆帖式齊格原任驍騎校四世孫富陽岱現任護軍校元德現任筆帖式噶哈國正藍旗人世居穆溪地方郎中孫瓦禮琥原任初來歸其子杭吉達原任吉林烏喇副都統巴禮琥原任筆帖式曾孫二格原任主事蓀帕原任護軍校萬德布原任筆帖式烏拉現任協領蘇占現係副驍騎校以上俱係應立傳之人其餘無事迹可立傳者附載於後正藍旗龎古善其曾孫華色原任驍騎校元孫黨務理原任三等護衛額爾伯訥原任護軍校葛爾泰現任驍騎校拉色現係看守倉庫官四世孫完泰原任驍騎校西特庫其孫格爾特原任筆帖式黑色原任護軍校曾孫海常現任驍騎校碩色其子賽璧圖原任步軍校孫禪布原任筆帖式鑲藍旗包衣三覃原任弓匠協領其子薩賚亦原任弓匠協領孫納爾泰原任護軍校以上俱世居穆溪地方係國初來歸之人正藍旗傅達理其孫達色現任防禦愛業隨其子阿哈達原任親軍校孫邁圖原任護軍校曾孫海都原任驍騎校以上俱世居穆溪地方係來歸年分無考之人葉赫地方伊爾根覺羅氏巴雅爾圖國正黃旗人世居葉赫地方奮勇奪橋有功授為初來歸授騎都尉取遼東三等輕車都尉後攻寧逺城陳亡其長子阿齋襲職緣事革退其親弟額色襲職遇恩詔授為二等輕車都尉平定淮安梯攻永城縣克其城授為一等輕車都尉兩遇恩詔加至三等男卒其次子克錫克圖襲職卒其親叔滿都琥襲職卒其子桂尼分襲三等輕車都尉卒其子兆德現襲職額色之長子納爾瑚泰亦分襲三等輕車都尉卒其子常清襲職時削去恩詔所加之職現襲雲騎尉又巴雅爾圖第六子費揚古原任六品官孫僧成原係雲騎尉善布原任步軍總尉雅色原任郎中雅郎阿現任佐領和濟格爾由護軍校從征四川攻顯義關陳亡優贈騎都尉其子常三保襲職卒其子老格現襲職又巴雅爾圖之曾孫色克圖原係雲騎尉秦布原任三等侍衛勒爾貝納秦俱原任筆帖式徹爾貝原任員外郎鼐音布原任二等侍衛浩善現任護軍參領元孫明圖常寶柱豐阿泰瑪賞阿俱現任筆帖式達海現係監生四世孫邦科現任天文生拜靈阿現係監生富拉塔鑲黃旗人巴雅爾圖同族世居葉赫地方天聰時來歸原任佐領其子莽吉圖由間散過北京征山東擊郝總兵馬步兵敗之圍錦州屢敗松山杏山馬步兵及洪承疇三營步兵敘功授雲騎尉定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之授為騎都尉恩詔加三遇等輕車都尉緣事降為三等輕車都尉歷至二任副都統卒其子費揚古襲職卒其子圖海襲職時削去恩詔所加之職承襲騎都尉卒無嗣其親伯常明襲職卒其子玉福現襲職又富拉塔之孫昂吉圖原任護軍參領關布原任頭等侍衛珠爾翰岱原任驍騎校曾孫達藍泰原任參領四格原任佐領官鴻原任護軍校莽鵠立原任都統署理工部尚書兼佐領卒賜祭葬諡勤敏莽瞻現任筆帖式元孫莽泰原任員外郎兼佐領翰班現任員外郎莽寧現係廕生薩穆禪國正黃旗人巴雅爾圖同族世居葉赫地方訥原初來歸其曾孫敦逹理原任驍騎校哲庫任筆帖式元孫札爾巴泰原任防禦阿素原任主事羅碩色原任驍騎校吳努春原任護軍參領四世孫倉密原任佐領佛海原任筆帖式偉璱原任盛京工部侍郎海舒現任驍騎校五世孫博爾屯原任防禦額勒渾現任七品官薩清額國正黃旗人世居葉赫地方任步軍校胡什布由初來歸其元孫胡什屯原間散破流賊滅福王平定河南江南等處屢著軍功又梯攻湖州府第五登城克之征福建攻恩詔加建寧府首先奪門而入克其城授雲騎尉三遇至三等輕車都尉卒無嗣其親弟薩哈連之長子阿都襲職卒其父薩哈連襲職卒其次子薩碧襲職卒其子巴格襲職時削去恩詔所加之職承襲雲騎尉卒無嗣其族姪福保現襲職又薩清額之四世孫石圖原任護軍校盧巴海鑲藍旗人世居葉赫地方來歸年分無考原任驍騎校其子翁鄂岱由佐領從征浙江舟山擊敗偽英毅伯阮思等兵於海上後征江西湖廣擊賊偽將李茂著馬寶等兵屢敗之敘功授雲騎尉卒其子色竒訥襲職緣事革退其親弟馬爾漢現襲職又盧巴海次弟巴顔之子岱哈由護軍校從征察哈爾布爾尼於大鹵地方奮勇破賊有功平定雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩地方又敗賊偽將胡國秉等兵於雲南城下敘功優授騎都尉兼一雲騎尉任參領卒其次子嶽岱襲職任佐領卒其子廣德現襲職岱哈之長子碩爾岱原任筆帖式第三子碩保原任防禦第四子碩海現任司務第五子碩隆鄂現係生員又盧巴海三弟逹賴之長子岱音察原任護軍校次子存柱原任司庫孫兆喜現任驍騎校逹爾漢原係生員又盧巴海親叔蘇巴海之孫佛濟布原任驍騎校元泰原任護軍校又盧巴海叔祖胡什屯之曾孫竒泰原任護軍校糾渾住由驍騎校從征四川於朝天關等處擊敗賊偽總兵石存禮等兵一萬七千餘衆又敗賊偽將吳之茂等馬步兵後於秦州地方擊賊偽將王屏藩兵陳亡優贈騎都尉無嗣其親伯之孫圖理襲職卒其子額爾特襲職卒其子那什泰現襲職又胡什屯四世孫吳保住現係副護軍校撒奈原係副驍騎校又盧巴海之叔祖雲布露之元孫阿爾海現任佐領阿納布現任防禦金泰正藍旗人世居葉赫地方來歸年分無考原任禮部尚書其長子布瞻原任光祿寺卿次子哈瞻原任禮部尚書第三子海逹理由七品官從征浙江福建擊敗賊偽都督顔摽等兵於金華府縉雲縣等處又於海澄縣地方擊賊偽將劉國軒兵陳亡贈雲騎尉其子海瀚孫海瀾相繼承襲又金泰第四子瓦爾逹原任七品官孫布蓀原任長史兆亷原任員外郎布賴原任鳴贊布賽兆賚隆德俱原任筆帖式外山原任防禦曾孫海明原任員外郎兆忠顯原係副榜福伸現任知府富明現係監生天保原任筆帖式元孫兆傑現任筆帖式成德現係監生布什漢國正白旗人世居葉赫地方子蒙古爾岱原任佐初來歸原係扎爾固齊其領孫蒙鄂布原任護軍校尼喀逹原任博士曾孫瑚思哈原任郎中尼什哈由護軍校從征察哈爾布爾尼於大鹵地方奮勇破賊有功授雲騎尉卒其子薩爾泰襲職又布什漢之元孫四格原係生員四世孫額爾登額現任主事今𨽻本旗蒙古旗分由鑲白旗改𨽻顧齊國正白旗人世居葉赫地方鄭固原任驍騎校孫初來歸原任步軍校其子董色亦原任驍騎校曾孫董克由驍騎校部委參領從征廣東於韶州府擊賊陳亡贈雲騎尉其孫進保曾孫保定相繼承襲又顧齊之元孫雅門柱原任驍騎校四世孫進思亦原任驍騎校今𨽻本旗蒙古旗分由鑲白旗改𨽻屯布祿正黃旗人世居葉赫地方天聰時來歸其子伊禮布原任二等侍衛孫多爾濟羅密俱原任郎中齊蘭布由委署護軍校從征江西湖廣於建昌府等處屢敗賊偽提督顔子明等兵續征雲南擊敗賊偽將何繼祖等兵於石門坎