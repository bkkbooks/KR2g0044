body:
  text: 八旗滿洲氏族通譜卷六十七附載滿洲旗分内之䝉古姓氏薩爾圖氏薩爾圖係隸滿洲旗分之䝉古一姓其氏族世居葉赫及札魯特地方栢德國正紅旗人世居札魯特地方後遷居葉赫地方初来歸編佐領令其孫阿爾泰統之曾孫噶爾圖原任防禦逹頼原任長史庫塞原任五品官賽音圖原任典儀元孫噶哈原任副都統兼佐領那爾泰原任防禦納海原任佐領蘇海克什𩔖俱原任内閣侍讀克什圖原任筆帖式雅布喇原任長史海音圖原係騎都尉安圖原任筆帖式噶頼由三等䕶衛從征福建擊海㓂鄭成贈雲騎功於厦門陣亡職從征厄魯特噶爾丹於昭莫尉其子薩頼襲多地方奮勇破賊有功授為騎都尉任佐領卒其子費雅思哈襲職卒其子六格現襲職又栢德之四世孫納穆岱原任佐領巴布海原任主事巴晉泰原任頭等䕶衛道明蘇爾德佟藹俱原任筆帖式蘇林現任筆帖式温察原任員外郎杭藹原係騎都尉五世孫魁保現任叅領兼佐領雲保原任副叅領兼佐領春寧雅圖俱現任䕶軍校圖桑阿現任筆帖式兆住由驍騎校委署章京從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡贈雲騎尉其子珠琅阿現襲職謨和理正紅旗人栢德之孫也原任防禦其長子色勒布由前鋒侍衛圍錦州擊敗松山兵定鼎燕京時擊敗賊唐總兵馬歩兵又追流賊至慶都縣敗之續征四川屢敗賊張獻忠等馬歩兵叙功恩詔授授雲騎尉遇其子拜新襲職卒無嗣其叔之子為騎都尉卒索羅喜襲職厯任杭州副都統卒其子恭古禄襲職任叅領卒其子永琳襲職時削去恩詔所加之職承襲雲騎尉縁事革退其親叔朝柱現襲職又謨和理之次子色楞原任典儀第三子薩珠瑚原任員外郎孫喀爾圖原任鳴贊喀爾吉逹由委署䕶軍校從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊將胡國秉等兵於雲南城下卒後叙功贈雲騎尉其弟阿雅爾圖襲職卒其子泰海現襲職又謨和理之曾孫保善現係進士巴圖現任協領舒根泰現係生員常在原係副驍騎校褚庫巴圖魯太宗文正紅旗人栢德之孫也年十七從突出跴陣褚皇帝圍大凌河時賊驍將車濟格太宗嘉庫獨迎戰生擒之其功命入誥勅内以紀之續征大同攻左衛城先登擊賊賊傷其後頸猶扶額决戰卒克其城賜巴圖魯號授騎都尉三遇征四川擊賊張獻忠等兵恩詔加至二等輕車都尉後大敗之圍大同及征鄂爾多斯斬俘甚衆又征福建在烏龍江擊敗賊艘二百餘隻叙功授為賜祭𦵏一等輕車都尉厯任副都統兼佐領卒如典禮謚襄壯立碑墓道雍正十二年世宗憲皇帝以褚庫巴圖魯自㓜從征三十餘次屢立戰功特命入賢良祠春秋祀焉其子海存襲職任佐領縁事革退其親兄伊蘭布襲職任佐領卒其子蓀塔恩詔所襲職時削去騎都尉兼一雲騎尉任御史兼佐加之職承襲領縁事革退其親弟西特庫襲職任副叅領兼佐領卒無嗣其親兄之子逹喀現襲職逹喀之弟尚保現襲佐領又褚庫巴圖魯親兄班岱之子濟拉理原任前鋒叅領兼佐領孫慶藹原任内閣侍讀學士内音布原任御史陳拜善拜俱原任主事唐愛現任佐領兼管守信礟官莽果原任佐領曾孫碩翁愛現任頭等䕶衛孟愛永藹騰泰俱原任筆帖式元孫顔德現任筆帖式又褚庫巴圖魯親兄褚爾幹之子伊特庫原任郎中孫牛鈕亦原任郎中文泰原任御史曾孫竒車柏現係副䕶軍校又褚庫巴圖魯親叔訥黒圖之孫逹拜原任筆帖式愛圖原任頭等䕶衛以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗賽音巴彦岱札魯特地方人其孫巴黨什原任歩軍校渾齊原任佐領曾孫松山原任叅領額德勒胡原任歩軍校元孫蓀帕原任䕶軍校吳景原任驍騎校舒爾穆札魯特地方人其子錫爾徳克原任驍騎校曾孫成名原係副驍騎校以上俱係國初来歸之人正藍旗托爾本格瑚倫博宜爾地方人其子庫色布原任佐領曾孫阿齊圖原任歩軍校博爾齊瑚倫博宜爾地方人其孫索諾穆現任三等侍衛庫捫瑚倫博宜爾地方人其子色林原任䕶軍校孟柯瑚倫博宜爾地方人其曾孫拜思瑚朗現任䕶軍校拜岱瑚倫博宜爾地方人其孫訥爾圖現係副驍騎校以上俱係天聰時来歸之人蒙古爾濟氏䝉古爾濟係隸滿洲旗分之䝉古一姓其氏族世居科爾沁地方耀柰巴圖魯國正紅旗人世居科爾沁地方征山東梯攻河間初来歸由閒散二次過北京賜巴圖府第二登城克之兼一雲騎尉遇魯號優授騎都尉恩詔授為三等輕車都尉後破流賊滅福王平定河南江南等處屢著戰功又於潼闗肅州地方連敗流賊兵又梯攻甘州率衆登城克之授為二等輕車都尉兩遇恩詔加至一等輕車都尉兼一雲騎尉厯任副都統卒其子根特襲職卒其子英綬襲職卒無嗣其親恩詔所叔赫成額襲職時削去都尉卒其子永平襲職加之職承襲三等輕車現任協領又耀柰巴圖魯之子阿松阿原任筆帖式孫托爾璧原任御史索鼐原任䕶軍校兆德原任郎中英格原任筆帖式曾孫阿逹海原任頭等䕶衛什格現任䕶軍校右係應立傳之人鼐竒特氏鼐竒特係隸滿洲旗分之蒙古一姓其氏族世居克西克騰地方諾穆頼國正藍旗人世居克西克騰地方過北京征山東初来歸其子布岱由䕶軍校初賜巴圖梯攻寧津縣首先登城克之魯號授騎都尉三遇恩詔加至二等輕車都尉三圍錦州擊敗松山歩兵定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆續征廣東在新㑹縣連敗賊李定國兵五萬餘衆叙功優授為一等輕車都尉兼一雲騎尉卒其子阿濟格雅柱孫碩色相繼承襲碩色因病告退其親弟長授襲職卒無嗣仍令其兄碩世宗憲色襲職卒無嗣未襲後䝉承襲騎都尉兼一雲皇帝特恩令其族孫福保騎尉現任委署歩兵校右係應立傳之人郭爾羅特氏郭爾羅特係隸滿洲旗分之䝉古一姓其氏族世居察哈爾地方布顔塔布囊正黄旗人世居察哈爾地方天聰時来歸授騎都尉取董䕫征克西克騰徃畧錦州屢著戰功授為三等輕車都尉後圍松山擊敗敵兵初圍錦州克其外闗叙功授為二等輕車都尉順治世祖章二年以布顔塔布囊係皇帝太宗文皇帝眷顧之臣授為一等輕車都尉又布顔塔布囊親兄之子烏納海因出征陣亡贈騎都尉無嗣其親叔桑噶爾齋襲職卒無嗣將騎都尉亦令布顔塔布囊承襲併為三等男卒其子邁色襲職卒無嗣其親伯阿拉克泰襲職卒無嗣其親弟之子茂竒塔特襲職從征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為二等男卒其子成保襲職卒其子嵩齡現襲職又布顔塔布囊之孫常在原任筆帖式常柱現任防禦常英原任主事曾孫納穆原任筆帖式納齡原任六品官嵩山現係廕生右係應立傳之人其餘無事蹟可立傳者附載於後正黄旗額宜圖察哈爾地方人其孫逹賚原任䕶軍校右係天聰時来歸之人和爾氏和爾係隸滿洲旗分之䝉古一姓其氏族世居塔布諾特地方巴都瑚國鑲白旗人世居塔布諾特地方原任副都統董初来歸原任副將其子阿進泰阿頼由䕶軍叅領初過北京征山東擊敗吳總兵馬歩兵三圍錦州屢敗塔山松山寕逺兵又征黑龍江圍博和理城扼其汲道四日降之招服哈爾塔蓀等四村擒獲叛黨百人後圍中前所乗夜奪門而入遂克其城叙功授雲騎尉定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬恩詔授衆叙功授為騎都尉兼一雲騎尉遇隻虎於荆為三等輕車都尉續征湖廣敗賊一州府二次征福建屢敗賊首𫝊國用等兵攻克建寧府及同安等十五縣又招服一州七縣叙功優授為一等輕車都尉厯任副都統兼都察院副都御史卒其子董山襲職卒無嗣其親叔杜賚襲職卒其子六格孫雅圖相繼承襲雅圖縁事革退其子德琳襲職時削去恩詔所加之職現襲二等輕車都尉又巴都瑚之孫巴哈喇逹爾漢俱原任佐領徹爾格阿爾賽俱原任筆帖式曾孫巴爾親原任佐領阿琳現任佐領哈逹現任三等䕶衛元孫馬爾泰原任佐領阿玉石現任佐領右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗絡羅渾塔布諾特地方人其子瑚什巴原任筆帖式孫五格原任䕶軍校曾孫赫特赫現任䕶軍校右係國初来歸之人實寳禪氏實寳禪係隸滿洲旗分之䝉古一姓其氏族世居喀喇烏蘇齊巴漢臺地方逹巴海正黄旗人世居喀喇烏蘇齊巴漢臺地方天聰時来歸原任佐領其子綽根由閒散二次過北京征山東梯攻沭陽縣第二登城克之師旋梯攻順德府第三登城克之賜巴圖魯號授騎都尉兼一雲騎尉三遇王平定河南恩詔加至一等輕車都尉後破流賊滅福江南等處屢著戰功追滕吉思連敗土謝圖汗及碩羅汗等兵續征江西在南昌府擊敗賊首王德仁等兵七萬餘衆征鄂爾多斯賊犯内營以歩戰敗之叙功加一雲騎尉卒其子顔逹蓀恩詔所襲職因年老告退其子多爾濟襲職時削去石加之職承襲三等輕車都尉因病告退其子麟現襲職又逹巴海之元孫石泰現任中書右係應立傳之人其餘無事蹟可立傳者附載於後正黄旗泰衮喀喇烏蘇齊巴漢臺地方人原任嚮導侍衛其曾孫布爾噶岱原任䕶軍校布爾金原任驍騎校元孫克什圖庫魯克俱原任䕶軍校巴圖耨楞俱原任歩軍校五世孫珠爾噶岱現係副驍騎校六世孫伊常阿現襲伊舅祖塔他爾氏塞楞之雲騎尉事詳本傳右係天聰時来歸之人塔他爾氏塔他爾係隸滿洲旗分之䝉古一姓其氏族世居察哈爾地方鄂布哈國正黄旗人世居察哈爾地方等侍衛孫索寧由初来歸其子鄂克推原任二閒散從征黒龍江擊奔波果爾兵先入斬殺甚衆二次過北京征山東梯攻莱蕪縣首先登城賜巴圖克之授騎都尉遇魯號恩詔加一雲騎尉續圍大同攻渾源州陣亡職從征湖贈雲騎尉授為三等輕車都尉其子巴圖襲贈雲騎廣在洞庭湖擊賊偽都督巴飬元等兵陣亡子尉授為二等輕車都尉其子僧保襲職卒其恩詔所麻色襲職時削去輕車都尉因病告退其子三加之職承襲三等官保現襲職又鄂布哈之曾孫博鼎原任員外郎蘇爾特原任委署䕶軍叅領元孫塔津泰原任筆帖式常臨原任䕶軍校登明現任副䕶軍叅領塔因泰現任筆帖式薩喇現任歩軍校和濟格爾正黄旗人世居察哈爾地方天聰時来歸其子札圖由佐領三圍錦州屢敗洪承疇兵定鼎燕京時入山海關擊敗流賊馬歩兵二十萬衆又追至慶都縣敗之叙功授騎都尉卒其子班濟恩詔加岱襲職遇卒其弟阿濟岱襲職卒無嗣其親伯一雲騎尉之子鼐瑪爾津襲職卒無嗣其親叔之孫塞楞襲職卒無嗣未襲乾隆元年䝉特恩令塞楞親妹之孫實寳禪氏之伊常阿為嗣承襲雲騎尉又和濟格爾之孫翁渾原任䕶軍校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗瑚蘇貝察哈爾地方人其孫塞爾古楞原任驍騎校曾孫賽音保原係副䕶軍校元孫七十現係副䕶軍校右係天聰時来歸之人舒魯氏舒魯係隸滿洲旗分之蒙古一姓其氏族世居科爾沁地方席圖國鑲藍旗人世居科爾沁地方山東梯攻范縣首初来歸由閒散初過北京征賜巴圖先登城克之尉定鼎燕京時入山海闗擊敗流魯號授騎都恩詔授賊馬歩兵二十萬衆叙功加一雲騎尉遇為三等輕車都尉卒其子伊圖襲職兩遇恩詔加至一等輕車都尉縁事革退其親弟金柱襲職時削去恩詔所加之職承襲三等輕車都尉從征福建攻厦門擊海㓂鄭成功兵陣亡贈雲騎尉授為二等輕車都尉其親兄之子葉庫訥襲職卒其子額勒渾現襲職又席圖之元孫德楞額現係庫使右係應立傳之人岳諾特氏岳諾特係隸滿洲旗分之䝉古一姓其氏族世居札魯特地方阿宻西理國鑲黄旗人世居札魯特地方東梯攻汶上縣第初来歸由閒散過北京征山恩詔加二登城克之授雲騎尉三遇綬襲職卒其子多至三等輕車都尉卒其子長恩詔所爾濟襲職縁事革退其子阿津泰襲職時削去加之職現襲雲騎尉阿津泰之弟富珠理現任筆帖式右係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗納宻逹札魯特地方人原任佐領其子布泰原任三等侍衛曽孫竒塘原任䕶軍校蒼宻現任䕶軍叅領元孫石達原任城門尉二格現任副䕶軍叅領右係國初来歸之人赫魯克氏赫魯克係隸滿洲旗分之䝉古一姓其氏族世居察哈爾地方查木蘇鑲紅旗人世居察哈爾地方来歸年分無考其子透德由閒散徃招叛逆蘇尼特滕吉思乗夜上諭蘇前徃宣示思即復歸化叙功授騎都尉三遇尼特滕吉恩詔加至二等輕車都尉卒無嗣其親兄之子鄂爾凖孫佟保相繼承襲佟保卒其子班逹爾錫襲職恩詔所時削去承襲騎都尉卒其子額爾德尼諾齊襲加之職職卒無嗣其族叔福格襲職後縁事革退未襲右係應立傳之人彰札爾氏彰札爾係隸滿洲旗分之䝉古一姓其氏族世居科爾沁地方鄂爾濟圖鑲藍旗包衣人世居科爾沁地方天聰時来歸由閒散徃招叛逆蘇尼特滕吉思乗夜前徃宣上諭蘇示特滕吉思即復歸化叙功授騎都尉三遇尼恩詔加至二等輕車都尉縁事降為騎都尉兼一雲騎尉卒其孫珠倫岱襲職卒其子噶海襲職時削恩詔所去之職承襲騎都尉卒其親叔之子五逹色現加襲職由正藍旗改隸右係應立傳之人郭爾羅斯氏郭爾羅斯係隸滿洲旗分之䝉古一姓其氏族世居察哈爾地方衛寨桑鑲黄旗人世居察哈爾地方天聰時来歸後奉差徃張家口與明議互市於恩詔國計大有禆益授騎都尉三遇臣卒其子班第襲加至二等輕車都尉任散秩大職厯任領侍衛内大臣理藩院尚書縁事革職未襲又衛寨桑之子鄂爾椎原任三等侍衛孫格羙由三等侍衛從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊將胡國秉等兵於雲南城下叙功優授騎都尉任佐領卒其子佛保柱襲職任雲麾使卒其子國泰現襲職又衛寨桑之孫福綬原任主事福禄原任中書厥明原任筆帖式老格原係生員元孫七十一現任筆帖式右係應立傳之人翁阿理氏翁阿理係隸滿洲旗分之䝉古一姓其氏族世居阿霸垓地方逹雅齊國正黄旗人世居阿霸垓地方口與明議互市於初来歸由廢員奉差徃張家恩詔國計大有禆益授騎都尉三遇爾馬襲職因病告優授一等輕車都尉卒其子逹退其子雅圖光悅賽音察克先後承襲賽音察克卒其親弟碩色襲職時削去恩詔所加之職承襲騎都尉現任歩軍校又逹雅齊曾孫黑逹色現任讀祝官右係應立傳之人公吉喇特氏公吉喇特係隸滿洲旗分之蒙古一姓其氏族散處於阿喇克綽忒等地方納穆賽國正藍旗人世居阿喇克綽忒地方不違指使授初来歸其子諾穆圖因任事有能騎都尉圍錦州時守吕紅山屢敗賊兵定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆叙功加一雲騎尉卒無嗣其親兄之子阿濟逹襲職三遇恩詔加至一等輕車都尉後從征浙江舟山擊敗賊偽英毅伯阮思等兵三萬餘衆叙功加一雲騎尉卒其子法成襲職縁事革退其親兄之子納顔圖襲職時削去恩詔所加之職承襲三等輕車都尉縁事革退今復授佐領其革退世職伊親叔之子富德現承襲又納穆賽之曾孫法保原任佐領右係應立傳之人其餘無事蹟可立傳者附載於後正紅旗色能西喇塔拉地方人原任䕶軍校其子齊泰原任司庫孫長綬原任筆帖式右係國初来歸之人鑲白旗愛滿喀拉沁地方人其孫花色原任佐領滿色原任驍騎校曾孫索柱原任歩軍校七十三現係副䕶軍校瑚貝察哈爾地方人其子岳蘇原任防禦孟格德爾察哈爾地方人其曾孫格德原任䕶軍校元孫赫雅圖原任驍騎校和濟格爾察哈爾地方人其元孫伊楞特現任驍騎校以上俱係天聰時来歸之人八旗滿洲氏族通譜卷六十七欽定四庫全書
