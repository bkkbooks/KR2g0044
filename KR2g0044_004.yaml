body:
  text: 八旗滿洲氏族通譜卷一瓜爾佳氏瓜爾佳本係地名因以為姓其氏族甚繁散處於蘇完葉赫訥殷哈達烏喇安褚拉庫蜚悠城瓦爾喀嘉木湖尼馬察輝發長白山及各地方蘇完地方瓜爾佳氏瓜爾佳為滿洲著姓而居蘇完者尤著其先有同胞兄弟三人長曰佛爾和次曰尼雅哈齊三曰珠察後離居佛爾和仍居蘇完尼雅哈齊遷席北珠察由瓦爾喀再遷西爾希昻阿濟哈渡口珠察生素爾達素爾達生二子長曰王沙魯次曰王扎拉達王扎拉達生莽喀尼莽喀尼生羅羅墨爾根羅羅墨爾根生常喀尼墨爾根常喀尼墨爾根生二子長曰尼堪次曰索爾果索爾果為蘇完部長有子十人其族最盛費英東扎爾固齊國鑲黃旗人蘇完部長索爾果之次子也初隨父率五百户首先來歸太祖髙皇帝嘉之授一等大臣以孫女妻焉征瓦爾喀國取噶家路悉收降人以歸又往征瓦爾喀安褚拉庫路取屯寨二十餘處又遷瓦爾喀蜚悠城户口盡收其環城屯寨令侍衛扈爾漢護五百户先歸值烏喇國發兵萬人要諸路兩軍相持未決費英東扎爾固齊率兵繼至大敗其衆後取撫順縣眀兵來援費英東扎爾固齊督兵進戰所乘馬聞火炮驚逸諸軍不前費英東扎爾固齊回馬大呼麾衆直入于是諸軍並進大破之太祖見之曰此萬人敵也後從勝奪門遂拔其城征葉太祖征烏喇力戰破賊我師乘赫時費英東扎爾固齊攻其城之西面守陴者投石飛火不容相逼太祖命之退費英東扎爾固齊不肯退終墮其城費英東扎爾固齊自少從征諸國三十餘年身先士卒摧鋒陷陳戰必勝攻必克屢奏膚功授一等子厯任都統年五十七以疾卒于官其為人忠直見國事稍有缺失輒毅然強諫畢智殫力克輸勇略以佐成帝業文皇帝即位追封費英東扎爾固齊為直義公配太宗太廟享太宗嘗謂羣臣曰費英東扎爾固齊見人不善必先自斥責而後劾之見人之善必先自奬勸而後舉之其所奏善惡被劾者亦無怨言被舉者亦無驕色朕未聞爾等諸臣以善惡直奏似斯人也欽此順治十六世祖章年帝念費英東扎爾固齊參贊廟謨拻擴疆土皇為開創佐命第一功臣特崇延世之爵以勵忠勤加其世職為三等公康熙三十七年聖祖仁皇帝恭謁陵寢至親奠盛京追念費英東扎爾固齊舊勳墓次復遣官讀文祭之御書碑文勒石紀焉雍正九年信勇公其孫倭赫初襲世宗憲皇帝特旨加其封號為一等子晉封三等公卒其子富爾丹承襲三等公任領侍衛內大臣吏部尚書後于靖邊大將軍任內坐事罷職其子兆德承襲三等公緣事革退其弟哈逹哈承襲三等公現任都統議政大臣領侍衛內大臣工部尚書兼佐領又費英東扎爾固齊第四子托輝原任散秩大臣孫烏爾瑚原任三等侍衛扎秦原任頭等侍衛兼佐領曽孫福岱原任貟外郎雅爾賽現任佐領元孫福勒赫現係廕生四世孫哈寧阿現任三等侍衛哈尚阿現係生員按費英東扎爾固齊與鑲紅旗安褚拉庫地方碩翁科洛巴圖魯勞薩同族納海正黃旗人費英東扎爾固齊之次子也初以備禦駐防千山地方有追亡殺賊之功後在旅順贈三等口擊賊陳亡子顧爾漢襲職卒其弟顧素襲職輕車都尉其恩詔加三遇等輕車都尉兼一雲騎尉圍錦州擊敗松至一山來援兵又連敗洪承疇三營兵十三萬衆征福建攻厦門破海冦鄭成功兵敘功授為三等男卒其孫拉錫泰襲職緣事革退其子伊東阿襲職時削去恩詔所加之職現襲二等輕車都尉又納海之曽孫哲爾布由護軍校從征準噶爾在和通呼爾哈腦贈雲騎爾地方擊賊陳亡襲職由鑲黃旗改𨽻尉其子哲楞額現索海鑲黃旗人費英東扎爾固齊第六子也厯任刑部尚書其子多頗絡由佐領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣敗之敘功授騎都尉三遇恩詔加至二等輕車都尉後念伊祖費英東扎爾固齊之功授為一等輕車都尉任副都統卒其子道禪襲職任步軍總尉卒其子多爾泰現襲職又索海之孫濟拉布原任二等侍衛侍衛班領曽孫萬柱原任郎中拉巴原任筆帖式元孫凖提保現任綏逺城副都統德寧現任主事四世孫德恩現任筆帖式圖賴正黃旗人費英東扎爾固齊第七子也由廢員從征董夔時追殺叛逃之察哈爾多所俘獲初圍錦州擊却寧逺來援兵征北京連破滿總兵營斬殺甚衆授騎都尉又以乘夜率百人解灤州圍有功授為三等輕車都尉取大凌河擊敗眀監軍道張春兵征大同攻克靈邱縣城授為二等輕車都尉過北京征山東擊敗吳總兵步騎八千餘衆連克四城授為三等男後圍錦州克其外關并擊敗松山馬兵授為一等男又以攻取前屯衛中後所二城授三等子定鼎燕京時入山海關以步戰破李自成營復追至慶都縣敗之後敘諸臣功績以圖賴持忠貞之心不惜身命戮力王家克秉忠義優封三等公又于潼關等處屢敗流賊兵衆攻拔太平府城擒福王晉封一等公後征福建擊敗賊黃鳴駿等于仙霞關十五戰皆捷共下泉州府等十城殺偽唐王朱聿釗及偽國公方國安等大小偽官一百五十四人降其兵八千餘衆以疾卒於軍順太廟復治九年追諡昭勳公配享御書碑文勒石紀焉其子輝色承襲一等公卒其弟頗爾噴承襲一等公任領侍衛內大臣兼佐領卒其子永謙承襲一等公現任副都統兼佐領又圖賴之孫永泰原任副都統馬哈達原任護軍恭領曽孫德善原任佐領永慶現任佐領金輝現係廕生馬爾泰由都統現署理川陜總督印務巴靈阿現任副都統胡什布現任藍翎侍衛馬爾薩由內大臣兼參贊大臣征準噶爾在和贈騎都通呼爾哈腦爾地方擊賊陳亡之子敦柱現襲尉兼一雲騎尉因無嗣其親弟職又圖賴第九弟蘇瓦顔以父費英東扎爾固齊之功授騎都尉其曽孫關保現襲職由鑲黃旗改𨽻巴本正黃旗人費英東扎爾固齊第六弟也其子葛渾德原任雲麾使孫薩穆哈原任二等侍衛華色原任三等侍衛曽孫席漢原任三等侍衛布都瑚原任二等侍衛席特庫由佐領從征厄魯特噶爾丹奮勇破賊有功授雲騎尉緣事削革其子永長現任護軍校竒爾賽現任前鋒校由鑲黃旗改𨽻郎格鑲白旗人費英東扎爾固齊第七弟也厯任尚書議政大臣其子顔岱原任陵寢翼長鄂多輝原任協領孫席卜臣初任前鋒侍衛屢從征討有功授三等輕車都尉後自荆州往援江寧敗偽都督楊文英等於江上獲其偽印授為二等輕車都尉厯任都統鎮西將軍加太子少傅緣事削革未襲又郎格曽孫哈秦原任主事雅柱原任三等護衛賽弼漢原任頭等護衛華色現任步軍校元孫五十八原任三等護衛郎貴現任驍騎校由鑲黃旗改𨽻雅爾巴鑲黃旗人費英東扎爾固齊第八弟也其孫喀帕由委署參領從征察哈爾布爾尼屢敗賊衆後征浙江福建擊敗賊偽將劉國軒兵又破太平寨等處賊衆續征雲南於石門坎黃草壩地方擊敗賊偽將何繼祖等兵又敗賊偽將胡國秉於雲南城下敘功優授騎都尉兼一雲騎尉卒無嗣其親伯之孫官達理現襲職又雅爾巴之孫札海原任護軍參領阿爾發現任步軍校曽孫雅思哈原任二等侍衛羅密原任副都統羅達色原任貟外郎四世孫瑪楞岱現任佐領拉錫泰現任護軍校衛齊鑲黃旗人費英東扎爾固齊第九弟也初授騎都尉世職征虎爾哈收獲五百户又從征北京克取遵化州城有功授為三等輕車都尉預十六大臣之列太宗文皇帝每親征必令衛齊居守哈原任盛京任八門總管其第五子薩上駟院大臣第七子索山原任三等侍衛孫沙魯哈什俱原任二等侍衛曽孫顔祿原任護軍參領噶爾薩原任三等侍衛卓普特鑲黃旗人衛齊之次子也由佐領征黑龍江有功授雲騎尉圍錦州擊敗杏山松山馬步兵平㝎河南江南時纍立軍功後於杭州海寧平湖松江等處屢敗偽陳總兵王總兵等兵并獲其船敘功優授騎都尉兼一雲騎尉尋任兵部理事官五載考績授為三等輕車都尉兩遇恩詔優授一等輕車都尉兼一雲騎尉從征湖廣擊敗偽總兵陶養用等兵于衡州府又于王公嶺陳恩詔授斬偽黃副將敘功授為三等男又遇職任佐領為二等男厯任都統卒其孫錫圖襲恩詔所卒其子關福襲職時削去尉任二等侍衛兼佐加之職承襲二等輕車都領卒其子兆眀襲職現任整儀尉兼佐領又卓普特之元孫塞楞現任二等侍衛侍衛什長鰲拜巴圖魯鑲黃旗人衛齊第三子也由佐領從征錦州先拆毁上方堡邊墻前往埋伏大兵得以繼進後由大同入邊克得勝堡大兵征皮島與凖塔聨舟渡海先衆而往舉火為號後師繼至皮島兵太宗文列陳於堡上鰲拜親冒矢石鼓衆奮登竟克之皇帝以此島可比大城從優議敘授三等男賜巴圖魯號圍錦州時擊敗杏山本汛兵及攻克外關有騎兵自松山來援徒步衝入敗其衆錦州城內兵又來襲我軍後營奮勇截殺大破之敘功授為一等男後洪承疇率各路總兵吳三桂等太宗親合兵十三萬來援錦州魯等益鼓勇進擊大獲統大軍往禦鰲拜巴圖全勝吳三桂等率兵夜遁鰲拜巴圖魯復躡其後乘勝長驅直抵塔山追殺其馬步兵過半而還以功優授為三等子定鼎燕京時敘諸臣功績晉封一等侯統兵駐防大同時總兵薑瓖叛率兩營賊兵來逼我軍鰲拜巴圖魯親督官兵破其一營斬首殆盡晉封二等公遇恩詔加少保兼太子太保順治十八年受世祖章皇帝顧命為輔政大臣特賜一等公加太師其軍功所得之二等公令其子納穆福承襲任領侍衛內大臣後鰲拜巴圖魯獲聖祖仁罪將其子所襲公爵一併削革康熙五十二年皇帝追念鰲拜巴圖魯功績恩賜一等男以其親弟巴哈之孫蘇赫承襲雍正五年賞還鰲拜巴圖魯一等公爵又加其封號為超武公令其孫達福承襲隨征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈騎都尉其子岱屯承襲一等公現任散秩大臣兼佐領孫德成承襲騎都尉卒其親弟德勝現襲職又鰲拜巴圖魯之孫達禮善原任副都統元孫德清現係廕生巴哈鑲黃旗人衛齊第四子也初任頭等侍衛順治二年以巴哈當太祖時效力有年特授騎都尉後以考績稱職優授二太宗等輕車都尉從征陜西湖廣四川等處及追殺流寇俱有功授為一等輕車都尉三遇恩詔優晉一等男任內大臣後緣伊兄鰲拜巴圖魯之罪革職未襲其長子塔哈原任三等侍衛次子賜祭葬蘇爾達任領侍衛內大臣卒三子拜思哈原任如典禮諡恪僖立碑於墓第頭等侍衛兼佐領第五子能圖原任三等侍衛第六子拜音珠原任郎中第七子訥爾都係和碩額駙第八子瓜爾察原任領侍衛內大臣兼佐領第九子郭羅原係副驍騎校第十子開保原任二等侍衛孫阿爾珠原任三等侍衛蘇爾珠哈祿希常觀音保俱原任佐領那秦原任筆帖式台敏郭明俱現任三等侍衛曽孫和尚福綬俱原任筆帖式元孫富定現任三等侍衛兼佐領穆理瑪鑲黃旗人衛齊第六子也初襲父三等輕車都尉三遇恩詔加至一等輕車都尉兼一雲騎尉從征江西屢敗叛鎮金聲桓兵後升都統授靖西將軍征湖廣𠞰滅流寇李來亨招撫偽王一偽侯三偽總督一偽總兵偽副將等一百九十六貟敘功優授聖祖仁為一等男後緣事削革未襲康熙六十年奉瑪皇帝恩旨將衛齊原得之騎都尉給還穆理之曽孫察克慎現襲職又穆理瑪之子穆爾泰原任三等侍衛蘇爾瑪原任佐領佛倫原任二等侍衛孫庫泰原任三等侍衛曽孫希占現任筆帖式元孫福隆阿福通阿俱現係文舉人楊善鑲白旗人費英東扎爾固齊第四弟音達户齊墨爾根之長子也初以伊祖索爾果來歸功授騎都尉擢置十六大臣之列取大凌河時引纛直入胸腕各中一創授三等輕車都尉緣事獲世祖章罪後蒙其冤抑復授三等輕車都