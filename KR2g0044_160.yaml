body:
  text: 八旗滿洲氏族通譜目録卷八十附載滿洲旗分內之撫順尼堪姓氏趙氏常武周氏周文華以上俱係三品以上大員劉氏劉通劉世威劉克正劉應正劉啓雲劉有才劉士美李氏李三科李應試李萬良李元德李登科李凱李三錦王氏王應奎王德明托托穆王紹安王懷德王世昌張氏張承業張久輝張邦祺達爾查桑格張義禮鍾氏鍾有陽鍾元華鍾有德鍾有量周氏周繼榮周簇周倍周彥成曹氏曹邦曹志髙曹志德曹志祥馬氏馬雲龍馬七馬世強范氏范思明范思偉盧氏盧士克盧蕭筵趙氏趙王撫趙文奎袁氏袁良士袁撫安杜氏杜案杜望元高氏高繼儒國禮金氏金文學兌色吳氏吳知藁吳克新孔氏孔文選陳氏陳國忠蘇氏蘇敏善康氏康永桂姬氏明瞻徐氏徐天揚魏氏魏其隆胡氏四達色郎氏郎文彥任氏任經蔡氏蔡永年馮氏馮世勇林氏林來鳯于氏于世傑房氏房廷姚氏姚顯功湯氏外三謝氏謝登邱氏邱巴施氏道強洪氏洪有治沈氏沈景福嚴氏嚴得福梁氏梁智寬韓氏秉德田氏田揚林佟氏德明肖氏多和倫宋氏宋時午談氏談元德晉氏晉天受許氏許秉文欽定四庫全書八旗滿洲氏族通譜目録卷八十附載滿洲旗分內之撫順尼堪姓氏趙氏常武周氏周文華以上俱係三品以上大員劉氏劉通劉世威劉克正劉應正劉啓雲劉有才劉士美李氏李三科李應試李萬良李元德李登科李凱李三錦王氏王應奎王德明托托穆王紹安王懷德王世昌張氏張承業張久輝張邦祺達爾查桑格張義禮鍾氏鍾有陽鍾元華鍾有德鍾有量周氏周繼榮周簇周倍周彥成曹氏曹邦曹志髙曹志德曹志祥馬氏馬雲龍馬七馬世強范氏范思明范思偉盧氏盧士克盧蕭筵趙氏趙王撫趙文奎袁氏袁良士袁撫安杜氏杜案杜望元高氏高繼儒國禮金氏金文學兌色吳氏吳知藁吳克新孔氏孔文選陳氏陳國忠蘇氏蘇敏善康氏康永桂姬氏明瞻徐氏徐天揚魏氏魏其隆胡氏四達色郎氏郎文彥任氏任經蔡氏蔡永年馮氏馮世勇林氏林來鳯于氏于世傑房氏房廷姚氏姚顯功湯氏外三謝氏謝登邱氏邱巴施氏道強洪氏洪有治沈氏沈景福嚴氏嚴得福梁氏梁智寬韓氏秉德田氏田揚林佟氏德明肖氏多和倫宋氏宋時午談氏談元德晉氏晉天受許氏許秉文
