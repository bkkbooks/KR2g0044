世孫徳穆圖雅圖俱原任驍騎校雅思哈現任防禦阿思哈現任䕶軍校七十六現係副䕶軍校瓦爾達羅山地方人其孫哈錫泰現任步軍校曽孫哈唐阿現任驍騎校錫喇巴羅山地方人其孫登岱原任前鋒校曽孫李保住現任驍騎校兆山蘇完地方人其孫阿塔布原任䕶軍校阿爾本福爾江阿河地方人其子謨爾渾原任典儀鑲藍旗博絡開原地方人其子達格原任䕶軍校包衣瑚什巴哈達地方人其子恭拜原任五品典儀以上俱係國初來歸之人正黄旗舒穆喀努長白山地方人其曽孫吳達色現任驍騎校包衣班第穆丹地方人其子班布爾善原任長史曽孫玉賴原任驍騎校鑲白旗達海黒龍江地方人其曽孫廸保現任防禦元孫浩善原係副驍騎校懷班寧古塔地方人其子齊什原任驍騎校阿林達札林地方人其元孫伊楞泰現任驍騎校以上俱係天聰時來歸之人鑲黄旗英額杭佳地方人其子顔拜原任驍騎校瑚清額嘉木湖地方人其曽孫圖明阿現任䕶軍校包衣薩穆哈長白山地方人原任六品官其孫寶全現任筆帖式正紅旗馬成闗哈達地方人其孫常保原任驍騎校曽孫屯保原任䕶軍校鑲紅旗烏喀輝發地方人原任典儀其子瓦爾達亦原任典儀孫塔蓀原任包衣佐領曽孫僧保原任驍騎校僧保之子孫今𨽻本旗包衣都爾班長白山地方人原任䕶軍校其孫永福原任驍騎校由本旗包衣改𨽻馬錫納佛阿拉地方人其孫哈爾布原係副䕶軍校包衣庫尼堪輝發地方人原任䕶軍校其子尼雅哈齊亦原任䕶軍校孫圖理原任典儀元孫禪三格原任䕶軍校正藍旗圖爾哈吉林烏喇地方人其子六十八原任䕶軍校鑲藍旗艾必達輝發地方人原任六品包衣大鄂鼐瀋陽地方人其孫馬理原任驍騎校包衣圖克善哈達地方人其子顔達莫原任䕶軍校馬達黄古屯地方人其曽孫常禄原任驍騎校以上俱係來歸年分無考之人鑲藍旗常琦吉林烏喇地方人其孫噶爾圖原係副䕶軍校右係康熙時自科爾沁撤回之人八旗滿洲氏族通譜卷七
