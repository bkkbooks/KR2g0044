body:
  text: 八旗滿洲氏族通譜卷七馬佳氏馬佳本係地名因以為姓其氏族散處於綏分馬佳及各地方綏分地方馬佳氏瑚石國正黃旗人世居綏分地方內務府總管鼐格原初來歸其孫席巴理原任任頭等侍衛內務府總管兼佐領曽孫雅哈原係巴克什拜山原任二等侍衛鄂貝原任佐領圖爾哈原任員外郎張屯由佐領平定朝鮮時遇敵兵百人奮勇進擊手斬二人生擒一人三次圍錦州屢敗松山兵敘功授騎都尉後於員外郎任內考察稱職授為三等輕車都尉取前屯衛城越衆先進受傷身故其子圖勒慎襲職定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功授為二等輕車都尉卒其親兄羅托襲職三遇恩詔加至三等男從征江西於安福縣擊敗賊閻國公馬步兵續征浙江舟山擊敗偽英毅伯阮思等兵於海上敘功授為二等男任參領兼佐領卒其子羅思漢襲職任護軍參領兼佐領因目疾告退其子佛保襲職任頭等侍衛兼佐領因病告退其子朝陽襲職時削去恩詔所加之職承襲一等輕車都尉現任翰林院侍講學士又瑚石之元孫費揚古原任協領蓋格徹克瓦禮哈俱原任員外郎巴希納原任鳴贊翁果順原任太僕寺少卿保定原任齊齊哈爾將軍領侍衛內大臣四世孫蘇克濟原任山西巡撫馬爾漢原任主事常格原任博士馬誠唐藹保住俱原任筆帖式努爾布原任副都統馬蘭泰原任三等侍衛馬尼現任都統常海現任郎中門蘭泰現任驍騎校五世孫達爾布原任員外郎兼佐領達爾占原任員外郎大嘴原任七品官齊什原任護軍統領馬泰原任國子監司業托霸原任護軍參領福安現任牛羊羣總管永明現任主事六世孫永福原任員外郎兼佐領達敏原任主事馬成阿原任同知德克精額達海俱原任筆帖式明起現任三等侍衛兼佐領福成現任員外郎兼佐領馬昌安現任員外郎馬星阿現任典簿按瑚石與本旗包衣虎爾哈地方席本鑲白旗包衣馬佳地方對齊巴正藍旗寧古塔地方尼喀理等同族圖海恩詔授正黃旗人瑚石之曽孫也由內祕書院學士遇騎都尉尋升內𢎞文院大學士擢議政大臣又特命管以恪勤職業股肱贊襄加太子太保理刑部尚書事緣事罷退後奉世祖章皇帝遺命圖海宜任以重地滿洲都統奉聖祖仁皇帝嗣位即補圖海正黃旗命為定西將軍率兵往湖廣征𠞰流冦餘孽郝搖旗劉汝魁李來亨等纍戰纍捷既而郝搖旗劉汝魁等相繼破滅惟李來亨擁衆茅麓山最為險峻圖海率兵晝夜環攻盡誘其餘冦殺之李來亨焚巢自縊遂得其山寨擒斬偽新樂王及偽將一員總兵三員副將二員推官一員得偽印一顆乂招降偽公侯二偽將一偽總兵以下官五百八十餘員兵八千八百餘人家口三千餘衆敘功授為一等輕車都尉後察哈爾布爾尼作亂圖海奉命為副將軍率師往討親督官兵指麾進擊屢敗賊衆乂招撫察哈爾民一千三百餘戶敘功優授為聖祖特一等男逆賊王輔臣率衆久據平涼涼城下大命圖海為撫逺大將軍統兵直抵平揚軍威城中震懾諸將請乘勢攻城圖海謂我奉天威討此逆豎何患不克但念城中百姓皆向化歸誠朝廷赤子若即攻城恐多殺戮賊倘能全此十萬生靈不更美乎城中軍民聞之莫不感激咸思自拔以出嗣於城北虎山墩地方大敗賊兵絶其餉道王輔臣惶懼無䇿盡繳所受吳逆偽敕印及諸偽劄率衆親至大營剃髮以降固原偽巡撫陳彭等亦各率所屬官兵相繼來降奉特旨諭吏兵二部撫逺大將軍都統大學士圖海於軍功議敘外應從優加恩以示朕眷注忠勤酬答勳庸至意欽此隨經議覆加封為三等公尋以疾還京歷任賜祭中和殿大學士吏部尚書加太子太傅卒葬諡文襄立碑於墓以表其功焉太宗文皇帝實録告成時以圖海曾充監修總裁官追贈少保雍正二年世宗憲皇帝追念圖海功勳特贈為一等公配享太廟復加其封號為忠達公敏承襲三等公任都統刑命建特祠春秋致祭其子諾部尚書兼佐領卒其子馬爾賽初襲三等公後授為一等公任都統領侍衛內大臣武英殿大學士撫逺大將軍緣事獲罪其弟馬禮善承襲一等公任都統刑部尚書兼佐領卒其子馬賢承襲一等公任散秩大臣兼佐領緣事革退其弟馬贇承襲一等公現任散秩大臣兼佐領又圖海之孫馬禮德原係生員馬靈阿原任二等侍衛兼佐領馬爾屯現任二等侍衛兼佐領曽孫吉翰原任二等侍衛舒翰馬𢋫俱現任藍翎侍衛馬實現係廕生錫哈巴克什國正白旗人世居綏分地方子布丹於啓心郎任初來歸設佐領使統之其內三載考績授騎都尉定鼎燕京時加一雲騎尉又以考察稱職授為三等輕車都尉兩遇恩詔加至一等輕車都尉後升工部侍郎因監修社稷壇奉先殿加一雲騎尉卒其孫葛爾貝襲職從征江西廣贈太子少保立碑紀焉東賊偽總兵唐配生率兵四千於老莊地方拒戰奮擊敗之又屢敗賊偽將吳世琮於韶州府續征雲南於石門坎黃草壩地方擊敗賊偽將何繼祖等兵敘功優授為二等男緣事削革未襲又錫哈巴克什之孫阿靈武原任二等侍衛馬賴原任頭等侍衛兼佐領托賚原任鑾儀衛鑾儀使兼佐領碩賚原任員外郎曽孫巴賴原任內閣侍讀學士邦愛原任三等侍衛兼佐領馬柱原任佐領馬啓原任員外郎齊寧格原任筆帖式元孫哈理原任八品官薩拉杭愛俱現任佐領又錫哈巴克什親伯三福之子方吉納原任佐領孫敦拜鼐音布祿董山俱原任佐領海蘭原任城門尉曽孫鄂山清福俱原任驍騎校德星額原任頭等侍衛朱邁倭赫俱原任主上事都賚原任佐領碩色原任筆帖式富喀任遇駟院大臣兼佐領以效力年久授騎都尉兩恩詔加至三等輕車都尉卒其子馬克圖襲職卒其親兄之子蘇爾當阿襲職時削去恩詔所加之職承襲騎都尉任員外郎卒其子福德襲職現任護軍參領兼