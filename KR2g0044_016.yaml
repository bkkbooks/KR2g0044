body:
  text: 八旗滿洲氏族通譜卷七馬佳氏馬佳本係地名因以為姓其氏族散處於綏分馬佳及各地方綏分地方馬佳氏瑚石國正黄旗人世居綏分地方内務府總管鼐格原初來歸其孫席巴理原任任頭等侍衛内務府總管兼佐領曽孫雅哈原係巴克什拜山原任二等侍衛鄂貝原任佐領圖爾哈原任員外郎張屯由佐領平定朝鮮時遇敵兵百人奮勇進擊手斬二人生擒一人三次圍錦州屢敗松山兵敘功授騎都尉後於員外郎任内考察稱職授為三等輕車都尉取前屯衛城越衆先進受傷身故其子圖勒慎襲職定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆敘功授為二等輕車都尉卒其親兄羅托襲職三遇恩詔加至三等男從征江西於安福縣擊敗賊閻國公馬歩兵續征浙江舟山擊敗偽英毅伯阮思等兵於海上敘功授為二等男任叅領兼佐領卒其子羅思漢襲職任䕶軍叅領兼佐領因目疾告退其子佛保襲職任頭等侍衛兼佐領因病告退其子朝陽襲職時削去恩詔所加之職承襲一等輕車都尉現任翰林院侍講學士又瑚石之元孫費揚古原任協領葢格徹克瓦禮哈俱原任員外郎巴希納原任鳴贊翁果順原任太僕寺少卿保定原任齊齊哈爾將軍領侍衛内大臣四世孫蘇克濟原任山西巡撫馬爾漢原任主事常格原任博士馬誠唐藹保住俱原任筆帖式努爾布原任副都統馬蘭泰原任三等侍衛馬尼現任都統常海現任郎中門蘭泰現任驍騎校五世孫達爾布原任員外郎兼佐領達爾占原任員外郎大嘴原任七品官齊什原任䕶軍統領馬泰原任國子監司業托霸原任䕶軍叅領福安現任牛羊羣總管永明現任主事六世孫永福原任員外郎兼佐領達敏原任主事馬成阿原任同知德克精額達海俱原任筆帖式明起現任三等侍衛兼佐領福成現任員外郎兼佐領馬昌安現任員外郎馬星阿現任典簿按瑚石與本旗包衣虎爾哈地方席本鑲白旗包衣馬佳地方對齊巴正藍旗寧古塔地方尼喀理等同族圖海恩詔授正黄旗人瑚石之曽孫也由内秘書院學士遇騎都尉尋陞内𢎞文院大學士擢議政大臣又特命管以恪勤職業股肱贊襄加太子太保理刑部尚書事縁事罷退後奉世祖章皇帝遺命圖海宜任以重地滿洲都統奉聖祖仁皇帝嗣位即補圖海正黄旗命為定西將軍率兵往湖廣征𠞰流冦餘孽郝揺旗劉汝魁李來亨等累戰累㨗既而郝揺旗劉汝魁等相繼破滅惟李來亨擁衆茅麓山最為險峻圖海率兵晝夜環攻盡誘其餘冦殺之李來亨焚巢自縊遂得其山寨擒斬偽新樂王及偽將一員總兵三員副將二員推官一員得偽印一顆乂招降偽公侯二偽將一偽總兵以下官五百八十餘員兵八千八百餘人家口三千餘衆敘功授為一等輕車都尉後察哈爾布爾尼作亂圖海奉命為副將軍率師往討親督官兵指麾進擊屢敗賊衆乂招撫察哈爾民一千三百餘戸敘功優授為聖祖特一等男逆賊王輔臣率衆久㨿平凉凉城下大命圖海為撫逺大將軍統兵直抵平揚軍威城中震懾諸將請乘勢攻城圖海謂我奉天威討此逆䜿何患不克但念城中百姓皆向化歸誠朝廷赤子若即攻城恐多殺戮賊倘能全此十萬生靈不更美乎城中軍民聞之莫不感激咸思自拔以出嗣於城北虎山墩地方大敗賊兵絶其餉道王輔臣惶懼無䇿盡繳所受吳逆偽勅印及諸偽劄率衆親至大營薙髪以降固原偽巡撫陳彭等亦各率所屬官兵相繼來降奉特㫖諭吏兵二部撫逺大將軍都統大學士圖海於軍功議敘外應從優加恩以示朕眷注忠勤酬答勲庸至意欽此隨經議覆加封為三等公尋以疾還京歴任賜祭中和殿大學士吏部尚書加太子太傅卒葬諡文襄立碑於墓以表其功焉太宗文皇帝實録告成時以圖海曾充監修總裁官追贈少保雍正二年世宗憲皇帝追念圖海功勲特贈為一等公配享太廟復加其封號為忠達公敏承襲三等公任都統刑命建特祠春秋致祭其子諾部尚書兼佐領卒其子馬爾賽初襲三等公後授為一等公任都統領侍衛内大臣武英殿大學士撫逺大將軍縁事獲罪其弟馬禮善承襲一等公任都統刑部尚書兼佐領卒其子馬賢承襲一等公任散秩大臣兼佐領縁事革退其弟馬贇承襲一等公現任散秩大臣兼佐領又圖海之孫馬禮徳原係生員馬靈阿原任二等侍衛兼佐領馬爾屯現任二等侍衛兼佐領曽孫吉翰原任二等侍衛舒翰馬𢋫俱現任藍翎侍衛馬實現係廕生錫哈巴克什國正白旗人世居綏分地方子布丹於啟心郎任初來歸設佐領使統之其内三載考績授騎都尉定鼎燕京時加一雲騎尉又以考察稱職授為三等輕車都尉兩遇恩詔加至一等輕車都尉後陞工部侍郎因監修社稷壇奉先殿加一雲騎尉卒其孫葛爾貝襲職從征江西廣贈太子少保立碑紀焉東賊偽總兵唐配生率兵四千於老莊地方拒戰奮擊敗之又屢敗賊偽將吳世琮於韶州府續征雲南於石門坎黄草壩地方擊敗賊偽將何繼祖等兵敘功優授為二等男縁事削革未襲又錫哈巴克什之孫阿靈武原任二等侍衛馬賴原任頭等侍衛兼佐領托賚原任鑾儀衛鑾儀使兼佐領碩賚原任員外郎曽孫巴賴原任内閣侍讀學士邦愛原任三等侍衛兼佐領馬柱原任佐領馬啟原任員外郎齊寧格原任筆帖式元孫哈理原任八品官薩拉杭愛俱現任佐領又錫哈巴克什親伯三福之子方吉納原任佐領孫敦拜鼐音布禄董山俱原任佐領海蘭原任城門尉曽孫鄂山清福俱原任驍騎校德星額原任頭等侍衛朱邁倭赫俱原任主上事都賚原任佐領碩色原任筆帖式富喀任遇駟院大臣兼佐領以効力年久授騎都尉兩恩詔加至三等輕車都尉卒其子馬克圖襲職卒其親兄之子蘇爾當阿襲職時削去恩詔所加之職承襲騎都尉任員外郎卒其子福徳襲職現任䕶軍叅領兼佐領又錫哈巴克什親伯官福之元孫圖啟原任驍騎校輝色德爾遜噶爾哈圖俱原任三等侍衛葉爾門原任員外郎陵寢翼温都蘭原任佐領福爾瑚原任現任驍騎校四長朱爾瑚原任二等侍衛達色世孫額爾赫圖原任員外郎伊爾當阿原任佐領常海原任筆帖式泰保現任膳房總領舒敏現任七品筆帖式紀奎現任三等侍衛又錫哈巴克什叔祖博克占之元孫哈爾吉原任前鋒校雅布色由䕶軍校從征雲南入緬國至阿窪城獲偽桂王有功後征陜西在秦州地方擊賊贈雲騎陣亡子保祝襲職卒其子長生現襲職博克占尉其之四世孫外庫原任䕶軍校岳賴原任驍騎校葉布綬原任筆帖式五世孫阿哈齊原任䕶軍校敦柱國正黄旗人世居綏分地方散過北京征山東梯初來歸其子伊古禮由閒賜巴圖攻趙州首先登城克之騎尉卒無嗣其親兄之魯號授騎都尉兼一雲恩詔授子博壘襲職遇尉卒其子浩善襲職從征察哈為三等輕車都爾布爾尼於大鹵地方奮勇破賊有功授為二等輕車都尉年老告退其子赫色襲職時削去恩詔所加之職承襲三等輕車都尉卒其親兄塞楞泰襲職時削去詔後軍功所得之職現襲騎都尉兼一雲騎尉格克特正黄旗人世居綏分地方天聰時來歸其子惠山原任筆帖式孫漢都原任協領瓦色原任筆帖式屯泰由閒散取大凌河擊敗錦州來援兵過北京征山東攻濰縣首先登城克之賜巴圖魯號授騎都尉卒其子温泰襲職遇卒其子喜恩詔加一雲騎尉卒無嗣其叔祖貴山襲職恩詔所格襲職卒無嗣其親弟之子九格襲職時削去加之職現襲騎都尉又格克特之曽孫哈什泰原任䕶軍校達進正白旗包衣人世居綏分地方來歸年分無考原任牧長其子穆成額由四品官以任事勤勞授雲騎尉卒其孫武什襲職又達進之孫阿布拉原任光禄寺卿以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載於後正黄旗屯鐸原任頭等侍衛顧鼐原任驍騎校其子雅賴鄂通果俱原任筆帖式鑲紅旗圖爾巴哈其孫濟哈那原任驍騎校黒達色原任䕶軍校曽孫舒書亦原任䕶軍校額爾登峩現任七品官元孫蘇克敦現係副驍騎校以上俱世居綏分地方係國初來歸之人馬佳地方馬佳氏赫東額國鑲黄旗人世居馬佳地方五十五户來歸赫東初同親弟尼瑪禪率滿洲額授為扎爾固齊尼瑪禪授為備禦赫東額從征哈達輝發烏喇札魯特葉赫等處每戰皆㨗克奏膚功授為一等男卒其弟尼瑪禪襲職縁事革去一等男仍任備禦後征大凌河被創身陵寢總亡其長子温都理承襲備禦任來歸功授騎都管又赫東額之長子雅希禪以尉尋擢扎爾固齊編佐領令其子恭衮統之雅希禪從征界凡越衆進擊破其大營授為二等輕車都尉又以攻克遼東有功授為三等男縁事降為一等輕車都尉後世祖章皇帝追念雅希禪舊勲恭衮初襲一等輕車都賜祭葬諡敏果勒石紀焉其子尉任叅領縁事撤去一騎都尉與伊弟訥爾特承襲恭衮止襲騎都尉從征黑龍江以疾卒於軍其弟拉都渾襲職從征大同攻中後所殁於陣加贈一雲騎尉其子鄂爾弼襲職遇侍衛卒其弟噶爾弼恩詔授為三等輕車都尉任三等襲職歴任副都統兼佐領卒其孫福僧額襲職時削去恩詔所加之職現襲騎都尉兼一雲騎尉訥爾特由騎都尉征錦州屢敗杏山松山馬歩兵征大同攻克小石城歴陞副都統刑部侍郎過北京征山東攻武定州指麾克其城後擊吳總兵騎兵力贈為三戰陣亡都尉其子訥新襲職遇等輕車恩詔授為二等輕車都尉任二等侍衛兼佐領卒其弟洪海襲職歴任䕶軍統領兼佐領年老告休其恩詔所子巴努達襲職時削去都尉任御史卒其子瑚加之職承襲三等輕車彰阿襲職卒其子塞克圖現襲職又赫東額之次子碩色第三子武泰俱原任司庫孫綏哈那布岱俱原任郎中曽孫薩木哈原任給事中剛色原任翰林院侍講富德現任治儀正元孫托爾齊原任郎中富成現任三等侍衛釋迦保現任佐領保徳現任驍騎校旺錫現任䕶軍校四世孫索拜現任副都統兼武備院卿孟清來住福森特克慎俱現任筆帖式吳瑪瑚現任二等侍衛侍衛什長五世孫齊式儀現係廕生尼瑪禪之次子坦都原任頭等侍衛兼佐領孫濟博渾原任頭等侍衛兼叅領常官保原任副都統兼佐領達賚原任叅領兼佐領謨絡渾原任員外郎索柱原任給事中曽孫萬保原任七品官舍理福受俱原任員外郎清海現任佐領哈岱乾現任都統兼佐領元孫張保住原任䕶軍校六清門侍衛十八現係廕生又赫東額族裔吉什哈原任給事中郎塞國鑲藍旗人世居馬佳地方塞授為騎都尉郎吉初同親弟郎吉達來歸郎達授為佐領郎塞從征烏喇克取一村又斬殺卦爾察四十餘人在商顔哈達地方擊賊目被重傷授為二等輕車都尉卒其子艾音布襲職歴任前鋒統領卒其弟新泰襲職三遇恩詔加至三等男歴任副都統卒其子錫濟渾襲職任叅領卒其子錫秦襲職卒其子錫常襲職時削恩詔所去之職現襲二等輕車都尉乂郎塞之子詹達加海原任長史孫和爾渾原任佐領南達海原任護軍叅領兼佐領曽孫賽璧圖阿都俱原任佐領阿魯原任寧夏將軍尼堪原任筆帖式薩穆哈現任佐領富寧現任䕶軍校元孫明福現任侍衛什長兼佐領明啟現任員外郎郎吉達之孫海塔原任防禦元孫官保原任員外郎永常原任筆帖式胡什巴國鑲藍旗包衣人世居馬佳地方亦原任佐領孫初來歸原任佐領其子穆哈達翁果岱由佐領從征浙江於太平山等處屢敗偽興明伯趙得勝等兵敘功授雲騎尉任叅領卒其子馬拉現襲職又胡什巴之曽孫黒色原任驍騎校兆億麟原任頭等䕶衛元孫鄂羅卓禮俱原任䕶軍校四世孫馬雄亦現任護軍校按胡什巴與本旗包衣同里倭赫德同族羅爾機國正紅旗人世居馬佳地方䕶軍校孫佛穆齊