body:
  text: 八旗滿洲氏族通譜目錄卷四十六葉赫地方鄂卓氏阿爾吉穆滿都富岱瓦渾瑚巴蘇彌納以上俱有傳英泰岱祿瓦穆布彰海岳隆果費揚古色克山壘勒以上俱附載各地方鄂卓氏哈爾松阿廷鈕以上俱有傳安圖岳貝官保雅齊布札色理瑚深布祿阿爾法納爾布噶達渾佳克丹覺和托外賛拉爾巴渾屯泰科對吉拉以上俱附載鈕赫勒氏杜塔理青善杜理布哈多弼䝉古爾岱以上俱有傳戴都努占孫扎齊達布當阿頗起阿哈善寧占瑚什塔朗以上俱附載鄂濟氏通阿圖巴圖魯珠爾庫孟魁尚嘉圖台朔庫吴岱竒塔巴顔恒特以上俱有傳噶克達薩穆懇瓦海穆鐸鄂壘武達海圖理布以上俱附載裕瑚魯氏達揚阿法照拖爾竒堪沙格以上俱有傳蘇赫丹布祿蘇克札巴爾佳納郎圖拜他納吉穆薩哈額爾松峩瓦爾碧悠吴柱布瑚秦以上俱附載布爾察氏圖爾伯慎右係有傳博爾托右係附載
  hash: sha256:7b99d8be56aa94b85ce26b9d697fe6de13cde9d7bb124fc24afec19f2c884f55
