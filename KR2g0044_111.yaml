body:
  text: 八旗滿洲氏族通譜卷五十五洪鄂氏洪鄂本係山名因以為姓其氏族散處於長白山等地方齋齊國鑲黄旗人世居長白山地方瑪爾吉原任三等初來歸原任䕶軍校其長子侍衞次子索住原任䕶軍校第三子僧色理由三等侍衞從征江西於南康府地方屢敗賊兵贈雲騎後征廣東在九妖十八洞地方擊賊陣亡尉其兄之子和絡諾孫哈什泰相繼承襲荆衣祿國鑲白旗人世居吉林地方騎校瑚圖原任杭州初來歸其孫徳克原任驍將軍曽孫岡格原任五品官肇興卓和理俱原任筆帖式牛鈕原任廣東副都統烏理原任黒龍江副都統和和理現任典儀保住現任驍騎校元孫騷達爾現任䕶軍校由正白旗改隸瑚什屯國鑲白旗人世居哈達地方阿哈尼堪原任郎中初來歸原任䕶軍校其子兼佐領孫額徳貝原任郎中兼佐領圖納原任工部尚書曾孫清鼐原任主事清徳原任佐領清格原任筆帖式元孫舒瓚原任筆帖式舒璧現任員外郎以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗丹岱葉赫地方人其長子穆瑚理原任郎中兼騎都尉次子烏珠安班原任步軍校孫西喇布原任防禦蘇拜原任五品官尙吉圖原任郎中烏禮善原任驍騎校曾孫阿禮瑚原任筆帖式達爾布原任驍騎校福鐘阿原任典儀福通阿原任主事杭依祿現任䕶軍校伊禮布現任防禦福明現任筆帖式福亮現任主事又丹岱次弟班岱之子阿賽原任助敎孫畢桑阿原任步軍副尉曾孫愛崇阿現任三等侍衞第三弟恒泰之子巴爾泰原任給事中西蘭泰原任筆帖式佛隆果原任步軍校孫阿什泰原任叅領阿殷泰現任三等侍衞錫騰現任員外郎曾孫寶徳現任筆帖式由正紅旗改隸正紅旗穆克楚庫葉赫哈達地方人其子岱善原任驍騎校孫遜達理原任協領舒書原任䕶軍校曾孫額宜格徳對色俱原任郎中賽碧原任前鋒校元孫鄂齊理原任三等侍衞鄂什原任郎中赫勒原任員外郎鄂鼐原任筆帖式四世孫全保原任䕶軍校鄂顔泰現任筆帖式薩穆哈原任中書鄂恒現係監生阿瑚禮葉赫地方人其曽孫佛赫訥原任城門尉鑲白旗恭智長白山地方人原任三等䕶衛其子栢賽原任翼長孫法禮渾原任典儀法濟納原任驍騎校栢林原任䕶軍校曾孫七十現任頭等䕶衞博理葉赫地方人其孫阿寧達原任驍騎校曾孫遵柱原任筆帖式元孫保安原任二等侍衞保載現任二等侍衞特楚洪鄂哈達地方人其孫伊爾鈎原任七品官九善原任驍騎校曽孫嘗僧原任防禦由正白旗改隸齋山哈達地方人原任步軍校其孫百綬亦原任步軍校積徳貝哈達地方人其曽孫布賚原任步軍校鑲紅旗舒通阿佳木秦地方人其曽孫嘉隆阿原任防禦元孫栢達亦原任防禦四世孫海常阿現任驍騎校伊常阿現係副䕶軍校富拉禪額爾敏地方人其曽孫黒達色現任驍騎校鑲藍旗伊蘭珠雅爾湖地方人其子岱都原任頭等䕶衞孫岱理瑚原任員外郎費揚古原任郎中瓦理瑚原任驍騎校三保原任二等䕶衞曾孫伊靈阿現任郎中錫靈阿現任筆帖式蓋穆雅爾湖地方人其曾孫二格原任長史烏臧阿葉赫地方人其子都臧阿原任城門尉孫圖瑚納原任筆帖式以上俱係國初來歸之人鑲紅旗温都烏喇地方人其孫西特庫原任驍騎校曾孫伊特庫原任步軍校伊納理原任驍騎校薩林原任六品官右係天聰時來歸之人鑲黄旗萬布白都訥地方人原任協領其子素秦原任三等侍衞鑲紅旗温察葉赫地方人其子珠克塔喇漢原任步軍校根特原任員外郎孫色勒布原任防禦哈禮布原任䕶軍校納海原任主事曽孫阿禮布原任防禦七十八原任䕶軍校拉色原任驍騎校達爾瑪現任防禦七達色現任驍騎校立柱現任佐領元孫五格現任防禦以上俱係來歸年分無考之人賢達禪氏賢達禪本係地名因以為姓其氏族世居松花江及賢達禪地方烏爾克穆正黄旗人世居松花江地方來歸年分無考其子克住輝多俱原任驍騎校孫輝諾亦原任驍騎校錫濟布原任藍翎侍衞曽孫懐達武爾原任佐領槐色由閒散從征浙江於衢州府擊敗賊偽都督周烈等兵後在太平山擊賊偽總督趙徳勝兵先進陣亡贈雲騎尉因無嗣其親兄之孫恩特現襲職又烏爾克穆之四世孫札蘭太現任驍騎校右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗德爾博古松花江地方人烏爾克穆同族其子穆朱琥原任䕶軍校尼雅哈察賢達禪地方人其孫沙爾泰原任䕶軍校以上俱係國初來歸之人赫錫赫理氏赫錫赫理為滿洲一姓其氏族散處於烏喇等地方訥楚庫國正白旗人世居烏喇地方軍校從征湖廣在巖初來歸其子尼雅哈由䕶贈雲騎山嶺擊賊將馬寳兵陣亡子額爾登額現襲職尉其子莽宜祿襲職卒其右係應立傳之人其餘無事蹟可立傳者附載於後正白旗謨希納尼馬察地方人其四世孫布爾善原任主事穆成額原任筆帖式五世孫五達哈原任員外郎世圖原任鳴贊六世孫諾托和觀音保俱原任筆帖式右係來歸年分無考之人正藍旗博布泰嫩奈地方人右係康熙時自科爾沁撤囘之人庫穆圖氏庫穆圖為滿洲一姓其氏族散處於倭濟愛滿等地方索秦國正白旗人世居倭濟愛滿地方領從征厄魯特初來歸其孫富達理由䕶軍叅噶爾丹奮勇破賊有功授雲騎尉卒其子富格現襲職又索秦之曽孫阿普荅禮原任佐領黒色原任防禦雅爾琥原任驍騎校元孫色勒原任副都統費揚阿原任䕶軍叅領存柱現任步軍校和尚現任三等侍衞四世孫札瑚達原任六品官吳雲泰現任驍騎校商阿塔國正白旗人世居那木都魯地方部委夸蘭大從初來歸其孫阿普達理由佐領贈雲騎征西藏擊賊陣亡職又商阿塔親弟達哈蘇之尉其子齊格現襲曽孫富爾瑚原任䕶軍校薩哈連現任二等侍衞侍衞什長以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗瑪鼐哈達地方人其曽孫岳和諾原任䕶軍叅領貝和諾原任驍騎校額爾登布現任驍騎校元孫王滿色原任佐領蘇完柱原任協領和彌達原任䕶軍校桑格原任䕶軍叅領四世孫特松額現任驍騎校右係國初來歸之人康儀理氏康儀理為滿洲一姓其氏族世居費爾塔哈村地方布拉察哈國鑲黄旗人世居費爾塔哈村地方從征江西於初來歸其孫阿爾賽由䕶軍叅領宜黄縣擊敗賊武文備兵四千餘衆續征貴州在平遠州擊賊陣亡贈雲騎尉其子努赫齊襲職任三等侍衞卒其子海常襲職現任委署步軍校又布拉察哈之曽孫覺禪原任䕶軍叅領右係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗渾岱費爾塔哈村地方人其子瑚錫布原任驍騎校右係國初來歸之人額爾吉氏額爾吉為滿洲一姓其氏族世居薩哈爾察地方訥圖庫國鑲白旗人世居薩哈爾察地方京從征雲南於初來歸其子阿爾楚由委署章黄草壩地方擊敗賊偽將何繼祖等兵二萬餘衆又賊偽將胡國秉率兵萬餘出雲南城拒戰并擊敗之敘功授雲騎尉因病告退其曽孫三達色現襲職右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗巴哈親薩哈爾察地方人其曽孫保住原任䕶軍校元孫博爾納現任二等䕶衞佛蘭現任三等䕶衞右係國初來歸之人舒墨理氏舒墨理為滿洲一姓其氏族世居沾河及烏喇地方卓滿國鑲藍旗人世居沾河地方領秦岱由委署䕶軍初來歸其孫常保原任佐校從征雲南於石門坎黄草壩地方擊敗賊將何繼祖等兵二萬餘衆又擊敗賊將胡國秉兵於雲南城下敘功授雲騎尉因病告退其子四格襲職又卓滿之元孫道保現任防禦右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗顔扎庫烏喇地方人其孫赫色原任驍騎校右係國初來歸之人錫克濟拉氏錫克濟拉為滿洲一姓其氏族世居黒龍江地方薩爾竒正黄旗人世居黒龍江地方來歸年分無考其孫穆克錫塔由三等侍衞從征尼魯特噶爾丹奮勇破賊有功授雲騎尉卒其子善徳現襲職右係應立傳之人其餘無事蹟可立傳者附載於後正黄旗松吉爾圖黒龍江地方人其子布爾蓀原任步軍校孫尼雅爾﨣現任副䕶軍叅領右係來歸年分無考之人徳敦氏徳敦為滿洲一姓其氏族世居黒龍江地方揚周國鑲黄旗人世居黒龍江地方任䕶軍校齊爾察初來歸其曽孫廸穆丕尼原由䕶軍叅領從征厄魯特噶爾丹奮勇破賊有功授雲騎尉因年老告休其子達海襲職現任陵寢翼長又揚周之元孫偏圖現任前鋒校四世孫錫綬現任䕶軍校右係應立傳之人其餘無事蹟可立傳者附載於後正藍旗瑚都渾黒龍江地方人其子吳進現任䕶軍校恩格黒龍江地方人其孫恩特現係副榜以上俱係來歸年分無考之人珠格氏珠格為滿洲一姓其氏族散處於烏喇等地方卓普托國正白旗人世居烏喇地方給事中四世孫富爾初來歸其元孫同保原任哈現任䕶軍校和屯布由防禦從征厄魯特噶爾丹奮勇破賊卒後敘功贈雲騎尉其子常保孫僧塔相繼承襲右係應立傳之人其餘無事蹟可立傳者附載於後鑲白旗薩爾堪寧古塔地方人其孫三格原任給事中四格原任主事曽孫常泰原任筆帖式塞徳現任䕶軍校由正黄旗改隸鑲紅旗攸拉禪薩哈爾察地方人其四世孫常保現任䕶軍校以上俱係國初來歸之人卦爾察氏卦爾察本係地名因以為姓其氏族散處於卦爾察等地方阿蘇鑲藍旗人世居卦爾察地方來歸年分無考原任驍騎校其子索柱亦原任驍騎校孫雅蘭泰由䕶軍校從征厄魯特噶爾丹在昭莫多地方擊賊陣亡贈雲騎尉以其子布蘭泰承襲縁事革退其親弟恩特和泰襲職葉龍額國鑲黄旗人世居長白山地方帖式孫徳明原任初來歸其子薩爾布原任筆刑部尙書曽孫衆神保現任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正白旗拉普特吉林烏喇地方人其子堪希原任叅領孫拜山原任鳴贊愛塔原任叅領曽孫恭額原任䕶軍校竒蘭布原任給事中元孫法保原任助教圖穆岱吉林烏喇地方人其孫蘇瓦顔原任協領曽孫伊敦原任佐領海蘭原任驍騎校喀喇原任藍翎侍衞以上俱係國初來歸之人鑲紅旗顔布祿扎庫木地方人其子吳岱原任六品官孫吳桑額原任步軍校曽孫吳保原係生員右係來歸年分無考之人多爾衮氏多爾衮為滿洲一姓其氏族世居愛湖城及索倫地方額伊瑚訥正黄旗人世居愛湖城地方來歸年分無考其孫楞格由頭等侍衛從征凖噶爾在和通呼爾贈雲騎哈腦爾地方擊賊陣亡尉其子訥齊訥現襲職右係應立傳之人其餘無事蹟可立傳者附載於後正黄旗索爾泰索倫地方人其曽孫馬保住現係副䕶軍校右係來歸年分無考之人洪佳氏洪佳為滿洲一姓其氏族世居烏喇及長白山地方瑪寧阿國正白旗人世居烏喇地方驍騎校從征凖噶爾初來歸其元孫阿林保由贈雲騎在和通呼爾哈腦爾地方擊賊陣亡弟吳爾祜尉其子四十八現襲職又瑪寧阿親之子巴爾泰原任司庫孫普廣原任驍騎校右係應立傳之人其餘無事蹟可立傳者附載於後鑲藍旗包衣額爾格長白山地方人原任三等䕶衞右係天聰時來歸之人孟佳氏孟佳為滿洲一姓其氏族散處於郭爾羅斯等地方瓦納漢國正黄旗人世居郭爾羅斯地方部侍郎索克索初來歸其曽孫布顔圖原任吏原任驍騎校元孫保住原任防禦常安原任主事福祿原任筆帖式四世孫瑪色原任驍騎校右係應立傳之人其餘附載於後正黄旗班濟那伊巴丹地方人其子碩色原任驍騎校曾孫傅明現任筆帖式鑲紅旗尚武伊巴丹地方人其曾孫哲庫原任步軍校色勒布原任驍騎校布延圖原任䕶軍校元孫興色亦原任䕶軍校四世孫錫璧原任防禦雅圖原任五品官正藍旗塔爾圖渾春地方人原任筆帖式以上俱係國初來歸之人克音氏克音為滿洲一姓其氏族散處於黒龍江等地方齊漢泰國正白旗人世居黒龍江地方牧曽孫錫爾璊現初來歸其孫克特圖原任所任副都統元孫倫布現任六品官右係應立傳之人其餘附載於後正黄旗綽哈色欽地方人其曽孫約倫泰現任驍騎校鑲白旗鄂竒達烏喇地方人其孫阿球現任步軍校曽孫顧爾巴岱原任䕶軍校蘇爾巴岱原任佐領由正白旗改隸以上俱係國初來歸之人正白旗班布賚努克特勒地方人原任頭等侍衞其子察哈岱原任二等侍衞孫海保現任驍騎校右係崇徳時來歸之人明安氏明安為滿洲一姓其氏族世居界凢地方羅多渾上鑲黄旗人世居界凢地方天聰時來歸原任二駟院大臣其子碩色原任驍騎校帕格原任等侍衞鈕鈕原任副都統薩克愼原任藍翎侍衞孫薩哈達原任翰林院侍讀齋山原任員外郎愛山原任驍騎校扎克丹原任副都統扎海原任筆帖式曽孫額爾赫原任叅領石良現任六品官又羅多渾之族孫丹布原任䕶軍校曽孫那秦原任副䕶軍叅領右係應立傳之人其餘附載於後鑲黄旗博松鄂界凢地方人其元孫瑪爾喜原任驍騎校四世孫邁格原任佐領五世孫海綬巴進泰俱原任步軍副尉圖喇現任䕶軍校右係國初來歸之人烏禮蘇氏烏禮蘇為滿洲一姓其氏族散處於齊齊哈爾等地方鄂浡托正白旗人世居齊齊哈爾地方來歸年分無考其子喀喇現任寧夏副都統孫烏爾登現任御前二等侍衞帕爾圖現係廕生右係應立傳之人其餘附載於後正紅旗赫徳理黒龍江地方人其曽孫桑格現任親軍校鄂爾琨黒龍江地方人其孫赫都訥原任驍騎校曽孫綽博泰原任步軍校鑲藍旗景文齊齊哈爾地方人其孫達鼐原任驍騎校珠蘭泰輝發地方人其孫耿額徳原任䕶軍校以上俱係國初來歸之人正白旗瑚納布齊齊哈爾地方人其孫庫特内原任佐領楞俄衮齊齊哈爾地方人其孫晉圖現任二等侍衞敬思鼐黒龍江地方人其子阿理渾現任三等侍衞以上俱係來歸年分無考之人薩哈爾濟氏薩哈爾濟為滿洲一姓其氏族世居葉赫及白都訥地方富泰正黄旗包衣人世居葉赫地方來歸年分無考其四世孫丹岱原任三等侍衞五世孫丹布亦原任三等侍衞二格原任郎中喀賚原任員外郎六世孫薩弼原任武備院卿常綬原任二等侍衞兼佐領七世孫薩克愼原任長史薩齊庫原任司庫順孝現任筆帖式塔敏現係監生濟倫現係生員八世孫哈清阿現任三等侍衞賚徳現任驍騎校善慶善保俱現任筆帖式右係應立傳之人其餘附載於後正紅旗博楞泰葉赫地方人其曽孫白達色現任䕶軍校右係國初來歸之人鑲紅旗拜達理白都訥地方人瑚雅白都訥地方人以上俱係康熙時自科爾沁撤囘之人八旗滿洲氏族通譜卷五十五欽定四庫全書
