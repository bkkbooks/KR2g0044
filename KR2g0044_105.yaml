body:
  text: 八旗滿洲氏族通譜卷五十二墨爾哲勒氏墨爾哲勒為滿洲一姓其氏族世居松花江地方強圖理鑲黃旗人世居松花江地方天聰時來歸其子扎努喀因纍世輸誠進貢又率四十四户與佐領鄂爾博綽瓦旒遷於寧古塔地方一體效力太宗文皇帝嘉之優尉任佐領卒其子阿哈理承襲卒賜騎都尉兼一雲騎其孫佛林保現承襲又強圖理之次子巴爾楚喀原任頭等侍衛兼佐領孫賽音圖現任頭等侍衛兼佐領多嘉原任佐領曽孫魏山現任副護軍參領兼佐領又強圖理兄之子屯泰原任三等侍衛翁格徹原任藍翎侍衛孫甘兌愛拉渾俱原任藍翎侍衛優凌阿芬達禪俱原任護軍校吳爾孝原任二等侍衛曽孫楚鼐現任護軍校希爾關進鑲黃旗人世居松花江馬那哈村地方因輸誠貢遂授村長卒其兄之子額爾住亦授村長後聖祖仁奉帝特旨將新滿洲編佐領因授村長額爾住皇為佐領以病告退希爾關之子瓦旒承襲佐領後率三十七户移任寧古塔地方奉旨嘉奬優授騎都尉卒其子星格理哈希理兄之子鄂克松阿先後承襲鄂克松阿卒其弟鄂通果承襲現任佐領又希爾關之姪達巴爾漢原任佐領吳爾琥原任三等侍衛孫錫穆圖原任佐領又希爾關族姪吳爾特穆原任護軍校孫四什原任三等侍衛嘉理善原任驍騎校曽孫雅爾泰現任護軍校蘇爾都瑚鑲黃旗人世居松花江地方天聰時來歸其曾孫竒韶原任佐領元孫布勒布爾達原任佐領外魯原任二等侍衛剛努原任驍騎校四世孫都爾哈原任佐領武麻善原任護軍參領哈濟喇原任驍騎校多鼐原任護軍校索隆果原任護軍參領兼佐領諾理爾達由二等侍衛同侍衛班領塞楞進藏在喀喇烏蘇查漢鄂博地方擊賊陳亡贈雲騎尉其親兄之子富廷阿現承襲又蘇爾都湖五世孫貴達現任步軍校德錫現任驍騎校胡新保現任協領喀凡鑲黃旗人世居松花江地方來歸年分無考其元孫他喜喀現任二等侍衛貝和由三等侍衛贈雲騎從征西路在克爾倫地方擊賊陳亡尉其孫布爾泰現襲職以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗宏鄂其曽孫倭赫現任侍御前頭等侍衛巴琥現任二等衛吳爾佳現任三等侍衛宏彀其孫圖穆照原任佐領曾孫瑚納原任三等侍衛元孫鄂索布原任步軍校庫來現任頭等侍衛額爾休現任協領費爾佳其曾孫查克都原任驍騎校元孫春布現任前鋒參領塞爾投原任包衣護軍參領噶爾巴現任護軍校登秀其孫永科原任佐領曾孫伊特倫原任頭等侍衛溫寶其子哲爾特原任二等侍衛額哲勒其曾孫哈普舟原任佐領都普達喀原任藍翎侍衛薩爾陶原任防禦元孫甘柱原任七品官穆爾塔其孫富臣原任佐領曾孫塔思瑚理原任三等侍衛元孫鄂諾恩岱原任驍騎校綽爾惠其孫竒勒德原任協領曾孫察思瑚原任三等侍衛納爾泰現任佐領法靈阿現任六品官穆尤其子德都愼原任佐領孫德勒古爾得原任佐領曾孫延岱現任三等侍衛滿圖瑚其子哈提原任藍翎侍衛正額勒原任三等侍衛陶旒其孫吳爾圖原任藍翎侍衛吳虞爾渾其曾孫都雅納原任護軍校以上俱世居松花江地方係天聰時來歸之人鑲黃旗吳什哈達其曾孫彰古理元孫哈瑚達俱現任三等侍衛格塞赫其元孫巴魯尼原任藍翎侍衛吳蘇瑚其元孫溫達理原任藍翎侍衛以上俱世居松花江地方係來歸年分無考之人索齊勒氏索齊勒為滿洲一姓其氏族散處於吉林烏喇等地方旺珠瑚國正藍旗人世居吉林烏喇地方𢎞文院大學士初來歸其元孫敦多輝原任內渾塔錫原任驍騎校四世孫德赫原任三等護衛博啓原任郎中博禮原係廕生瑚什巴原任協領郭濟由八品官從征廣東廣西屢敗賊兵續征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩敘功優授騎都尉任協領卒其子阿拉蜜襲職現任參領兼佐領五世孫石圖濟蘭俱原任筆帖式六世孫安圖現任護軍參領兼佐領布達理現任防禦科普托現任筆帖式色鼎原任護軍校又旺珠瑚之元孫蘇巴海之子尼雅哈由六品包衣大從征浙江福建擊賊陳亡贈雲騎尉其子常綬孫雅圖相繼承襲又蘇巴海之孫塔爾滿由委署驍騎校從征浙江福建有功授雲騎尉卒其子卓鼐襲職孫寶善原任驍騎校蘇巴海之後裔今隸本旗包衣松圖國鑲藍旗人世居吉林地方塔俱原任護軍校薩初來歸其曾孫兆拜琥什碧原任郎中愛音塔原任驍騎校哈爾松阿原任盛京工部侍郎元孫常住常明俱原任防禦彰保住原任筆帖式佛隆古原任鴻臚寺卿倭倫特原任四品官鄂穆丕原任護軍校梅爾圖原任佐領德爾都原任郎中常在現任前鋒參領寶昌原係副驍騎校四世孫富德原任河南巡撫明德外庫俱原任筆帖式滿布多爾晉俱原任員外郎武達理原任佐領桑格原任郎中福達理六格俱原任筆帖式吳本現任倉官五世孫富爾親現任中書富爾敏現任主事富成善現任筆帖式富元善現係廕生以上俱係應立傳之人其餘無事迹可立傳者附載於後正白旗碩色松花江地方人其子尼雅尼堪原任郎中鄂備原任頭等侍衛兼武備院卿孫噶布拉原任典籍郭禮原任筆帖式曾孫噶爾圖原任員外郎噶爾薩原任筆帖式永安現任主事鑲藍旗琥什塔吉林地方人其子薩竒納原任步軍校孫格圖肯原任驍騎校愛柱吉林地方人其子韓楚哈原任驍騎校孫哈什瑪原任步軍校安泰原任驍騎校拜布海吉林地方人其孫常舒現任前鋒校以上俱係國初來歸之人正黃旗包衣索爾和葉赫地方人其孫圖善原任內副管領成祿原任驍騎校曾孫塔法岱亦原任驍騎校明德原任筆帖式佛保現任藍翎侍衛元孫永泰現任筆帖式右係天聰時來歸之人托謨氏托謨為滿洲一姓其氏族散處於尹巴丹等地方春布理鑲紅旗人世居伊巴丹地方天聰時來歸其長子西爾哈納原任城門尉第三子富拉塔由防禦從征陜西於顯義關破賊偽總兵高定等兵圍秦州敗賊偽總兵李國棟兵於城下續征厄魯特噶爾丹在昭莫多地方敗賊有功優授騎都尉卒其子理保襲職卒其子西喇布現襲職又春布理之孫三泰原任防禦常書鑲藍旗人世居塔山堡地方來歸年分無考由委署參領從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗偽將胡國秉等兵於雲南城下敘功授雲騎尉卒其子武格襲職噶蘇鑲黃旗人世居哈達地方天聰時來歸其孫尼雅哈齊由委署護軍校從征雲南貴州屢敗賊李定國兵敘功授雲騎尉任參領卒其孫禧思哈襲職又噶蘇之曾孫希佛原任護軍校蓋穆鑲黃旗人世居哈達地方天聰時來歸其孫薩弼由驍騎校從征湖廣於茅麓山擊賊陳亡贈雲騎尉以其子積周承襲卒其子積什哈現襲職以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗托喀穆黑龍江地方人其孫白齊爾圖原任驍騎校曽孫巴爾齋現任護軍參領正白旗阿爾都善葉赫地方人其元孫五達色原係副護軍校正紅旗塔爾布齊齊哈爾地方人其子諾絡布原任步軍校以上俱係國初來歸之人正白旗訥赫遜黑龍江地方人其長子巴尼衮次子阿爾哈岱俱原任三等侍衛孫八十五原任佐領博濟爾岱黑龍江地方人其子博濟爾圖原任護軍校索爾碧禪努克特勒地方人原任護軍校正紅旗薩璧納黑龍江地方人其子桑格原任典儀孫巴朗原任護軍校官保住現任驍騎校正藍旗羅博圖蘇完地方人其孫德爾德原任防禦德爾布原係副護軍校瑪庫理蘇完地方人原任護軍校以上俱係來歸年分無考之人湯務氏湯務為滿洲一姓其氏族世居於哈達地方尹塔國正白旗人世居哈達地方古塔副都統孫拉琥初來歸其子海塔原任寧塔原任佐領瓦爾達由委署護軍校從征江西湖廣於建昌府新城縣等處擊敗偽總兵李茂著賊首邵連登等兵後梯攻長沙府首先登城陳亡優贈騎都尉以其弟之子花色承襲卒其子海順襲職卒其子燕珠哈現襲職又尹塔之曽孫倭赫原任給事中哈山原任佐領三黑現任驍騎校元孫吳達蘇原任司庫右係應立傳之人其餘無事迹可立傳者附載於後正黃旗烏魯素哈達地方人原任驍騎校其子傳哈達原任防禦孫艾山原任郎中綏哈達納爾泰俱原任護軍校羅密原任驍騎校曽孫法占原任護軍校特普克原任博士湯明現任筆帖式元孫五十一現任驍騎校田昌原係副護軍校鑲藍旗喀爾堪長白山地方人其孫倭和訥原任協領曽孫阿思哈原任筆帖式額爾色原係副驍騎校元孫寶成格原係副護軍校以上俱係國初來歸之人正黃旗嘉哈禪烏喇哈達地方人其子赫英額原任步軍校薩哈連哈達地方人其孫羅密原任六品官以上俱係天聰時來歸之人都拉喇氏都拉喇為滿洲一姓其氏族散處於吉林烏喇等地方唐泰正白旗人世居吉林烏喇地方來歸年分無考原任驍騎校其子尼雅瑪爾海原任三等侍衛扎瓦察原任二等侍衛孫達西爾圖原任三等侍衛扎魯察由藍翎侍衛委署前鋒參領從征贈騎都西藏在喀喇烏蘇地方擊賊被創身亡優尉其子那思圖現襲職巴喀瑪正白旗人唐泰同族世居烏克圖理地方來歸年分無考其子達爾達哈由藍翎侍衛取昭定贈雲騎藏在索羅莫地方擊賊陳亡親弟四達色現襲尉其子察爾碧哈襲職卒其職以上俱係應立傳之人其餘無事迹可立傳者附載於後正白旗圖爾巴楚黑龍江地方人其子恩克原任二等侍衛孫尤克圖原任驍騎校瑚斐圖現任三等侍衛右係來歸年分無考之人墨爾迪勒氏墨爾迪勒為滿洲一姓其氏族散處於黑龍江鄂竒村等地方達巴鼐正黃旗人世居黑龍江鄂竒村地方其子阿克島於康熙時率十六户四十餘丁來歸授為四品章京編半個佐領令其子黨錫統之其兄之子鄂爾博綽因纍世輸誠進貢又率三十一户八十丁遷居寧古塔與官兵一體效力優授騎都尉合併黨錫所統半個佐領共編一佐領使統之卒無嗣其親弟之子布勒恆襲職任佐領卒其子蘇倫達襲職又達巴鼐之曽孫登德烏禮堪俱原任佐領阿爾琥原任三等侍衛齊蘭布原任驍騎校四世孫徹旒現任佐領蓋圖現任護軍校佛克楚正黃旗人世居寧古塔地方來歸年分無考其曽孫尼酬肯原任驍騎校元孫赫穆音原任頭等侍衛發丑現任護軍統領兼佐領以上俱係應立傳之人其餘無事迹可立傳者附載於後正藍旗庫丑穆瑚村地方人其元孫鄂卓納富禮善俱原任驍騎校阿普泰原任佐領廷浩原任三等侍衛齊哈拉原任藍翎侍衛四世孫額爾圖原任四品官三保原任牧長薩楞泰原任驍騎校強武原任委署護軍參領安圖克爾楚俱原任佐領薩爾泰現任驍騎校五世孫葉爾登現任佐領特克色赫黑龍江地方人其孫鄂農果原任驍騎校梅素原任二等侍衛曽孫達色現任三等侍衛薩爾泰現任步軍校圖性格商顔倭赫地方人其子穆爾渾徹原任三等侍衛巴有商顔倭赫地方人原任護軍校其子勒丑原係副驍騎校又巴有之弟密桑阿原任三等侍衛米提優穆瑚村地方人其曽孫倫布原任三等侍衛以上俱係來歸年分無考之人喀爾達蘇氏喀爾達蘇為滿洲一姓其氏族散處於烏喇等地方庫爾布鑲紅旗人世居烏喇地方天聰時來歸其孫莽古禪由驍騎校從征四川於平陽關擊敗賊葉總兵等兵萬餘衆又屢敗賊偽將王屛藩等兵數萬於盤龍山敘功優授騎都尉任佐領卒其子渾托和襲職因年老告退其子福綬現襲職又庫爾布之曽孫威赫現任佐領右係應立傳之人其餘無事迹可立傳者附載於後鑲紅旗公古代黑龍江地方人其子諾爾齊原任護軍校孫博色理原任二等護衛諾色理原任頭等護衛曽孫新魁原任郎中右係國初來歸之人鑲紅旗雅隆阿公古代同族黑龍江地方人其子濟明阿原任護軍校孫瑪納武爾原任驍騎校三布公古代同族索倫地方人其子拜布理原任步軍校以上俱係來歸年分無考之人赫舒理氏赫舒理為滿洲一姓其氏族散處於哈達等地方舒瑚魯鑲黃旗人世居哈達地方夾歸年分無考其孫薩哈爾察由護軍校從征江西於建昌府鐘鼓山擊敗賊首李茂著兵一萬餘衆續征雲南擊敗賊偽將何繼祖王有功等兵於黃草壩又賊偽將胡國秉等率兵萬餘出雲南城拒戰並擊敗之敘功優授騎都尉卒其子馬晉泰襲職卒其子八十三現襲職果和國鑲黃旗人世居哈達地方校從征雲南於沅江初來歸其孫登庫由驍騎府屢敗賊偽總兵馬賔仲孫應斗等兵續征廣東在韶州府擊賊陳亡贈雲騎尉其子索柱襲職從征厄魯特噶爾丹奮勇破賊有功授為騎都尉因年老告休其子常祿襲職卒其子滿色襲職現任佐領以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗武敏特松花江地方人其子佛爾綽原任驍騎校孫薩瑪拉原任防禦右係國初來歸之人鑲紅旗安純虎攔地方人其孫六達色原任主事元孫托晉現任護軍校右係天聰時來歸之人輝羅氏輝羅為滿洲一姓其氏族散處於松花江等地方額爾赫圖國鑲黃旗人世居松花江地方從征江西擊敗賊初來歸其孫托色由護軍校偽總兵李茂著等兵數萬餘衆續征雲南賊偽將胡國秉率兵萬餘出城拒戰擊敗之敘功優授騎都尉卒其子蘇巴理襲職現任雲麾使右係應立傳之人其餘無事迹可立傳者附載於後鑲黃旗哈普起輝發地方人原任員外郎其孫章旒原任筆帖式鑲白旗唐碩烏喇地方人其孫訥通格原任七品官由正黃旗改隸以上俱係國初來歸之人鑲黃旗德克順松花江地方人其孫吳碩色原任防禦右係來歸年分無考之人八旗滿洲氏族通譜卷五十二
