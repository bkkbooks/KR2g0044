body:
  text: 八旗滿洲氏族通譜卷七十七附載滿洲旗分內之尼堪姓氏董氏董芝翰鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其子董國政原任遊擊董登文鑲黃旗包衣管領下人世居義州地方來歸年分無考原任牧長董制彩鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考其子二格原任筆帖式孫六格亦原任筆帖式董艾濟鑲黃旗包衣管領下人世居遼陽地方來歸年分無考其孫長保原係生員董受倉正黃旗包衣人世居撫順地方來歸年分無考其元孫董明芳原任護軍校董賢芳現任六品官董廷芳現任員外郎馬色現任司庫保成現係庫使四世孫董䝉現係舉人留德錦保黑兹俱現係庫使董翰傑正黃旗包衣管領下人世居瀋陽地方來歸年分無考其子董國柱原任牧長曽孫觀音保現任內副管領董國新正黃旗包衣人世居瀋陽地方來歸年分無考其五世孫董世祿現任筆帖式董國柱正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫長德原任庫掌董應陸正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫董成美現任庫掌恩特合現係庫使董留紀鑲藍旗包衣人世居瀋陽地方天聰時來歸原任六品包衣大其子董天祚原任守備孫七十八原任典儀吳氏浩善鑲黃旗包衣管領下人世居中後所地方來歸年分無考其子七十原任內管領孫西特庫亦原任內管領曽孫常福現任內副管領常亮常泰傅海俱現任筆帖式元孫武通額亦現任筆帖式吳珍亨鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其子吳昭籓原任知縣吳衍俊鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考其子吳宏祚原係廄副吳尚禮正黃旗包衣人世居瀋陽地方來歸年分無考原任同知其子吳紀百原任郎中孫吳雲興原任四品官曽孫四格原係生員吳良璧正黃旗包衣人世居瀋陽地方來歸年分無考其孫吳國隆原任筆帖式吳受益正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫吳偉吳深俱係生員班第正白旗包衣管領下人世居瀋陽地方圖國初來歸其孫來永現任廄長曽孫額渾現任三等侍衛吳瞻儀正白旗包衣管領下人世居瀋陽地方來歸年分無考其元孫福森布福色克俱現任筆帖式堯泰正藍旗包衣人世居瀋陽地方來歸年分無考其子常受原任牧長曽孫二格丑色俱現任護軍校元孫保爾現任司庫吳受倉正藍旗包衣人世居瀋陽地方來歸年分無考其曽孫黑逹色現任八品官金氏金浩善正黃旗包衣人世居瀋陽地方來歸年分無考其曽孫金朝升原任遊擊元孫金良材原任筆帖式四世孫金大成亦原任筆帖式金大鵬原任千總金大升現係生員金文具正黃旗包衣人世居瀋陽地方來歸年分無考其子金有庫原任員外郎金繼祖正白旗包衣人世居瀋陽地方來歸年分無考其孫金成良原任鳯陽府鹽法道金雯聚正白旗包衣人世居瀋陽地方來歸年分無考其子塞爾布原任員外郎金汝相正白旗包衣旗鼓人世居遼陽地方來歸年分無考其元孫穆滕格現係武進士金文成正白旗包衣管領下人世居金德城地方來歸年分無考其曽孫恆儀現係候選州同元孫恆裕國現任筆帖式金剛正白旗包衣人世居瀋陽地方來歸年分無考其元孫金士英原任筆帖式塞克理正藍旗包衣人世居瀋陽地方來歸年分無考其元孫六十三現任護軍校金棠正藍旗包衣人世居瀋陽地方來歸年分無考其元孫塞克圖原任筆帖式四世孫六十三現任護軍校金國泰鑲藍旗包衣人世居瀋陽地方天聰時來歸其子金世祿原任參領孫塔思泰原任驍騎校金黑色現任護軍校許氏許傑鑲黃旗包衣人世居撫順地方來歸年分無考其孫許兆麟原任員外郎元孫許敏原任護軍校許升鑲黃旗包衣人世居瀋陽地方來歸年分無考其曽孫許偉英原任司庫許德成正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫許飬修原任知縣許飬浩現係生員曽孫許平許資許仁俱現任筆帖式許登魁正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫許格考原係廄副許茂官正白旗包衣管領下人世居遼陽地方來歸年分無考其孫許天爵原任員外郎曽孫景文現任司庫許夢忠現任郎中甘受原任筆帖式許國聘正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其子許元亨原任千總孫許可久原任八品官元孫孫泰原任護軍校四世孫鼎柱現任藍翎侍衛許制孝正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫赫達色原任筆帖式曽孫海保常保俱現任筆帖式許官鑲白旗包衣管領下人世居瀋陽地方來歸年分無考其元孫許志良現任都司許志忠現係候選州同許升正藍旗包衣人世居瀋陽地方來歸年分無考其曽孫許九格現任三等護衛元孫七十三現任護軍校黃氏黃泰鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考原任內管領其曽孫來華原係牧副黃受理鑲黃旗包衣人世居郎家堡地方來歸年分無考其曽孫黃文升現任驍騎校元孫常清原任筆帖式黃國泰鑲黃旗包衣管領下人世居塔山地方來歸年分無考其曽孫元保百嵗俱原任筆帖式黃彥法正白旗包衣人世居瀋陽地方來歸年分無考其曽孫黃國棟現任護軍校阿哈立正白旗包衣管領下人世居遼河地方來歸年分無考原任司胙官其子留柱原任庫掌黃易春正紅旗包衣人世居遼陽地方司國初來歸其孫黃廷獻原任通政使右通政曽孫黃正原任知州黃順黃鑑黃榮俱原任知縣元孫黃得志現任筆帖式黃德溥現任牧長黃得時現係貢生黃得英現係生員四世孫黃大寧亦現係生員黃世彥正紅旗包衣管領下人世居撫順地方來歸年分無考其曽孫黃國泰現任護軍校黃宗聖正紅旗包衣人世居鐵嶺地方庫國初來歸其曽孫黃雲現