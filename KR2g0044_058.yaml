body:
  text: 八旗滿洲氏族通譜卷二十八完顔氏完顔本係地名因以為姓其氏族散處於完顔及各地方完顔地方完顔氏葉臣鑲紅旗人世居完顔地方天聰時來歸由閒散取遼東有功授三等輕車都尉從征朝鮮梯攻易州克其城授為二等輕車都尉駐劄蒙古地方有車臣䝉古四帳房人逃走葉臣追及斬之叙功優授三等男初過北京征山東攻克永平府城以功優授三等子尋授都統以虎爾哈百人編為佐領使統之征皮島克之斬其守島總兵沈世魁叙功優授一等子卒將一等子改為二等子與長子車爾布承襲餘一雲騎尉與第五子車赫圖承襲車爾布初由䕶軍統領定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆又追至慶都縣敗之授騎都尉從征陜西於延安府等處連敗流賊馬歩兵數次叙功加一雲騎尉縁事䧏為雲騎尉後因承襲伊父二等子將伊本身之雲騎尉亦令伊弟車赫圖承襲併為騎都尉車爾布由二等子三遇恩詔加至三等伯後征浙江舟山於夏闗地方擊敗偽總兵毛光祚兵二千餘衆又於兩斗門地方斬偽總兵王長樹並殺賊兵八百餘名偽英毅伯阮思等率兵於海上拒敵兩敗之斬偽英毅伯阮思等十六人生擒偽總兵林徳等一百餘人斬之獲大印四顆銅印二十二顆船二十五隻紅衣法熕等礟一百六十餘位又招撫偽總兵八人偽副將叅將遊擊都司守備等九十餘人賊兵三千餘衆恢復舟山安定百姓以功優晉一等伯兼一雲騎尉緣事削去恩詔所加之騎都尉兼一雲騎尉䧏為三等伯歴任都統卒賜祭𦵏如典禮其子莽喀承襲三等伯歴任都統卒其子圖祿承襲三等伯縁事革退其子恒義現襲恩詔加三等伯車赫圖由騎都尉三遇臣次子車倫襲至二等輕車都尉卒無嗣以葉職歴任副都統卒其子車訥福襲職歴任都統卒其孫常保襲職時削去恩詔所加之職承襲騎都尉卒伊叔祖之子齊克塔哈襲職現任佐領又葉臣第三子車爾和原任䕶軍叅領第四子百爾赫原任頭等䕶衞孫清保原任給事中瑪色原任御史拉色原任副都統揚保原任前鋒侍衞白碩色原任二等䕶衞車爾特永福俱原任佐領曽孫車祿車克俱原任三等䕶衞清海原任二等䕶衞車柱原任郎中車爾素現任郎中兼佐領陽泰原任佐領栢爾特原任八品官元孫車書現任五品官按葉臣與本旗拉哈地方蘓山松古理正白旗訥圖地方額克楚等同族博爾晉國鑲紅旗人葉臣同族世居完顔地方統之從征初率屬下來歸授侍衞初編佐領使扎魯特昻安貝勒以三十人大敗之䧏其部衆征東海虎爾哈䧏其五百户而歸以功擢置十扎爾固齊之列尋授都統征朝鮮取成而返又招䧏蒙古瓦爾喀衆部落叙功授為一等男後誥勅不因遺失康熈四年八月得承襲聖祖仁皇帝賜諡忠直勒石紀焉博爾晉之長子本托輝原任都堂次子順托輝原任佐領第三子根特赫原任前鋒叅領第四子特晉以任事有能不違指使授騎都尉後圍錦州徃杏山取蘓班代遇杏山兵擊敗之圍松山擊敗洪承疇馬兵定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆叙功授為三等輕車都尉尋陞兵部理事官五載考績稱職授為二等輕車都尉三遇恩詔加至三等男征四川擊賊張獻忠等兵屢敗之又恢復湖廣一府三州十縣三衛安撫其民又招䧏貴州九府五州十四縣十一衞及大小偽官千餘員賊兵四千五百餘衆叙功授為二等男賜祭𦵏歴任都統議政大臣兼佐領卒其功焉其子特如典禮諡襄壯立碑於墓以表爾黒襲職任叅領兼佐領卒其孫額爾德襲職歴任散秩大臣副都統兼佐領縁事革退伊親恩詔所弟額爾綬襲職時削去都尉現任佐領又博爾加之職承襲一等輕車晉之孫羅多理原任䕶軍叅領兼佐領瑪秦由䕶軍叅領過北京征山東擊敗吳總兵歩兵圍錦州擊敗松山賊兵定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆又追至慶都縣敗之恩詔加叙功授騎都尉遇都統卒無嗣其親兄之子康一雲騎尉歴任副恩詔加喀拉襲職兩遇尉歴任副都統卒至二等輕車都賜祭𦵏如典禮其子堪達海襲職任委署䕶軍叅領因病告退其親弟王常襲職時削去恩詔所加之職承襲騎都尉歴任綏逺城建威將軍卒其親兄之子常寕現襲職又博爾晉之孫察瑪海由前鋒侍衞定鼎燕京時在山海闗外擊敗流賊唐總兵馬歩兵復追至慶都縣敗之後征贈雲騎流賊至延安府殁於陣思漢襲職三遇尉無嗣其親兄之子羅恩詔加至三等輕車都尉征雲南貴州在陸噶地方擊敗賊李定國等兵叙功授為二等輕車都尉任䕶軍叅領卒其子阿柱襲職任前鋒侍衞兼佐領卒其子章格襲職卒無嗣其親伯羅察襲職恩詔所時削去承襲騎都尉歴任副都統工部侍郎兼加之職佐領因年老告退其子羅興泰襲職卒削去伊祖羅思漢軍功所得之雲騎尉伊子福明現襲雲騎尉又博爾晉之長子本托輝之曽孫汪蘓原任佐領孔托理原任長史噶爾泰原任協領薩爾泰原任同知噶爾璽現任右翼前鋒統領嚮導統領兼佐領元孫羅音泰原任四川布政使羅明泰原任員外郎邁柱原任長史富寕現係廕生噶世進現任署正崑寕現係舉人郎宻原任䕶軍校圖漢原係副驍騎校四世孫富昌現任佐領邁世蘭現任典儀又博爾晉次子順托輝之子恩特赫原任䕶軍叅領兼佐領孫禪布原任江寕副都統額什騰原任佐領恩格騰原任筆帖式曽孫阿世屯原任三等䕶衞阿爾圖現任副叅領兼佐領圖敏現任驍騎校察世圖圖什屯俱原任筆帖式元孫富海現任筆帖式又博爾晉第四子特晉之孫額世楞原任員外郎兼佐領額勒楞原任佐領曽孫額爾明現任員外郎偉赫訥現任主事元孫岱文岱勇岱智俱現任筆帖式愛音察國正黄旗人葉臣同族世居完顏地方事官五載初來歸其次子愛音布初任户部理恩詔加考績稱職授雲騎尉三遇查弼納襲職歴任兵至三等輕車都尉卒其孫部尚書後授為副將軍征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡其子納星阿襲職時削恩詔所去之職承襲雲騎尉緣事革退其親弟納清阿加贈騎都襲職後因追叙伊父查弼納陣亡之功併為三尉兼一雲騎尉亦令伊子納清阿承襲等輕車都尉緣事革退其親叔之子四格現襲職又愛音察之孫外音布原任叅領兼佐領賽住原係雲騎尉馬唐阿原任博士曽孫薩爾竒納原係雲騎尉賽弼納原任歩軍校馬舒原任鳴賛元孫西爾丹原係雲騎尉明成現任賛禮郎四世孫菩薩保現任佐領赫成現任五品官由鑲藍旗改隸英莪國鑲藍旗人葉臣同族世居完顔地方原任叅將初來歸初編佐領使統之其子達蘓塔哈布綽和絡俱原任佐領都爾巴由佐領定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬恩詔加衆叙功授騎都尉三遇子色勒襲職任佐領卒至二等輕車都尉卒其恩詔所其子塞楞額襲職時削去革退其親叔之子綽加之職承襲騎都尉緣事克托現襲職又英莪之孫阿拉宻原任典儀綽思和瑪爾岱俱原任三等䕶衞保住原任佐領曽孫常祿瑪哈泰俱原任佐領偏圖現任佐領瑪占由佐領從征廣東廣西擊賊偽將范齊韓詹仰等兵二萬餘衆續征雲南擊賊偽將何繼祖等兵於石門坎黄草壩又敗賊將胡國秉等贈雲騎兵於雲南城下卒後叙功卒其子圖章阿現襲尉其子佟保襲職任佐領職又英莪之元孫常昇原任庶吉士都邁原任經歴明逺原任叅領兼佐領揚鼐由佐領取昭定蔵著有勞績叙功授雲騎尉卒其孫雅隆阿襲職又英莪之四世孫雅琥原任䕶軍統領兼佐領圖桑阿現任佐領杭阿國鑲藍旗人葉臣同族世居完顔地方䕶衛輝達初來歸其六世孫席喇巴原任三等薩林俱原任郎中尼雅哈齊阿岱俱原任驍騎校薩岱原任筆帖式七世孫阿那庫原任郎中常綬原任御史常慶原任員外郎常凱原任主事馬納海原任博士蘓瑪拉原任䕶軍校進泰常住常德常存俱原任筆帖式齊蘭布由防禦從征四川至盤龍山地方有朝天闗偽總兵石存禮率兵一萬七千餘衆設立三十餘營拒戰齊蘭布奮勇進擊陣亡贈騎都尉其子舒魯岱襲職又杭阿之七世孫禪布由防禦從征厄魯特噶爾丹於昭莫多地方奮勇贈雲騎破賊卒後叙功職卒其子三達色現襲職八世尉其子王來襲孫戴屯原任督捕衙門侍郎托絡現任驍騎校星德佛保俱原任郎中伽保原任典儀寕古理原任諭德達爾漢花色俱原任驍騎校富起現任員外郎金通阿現任筆帖式戴保王吉祿俱原任筆帖式德山現係副驍騎校九世孫雅竒原任郎中竒通額原任中書拉竒原任驍騎校福祿現任䕶軍校泰運泰平俱原任䕶軍校兆泰現任筆帖式伍濟圖成泰海存俱原任筆帖式十世孫福興原任員外郎福昌原任主事福恒現任員外郎福勒赫現任筆帖式博爾岱現係副䕶軍校由正紅旗改隸勒特國鑲紅旗人葉臣同族世居完顔地方同有賊兵初來歸其子巴岱由䕶軍校從征大贈雲騎犯營奮勇進擊陣亡遇尉其子景柱襲職兩恩詔加至騎都尉兼一雲騎尉卒其子薩海襲職又勒特之孫阿爾岱原任長史卓山布原任前鋒校曽孫噶思漢原任歩軍校達喜原任二等䕶衞達思漢賽必圖俱原任筆怗式元孫花色原任二等䕶衞邁柱原任前鋒侍衞石保原任三等䕶衞伊林保現任䕶軍校薩拉宻原任筆帖式孟安國鑲藍旗人葉臣同族世居完顔地方由佐領從初來歸初編佐領使統之其子穆鼐贈騎都征黑龍江殁於陣職遇尉其子穆爾賽襲恩詔加一雲騎尉任佐領縁事革退其親弟之子阿雅圖襲職時削去恩詔所加之職承襲騎都尉任佐領因病告退其子老格現襲職又孟安之孫納爾賽原任佐領曽孫赫雅圗亦原任佐領元孫赫臣原任典儀赫紳現任驍騎校赫雲現任䕶軍校四世孫安圖現任佐領赫爾錦現任筆帖式阿喀布祿國鑲藍旗人葉臣同族世居完顔地方西丹由佐初來歸其子魯克都理原任佐領孫領從征四川於朝天闗擊敗賊偽將石存禮等兵有功授雲騎尉卒其孫吳丹襲職從征陜西在顯義闗等處屢敗賊偽總兵髙定等馬歩兵叙功授為騎都尉縁事革退其親弟舒通阿襲職現任副䕶軍叅領兼佐領又阿喀布祿之曽孫瑚什布原任佐領四世孫都爾松阿額爾松莪俱現任筆帖式達爾本格現係副驍騎校吳孔額國鑲紅旗人葉臣同族世居完顔地方鈕由委署初來歸其元孫倭赫原任歩軍校琥䕶軍校從征浙江舟山擊賊偽英毅伯阮思等兵兩敗之續征雲南入緬國至阿窪城擒偽桂王有功授雲騎尉卒其子赫訥襲職任防禦又吳孔額之四世孫翁錫編塔哈俱原任員外郎達普達禮原任歩軍校翁克原任驍騎校巴本原任䕶軍校闗保原任中書五世孫蘓蘭㤗原任佐領星額理現任七品官禪都理蘓爾特俱原任筆帖式傅蘭泰原任驍騎校六世孫賽壁哈原任防禦雅蘭國鑲紅旗人葉臣同族世居完顔地方闗保原任初來歸其子卓爾布原任員外郎孫典儀輝蘭由䕶軍校從征山西擊逆賊王輔臣等兵陣亡贈雲騎尉其子索柱襲職任三等䕶衞卒其子常在襲職又雅蘭之曽孫雅圖現任防禦華色原任筆帖式阿爾塔錫科薩國鑲藍旗人葉臣同族世居完顔地方原任遊擊初率子弟族屬來歸其長子哲爾德次子哲葉理原任備禦孫和絡雅哈俱原任䕶軍校岱都理原任禮部侍郎曽孫常海原任翰林院侍講察拜原任郎中明泰王圖明祿昌啟察哈泰俱原任筆帖式元孫明圖原任御史兼佐領明保原任郎中兆林原任筆帖式克敏現任都事丙中現係監生廣衮國鑲紅旗人葉臣同族世居完顔地方京孫錫柱初來歸其子殷達虎齊原任十六章原任詹事府詹事尼瑪善原任三等䕶衞愛音布原任前鋒校碩爾泰原任䕶軍校曽孫岳思泰