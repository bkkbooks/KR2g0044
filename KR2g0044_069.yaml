body:
  text: 八旗滿洲氏族通譜目錄卷三十四吳扎庫氏洪尼雅喀齊綬以上俱有傳星薩那瑪寧碩翁科蘇克圖理穆克登薩哈連拉塔以上俱附載卦爾察地方錫克特理氏伊訥克塔那喀噶爾玖和托巴顔占泰以上俱有傳鄂隆達敦圖孔郭爾該古以上俱附載各地方錫克特理氏郭克舒右係有傳巴爾準額齊布額爾吉訥哈達岱錫敏春喀珠巴顔錫拉布敦拜𣲖古以上俱附載庫雅拉氏克徹尼布克徳扎庫納以上俱有傳愛泰額爾春輝和倫穆喇渾色爾圖阿喇楚阿晉泰竒承額扎哈達烏勒莫色爾球慶科佛忒訥愛努章吉納社庫伊禮布以上俱附載
  hash: sha256:ea29a57e9cff6aaa5ee0e6058587f3acda76860350332b2e30322bfdb16fd3c2
