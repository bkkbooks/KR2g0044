body:
  text: 八旗滿洲氏族通譜卷四十一寧古塔氏寧古塔本係地名因以為姓其氏族散處於寧古塔及各地方寧古塔地方寧古塔氏伊住國鑲白旗人世居寧古塔地方散二次過北京征初来歸其曾孫多尼喀由閑賜巴圖山東梯攻莱陽縣首先登城克之魯號授騎都尉遇恩詔加一雲騎尉又伊住之曾孫齊爾格慎以辦事有能不違指使授騎都尉遇恩詔加一雲騎尉因多尼喀無嗣將伊所得之職亦令齊爾格慎承襲授為一等輕車都尉兩遇恩詔加至三等男卒其孫孟阿達襲職現任䕶軍㕘領又伊住之元孫鄂色原任防禦穆成格原任䕶軍叅領岱祿原任主事四世孫雷住原任驍騎校常元原任六品官岱音保原任御史岱音布原任筆帖式岱齊禮現任協領五世孫勒起原任筆帖式佛慶現任額外主事永福現任七品官岱福現任典儀又伊住親弟圖庫之四世孫倭赫原任郎中由鑲黄旗改隸按伊住與正藍旗同里黨色同族尼喀禮國正藍旗人伊住同族世居寧古塔地方堯哈叛初率兄弟及村人来歸時有俄爾佗科奔烏喇尼喀禮追殺之又追殺叛逃之和木科諾并獲其馬又土勒申率兵来取沙喇城尼喀禮調取噶哈里地方兵擊敗之敘功授三等輕車都尉卒其子魏赫德襲職卒其親弟隨赫德襲職從征黒龍江攻克雅克薩外城黒龍江人引奔波果兒之兵来戰奮擊大敗之授為一等輕車都尉卒無嗣其親兄之子綽克托襲職三遇恩詔加至三等男歴任副都統緣事削去車都尉現任恩詔所加之職其孫約索禮承襲二等輕佐領又尼喀禮之孫克什圖烏布理俱原任佐領曾孫烏爾德赫原任副都統額爾德赫原任佐領元孫約斯海原任三等䕶衛富斯海原任主事又尼喀禮族裔蘇通保原任佐領專泰原係廕生囊機國鑲白旗人世居寧古塔地方卒其子烏魯喀襲初率本村人来歸授雲騎尉職過北京征山東梯攻莱陽縣克其城授為騎都尉卒其子郭禮襲職三遇恩詔加至二等輕車都尉卒其子呵哈那襲職從征湖廣攻長沙府城殁於陣贈為一等輕車都尉其子郭啟襲職卒其叔泰保襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其子永泰現襲職又囊機之曾孫塞都原任詹事府少詹事塞内原任筆帖式元孫塞徳理原任工部侍郎哲徳理原任䕶軍參領哲庫訥原任中書伊思原任筆帖式珠貴現任筆帖式四世孫伊通阿現任掌關防官伊通額現任筆帖式五世孫倭世洪額亦現任筆帖式僧額國鑲黄旗人世居寧古塔地方人来歸編兩個佐初率兄弟妻子及滿洲三百領一令僧額統之一令僧額之長子塞鈕克統之塞鈕克從征江南滅福王後於潼關地方屢恩詔加破流賊兵衆敘功授雲騎尉三遇襲職任佐領至三等輕車都尉卒其子佛岳絡卒無嗣其親弟之子長綬襲職任佐領後緣事削去恩詔所加之職其親伯之孫那音泰現襲雲騎尉又僧額第三子聶鈕克原任佐領孫索羅喜聶爾庫俱原任佐領邁圖原任三等侍衛瑪鼐原任張家口總管竒瑪爾達原任管守信礟官曾孫庫圖訥原任三等侍衛托克托和原任副都統鄂賴原任協領塞爾敏瑪進泰俱現任佐領六格現任驍騎校多博由佐領從征江西於中家營地方撃賊伊都督兵陣亡贈雲騎尉其孫薩克察現襲職又僧額之元孫桑格彭綬俱原任佐領鄂晉泰現任協領又僧額親兄揚武善之曾孫扎爾哈原任步軍校元孫二達色現任鳴贊拜色國鑲黄旗人世居寧古塔地方史四世孫胡什巴初来歸其元孫烏賴原任長原任副都統烏爾喜原任防禦蘇爾瑪由䕶軍校從征察哈爾布爾尼於大鹵地方擊敗賊衆敘功授雲騎尉後征雲南屢敗賊偽將何繼祖等兵於石門坎黄草壩地方又敗胡國秉等於雲南城下授為騎都尉任䕶軍參領卒其子蘇爾泰襲職任三等侍衛卒其子永綬現襲職又拜色之五世孫關保原任防禦瑚爾德原任協領雅圖原任驍騎校騷達色原任䕶軍校索柱原任筆帖式六世孫寧住現任防禦葉柱國正黄旗人世居寧古塔地方北京征山東攻陽初来歸其孫昻柱由領催過信縣不設鈎梯克其城授雲騎尉卒無嗣其親兄之子薩哈亷襲職遇恩詔加授騎都尉年老告退其子關保孫阿哈連相繼承襲阿哈連卒無嗣其族孫德興襲職時削去恩詔所加之職現襲雲騎尉又葉柱之元孫黒色原任驍騎校四世孫常明原任佐領瑪普禮原任協領薩穆哈原任六品官金聲老格俱現任䕶軍校薩哈達現任驍騎校五世孫穆克都渾耀徳保俱現任防禦六世孫六十一原任三等侍衛豐匹訥國正藍旗人世居寧古塔地方從征福建於洛陽初来歸其孫納海由驍騎校橋兩敗賊衆解泉州之圍又征厄魯特噶爾丹於昭莫多地方破賊有功授雲騎尉卒其子納爾善襲職現任佐領圖赫訥國鑲黄旗人世居寧古塔地方齊那原任主事孫初来歸原任前鋒校其子札哲蘇訥原任藍翎侍衛曾孫牛鈕由驍騎校從征厄魯特噶爾丹於昭莫多地方破賊有功授雲騎尉卒其親弟佟正襲職任三等侍衛翁嘉達正藍旗人世居寧古塔地方来歸年分無考其孫勒克原任佐領滿岱由委署䕶軍校從征雲南於石門坎黄草壩等處撃敗賊偽將何繼祖等兵又敗胡國秉於雲南城下敘功授雲騎尉年老告退其子梁祿襲職瑚克特克國鑲白旗人世居寧古塔地方個佐領使統之卒初率九村五十户来歸設半其子錫爾都承襲從征北京擊敗四總兵馬步兵敘功授為一個佐領卒其子舒書承襲卒其子寧圖承襲卒其子伊克坦現襲佐領又瑚克特克之曾孫舒錦原任員外郎瑚克特克之兄陵寢翼塔克圖原任祿原任主事吴巴泰原任員外郎長其曾孫排又瑚克特克親兄特克特克之子桓塔納原任步軍校孫特爾錦原任員外郎曾孫多永鄂原任参領元孫多順原任主事多紳原任筆帖式多綸現任署理山西按察使多寅現任筆帖式又瑚克特克親叔本諾之元孫拉穆岱原任筆帖式四世孫赫升額現任委署副䕶軍参領又瑚克特克族弟拜喀納原任步軍校伊子珠魯原任䕶軍校以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗阿圖納其子庫爾肯原任步軍校元孫黑達色現任䕶軍叅領鑲白旗貝琨其曾孫寧保現任防禦索爾活其元孫赫雅圖吳庫訥俱原任驍騎校包衣那蘇原任八品官正藍旗南泰其子阿尼瑚原任佐領朱爾坤其曾孫瓦齊喀文泰俱原任步軍校那拉原任䕶軍校元孫拜世泰原任防禦雅圖現任六品官羅密現任䕶軍校黨色其子拉哈里原任筆帖式孫達色原任䕶軍校曾孫喜格現任驍騎校按黨色與鑲白旗同里伊住同族德普特林黨色同族原任佐領其曾孫齊什現任驍騎校以上俱世居寧古塔地方係國初来歸之人鑲紅旗竒塔理其孫托賴原任佐領曾孫巴特海原任前鋒校元孫佛保住原任三等䕶衞馬延泰現任驍騎校又竒塔理親弟綽和諾之孫札克達納原任驍騎校又竒塔理親弟魏赫訥之孫富拉塔原任同知蘇完柱原任防禦瑪色其子瑪唐阿原任步軍校以上俱世居寧古塔地方係来歸年分無考之人各地方寧古塔氏雅穆什逹國正黄旗人世居綏分地方歸其曾孫碩色原任初率滿洲一百五十人来佐領元孫徳特亦原任佐領翁錫庫由閑散過北京征山東梯攻滕縣首先登城克之賜巴圖魯號授騎都尉三遇其子伊爾哈岱襲職歴任恩詔加至二等輕車都尉卒恩詔所都統卒其子舒爾圖襲職時削去子揚安襲職加之職承襲騎都尉卒其親伯之現任員外郎又雅穆什達之四世孫庫爾禪原任䕶軍㕘領滿丕原任兵部侍郎費揚古薩哈達俱原任驍騎校赫達色原任筆帖式賴都原任禮部尚書珠爾哈岱原任二等侍衛孟愛原任防禦五世孫阿晉泰蘇爾海俱原任郎中伊爾圖原任御史舒德原任主事席特庫原任城陵寢總守尉寧福興德圖琪俱現任員外郎常在現任管伊蘭泰現任防禦六世孫舒明原任翰林院庶吉士扎普齊現任副䕶軍叅領隆泰現任七品官蘇章阿現任同知佛爾慶格現任筆帖式珠隆格現任郎中明新寧智俱現任筆帖式達靈阿現任三等侍衛七世孫綽爾和現任驍騎校伊洛托鑲紅旗人世居訥殷地方来歸年分無考其子努山原任䕶軍叅領音布由筆帖式過北京征山東攻克慶都縣敘功授雲騎尉後征黒龍江陣亡其子伊爾特赫襲職定鼎燕京時入山海關破流賊馬步兵二十萬衆以功授為騎都尉三遇恩詔加至二等輕車都尉後於湖廣荆州府擊敗流冦一隻虎又征大同叛鎮姜瓖屢破賊衆續征浙江舟山擊敗偽英毅伯阮思等兵授為一等輕車都尉卒其子伊騰孫音丹相繼承襲音丹卒恩詔所無嗣其叔格爾圖襲職時削去尉卒其子希徳加之職承襲騎都尉兼一雲騎詔後軍襲職時又削去騎尉現襲騎都尉又伊洛托之功所得之一雲孫蘇完塔原任給事中倭赫原任叅領芬泰原任三等䕶衛遜泰原任典儀曾孫根泰伊三泰俱原任郎中格思特碩色俱原任筆帖式元孫五福伊爾通阿俱原任典儀吳明阿現任防禦四世孫常清現任筆帖式鄂爾多國正黄旗人世居虎爾哈地方騎校費雅住由閑初来歸其孫扎爾瑚原任驍散過北京征山東梯攻夏津縣以第二登城克之授雲騎尉後于東昌府擊土賊殁于陣贈為騎都尉因無嗣其親兄渾住襲職三遇職卒無嗣恩詔加至二等輕車都尉卒其子三楚喇襲恩詔所其親伯之孫額爾塞襲職時削去格現襲職又加之職承襲騎都尉卒其親弟桑鄂爾多之曾孫舒淑訥原任步軍校元孫格爾塞原任筆帖式阿鈕國正黄旗人世居和佟吉地方哈原任䕶軍校孫初来歸原任佐領其子薩穆伊爾格圖原任刑部侍郎都爾格圖原任筆帖式曾孫伊賴原任二等侍衛瓦爾達雅圖俱原任五品官以上俱係應立傳之人其餘無事蹟可立傳者附載於後正黄旗圖切陳和佟吉地方人其五世孫塞爾特原任筆帖式富明現任驍騎校六世孫官保原任主事伊僧原任驍騎校巴海原任三等侍衛七世孫赫赫現任肈羅道永泰現任筆帖式庫穆圖和佟吉地方人其元孫森特原任五品官五世孫明德現任䕶軍校科達納虎爾哈地方人其子達哈禪原任䕶軍校元孫三達色現任親軍校赫格現任前鋒校扎齊和佟吉地方人其曾孫文德原任驍騎校正白旗希爾圖倭濟地方人其孫舒書原任委署弓匠協領武舒原任䕶軍校羅密原任驍騎校曾孫吴爾登現任䕶軍叅領官保現任典儀元孫薩隆阿現任藍翎侍衛舎爾圖富隆阿俱現任䕶軍校又希爾圖親弟鄂爾岱之子羅羅渾原任七品官孫赫雅圖原任佐領鑲藍旗鄂黒綏分地方人其孫雅忠阿原任郎中以上俱係國初来歸之人正白旗包衣都柳薩魯城新村地方人其子托克都原任佐領元孫排祿原任員外郎右係来歸年分無考之人正紅旗阿魯哈達地方人其子楊愛原任佐領孫武拜亦原任佐領阿蘭楚原任驍騎校右係康熙時自科爾沁撤回之人薩哈爾察氏薩哈爾察為滿洲一姓其氏族散處于伊蘭費爾塔哈村及各地方伊蘭費爾塔哈村地方薩哈爾察氏唐阿禮國鑲黄旗人世居伊蘭費爾塔哈村地方統之取初率百人来歸授為騎都尉編佐領使遼東有功授三等輕車都尉卒其子喀喀穆承襲緣事降為騎都尉定鼎燕京時委署副都統留管後隊兵約束甚善加一雲騎尉後陞吏部侍郎五載考績以任事有能授三等輕車都尉恩詔加三遇等男緣事削去雲騎尉授為一等輕車都授三尉兼一雲騎尉原任江寧將軍兼佐領卒其子拉揚阿承襲緣事革退其姪德保承襲卒其子恩詔所托倫岱襲職時削去車都尉又唐阿禮之孫威加之職現襲三等輕色原任佐領佛爾諾原任前鋒統領兼佐領曾孫什保原任佐領常保原任筆帖式元孫鄂倫達原任佐領莫倫岱現任佐領丹布魯國鑲黄旗人世居伊蘭費爾塔哈村地方雲南在初来歸其曾孫馬爾漢由䕶軍校從征石門坎黄草壩桂花寺等處奮勇擊賊有功授雲騎尉卒其子羅密承襲原任協領又丹布魯之元孫胡什布原任步軍校騷達色現任驍騎校四格現任防禦以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗綽諾布其子觀音布原任員外郎元孫馬什泰現任三等侍衛拜思渾其元孫巴衍泰現任三等侍衛阿穆塔哈其孫鄂莫克托原任步軍校曾孫定柱原任驍騎校四世孫色克圖現任䕶軍校羅穆岱其孫五十三現係副䕶軍校以上俱世居伊蘭費爾塔哈村地方係國初来歸之人各地方薩哈爾察氏蘇庫努國正紅旗人世居烏喇綏哈村地方平定淮安時初来歸其曾孫訥雷由䕶軍叅領于黄河淮河等處撃敗流賊四萬餘衆追撃騰吉斯兵敗之又征土謝圖汗碩羅汗俱有功授恩詔加雲騎尉三遇都尉卒其孫雅琥承襲卒其弟福至三等輕車泰承襲原任都統緣事革退其親伯之元孫宗德襲職時削去恩詔所加之職現承襲雲騎尉又蘇庫努之元孫穆成額由前鋒叅領從征浙江在舟山地方擊敗偽英毅伯阮思等兵三萬餘衆又征福建於泉州府地方屢敗偽提督黄昌等賊艘一千餘隻後平定陜西於平凉等處擊敗賊王繼政兵萬餘衆敘功優授騎都尉任副都統卒其孫阿思海承襲由前鋒侍衛從征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡其子舒敏承襲騎都尉後敘伊父阿思海陣亡功績加一雲騎尉又蘇庫努之曾孫班卜布爾山俱原任驍騎校元孫吴達哈亦原任驍騎校阿哈尼堪阿通阿俱原任協領四世孫額赫訥吴巴泰俱原任步軍校納穆泰原任䕶軍校薩那海原任助教麻齊原任筆帖式五世孫博合亦原任筆帖式黒色原任䕶軍叅領索爾蓀原任佐領吳庫常齡俱現任䕶軍校倭信布原任二等䕶衛六世孫蘇爾泰現任驍騎校博勤現任員外郎西蘭泰現任二等䕶衛莽伊祿正紅旗人蘇庫努同族世居烏喇綏哈村地方来歸年分無考其子莽伊圖原任國子監司業孫舒書原任都察院副都御史曾孫九什原任員外郎雅爾泰現係倉庫官元孫什圖原任筆帖式孟額圖國鑲紅旗人世居薩哈爾察地方三等輕車都尉初来歸由騎都尉征明有功授卒其子綽諾承襲騎都尉後征寧逺中傷卒其兄阿吉承襲三遇恩詔加至二等輕車都尉卒其子翁古孫濟滿相繼承襲濟滿緣事革退其兄之子常保襲職時削去恩詔所加之職承襲騎都尉卒其兄之子萬福現承襲又孟額圖之孫吳達庫原任御史沙潭原任太常寺寺丞曾孫雙察原任郎中穆國璉原任佐領常在禪泰俱原任筆帖式元孫根泰原任佐領噶爾圖增福俱現任佐領以上俱係應立傳之人其餘無事蹟可立傳者附載于後正藍旗常清黒龍江地方人其孫西圖庫原任䕶軍校曾孫西拉哈原任三等䕶衛元孫九達色現任三等䕶衛西德現任驍騎校右係國初来歸之人鑲紅旗法噶貝德墨地方人其孫巴雅爾現任三等䕶衛琥雅白都訥地方人以上俱係康熙時自科爾沁撤回之人八旗滿洲氏族通譜卷四十一
