body:
  text: 八旗滿洲氏族通譜卷十三撒爾湖地方伊爾根覺羅氏瓜喇國正黃旗人世居撒爾湖地方征廣寧有功授騎初來歸其子喀凱由間散從都尉二次過北京征山東梯攻定興縣克其城加一雲騎尉圍錦州擊敗松山馬兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功優授為一等輕車都尉三遇恩詔加至二等男歷任通政使司通政使兼佐領年老告退將二等男令其子三人分襲次子常岱分襲三等輕車都尉任佐領卒其親弟賽碧漢襲職任協領卒其親兄之子色爾古襲職時削去恩詔所加之職承襲雲騎尉年老告退其子西安現襲職喀凱第五子舒書分襲雲騎尉卒其子舒爾圖庫襲職卒其子達黑襲職卒其弟達喜襲職卒無嗣其伯祖之孫永福現襲職喀凱第四子阿庫禮分襲三等輕車都尉從征江西湖廣於鄱陽湖建昌府等處擊賊首朱二等兵屢敗之又於萍鄉縣擊敗賊偽將夏國相等兵一萬三千餘衆敘功授為二等輕車都尉任護軍參領兼佐領卒其子博爾屯襲職任副都統兼佐領卒其子永福襲職時合併前襲伊叔祖舒書之雲騎尉授為一等輕車都尉現任護軍參領兼佐領又瓜喇之孫長綬蘇巴理俱原任三等侍衛富德原任禮部侍郎色勒原任鳴贊尼喀錫漢由護軍校圍錦州擊松山杏山馬步兵敗之又敗洪承疇三營步兵敘功授騎都尉卒無嗣其親叔之子索絡襲職遇恩詔加一雲騎尉卒無嗣其親弟托晉襲職卒無嗣其親伯之子西德訥襲職兩遇恩詔加至二等輕車都尉歷任工部侍郎年老告退其子富祿襲職緣事革退其親弟富喜襲職時削恩詔所去之職承襲騎都尉卒其子松鼐現襲職又瓜加喇之曾孫岱屯章柱三格洪廓俱原任筆帖式胡什屯原任三等侍衛蘇成額原任司庫平安原任員外郎兼佐領嶽爾泰現係副護軍校元孫卓敏原任三等侍衛蘇楞特輝色明海俱原任筆帖式賽哈原任佐領四世孫瑪希納原任筆帖式他希納原任五品官伊三泰現任佐領法保現任護軍校松竒現係監生按瓜喇與正白旗穵閧蕚漠地方尹達瑚齊鑲白旗嘉木湖地方噶哈善哈思瑚等同族恩特正黃旗人瓜喇親叔阿格尼之孫也其子鄭特由間散攻松山首先登進陳亡優贈騎都尉無嗣其親弟聶克色襲職三遇職卒其子瑪恩詔加至二等輕車都尉卒其子七十襲恩詔所色襲職時削去都尉卒無嗣其親弟玉德襲職加之職承襲騎卒其親弟玉恆襲職卒無嗣其親叔之子三碩色現襲職又恩特之孫四格蓀塔俱原任主事蘇瑪拉原任六品官七格原任郎中八格羅起俱原任筆帖式曾孫齊蘭布現任三等侍衛常林現任護軍校拉哈墨爾根國正黃旗人瓜喇同族世居撒爾湖地方哈原任初來歸原任內大臣兼佐領其長子噶佐領次子吳仆原任協領第三子富喀由前鋒侍衛破流賊滅福王平定河南江南等處屢著軍功又追滕吉思擊敗土謝圖汗及碩羅汗等兵敘功授雲騎尉三遇恩詔加至三等輕車都尉緣事降為騎都尉歷任副都統卒其孫阿錫坦襲職因病告退其子福永襲恩詔所職時削去襲雲騎尉又拉哈墨爾根之孫噶普加之職現岱原任筆帖式凖泰原任七品官諾爾布原任司庫禪布噶什太哲色俱原任三等侍衛羅爾岱由前鋒校從征雲南於玉龍關等處擊賊有功授雲騎尉卒其子齊仆伊襲職又拉哈墨爾根之曾孫八十原任步軍校九十原任佐領吳保柱原任筆帖式賚都原任三等侍衛布顔原任員外郎永泰現任筆帖式謨爾渾原係副驍騎校額爾都由七品官從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩敘功優授騎都尉後征厄魯特噶爾丹於昭莫多地方奮勇破賊有功加一雲騎尉卒其子額騰額襲職卒無嗣其親兄之子納楞泰襲職現任佐領又拉哈墨爾根之元孫全保原任護軍校明福現任筆帖式伊爾喀巴圖魯正黃旗人拉哈墨爾根親叔察胡尼之子也其長子錫漢原任佐領次子吳爾賽原任五品官第三子錫鼐原任三等侍衛孫喀爾齊海原任七品官費揚古原任四品官貴特原任護軍校曾孫塔進泰原任戶部侍郎台善原任員外郎元孫鄂善原任太子少保議政大臣都統兵部尚書步軍統領兼佐領緣事獲罪德寶現任驍騎校四世孫達興阿現任筆帖式清章原任五品官清彥原任藍翎侍衛羅洛渾國鑲白旗人瓜喇同族世居撒爾湖地方擊賊有初來歸其元孫塔海由間散從征孔圖贈騎都功設佐領使統之後攻松山陳亡優卒其子塞尉無嗣其親弟顧巴海襲職任佐領恩詔加黑襲職三遇都尉從征浙江舟山擊敗偽英毅至二等輕車伯阮思等兵於海上又征江西湖廣擊賊偽總兵李茂著及賊偽總督薑德洪等兵屢敗之敘功授為一等輕車都尉卒其親叔之子巴爾嘉襲職卒其親叔之孫哈里襲職卒其子普相襲恩詔所職時削去襲騎都尉兼一雲騎尉卒無嗣其親加之職承叔阿林襲職現任防禦又羅洛渾之四世孫額貝原任驍騎校納蒙阿原任三等護衛五世孫額爾塞原任詹事府少詹事舒書原任白都訥副都統僧保原任長史哈鼐原係監生六世孫多幹原任三等護衛薩爾賽原任筆帖式佛喜現任佐領翁果托現係副護軍校七世孫富爾瑚楞原任筆帖式由鑲黃旗改𨽻格善鑲白旗人羅洛渾之元孫也由佐領從征瓦爾喀獲丁壯五十人三圍錦州擊敗松山馬兵後破流賊滅福王平定河南江南等處屢著戰功授雲騎尉三遇恩詔加至三等輕車都尉緣事降為騎都尉後征浙江舟山擊敗偽英毅伯阮思等兵三萬餘衆敘功加一雲騎尉征福建於厦門地方擊海寇鄭成功兵陳亡優贈為二等輕車都尉任郎中兼前鋒侍衛因無嗣其親弟之子瑚什塔襲職歷任通政使司通政使年恩詔所老告退其親弟之孫洪阿圖襲職時削去九現加之職承襲三等輕車都尉卒其子七十襲職華善鑲白旗人羅洛渾之四世孫也由佐領從征江西於南康府等處擊賊偽提督顔子明等兵數敗之續征廣東廣西屢敗賊偽將馬寶范齊韓等兵於韶州府進兵雲南擊敗賊偽將何繼祖等兵於黃草壩又敗賊偽將胡國秉等兵於雲南城下敘功優授騎都尉卒其子華賴襲職任城守尉緣事革退其子倫序襲職現任佐領色伯察哈國正藍旗人世居撒爾湖地方筆帖式元孫班丹初來歸其曾孫薩克慎原任贈雲騎原任前鋒校卓鼐由防禦攻大同城中炮陳亡尉其子赫達色襲職從征福建於蓋峙山擊海贈為騎寇鄭成功兵陳亡卓克錫襲職卒其子卓佛和都尉無嗣其親弟襲職卒其親叔之孫蕭格現襲職又色伯察哈之四世孫溫普原任步軍副尉佟周原係副驍騎校常格原任主事五世孫海輝沙喀俱原任護軍校班布理原任防禦二麻色原任步軍校常住原任筆帖式博亮鑲白旗人世居撒爾湖地方來歸年分無考其孫正德赫原任防禦福哈達由委署護軍校從征江西於建昌府擊敗賊首李茂著等兵續征廣東屢敗賊偽將馬寶等兵於韶州府征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉等兵於雲南城下敘功授雲騎尉卒其子富達理襲職卒其子松官保現襲職又博亮之曾孫海保原任城門尉偏圖現任驍騎校元孫九十現任防禦以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲白旗包衣墨爾根原任五品包衣大其子溫齊原任六品包衣大孫朱達理原任三等護衛曾孫兆竒馬爾吉俱原任六品包衣大艾納原任佐領元孫定格現任護軍校又墨爾根之弟綏濟原任五品包衣大其長子蘇庫亦原任五品包衣大次子費揚古原任佐領孫蘇伯察碧俱原任佐領蘇赫訥蘇赫臣俱原任頭等護衛烏赫臣原係雲騎尉阿哈亷原任頭等護衛兼佐領曾孫沙碧原任六品包衣大常德原任驍騎校和索理原任頭等護衛兼佐領達色原係雲騎尉色濟楞常保住俱原係監生元孫安泰原任頭等護衛兼佐領四世孫德格現任頭等護衛兼佐領正藍旗穆成額其曾孫塞楞太現任司庫以上俱世居撒爾湖地方係國初來歸之人呼訥赫地方伊爾根覺羅氏噶蓋扎爾固齊國鑲紅旗人世居呼訥赫地方初來歸授為扎爾固齊奉太祖高皇帝命同額爾德尼巴克什初製清字創立滿文頒行國中其長子武善原任工部尚書兼佐領第三子布善由護軍參領圍錦州擊敗松山杏山馬步兵攻前屯衛克其城定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功授騎都尉厯任護軍統領卒其子夸瞻襲職三遇恩詔加至二等輕車都尉從征江西湖廣擊敗賊首邵連登賊偽將夏國相等兵於建昌府萍鄉縣等處敘功授為一等輕車都尉厯任都統卒其子夸錫塔襲職卒其子隆寶襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉任佐領因病告退其親伯之子拴住襲職現任佐領又噶蓋扎爾固齊之孫武泰原任佐領曾孫瓦爾達原任西安副都統圖克善原任員外郎達紹原任中書靠善華善俱原任佐領匡鼐原係監生元孫卓啓福綬圖爾特俱原任佐領蓀泰原任主事夸郎阿原係監生赫達色現任佐領四世孫夸蘭太蘇庫烏瑪拉俱原任佐領孟格圖鑲紅旗人噶蓋扎爾固齊親叔吳雲柱之子也初任佐領以軍功授騎都尉卒其次子綽內襲恩詔加職任佐領卒其親兄阿吉襲職三遇領卒其子至二等輕車都尉厯任副都統兼佐翁古襲職任佐領卒其子濟滿襲職任佐領緣事革退其親兄之子常保襲職時削去恩詔所加之職承襲騎都尉卒其親兄之子萬福現襲職又孟格圖之孫沙坦原任署丞吳達庫原任御史胡密色原任護軍參領曾孫雙察原任郎中穆國璉原任佐領常在常太俱原任筆帖式密達原任驍騎校元孫根泰原任佐領噶爾圖增福俱現任佐領阿爾哈巴顔鑲紅旗人噶蓋扎爾固齊之伯祖也其孫外圖庫原任三等護衛富山原任驍騎校曾孫雅爾哈捫都俱原任護軍校哈爾錦原任筆帖式蘇完拜由防禦三圍錦州擊敗松山馬兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又破流賊滅福王平定河南江南等處屢著軍功恩詔授授雲騎尉遇參領卒無嗣其親兄之子扎克丹為騎都尉任恩詔加襲職兩遇車都尉任參領卒其親弟之子六十至三等輕恩詔所襲職任佐領卒其子官祿襲職時削去之子滿加之職承襲雲騎尉任佐領卒其叔祖布現襲職又阿爾哈巴顔之元孫扎色原任七品官納親原任驍騎校色臣原任筆帖式四世孫色德色克圖俱原任七品官雅爾布現任頭等護衛色爾德現任筆帖式五世孫官福原任御史六世孫六格現任筆帖式納齊布國正藍旗人世居呼訥赫地方子蘇爾德由廢員初來歸設佐領使統之其長圍錦州擊敗松山杏山馬步兵又敗洪承疇三營步兵定鼎燕京時入山海關擊敗流寇又破流賊滅福王平定河南江南等處纍著軍功優授騎都尉後征福建擊賊偽總兵薑揚順等兵屢敗之又擒獲偽唐王有功加一雲騎尉任前鋒參領兼佐領卒其子蘇瑚濟襲職三遇恩詔加至一等輕車都尉緣事削去騎尉厯任副都統恩詔所加之職仍襲騎都尉兼一雲兼佐領卒其子西喇圖襲職任前鋒參領兼佐領緣事革退其親兄之孫永常襲職現任佐領又納齊布之次子鈕赫原任長史第三子希佛第四子黨格俱原任佐領第五子綏蓀第六子保格俱原任長史第七子森特赫由護軍參領定鼎燕京時入山海關擊敗流賊馬步兵二十恩詔加萬衆敘功授雲騎尉三遇軍統領卒其子善布至三等輕車都尉厯任護襲職任護軍參領兼佐領卒其孫沙爾坦襲職時削去恩詔所加之職現襲雲騎尉又納齊布之孫蘇赫原任員外郎達爾漢佛保俱原任佐領蓀塔索克索理胡圖俱原任頭等護衛密禮布原任護軍參領兼佐領曾孫蘇賚蘇晉俱原任護軍參領兼佐領社德渾保住俱原