body:
  text: 八旗滿洲氏族通譜目録卷二十一那木都魯地方那木都魯氏康武理哲爾古汪什福察拉薩爾佳達以上俱有傳董訥科多什瑪富齊拉鄂奇塔恰塔博爾鍾鄂伊穆薩喀布勒亨以上俱附載綏分地方那木都魯氏明安圗巴顔嶽蘇納瑪林和碩阿爾松阿愛黨阿伊圗理以上俱有傳和爾尚阿邁蘭柏爾都噶爾納托克楚阿爾喀珠爾哈納穆爾察德啓額爾楚黨楚瑪哈圗庫濟訥塔爾瑚恩特德奇阿秋以上俱附載渾春地方那木都魯氏本博科博周喀喇以上俱有傳索碧喜庫庫渾扎瞻岱都蘭泰以上俱附載各地方那木都魯氏吉希勒右係有傳莽古楚伍什巴費桑阿伊爾奇勒南泰扎克蘇博和諾塔特庫善翁托以上俱附載
  hash: sha256:70d43fc85c11f6562932864ac427a639bd42de486ac81d2e2fb3f80e7e50b5fc
