body:
  text: 八旗滿洲氏族通譜卷二十二納喇氏納喇為滿洲著姓其氏族散處于葉赫烏喇哈達輝發及各地方雖係一姓各自為族葉赫地方納喇氏先有䝉古人星根達爾漢者原姓土默特初滅扈倫國所居張地之納喇姓部據其地因姓納喇氏後遷于葉赫河岸遂號葉赫國星根達爾漢生席爾克明噶圖席爾克明噶圖生齊爾噶尼齊爾噶尼生褚孔格褚孔格生太杵太杵生子二長曰清佳砮次曰楊吉砮兄弟二人綏服葉赫諸部各居一城國人皆稱為貝勒明萬曆十二年為寧逺伯李成梁所誘被害清佳砮子布寨楊吉砮子納林布祿各繼其父為貝勒後復與明和好及納林布祿弟金台石布寨子布太祖髙揚古嗣為貝勒取之其族最盛皇帝統師征討金台石太祖髙正黃旗人原係葉赫東城貝勒格爾為三等男皇帝征服葉赫時授其子德爾卒其子南楚襲職緣事革退其弟索爾和襲職三遇恩詔加至一等男兼一雲騎尉歷任吏部侍郎兼佐領緣事降為二等男卒其弟鄂色襲職任內大臣卒其親弟之子噶納海襲職卒其親伯之子巴什襲職巴什之父武丹由佐領歷任建威將軍贈雲騎征厄魯特噶爾丹奮勇擊賊陳亡等男授為一尉其子巴什襲職合併前襲之二等男任郎中參領兼佐領卒其親伯之曽孫穆爾泰襲職時削去恩詔所加之一雲騎尉承襲二等男現任前鋒參領又金台石之子尼雅哈由佐領定鼎燕京時著有恩詔加勞績授騎都尉任郎中卒其子鄭庫襲職三遇至二等輕車都尉卒其子堪泰襲職卒其子鄭恩詔所興祖襲職時削去尉卒其子達純現襲職又金加之職承襲騎都台石之孫苗色原任護軍統領錫揚原任頭等侍衛明珠原任保和殿大學士內大臣曽孫穆占原任征南將軍音都原任協領嶽索原任內閣侍讀學士諾謨渾原任護軍參領兼佐領瓦爾達原任佐領星德原任頭等侍衛兼佐領揆叙原任都察院左都御史揆芳係和碩額駙元孫輝色柏色常舒勒德俱原任佐領禮柱原任六品官世祿原任三等侍衛達鼐原任郎中尼喀裡原任員外郎巴雅圗原任驍騎校永綬原任兵部侍郎副都統永福原任頭等侍衛福爾敦原任七品官雅圗現任陵寢翼長四世孫白起德敏俱原任佐領瞻岱原任甘肅提督寧秀原任副都統兼佐領延寧現任六品官佛保現任三等侍衛兼佐領文岱現任筆帖式岱清阿現任三等侍衛根泰現任主事五世孫巴彥布現任佐領納丹珠現任六品官達洪阿現係廕生又金台石親弟賽碧圗之子碩色原任五品官孫福拉塔原任三等侍衛岱通原任冠軍使岱穆由二等侍衛從征福建擊海贈雲騎冦于厦門陳亡職任二等侍衛卒其子雅圗現尉其子三丹襲襲職賽碧圗之曽孫僧格原任護軍參領兼佐領佟昌原任頭等侍衛達賴原任員外郎蘇都渾原任七品官蘇克敦原任佐領元孫登都原任主事恩都現任副參領兼佐領索柱現任治儀正四世孫德禮慎現任員外郎能都現任藍翎侍衛又金台石親弟阿山之孫保色原任上駟院侍衛侍衛班領曽孫留住原任郎中兼佐領布揚古正紅旗人金台石兄布寨之子也原係葉赫西城貝勒太祖髙皇帝征服葉赫時授其弟布爾杭武為三等男初編佐領使統之卒其子葛巴庫襲職兩遇恩詔加至一等男後葛巴庫止襲本身伊父之三等男恩詔所得之騎都尉伊弟諸孔額承襲任副都統議政大臣因病告休其子音圗襲職任吉林烏喇將軍緣事削革未襲葛巴庫卒其子察克圗襲職任佐領卒無嗣其親叔之子禪岱襲職歷任吏部侍郎兼佐領卒其子察爾琦襲職從征厄魯特噶爾丹奮勇破賊有功優授為三等輕車都尉任參領兼佐領卒其子拉特恩詔所納襲職時削去騎尉任委署護軍參領布爾杭加之職承襲雲武之子碩色原任散騎郎孫富拉塔原任刑部尚書索柱原任護軍參領兼佐領晋保住原任頭等護衛兼佐領曽孫赫騰額雙全俱原任護軍參領兼佐領額伊圗原任佐領阿穆瑚朗衆神保俱原任員外郎齊格德得俱原任筆帖式元孫世芳富珠立俱原任佐領葛倫泰原任護軍參領兼佐領玉柱原任三等護衛察德性泰福森布俱現任佐領四世孫特克慎現任主事金柱現任筆帖式恩特赫現任副護軍參領兼佐領又布揚古親弟達爾漢之子德爾蓀原任四品典儀孫西柱原任刑部侍郎兼佐領曽孫舍爾圖原任委署護軍參領兼佐領舍林原任副參領兼佐領元孫赫順原任佐領舍圗肯現任長史四世孫舒隆阿現任佐領蘇納額駙國正白旗人金台石同族世居葉赫地方之初征初來歸尚公主封為額駙編佐領使統葉赫時于廣寧等處屢著軍功又以任事有能不違指使授參將奉㫖免死罪四次尋擢副將從征錦州率八旗䝉古兵丁星夜往截塔山西路遇明兵二千擊敗之又征察哈爾俘獲二千八百餘人緣事革去副將尋授護軍統領初設六部尚書時授為兵部尚書取大凌河城內兵出戰擊敗之征錦州屢敗敵兵得纛二桿授騎都尉尋以考績稱職授為三等輕車都尉緣事削去世職授蒙古都統征北京于雕窩城長安嶺昌平州等處敗敵五十六次征朝鮮擊敗寧邉城李元帥辨兵二千生擒李元帥後緣事削革其子蘇克薩哈由佐領三恩詔優圍錦州屢敗松山兵叙功授騎都尉遇駙效力授為三等輕車都尉後以伊父蘇納額有年復其三等輕車都尉亦令蘇克薩哈承襲併為三等男又兩遇恩詔優晋一等男兼一雲騎尉征湖廣時僞王劉文秀率僞將盧明臣僞侯馮雙禮等統賊衆六萬船千餘艘由常德分兵攻嶽州武昌蘇克薩哈伏兵邀擊焚獲船隻大敗賊衆明臣赴水死雙禮被重創降其僞副將等四十餘員叙功優晋二等子歷任領侍衛內大臣加太子太保順治十聖祖仁八年授為輔政大臣緣事獲罪康熙八年卒其皇帝特恩賞還世職令其子蘇常綬承襲親兄蘇永祚襲職歷任散秩大臣護軍統領兼佐領緣事革退其親兄之子衆神保襲職時削恩詔所去之職承襲三等男卒其親叔之子阿林襲職加任員外郎兼佐領緣事革退其親弟蘇爾鼐襲職歷任護軍統領後革去護軍統領授陵寢乾清門三等侍衛現看守係多羅額駙蘇瑪拉原又蘇納額駙之子孔固濟任頭等侍衛邁色原任二等侍衛孫札克丹原任領侍衛內大臣兼佐領綏赫原任頭等侍衛兼佐領塞赫理原任頭等侍衛納賽原任郎中塞克精額候補主事圗爾泰原任三等侍衛曽孫阿山原任六品官阿柱現任佐領元孫宗寶現任筆帖式蘇德現任署正又蘇納額駙親弟翁阿理農阿理俱原任三等侍衛又蘇納額駙親叔拜思瑚之子阿玉錫由員外郎考績稱職恩詔加授雲騎尉遇征錦州擊敗洪承疇兵從征江西授騎都尉從屢敗賊首金聲桓等兵叙功加一雲騎尉又兩遇恩詔加至二等輕車都尉緣事降為三等輕車都尉歷任副都統卒其子張保住襲職卒其子都理庫襲職從征厄魯特噶爾丹奮勇破賊有功授為二等輕車都尉任參領卒其子巴喀襲職時削恩詔所去之職承襲騎都尉兼一雲騎尉卒其親弟巴加泰襲職任協領緣事革退削去襲次已完之雲騎尉其子正武保現襲騎都尉拜思瑚之孫索砮溫原任頭等侍衛噶達渾原任護軍校曽孫索爾碧原任員外郎拉喇原任三等侍衛薩楚庫原任參領兼佐領雅圗原任驍騎校薩喜原任筆帖式元孫瑪思漢現任藍翎侍衛又蘇納額駙親叔拜珠瑚之子巴達納係額駙孫巴蘭原任二等侍衛曽孫邦經吉原任頭等侍衛兼佐領巴爾圗原任員外郎元孫二格前議政大臣工部侍郎現任都察院左副都御史兼佐領舅舅阿什達爾漢國正白旗人金台石同族世居葉赫地方城先登初率同里來歸編佐領使統之攻遼東有功復以任事有能不違指使授一等輕車都尉歷任理藩院尚書天聰六年太宗文皇帝以阿什達爾漢係孝慈髙皇后之弟賜號舅舅平定朝鮮時指麾官軍斬殺甚衆叙功授為三等男後緣事降為騎都尉其子席達理襲職從征大凌河屢敗敵兵征察哈爾率二十人敗賊伏兵三百初過北京征山東擊敗太監馮永恩授為盛兵加一雲騎尉尋任理藩院侍郎䝉三等輕車都尉遇思詔授為二等輕車都尉緣事降為三等輕車都尉又兩遇恩詔加至一等輕車都尉卒立碑紀焉其子吳爾巴襲賜祭葬如典禮贈太子少保職任頭等侍衛侍衛班領兼佐領緣事獲罪後知其寃抑給還世職其子偏圖承襲任二等侍上衛兼佐領因病告退其子納奇泰襲職歷任削駟院大臣緣事革退其親弟納延泰襲職時恩詔所去之職承襲三等輕車都尉現任頭等侍衛侍加衛班領兼佐領又舅舅阿什達爾漢之元孫納漢泰現任乾清門二等侍衛兼佐領四世孫納敏現任藍翎侍衛又舅舅阿什達爾漢親弟安達爾漢原任七品官其子索密達原任防禦孫柏晶原係副護軍校達最現任護軍校柏爾赫圗國正白旗人金台石同族世居葉赫地方杏山馬初來歸由前鋒參領圍錦州擊敗松山步兵征寧逺城內兵出戰擊敗之定鼎燕京時追擊流冦至安肅慶都等縣斬殺甚衆叙功授騎都尉後破流賊滅福王平定河南江南等處俱有軍功加一雲騎尉三遇恩詔加至一等輕車都尉征福建路經金華府遇賊蔡副將兵五百步戰敗之征湖廣敗賊兵千餘于湘潭縣攻寶慶府克其城賊僞楊總兵率馬步兵來取武岡州擊敗其衆斬楊總兵又兩敗賊首一隻虎等兵征山東土賊斬賊首楊三元等六人破其步兵五千餘衆續征雲南賊首祁三省率兵二萬餘守雞公背奮勇進剿斬僞將一員生擒十九人賊僞鞏昌王擁衆在玉龍關拒戰奮擊大敗之獲其金印一顆又入緬國至阿窪城獲僞桂王有功優授為一等男歷任前鋒賜諡忠統領兼佐領緣事獲罪後察其寃抑給還世職勇其第三子柏爾肯襲職旋又追叙伊父從前軍功優授為三等子任散秩大臣兼佐領卒其子柏清額襲職現任副都統又柏爾赫圗之長子色赫由護軍參領從征湖廣在巖山嶺擊賊僞將馬寶兵陳亡贈雲騎尉其子采寶襲職緣事革退其親兄之子彭泰襲職現任二等侍衛委署侍衛班領兼佐領又柏爾赫圗之次子阿爾賽原任御史兼佐領孫台保原任佐領曽孫柏福現任佐領柏寧現任員外郎元孫恆柱原任五品官瑚錫布國鑲藍旗人金台石同族世居葉赫地方初來歸設佐領使統之復恩賜騎都尉三遇車都尉歷任都統卒其子岱庫襲職恩詔加至二等輕卒其弟達爾扎襲職任協領卒其子納顔襲職時削去恩詔所加之職現襲騎都尉又瑚錫布之子穆徹訥由護軍參領兩遇恩詔授騎都尉追滕吉思擊敗土謝圗汗及碩羅汗等兵征山西于寧武關屢敗賊衆征廣東擊敗賊李定國步兵四萬于新會縣敘功優授為三等輕車都尉卒其子薩爾圖襲職任參領卒其子談巴襲職歷任副都統卒其子談柱襲職時削去恩詔所加之職現襲騎都尉又瑚錫布之子瓦爾達原任護軍參領孫穆圗原任三等侍衛穆赫訥巴薩理俱原任佐領曽孫達綬巴齡俱原任佐領元孫格爾古朗原任佐領談德現係廕生四世孫佛保現任佐領克錫訥國鑲白旗人金台石同族世居葉赫地方初來歸其孫博濟理原任陵寢翼長納穆泰倭濟赫由廢員從征黑龍江有功授騎都尉任佐領卒其子色楞額襲職三遇恩詔加至二等輕車都尉卒其孫巴爾達襲職卒其子鈕鈕現襲職又克錫訥之曽孫額赫爾圗原任頭等侍衛阿哈尼堪原任護軍參領吳晉泰原任步軍校愛松武由員外郎從征太原府城內兵遁出追擊大敗之征流賊于延安府連破其營追滕吉思擊敗土謝圗汗兵叙功授雲騎尉恩詔加遇騎都尉後駐防太原府叛賊李楊色率兵來授犯擊敗之駐防代州擊敗賊首劉𫝊郎方馬步兵加一雲騎尉歷任副都統兼佐領卒其孫常保襲職卒其子常鼐襲