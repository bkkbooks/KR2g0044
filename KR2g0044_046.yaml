body:
  text: 八旗滿洲氏族通譜卷二十二納喇氏納喇為滿洲著姓其氏族散䖏扵葉赫烏喇哈達輝發及各地方雖係一姓各自為族葉赫地方納喇氏先有䝉古人星根達爾漢者原姓土黙特初滅扈倫國所居張地之納喇姓部據其地因姓納喇氏後遷扵葉赫河岸遂號葉赫國星根達爾漢生席爾克明噶圖席爾克明噶圖生齊爾噶尼齊爾噶尼生褚孔格褚孔格生太杵太杵生子二長曰清佳砮次曰楊吉砮兄弟二人綏服葉赫諸部各居一城國人皆稱為貝勒明萬暦十二年為寜逺伯李成梁所誘被害清佳砮子布寨楊吉砮子納林布禄各繼其父為貝勒後復與明和好及納林布禄弟金台石布寨子布太祖髙揚古嗣為貝勒取之其族最盛皇帝統師征討金台石太祖髙正黄旗人原係葉赫東城貝勒格爾為三等男皇帝征服葉赫時授其子徳爾卒其子南楚襲職縁事革退其弟索爾和襲職三遇恩詔加至一等男兼一雲騎尉歴任吏部侍郎兼佐領縁事降為二等男卒其弟鄂色襲職任内大臣卒其親弟之子噶納海襲職卒其親伯之子巴什襲職巴什之父武丹由佐領歴任建威將軍贈雲騎征厄魯特噶爾丹奮勇撃賊陣亡等男授為一尉其子巴什襲職合併前襲之二等男任郎中叅領兼佐領卒其親伯之曽孫穆爾泰襲職時削去恩詔所加之一雲騎尉承襲二等男現任前鋒叅領又金台石之子尼雅哈由佐領定鼎燕京時著有恩詔加勞績授騎都尉任郎中卒其子鄭庫襲職三遇至二等輕車都尉卒其子堪泰襲職卒其子鄭恩詔所興祖襲職時削去尉卒其子達純現襲職又金加之職承襲騎都台石之孫苗色原任䕶軍統領錫揚原任頭等侍衛明珠原任保和殿大學士内大臣曽孫穆占原任征南將軍音都原任協領岳索原任内閣侍讀學士諾謨渾原任䕶軍叅領兼佐領瓦爾達原任佐領星徳原任頭等侍衛兼佐領揆叙原任都察院左都御史揆芳係和碩額駙元孫輝色栢色常舒勒徳俱原任佐領禮柱原任六品官世禄原任三等侍衛達鼐原任郎中尼喀裡原任員外郎巴雅圗原任驍騎校永綬原任兵部侍郎副都統永福原任頭等侍衛福爾敦原任七品官雅圗現任陵寝翼長四世孫白起徳敏俱原任佐領瞻岱原任甘肅提督寜秀原任副都統兼佐領延寜現任六品官佛保現任三等侍衛兼佐領文岱現任筆帖式岱清阿現任三等侍衛根泰現任主事五世孫巴彦布現任佐領納丹珠現任六品官達洪阿現係廕生又金台石親弟賽碧圗之子碩色原任五品官孫福拉塔原任三等侍衛岱通原任冠軍使岱穆由二等侍衛從征福建撃海贈雲騎冦扵厦門陣亡職任二等侍衛卒其子雅圗現尉其子三丹襲襲職賽碧圗之曽孫僧格原任䕶軍㕘領兼佐領佟昌原任頭等侍衛達頼原任員外郎蘇都渾原任七品官蘇克敦原任佐領元孫登都原任主事恩都現任副叅領兼佐領索柱現任治儀正四世孫徳禮慎現任員外郎能都現任藍翎侍衛又金台石親弟阿山之孫保色原任上駟院侍衛侍衛班領曽孫留住原任郎中兼佐領布揚古正紅旗人金台石兄布寨之子也原係葉赫西城貝勒太祖髙皇帝征服葉赫時授其弟布爾杭武為三等男初編佐領使統之卒其子葛巴庫襲職兩遇恩詔加至一等男後葛巴庫止襲本身伊父之三等男恩詔所得之騎都尉伊弟諸孔額承襲任副都統議政大臣因病告休其子音圗襲職任吉林烏喇將軍緣事削革未襲葛巴庫卒其子察克圗襲職任佐領卒無嗣其親叔之子禪岱襲職歴任吏部侍郎兼佐領卒其子察爾琦襲職從征厄魯特噶爾丹奮勇破賊有功優授為三等輕車都尉任叅領兼佐領卒其子拉特恩詔所納襲職時削去騎尉任委署䕶軍叅領布爾杭加之職承襲雲武之子碩色原任散騎郎孫富拉塔原任刑部尚書索柱原任䕶軍叅領兼佐領晋保住原任頭等䕶衛兼佐領曽孫赫騰額雙全俱原任䕶軍叅領兼佐領額伊圗原任佐領阿穆瑚朗衆神保俱原任員外郎齊格徳得俱原任筆帖式元孫世芳富珠立俱原任佐領葛倫泰原任䕶軍叅領兼佐領玉柱原任三等䕶衛察徳性泰福森布俱現任佐領四世孫特克慎現任主事金柱現任筆帖式恩特赫現任副䕶軍叅領兼佐領又布揚古親弟達爾漢之子徳爾蓀原任四品典儀孫西柱原任刑部侍郎兼佐領曽孫舎爾圖原任委署䕶軍叅領兼佐領舎林原任副叅領兼佐領元孫赫順原任佐領舎圗肯現任長史四世孫舒隆阿現任佐領蘇納額駙國正白旗人金台石同族世居葉赫地方之初征初来歸尚公主封為額駙編佐領使統葉赫時扵廣寜等䖏屢著軍功又以任事有能不違指使授叅將奉㫖免死罪四次尋擢副將從征錦州率八旗䝉古兵丁星夜徃截塔山西路遇明兵二千撃敗之又征察哈爾俘獲二千八百餘人縁事革去副將尋授䕶軍統領初設六部尚書時授為兵部尚書取大凌河城内兵出戰撃敗之征錦州屢敗敵兵得纛二桿授騎都尉尋以考績稱職授為三等輕車都尉縁事削去世職授蒙古都統征北京扵雕窩城長安嶺昌平州等䖏敗敵五十六次征朝鮮撃敗寜邉城李元帥弁兵二千生擒李元帥後縁事削革其子蘇克薩哈由佐領三恩詔優圍錦州屢敗松山兵叙功授騎都尉遇駙効力授為三等輕車都尉後以伊父蘇納額有年復其三等輕車都尉亦令蘇克薩哈承襲併為三等男又兩遇恩詔優晋一等男兼一雲騎尉征湖廣時偽王劉文秀率偽將盧明臣偽侯馮雙禮等統賊衆六萬船千餘艘由常徳分兵攻岳州武昌蘓克薩哈伏兵邀擊焚獲船隻大敗賊衆明臣赴水死雙禮被重創降其偽副將等四十餘員叙功優晋二等子歴任領侍衛内大臣加太子太保順治十聖祖仁八年授為輔政大臣緣事獲罪康熙八年卒其皇帝特恩賞還世職令其子蘇常綬承襲親兄蘇永祚襲職歴任散秩大臣䕶軍統領兼佐領縁事革退其親兄之子衆神保襲職時削恩詔所去之職承襲三等男卒其親叔之子阿林襲職加任員外郎兼佐領縁事革退其親弟蘇爾鼐襲職歴任䕶軍統領後革去䕶軍統領授陵寝乾清門三等侍衛現㸔守係多羅額駙蘇瑪拉原又蘇納額駙之子孔固濟任頭等侍衛邁色原任二等侍衛孫札克丹原任領侍衛内大臣兼佐領綏赫原任頭等侍衛兼佐領塞赫理原任頭等侍衛納賽原任郎中塞克精額候補主事圗爾泰原任三等侍衛曽孫阿山原任六品官阿柱現任佐領元孫宗寳現任筆帖式蘇徳現任署正又蘇納額駙親弟翁阿理農阿理俱原任三等侍衛又蘇納額駙親叔拜思瑚之子阿玉錫由員外郎考績稱職恩詔加授雲騎尉遇征錦州撃敗洪承疇兵從征江西授騎都尉從屢敗賊首金聲桓等兵叙功加一雲騎尉又兩遇恩詔加至二等輕車都尉縁事降為三等輕車都尉歴任副都統卒其子張保住襲職卒其子都理庫襲職從征厄魯特噶爾丹奮勇破賊有功授為二等輕車都尉任叅領卒其子巴喀襲職時削恩詔所去之職承襲騎都尉兼一雲騎尉卒其親弟巴加泰襲職任協領縁事革退削去襲次已完之雲騎尉其子正武保現襲騎都尉拜思瑚之孫索砮温原任頭等侍衛噶達渾原任䕶軍校曽孫索爾碧原任員外郎拉喇原任三等侍衛薩楚庫原任叅領兼佐領雅圗原任驍騎校薩喜原任筆帖式元孫瑪思漢現任藍翎侍衛又蘇納額駙親叔拜珠瑚之子巴達納係額駙孫巴蘭原任二等侍衛曽孫邦經吉原任頭等侍衛兼佐領巴爾圗原任員外郎元孫二格前議政大臣工部侍郎現任都察院左副都御史兼佐領舅舅阿什達爾漢國正白旗人金台石同族世居葉赫地方城先登初率同里来歸編佐領使統之攻遼東有功復以任事有能不違指使授一等輕車都尉歴任理藩院尚書天聰六年太宗文皇帝以阿什達爾漢係孝慈髙皇后之弟賜號舅舅平定朝鮮時指麾官軍斬殺甚衆叙功授為三等男後縁事降為騎都尉其子席達理襲職從征大凌河屢敗敵兵征察哈爾率二十人敗賊伏兵三百初過北京征山東撃敗太監馮永恩授為盛兵加一雲騎尉尋任理藩院侍郎䝉三等輕車都尉遇思詔授為二等輕車都尉縁事降為三等輕車都尉又兩遇恩詔加至一等輕車都尉卒立碑紀焉其子吳爾巴襲賜祭葬如典禮贈太子少保職任頭等侍衛侍衛班領兼佐領縁事獲罪後知其寃抑給還世職其子偏圖承襲任二等侍上衛兼佐領因病告退其子納奇泰襲職歴任削駟院大臣縁事革退其親弟納延泰襲職時恩詔所去之職承襲三等輕車都尉現任頭等侍衛侍加衛班領兼佐領又舅舅阿什達爾漢之元孫納漢泰現任乾清門二等侍衛兼佐領四世孫納敏現任藍翎侍衛又舅舅阿什達爾漢親弟安達爾漢原任七品官其子索宻達原任防禦孫栢晶原係副䕶軍校達最現任䕶軍校柏爾赫圗國正白旗人金台石同族世居葉赫地方杏山馬初来歸由前鋒叅領圍錦州撃敗松山步兵征寜逺城内兵出戰撃敗之定鼎燕京時追撃流冦至安肅慶都等縣斬殺甚衆叙功授騎都尉後破流賊滅福王平定河南江南等䖏俱有軍功加一雲騎尉三遇恩詔加至一等輕車都尉征福建路經金華府遇賊蔡副將兵五百步戰敗之征湖廣敗賊兵千餘扵湘潭縣攻寳慶府克其城賊偽楊總兵率馬步兵来取武岡州擊敗其衆斬楊總兵又兩敗賊首一隻虎等兵征山東土賊斬賊首楊三元等六人破其步兵五千餘衆續征雲南賊首祁三省率兵二萬餘守雞公背奮勇進剿斬偽將一員生擒十九人賊偽鞏昌王擁衆在玉龍闗拒戰奮撃大敗之獲其金印一顆又入緬國至阿窪城獲偽桂王有功優授為一等男歴任前鋒賜諡忠統領兼佐領縁事獲罪後察其寃抑給還世職勇其第三子栢爾肯襲職旋又追叙伊父從前軍功優授為三等子任散秩大臣兼佐領卒其子栢清額襲職現任副都統又栢爾赫圗之長子色赫由䕶軍㕘領從征湖廣在巖山嶺撃賊偽將馬寳兵陣亡贈雲騎尉其子采寳襲職縁事革退其親兄之子彭泰襲職現任二等侍衛委署侍衛班領兼佐領又栢爾赫圗之次子阿爾賽原任御史兼佐領孫台保原任佐領曽孫栢福現任佐領栢寜現任員外郎元孫恒柱原任五品官瑚錫布國鑲藍旗人金台石同族世居葉赫地方初来歸設佐領使統之復恩賜騎都尉三遇車都尉歴任都統卒其子岱庫襲職恩詔加至二等輕卒其弟達爾扎襲職任協領卒其子納顔襲職時削去恩詔所加之職現襲騎都尉又瑚錫布之子穆徹訥由䕶軍叅領兩遇恩詔授騎都尉追滕吉思撃敗土謝圗汗及碩羅汗等兵征山西扵寜武闗屢敗賊衆征廣東撃敗賊李定國步兵四萬扵新會縣敘功優授為三等輕車都尉卒其子薩爾圖襲職任叅領卒其子談巴襲職歴任副都統卒其子談柱襲職時削去恩詔所加之職現襲騎都尉又瑚錫布之子瓦爾達原任䕶軍叅領孫穆圗原任三等侍衛穆赫訥巴薩理俱原任佐領曽孫達綬巴齡俱原任佐領元孫格爾古朗原任佐領談徳現係廕生四世孫佛保現任佐領克錫訥國鑲白旗人金台石同族世居葉赫地方初来歸其孫博濟理原任陵寝翼長納穆泰倭濟赫由廢員從征黒龍江有功授騎都尉任佐領卒其子色楞額襲職三遇恩詔加至二等輕車都尉卒其孫巴爾達襲職卒其子鈕鈕現襲職又克錫訥之曽孫額赫爾圗原任頭等侍衛阿哈尼堪原任䕶軍叅領吳晉泰原任步軍校愛松武由員外郎從征太原府城内兵遁出追撃大敗之征流賊扵延安府連破其營追滕吉思撃敗土謝圗汗兵叙功授雲騎尉恩詔加遇騎都尉後駐防太原府叛賊李楊色率兵来授犯撃敗之駐防代州撃敗賊首劉𫝊郎方馬步兵加一雲騎尉歴任副都統兼佐領卒其孫常保襲職卒其子常鼐襲