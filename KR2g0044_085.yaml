body:
  text: 八旗滿洲氏族通譜卷四十二嵩佳氏嵩佳為滿洲一姓其氏族散處于董鄂松江堡及各地方董鄂地方嵩佳氏孫扎理國正藍旗人世居董鄂地方任佐領次子蘇爾邁初來歸其長子蘇巴海原由間散攻旅順口力戰克之攻義州同二十人取其城過北京取邊城時奮勇直入授騎都尉又同二十四人攻克永平府城優授為三等輕車都尉賜巴圖魯號尋設佐領使統之遇北京征山東攻交城恩詔授為二等輕車都尉二次過恩詔加縣被炮傷授為一等輕車都尉兩遇至三等男歷任副都統兵部侍郎卒賜祭葬如典禮諡勤勇其子蓀塔哈襲職歷任副都統兼佐領因年老告退其子索住襲職時削去恩詔所加之職承襲二等輕車都尉卒其親弟武格襲職歷任工部尚書後緣事獲罪其親兄之子九住現襲職又孫扎理之孫庫庫理原任佐領鄂羅順原任江寧將軍曾孫阿世坦原任驍騎校郭色原任主事侃達爾堪原任司庫馬克察原任郎中偏圖原任護軍統領薩克薩哈現任郎中兼佐領元孫凱羆原任七品典儀觀音保原任副參領兼佐領善慶現任六品官善岱現任筆帖式蘇法正藍旗人孫扎理第三子也由佐領過北京征山東攻臨淄縣克其城授騎都尉平定河南江南時於潼關等處擊敗流賊馬步兵進攻常熟縣奮勇克其城敘功加一雲騎尉任郎中參領恩詔授兼佐領卒其第三子噶都渾襲職遇圖襲職任為三等輕車都尉卒其親兄之子赫散騎郎因病告退其子科爾圖現襲職又蘇法次子額住原任二等護衛曾孫額竒圖原任三等護衛圖曬正藍旗人孫扎理第六子也由護軍校破流賊滅福王平定河南江南等處屢著戰功進攻湖州府克其城授雲騎尉卒無嗣其親兄圖法襲職遇恩詔授為騎都尉升任參領從征湖廣擊賊陳亡尉從贈一雲騎尉其子胡什布承襲騎都尉兼一雲騎征厄魯特噶爾丹於昭莫多地方奮勇破賊有功授為三等輕車都尉任協領年老告退其子恩詔所馬寧阿襲職時削去兼一雲騎尉升任協領從加之職承襲騎都尉征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡加贈一雲騎尉令其子永德承襲將馬寧阿原襲之騎都尉兼一雲騎尉令其親兄之子永福承襲又圖曬親兄謨法之子謨鼐原任防禦孫蒙古原任主事赫綬原任雲騎尉衡州原任防禦曾孫伊圖元孫達賚俱現任雲騎尉蘇爾吉正藍旗人孫扎理之孫蘇爾邁之長子也由前鋒侍衛定鼎燕京時在山海關外擊敗流賊唐總兵馬步兵又追至安肅縣正定府等處大破之從征福建梯攻汀州府第二登城克之授雲恩詔授騎尉遇尉卒無嗣其第三弟三塔哈襲職卒無為騎都嗣其第五弟翁鄂絡襲職從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉於雲南城下又於武磨山擊敗賊偽將馬寶巴養元等兵一萬餘衆敘功優授為三等輕馬都尉任前鋒參領兼佐領因病告退其子鄂竒襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉任郎中緣事革退其親弟鄂托襲職現任參領又蘇爾吉親弟翁鄂絡之子馬賽原任郎中孫阿必達現任筆帖式布達理現係生員索格國正藍旗人世居董鄂地方步軍校喀瞻原任驍初來歸其曾孫竒賚原任騎校管佐領喀瞻之子喀爾布由護軍校從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩又敗賊偽將胡國秉於雲南城下敘功優授騎都尉任護軍參領卒無嗣其親伯之孫鄂頗理曾孫鄂多諾相繼承襲又索格四世孫僧格德由驍騎校從征陕西擊賊偽蔡總兵于髙長贈雲騎坡陳亡叔之子丹布祿三官保先後承襲又索尉其親格之元孫達特希原任步軍校尼雅哈穆原任典儀尼岱原任佐領法哈原任驍騎校四世孫恩格德存住俱原任筆帖式索住黑色俱原任護軍校柏塞原任員外郎法色理現任護軍校阿爾那原任護軍校五世孫翰都原任筆帖式烏爾泰現任步軍校祿保現任副護軍參領索通阿拉哈國正藍旗人世居董鄂地方署章京定鼎燕京時初來歸其子海珠瑚由委入山海關擊敗流賊馬步兵二十萬衆敘功授雲騎尉遇恩詔授為騎都尉卒其子綏達襲職兩遇職卒無嗣其恩詔加至三等輕車都尉卒其子阿賚襲伯祖之子伯音住及伯音住之孫圖哈連相繼承襲圖哈連因病告退其子傅僧額襲職時削恩詔所去之職現襲雲騎尉又索通阿拉哈之曾孫尼加雅哈原任筆帖式尼雅蘇喀原任員外郎穆赫亷原任主事元孫徹勒渾原任驍騎校和啓國正藍旗人世居董鄂地方騎校從征江西於南初來歸其孫阿爾泰由驍昌府擊敗賊首金聲桓王德仁等兵又攻破賊偽髙總兵營續征廣東擊賊李定國兵屢敗之敘功授雲騎尉卒其子韓楚翰襲職從征陜西攻石門關陳亡贈為騎都尉其子偏圖襲職緣事革退未襲又和啓曾孫薩倫原任步軍校邁順原任驍騎校索克濟哈原任七品官常保原任郎中元孫桑格碩爾岱俱原任護軍校武達禪原任筆帖式四世孫平良現任防禦以上俱係應立傳之人其餘無事迹可立傳者附載於後正藍旗古郎阿其曾孫額雷原任佐領伊塞庫原任七品官達古理哈理其孫瑪瑚納原任驍騎校以上俱世居董鄂地方係國初來歸之人正藍旗葛濟其孫達齊納原任驍騎校曾孫赫訥原任護軍校右世居董鄂地方係來歸年分無考之人松江堡地方嵩佳氏胡什塔鑲藍旗包衣人世居松江堡地方天聰時來歸原任佐領其子韓楚漢由參領從征厄魯特噶爾丹在烏藍布通及昭莫多地方兩敗賊兵敘功授騎都尉卒其子德楞額孫黑格相繼承襲右係應立傳之人其餘無事迹可立傳者附載於後鑲藍旗包衣赫達色瑚什塔同族原任四品典儀蘇勒其曾孫伊拉齊現任八品典儀以上俱世居松江堡地方係來歸年分無考之人各地方嵩佳氏阿爾都善國鑲紅旗人世居瓦爾喀錫地方衛孫常住原任初來歸其子固山原任三等護護軍校曾孫定住由護軍校從征凖噶爾在烏孫珠爾地方力戰陳亡贈雲騎尉其親弟之子馬蘭泰現襲職和色正黃旗人世居長白山海蘭地方天聰時來歸其曾孫晉布由護軍校從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩敘功授雲騎尉年老告退其子嶽喜襲職任二等侍衛緣事革退未襲又和色之曾孫倫布原任驍騎校以上俱係應立傳之人其餘無事迹可立傳者附載於後正黃旗蘇巴泰和色同族長白山海蘭地方人其五世孫阿林現係副護軍校右係天聰時來歸之人鑲紅旗包衣謨清阿哈達地方人原任護軍校右係來歸年分無考之人宜特墨氏宜特墨為滿洲一姓其氏族散處於葉赫等地方穆克圖國正藍旗人世居葉赫地方任三等護衛薩爾哈初來歸其元孫瑚什布原圖原任七品官尼瑪禪由護軍參領定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至恩詔加慶都縣敗之授為騎都尉遇敗賊兵有功授為一雲騎尉從征四川等處屢恩詔加三等輕車都尉兩遇其子伊山承襲從征湖廣至一等輕車都尉卒擊敗賊偽將馬寶范齊韓等兵二萬餘衆續征雲南擊敗賊偽將何繼祖王洪勳等兵二萬餘衆優授為三等男卒其子博爾濟承襲因病告退其子百神保襲職時削去恩詔所加之職現襲二等輕車都尉又穆克圖之四世孫倭赫原任護軍參領官保原任七品官長綬原任佐領蘇赫由護軍校從征陜西擊敗偽總兵王繼正等兵一萬餘衆敘功授雲騎尉年老告退其子阿海承襲現任協領又穆克圖之五世孫索倫原任護軍校薩爾圖原任筆帖式巴顔由驍騎校從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子保格承襲卒其弟額爾錦襲職現任防尉又穆克圖之六世孫拜塔原任佐領拜哈原任驍騎校瑪晉太班第俱原任副護軍校噶爾漢現任驍騎校五十五現任護軍校索柱由七品筆帖式從征凖噶爾在和通呼爾哈腦爾地方擊賊陳亡贈雲騎尉其子五十八襲職又穆克圖之七世孫永芳現任員外郎阿哈達國正紅旗人世居葉赫地方佐領班珠琥原任護初來歸其孫錫柏德原任軍校曾孫拉都瑚原任兵部侍郎兼佐領巴珠瑚原任護軍參領法都瑚巴理巴岱俱原任郎中拜新原任二等護衛拜賽原任主事謨思克費揚古俱原任護軍校巴揚阿由護軍校從征流賊屢著戰功後從征四川擊賊張獻忠兵在周公山中矢陳亡贈雲騎尉其子揚古遜襲職三遇約思泰承襲任護軍恩詔加至三等輕車都尉卒其子恩詔所參領卒其子黑搆襲職時削去泰現承襲又阿加之職承襲雲騎尉卒其子安哈達之元孫法克山原任步軍校羅什鄂多理來欣受明烏馬拉俱原任筆帖式伊思海原任司庫常明原任迎送官福德原任護軍校昻古善羅多理俱原任七品官碩色原任員外郎玉德現任筆帖式納音泰現任驍騎校四世孫德爾森原任委署步軍副尉兼佐領蘇赫訥原任刑部侍郎倭赫訥原任防禦朔思太原任主事尼雅達原任佐領瑪爾齊喀原任護軍校福保現任防禦墨爾森現任二等護衛兼佐領誠德現任鳴贊海洪阿扎克丹俱現任筆帖式七十現任御史兼佐領託拜現任護軍校五世孫常保原任郎中鄂約原任防禦常在原任筆帖式辨他哈原任司庫清太現任佐領順岱現任倉庫官成福現任筆帖式六世孫薩爾泰現任鳴贊七世孫德克精額現任通判按阿哈達與本旗同里愛塔同族金泰國鑲白旗人世居葉赫佛訥赫村地方孫哲庫訥初來歸其子烏瑪琥原任奉天將軍原任都察院副都御史拉色理原任給事中肇格原任佐領來格原任步軍校珠山原任城門盛尉曾孫楊住原任原任防禦車格原任典儀恩京刑部侍郎禧住特原任筆帖式夸色現任步軍校圖麟現係舉人元孫永德原任防禦永寧原任筆帖式勤保現任員外郎永受現任筆帖式以上俱係應立傳之人其餘無事迹可立傳者附載於後正白旗那穆布祿尼雅滿洲地方人其子富拉渾原任步軍校孫額爾赫圖原任協領曾孫孔保住現任城門尉元孫巴勤太原任筆帖式正紅旗三坦葉赫地方人其孫哈晉泰原任七品官曾孫烏色現任員外郎元孫那爾泰現任佐領班布理哈達地方人其孫阿岱原任步軍校愛塔葉赫地方人原任驍騎校其孫博爾岱亦原任驍騎校五十八原任筆帖式曾孫雅善原任護軍校北京原任助教元孫福安現任驍騎校按愛塔與本旗同里阿哈達同族胡錫屯葉赫地方人其子珠爾噶岱原任驍騎校鑲白旗德勒葉赫地方人其曾孫存柱原任護軍校本庫葉赫地方人其曾孫索類原任驍騎校元孫五雅圖原任步軍校新柱現任護軍校四世孫古爾海現任防禦綽和諾現任驍騎校吉祿現係副護軍校正藍旗阿畢喀葉赫地方人其孫薩蘭泰原任典儀曾孫黑色談保俱原任驍騎校衆神保原任佐領馬錫原任筆帖式元孫三齊哈原任驍騎校富森原任護軍校勒克現任三等護衛達格色葉赫地方人其孫春布原任防禦曾孫查三泰原任驍騎校阿普泰葉赫地方人其子穆成額原任驍騎校鑲藍旗巴圖瑚哈達地方人其子塞勒原任郎中孫舒書原任前鋒校伊都善原任鳴贊曾孫伊凌阿原任護軍校衆神保原任筆帖式伊爾吉達原任典儀元孫德福現任副護軍參領以上俱係國初來歸之人鑲黃旗喀喀濟伊祿城嘉渾村地方人其子達雅拉原任驍騎校孫雅圖亦原任驍騎校曾孫伊靈阿現任副護軍參領右係天聰時來歸之人扎思瑚理氏扎思瑚理為滿洲一姓其氏族散處于卦爾察和倫等地方珍柱肯國正白旗人世居卦爾察和倫地方設佐領使統初率丁壯四十人來歸授騎都尉之從征黑龍江效力行間加一雲騎尉初圍錦州擊松山杏山兵敗之二次過北京征山東入邊時擊敗界嶺口賊兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆復追至慶都縣敗恩詔加之敘功授二等輕車都尉三遇職原任都統兼至三等男卒其子科耀爾圖襲佐領卒其子瓦爾達襲職任副都統兼佐領卒其子烏雅圖襲職時削去恩詔所加之職承襲二等輕車都尉卒其親弟索柱承襲卒其親兄之子謨羅渾承襲卒其子哲穆克尼承襲現任佐領又珍柱肯之孫恩起原任佐領尼堪國正白旗人珍柱肯同族世居卦爾察和倫地方初來歸由間散過北京征山東梯攻武邑縣第恩詔加二登城克之授雲騎尉三遇騎都尉兼一雲騎至三等輕車都尉緣事降為尉後征雲南貴州擊賊首李定國兵兩敗之敘功授三等輕車都尉卒其子寧泰孫同泰相繼恩詔所承襲同泰卒其子六十襲職時削去阿現襲職加之職承襲騎都尉卒其子珠爾杭又尼堪之族弟康起原任城門尉其子尼雅哈原任六品官孫新珠原係副驍騎校曾孫西通額現任筆帖式章泰正白旗人世居吉林烏喇地方來歸年分無考由委署護軍校從征雲南福建湖廣等處屢著戰功又征察哈爾布爾尼破賊有功授雲騎尉卒其親弟之子瞻布拉襲職又章泰之次弟尼贈雲騎堪由筆帖式從征雲南於石門坎擊賊陳亡騎尉其第三弟康泰襲職卒將康泰所襲之雲尉亦令瞻布拉承襲併為騎都尉任三等侍衛托普齊國正白旗人章泰同族世居吉林烏喇地方爾在初來歸其曾孫英泰由驍騎校從征凖噶贈雲騎和通呼爾哈腦爾地方擊賊陳亡尉其親弟之子廣良現襲職以上俱係應立傳之人其餘無事迹可立傳者附載于後正白旗塔普舒吉林烏喇地方人其孫瑪拉原任內閣侍讀學士曾孫蘇爾都現任防禦右係國初來歸之人正白旗拜音達喇發村地方人其曾孫成泰現任筆帖式右係來歸年分無考之人鑲紅旗喀岱白都訥地方人其子多鐸原任驍騎校曾孫郭博虎特赫訥俱現任驍騎校右係康熙時自科爾沁撤回之人瑚錫哈理氏瑚錫哈理本係地名因以為姓其氏族散處於瑚錫哈理等地方托謨奎國鑲白旗人世居瑚錫哈理地方征奔博果爾著初來歸其孫賴達哈由間散從有軍功三次圍錦州步戰敗敵過北京征山東梯攻兖州府第二登城克之賜巴圖魯號授二等輕車都尉三遇職因年老乞休其恩詔加至三等男卒其子蘇瑪拉襲恩詔所子馬德襲職時削去車都尉現任佐領又托謨加之職承襲二等輕奎之孫郎阿理原任前鋒校當色理原係廕生曾孫郎柱原係監生樓登國鑲黃旗人世居伊蘭費爾塔哈村地方第原任初來歸其子遼丹原任吏部尚書孫班筆帖式元孫瑚爾鼐現任主事瑚靈阿現任護軍校布爾塔理國正黃旗人世居卦爾察地方前鋒校元孫喀岱初來歸其曾孫額勒特原任原任兵部尚書來道原任工部侍郎五世孫海都原任司務富爾丹原任八品官赫雅圖現任驍騎校以上俱係應立傳之人其餘無事迹可立傳者附載于後鑲黃旗都爾柏寧古塔地方人其元孫薩齊庫原任郎中兼護軍參領布克受原任佐領四世孫明福原任郎中陶色原任五品官布濟爾泰原任護軍校關布原任驍騎校五世孫那爾泰原任給事中莫爾泰現任協領阿爾本阿現任護軍校阿松阿寧古塔地方人其子瓦爾達原任佐領孫巴爾瑚岱亦原任佐領巴古卦爾察地方人其子望武原任步軍校孫留柱現任護軍校祿格瀋陽地方人其子瑚岱原任驍騎校孫三多現任護軍校正白旗索希納吉林烏喇地方人其孫塞瑚理原任頭等侍衛丹岱原任弓匠協領曾孫塞色黑伊桑阿俱原任筆帖式伊通保現任助教何雅圖原任藍翎侍衛華色原任護軍參領元孫馬桑阿現任護軍校又索希納族弟莫克托之孫尼雅哈原任協領曾孫安泰原任驍騎校以上俱係國初來歸之人正白旗莫特吉林烏喇地方人右係康熙時自科爾沁撤回之人
