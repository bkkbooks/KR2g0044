body:
  text: 八旗滿洲氏族通譜卷三十兀札喇氏兀札喇為滿洲一姓其氏族散處於烏喇薩哈爾察黑龍江及各地方烏喇地方兀札喇氏福蘭國正白旗人世居烏喇地方禦設佐領使統之卒初率兄弟族人來歸授備其次弟諾穆圖襲職兼任佐領卒其三弟席特庫襲職以軍功加授一等子歷任前鋒統領兼佐領緣事革退未襲其子碩色原任佐領曽孫遜塔哈原任侍衛兼佐領元孫席拉布現任治儀正兼佐領又福蘭親叔阿爾古蘭之子鄂穆克圖由前鋒侍衛定鼎燕京時入山海關破流賊平定河南江南等處斬賊甚衆復生擒蒙古一名漢人十一名敘功授雲騎尉三遇恩詔加至三等輕車都尉歷任襲職原任護軍參領卒盛京副都統卒其子戴屯其子穆克敦孫武錫理相繼承襲武錫理卒其親伯之孫瑚錫理襲職時削去恩詔所加之職承襲雲騎尉原任副都統卒其親叔祖之孫章巴什襲職現任前鋒侍衛又鄂穆克圖之子戴宗阿原任防禦和洛原任藍翎侍衛孫倉周原任頭等侍衛渾泰原任前鋒參領兼佐領巴達色現任驍騎校又福蘭親叔寧善之孫阿都立原任郎中額克清格原任佐領達賴國正白旗人世居烏喇地方子巴達原任二等侍初來歸原任護軍參領其衛遂蓀以不勞兵力來歸授雲騎尉過北京征山東攻任邱縣克其城授騎都尉卒其子鄂爾博襲職三次圍錦州擊敗松山敵衆又定鼎燕京時入山海關破流賊二十萬衆敘功加一雲恩詔加騎尉三遇車都尉卒其親伯之孫博爾遜襲職至一等輕卒其子索爾遜襲職緣事革退其親兄之子邁圖襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉後由部委章京定藏有功授為三等輕車都尉卒其子明貴現襲職又達賴之孫達爾布原任護軍參領巴圖理瑚什布俱原任驍騎校曽孫章留原任佐領什圖原任三等侍衛恩岱原任六品官庫奔原任驍騎校元孫色爾吉納現任親軍校札爾瑚現任荆州副都統成格原任二等侍衛賚格原任護軍參領蘇和臣額爾格訥俱原任護軍校雅爾哈原任佐領寨親珠都理俱原任筆帖式四世孫巴哈布現任六品官阿明圖現任千總六格札哈理俱原任協領巴薩拉原任佐領五世孫武坤現任筆帖式察爾都原任前鋒侍衛三雅圖現任三等侍衛馬爾楚原任牧長羅藏原任三等侍衛六十四現係副護軍校六世孫烏爾瑚訥現任護軍校圖瑚墨現任驍騎校柏起訥國正白旗人世居烏喇地方參領三次圍錦州屢初來歸其孫岱翰由護軍敗松山杏山馬步兵定鼎燕京時入山海關擊流賊馬步兵二十萬衆復追至慶都縣大敗之授騎都尉後破流賊滅福王平定河南江南等處著有軍功用紅衣炮攻常熟縣克其城又加恩詔加一雲騎尉卒其子達爾都承襲遇卒無嗣其弟至三等輕車都尉原任二等侍衛恩詔所阿爾都襲職卒其子碧勒圖襲職時削去達爾加之職承襲騎都尉兼一雲騎尉卒其子泰現襲職又柏起訥之孫武巴什原任郎中曽孫額爾濟圖原任員外郎元孫碧薩圖原任郎中額森德現係副驍騎校四世孫常保原任筆帖式又柏起訥之弟薩他布由間散過北京征賜巴圖山東梯攻夏津縣首先登城克之魯號授騎都尉遇恩詔加一雲騎尉卒其子色勒孫瓦哈哩曾孫林住相繼承襲林住卒其親弟保住襲職時削去恩詔所加之職現襲騎都尉又柏起訥之族孫拉岱原任主事曽孫吉柱原任助教沙那哈現係副護軍校德楚庫國鑲白旗人世居烏喇地方領孫哈西泰原任防初來歸其子明愛原任協禦哈寧阿原任四品典儀曽孫桑格由防禦從征雲南在石門坎黃草壩桂花寺等處屢立戰功授雲騎尉卒其子寶昌襲職又德楚庫之曽孫哈蘭圖原任筆帖式福保原任親軍校元孫武達理原任前鋒侍衛拜達色原任護軍校保青現任副參領四世孫諾爾泰現任護軍校郎格現係副驍騎校由正白旗改隸以上俱係應立傳之人其餘無事迹可立傳者附載於後正黃旗塔第其子蘇爾德原任護軍校鑲白旗福噶保其曽孫葉倫泰原任防禦元孫常在常保俱現任筆帖式由鑲黃旗改隸鐘古原任驍騎校其子慕濟亦原任驍騎校由正黃旗改隸和濟格其孫舒章原任筆帖式曽孫札庫達原任驍騎校以上俱世居烏喇地方係國初來歸之人鑲黃旗吳什哈其孫七十六原任護軍校正黃旗達爾球其孫庫克住原任藍翎侍衛哈克蘇現任頭等侍衛掖普綬其子哲爾德原任頭等侍衛武訥塞其曽孫尼克都原任二等侍衛阿薩納現係副護軍校貝德勒其孫哈什塔現任三等侍衛巴爾都其孫阿進泰原任三等侍衛雅魯其孫佛爾濟那現任三等侍衛武巴塔其四世孫賽明阿現係生員以上俱世居烏喇地方係天聰時來歸之人正黃旗特斗其孫德米勒現任二等侍衛曽孫凖泰原任頭等侍衛塔爾謙其孫精濟祿卓索滿岱那理俱原任二等侍衛恩額圖原任二等侍衛正白旗穆成額其子蘇克東格原任三等侍衛以上俱世居烏喇地方係來歸年分無考之人薩哈爾察地方兀札喇氏穆穆理德特赫國鑲黃旗人世居薩哈爾察地方原任佐領錫特初率族人來歸其孫布爾竒那庫原任前鋒統領曽孫鄂莫克圖原任副都統元孫臯赫德由間散二次過北京征山東梯攻賜巴圖武定州首先登城克之雲騎尉定鼎燕京時入魯號優授騎都尉兼一山海關破流賊馬步兵授為三等輕車都尉卒其親弟中吉達承襲三遇恩詔加至一等輕車都尉兼一雲騎尉從征江西敗賊首金聲桓等兵進剿廣東在新會縣大破李定國等兵敘功優授為二等男原任副都統卒其子達爾占承襲後征廣東廣西雲南等處屢立軍功優授為一等男兼一雲騎尉歷任荆州將軍卒其子達朗阿襲職時削去恩詔所加之職承襲三等男卒其子武清格現襲職又穆穆理德特赫之元孫丑赫德由護軍校委署護軍參領從征貴州屢敗賊兵敘功授雲騎尉卒其子七十承襲又穆穆理德特赫之元孫庫爾庫德由護軍校從征雲南在陸噶地方擊賊李定國兵陳亡贈雲騎尉無嗣其親兄之子聶塞爾德承襲又穆穆理德特赫之元孫塞弼倫由間散二次過北京征山東攻蒙隂縣第二登城克之授雲騎尉卒其子僧額襲職卒其親叔諾穆渾諾穆渾之孫七格偏圖色楞曽孫五十六相繼承襲五十六緣事革退其親叔阿林現襲職又穆穆理德特赫之元孫活約爾圖原任都統景興阿原任郎中戴通原任護軍參領景吉納原任佐領卓爾董鄂原任藍翎侍衛四世孫達瑚原任驍騎校薩哈亷原任五品官武蘇柱原任司庫五世孫福爾瑚那原任內閣學士兼禮部侍郎達山原任郎中兼佐領永成現任步軍校六世孫武當阿現係廕生札蘭國鑲黃旗人世居薩哈爾察地方西梯攻西平縣初來歸其子額楚由間散征陜恩詔加第二登城克之授雲騎尉三遇兵時遇海冦鄭至三等輕車都尉後征貴州回成功來犯江寧屢敗其衆敘功授為二等輕車都尉歷任江寧將軍卒其親兄之孫富努保襲職卒其親兄法保現承襲後因追敘法保之父格克理從征廣東在電白縣地方陳亡軍功贈雲騎尉亦令法保承襲合為一等輕車都尉滚布國鑲白旗人世居薩哈爾察地方梯攻欒城縣首初來歸由間散過北京征山東贈騎都先登城陳亡優承襲遇尉其子札爾海恩詔加一雲騎尉卒其弟阿都堪襲職兩遇靈安襲職恩詔加至二等輕車都尉卒其親伯之孫略緣事革退其叔祖杜札喀襲職卒其親弟之子立久襲職卒其子福成額襲職時削去恩詔所加之職承襲騎都尉卒其親叔之子滿丕襲職緣事革退其親弟恩丕現襲職又滚布之曽孫薩碧現任筆帖式由正黃旗改隸陶納國正藍旗人世居薩哈爾察地方軍校從征察哈初來歸其孫和和理由委署護爾布爾尼在大鹵地方破賊有功後征浙江福建等處屢敗劉國軒等兵進攻雲南擊偽將何繼祖等大破其衆優授騎都尉卒其親伯之孫鶴善現襲職又陶納之孫五達色原任城門尉曽孫都爾本德原任防禦墨克訥原任助教元孫富德現任郎中德敏現任員外郎碩色原任筆帖式四世孫富坤現任中書深璐現任筆帖式坤璐現係監生薩進泰正藍旗人世居薩哈爾察地方天聰時來歸其孫諾穆齊原任護軍參領卓爾齊泰由防禦從征江西敗賊有功後征廣東韶州府蓮花山地方力戰被傷尋卒贈雲騎尉無嗣其親叔之子莽色承襲卒其子佛瑚訥現襲職又薩進泰之孫藹楚原任協領恩特肯原任佐領門都原任前鋒參領兼雲騎尉布龍庫布勒達俱係雲騎尉曽孫德爾得亦係雲騎尉武理布原任佐領兼雲騎尉海色原任員外郎諾爾布原任協領立住原任主事紐紐原任鳴贊拉色原任護軍校元孫菩薩保原任親軍校四格原任護軍校武什圖現任佐領武齊圖現任驍騎校寧古圖現任筆帖式四世孫訥爾圖現任驍騎校武什竒現係副護軍校武什泰原任筆帖式五世孫富僧額亦原任筆帖式第優格國正白旗人世居薩哈爾察地方士曽孫通庫布初來歸其孫尼克什布原任博由委署護軍校從征雲南在石門坎黃草壩等處擊偽將何繼祖王宏勳等兵屢著軍績卒後贈雲騎敘功子五十八承襲現任步軍校又第優格之尉其曽孫瑪塔理原任員外郎那揚阿原任郎中元孫額爾圖原任助教雅鼐原任三等侍衛四世孫莽色原任防禦以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲白旗索爾吉納其子官保原任護軍校由正黃旗改隸右世居薩哈爾察地方係國初來歸之人正藍旗鄂齊蘭其孫武臨泰現任前鋒校右世居薩哈爾察地方係來歸年分無考之人黑龍江地方兀札喇氏正特克鑲白旗人世居黑龍江地方天聰時來歸其孫多羅岱由間散過北京征山東梯攻霸州首先贈騎都登城陳亡之子薩賴承襲三遇尉其親兄恩詔加至二等輕車都尉從征湖南屢敗賊孫可望等馬步兵又戰於洞庭湖陳亡其子阿雅納襲職後追敘其父薩賴軍功加為一等輕車都尉卒其親叔祖之孫偏圖襲職卒其子福勒赫襲職恩詔所時削去加並詔後軍功所得之職現襲騎都尉尼堪正藍旗人世居黑龍江地方天聰時來歸其曽孫福魯肯由間散初過北京征山東攻武城縣賜巴圖首先登城克之卒無嗣其親叔之子齊克納襲魯號授騎都尉恩詔加職三遇輕車都尉從征湖廣山東等處屢敗賊至二等兵著有勞績又從征湖南在衡州府地方奮勇擊賊陳亡贈一雲騎尉為一等輕車都尉無嗣其親叔祖之孫庫庫理襲職卒其子丹齊蘭襲職卒其親兄之子阿爾賽襲職卒其叔祖之孫素蘭太襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉卒其子觀音保襲職從征凖噶爾在和通呼爾哈腦爾地方詔後軍擊賊陳亡其子官德襲職時削去父觀音保陳功所加之職承襲騎都尉後因其贈雲騎亡亦令官德承襲尉舒松阿正藍旗人尼堪同族世居黑龍江地方天聰時來歸其元孫碧赫納由間散過北京征山東梯恩詔加攻濵州第二登城克之授雲騎尉三遇子齊柳至三等輕車都尉卒其弟碧努碧努之孫三達色相繼承襲三達色卒其子德勝格襲職時削去恩詔所加之職現襲雲騎尉又舒松阿之元孫瑪魯喀原任城門尉額齊訥原任護軍校四世孫代屯原任郎中官祿現任防禦哲楚克正藍旗人尼堪同族世居黑龍江地方天聰時來歸其孫盧克蘇由間散初過北京征山東攻恩詔加武城縣第二登城克之授雲騎尉遇領從征福為騎都尉卒其子當喀理襲職由協建在海澄縣擊賊陳亡無嗣其親叔之孫元保襲職卒無嗣其親叔之子佛保襲職後因追敘贈一雲當喀理陳亡軍功襲後緣事革退降為食半俸騎尉亦令佛保承雲騎尉令其叔祖之曽孫訥爾太承襲又哲楚克之孫羅碧原任步軍校曽孫羅多理原任防禦劉保住原