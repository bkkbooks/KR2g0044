副護軍校福邦現係副護軍校密調古色俱原任三等侍衛那爾彪朱理雅拉地方人其六世孫當達喀現任頭等侍衛七世孫圖倫楚現任三等侍衛孔果絡朱理雅拉地方人其七世孫賚松阿現任三等侍衛西爾佳圖現任佐領濟克屯現任驍騎校正紅旗札拉察松花江地方人其四世孫克西特現任協領依蘭泰現任佐領武克都理瓜爾拜地方人其曽孫丹吉納原任護軍校元孫輝古原任員外郎華善原任步軍校拉巴哈什納山都喇俱原任驍騎校四世孫優德里原任護軍校五世孫武爾賽現任護軍校按武克都理與本旗同里尼喀達同族薩克薩哈虎爾哈地方人原任驍騎校其子丑色原任筆帖式正藍旗武尼庫寧古塔地方人其曽孫順布原任驍騎校那理原任藍翎侍衛元孫恩特現任防禦以上俱係國初來歸之人正黃旗僧額瀋陽地方人其子色克圖原任佐領孫尚福原任驍騎校外都理瀋陽地方人原任佐領其曽孫達色現任藍翎侍衛札哈理蓋津村地方人其孫濟爾泰現任三等侍衛拉普都哈鄂漠地方人原任護軍校其子武保亦原任護軍校孫二格現任防禦以上俱係天聰時來歸之人正黃旗塔克塘阿瀋陽地方人其子輝章阿原任防禦孫庫魯爾德現任協領曽孫蓀保現任驍騎校活隆鄂瀋陽地方人其子薩柱那原任佐領孫諾爾多古勒慎俱原任頭等侍衛曽孫圖爾哈原任佐領吳德訥現任雲麾使元孫額訥克特現任藍翎侍衛阿都喀瀋陽地方人其子托爾景阿原任三等侍衛孫巴爾善現任二等侍衛色穆斗瓦丹地方人原任驍騎校其子努克登額原任二等侍衛福爾哈塔瀋陽地方人其孫孟格原任護軍校曽孫古爾泰原任三等侍衛赫努懇瀋陽地方人其孫薩克提原任三等侍衛西爾口巴特海蘇蘇地方人原任藍翎侍衛其子塔雅普屯亦原任藍翎侍衛達普唐阿巴特海蘇蘇地方人其子穆諾原任護軍校阿柱堪原任驍騎校勒克車慕瀋陽地方人其曽孫陽吳爾達原任護軍校鑲紅旗拉喀布哈達地方人其子費雅爾屯現任五品官曽孫揚桑阿現係副護軍校正藍旗武本格薩木占地方人其孫華色原任三等侍衛曽孫倫柱現係監生鑲藍旗鈕爾謨諾卦爾察地方人其子額捫原任半個佐領孫額理赫原任佐領曽孫特克慎原任護軍校元孫儀禮保亦原任護軍校四世孫那親現任驍騎校以上俱係來歸年分無考之人正白旗諾爾布哈達地方人諾穆圖哈達地方人艾雅爾圖哈達地方人正紅旗塔竒理松花江地方人其孫鄂齊爾原任驍騎校曽孫哈爾扣現任頭等護衛元孫奕喜現係候補筆帖式鄂爾綽哈達地方人武倫圖哈達地方人鑲白旗訥爾泰哈達地方人以上俱係康熙時自科爾沁撤回之人八旗滿洲氏族通譜卷三十
