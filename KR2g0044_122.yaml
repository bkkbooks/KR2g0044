body:
  text: 八旗滿洲氏族通譜目録卷六十一鑲白旗有名位希姓尼格勒氏阿爾瓜準齊氏瑚丕理翁尼理氏阿山朱爾克氏內圖肯通阿拉氏白克圖穆爾德氏訥爾赫吳札爾瑚氏西圖納特濟氏雅親塔坦氏陶托理猷格理氏吳巴泰哈爾吉氏哈克散穆齊氏象德恰喇氏濟哈姜佳氏姜圖博和羅氏保泰唐尼氏善福吳拉氏穆禮瑪洪達理氏薩穆鼐馬爾屯氏馬積瑚兆壘氏雅喇玉爾庫氏恰塔陳佳氏陳國柱莽吉綽氏尼瑪善墨爾吉氏瑪爾賽鑲紅旗有名位希姓穆色陳氏阿爾薩朗塞楞吉氏愛錫尼瑪哈氏英奇茂儀氏翁頭安佳氏安普羅嶽氏嶽隆鄂鄂濟理氏吳魯蓀翁果特氏博布哈康錫理氏二碩色蘇克察氏布爾哈札穆秦氏鈕倫泰都瓦爾佳氏德色諾絡氏阿爾吉圖田佳氏岱進朝林佳氏佛保秋佳氏浩羅多錦氏殷札喀努爾漢氏馬隆武錫勒爾吉氏塔爾屯嘉哈瑪氏喀喇胡錫氏正克瓦爾吉氏薩哈禪達瑚理氏綏朋額屈佳氏屈子明普佳氏本柱蔣佳氏蔣山龎佳氏吳巴禮雅庫欽定四庫全書八旗滿洲氏族通譜目録卷六十一鑲白旗有名位希姓尼格勒氏阿爾瓜準齊氏瑚丕理翁尼理氏阿山朱爾克氏內圖肯通阿拉氏白克圖穆爾德氏訥爾赫吳札爾瑚氏西圖納特濟氏雅親塔坦氏陶托理猷格理氏吳巴泰哈爾吉氏哈克散穆齊氏象德恰喇氏濟哈姜佳氏姜圖博和羅氏保泰唐尼氏善福吳拉氏穆禮瑪洪達理氏薩穆鼐馬爾屯氏馬積瑚兆壘氏雅喇玉爾庫氏恰塔陳佳氏陳國柱莽吉綽氏尼瑪善墨爾吉氏瑪爾賽鑲紅旗有名位希姓穆色陳氏阿爾薩朗塞楞吉氏愛錫尼瑪哈氏英奇茂儀氏翁頭安佳氏安普羅嶽氏嶽隆鄂鄂濟理氏吳魯蓀翁果特氏博布哈康錫理氏二碩色蘇克察氏布爾哈札穆秦氏鈕倫泰都瓦爾佳氏德色諾絡氏阿爾吉圖田佳氏岱進朝林佳氏佛保秋佳氏浩羅多錦氏殷札喀努爾漢氏馬隆武錫勒爾吉氏塔爾屯嘉哈瑪氏喀喇胡錫氏正克瓦爾吉氏薩哈禪達瑚理氏綏朋額屈佳氏屈子明普佳氏本柱蔣佳氏蔣山龎佳氏吳巴禮雅庫
