body:
  text: 八旗滿洲氏族通譜卷三十一兆佳氏兆佳本係地名因以為姓其氏族散處於瑚普察額爾敏及各地方瑚普察地方兆佳氏舒賽國鑲白旗人世居瑚普察地方都沙原任長史兼初來歸設佐領使統之其子佐領圗什塔原任頭等侍衛孫都爾泰原任步軍校恭安索保俱原任佐領穆理謨原任協領禪布原任長史禪拜原任七品官禪塔哈原任護軍參領兼佐領瞻岱由委署章京從征陜西於秦州地方擊敗賊偽將吳之茂等兵萬餘衆後征湖廣攻嶽州取洞庭湖時屢敗賊偽將杜偉等兵征雲南擊敗賊偽將胡國秉等兵於桂花寺敘功授雲騎尉卒其子赫達色現襲職又舒賽之曽孫彰格萬岱俱原任驍騎校阿爾布岱佛岱俱原任佐領察思哈原任委署副都統常寧現任護軍參領兼佐領僧保由參領兼佐領從征厄魯持噶爾丹奮勇破賊有功授雲騎尉卒其子塞爾登現襲職又舒賽之元孫恩兆現任佐領察爾彬現任三等護衛又舒賽親兄王佳努之子布蘭原任護軍校蘇瓦顔原任防禦孫福達理原任協領海遜原任五品包衣大曽孫積蘭原任筆帖式宗神保現任頭等護衛元孫畢桑阿現任護軍校又舒賽親弟寧古親之子瑚什由間散過北京征山東攻寧海州首先登城殁於陳贈雲騎尉因無嗣其親兄都爾什襲職定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功加一恩詔加雲騎尉三遇都尉卒其子三格襲職卒其子阿至一等輕車林泰現襲職又舒賽親弟伊爾敦之孫關布原任主事噶哈原任驍騎校齊蘭布原任藍翎侍衛曽孫巴爾岱原任護軍參領元孫伍格現任筆帖式又舒賽親弟伊圗費揚古之曽孫色克圗原任主事元孫英常原任員外郎由正白旗改隸按舒賽與正白旗額爾敏地方覺色同族武達禪巴圗魯鑲白旗人舒賽親叔鄂泰之孫也由間散過北京征山東攻任丘縣首先登城攻濟陽縣不設賜巴圗雲梯先登克其城魯號授騎都尉遇恩詔加一雲騎尉卒其子莽依圗襲職兩遇南將軍後恩詔加至二等輕車都尉歷任護軍統領鎮恩詔所緣罪削去本身博和理承襲騎都尉兼一雲騎得之職其親弟恩詔所尉卒其子關泰襲職時削去又武達禪巴圗魯加之一雲騎尉現襲騎都尉之曽孫布占原任參領福勒赫原任郎中哈瞻現任主事亢孫顧洪泰現任筆帖式又武達禪巴圗魯伯祖卓和理之子阿都原任城門尉阿海原任步軍校孫舒書亦原任步軍校曽孫戴清現任護軍校金柱現任二等護衛阿古沙瑚圗國正紅旗人舒賽同族世居瑚普察地方傳由委初來歸其曽孫保住原任頭等護衛肆署參領從征雲南擊敗賊偽將何繼祖等兵於石門坎黃草壩地方又賊將胡國秉率兵萬餘出雲南城拒戰復擊敗之敘功優授騎都尉卒其子常泰襲職任副參領緣事革退其親兄武雅圗襲職現任所牧又阿古沙瑚圗之元孫阿晉原任筆帖式族孫武禮善原任郎中阿蘇哈國正白旗人舒賽同族世居瑚普察地方原任筆初來歸其元孫塞赫原任員外郎滿都帖式四世孫明福原任鳴贊齊什原任筆帖式色楚原任牧長雅思泰原任佐領哈思泰原任主事五世孫德昌現任筆帖式德敏現任中書武常阿由護軍校從征準噶爾在和通呼爾哈贈雲騎腦爾地方擊賊陳亡職又阿蘇哈親伯庫德之尉其子六十五現襲曽孫綏蘭原任郎中四世孫額森亦原任郎中賚衮原任城門尉二格現任驍騎校又阿蘇哈親叔費愓古納之四世孫董吉伯原任筆帖式五世孫馬拉喜原任驍騎校六世孫花保住原任護軍校倫布科色國正紅旗人舒賽同族世居瑚普察地方原任員初來歸其子喀喇原任護軍校孫碩色外郎曽孫晉特布原任防禦殷特布原任禮部尚書伊禮布原任中書富賚原任主事元孫希布希德俱原任筆帖式石當阿原係舉人永成琛圗俱現任筆帖式四世孫兆佳保佛保俱現任筆帖式又倫布科色之族孫安達理原任六品包衣大伊漢原任護軍校安達理伊漢之子孫今俱隸本旗包衣當布理國鑲白旗人世居瑚普察地方過北京征山東攻初來歸其子莽塞堪由間散恩詔加齊東縣先登克其城敘功授雲騎尉兩遇職平至騎都尉兼一雲騎尉卒其子覺和托襲定陜西往秦州解送軍器回時於丁花嶺擊敗賊兵千餘衆後圍秦州有四川平涼等處賊兵來援復擊敗之敘功授為三等輕車都尉卒其子覺禪襲職卒其子卓爾泰襲職時削去恩詔所加之職承襲騎都尉卒其子莽喀襲職現任佐領又當布理之孫海拉納原任防禦薩穆哈原任驍騎校由鑲黃旗改隸以上俱係應立傳之人其餘無事迹可立傳者附載於後正黃旗密山扎哈理其曽孫愛密禪原任四品官元孫葛巴庫原任前鋒侍衛齊勒原任驍騎校溫錫原任步軍校富健碩色俱原任驍騎校四世孫嶽塞原任佐領庫塞理原任護軍校噶蘭泰現任護軍校五世孫齊鑑布亦現任護軍校按密山扎哈理與鑲藍旗同里尼雅哈同族正白旗髙達舒賽同族其曽孫存柱原任步軍校甘珠現任四品官元孫章旒現任驍騎校拜色原係副護軍校族孫和托原任護軍校薩木哈原任步軍校族曽孫印登原任驍騎校元孫索爾和原任參領羅薩岱音達理愛音達理俱原任筆帖式保住現任護軍校甘際泰其孫五十八原任城門尉曽孫哲庫訥原任防禦琥色原任護軍校桑格原任筆帖式元孫巴什現任防禦愛喀其孫錫哈原任護軍校曽孫吳勒訥原任步軍校格宜祿其曽孫邁蘭泰現任防禦正紅旗柏英額其孫吉山原任佐領曽孫得德原任驍騎校勒德原任主事塞楞特現任護軍校元孫能特現任委署前鋒侍衛鑲白旗布拉塔其孫滿達爾漢原任步軍校兆泰原任驍騎校曽孫長明現係看守倉庫官本祿現任驍騎校由正白旗改隸伊爾哈齊其孫碩賚原任步軍校由正白旗改隸吳當其孫華善原任筆帖式鑲藍旗尼雅哈其孫巴什原任護軍校曽孫伊清額原任主事鄂塞原任中書雙第原任三等護衛元孫達克新原任護軍校按尼雅哈與正黃旗同里密山扎哈理同族以上俱世居瑚普察地方係國初來歸之人鑲白旗西章阿其曽孫兆凱現任驍騎校由鑲黃旗改隸右世居瑚普察地方係來歸年分無考之人額爾敏地方兆佳氏覺色國正白旗人世居額爾敏地方額赫禮原任前鋒初來歸其孫都什原任教官校曽孫楞色原任員外郎瑪庫原任城守尉馬爾漢原任吏部尚書世經筵講官議政大臣兼佐領雍正八年誠忠厚在宗憲皇帝以馬爾漢為人謹慎小心老聖祖仁皇帝時宣力多年完名引退中外皆稱為善人特恩加贈太子太傅崇祀賢良祠乾隆元年賜諡恭勤遣官致祭又覺色之元孫色啓原任防禦穆爾泰原任工部侍郎納蘭卓爾渾俱原任筆帖式塞克圗原任員外郎塞爾弼原任都統兼佐領定柱原任中書關柱原任御史兼佐領四世孫穆成額現任教習兆清現任員外郎兆泰原任筆帖式五世孫額森現任筆帖式兆君保兆君柱俱現任三等侍衛六世孫兆福現係廕生按覺色與鑲白旗瑚普察地方舒賽同族塔郎阿國正白旗包衣人覺色同族世居額爾敏地方塞初來歸任佐領其子葉思赫亦原任佐領孫赫原任員外郎伊拉齊原任驍騎校穆赫林巴什俱原任筆帖式色克塞赫由護軍校從征浙江福建屢敗賊衆後征四川奮勇破賊有功授騎都尉任參領又塔郎阿之曽孫衆神保現任陵寢掌關防官伊進泰現任筆帖式達蘭泰現任二等侍衛兼茶房總領元孫常保住原任佐領常安現任藍翎侍衛察喇現任筆帖式又塔郎阿親弟雅爾布之子綽內原任佐領又親弟阿爾泰之子托類亦原任佐領孫齊旒原任治儀正曽孫來屯原任主事西喇巴國鑲白旗包衣人覺色同族世居額爾敏地方初同兄塔郎阿來歸設佐領使統之歷任世祖上駟院大臣順治九年章皇帝念西喇巴在太祖時效力多年恃授騎都尉卒其子庫祿孫阿明阿太宗相繼承襲又西喇巴之子達世顯原任佐領孫瑚品原任頭等護衛僧保原任佐領曽孫六格原任長史兼佐領又西喇巴親弟阿爾布之子武蘭布由典儀從征察哈爾布爾尼有功授雲騎尉任參領卒其子祿爾襲職滿平阿國正黃旗包衣人覺色同族世居額爾敏地方初來歸授備禦從征界凡曽被重傷太祖髙皇帝以其歸附後效力多年又身被重傷古原特恩賜姓覺羅其子騰起原任頭等侍衛孫費揚任護軍參領隆科原任三等侍衛華善由護軍校從征浙江舟山擊敗偽英毅伯阮思等兵於海上敘功授雲騎尉任參領卒其子和爾渾襲職又滿平阿之曽孫武什原任頭等侍衛兼佐領謨爾渾原任護軍參領額爾敏原任員外郎兼佐領元孫哈爾敏原任三等侍衛興國現任庶吉士四世孫兆德昌現任檢討哈岱哈當阿俱現任筆帖式又滿平阿之兄額爾肯原任佐領其子達禮瑚原任筆帖式孫翰楚漢亦原任筆帖式鄂通果國鑲白旗包衣人覺色同族世居額爾敏地方建初來歸其子希佛訥由護軍校從征浙江福於諸暨縣擊敗賊首王宗仁兵衆又敗賊王總兵等兵於建陽縣敘功授雲騎尉任參領卒其子存柱現襲職又鄂通果親兄翁果多之子薩爾鼐原任五品典儀親弟鄂對費揚古之子羅多理原任二等護衛偏圗原任驍騎校賴達國正藍旗人覺色同族世居額爾敏地方佐領孫初來歸設佐領使統之其子桑觀原任功圗原任副都統兼佐領曽孫托和齊原任步軍統領濟星原任護軍統領兼佐領齊色原任佐領魏拉原任都統兼佐領元孫舒啓原任佐領鼐滿原任主事額色理原任親軍校庫爾禪原任委署副都統兼佐領索克錫原任二等護衛博爾渾原任典儀那親原任員外郎蘭州現任佐領那爾禪現任典儀納桑阿伊拉齊俱現任二等護衛四世孫赫貴亦現任二等護衛訥新國鑲紅旗人覺色同族世居額爾敏地方通保原初來歸其子和和納原任驍騎校孫武任典儀曽孫德成原任都統元孫三喜阿敦俱現任筆帖式以上俱係應立傳之人其餘無事迹可立傳者附載於後鑲白旗包衣馬達哈覺色同族其元孫來珠原任八品官寶貝墨爾根覺色同族其孫偉赫圖原任八品官曽孫雅圗原任驍騎校遜綽和原任八品官正藍旗恩起其曽孫達爾瑪原任典儀以上俱世居額爾敏地方係國初來歸之人鑲白旗本吉納覺色同族其曽孫官柱現任驍騎校元孫富禮布現任佐領包衣松鄂托覺色同族其子蘇赫臣遜拜俱原任驍騎校哈克薩原任六品典儀以上俱世居額爾敏地方係來歸年分無考之人各地方兆佳氏達珠瑚國正藍旗人世居訥殷江地方統之取西林村俘初來歸授騎都尉設佐領使獲三百人斬殺五十人又殺葉赫部三百人俘獲五十人又殺烏喇卦爾察人四十名葉赫部採參人三十名俘獲六人又擊敗來侵寧古塔兵斬殺百人獲甲一百副馬三百匹敘功優授三等男後征瓦爾喀被俘獲之人所害其子翁阿岱襲職圍錦州擊松山來援兵陳亡優贈為一等男其親弟之子晉布襲職三遇其子蘇班泰思詔加至二等子卒其子蘇爾泰襲職卒思詔襲職時削去襲一等男緣事革退其叔祖之孫滿所加之職承丕襲職任護軍參領兼佐領緣事革退其子永順現襲職又達珠瑚之孫珠瑪玳原任佐領曽孫蘇爾珠蘇爾蓀俱原任佐領瑪載原任二等護衛瑪爾泰原任員外郎桑格原任頭等護衛又達珠瑚親叔岱屯之孫屯塔錫原任佐領曽孫倭赫原任郎中蘇赫原任吏部尚書元孫圗納原任員外郎卓敏原任佐領四世孫巴什現任護軍校赫深現任佐領布爾機正藍旗人世居界凡地方來歸年分無考由間散從征北京攻永平府同二十四人登城敘功授騎都尉後駐劄永平府擊山海關兵陳亡其子索爾敏襲職三圍錦州擊敗松山兵定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆