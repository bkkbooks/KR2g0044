body:
  text: 八旗滿洲氏族通譜目録卷五十九鑲黃旗有名位希姓精吉氏喀喇薩爾都氏拖博輝和嶽絡氏達禮渾舍顔氏那爾渾畢魯勒氏鄂和達瑚克錫勒氏偏圖順布魯氏科啓舒發察氏雅努殷佳氏噶達渾圖爾敦氏蘇拉鼐慶格理氏蓋穆蘇拉喇氏塔凱阿爾拉氏洪阿察墨勒氏伊登額巴爾拉氏布顔圖敖拉托欣氏古禮爾勤拜英格理氏海泰穆雅氏吳凱攸絡庫氏卓思科鄂羅氏瑚什理嘉普塔喇氏瑚什巴富森氏法沙善瑚遜氏札林正黃旗有名位希姓佟啓氏魯克都理葛爾克氏永阿泰圖佳氏昂阿拉古爾吉氏拖科泰傅錫理氏喀齊都墨佳氏墨光顯伊拉齊氏德希勒額爾格濟氏吳庫布賴倭赫氏龎愛吳聶齊氏鄂敦都克達氏科盤赫爾濟氏伊莽阿錫爾弼氏額宜色白佳氏阿蘭塔喇氏鄂密善宏義氏鄂克托溫屯氏康泰富色勒氏噶布拉倭徹庫氏丹達哈凱隆氏赫門德玉克墨氏鈕鼎阿伊喇氏孔果絡克伊克勒氏阿思瑚理甘佳氏瑪優齊達勒氏綏赫泰瑚特氏博爾晉墨爾迪氏伊爾格武爾貴嶽理氏瑪隆武公儀理氏錫倫欽定四庫全書八旗滿洲氏族通譜目録卷五十九鑲黃旗有名位希姓精吉氏喀喇薩爾都氏拖博輝和嶽絡氏達禮渾舍顔氏那爾渾畢魯勒氏鄂和達瑚克錫勒氏偏圖順布魯氏科啓舒發察氏雅努殷佳氏噶達渾圖爾敦氏蘇拉鼐慶格理氏蓋穆蘇拉喇氏塔凱阿爾拉氏洪阿察墨勒氏伊登額巴爾拉氏布顔圖敖拉托欣氏古禮爾勤拜英格理氏海泰穆雅氏吳凱攸絡庫氏卓思科鄂羅氏瑚什理嘉普塔喇氏瑚什巴富森氏法沙善瑚遜氏札林正黃旗有名位希姓佟啓氏魯克都理葛爾克氏永阿泰圖佳氏昂阿拉古爾吉氏拖科泰傅錫理氏喀齊都墨佳氏墨光顯伊拉齊氏德希勒額爾格濟氏吳庫布賴倭赫氏龎愛吳聶齊氏鄂敦都克達氏科盤赫爾濟氏伊莽阿錫爾弼氏額宜色白佳氏阿蘭塔喇氏鄂密善宏義氏鄂克托溫屯氏康泰富色勒氏噶布拉倭徹庫氏丹達哈凱隆氏赫門德玉克墨氏鈕鼎阿伊喇氏孔果絡克伊克勒氏阿思瑚理甘佳氏瑪優齊達勒氏綏赫泰瑚特氏博爾晉墨爾迪氏伊爾格武爾貴嶽理氏瑪隆武公儀理氏錫倫
