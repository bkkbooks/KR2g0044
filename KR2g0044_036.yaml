body:
  text: 八旗滿洲氏族通譜卷十七汪秦地方西林覺羅氏屯台鑲藍旗人世居汪秦地方號西林覺羅氏土風淳厚族姓繁衍太祖國初率族屬來歸遂取屯台女弟為巴圖魯郡王髙皇帝甚愛重之禮敦妃以覺羅叔瓦爾喀女弟妻之及初設佐領編為全佐領並給佐領分備禦世職使統焉生二子長子圖捫襲父職屢從五大臣征伐有功圍大凌河首先破敵明監軍道張春率兵數太宗文萬來援復身先迎擊力戰敵兵中炮股斷殺賊皇帝親臨撫問猶大聲曰臣固無傷尚可太宗軫也翼日竟卒備禦世職雍正三年悼甚至特給世宗憲皇帝敕建昭忠寺祀死節諸臣圖捫與焉七年冬十月以曾孫鄂爾泰平蠻功奉上諭鄂爾泰忠誠體國經理苗疆勳績𢡟著伊曾祖圖捫於開國時奮勇陷陳效命疆場忠節炳然垂光衍慶積於其孫鄂爾泰為不世出之良臣祖孫忠良後先輝映朕甚嘉焉著將鄂爾泰之曾祖祖父俱照總督加內大臣兵部尚書職銜給與一品誥封其圖捫昭忠寺牌位改為新贈之銜入於大臣之列欽此乾覃恩追隆元年恭遇少保贈光祿大夫保和殿大學士初圖捫之卒也其子圖彥圖襲職歷任佐領參領户部理事官當定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆又追至慶都縣大敗之隨衆敘功加一雲騎尉時頒賞勳特命圖戚房舍田土藍旗事房舍自取狹小田土自取彥圖督理鑲瘠薄衆咸服其公正明年年四十二卒遺四子長圖拜次吳拜次鄂拜次蘇拜皆在髫齡前屢有戰功未及敘聞者傷之其後子孫多貴顯以鄂拜第四子鄂爾泰功兩膺封典悉如圖捫爵恩詔加圖拜襲前職遇尉卒子圖鼐襲職任護軍參領授三等輕車都卒子圖密善襲騎都尉兼一雲騎尉現任參領兼佐領吳拜及其子吳達理俱佐領鄂拜厯國子監祭酒詳後博蘇拜原任佐領子蘇海亦原任佐領蘇山原任護軍校孫蘇成阿現任參領兼佐領屯台次子穆程原任佐領生三子長倭赫次那朗阿次南達海倭赫贈兵部員外郎那郎阿原任六品典儀南達海原任佐領倭赫子蘇赫原任員外郎那朗阿子達賴原任參領兼佐領達哈立原任主事南達海子安塔哈原任助教達賴子達海原任參領兼佐領達善現任防禦安塔哈子安岱現任佐領達海子達世郎現任三等侍衛鄂拜鑲藍旗人圖彥圖第三子圖捫之孫屯台之曾孫也父母早殁兩兄一弟皆髫齓鄂拜至性過人每以不及事父母友愛諸昆弟彌篤雖各分居從不私一物下至飲食衣服亦必先兄弟而後妻子通族通旗皆稱之幼好讀書稍長即嗜正學四子六經外於朱子通鑑綱目一書尤為究心歲讀一兩周自元旦至除夕不少輟嘗謂理學經濟盡在此中但能貫通毋須多為也平生耿介以義命自安不妄交一人尢嚴于權要厯户部工部郎中至國子監祭酒纍四十年祖業之外未嘗長尺寸致仕後園居十五載足跡不入城市讀書課子暇日教以射曾不及碎務每誡諸子曰吾本舊族家世忠孝自汝髙曾以迄於今無臨陳不勇之男無夫死再嫁之女汝曹讀書當以明理為凖得官不為難科名亦非所急但能敬念先人爭自樹立即便貧賤困頓亦不失為完人若不自刻勵希冀浮榮縱使富貴顯赫稱羡一時而被人指斥終成玷辱尚何以繼家聲而報國恩乎諸子凛遵家訓皆循循有規矩相繼登仕版以子鄂爾泰屢膺榮封追贈三世並由內大臣兵部尚書晉少保大學士之秩當時固皆以鄂氏積德纍功宜遭此盛典也鄂拜生六子長子鄂善原任筆帖式次子鄂賚早卒第三子鄂林泰原任中書第四子鄂爾經筵泰康熙己卯科舉人現任衛內大臣講官太保議政大臣領侍保和殿大學士總理兵部事三等伯前雲貴廣西三省總督西北兩路經略第五子鄂爾奇康熙壬辰科進士厯都察院左都御史户兵兩部尚書兼國子監祭酒教習翰林院庶吉士步軍統領第六子鄂禮京幾道監察御史巡按直隸長蘆鹽政署理天津鎮總兵官鄂善子鄂昌雍正甲辰科舉人厯四川巡撫現任甘肅按察使鄂林泰子鄂敏庚戌科進士翰林院編修現任兖州府知府鄂爾泰生六子長鄂容安癸丑科進士現任國子監祭酒次子鄂實出繼六弟鄂禮第三子鄂弼由郡庠生現充三等侍衛第四子鄂寧郡庠生第五子鄂欣現係固山額駙第六子鄂謨年幼業儒鄂爾奇子鄂倫癸丑科進士現任翰林院編修鄂禮嗣子鄂實現充三等侍衛西楞額國鑲藍族人屯台同族世居汪秦地方時入山海初來歸其孫恩圖由佐領定鼎燕京關擊敗流賊馬步兵二十萬衆敘功授雲騎尉兩遇恩詔加至騎都尉兼一雲騎尉後破流賊滅福王平定河南江南等處屢著戰功又征大同擊敗左衛恩詔加馬步兵敘功授為三等輕車都尉又遇至二等輕車都尉尋以監造天壇殿辦事稱職授為一等輕車都尉卒無嗣其親叔奉先之元孫察馨襲職卒其子愛新襲職卒其子樂善襲職時削去恩詔所加之職承襲騎都尉兼一雲騎尉現任副都統兼佐領又西楞額之孫阿喀達原任護軍校羅奇由啓心郎從征索倫部落效力行間忠直任事兼曉書籍賜巴克什號厯任副都統兼佐領曾孫蘇柱原任頭等護衛恩格理原任內閣侍讀學士兼佐領元孫桑格原任協領蘇柏林原任佐領四世孫蒼賽福俱原任佐領新保現任筆帖式關保現任二等護衛五世孫蘇爾敦齊格俱原任頭等護衛愛福原任副參領兼佐領蘇爾岱原任親軍校蘇努渾原任筆帖式烏赫現任佐領拉爾霸國正藍旗人世居汪秦地方原任護軍校雅思哈初來歸其四世孫尼什哈由護軍校從征湖廣於常德府擊敗賊僞將盧名臣等兵二萬餘衆後征貴州擊賊李定國兵贈雲騎殁於陳常保襲職從征察哈爾布爾尼於大鹵尉其子地方兩敗賊兵敘功授為騎都尉又征厄魯特噶爾丹於昭莫多地方奮勇破賊有功加一雲騎尉任協領卒其子索鼐襲職卒其子蘇格現襲職又拉爾霸之五世孫鼐松阿原任御史拜珠瑚原任步軍副尉福格原任筆帖式哈爾布原任護軍校赫雅圖原任驍騎校六世孫阿素那爾泰俱原任筆帖式索爾泰色德俱現任筆帖式哈喜原任驍騎校石圖原任護軍校色克臣現任驍騎校吳拉禪由護軍校從征凖噶爾在和通呼爾哈腦爾地方奮勇擊賊陳亡贈雲騎尉無嗣其親兄之子額楞泰現襲職又拉爾霸之七世孫薩亷現任中書武泰現任筆帖式八世孫納敏亦現任筆帖式按拉爾霸與本旗同里拉瑚塔同族旒留國鑲藍旗人世居汪秦地方領曾孫運推原任佐初來歸其孫凖推原任協領阿哈尼堪由驍騎校從征江西於吉安府兩敗賊兵續征廣東於韶州府擊賊僞將馬寶兵贈雲騎殁於陳阿爾賽襲職卒其子阿發哈現襲職又尉其子旒留之元孫永愛現任防禦阿哈禮原任筆帖式以上俱係應立傳之人其餘無事蹟可立傳者附載於後正藍旗拉瑚塔其元孫瑚特海原任佐領六十原任步軍校四世孫瑪凖原任郎中伊拉秦原任護軍校伊爾赫圖原任防禦五世孫扎爾瑚亦原任防禦赫色原任驍騎校塞赫布現任護軍校六世孫赫爾庫原任佐領按拉瑚塔與本旗同里拉爾霸同族鑲藍旗吳當阿屯台同族其子兌齊克原任參領孫烏爾坤䝉古原係扎爾固齊任佐領性鑑原任佐領郭和理原任員外郎曾孫納爾泰原任佐領扎爾柱原任典儀賚珠瑚檀拜俱原任防禦元孫偉達亦原任防禦蘭拜原任參領拉色原任驍騎校格錫特原任御史四世孫莽吉祿拉僧阿俱原任筆帖式偉圖布原任甘肅布政使輝保現任七品官偉保住現任驍騎校永常現任筆帖式薩哈連薩哈達俱原任護軍校五世孫瑪全福原任筆帖式瑪瑚原任護軍校公安現任主事善岱現任前鋒校衮拜屯台同族其子巴什原任甘肅布政使孫那塔原任筆帖式曾孫納爾善現任郎中性欽其子博濟原任筆帖式孫博喜圖亦原任筆帖式西特庫原任三等護衛其子姜格原任護軍校孫扎理亦原任護軍校雅理現任護軍校雅理今隸本旗包衣以上俱世居汪秦地方係國初來歸之人鑲白旗包衣侃泰其子烏禮原任三等護衛孫伊成額黑達色俱原任包衣大由正白旗改隸瑪爾塔其四世孫楞格原任三等護衛六世孫石圖霸原任二等護衛七世孫七格原任頭等護衛八格原任護軍校舒通阿現任筆帖式由正白旗改隸阿爾布哈其子瑪蘭原任包衣大孫思珥亦原任包衣大曾孫巴爾原任八品官由正白旗改隸鑲藍旗噶克珠理其孫阿林原任親軍校納秦現任護軍校曾孫安品現任前鋒校安昌現任驍騎校以上俱世居汪秦地方係來歸年分無考之人各地方西林覺羅氏雅爾納國鑲白旗人世居尼馬察地方佐領使統之時有初率眷屬來歸授騎都尉設明兵來犯華克沙漢地方雅爾納追擊斬之授為三等輕車都尉後克遼東有功授為二等輕恩詔加車都尉三遇其長子瑚克晉襲職卒其第三弟至三等男卒恩詔所佛倫襲職卒其子瑪爾泰襲職時削去保現襲加之職承襲二等輕車都尉卒其子鐵職又雅爾納之次子吳克晉原任佐領孫吳什哈韓楚漢俱原任佐領定柱原任護軍校瑪爾素現任步軍校曾孫岱漢珠現任佐領四世孫金梁亦現任佐領又雅爾納親伯奇旒之曾孫布思塔由護軍校從征四川於盤龍山擊賊僞將王屏藩兵陳亡贈雲騎尉其子福森保襲職緣事革退其子官天綬襲職卒其子塞克圖現襲職又雅爾納伯祖尼雅爾克之曾孫伊爾格訥由驍騎校從征浙江於江山縣擊賊僞都督姜揚順等兵陳亡贈雲騎尉無嗣其親弟費雅思哈襲職卒其子哈達哈襲職現任佐領又雅爾納之族孫薩喇艾哈濟俱原任員外郎凖泰原任佐領舒泰原任驍騎校曾孫徹松原任主事徹柏現任主事卓林原任防禦那爾布巴蘭秦俱原任筆帖式徹福現任筆帖式元孫八十三現任員外郎九格現仕佐領薩爾泰現任護軍校四世孫浩善現任驍騎校巴布哈國正白旗人雅爾納同族世居寧古塔地方統伊初來歸其曾孫瑪喀納原任白都訥副都佛訥原任三等侍衛岱山現任頭等侍衛達郎阿現任二等侍衛元孫塞楞特現任六品典儀滿達爾善現任筆帖式尼瑪理原任三等侍衛又巴布哈之族孫鄂色納原任佐領曾孫薩爾圖現任驍騎校方喀拉鑲藍旗包衣人世居哈達地方天聰時來歸其子顔布祿由包衣佐領定鼎燕京時入山海關擊敗流賊馬步兵二十萬衆敘功授雲騎尉三遇恩詔加至三等輕車都尉卒無嗣其親弟之子二格襲職卒其子浩善襲職現任佐領又方喀拉之元孫和順鄂現任護軍校賁布努國正白旗人世居訥圖村地方領伊哈納由前鋒初來歸其曽孫衮泰原任佐校從征四川屢敗賊僞將吳之茂等兵平定陜西擊賊僞總兵髙定等兵於顯義關大敗之圍秦州擊敗逆賊王輔臣兵一萬八千餘衆敘功優授騎都尉卒其子官德襲職緣事革退其親伯之孫石德現襲職又賁布努之元孫尹泰原任刑部侍郎兼詹事府詹事哈斯瑚圖理布俱原任防禦顔玳國鑲藍旗人世居瓦爾喀地方從征江西擊敗賊初來歸其子丹岱由驍騎校僞將黃茂等兵征廣西擊敗賊僞將范齊韓等兵二萬餘衆續征雲南擊敗賊僞將何繼祖等兵於石門坎黃草壩又敗賊僞將胡國秉等兵於雲南城下敘功優授騎都尉卒其子愛圖孫敦柱相繼承襲貝楞額國正紅旗人世居吉陽地方等護衛西特庫原任初來歸其孫納秦原任三筆帖式鄂爾渾由驍騎校從征雲南纍著軍功優授騎都尉卒其子渾敦孫胡理巴相繼承襲又貝楞額之曾孫薩克新原任鳴贊布顔國正白旗人世居長白山地方之列其子布拉喀初同族衆來歸擢置五大臣原任內務府總管孫納秦原任驍騎校曾孫彥泰由委署驍騎校從征廣東於韶州府擊敗賊僞將馬寶等兵一萬餘衆續征雲南擊敗賊僞將何