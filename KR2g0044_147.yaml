body:
  text: 八旗滿洲氏族通譜卷七十三附載滿洲旗分内之高麗姓氏洪氏洪氏係隸滿洲旗分之高麗一姓其氏族散處於南大門得州易州開城府等地方牟易金正白旗人原籍無考書國初来歸原任頭等侍衛其子舒原任筆帖式洪德克孫正紅旗包衣人世居南大門地方洪國初来歸其子洪田原任包衣大孫滿舍璣原任司庫曾孫洪德元原任員外郎敬文正黄旗包衣人世居得州地方天聰時来歸其子明綬原任驍騎校孫吳保原任郎中二格原任筆帖式曾孫常安原任佐領七十八原任驍騎校洪義仁正黄旗包衣人世居易州地方天聰時来歸其子瓦爾逹原任司庫孫僧保原任通事官曾孫官音保現任佐領洪鄧南正黄旗包衣人世居開城府地方天聰時来歸其子德烏濟原任通事官孫二格亦原任通事官曾孫瑪逹爾現任庫掌洪顔林正黄旗包衣人世居開城府地方天聰時来歸其曾孫勾爾現係馬甲崔氏崔氏係隸滿洲旗分之高麗一姓其氏族散處於易州𤓰克山開城府得州等地方江那米正紅旗人世居易州地方次國初来歸其長子四通阿原任御史子蓋什泰原任歩軍校曾孫碩勾華色俱原任筆帖式新鼐原任御史曾韶原任䕶軍校崔泰正藍旗包衣人世居𤓰克山地方天聰時来歸其孫徳依濟理原任䕶軍校和善原任八品典儀崔禮弼正黄旗包衣人世居開城府地方天聰時来歸其次子岱吉禮三子塔文宻俱原任通事官孫伯葉理原任通事官曾孫岱保亦原任通事官佟保原任筆帖式寧德現任䕶軍校鐘格尼正黄旗包衣人世居得州地方天聰時來歸其曾孫觀音德現係馬甲朔陽西正紅旗人原籍来歸年分俱無考其曾孫傅爾敦現任三等䕶衛梅楞正藍旗包衣人世居𤓰克山地方来歸年分無考其孫勾紫原任八品官福羲鑲黄旗包衣人世居易州地方来歸年分無考其曾孫二格現係閒散劉氏劉氏係隸滿洲旗分之高麗一姓其氏族散處於安法博川郡等地方薩穆吉正黄旗包衣人世居安法地方来歸年分無考原任藍翎侍衛劉平正藍旗包衣人世居博川郡地方来歸年分無考其孫能色尼原任六品通事官曾孫能格現任七品通事官元孫劉位蕃劉位㴠俱現係監生武能正黄旗人原籍来歸年分俱無考其曾孫薩哈廉現係䕶軍三鼐鑲白旗包衣人原籍来歸年分俱無考其曾孫逹五格現係馬甲劉文宣鑲白旗包衣人原籍来歸年分俱無考其元孫德克晉現係䕶軍黄氏黄氏係隸滿洲旗分之高麗一姓其氏族散處於易州開州蓋州等地方黄琉鑲黄旗包衣人世居易州地方来歸年分無考其孫德楞額現任筆帖式伊勒穆蘇正白旗包衣人世居開州地方来歸年分無考其子吉圖原任委署䕶軍叅領孫輝色現任郎中法保正黄旗包衣人世居易州地方来歸年分無考其曾孫老格現係馬甲崔莽牛正白旗包衣人世居蓋州地方来歸年分無考其曾孫金札現係䕶軍傑尼正白旗包衣人世居蓋州地方来歸年分無考其曾孫常清現係馬甲岡氏岡氏係隸滿洲旗分之高麗一姓其氏族散處於易州望京等地方茂思鑲藍旗包衣人世居易州地方孫國初来歸其子拉楊阿原任二等䕶衛托克托和現任六品包衣大費查庫鑲藍旗包衣人原籍無考任國初来歸其子哆什竒原八品官濟爾宻喜正黄旗包衣人世居易州地方天聰時来歸其孫胡著原任通事官曾孫廣德亦原任通事官七十六現任委署䕶軍叅領德葉米正黄旗包衣人世居望京地方天聰時来歸其孫五十四現係馬甲楊氏楊氏係隸滿洲旗分之高麗一姓其氏族世居輝寧地方蘇巴濟正黄旗人原籍無考七國初来歸其孫馬齊原任品官傑漢尼正黄旗包衣人世居輝寧地方天聰時来歸其孫黄茂七十八俱原任通事官曾孫華善原任庫掌徳平現任通事官吳氏吳氏係隸滿洲旗分之高麗一姓其氏族散處於易州海州等地方吳岱榜正紅旗人世居易州地方孫國初来歸其子蓋什泰原任驍騎校郎圖亦原任驍騎校曾孫常顔現任歩軍校吳那海鑲白旗包衣人世居海州地方天聰時来歸其元孫朱龍阿現任三等䕶衛老格現任八品官陳氏陳氏係隸滿洲旗分之高麗一姓其氏族世居平壤地方陳都鑲白旗包衣人世居平壤地方天聰時来歸其孫逹雅圖原任八品官霸顔鑲藍旗包衣人原籍無考天聰時来歸其曾孫二逹色現係䕶軍文氏文氏係隸滿洲旗分之高麗一姓其氏族世居嘉山堡地方文瑞鑲白旗包衣人世居嘉山堡地方石國初来歸原任八品通事官其長子所尼原任六品包衣大次子壹石尼原任七品通事官三子波石尼原任六品通事官孫倭赫原任八品通事官三格原任頭等䕶衛七格現任長史曾孫德光原任主簿文炳原任八品通事官徳馨現係舉人孫氏孫氏係隸滿洲旗分之高麗一姓其氏族世居望京地方玉蘭鑲藍旗包衣人世居望京地方子國初来歸其長子塞尼原任六品官次謝秘原任郎中第四子索柱原任司庫孫唐武原任二等䕶衛六爾邁色福保俱原任䕶軍校杭艾原任頭等䕶衛曾孫達赫原任八品通事官積福現任六品通事官元孫定柱現任筆帖式丁氏丁氏係隸滿洲旗分之高麗一姓其氏族世居恩山縣地方古爾馬渾正紅旗包衣人世居恩山縣地方魁國初来歸原任通事官其子白晉原任䕶軍校孫莽董儀皮占俱原任䕶軍校任氏任氏係隸滿洲旗分之高麗一姓其氏族世居易州地方外朗鑲白旗包衣人世居易州地方孫國初来歸其子申朱納原任頭等䕶衛佟保原任三等䕶衛曾孫賈輝現係㧞貢伊氏伊氏係隸滿洲旗分之高麗一姓原籍無考朋楚尼正黄旗人原籍無考孫國初来歸其孫哈逹原任歩軍校曾阿琉原任防禦額爾德原任驍騎校元孫四聖保現任筆帖式宋氏宋氏係隸滿洲旗分之高麗一姓原籍無考仲格正黄旗人原籍無考驍國初来歸其子社爾都原任騎校徐氏徐氏係隸滿洲旗分之高麗一姓其氏族世居噶山地方徐大勇鑲白旗包衣人世居噶山地方通國初来歸其曾孫徐宗順現任八品事官徐宗孟現任六品通事官車氏車氏係隸滿洲旗分之高麗一姓其氏族世居平陽地方調亥正黄旗包衣人世居平陽地方天聰時来歸原任通事官其孫盛帖理原任通事官曾孫鐘通義錫蘭泰俱原任通事官元孫黒竒亦原任通事官二格原任筆帖式鳳格原任䕶軍校巴格現任䕶軍叅領兼佐領萬氏萬氏係隸滿洲旗分之高麗一姓其氏族世居平陽地方滿春尼正黄旗包衣人世居平陽地方天聰時来歸其曾孫常久原任庫掌元孫鼎柱原任三等侍衛保住現任通事官江氏江氏係隸滿洲旗分之高麗一姓其氏族世居得州地方桂羲正黄旗包衣人世居得州地方天聰時来歸其曾孫七十原任主事邉氏邉氏係隸滿洲旗分之高麗一姓其氏族世居易州地方邉南正黄旗包衣人世居易州地方天聰時来歸原任通事官其曾孫韜著現任庫掌何氏何氏係隸滿洲旗分之高麗一姓其氏族世居平安道地方何龍普正黄旗包衣人世居平安道地方天聰時来歸其子常綬原任通事官閔氏閔氏係隸滿洲旗分之高麗一姓其氏族世居易州地方鐵令義鑲白旗包衣人世居易州地方天聰時来歸其子雅圖原任包衣大林氏林氏係隸滿洲旗分之高麗一姓原籍無考林尚禮鑲藍旗包衣人原籍無考天聰時来歸其孫雅圖原任五品典儀社爾現任䕶軍校佟氏佟氏係隸滿洲旗分之高麗一姓其氏族世居開州地方佟佐正白旗包衣人世居開州地方来歸年分無考其孫佟英舉原任知府佟英登原任佐領曾孫伊爾色尼原任通事官青山原任筆帖式岱佟原任司庫元孫伊蘇泰原任筆帖式六格原任郎中叅領兼佐領法保原係牧副四世孫普儀現係牧副安保現任員外郎瓦氏瓦氏係隸滿洲旗分之高麗一姓其氏族世居易州地方濟禮正白旗包衣人世居易州地方来歸年分無考原任通事官耿氏耿氏係隸滿洲旗分之高麗一姓其氏族世居博川郡地方耿世尼正藍旗包衣人世居博川郡地方来歸年分無考其子薩哈理原任䕶軍校孫赫伸現任包衣叅領宋氏宋氏係隸滿洲旗分之高麗一姓其氏族散處於得州東牛衛輝寧等地方愛楠正黄旗包衣人世居得州地方天聰時来歸其孫索柱現係馬甲宋琉正黄旗包衣人世居東牛衛地方天聰時来歸其曾孫八十三現係䕶軍傑碩正黄旗包衣人世居輝寧地方天聰時来歸其曾孫徳明現係䕶軍馬氏馬氏係隸滿洲旗分之高麗一姓其氏族世居𤓰克山地方高理鑲藍旗包衣人原籍無考天聰時来歸其曾孫皂保爾現係馬甲馬色正藍旗包衣人世居𤓰克山地方来歸年分無考其孫黒勾現係馬甲鄭氏鄭氏係隸滿洲旗分之高麗一姓其氏族世居得州地方謝基鑲藍旗包衣人原籍無考馬國初来歸其孫特克泰現係甲鄭義南正黄旗包衣人世居得州地方天聰時来歸其孫五哥現係馬甲曹氏曹氏係隸滿洲旗分之高麗一姓其氏族世居建常地方曹基正紅旗包衣人世居建常地方催國初来歸其曾孫八十現係領曹國相正紅旗人世居建常地方来歸年分無考其孫傅森額現係前鋒由本旗包衣改隸郭氏郭氏係隸滿洲旗分之高麗一姓其氏族世居易州地方鄧那米正黄旗包衣人世居易州地方天聰時来歸其孫二逹色現係䕶軍沈氏沈氏係隸滿洲旗分之高麗一姓其氏族世居得州地方傑林璧正黄旗包衣人世居得州地方天聰時来歸其孫沈存住現係馬甲方氏方氏係隸滿洲旗分之高麗一姓其氏族世居得州地方德克什正黄旗包衣人世居得州地方天聰時来歸其孫立柱兒現係馬甲秦氏秦氏係隸滿洲旗分之高麗一姓其氏族世居得州地方囊弼紫正黄旗包衣人世居得州地方天聰時来歸其孫秦五十四現係馬甲孟氏孟氏係隸滿洲旗分之高麗一姓其氏族世居易州地方羅岱鑲白旗包衣人世居易州地方天聰時来歸其孫五逹色現係馬甲田氏田氏係隸滿洲旗分之高麗一姓其氏族世居平壤地方興尼璧鑲白旗包衣人世居平壤地方天聰時来歸其曾孫德楞額現係馬甲辛氏辛氏係隸滿洲旗分之高麗一姓原籍無考星嘉那密正白旗包衣人原籍来歸年分俱無考其曾孫斯珠現係馬甲八旗滿洲氏族通譜卷七十三欽定四庫全書
