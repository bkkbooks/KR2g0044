body:
  text: 八旗滿洲氏族通譜卷二十五富察氏富察本係地名因以為姓其氏族甚繁散處於沙濟葉赫額宜湖扎庫塔蜚悠城訥殷額赫庫倫訥殷江吉林烏喇長白山及各地方沙濟地方富察氏旺吉努國鑲黄旗人世居沙濟地方初編半箇佐領使統初率族衆屬下人等來歸之卒其長子萬濟哈承襲萬濟哈之長子哈錫屯䝉世祖章皇帝特恩授騎都尉後屢授為一等輕車都尉三遇恩詔優加至一等男後又蒙太保議政大臣内大臣内特恩加一雲騎尉歴任太子賜祭葬務府總管兼佐領卒祀賢良祠其子宻思翰承如典禮追諡恪僖崇襲一等男兼一雲騎尉歴任議政大臣户部尚書内務府總管兼佐領卒賜祭𦵏如典禮追諡敏果崇祀賢良祠其第四子李榮保承襲一等男兼一雲騎尉歴任察哈爾總管恩詔所縁事革退其親兄大學士馬齊襲職時削去熈加之職承襲一等輕車都尉兼一雲騎尉康上諭馬六十一年十二月奉餘年甚屬敬謹寛厚朕齊身任大學士二十皇考凡所巡狩每常墮從殊為効力此番大事又公同善為辦理甚是黽勉勤勞伊之勤勞非尋常勤勞可比勝於一切功績著賞給一等輕車都尉或兼於本身或情願襲於子弟聼其自便欽此馬齊奏准將恩賞一等輕車都尉兼於本身續奉上諭大學士馬齊襲職時將恩詔所得之職如何削去之處著查奏欽此經吏部查奏奉㫖哈錫屯効力所得一等男兼一雲騎尉仍准承襲欽此合併恩賞一等輕車都尉晉封二等伯世襲㒺替雍正三年八月奉㫖大學士馬齊總理事務効力國家竭盡忠誠勤勞辦理殊屬可嘉著賞給騎都尉令其第十一子富良承襲欽此馬齊歴任太保太子太傅議政大臣三年九保和殿大學士户部尚書兼佐領雍正十㫖以月引年乞休奉四年五月軍機大臣奉原官致仕乾隆皇上諭原任大學士二等伯馬齊在祖時即簡任機務倚毗甚殷及皇考即位特命總理事務嘉予勞績賞給伯爵世襲罔替朕嗣位之初伊以年老力辭解退朕重違其意俞允致仕頤養高年以示優禮耆舊之意念伊歴相三朝年逾大耋抒忠宣力端謹老成領䄂班聮名望夙重舉朝大臣未有若此之久者昨聞在家患病即命太醫加意調治今聞病勢沉重朕心深北郊為悽惻本欲躬親㸔視祗因命和親王大阿哥果在即時值齋戒不獲親往特毅公訥親前徃代朕㸔視望其痊可倘病果不起著賞銀五千兩辦理後事其他加恩之處再降諭賜㫖欽此尋卒年八十八嵗文穆其第十二子富興祭𦵏如典禮加贈太傅諡承襲二等伯現任散秩大臣長子富爾敦原任茶房總領第三子富慶原任員外郎兼佐領第四子富德原係貢生第五子富廣現任員外郎第六子富成現任三等侍衞第七子富勲現任筆帖式第九子富明現任郎中第十子富向原任員外郎第十一子富良承襲騎都尉現任二等侍衞侍衞什長孫伯竒原任筆帖式賽弼漢原任佐領賽音布現任七品筆帖式官登現任中書富勒渾現任員外郎豐盛額德克精額俱現係生員富强薩克新俱係監生曾孫愛隆阿現任筆帖式永安現任佐領宻思翰之長子馬思喀歴任内大臣招武將軍都統兼佐領卒賜祭葬如典禮諡襄貞其長子納爾泰原任佐領次子薩爾泰原任協領孫富昌原任二等侍衞侍衞班領兼佐領佛成現任整義尉兼佐領密思翰之第三子馬武歴任領侍衞内大臣兼佐領雍世宗憲正五年五月從皇帝念其侍聖祖仁皇帝五十餘年恪恭敬慎勤勞無倦特恩賜三等輕車都尉卒賜祭葬如典禮諡勤恪其子薩喇承襲三等輕車都尉卒親弟保祝襲職現任古北口提督孫富永現任三等侍衞赫成現任藍翎侍衞富景現任三等侍衞兼佐領密思翰之第四子李榮保於乾皇后隆二年十二月吏部為謹按彝章推封外戚具題奉㫖追封李榮保為一等公以第四子富文承襲一等侯現任三等侍衞長子廣恒現任主事次子富清現任天津總兵官第三子富寧原任筆帖式第六子富寛現任筆帖式第八子富玉現任三等侍衞第九子富謙亦現任三等侍衞第十子富恒現任御前侍衞内務府總管萬濟哈之次子吉爾塔巴由䕶軍校破流賊滅福王平定河南江南等處恩詔加屢著軍功授雲騎尉三遇政使司左通政卒其至三等輕車都尉歴任通次子莊圖襲職歴任副都統兼佐領卒其親兄之孫托永襲職時削去恩詔所加之職承襲雲騎尉現任安徽布政使吉爾塔巴之長子吉思哈原任二等侍衞孫陶柱原任郎中兼佐領曾孫托隆原任郎中達爾布現任主事元孫富察善現任中書萬塔錫國鑲黄旗人旺吉努之次子也任初隨父來歸編佐領使統之陵寢總管又萬塔錫親叔雅爾布之子法特哈初由佐領過北京征山東屢著軍功授雲騎尉卒其子八格襲職卒無嗣其親兄之子索保住襲職卒其子伯喜襲職任佐領卒其子富寛現襲職又法特哈之子法喇原任佐領孫托倫保亦原任佐領愛喀保原任筆帖式又萬塔錫之弟碩色原任前鋒叅領其子阿克順常綬俱原任防禦孫覺和托亦原任防禦雅隆武現任張家口總管曽孫額爾𤦺原任防禦元孫徹爾圖現任佐領章泰現任防禦延珠瑚國鑲黄旗人旺吉努同族世居沙濟地方雅頼原初同兄高圖弟噶哈衞齊等來歸其子任佐領孫華色原任員外郎隆柱現任驍騎校達賚由委署䕶軍校從征雲南擊敗賊偽將何繼祖等兵於石門坎黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功授雲騎尉卒其子蘓冲阿現襲職又延珠瑚之曽孫索住現係副䕶軍校高圖之孫尼滿原任刑部尚書曽孫通周原任六品官法保寳存俱原任三等侍衞永徳原任陵寢總管永存原任助教元孫永保常保俱現任筆帖式七十一原係副驍騎校噶哈之孫烏爾琥原任防禦曽孫薩哈連由員外郎從征四川至陜西寧𦍑州値王輔臣之亂兵變陣亡贈雲騎尉其子三台襲職卒其子岱格襲職現任䕶軍叅領衞齊原任叅領其子翰楚漢原任雲麾使孫噶爾薩原任冠軍使什保原任寺丞法僧原任太僕寺少卿曽孫石圖原任御史福定原任員外郎舒圖現任䕶軍叅領福德原任八品官福禄原任七品官福魁現任筆帖式穆理渾原任筆帖式元孫福保原任筆帖式額爾登布現任筆帖式本科理國正黄旗人旺吉努同族世居沙濟地方等梗化初來歸時有朱舎里十三部長尤楞額命徃𠞰不服本科理奉克服其衆賜蘓赫巴圖魯號初編佐領使統焉其子敦拜以辦事有能不違指使授騎都尉初圍錦州擊敗松山杏山馬歩兵加一雲騎尉定鼎燕京時入山海闗擊流賊馬歩兵二十萬衆又追至慶都縣大敗之優授為二等輕車都尉後破流賊滅福王平定河南江南等處屢著戰功授為一等輕車恩詔加都尉遇尉征江西擊敗賊首金聲桓等兵七萬一雲騎恩詔優餘衆恢復一府四縣叙功授為三等男兩遇於加至一等男兼一雲騎尉從征廣東廣西時新會縣屢敗賊偽將李定國馬歩兵恢復廣東三府三州十八縣廣西二州四縣叙功優授為賜祭葬一等子任奉天將軍加太子太保卒什布襲職如典禮諡襄壯無嗣其親弟之孫胡恩詔所歴任副都統卒其子馬爾岱襲職時削去卒其加之職承襲一等男任三等侍衞兼佐領子富鼐襲職現任佐領又本科理之子濟錫哈由佐領徃征博穆博果爾招撫二村獲丁壯三十三人三圍錦州擊敗松山杏山馬歩兵定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆叙功授騎都尉尋擢工部侍郎以考績稱職加一雲騎尉遇恩詔授為三等輕車都尉後征浙江於杭州府屢敗賊首方國安等兵二萬餘衆授為二等輕車都尉恩詔優兩遇一等男縁事䧏為一等輕車都尉歴任議加至政大臣刑部尚書都統卒其子阿魯襲職歴任都統後縁事革退其親兄之子翁諾襲職時削恩詔所去之職現襲三等輕車都尉又本科理之子岱加福哈原任頭等䕶衛費雅思哈由䕶軍叅領過北京征山東累著軍功定鼎燕京時入山海闗擊敗流賊馬歩兵二十萬衆授騎都尉後從征四川擊敗賊張獻忠兵於漢中府加一雲騎尉恩詔加三遇等輕車都尉又從征大同擊敗賊楊進位至一馬歩兵五千餘衆征雲南入緬國至阿窪城獲偽桂王叙功優授為三等男歴任議政大臣䕶恩詔所軍統領卒其孫蘓圖襲職時削去寕夏副都統加之職承襲二等輕車都尉尋授征凖噶爾在和通呼爾哈腦爾地方擊賊陣亡優贈騎都尉兼一雲騎尉併為三等男令其子蘓瑚濟承襲現任副都統費雅思哈之子蘓丹因征𠞰逆冦羅卜蔵丹津有功授三等輕車都尉歴任西安將軍議政大臣都統卒其子蘓章阿襲職現任三等侍衞又本科理之孫博德理費雅達愛達穆理庫俱原任頭等䕶衞遜布祿原任協領保住原任䕶軍叅領兼佐領瓦爾達由䕶軍統領征𠞰厄魯特噶爾丹於昭莫多地方破賊有功授雲騎尉卒其孫博爾渾現襲職又本科理之曽孫貝和諾歴任雲南貴州總督禮部尚書武丹原任佐領圖林原任員外郎圖勤原任三等䕶衞麻色原任郎中阿穆楚庫原任協領吳錫泰現任防禦札三台現任佐領珠爾哈圖原任典儀慶保原任筆帖式元孫邁圖原任郎中馬臘原任都統工部尚書馬爾圖原任荆州副都統阿山原任右衞副都統哈山原任頭等䕶衞馬紳原任員外郎馬爾泰現係監生四世孫富保現任佐領蘓爾慶阿現任筆帖式長庚原任員外郎常明現係廕生八十昻吉禄俱現係監生富蘭現係生員五世孫富茹現任六品官又本科理族弟隆錫松錫蘓愷俱原任歩軍校族姪遜布原任主事魏達善原任協領廣東原任驍騎校族孫濟拉布現任筆帖式赫碩色蘓章阿俱原任筆帖式由正紅旗改隸唐哈思瑚國鑲黄旗人世居沙濟地方署叅領從征浙江福初來歸其孫羅多理由委建於泉州府等處屢敗賊偽總督趙得勝及賊偽將劉國軒等兵續征雲南擊敗賊偽將何繼祖等兵於黄草壩又敗賊偽將胡國秉等兵於雲南城下叙功優授騎都尉年老告退其子額爾泰襲職卒其子新柱襲職現任福州將軍又唐哈思瑚之孫黒色原任委署䕶軍叅領訥爾布原任防禦吳格現任歩軍校曽孫保住原任委署䕶軍叅領本岱原任䕶軍叅領巴格現任六品官佟保現任䕶軍校元孫柏露原係副䕶軍校莽色國鑲黄旗人世居沙濟地方二等侍衞曽孫岱都初來歸其孫達爾漢原任原任歩軍校尼堪原係監生元孫申培原任歩軍校努黒原任禮部侍郎四世孫九格原任博士富顯原任員外郎五格原任庶吉士八格公濟俱原任筆帖式五世孫倭星額現任郎中富俊現任主事富傑現任中書塔克新原任筆帖式六世孫都墨伸現任筆帖式福德現係監生喀爾喀瑪鑲紅旗人世居沙濟地方天聰時來歸其孫額倫德原任七品官曽孫馬鼐原任筆帖式瓦鼐原任郎中元孫覺和托原任刑部侍郎額錫圖原任典儀富明現任防禦四世孫倉德現任岳常道峻德現任三等䕶衞以上俱係應立傳之人其餘無事蹟可立傳者附載於後鑲黄旗雅穆喀其孫松格理原任防禦曽孫拜都原任䕶軍叅領劉柱原任佐領魯庫德原任䕶軍校察哈達孟格二格俱原任驍騎校元孫哈爾薩亦原任驍騎校巴都理原任員外郎伯經原任藍翎侍衞黒達色現任驍騎校四世孫常鍾現任千總五世孫索柱原任筆帖式邁圖現任筆帖式拉都哈其孫常綬原任筆帖式納秦原任驍騎校曽孫布爾賽現任歩軍校明泰現任副叅領石順現任驍騎校元孫克䝉額現任鳴贊阿爾泰其孫常明原任驍騎校僧格訥原任歩軍校翁格訥原任佐領曽孫瞻岱原任主事富爾泰現任員外郎富江現任䕶軍校岱清阿其子法渾原任驍騎校孫富爾敦原任員外郎曽孫雅圖亦原任員外郎綏哈達現係副驍騎校阿納海其子巴哈塔原任筆帖式孫外博色