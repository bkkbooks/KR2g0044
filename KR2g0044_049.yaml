body:
  text: 八旗滿洲氏族通譜目録卷二十四輝發地方納喇氏通貴薩碧圗莽科三檀博爾濟碩色吳巴世屯泰碩蘇札庫阿鼐謨式恩格德伊哈那以上俱有傳額德葉普肯蘇巴泰瑚錫布吳喀和順尼喀達額爾德穆吳什泰羅察喀爾喀瑪溫濟赫納秦寬泰庫布輝璧桑阿鄂克遜托絡約唐阿圗碧赫德啓訥伊喇布索渾色資薩哈廉雅爾布翁藹曹桂鄂托巴彥以上俱附載各地方納喇氏巴奇蘭懇奇排達爾漢扎拉庫哈思瑚多博諾哈克薩哈瑚錫布納林勒殷徹臣岱達拖圗博德訥阿庫密佟那密英安鼐庸伊以上俱有傳達齊納岱都尼喀理齊努渾殷塔和穆多席伯察庫布顔達密善吳爾齊海鼐格莽健顔錫達禮瑚巴顔常武西喇渾掖洪果爾岱齊瑪庫謨爾渾董錫庫翁果托南都理阿郎阿元泰索爾蓀外圖渾塔海鼐金特尼瑪善碩禮喀碩色阿克瞻衮善二格泰布察海對喀那額爾格圗確爾那福德理台禮漢儀布吉采柱賴色和拖伍什薩穆哈吳瑚訥阿爾那武達哈安珠瑚和敏杭什庫德保渾岱珠爾泰渾齊理喀喀鄂謨克托以上俱附載
  hash: sha256:4f91732f4ae38e5278b5a77f82bc438f4d959798942b45af09bf4bd66a727681
