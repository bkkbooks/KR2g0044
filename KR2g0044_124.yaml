body:
  text: 八旗滿洲氏族通譜目録卷六十二正藍旗有名位希姓䝉果資氏拜新舒克都理氏阿克善費佳氏達音阿塔穆氏阿弼喀西法齊氏伊思瑚孔尼喇氏圖綬武宻札氏敦鐸倭徹勒氏倭赫訥多興氏古爾䝉額博都理氏博倫泰何齊拉氏兌樓雅佳氏什達色桓泰氏那蘇喀爾庫氏阿爾哈福錫氏倭赫莽果氏唐柱孔果絡氏圖爾漢葉禄氏尼唐阿瓢佳氏剛察札克塔氏錫爾哈綽絡氏綽克托索濟雅喇氏巴什瓦爾喀氏旺福鄂卓絡氏伊拉齊瑚爾哈蘇氏鄂謨克圖鑲藍旗有名位希姓恒吉理氏塞爾庫徳索徹理氏碩色錫强氏貝成額申穆理氏哲鍾峩愛塔杭佳氏杭山巴雅爾齊氏喀蘭泰阿賚氏赫紳伊爾穆氏察爾泰錫瑪拉氏塔克圖瑚爾泰氏馬達布喀克錫理氏輝塔索絡恰氏噶哈達沙達喇氏榜鈕范佳氏額爾濟圖努魯氏多和倫額行氏赫色蘇爾佳氏和隆阿申佳氏鄂爾積圖謨岳絡氏雲布玉圖墨氏薩弼洪果奇氏和爾和周成氏喀特蘇哈巴氏布爾哈岱嘉穆瑚氏佟凱良佳氏善慶舒佳氏愛星阿蒙果氏温達爾瑚努爾哈拉氏錫爾塔齊圖爾佳氏札爾吉納洪衮氏阿珠瑚拜嘉喇氏拜圖納哈塔氏徹克尼庸特氏阿禄哈爾拉氏温察海瑚塔氏阿納庫欽定四庫全書八旗滿洲氏族通譜目録卷六十二正藍旗有名位希姓䝉果資氏拜新舒克都理氏阿克善費佳氏達音阿塔穆氏阿弼喀西法齊氏伊思瑚孔尼喇氏圖綬武宻札氏敦鐸倭徹勒氏倭赫訥多興氏古爾䝉額博都理氏博倫泰何齊拉氏兌樓雅佳氏什達色桓泰氏那蘇喀爾庫氏阿爾哈福錫氏倭赫莽果氏唐柱孔果絡氏圖爾漢葉禄氏尼唐阿瓢佳氏剛察札克塔氏錫爾哈綽絡氏綽克托索濟雅喇氏巴什瓦爾喀氏旺福鄂卓絡氏伊拉齊瑚爾哈蘇氏鄂謨克圖鑲藍旗有名位希姓恒吉理氏塞爾庫徳索徹理氏碩色錫强氏貝成額申穆理氏哲鍾峩愛塔杭佳氏杭山巴雅爾齊氏喀蘭泰阿賚氏赫紳伊爾穆氏察爾泰錫瑪拉氏塔克圖瑚爾泰氏馬達布喀克錫理氏輝塔索絡恰氏噶哈達沙達喇氏榜鈕范佳氏額爾濟圖努魯氏多和倫額行氏赫色蘇爾佳氏和隆阿申佳氏鄂爾積圖謨岳絡氏雲布玉圖墨氏薩弼洪果奇氏和爾和周成氏喀特蘇哈巴氏布爾哈岱嘉穆瑚氏佟凱良佳氏善慶舒佳氏愛星阿蒙果氏温達爾瑚努爾哈拉氏錫爾塔齊圖爾佳氏札爾吉納洪衮氏阿珠瑚拜嘉喇氏拜圖納哈塔氏徹克尼庸特氏阿禄哈爾拉氏温察海瑚塔氏阿納庫
