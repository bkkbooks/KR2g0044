body:
  text: 八旗滿洲氏族通譜卷十九佟佳氏佟佳本係地名因以為姓其氏族甚繁散處于馬察雅爾湖加哈佟佳及各地方馬察地方佟佳氏按佟佳氏初巴虎特克慎生七子長曰屯圗墨圖次曰達爾漢圗墨圗三曰顔圗墨圗四曰揚嘉圗墨圗五曰坦圗墨圗六曰額赫禮圗墨圗七曰噶爾漢圗墨圗額赫禮圗墨圗生穆喀穆喀生旒錫旒錫生岱密哈岱密哈生額克星峩章京額克星峩章京生扣肯費揚古扣肯費揚古生四子長曰巴篤理次曰䝉阿圗三曰科耀四曰布遜兄弟四人自馬察地方來歸為滿洲著姓巴篤理札爾固齊國正白旗人世居馬察地方使統之預十札爾固初率五百户來歸設佐領齊之列以辦事有能不違指使授三等輕車都尉從征旅順口力戰克之敗毛文龍兵于薩爾祜斬首二百餘級又攻遵化州指麾克城有功授為二等輕車都尉歷升禮部尚書兼都統議贈為三政大臣後征大同攻王家莊陳亡三年等男以其次子卓洛承襲順治十世祖章皇帝追念國初功臣各加諡法巴篤理札爾固齊賜諡敏壯立碑紀焉卓洛初過北京征山東擊敗太監馮永盛總兵侯世祿等兵圍錦州入其郭屢敗賊衆又擊敗松山後岡所駐騎兵定鼎燕京時入山海關破流賊馬步兵二十萬衆叙功優授一等男尋任本旗副都統征湖廣敗賊一隻虎于荆州又擊僞總兵王進才馬步兵斬殺甚衆取寶慶府指麾攻城克之又敗賊曹總兵步兵縱火焚其木城尋以刑部侍郎任內考察稱職加一雲騎尉授為三等子升禮部尚書兼都統議政大臣三遇思詔加至一等子兼一雲騎尉征雲南攻取沅江府城以功晉封二等伯卒賜祭葬如典禮諡忠襄其孫赫特赫承襲二等伯兼佐領卒其弟舒敏承襲二等伯歷任都統兼佐領卒其子伊雷承襲二等伯任頭等侍衛兼佐領卒其子伊勒慎承襲二等伯現任都統散秩大臣兼佐領又巴篤理札爾固齊第三子穆濟倫由閒散特恩授為騎都尉三遇尉任頭等侍衛卒其子塢濟瑪恩詔加至二等輕車都襲職從征浙江擊敗僞總兵徐上朝兵又征福建于太平山地方敗僞總督趙得勝兵復破其營二十座叙功授為一等輕車都尉卒其子奈音泰襲職卒其子富格襲職任二等侍衛卒其思詔所子明達襲職時削去兼一雲騎尉又巴篤理扎加之職現襲騎都尉爾固齊第四子孟格圗原任頭等侍衛第五子尼雅達第六子塞根俱原任護軍參領兼佐領孫瑪哈達原任都統兼佐領舒胡德原任頭等侍衛兼佐領墨勒原任六品官邁格原任筆帖式禪達海原任驍騎校阿魯原任員外郎兼佐領愛濟哈原任七品官曽孫馬竒由佐領平定雲南屢敗賊僞將何繼祖兵于石門坎黃草壩又剿除叛逆吳世璠有功授一雲騎尉任護軍參領卒其孫塔什哈襲職現任雲麾使兼佐領又巴篤理札爾固齊之曽孫登安原任三等侍衛哲蘇原任筆帖式佟福原任中書佟德現係監生佟漢現任筆帖式元孫查魯原任五品官偉赫原任佐領覺和托現任員外郎四世孫蘭拜現任五品官瑪爾拜現任頭等侍衛兼佐領謨渾現任七品官瑪爾齊現係監生廣祥現任三等侍衛又巴篤理札爾固齊次弟䝉阿圗以來歸功授為佐領預十六大臣之列原任工部尚書其長子翁克原任護軍參領兼佐領次子尼喀達原任委署護軍參領孫鄂普敦原任三等侍衛兼佐領穆舒原任參領兼佐領多賽原任副都統兼佐領常保原任郎中曽孫達爾漢原任二等侍衛兼佐領福保原任筆帖式托永武原係庫使三保現任佐領董鄂絡現任二等侍衛札爾敏現任筆帖式元孫阿爾夸進圗俱原任筆帖式進愛現任欽天監監正兼佐領薩爾夸現任主事多理現任三等侍衛四世孫圗爾秉阿現任山東按察使薩爾秉阿現任筆帖式伊爾泰現係監生又巴篤理扎爾固齊第三上弟科耀原任子噶達渾原任二等侍衛孫布爾駟院大臣其納原任頭等侍衛赫資原任二等侍衛曽孫優楞額原任郎中兼參領思格訥原任二等侍衛齊薦現任驍騎校又巴篤理扎爾固齊第四弟布遜原任前鋒統領其長子穆臣原任三等侍衛次子達哈塔原任吏部尚書兼佐領孫蘇爾泰原任郎中兼佐領英格德原任筆帖式曽孫蘇爾弼現任同知蘇爾吉原任筆帖式德貴現任筆帖式元孫永德現係監生按巴篤理扎爾固齊與本旗雅爾湖地方達爾漢侍衛扈爾漢正藍旗加哈地方渾托和鑲黃旗漢軍旗分佟佳地方佟養正正紅旗長白山地方尼堪洪科等同族雅西塔正白旗人巴篤理扎爾固齊同族世居馬察地方國初率滿洲二百餘人漢人二百三十餘丁來歸設佐領使統之原任護軍統領其子穆福由護軍參領攻前屯衛乘夜奪門克其城定鼎燕京時入山海關破流賊馬步兵二十萬衆取太原府往探絳州渡口敗賊馬步兵又敗賊王副將兵三千餘衆叙功授騎都尉遇恩詔加一雲騎尉後征江西攻九江府步戰敗賊兵三千賊復率兵一萬餘衆來犯并擊敗之取南昌府焚賊船七百餘隻招服南豐縣又梯攻九江府指麾克城叙功授為三等輕車都尉兩遇思詔加至一等輕車都尉歷任太子少傅領侍衛內大臣卒其子蓀舒襲職任前鋒參領兼佐領卒其恩詔所子泰芬襲職時削去兼一雲騎尉現任雲麾使加之職承襲騎都尉兼佐領又雅西塔之孫雅圗原任副都統兼佐領蘇爾班原任三等侍衛兼佐領蘇爾邁原任庶子穆占原任護軍參領兼佐領曽孫薩爾拜原任佐領綬玉原任三等侍衛蘇賚原任副都統兼佐領索柱現任冠軍使元孫蘇成額原任三等侍衛兼佐領愛柱廣明俱現任佐領哲克錫巴班正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸其孫古楞額原任護軍校曽孫雅思哈原任都察院副都御史鄂倫由頭等侍衛從征山東擊敗賊渠俞三呂思義等兵三千餘衆征浙江于金華府屢著戰功進征雲南敗賊將何繼祖等兵于石門坎黃草壩又賊將胡國秉率兵萬餘出雲南城拒戰并擊敗之卒後叙功優贈騎都尉兼一雲騎尉以其子鄂岱承襲任雲麾使緣事革退其姪孫阿柱現襲職又哲克錫巴班之元孫阿思哈雅爾納俱原任佐領薩爾納原任工部侍郎翁伊巴原任筆帖式四世孫佟泰原任筆帖式慈德原係候補主事佟崙現任署丞佟敏原任靈臺郎佟斌現任筆帖式五世孫景伊現係生員薩穆哈圗正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸原任備禦其子海祿渾由護軍校從征浙江舟山擊敗賊僞英毅伯阮思兵于海上又敗賊將張洪德等兵三萬餘衆叙功授雲騎尉後征福建攻厦門擊海冦鄭成功兵陳亡優贈騎都尉兼一雲騎尉以其子周什承襲卒其親伯之孫延布襲職任步軍總尉緣事革退其伯祖之曽孫班柱現襲職又薩穆哈圗之孫托色原任防禦杭琪原任主事尼葉勒原任三等侍衛舒書費約色俱原任筆帖式曽孫台音布原任防禦穆圗原任郎中音布原任筆帖式元孫武什原任防禦噶齊哈原任副護軍參領穆什哈原任八品官阿哈占原係庫使四世孫卓爾和現任防禦顧胡圗正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸其次子羅多理由防禦圍錦州首先登城破流賊滅福王平定河南江南等處屢著戰贈騎都功征福建攻延平府克其城後攻大同陳亡尉無嗣以其親兄之子羅什承襲兩遇恩詔加至三等輕車都尉卒其親叔胡騰額襲職緣事革退其子雅通阿查通阿先後承襲查通阿卒其親伯之孫拜柱襲職卒其子拜音岱襲職時削去恩詔所加之職餘剩騎都尉減一等現襲雲騎尉又顧胡圗之孫賽音達理原係雲騎尉元孫巴爾達亦原係雲騎尉約達尼正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸由前鋒參領從征四川屢敗賊張獻忠兵征湖廣擊賊何騰蛟兵敗之叙功授雲騎尉恩詔加兩遇都尉兼一雲騎尉卒其子達連襲職卒其至騎恩詔所兄之子年察哈襲職時削去其親弟佛爾屯襲加之職承襲雲騎尉卒無嗣職現任委署步軍校又約達尼之長子霞祿原任二等侍衛次子克德原任員外郎第三子定柱原係監生第四子蓀達理原任參領孫鈕格原任筆帖式曽孫伊爾胡德現係庫使繆施渾正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸原任六品官其子碩色由護軍校從征流賊攻古山首登被創追滕吉思擊敗土謝圗汗及碩羅汗兵圍大同敗賊將楊盡威兵後征廣東于新會縣地方屢破賊將李定國兵數萬餘衆叙功優授騎都尉任參領卒其孫英格襲職卒其叔之子桑格現襲職又繆施渾之孫碩博理原任三等侍衛碩瞻原任員外郎進布原任筆帖式拜正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸從征瓦爾喀力戰敗賊授雲騎尉歷任副都統緣事革職後由廢員從征大同殁于陳贈騎都尉以其子卓克璽承襲原任佐領卓拜正白旗人巴篤理札爾固齊同族世居馬察地方陵寢國初來歸原任護軍校其長子卓爾和原任和通總管其子費揚阿由筆帖式從征凖噶爾在贈雲騎呼爾哈腦爾地方擊賊陳亡拜之次子卓佛和尉其子薩哈璉現襲職又卓原任員外郎第四子果爾敦原任給事中兼參領第六子寧古齊第七子納達齊俱原任筆帖式孫桑格原任六品官佛克濟喜騷達色雅理俱原任筆帖式四達色原任八品官官保原係副驍騎校綏哈正白旗人巴篤理札爾固齊同族世居馬察地方國初來歸原任佐領其長子瑪古拉原任三等侍衛次子席圗由八品官從征雲南屢敗賊將何繼祖等兵于石門坎黃草壩叙功授雲騎尉卒無嗣其親弟托賴襲職因病告退其子都爾賽現襲職又綏哈之孫納爾賽原任步軍校法爾賽原係庫使曽孫騰泰現任護軍校以上俱係應立𫝊之人其餘無事蹟可立𫝊者附載於後正白旗庫察巴篤理札爾固齊同族其孫索奈原任驍騎校曽孫瑚錫納原任防禦元孫三塔哈現任護軍校岱哈巴篤理札爾固齊同族其子濃金原任二等侍衛孫鈕赫原任驍騎校武賽巴篤理札爾固齊同族其子胡圗原任驍騎校雅爾巴巴篤理札爾固齊同族其孫多鼐原任驍騎校曽孫薩年阿原任護軍校吳達齊其元孫謨爾渾原任協領索桑阿其子鄂爾托原任防禦孫鄂爾布原任員外郎鄂托活原任筆帖式華色原任護軍校曽孫麻色現任護軍校岱密喀其五世孫恩楚現任護軍校訥楞額現任驍騎校雅魯其孫福蘭保原任護軍校曽孫靈泰現任驍騎校納穆岱其子阿爾賽原任驍騎校以上俱世居馬察地方係國初來歸之人正白旗羅岱其子多鐸理原任驍騎校右世居馬察地方係來歸年分無考之人雅爾湖地方佟佳氏達爾漢侍衛扈爾漢國正白旗人世居雅爾湖地方初隨其父扈喇琥來歸太祖髙皇帝優遇之養以為子大臣之列有費約城長賜姓覺羅授為一等大臣居五名䇿穆特黑者苦烏喇貝勒布瞻泰之虐請移家內附扈爾漢奉命往遷其家口以三百兵破烏喇萬人征東海兀集部取赫席黑等處俘獲二千人又征滹野路悉降太祖嘉所部以歸漢侍衛號征兀集部虎爾哈路圍扎之賜達爾庫塔克其城其附近各路盡招撫之征東海薩哈連部至兀爾簡河刳舟二百隻水陸並進取河南北三十六寨復渡江取江北十一寨又招降使大路及諾洛路石拉欣路部長四十人後太祖擊明兵四路來侵達爾漢侍衛扈爾漢從禦董鄂撫順開原二路兵大敗之復先率千人路兵摧其前鋒伏兵山隘以扼其衝于是盡殪明劉綎兵又擊敗明遊擊喬一琦兵擒一琦纍太祖親功加世職至三等子卒渾塔襲職緣事革退後臨其喪哭之其第三子世祖章皇帝追念達爾漢侍衛扈爾漢之功復賜子爵令其五子分襲康熙三十七年聖祖仁皇帝巡至臣往奠墓次渾塔之子色勒原任散盛京特遣大御秩大臣兼佐領孫訥爾布原任