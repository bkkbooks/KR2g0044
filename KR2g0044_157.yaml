body:
  text: 八旗滿洲氏族通譜卷七十八附載滿洲旗分内之尼堪姓氏侯氏優才鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫六格現任永定河道國柱原任員外郎曽孫常舒現任叅領七十九現任員外郎陶柱現任七品官柏齡現任筆帖式元孫延福現係庫使拜思胡朗正白旗包衣管領下人世居瀋陽地方國初來歸原任司胙官裴氏裴登舉鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫浩善原任員外郎元孫裴星術現任筆帖式裴䕃柯鑲黄旗包衣管領下人世居巨流河地方來歸年分無考其子五色原任廐長孫昌阿岱原任庫司方氏方義文鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫七格現任内管領方國相原任内副管領常碩原任二等侍衞曽孫雙喜現任筆帖式方敏東正黄旗包衣人世居瀋陽地方來歸年分無考其孫方謙原任驍騎校馮氏馮士勇鑲黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其元孫馮爾鵬原任䕶軍校馮爾瑞原任筆帖式四世孫馮德新原任知縣馮德兆原任縣丞五世孫常庚現任知縣福延馮章俱現任筆帖式六世孫英連現任同知馮允倫正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其子馮聖澤原任知縣譚氏譚景倉鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫譚禧原任驍騎校譚達原任䕶軍校譚俞正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考原任員外郎其子克什圖原任整儀尉孫克什克原任驍騎校孔氏孔世圖鑲黄旗包衣旗鼓人世居瀋陽地方來歸年分無考原任把總其子孔起祥原任千總孔文遵鑲紅旗包衣人世居瀋陽地方侍國初來歸其曽孫孔泰現任翰林院讀學士元孫興貴現係舉人興柱現係生員夏氏夏德强鑲黄旗包衣管領下人世居瀋陽地方來歸年分無考其孫五十九現任筆帖式保常現係庫使夏官正黄旗包衣管領下人世居子街地方来歸年分無考原任同知其曽孫夏登雲原任員外郎方柱原任䕶軍校元孫夏巴什原任内管領夏常明原任長史四世孫福惠現任内副管領秦氏秦世傑鑲黄旗包衣旗鼓人世居瀋陽地方来歸年分無考其孫秦自勵現任筆帖式秦世徳正白旗包衣管領下人世居長白山地方来歸年分無考其孫伊佛訥原任備箭首領曽孫積麟原任廐長老格現任委署主事元孫觀音保現任筆帖式福興現任䕶軍校五十九原任嗚賛四世孫查爾泰現任筆帖式倪氏伊圖善鑲黄旗包衣管領下人世居寕古塔地方來歸年分無考其子倪禇原任備箭首領倪三格正白旗包衣人世居遼陽地方來歸年分無考其子倪有功原任驍騎校沈氏沈奪正黄旗包衣人世居瀋陽地方来歸年分無考其元孫秉功原任河南兵備道四世孫沈瑜現任内閣侍讀學士兼佐領五世孫蘓伯原任郎中兼佐領六世孫常岱現任郎中雅爾岱現任郎中兼佐領查爾岱現任三等侍衞卓爾岱現任員外郎兼佐領竒成額現任筆帖式七世孫永和現任員外郎永忠現任員外郎兼佐領永安現任筆帖式沈文煥鑲藍旗包衣人世居瀋陽地方天聰時来歸原任驍騎校其子沈偉原任副將宗氏宗起勝正黄旗包衣人世居瀋陽地方來歸年分無考其子宗哲孔原任員外郎宗德正白旗包衣管領下人世居湖普秦地方來歸年分無考原任牧長其子七十原任庫掌孫華善原任三等侍衞龍氏龍永陞正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫龍光裕現任同知龍得雲鑲藍旗包衣人世居瀋陽地方來歸年分無考其孫龍鴻禧原任三等䕶衞龍鴻仁原任筆帖式曽孫佛住現任筆帖式存住原任䕶軍校林氏林尚宗正黄旗包衣管領下人世居撫順地方來歸年分無考其孫克音三格俱原任六品官和善原任筆帖式曽孫成明原任内副管領常在原任三等侍衞保住留住俱原任筆帖式五格原任廐長元孫六十原任内副管領觀音保現任筆帖式林大福正紅旗包衣管領下人世居瀋陽地方國初来歸其元孫林廣現任六品官邊氏邊周正黄旗包衣旗鼔人世居瀋陽地方來歸年分無考其子邊啟心原任主事邊祿正藍旗包衣人世居瀋陽地方来歸年分無考其子邉三才原任守備元孫六十一現任八品官傅氏傅天貴正黄旗包衣旗鼓人世居瀋陽地方來歸年分無考原任三等侍衞其子傅作梅原任守備孫傅昭良現任千總傅仁正黄旗包衣管領下人世居瀋陽地方来歸年分無考其元孫七十三現任筆帖式薛氏薛洪亮正黄旗包衣管領下人世居瀋陽地方来歸年分無考其孫薛思恭原任筆帖式曽孫僧保現任䕶軍校永清正白旗包衣管領下人世居瀋陽地方來歸年分無考原任指揮葉氏葉永泉正黄旗包衣管領下人世居瀋陽地方来歸年分無考其孫葉成額原任内副管領曽孫八十三塞勒俱現任筆帖式葉永祥正白旗包衣旗鼔人世居瀋陽地方来歸年分無考其元孫葉文成現任主事閔氏閔國瑞正黄旗包衣人世居瀋陽地方来歸年分無考其曽孫閔登舉原任驍騎校元孫閔八十現任庫掌閔世文鑲紅旗包衣人世居瀋陽地方員國初来歸其元孫閔士英原係生衡氏衡久榮正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫當色原任内管領曽孫金福喜現任員外郎衡有德正白旗包衣管領下人世居瀋陽地方来歸年分無考其孫烏林現任三等侍衞三達色現任員外郎錢氏錢景春正白旗包衣管領下人世居爛泥河地方来歸年分無考其子錢齊資原任庫掌孫錢全原任内副管領錢識道正藍旗包衣人世居瀋陽地方來歸年分無考其元孫錢清逺現任六品包衣大長春現任八品官剛氏達色正白旗包衣管領下人世居遼陽地方來歸年分無考原任牧長剛世貴正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫剛志德現係庫使柴