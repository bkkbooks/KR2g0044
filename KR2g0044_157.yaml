body:
  text: 八旗滿洲氏族通譜卷七十八附載滿洲旗分內之尼堪姓氏侯氏優才鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考其孫六格現任永定河道國柱原任員外郎曽孫常舒現任參領七十九現任員外郎陶柱現任七品官柏齡現任筆帖式元孫延福現係庫使拜思胡朗正白旗包衣管領下人世居瀋陽地方國初來歸原任司胙官裴氏裴登舉鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫浩善原任員外郎元孫裴星術現任筆帖式裴蔭柯鑲黃旗包衣管領下人世居巨流河地方來歸年分無考其子五色原任廄長孫昌阿岱原任庫司方氏方義文鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考其孫七格現任內管領方國相原任內副管領常碩原任二等侍衛曽孫雙喜現任筆帖式方敏東正黃旗包衣人世居瀋陽地方來歸年分無考其孫方謙原任驍騎校馮氏馮士勇鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫馮爾鵬原任護軍校馮爾瑞原任筆帖式四世孫馮德新原任知縣馮德兆原任縣丞五世孫常庚現任知縣福延馮章俱現任筆帖式六世孫英連現任同知馮允倫正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其子馮聖澤原任知縣談氏談景倉鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫談禧原任驍騎校談達原任護軍校談俞正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考原任員外郎其子克什圖原任整儀尉孫克什克原任驍騎校孔氏孔世圖鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考原任把總其子孔起祥原任千總孔文遵鑲紅旗包衣人世居瀋陽地方侍國初來歸其曽孫孔泰現任翰林院讀學士元孫興貴現係舉人興柱現係生員夏氏夏德強鑲黃旗包衣管領下人世居瀋陽地方來歸年分無考其孫五十九現任筆帖式保常現係庫使夏官正黃旗包衣管領下人世居子街地方來歸年分無考原任同知其曽孫夏登雲原任員外郎方柱原任護軍校元孫夏巴什原任內管領夏常明原任長史四世孫福惠現任內副管領秦氏秦世傑鑲黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其孫秦自勵現任筆帖式秦世德正白旗包衣管領下人世居長白山地方來歸年分無考其孫伊佛訥原任備箭首領曽孫積麟原任廄長老格現任委署主事元孫觀音保現任筆帖式福興現任護軍校五十九原任嗚贊四世孫查爾泰現任筆帖式倪氏伊圖善鑲黃旗包衣管領下人世居寧古塔地方來歸年分無考其子倪禇原任備箭首領倪三格正白旗包衣人世居遼陽地方來歸年分無考其子倪有功原任驍騎校沈氏沈奪正黃旗包衣人世居瀋陽地方來歸年分無考其元孫秉功原任河南兵備道四世孫沈瑜現任內閣侍讀學士兼佐領五世孫蘇伯原任郎中兼佐領六世孫常岱現任郎中雅爾岱現任郎中兼佐領查爾岱現任三等侍衛卓爾岱現任員外郎兼佐領竒成額現任筆帖式七世孫永和現任員外郎永忠現任員外郎兼佐領永安現任筆帖式沈文煥鑲藍旗包衣人世居瀋陽地方天聰時來歸原任驍騎校其子沈偉原任副將宗氏宗起勝正黃旗包衣人世居瀋陽地方來歸年分無考其子宗哲孔原任員外郎宗德正白旗包衣管領下人世居湖普秦地方來歸年分無考原任牧長其子七十原任庫掌孫華善原任三等侍衛龍氏龍永升正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫龍光裕現任同知龍得雲鑲藍旗包衣人世居瀋陽地方來歸年分無考其孫龍鴻禧原任三等護衛龍鴻仁原任筆帖式曽孫佛住現任筆帖式存住原任護軍校林氏林尚宗正黃旗包衣管領下人世居撫順地方來歸年分無考其孫克音三格俱原任六品官和善原任筆帖式曽孫成明原任內副管領常在原任三等侍衛保住留住俱原任筆帖式五格原任廄長元孫六十原任內副管領觀音保現任筆帖式林大福正紅旗包衣管領下人世居瀋陽地方國初來歸其元孫林廣現任六品官邊氏邊周正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考其子邊啓心原任主事邊祿正藍旗包衣人世居瀋陽地方來歸年分無考其子邉三才原任守備元孫六十一現任八品官傅氏傅天貴正黃旗包衣旗鼓人世居瀋陽地方來歸年分無考原任三等侍衛其子傅作梅原任守備孫傅昭良現任千總傅仁正黃旗包衣管領下人世居瀋陽地方來歸年分無考其元孫七十三現任筆帖式薛氏薛洪亮正黃旗包衣管領下人世居瀋陽地方來歸年分無考其孫薛思恭原任筆帖式曽孫僧保現任護軍校永清正白旗包衣管領下人世居瀋陽地方來歸年分無考原任指揮葉氏葉永泉正黃旗包衣管領下人世居瀋陽地方來歸年分無考其孫葉成額原任內副管領曽孫八十三塞勒俱現任筆帖式葉永祥正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其元孫葉文成現任主事閔氏閔國瑞正黃旗包衣人世居瀋陽地方來歸年分無考其曽孫閔登舉原任驍騎校元孫閔八十現任庫掌閔世文鑲紅旗包衣人世居瀋陽地方員國初來歸其元孫閔士英原係生衡氏衡久榮正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫當色原任內管領曽孫金福喜現任員外郎衡有德正白旗包衣管領下人世居瀋陽地方來歸年分無考其孫烏林現任三等侍衛三達色現任員外郎錢氏錢景春正白旗包衣管領下人世居爛泥河地方來歸年分無考其子錢齊資原任庫掌孫錢全原任內副管領錢識道正藍旗包衣人世居瀋陽地方來歸年分無考其元孫錢清逺現任六品包衣大長春現任八品官剛氏達色正白旗包衣管領下人世居遼陽地方來歸年分無考原任牧長剛世貴正白旗包衣旗鼓人世居瀋陽地方來歸年分無考其曽孫剛志德現係庫使柴