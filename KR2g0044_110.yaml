body:
  text: 八旗滿洲氏族通譜目録卷五十五洪鄂氏齋齊荆衣祿瑚什屯以上俱有傳丹岱穆克楚庫阿瑚禮恭智博理特楚齋山積德貝舒通阿富拉禪伊蘭珠蓋穆烏臧阿溫都萬布溫察以上俱附載賢達禪氏烏爾克穆右係有傳德爾博古尼雅哈察以上俱附載赫錫赫理氏訥楚庫右係有傳謨希納博布泰以上俱附載庫穆圖氏索秦商阿塔以上俱有傳瑪鼐右係附載康儀理氏布拉察哈右係有傳渾岱右係附載額爾吉氏訥圖庫右係有傳巴哈親右係附載舒墨理氏卓滿右係有傳顔扎庫右係附載錫克濟拉氏薩爾竒右係有傳松吉爾圖右係附載德敦氏揚周右係有傳瑚都渾恩格以上俱附載珠格氏卓普托右係有傳薩爾堪攸拉禪以上俱附載卦爾察氏阿蘇葉龍額以上俱有傳拉普特圖穆岱顔布祿以上俱附載多爾衮氏額伊瑚訥右係有傳索爾泰右係附載洪佳氏瑪寧阿右係有傳額爾格右係附載孟佳氏瓦納漢右係有傳班濟那尚武塔爾圖以上俱附載克音氏齊漢泰右係有傳綽哈鄂竒達班布賚以上俱附載明安氏羅多渾右係有傳博松鄂右係附載烏禮蘇氏鄂浡托右係有傳赫德理鄂爾琨景文珠蘭泰瑚納布楞俄衮敬思鼐以上俱附載薩哈爾濟氏富泰右係有傳博楞泰拜達理瑚雅以上俱附載欽定四庫全書八旗滿洲氏族通譜目録卷五十五洪鄂氏齋齊荆衣祿瑚什屯以上俱有傳丹岱穆克楚庫阿瑚禮恭智博理特楚齋山積德貝舒通阿富拉禪伊蘭珠蓋穆烏臧阿溫都萬布溫察以上俱附載賢達禪氏烏爾克穆右係有傳德爾博古尼雅哈察以上俱附載赫錫赫理氏訥楚庫右係有傳謨希納博布泰以上俱附載庫穆圖氏索秦商阿塔以上俱有傳瑪鼐右係附載康儀理氏布拉察哈右係有傳渾岱右係附載額爾吉氏訥圖庫右係有傳巴哈親右係附載舒墨理氏卓滿右係有傳顔扎庫右係附載錫克濟拉氏薩爾竒右係有傳松吉爾圖右係附載德敦氏揚周右係有傳瑚都渾恩格以上俱附載珠格氏卓普托右係有傳薩爾堪攸拉禪以上俱附載卦爾察氏阿蘇葉龍額以上俱有傳拉普特圖穆岱顔布祿以上俱附載多爾衮氏額伊瑚訥右係有傳索爾泰右係附載洪佳氏瑪寧阿右係有傳額爾格右係附載孟佳氏瓦納漢右係有傳班濟那尚武塔爾圖以上俱附載克音氏齊漢泰右係有傳綽哈鄂竒達班布賚以上俱附載明安氏羅多渾右係有傳博松鄂右係附載烏禮蘇氏鄂浡托右係有傳赫德理鄂爾琨景文珠蘭泰瑚納布楞俄衮敬思鼐以上俱附載薩哈爾濟氏富泰右係有傳博楞泰拜達理瑚雅以上俱附載
