  text: 八旗滿洲氏族通譜卷六十九附載滿洲旗分內之蒙古姓氏寶濟氏寶濟係隸滿洲旗分之䝉古一姓其氏族世居科爾沁及察哈爾地方鄂鼐正白旗包衣管領下人世居科爾沁地方來歸年分無考其子定柱原任長史鄂齊理原任庫掌孫福管桑格俱原任護軍校曾孫安泰亦原任護軍校顧祿古正白旗包衣管領下人世居科爾沁地方來歸年分無考其子額爾赫特原任頭等侍衛諾木齊正白旗包衣管領下人世居察哈爾地方來歸年分無考原任牧長其子班第原任護軍校白第正白旗包衣管領下人世居科爾沁地方國初來歸其曾孫釋迦保官福俱現任筆帖式察爾岱正白旗包衣管領下人世居察哈爾地方來歸年分無考其子拉哈逹原任筆帖式傅爾建正白旗包衣管領下人世居科爾沁地方國初來歸具元孫伊蘭保現係生員阿爾詹正白旗包衣管領下人世居察哈爾地方來歸年分無考其子二漢原任廏長滿津氏滿津係隸滿洲旗分之䝉古一姓其氏族世居西拉木楞地方巴雅鼐鑲白旗人世居西拉木楞地方參國初來歸其曾孫色倫特原任護軍領由正白旗改隸海塞鑲白旗人世居西拉木楞地方由國初來歸其孫雅圖原任佐領正白旗改隸鐸松鄂鑲白旗人世居西拉木楞地方國初來歸其孫班第原任步軍校曾孫常安現係副護軍校由正白旗改隸哈喇鑲白旗人世居西拉木楞地方國初來歸其孫瑪尼原任步軍校曾孫額什圖現任驍騎校由正白旗改隸丹岱鑲白旗人世居西拉木楞地方亦國初來歸其子海森岱原任驍騎校孫宗柱原任驍騎校由正白旗改隸鐸博鑲白旗人世居西拉木楞地方正國初來歸其孫江西原任驍騎校由白旗改隸碧禮克鑲白旗人世居西拉木楞地方騎國初來歸其元孫沙喀現係副驍校由正白旗改隸博爾濟斯氏博爾濟斯係𨽻滿洲旗分之䝉古姓其氏族散處於察哈爾等地方䝉格圖鑲黃旗包衣人世居察哈爾地方來歸年分無考原任牛羊群總管華顔班第鑲黃旗包衣人世居察哈爾地方來歸年分無考其子納穆岱原任四品典儀德爾格斯鑲黃旗包衣人世居察哈爾地方來歸年分無考其孫碧理克原任護軍校額斯赫正黃旗人世居兀魯特地方校國初來歸其孫法永現任驍騎僧格鑲白旗包衣人世居克西克騰地方現國初來歸其曾係瑪武原任二等護衛宣秀任驍騎校七十六現任三等護衛兼副參領梅楞鑲白旗包衣管領下人世居克西克騰地方天聰時來歸其孫觀音保現任八品官巴雅喇氏巴雅喇係隸滿洲旗分之蒙古一姓其氏族散處於察哈爾等地方圖賴鑲黃旗人世居察哈爾地方來歸年分無考原任三等侍衛滿珠習理鑲黃旗人世居扎魯特地方額國初來歸其元孫桑格現任護軍校額楞現任驍騎校碩布正黃旗人世居克爾倫地方國初來歸原任藍翎侍衛顧祿古正白旗人世居兀魯特地方佐國初來歸原任領鄂博特正白旗人世居喀拉沁地方國初來歸原任二等侍衛其曾孫詹泰原任護軍校博羅特正白旗包衣管領下人世居科爾沁地方來歸年分無考其子蓀泰原任七品官博碩氏博碩係隸滿洲旗分之䝉古一姓其氏族散處於喀拉沁等地方端爾鑲黃旗包衣管領下人世居喀拉沁地方來歸年分無考原係庖長其子色克亦原係庖長巴爾泰原任護軍參領孫菁山現任護軍校鐸隆武現任筆帖式塞楞鑲黃旗包衣管領下人世居鄂爾多斯地方來歸年分無考原任二等侍衛善積鑲黃旗包衣人世居科爾沁地方來歸年分無考其子巴圖原任委署護軍參領巴拜鑲黃旗包衣人世居土默特地方來歸年分無考其子武逹錫原任護軍校烏拉岱鑲黃旗包衣管領下人世居鄂爾多斯地方來歸年分無考原任廏長其孫佛柱現任八品官塞克圖氏塞克圖係隸滿洲旗分之䝉古一姓其氏族世居土默特及科爾沁地方晉保鑲黃旗包衣管領下人世居上默特地方來歸年分無考其曾孫尼雅哈現任廄長常住現任筆帖式五十三現任內副管領元孫官德現係生員和托齊正白旗包衣管領下人世居土默特地方來歸年分無考原任副將其子天成原任協領孫班布詹原任司庫曾孫邁堪邁格俱現任郎中邁柱現任參領邁蘭原任內管領邁圖原任筆帖式元孫諾敏現任庶吉士永齡現係生員昌平現任中書賽濟圖正白旗包衣管領下人世居科爾沁地方來歸年分無考其子察泰原任郎中博爾赫原任藍翎侍衛孫碩絡原任護軍校碩通鄂原任內管領曾孫存柱原任庫掌石雲現任贊禮郎常噶岱正白旗包衣管領下人世居土默特地方來歸年分無考其子高佟保原任筆帖式孫鄂禮原任內管領卓特氏卓特係隸滿洲旗分之蒙古一姓其氏族散處於西喇塔拉等地方珠布式葉正紅旗人世居西喇塔拉地方軍國初來歸其元孫圖桑阿現任護校武巴逹理鑲白旗人世居察哈爾地方天聰時來歸其曾孫逹爾瑪原任驍騎校庫圖齊正藍旗人世居義州地方華國初來歸其子邁古原任護軍校孫尚原任佐領曾孫昂噶岱亦原任佐領拜珠瑚原任驍騎校地藏保現任佐領元孫華色原任頭等護衛謨羅爾原任驍騎校章保住現任佐領章福原任護軍校四世孫烏逹色現任贊禮郎沙瑚塔鑲藍旗人世居克西克騰地方天聰時來歸其子濟蘭泰原係監生納賴氏納賴係隸滿洲旗分之䝉古一姓其氏族世居吳喇忒地方達都瑚鑲黃旗包衣管領下人世居吳喇忒地方來歸年分無考原任內管領其子三保亦原任內管領孫來柱現任護軍校海成現任內管領曾孫沙爾幹現任員外郎庫蘇爾岱鑲黃旗包衣管領下人世居吳喇忒地方來歸年分無考其曾孫岱通現任內副管領桑格鑲黃旗包衣管領下人世居吳喇忒地方來歸年分無考原任護軍校其子同保原任筆帖式孫傅森布現任贊禮郎博爾濟氏