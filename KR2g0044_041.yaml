body:
  text: 八旗滿洲氏族通譜目録卷二十佟佳地方佟佳氏佟養正佟圖賴佟國綱佟國維佟養性佟養材佟鎮國努顔噶哈佟山佟養澤阿爾瑚理豐阿南泰塔本巴顔葛臣哈哈納阿顧禮佟標佟釗佟養謙哈普塔伊拉親都馨穆隆額羅金都都以上俱有𫝊噶爾噶圗穆圗額爾本格圖謨圗夸爾達薩穆哈圗宻資胡斯屯海倫愛宻達岳普登楞特希佛訥伍賽尹特圗赫徳䝉古綽阿宻塔納達理莽依圗揚武阿爾東阿滿丕覺和託倭赫吳拉岱謨斯泰葉瑚徳托穆圗希福安珠舒山博惠以上俱附載各地方佟佳氏尼堪洪科夸山費約爾渾烏進圗蘭和爾惠外達理法色以上俱有𫝊瑚呼納魯克都理索爾圗巴布尼邁圗阿舒魯阿岱鄂滿錫克阿穆岱葉赫愛音布禄色勒阿爾琥禮佟琥羅思哈顔達理碩爾岱舒延柱郎圗佛察桑阿布碩色烏沙庫額爾赫郭巴爾圗達隆阿倭實渾索諾穆阿爾庫騰格阿漢托哈齊武忒海圗爾泰秦達哈滿都漢精阿拉哈達察爾圗松果絡綏哈郭渾佟智賢達爾瑪渾塔哈阿渾滿都阿納庫以上俱附載
