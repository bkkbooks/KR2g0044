body:
  text: 八旗滿洲氏族通譜目録上𫝊記𩔖三總録之屬卷一𤓰爾佳氏一卷二𤓰爾佳氏二卷三𤓰爾佳氏三卷四𤓰爾佳氏四卷五鈕祜禄氏卷六舒穆禄氏卷七馬佳氏卷八董鄂氏卷九赫舍里氏一卷十赫舍里氏二卷十一他塔喇氏卷十二伊爾根覺羅氏一卷十三伊爾根覺羅氏二卷十四伊爾根覺羅氏三卷十五伊爾根覺羅氏四卷十六舒舒覺羅氏卷十七西林覺羅氏卷十八通顔覺羅氏卷十九佟佳氏一卷二十佟佳氏二卷二十一那木都魯氏卷二十二納喇氏一卷二十三納喇氏二卷二十四納喇氏三卷二十五富察氏一卷二十六富察氏二卷二十七富察氏三卷二十八完顔氏卷二十九叩徳氏吳雅氏戴佳氏卷三十兀扎喇氏卷三十一兆佳氏卷三十二郭絡羅氏顔扎氏碧魯氏卷三十三李佳氏黃佳氏卷三十四吳扎庫氏錫克特理氏庫雅拉氏卷三十五薩克達氏卷三十六賽密勒氏精竒理氏扎庫塔氏卷三十七烏蘇氏卷三十八巴雅拉氏卷三十九輝和氏魯布理氏尼馬察氏伊爾庫勒氏卷四十章佳氏卷四十一寜古塔氏薩哈爾察氏卷四十二嵩佳氏宜特墨氏扎思瑚理氏瑚錫哈理氏卷四十三喜塔臘氏泰楚魯氏性佳氏穆爾察氏卷四十四費莫氏索佳氏薩馬爾吉氏齊佳氏卷四十五葛濟勒氏哲爾齊氏索綽絡氏卷四十六鄂卓氏鈕赫勒氏鄂濟氏裕瑚魯氏布爾察氏卷四十七伊拉理氏卷四十八虎爾哈氏蘇佳氏温徹亨氏哲爾徳氏温察氏卷四十九額蘇理氏吳魯氏覺禪氏科奇理氏把爾達氏尼沙氏托活洛氏卷五十阿穆魯氏索爾多氏俞爾庫勒氏滿扎氏烏色氏佑祜魯氏圖色理氏温特赫氏梅勒氏博和理氏卷五十一鈕顔氏烏爾古宸氏扎拉理氏温都氏䝉古爾濟氏阿禮哈氏蘇都理氏竒塔喇氏鄂托氏洪吉理氏卷五十二墨爾哲勒氏索齊勒氏托謨氏湯務氏都拉喇氏墨爾迪勒氏喀爾達蘇氏赫舒理氏輝羅氏卷五十三濟禮氏烏爾漢氏赫宜氏扎蘇理氏拜都氏賴布氏布賽氏噶努氏烏蘇占氏尼竒理氏鄂謨拖氏董佳氏阿克占氏葉穆氏喀爾拉氏卷五十四薩克察氏烏爾答氏圖克坦氏郭爾佳氏洪鄂春氏額爾圖氏彰錦氏聶格理氏揚佳氏卷五十五洪鄂氏賢達禪氏赫錫赫理氏庫穆圖氏康儀理氏額爾吉氏舒墨理氏錫克濟拉氏徳敦氏珠格氏卦爾察氏多爾衮氏洪佳氏孟佳氏克音氏眀安氏烏禮蘇氏薩哈爾濟氏卷五十六尼竺渾氏武爾格齊氏瑚玉魯氏和和齊氏塔穆察氏夸爾達氏徳都勒氏愷顔氏珠爾蘇氏綽克秦氏安達拉氏愛渾氏海拉蘇氏吳靈阿氏圖門氏勒第氏克爾徳氏哲栢氏圖普蘇氏托爾佳氏格格氏韓扎氏穆察氏多羅氏褚庫爾氏武聶氏郭爾本氏圖克敦氏葉庫理氏哲理氏組佳氏唐達氏卓克佳氏崇果魯氏墨爾齊氏瓦理氏蔡佳氏克葉勒氏富爾庫魯氏萬旒哈氏穆燕氏都善氏拜格氏阿圖拉墨氏賽音薩爾圖氏穆和林氏卷五十七䝉鄂索氏薩察氏錫墨勒氏劉佳氏果爾吉氏武佳氏佟鄂絡氏郭佳氏梅赫理氏瑚錫理氏蒙古楚氏崇吉喇氏額爾赫氏布雅穆齊氏都理氏倭勒氏尼陽尼雅氏專塔氏布達喇氏葉赫勒氏朱佳氏瑚雅拉氏鄂蘇爾瑚氏羅佳氏敖拉氏瓦色氏珠爾根氏哈爾察氏布尼氏髙佳氏葉赫氏巴理氏孫佳氏喀爾沁氏翰顔氏烏蘇理氏尼佳氏舒瑪理氏卷五十八卓晉氏色穆竒理氏廣佳喇氏吳察喇氏蒼瑪爾紀氏赫書氏康傑達氏吉魯氏都魯氏沙拉氏鄂穆綽氏培佳氏舒穆理氏鄂爾綽絡氏徐吉氏達爾充阿氏烏爾瑚濟氏顔濟理氏卓起氏鄂索絡氏鈕瑚特氏盛佳氏倭徹赫氏索察氏赫葉勒氏禄葉勒氏拜晉氏烏雅察氏穆克圖氏扎拉氏傅佳氏郭渾氏尼錫理氏赫佳氏强恰理氏鍾吉氏梅楞氏舒禄氏琨都勒氏額色氏伏爾哈氏覺佳氏瑚雅氏都佳氏謨克拖氏虞佳氏碧喇氏伊庫魯氏多羅宏氏鈕赫氏翁鈕絡氏吉普褚氏金佳氏石穆魯氏馬察氏赫濟理氏䝉鄂絡氏郭羅氏納塔氏佟塞勒氏卷五十九精吉氏薩爾都氏和岳絡氏舍顔氏畢魯勒氏瑚克錫勒氏順布魯氏舒發察氏殷佳氏圖爾敦氏慶格理氏蘇拉喇氏阿爾拉氏墨勒氏巴爾拉氏敖拉托欣氏拜英格理氏穆雅氏攸絡庫氏鄂羅氏嘉普塔喇氏富森氏瑚遜氏佟唘氏葛爾克氏圖佳氏古爾吉氏傅錫理氏墨佳氏伊拉齊氏額爾格濟氏倭赫氏吳聶齊氏都克達氏赫爾濟氏錫爾弼氏白佳氏塔喇氏宏義氏温屯氏富色勒氏倭徹庫氏凱隆氏玉克墨氏伊喇氏克伊克勒氏甘佳氏齊達勒氏泰瑚特氏墨爾迪氏貴岳理氏公儀理氏卷六十珠赫勒氏傅爾袞氏阿魯氏敖佳氏瑚錫喀氏朱錫理氏珠雅拉氏阿爾布氏齊克騰氏吳濟佳喇氏文達氏楞布爾勤氏都克塔理氏阿拉邊前氏圖爾塔拉氏錫克徳氏羅察氏伊穆氏墨克廷氏瑪爾丹氏額爾格圖氏色勒理氏武庫登吉氏章齊氏賈佳氏都雅爾氏亨竒勒氏格晉氏希薩爾氏鄂通氏公鄂理氏穆盧氏扎哈瑪氏墨克勒氏謨爾齊理氏伊勒爾濟氏都爾勒氏韓楚哈氏舒爾都氏徐察氏福塔氏竒徳理氏瑚琥氏宗佳氏訥迪氏瓦爾佳氏卷六十一尼格勒氏凖齊氏翁尼理氏朱爾克氏通阿拉氏穆爾徳氏吳扎爾瑚氏特濟氏塔坦氏猷格理氏哈爾吉氏穆齊氏恰喇氏姜佳氏博和羅氏唐尼氏吳拉氏洪達理氏馬爾屯氏兆壘氏玉爾庫氏陳佳氏莽吉綽氏墨爾吉氏穆色陳氏塞楞吉氏尼瑪哈氏茂儀氏安佳氏羅岳氏鄂濟理氏翁果特氏康錫理氏蘇克察氏扎穆秦氏都瓦爾佳氏諾絡氏田佳氏林佳氏秋佳氏多錦氏努爾漢氏錫勒爾吉氏嘉哈瑪氏胡錫氏瓦爾吉氏達瑚理氏屈佳氏普佳氏蔣佳氏龎佳氏卷六十二䝉果資氏舒克都理氏費佳氏阿塔穆氏西法齊氏孔尼喇氏密札氏倭徹勒氏多興氏博都理氏何齊拉氏雅佳氏桓泰氏喀爾庫氏福錫氏莽果氏孔果絡