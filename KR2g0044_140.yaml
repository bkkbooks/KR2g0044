body:
  text: 八旗滿洲氏族通譜目録卷七十附載滿洲旗分內之蒙古姓氏謨爾啓特氏布顔圖泰錫納喇氏多諾瑪爾吉特氏達賴翁濟爾金氏實喇什保納雅氏逹都瑚理瑚嶽絡氏巴爾瑚楞錫臨氏塞都達絡克氏凱屏烏理特氏額爾格札哈蘇親氏阿哈齊克勒德氏察漢巴圖魯錫爾哈氏巴顔巴圖魯齊普齊努特氏瑟特爾兆巴爾氏敦鐸薩爾珠特氏鄂爾霍逹珠佳氏碧布賽王札普氏徹穆冬瑚佳氏瑚璧泰馬朗阿氏馬順札哈拉氏阿都齊克理特氏薩滿逹章圖理氏白顔克穆齊特氏和托烏爾漢氏布顔泰鐘吉氏鐘繼祖通塞理氏楚爾噶岱卓爾和親氏額森札穆爾氏顔疇博爾器濟斯氏碧禮克塔爾瑚努特氏昂噶岱博第斯氏鐘德博爾蘇特氏布拉克喀爾努克氏額騰格爾赫錫特氏色內禹爾氏烏赫齊札魯特氏瑪哈索諾圖氏塔瑪海伍堯氏巴黨赦爾諾絡雅蘇氏噶爾舟烏齊熙理氏多爾濟巴理氏托克托輝烏納特氏達海韓佳氏羅泰沙嶽特氏巴爾泰白蘇氏渾齊牛佳氏檀拜艾耀施氏恩格德黃佳氏星鼐冬果爾氏都蘭泰瑪喇拉氏翁果托蘇穆察氏蘇穆圖王吉氏王查普哈爾圖特氏薩錫圖赫爾氏濟爾圖章穆氏鄂德理哈納克氏布泰布蘇克氏白善齊普齊特氏四格逹魯特氏佟阿阿蘇特氏圖斯圖哈理特氏諾穆璽卓啓斯氏額勒克圖蒙古氏由庫烏喇特哈克氏武拜巴顔圖氏和東阿魯絡特氏阿禮克額哲特氏邁蘭啓普樵氏博絡和杭津氏阿彰唐古特氏鄂絡漢伊爾佳氏幹珠爾札穆雅氏黑色常佳氏武拉海魯布理氏桑格布佳吉理氏外蘭瑚爾漢氏阿都齊巴濟理氏伊勒扣馬吉特氏謨岱卓爾特氏班第陶佳氏班布施科爾親氏巴爾曹佳氏沙濟圖來默氏來滿欽定四庫全書
