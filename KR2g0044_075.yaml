body:
  text: 八旗滿洲氏族通譜目録卷三十七瓦爾喀地方烏蘇氏吉思哈吉普喀達穆瑚達爾布伊哈蘇祁充格清嘉努邵占以上俱有傳剛阿達賽圖兊勒慎薩蒲察哈武勒拖爾濶拖蒲善西圖庫三泰海保住阿黨仲褚瑚爾巴庫爾訥班布里柏啓阿克敦達齊里邁色噶瑚理莽啓尼隆格扎庫尼烏啓瑚圖漢都博拖濶巴通阿雅爾哈以上俱附載訥殷地方烏蘇氏塔蒙阿舍泰寶柱鄂爾布以上俱有傳多尼喀葉成拜明通古里沙通阿墨格阿郎阿格巴庫以上俱附載海蘭地方烏蘇氏阿蘭外圖席爾布以上俱有傳阿哈占楞柱薩穆哈圖以上俱附載長白山地方烏蘇氏僧住塔禮布爾圖喀以上俱有傳滿蘭貝勒克阿爾那以上俱附載各地方烏蘇氏喀尼蘇蘇庫以上俱有傳薩克薩哈噶舒薩蒲西堪泰湯善海色色思岱卓克西塔法拉瑚錫納齊希圖巴爾達善達布祿瓦哈那費揚古烏凱以上俱附載
  hash: sha256:348244dcc6a2b1a4cc75e47eb7f9cad9e2a45730ec93e857ac56bdc63dba69f1
