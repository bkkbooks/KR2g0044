body:
  text: 八旗滿洲氏族通譜目録卷六十正白旗有名位希姓珠赫勒氏努他拉博爾衮氏郭和達阿魯氏揚武敖佳氏海蘭瑚鍚喀氏費雅庫納朱錫理氏額圖瑚珠雅拉氏塞白圖阿爾布氏䝉果爾鐸齊克騰氏西喇布呉濟佳喇氏博爾鐸文達氏瑚什楞布爾勤氏瑚瑪爾岱都克塔理氏索索渾阿拉邉前氏席韜圖爾塔拉氏雅哈爾錫克德氏瑪克圖羅察氏顧楞泰伊穆氏喀喀墨克廷氏葛祿德瑪爾丹氏雅圖額爾格圖氏謨林察色勒理氏達耀武庫登吉氏鄂爾渾春章齊氏錫常賈佳氏精額理都雅爾氏蒙果爾岱亨奇勒氏沙爾希納格晉氏璧耀和齊希薩爾氏髙琯鄂通氏色克公鄂理氏古穆正紅旗有名位希姓穆盧氏達哈那札哈瑪氏聶度墨克勒氏納顔布謨爾齊理氏敦鐸和伊勒爾濟氏圖郎阿都爾勒氏哲爾德韓楚哈氏葛伯舒爾都氏拜色徐察氏寶色福塔氏曽啟盛奇徳理氏鼐音逹理瑚琥氏圗喇宗佳氏呉資訥廸氏噶哈瓦爾佳氏納蘭泰欽定四庫全書八旗滿洲氏族通譜目録卷六十正白旗有名位希姓珠赫勒氏努他拉博爾衮氏郭和達阿魯氏揚武敖佳氏海蘭瑚鍚喀氏費雅庫納朱錫理氏額圖瑚珠雅拉氏塞白圖阿爾布氏䝉果爾鐸齊克騰氏西喇布呉濟佳喇氏博爾鐸文達氏瑚什楞布爾勤氏瑚瑪爾岱都克塔理氏索索渾阿拉邉前氏席韜圖爾塔拉氏雅哈爾錫克德氏瑪克圖羅察氏顧楞泰伊穆氏喀喀墨克廷氏葛祿德瑪爾丹氏雅圖額爾格圖氏謨林察色勒理氏達耀武庫登吉氏鄂爾渾春章齊氏錫常賈佳氏精額理都雅爾氏蒙果爾岱亨奇勒氏沙爾希納格晉氏璧耀和齊希薩爾氏髙琯鄂通氏色克公鄂理氏古穆正紅旗有名位希姓穆盧氏達哈那札哈瑪氏聶度墨克勒氏納顔布謨爾齊理氏敦鐸和伊勒爾濟氏圖郎阿都爾勒氏哲爾德韓楚哈氏葛伯舒爾都氏拜色徐察氏寶色福塔氏曽啟盛奇徳理氏鼐音逹理瑚琥氏圗喇宗佳氏呉資訥廸氏噶哈瓦爾佳氏納蘭泰
